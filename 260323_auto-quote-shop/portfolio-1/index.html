// ── Components ──
function Skeleton(){
  return(<div style={{padding:32,display:'flex',flexDirection:'column',gap:16}}>
    <div className="skeleton" style={{width:'60%',height:24}}/>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
      {[1,2,3,4].map(i=><div key={i} className="skeleton" style={{height:100,borderRadius:12}}/>)}
    </div>
    <div className="skeleton" style={{height:300,borderRadius:12}}/>
  </div>);
}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,animation:'fadeIn .2s'}}>
    <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:16,width:'90%',maxWidth:580,maxHeight:'85vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSec}}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>);
}

function Badge({text,color}){
  const colors={제작중:{bg:'#DBEAFE',text:'#1D4ED8'},배송완료:{bg:'#D1FAE5',text:'#065F46'},결제완료:{bg:'#FEF3C7',text:'#92400E'},배송준비:{bg:'#E0E7FF',text:'#3730A3'},활성:{bg:'#D1FAE5',text:'#065F46'},비활성:{bg:'#FEE2E2',text:'#991B1B'},VIP:{bg:'#EDE9FE',text:'#5B21B6'},일반:{bg:'#F1F5F9',text:'#475569'}};
  const c=colors[text]||{bg:'#F1F5F9',text:'#475569'};
  return <span style={{padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function KPICard({icon,label,value,sub,trend}){
  return(<div style={{background:C.surface,borderRadius:12,padding:'20px 24px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',display:'flex',gap:16,alignItems:'center',animation:'fadeIn .4s'}}>
    <div style={{width:48,height:48,borderRadius:12,background:`${C.primary}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{icon}</div>
    <div style={{flex:1}}>
      <div style={{fontSize:13,color:C.textSec,marginBottom:4}}>{label}</div>
      <div style={{fontSize:22,fontWeight:700,color:C.text}}>{value}</div>
      {sub&&<div style={{fontSize:12,color:trend==='up'?C.success:trend==='down'?C.danger:C.textSec,marginTop:2}}>{sub}</div>}
    </div>
  </div>);
}

function InputField({label,type='text',value,onChange,options,placeholder}){
  const st={width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none',fontFamily:'Pretendard'};
  return(<div style={{marginBottom:16}}>
    <label style={{display:'block',fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>{label}</label>
    {options?<select value={value} onChange={e=>onChange(e.target.value)} style={{...st,background:C.surface}}>
      {options.map(o=><option key={o} value={o}>{o}</option>)}
    </select>:<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={st}/>}
  </div>);
}

function QuoteCalculatorPage({setModal}){
  const [product,setProduct]=useState(products[0].name);
  const [size,setSize]=useState(sizeOptions[2]);
  const [paper,setPaper]=useState(paperOptions[0]);
  const [coating,setCoating]=useState(coatingOptions[0]);
  const [qty,setQty]=useState(500);
  const selectedProduct=products.find(p=>p.name===product)||products[0];
  const basePricePerUnit=selectedProduct.minPrice/100;
  const sizeMultiplier=sizeOptions.indexOf(size)*0.15+1;
  const paperMultiplier=paperOptions.indexOf(paper)*0.1+1;
  const coatingMultiplier=coatingOptions.indexOf(coating)*0.08+1;
  const discountRate=priceMatrix[qty]||1;
  const unitPrice=Math.round(basePricePerUnit*sizeMultiplier*paperMultiplier*coatingMultiplier);
  const totalPrice=Math.round(unitPrice*qty*discountRate);
  const discountPercent=Math.round((1-discountRate)*100);
  const [quotes,setQuotes]=useState([]);
  const addQuote=()=>{setQuotes(q=>[...q,{product,size,paper,coating,qty,unitPrice,totalPrice,id:Date.now()}]);};
  return(<div style={{animation:'fadeIn .4s'}}>

        <Badge text={d.grade}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        {[['총 주문',`${d.orders}건`],['누적 금액',d.total],['가입일',d.joined],['등급',d.grade]].map(([k,v])=><div key={k} style={{background:'#F8FAFC',borderRadius:8,padding:12}}><div style={{fontSize:12,color:C.textSec}}>{k}</div><div style={{fontSize:15,fontWeight:600,marginTop:4}}>{v}</div></div>)}
      </div>
      <label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>관리자 메모</label>
      <textarea rows={3} placeholder="회원 관련 메모..." style={{width:'100%',padding:12,border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:'Pretendard',resize:'vertical'}}/>
      <button onClick={onClose} style={{width:'100%',marginTop:16,padding:'12px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>닫기</button>
    </div>);
    default:return null;
  }
}

// ── App ──
function App(){
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState('dashboard');
  const [modal,setModal]=useState(null);
  useEffect(()=>{setTimeout(()=>setLoading(false),1500);},[]);
  if(loading)return(<div style={{display:'flex',minHeight:'100vh'}}>
    <div style={{width:260,background:C.sidebarBg,flexShrink:0}}/>
    <div style={{flex:1,padding:32}}><Skeleton/></div>
  </div>);

  const menus=[
    {key:'dashboard',icon:'📊',label:'대시보드'},
    {key:'product-list',icon:'📦',label:'상품 목록'},
    {key:'quote-calculator',icon:'🧮',label:'견적 계산기'},
    {key:'cart-order',icon:'🛒',label:'장바구니'},
    {key:'admin-pricing',icon:'💲',label:'단가 관리'}
  ];

  const modalTitles={'order-detail':'주문 상세','product-detail':'상품 상세','quote-save':'견적서 저장','pricing-detail':'단가 상세','edit-pricing':'단가 편집','add-pricing':'단가 추가','excel-upload':'엑셀 업로드','member-detail':'회원 상세'};
  const renderPage=()=>{
    switch(page){
      case 'dashboard':return <DashboardPage setPage={setPage} setModal={setModal}/>;
      case 'product-list':return <ProductListPage setModal={setModal}/>;
      case 'quote-calculator':return <QuoteCalculatorPage setModal={setModal}/>;
      case 'cart-order':return <CartOrderPage setModal={setModal}/>;
      case 'admin-pricing':return <AdminPricingPage setModal={setModal}/>;
      default:return <DashboardPage setPage={setPage} setModal={setModal}/>;
    }
  };

  return(<div style={{display:'flex',minHeight:'100vh'}}>
    {/* Sidebar */}
    <aside style={{width:260,background:C.sidebarBg,flexShrink:0,display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,bottom:0,zIndex:100}}>
      <div style={{padding:'24px 20px',borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{fontSize:20,fontWeight:800,color:'#fff',letterSpacing:-0.5}}>🖨️ 프린트오더</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,0.5)',marginTop:4}}>인쇄물 자동견적 쇼핑몰</div>
      </div>
      <nav style={{flex:1,padding:'12px 10px'}}>
        {menus.map(m=><button key={m.key} onClick={()=>setPage(m.key)} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'12px 14px',borderRadius:10,border:'none',background:page===m.key?C.sidebarActive:'transparent',color:page===m.key?'#fff':'rgba(255,255,255,0.6)',fontSize:14,fontWeight:page===m.key?600:400,cursor:'pointer',marginBottom:2,transition:'all .15s',textAlign:'left'}} onMouseEnter={e=>{if(page!==m.key)e.currentTarget.style.background=C.sidebarHover}} onMouseLeave={e=>{if(page!==m.key)e.currentTarget.style.background='transparent'}}>
          <span style={{fontSize:18}}>{m.icon}</span>{m.label}
        </button>)}
      </nav>
      <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:'rgba(255,255,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff',fontWeight:600}}>관</div>
          <div><div style={{fontSize:13,color:'#fff',fontWeight:500}}>관리자</div><div style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>admin@printorder.kr</div></div>
        </div>
      </div>
    </aside>
    {/* Main */}
    <main style={{flex:1,marginLeft:260}}>
      <header style={{height:60,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',position:'sticky',top:0,zIndex:50}}>
        <div style={{fontSize:16,fontWeight:700,color:C.text}}>{menus.find(m=>m.key===page)?.label||'대시보드'}</div>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <div style={{position:'relative'}}>
            <input placeholder="검색..." style={{padding:'8px 14px 8px 36px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,width:220,outline:'none',fontFamily:'Pretendard'}}/>
            <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:14}}>🔍</span>
          </div>
          <button style={{background:'none',border:'none',fontSize:18,cursor:'pointer',position:'relative'}}>🔔<span style={{position:'absolute',top:-2,right:-4,width:8,height:8,background:C.danger,borderRadius:'50%'}}/></button>
        </div>
      </header>
      <div style={{padding:32}}>{renderPage()}</div>
    </main>
    <Modal open={!!modal} onClose={()=>setModal(null)} title={modal?modalTitles[modal.type]||'상세':''}>
      <ModalContent modal={modal} onClose={()=>setModal(null)}/>
    </Modal>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
