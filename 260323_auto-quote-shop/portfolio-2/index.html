<!DOCTYPE html>

<head>

<link rel="preconnect" href="https://cdn.jsdelivr.net">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#F0FDF4;color:#064E3B;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#E2E8F0;}::-webkit-scrollbar-thumb{background:#94A3B8;border-radius:3px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,#D1FAE5 25%,#ECFDF5 50%,#D1FAE5 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo}=React;
const {BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,CartesianGrid}=Recharts;

const C={primary:'#059669',secondary:'#064E3B',accent:'#34D399',bg:'#F0FDF4',surface:'#FFFFFF',text:'#064E3B',textSec:'#6B7280',border:'#E5E7EB',success:'#059669',warning:'#D97706',danger:'#DC2626'};

// ── Data ──
const spaces=[
  {id:'living',name:'거실',icon:'🛋️',img:'거실 인테리어',desc:'넓은 공간에 어울리는 바닥재와 벽지'},
  {id:'kitchen',name:'주방',icon:'🍳',img:'주방 인테리어',desc:'내수성 강한 타일과 벽면 소재'},
  {id:'bathroom',name:'욕실',icon:'🚿',img:'욕실 인테리어',desc:'방수·방습 특화 자재'},
  {id:'bedroom',name:'침실',icon:'🛏️',img:'침실 인테리어',desc:'따뜻한 느낌의 우드·패브릭'}

const materials=[
  {id:1,name:'프리미엄 포셀린 타일',space:'주방',type:'타일',price:45000,unit:'㎡',loss:8,img:'🪨',spec:'600×600mm',desc:'이탈리아 수입 대리석 패턴, 고광택 마감'},
  {id:2,name:'원목 헤링본 마루',space:'거실',type:'마루',price:82000,unit:'㎡',loss:12,img:'🪵',spec:'90×400mm',desc:'참나무 원목, 헤링본 패턴, UV코팅'},
  {id:3,name:'실크 벽지 (무지)',space:'침실',type:'벽지',price:18000,unit:'롤',loss:10,img:'🎨',spec:'1060×15.6m',desc:'실크 질감, 환경인증, 20색상'},
  {id:4,name:'방수 모자이크 타일',space:'욕실',type:'타일',price:35000,unit:'㎡',loss:10,img:'🪨',spec:'300×300mm',desc:'미끄럼 방지, 항균 코팅, 욕실 전용'},
  {id:5,name:'강마루 오크',space:'거실',type:'마루',price:38000,unit:'㎡',loss:8,img:'🪵',spec:'1380×193mm',desc:'오크 무늬 강마루, 내구성 우수, 셀프시공'},
  {id:6,name:'주방 서브웨이 타일',space:'주방',type:'타일',price:28000,unit:'㎡',loss:5,img:'🪨',spec:'200×100mm',desc:'클래식 서브웨이, 유광/무광 선택'},
  {id:7,name:'친환경 규조토 벽지',space:'침실',type:'벽지',price:32000,unit:'롤',loss:10,img:'🎨',spec:'530×15.6m',desc:'규조토 함유, 습도조절, 탈취 기능'},
  {id:8,name:'대리석 타일 (바닥용)',space:'욕실',type:'타일',price:55000,unit:'㎡',loss:8,img:'🪨',spec:'800×800mm',desc:'인조 대리석, 논슬립 가공, 고급감'}
];

const savedQuotes=[
  {id:1,name:'거실 리모델링 견적',date:'2025-01-10',total:2840000,items:3,status:'저장됨'},
  {id:2,name:'주방 타일 교체',date:'2025-01-08',total:1250000,items:2,status:'주문완료'},
  {id:3,name:'욕실 전체 시공',date:'2025-01-05',total:1680000,items:4,status:'저장됨'}

const orderStats=[
  {month:'8월',orders:45,revenue:2800},{month:'9월',orders:52,revenue:3400},{month:'10월',orders:68,revenue:4200},
  {month:'11월',orders:74,revenue:4800},{month:'12월',orders:82,revenue:5600},{month:'1월',orders:61,revenue:3900}
];
const typeSales=[{name:'타일',value:42},{name:'마루',value:28},{name:'벽지',value:20},{name:'기타',value:10}];
const pieColors=['#059669','#34D399','#A7F3D0','#D1FAE5'];

const adminMaterials=[
  {id:1,name:'포셀린 타일',spec:'600×600',basePrice:45000,loss:8,discount5:3,discount20:8,status:'판매중'},
  {id:2,name:'헤링본 마루',spec:'90×400',basePrice:82000,loss:12,discount5:2,discount20:6,status:'판매중'},
  {id:3,name:'실크 벽지',spec:'1060×15.6m',basePrice:18000,loss:10,discount5:5,discount20:12,status:'판매중'},
  {id:4,name:'모자이크 타일',spec:'300×300',basePrice:35000,loss:10,discount5:3,discount20:8,status:'일시중단'},
  {id:5,name:'강마루 오크',spec:'1380×193',basePrice:38000,loss:8,discount5:4,discount20:10,status:'판매중'},
  {id:6,name:'서브웨이 타일',spec:'200×100',basePrice:28000,loss:5,discount5:3,discount20:7,status:'판매중'}

// ── Components ──
function Skeleton(){return(<div style={{padding:32}}><div className="skeleton" style={{width:'100%',height:240,marginBottom:24}}/><div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>{[1,2,3,4].map(i=><div key={i} className="skeleton" style={{height:200}}/>)}</div></div>);}

function Drawer({open,onClose,title,children}){
  if(!open)return null;
  return(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.3)',zIndex:1000}}>
    <div onClick={e=>e.stopPropagation()} style={{position:'absolute',right:0,top:0,bottom:0,width:480,background:C.surface,boxShadow:'-8px 0 30px rgba(0,0,0,0.1)',animation:'fadeIn .2s',overflow:'auto'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:C.surface,zIndex:1}}>
        <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSec}}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>);
}

function Badge({text}){
  const colors={판매중:{bg:'#D1FAE5',t:'#065F46'},일시중단:{bg:'#FEE2E2',t:'#991B1B'},저장됨:{bg:'#DBEAFE',t:'#1D4ED8'},주문완료:{bg:'#D1FAE5',t:'#065F46'}};
  const c=colors[text]||{bg:'#F3F4F6',t:'#374151'};
  return <span style={{padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.t}}>{text}</span>;
}

function InputField({label,type='text',value,onChange,options,placeholder,suffix}){
  const st={width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,outline:'none',fontFamily:'Pretendard'};
  return(<div style={{marginBottom:16}}>
    <label style={{display:'block',fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>{label}</label>
    <div style={{position:'relative'}}>
      {options?<select value={value} onChange={e=>onChange(e.target.value)} style={{...st,background:C.surface}}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select>
      :<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={st}/>}
      {suffix&&<span style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',fontSize:13,color:C.textSec}}>{suffix}</span>}
    </div>
  </div>);
}

// ── Pages ──
function HomePage({setPage,setDrawer}){
  const [activeSpace,setActiveSpace]=useState(0);
  return(<div style={{animation:'fadeIn .4s'}}>
    {/* Hero */}
    <div style={{background:`linear-gradient(135deg, ${C.secondary} 0%, ${C.primary} 100%)`,borderRadius:20,padding:'48px 56px',marginBottom:32,position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:0,right:0,width:300,height:300,background:'rgba(52,211,153,0.1)',borderRadius:'50%',transform:'translate(30%,-30%)'}}/>
      <div style={{position:'relative',zIndex:1}}>
        <div style={{fontSize:14,color:C.accent,fontWeight:600,marginBottom:8}}>인테리어 자재 전문</div>
        <h1 style={{fontSize:36,fontWeight:800,color:'#fff',lineHeight:1.3,marginBottom:12}}>시공 면적만 입력하면<br/>자동으로 견적이 나옵니다</h1>
        <p style={{fontSize:16,color:'rgba(255,255,255,0.7)',marginBottom:28,lineHeight:1.6}}>타일·마루·벽지 등 자재별 손실율을 반영한 정확한 수량 계산과<br/>실시간 자동 견적 산출 시스템</p>
        <button onClick={()=>setPage('area-quote')} style={{padding:'14px 32px',borderRadius:12,border:'none',background:'#fff',color:C.primary,fontSize:15,fontWeight:700,cursor:'pointer',boxShadow:'0 4px 15px rgba(0,0,0,0.1)'}}>무료 견적 시작하기 →</button>
      </div>
    </div>
    {/* Space Categories */}
    <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>공간별 자재 탐색</h2>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:32}}>
      {spaces.map((s,i)=><div key={s.id} onClick={()=>setActiveSpace(i)} style={{background:C.surface,borderRadius:16,padding:24,textAlign:'center',cursor:'pointer',border:activeSpace===i?`2px solid ${C.primary}`:`2px solid transparent`,boxShadow:activeSpace===i?`0 4px 20px ${C.primary}20`:'0 2px 8px rgba(0,0,0,0.04)',transition:'all .2s'}} onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'} onMouseLeave={e=>e.currentTarget.style.transform='none'}>
        <div style={{fontSize:40,marginBottom:12}}>{s.icon}</div>
        <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>{s.name}</div>
        <div style={{fontSize:12,color:C.textSec,lineHeight:1.5}}>{s.desc}</div>
      </div>)}
    </div>
    {/* Materials Grid */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <h2 style={{fontSize:20,fontWeight:700}}>인기 자재</h2>
      <button onClick={()=>setPage('product-list')} style={{background:'none',border:'none',color:C.primary,fontSize:14,fontWeight:600,cursor:'pointer'}}>전체보기 →</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
      {materials.slice(0,4).map(m=><div key={m.id} onClick={()=>setDrawer({type:'material',data:m})} style={{background:C.surface,borderRadius:16,overflow:'hidden',boxShadow:'0 2px 10px rgba(0,0,0,0.04)',cursor:'pointer',transition:'all .2s'}} onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-4px)';e.currentTarget.style.boxShadow='0 8px 25px rgba(0,0,0,0.08)'}} onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='0 2px 10px rgba(0,0,0,0.04)'}}>
        <div style={{height:120,background:`${C.primary}08`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:42}}>{m.img}</div>
        <div style={{padding:16}}>
          <div style={{display:'flex',gap:6,marginBottom:6}}>
            <span style={{padding:'2px 8px',borderRadius:12,fontSize:11,background:`${C.primary}12`,color:C.primary,fontWeight:600}}>{m.space}</span>
            <span style={{padding:'2px 8px',borderRadius:12,fontSize:11,background:'#F3F4F6',color:C.textSec}}>{m.type}</span>
          </div>
          <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>{m.name}</div>
          <div style={{fontSize:12,color:C.textSec,marginBottom:8}}>{m.spec}</div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:17,fontWeight:800,color:C.primary}}>{m.price.toLocaleString()}원<span style={{fontSize:12,fontWeight:400,color:C.textSec}}>/{m.unit}</span></span>
            <span style={{fontSize:11,color:C.warning}}>손실율 {m.loss}%</span>
          </div>
        </div>
      </div>)}
    </div>
  </div>);
}

function MaterialListPage({setDrawer}){
  const [filter,setFilter]=useState('전체');
  const [typeFilter,setTypeFilter]=useState('전체');
  const types=['전체','타일','마루','벽지'];
  const filtered=materials.filter(m=>(filter==='전체'||m.space===filter)&&(typeFilter==='전체'||m.type===typeFilter));
  return(<div style={{animation:'fadeIn .4s'}}>
    <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>자재 목록</h2>
    <p style={{color:C.textSec,fontSize:14,marginBottom:20}}>공간·자재 유형별로 최적의 자재를 찾아보세요</p>
    <div style={{display:'flex',gap:24,marginBottom:20}}>
      <div style={{display:'flex',gap:8}}>
        {['전체',...spaces.map(s=>s.name)].map(s=><button key={s} onClick={()=>setFilter(s)} style={{padding:'8px 16px',borderRadius:20,border:filter===s?'none':`1px solid ${C.border}`,background:filter===s?C.primary:'transparent',color:filter===s?'#fff':C.text,fontSize:13,fontWeight:500,cursor:'pointer'}}>{s}</button>)}
      </div>
      <div style={{display:'flex',gap:8}}>
        {types.map(t=><button key={t} onClick={()=>setTypeFilter(t)} style={{padding:'8px 16px',borderRadius:20,border:typeFilter===t?'none':`1px solid ${C.border}`,background:typeFilter===t?C.secondary:'transparent',color:typeFilter===t?'#fff':C.text,fontSize:13,fontWeight:500,cursor:'pointer'}}>{t}</button>)}
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
      {filtered.map(m=><div key={m.id} onClick={()=>setDrawer({type:'material',data:m})} style={{background:C.surface,borderRadius:16,overflow:'hidden',boxShadow:'0 2px 10px rgba(0,0,0,0.04)',cursor:'pointer',transition:'all .2s'}} onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-4px)';e.currentTarget.style.boxShadow='0 8px 25px rgba(0,0,0,0.08)'}} onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='0 2px 10px rgba(0,0,0,0.04)'}}>
        <div style={{height:120,background:`${C.primary}08`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:42}}>{m.img}</div>
        <div style={{padding:16}}>
          <div style={{display:'flex',gap:6,marginBottom:6}}>
            <span style={{padding:'2px 8px',borderRadius:12,fontSize:11,background:`${C.primary}12`,color:C.primary,fontWeight:600}}>{m.space}</span>
            <span style={{padding:'2px 8px',borderRadius:12,fontSize:11,background:'#F3F4F6',color:C.textSec}}>{m.type}</span>
          </div>
          <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>{m.name}</div>
          <div style={{fontSize:12,color:C.textSec,marginBottom:8,lineHeight:1.4}}>{m.desc}</div>
          <span style={{fontSize:17,fontWeight:800,color:C.primary}}>{m.price.toLocaleString()}원<span style={{fontSize:12,fontWeight:400,color:C.textSec}}>/{m.unit}</span></span>
        </div>
      </div>)}
    </div>
  </div>);
}

function AreaQuotePage({setDrawer}){
  const [spaceEntries,setSpaceEntries]=useState([{space:'거실',area:25,material:materials[1].name}]);
  const addSpace=()=>setSpaceEntries(e=>[...e,{space:'주방',area:10,material:materials[0].name}]);
  const removeSpace=(i)=>setSpaceEntries(e=>e.filter((_,idx)=>idx!==i));
  const updateEntry=(i,field,val)=>setSpaceEntries(e=>e.map((entry,idx)=>idx===i?{...entry,[field]:val}:entry));
  const calcResults=spaceEntries.map(entry=>{
    const mat=materials.find(m=>m.name===entry.material)||materials[0];
    const areaNum=parseFloat(entry.area)||0;
    const lossMultiplier=1+(mat.loss/100);
    const requiredQty=Math.ceil(areaNum*lossMultiplier);
    const subtotal=requiredQty*mat.price;
    return {...entry,mat,areaNum,requiredQty,subtotal,lossQty:requiredQty-Math.ceil(areaNum)};
  });
  const grandTotal=calcResults.reduce((s,r)=>s+r.subtotal,0);
  return(<div style={{animation:'fadeIn .4s'}}>
    <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>면적 견적</h2>
    <p style={{color:C.textSec,fontSize:14,marginBottom:24}}>시공 면적을 입력하면 손실율을 반영한 정확한 수량과 견적이 산출됩니다</p>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
      <div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)',marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <h3 style={{fontSize:16,fontWeight:700}}>공간별 면적 입력</h3>
            <button onClick={addSpace} style={{padding:'8px 16px',borderRadius:8,border:`1px solid ${C.primary}`,background:'transparent',color:C.primary,fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 공간 추가</button>
          </div>
          {spaceEntries.map((entry,i)=><div key={i} style={{background:'#F9FAFB',borderRadius:12,padding:16,marginBottom:12,position:'relative'}}>
            {spaceEntries.length>1&&<button onClick={()=>removeSpace(i)} style={{position:'absolute',top:8,right:8,background:'none',border:'none',fontSize:16,cursor:'pointer',color:C.textSec}}>✕</button>}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              <InputField label="공간" options={spaces.map(s=>s.name)} value={entry.space} onChange={v=>updateEntry(i,'space',v)}/>
              <InputField label="면적" type="number" value={String(entry.area)} onChange={v=>updateEntry(i,'area',v)} suffix="㎡"/>
            </div>
            <InputField label="자재" options={materials.map(m=>`${m.name} (${m.price.toLocaleString()}원/${m.unit})`)} value={`${entry.material} (${(materials.find(m=>m.name===entry.material)||materials[0]).price.toLocaleString()}원/${(materials.find(m=>m.name===entry.material)||materials[0]).unit})`} onChange={v=>{const name=v.split(' (')[0];updateEntry(i,'material',name);}}/>
          </div>)}
        </div>
      </div>
      <div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:20}}>견적 결과</h3>
          {calcResults.map((r,i)=><div key={i} style={{background:`${C.primary}06`,borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <span style={{fontWeight:700}}>{r.space}</span>
              <span style={{fontSize:12,color:C.textSec}}>{r.mat.name}</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,fontSize:13}}>
              <div><span style={{color:C.textSec}}>면적</span><br/><span style={{fontWeight:600}}>{r.areaNum}㎡</span></div>
              <div><span style={{color:C.textSec}}>필요 수량</span><br/><span style={{fontWeight:600}}>{r.requiredQty}㎡</span><span style={{fontSize:11,color:C.warning}}> (+{r.lossQty} 손실)</span></div>
              <div style={{textAlign:'right'}}><span style={{color:C.textSec}}>소계</span><br/><span style={{fontWeight:700,color:C.primary}}>{r.subtotal.toLocaleString()}원</span></div>
            </div>
          </div>)}
          <div style={{borderTop:`2px solid ${C.text}`,paddingTop:16,marginTop:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:16,fontWeight:700}}>총 견적 금액</span>
            <span style={{fontSize:28,fontWeight:800,color:C.primary}}>{grandTotal.toLocaleString()}원</span>
          </div>
          <div style={{display:'flex',gap:8,marginTop:16}}>
            <button onClick={()=>setDrawer({type:'save-quote',data:{results:calcResults,total:grandTotal}})} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.primary}`,background:'transparent',color:C.primary,fontSize:14,fontWeight:600,cursor:'pointer'}}>견적 저장</button>
            <button onClick={()=>setDrawer({type:'save-quote',data:{results:calcResults,total:grandTotal}})} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>주문 문의</button>
          </div>
        </div>
      </div>
    </div>
  </div>);
}

    <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>견적 비교</h2>
    <p style={{color:C.textSec,fontSize:14,marginBottom:24}}>자재별 견적을 비교하고 My견적함에 저장하세요</p>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20,marginBottom:32}}>
      {compareItems.map(m=><div key={m.id} onClick={()=>setDrawer({type:'material',data:m})} style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)',cursor:'pointer',transition:'all .2s',border:`2px solid ${C.border}`}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.primary} onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{fontSize:48,marginBottom:8}}>{m.img}</div>

          <div style={{fontSize:12,color:C.textSec}}>{m.spec}</div>
        </div>
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:12}}>
          {[['단가',`${m.price.toLocaleString()}원/${m.unit}`],['손실율',`${m.loss}%`],['공간',m.space],['유형',m.type],['10㎡ 예상',`${Math.round(m.price*10*(1+m.loss/100)).toLocaleString()}원`]].map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid #F3F4F6`}}>
            <span style={{fontSize:13,color:C.textSec}}>{k}</span><span style={{fontSize:13,fontWeight:600}}>{v}</span>
          </div>)}
        </div>
        <div style={{textAlign:'center',marginTop:16,fontSize:24,fontWeight:800,color:C.primary}}>{m.price.toLocaleString()}원<span style={{fontSize:13,fontWeight:400,color:C.textSec}}>/{m.unit}</span></div>
      </div>)}
    </div>
    <h3 style={{fontSize:18,fontWeight:700,marginBottom:16}}>My 견적함</h3>
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {savedQuotes.map(q=><div key={q.id} onClick={()=>setDrawer({type:'quote-detail',data:q})} style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,0.04)',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.boxShadow='0 4px 15px rgba(0,0,0,0.08)'} onMouseLeave={e=>e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,0.04)'}>
        <div><div style={{fontSize:15,fontWeight:700}}>{q.name}</div><div style={{fontSize:12,color:C.textSec,marginTop:4}}>{q.date} · {q.items}개 자재</div></div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <Badge text={q.status}/>
          <span style={{fontSize:18,fontWeight:700,color:C.primary}}>{q.total.toLocaleString()}원</span>
        </div>
      </div>)}
    </div>
  </div>);
}

function AdminMaterialsPage({setDrawer}){
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <div><h2 style={{fontSize:22,fontWeight:700}}>자재 관리</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>자재별 단가·손실율·할인율을 관리합니다</p></div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>setDrawer({type:'image-upload'})} style={{padding:'10px 18px',borderRadius:10,border:`1px solid ${C.primary}`,background:'transparent',color:C.primary,fontSize:13,fontWeight:600,cursor:'pointer'}}>📷 이미지 관리</button>
        <button onClick={()=>setDrawer({type:'add-material'})} style={{padding:'10px 18px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 자재 추가</button>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20,marginBottom:24}}>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>월별 주문 현황</h3>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={orderStats}><CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/><XAxis dataKey="month" tick={{fontSize:12}}/><YAxis tick={{fontSize:12}}/><Tooltip/><Bar dataKey="orders" fill={C.primary} radius={[8,8,0,0]} name="주문수"/></BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>자재 유형별 매출</h3>
        <ResponsiveContainer width="100%" height={220}>
          <PieChart><Pie data={typeSales} cx="50%" cy="50%" innerRadius={40} outerRadius={75} dataKey="value" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`}>{typeSales.map((_,i)=><Cell key={i} fill={pieColors[i]}/>)}</Pie><Tooltip/></PieChart>
        </ResponsiveContainer>
      </div>
    </div>
    <div style={{background:C.surface,borderRadius:16,boxShadow:'0 2px 10px rgba(0,0,0,0.04)',overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{background:'#F9FAFB',borderBottom:`2px solid ${C.border}`}}>
          {['자재명','규격','기본단가','손실율','5+할인','20+할인','상태',''].map(h=><th key={h} style={{padding:'14px 16px',textAlign:'left',fontSize:13,fontWeight:600,color:C.textSec}}>{h}</th>)}
        </tr></thead>
        <tbody>{adminMaterials.map(m=><tr key={m.id} onClick={()=>setDrawer({type:'edit-material',data:m})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='#F9FAFB'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <td style={{padding:'14px 16px',fontSize:14,fontWeight:600}}>{m.name}</td>
          <td style={{padding:'14px 16px',fontSize:13}}>{m.spec}</td>
          <td style={{padding:'14px 16px',fontSize:13,fontWeight:600}}>{m.basePrice.toLocaleString()}원</td>
          <td style={{padding:'14px 16px',fontSize:13,color:C.warning}}>{m.loss}%</td>
          <td style={{padding:'14px 16px',fontSize:13,color:C.danger}}>{m.discount5}%</td>
          <td style={{padding:'14px 16px',fontSize:13,color:C.danger}}>{m.discount20}%</td>
          <td style={{padding:'14px 16px'}}><Badge text={m.status}/></td>
          <td style={{padding:'14px 16px'}}><button onClick={e=>{e.stopPropagation();setDrawer({type:'edit-material',data:m})}} style={{background:'none',border:'none',color:C.primary,fontSize:12,cursor:'pointer',fontWeight:600}}>편집</button></td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>);
}

// ── Drawer Contents ──
function DrawerContent({drawer,onClose}){
  if(!drawer)return null;
  const d=drawer.data;
  switch(drawer.type){
    case 'material':return(<div>
      <div style={{height:180,background:`${C.primary}08`,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:64,marginBottom:20}}>{d.img}</div>
      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <span style={{padding:'4px 10px',borderRadius:12,fontSize:12,background:`${C.primary}12`,color:C.primary,fontWeight:600}}>{d.space}</span>
        <span style={{padding:'4px 10px',borderRadius:12,fontSize:12,background:'#F3F4F6',color:C.textSec}}>{d.type}</span>
      </div>
      <h3 style={{fontSize:20,fontWeight:800,marginBottom:6}}>{d.name}</h3>
      <p style={{fontSize:14,color:C.textSec,lineHeight:1.6,marginBottom:16}}>{d.desc}</p>
      <div style={{background:'#F9FAFB',borderRadius:12,padding:16,marginBottom:16}}>
        {[['규격',d.spec],['단가',`${d.price.toLocaleString()}원/${d.unit}`],['손실율',`${d.loss}%`],['10㎡ 예상',`${Math.round(d.price*10*(1+d.loss/100)).toLocaleString()}원`]].map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}><span style={{color:C.textSec,fontSize:13}}>{k}</span><span style={{fontWeight:600,fontSize:13}}>{v}</span></div>)}
      </div>
      <label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>메모</label>
      <textarea rows={3} placeholder="자재 관련 메모..." style={{width:'100%',padding:12,border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:'Pretendard',resize:'vertical',marginBottom:16}}/>
      <button onClick={onClose} style={{width:'100%',padding:'14px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:15,fontWeight:600,cursor:'pointer'}}>면적 견적에 추가하기</button>
    </div>);
    case 'save-quote':return(<div>
      <h4 style={{fontSize:16,fontWeight:700,marginBottom:16}}>견적 저장</h4>
      <InputField label="견적 이름" placeholder="예: 거실 리모델링 견적" value="" onChange={()=>{}}/>
      <div style={{background:'#F9FAFB',borderRadius:12,padding:16,marginBottom:16}}>
        {d.results.map((r,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
          <span style={{fontSize:13}}>{r.space} · {r.mat.name}</span><span style={{fontWeight:600,fontSize:13}}>{r.subtotal.toLocaleString()}원</span>
        </div>)}
        <div style={{display:'flex',justifyContent:'space-between',paddingTop:12,marginTop:4}}><span style={{fontWeight:700}}>합계</span><span style={{fontSize:20,fontWeight:800,color:C.primary}}>{d.total.toLocaleString()}원</span></div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,fontSize:14,cursor:'pointer'}}>취소</button>
        <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>저장</button>
      </div>
    </div>);
    case 'quote-detail':return(<div>
      <div style={{marginBottom:16}}>
        <h4 style={{fontSize:18,fontWeight:700}}>{d.name}</h4>
        <div style={{fontSize:13,color:C.textSec,marginTop:4}}>{d.date} · <Badge text={d.status}/></div>
      </div>
      <div style={{background:'#F9FAFB',borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',padding:'8px 0'}}><span style={{color:C.textSec}}>자재 수</span><span style={{fontWeight:600}}>{d.items}종</span></div>
        <div style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderTop:`1px solid ${C.border}`}}><span style={{fontWeight:700}}>총 견적</span><span style={{fontSize:22,fontWeight:800,color:C.primary}}>{d.total.toLocaleString()}원</span></div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,fontSize:14,cursor:'pointer'}}>닫기</button>
        <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>재주문</button>
      </div>
    </div>);
    case 'edit-material':case 'add-material':return(<div>
      <InputField label="자재명" value={d?.name||''} onChange={()=>{}} placeholder="자재명 입력"/>
      <InputField label="규격" value={d?.spec||''} onChange={()=>{}} placeholder="예: 600×600mm"/>
      <InputField label="기본 단가 (원)" type="number" value={d?String(d.basePrice):''} onChange={()=>{}} placeholder="0"/>
      <InputField label="손실율 (%)" type="number" value={d?String(d.loss):''} onChange={()=>{}} placeholder="0"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <InputField label="5+ 할인 (%)" type="number" value={d?String(d.discount5):''} onChange={()=>{}}/>
        <InputField label="20+ 할인 (%)" type="number" value={d?String(d.discount20):''} onChange={()=>{}}/>
      </div>
      <InputField label="상태" options={['판매중','일시중단']} value={d?.status||'판매중'} onChange={()=>{}}/>
      <div style={{display:'flex',gap:8,marginTop:8}}>
        <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,fontSize:14,cursor:'pointer'}}>취소</button>
        <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>저장</button>
      </div>
    </div>);
    case 'image-upload':return(<div>
      <div style={{border:`2px dashed ${C.border}`,borderRadius:12,padding:40,textAlign:'center',marginBottom:16}}>
        <div style={{fontSize:40,marginBottom:12}}>📷</div>
        <div style={{fontSize:15,fontWeight:600}}>자재 이미지를 드래그하거나 클릭</div>
        <div style={{fontSize:13,color:C.textSec,marginTop:4}}>JPG, PNG (최대 5MB)</div>
      </div>
      <button onClick={onClose} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>업로드</button>
    </div>);
    default:return null;
  }
}

// ── App ──
function App(){
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState('home');
  const [drawer,setDrawer]=useState(null);
  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading)return <Skeleton/>;

  const tabs=[
    {key:'home',label:'홈'},{key:'product-list',label:'자재 목록'},{key:'area-quote',label:'면적 견적'},
    {key:'quote-comparison',label:'견적 비교'},{key:'admin-materials',label:'자재 관리'}
  ];
  const drawerTitles={material:'자재 상세','save-quote':'견적 저장','quote-detail':'견적 상세','edit-material':'자재 편집','add-material':'자재 추가','image-upload':'이미지 관리'};

  const renderPage=()=>{
    switch(page){
      case 'home':return <HomePage setPage={setPage} setDrawer={setDrawer}/>;
      case 'product-list':return <MaterialListPage setDrawer={setDrawer}/>;
      case 'area-quote':return <AreaQuotePage setDrawer={setDrawer}/>;
      case 'quote-comparison':return <QuoteComparisonPage setDrawer={setDrawer}/>;
      case 'admin-materials':return <AdminMaterialsPage setDrawer={setDrawer}/>;
      default:return <HomePage setPage={setPage} setDrawer={setDrawer}/>;
    }
  };

  return(<div style={{minHeight:'100vh',background:C.bg}}>
    {/* Top Navigation */}
    <header style={{background:C.surface,borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:100}}>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'0 32px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',height:64}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:24}}>🏠</span>
            <span style={{fontSize:20,fontWeight:800,color:C.secondary}}>자재 견적 데모</span>
          </div>
          <div style={{display:'flex',gap:8}}>
            <input placeholder="자재 검색..." style={{padding:'8px 14px 8px 36px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:13,width:240,outline:'none',fontFamily:'Pretendard'}}/>
            <button style={{background:'none',border:'none',fontSize:18,cursor:'pointer'}}>🔔</button>
            <div style={{width:36,height:36,borderRadius:'50%',background:`${C.primary}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:600,color:C.primary}}>관</div>
          </div>
        </div>
        {/* Tabs */}
        <div style={{display:'flex',gap:0}}>
          {tabs.map(t=><button key={t.key} onClick={()=>setPage(t.key)} style={{padding:'12px 20px',border:'none',borderBottom:page===t.key?`3px solid ${C.primary}`:'3px solid transparent',background:'transparent',color:page===t.key?C.primary:C.textSec,fontSize:14,fontWeight:page===t.key?700:500,cursor:'pointer',transition:'all .15s'}}>{t.label}</button>)}
        </div>
      </div>
    </header>
    <main style={{maxWidth:1280,margin:'0 auto',padding:'32px 32px'}}>
      {renderPage()}
    </main>
    <Drawer open={!!drawer} onClose={()=>setDrawer(null)} title={drawer?drawerTitles[drawer.type]||'상세':''}>
      <DrawerContent drawer={drawer} onClose={()=>setDrawer(null)}/>
    </Drawer>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
