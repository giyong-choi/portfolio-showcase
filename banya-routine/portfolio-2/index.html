<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웰핏 워크 — B2B HR 번아웃 진단·AI 코칭 SaaS</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.3.1/umd/react-is.development.js"></script>
<script src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#F0F6FF;color:#0F172A;word-break:keep-all;overflow-wrap:break-word}
:root{
  --primary:#2563EB;--primary-dark:#1D4ED8;--primary-light:#DBEAFE;
  --secondary:#60A5FA;--accent:#0EA5E9;
  --bg:#F0F6FF;--surface:#FFFFFF;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --border:#CBD5E1;--border2:#E2E8F0;
  --green:#059669;--green-bg:#D1FAE5;
  --red:#DC2626;--red-bg:#FEE2E2;
  --yellow:#D97706;--yellow-bg:#FEF3C7;
  --orange:#EA580C;--orange-bg:#FED7AA;
}
.app{min-height:100vh;display:flex;flex-direction:column}

/* Topnav */
.topnav{background:#fff;border-bottom:1px solid var(--border2);height:60px;display:flex;align-items:center;padding:0 32px;gap:0;flex-shrink:0;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px;margin-right:40px;flex-shrink:0}
.nav-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}
.nav-logo-text{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.3px}
.nav-logo-sub{font-size:10px;color:var(--text3);font-weight:500}
.nav-tabs{display:flex;gap:2px;flex:1}
.nav-tab{padding:8px 18px;border-radius:8px;border:none;background:none;font-size:13.5px;font-weight:500;color:var(--text2);cursor:pointer;font-family:inherit;transition:all 0.12s;white-space:nowrap}
.nav-tab:hover{background:var(--primary-light);color:var(--primary-dark)}
.nav-tab.active{background:var(--primary);color:#fff;font-weight:700}
.nav-right{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.nav-user{display:flex;align-items:center;gap:8px}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
.nav-user-name{font-size:13px;font-weight:600;color:var(--text)}
.nav-user-role{font-size:10px;color:var(--text3)}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text2)}

/* Hero */
.hero{background:linear-gradient(135deg,var(--primary),#1D4ED8,var(--accent));padding:36px 32px;color:#fff;flex-shrink:0}
.hero-breadcrumb{font-size:12px;opacity:0.7;margin-bottom:10px}
.hero-title{font-size:26px;font-weight:800;margin-bottom:6px;letter-spacing:-0.5px}
.hero-sub{font-size:14px;opacity:0.85;margin-bottom:20px;line-height:1.5}
.hero-tags{display:flex;gap:8px;flex-wrap:wrap}
.hero-tag{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3)}

/* Content */
.page-content{flex:1;padding:28px 32px;overflow-y:auto}

/* Skeleton */
.skel{background:linear-gradient(90deg,#E2E8F0 25%,#CBD5E1 50%,#E2E8F0 75%);background-size:400% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stats-row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--border2);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent))}
.stat-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:28px;opacity:0.12}
.stat-label{font-size:11.5px;color:var(--text2);font-weight:500;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:800;color:var(--text);margin-bottom:3px;letter-spacing:-1px}
.stat-sub{font-size:11px;color:var(--text3)}
.risk-badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:700;margin-top:4px}

/* Buttons */
.btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all 0.15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:#fff;color:var(--text2);border:1px solid var(--border2)}
.btn-outline:hover{background:var(--bg)}
.btn-sm{padding:6px 12px;font-size:12px}

/* Section */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:14.5px;font-weight:700;color:var(--text)}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:10.5px;font-weight:600;white-space:nowrap}
.badge-green{background:var(--green-bg);color:#065F46}
.badge-blue{background:var(--primary-light);color:var(--primary-dark)}
.badge-red{background:var(--red-bg);color:#991B1B}
.badge-yellow{background:var(--yellow-bg);color:#92400E}
.badge-orange{background:var(--orange-bg);color:var(--orange)}
.badge-gray{background:#F1F5F9;color:#64748B}

/* Diagnosis Card */
.diag-layout{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start;margin-bottom:24px}
.diag-main{background:#fff;border-radius:14px;border:1px solid var(--border2);padding:24px}
.diag-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px}
.diag-sub{font-size:12.5px;color:var(--text3);margin-bottom:20px}
.diag-radar-wrap{display:flex;gap:24px;align-items:center}
.diag-legend{display:flex;flex-direction:column;gap:10px;min-width:160px}
.diag-legend-item{display:flex;align-items:center;justify-content:space-between;gap:10px}
.diag-legend-label{font-size:12.5px;color:var(--text2)}
.diag-legend-score{font-size:13px;font-weight:700;color:var(--text)}
.diag-bar{height:6px;border-radius:3px;margin-top:4px}
.risk-panel{background:#fff;border-radius:14px;border:1px solid var(--border2);overflow:hidden}
.risk-panel-header{padding:16px 18px;border-bottom:1px solid var(--border2);background:linear-gradient(135deg,#FEF2F2,#FEE2E2)}
.risk-panel-title{font-size:13px;font-weight:700;color:#991B1B}
.risk-panel-sub{font-size:11px;color:#B91C1C;margin-top:2px}
.risk-user{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background 0.12s}
.risk-user:hover{background:var(--bg)}
.risk-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.risk-name{font-size:13px;font-weight:600;color:var(--text)}
.risk-dept{font-size:11px;color:var(--text3)}
.risk-score-bar{flex:1;height:6px;background:#E2E8F0;border-radius:3px;overflow:hidden;margin:0 8px}
.risk-score-fill{height:100%;border-radius:3px}

/* Chat (AI Coaching for P2) */
.chat-layout{display:grid;grid-template-columns:1fr 300px;gap:20px;height:560px}
.chat-main{background:#fff;border-radius:14px;border:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:16px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:12px}
.chat-messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.msg-bubble{max-width:78%;padding:11px 15px;border-radius:12px;font-size:13.5px;line-height:1.6}
.msg-ai .msg-bubble{background:#F8FAFC;border:1px solid var(--border2);border-top-left-radius:4px;color:var(--text)}
.msg-user .msg-bubble{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-top-right-radius:4px}
.rag-card{margin-top:8px;background:var(--primary-light);border-radius:8px;padding:9px 12px;border-left:3px solid var(--primary)}
.rag-label{font-size:10px;font-weight:700;color:var(--primary-dark);margin-bottom:3px}
.rag-text{font-size:11.5px;color:var(--primary-dark);line-height:1.5}
.chat-input-row{display:flex;gap:8px;padding:14px 16px;border-top:1px solid var(--border2)}
.chat-input{flex:1;padding:9px 14px;border-radius:9px;border:1.5px solid var(--border2);font-size:13.5px;font-family:inherit;color:var(--text);outline:none}
.chat-input:focus{border-color:var(--primary)}
.send-btn{width:36px;height:36px;border-radius:9px;background:var(--primary);border:none;color:#fff;font-size:15px;cursor:pointer}
.session-panel{background:#fff;border-radius:14px;border:1px solid var(--border2);overflow:hidden}
.session-header{padding:14px 16px;border-bottom:1px solid var(--border2)}
.session-title{font-size:13px;font-weight:700;color:var(--text)}
.session-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background 0.12s}
.session-item:hover{background:var(--bg)}
.session-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.session-text{font-size:12.5px;color:var(--text);flex:1;line-height:1.4}
.session-date{font-size:10.5px;color:var(--text3);white-space:nowrap}

/* Team Wellness */
.team-layout{display:grid;grid-template-columns:1fr 320px;gap:20px}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-tag{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border2);background:#fff;color:var(--text2);font-family:inherit;transition:all 0.12s}
.filter-tag.active{background:var(--primary);border-color:var(--primary);color:#fff}
.table-wrap{background:#fff;border-radius:12px;border:1px solid var(--border2);overflow:hidden;margin-bottom:16px}
.table-header{padding:14px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.table-title{font-size:13.5px;font-weight:700;color:var(--text)}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;padding:10px 18px;background:#F8FAFC;text-align:left;white-space:nowrap}
td{font-size:13px;color:var(--text);padding:12px 18px;border-bottom:1px solid var(--border2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F8FAFC}
.score-bar{display:flex;align-items:center;gap:8px}
.score-track{width:80px;height:6px;background:#E2E8F0;border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px}
.dept-chart-panel{background:#fff;border-radius:14px;border:1px solid var(--border2);padding:18px;margin-bottom:14px}
.chart-card{background:#fff;border-radius:14px;border:1px solid var(--border2);padding:18px}
.chart-title{font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:4px}
.chart-sub{font-size:11.5px;color:var(--text3);margin-bottom:14px}

/* Subscription P2 */
.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
.plan-card{background:#fff;border-radius:14px;border:2px solid var(--border2);padding:22px;position:relative}
.plan-card.current{border-color:var(--primary)}
.plan-card.current::before{content:'이용중';position:absolute;top:14px;right:14px;background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px}
.plan-name{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px}
.plan-price{font-size:28px;font-weight:800;color:var(--text);margin-bottom:3px;letter-spacing:-1px}
.plan-price span{font-size:13px;font-weight:500;color:var(--text3)}
.plan-per{font-size:11.5px;color:var(--text3);margin-bottom:14px}
.plan-features{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
.plan-feature{display:flex;align-items:flex-start;gap:7px;font-size:12.5px;color:var(--text);line-height:1.4}
.plan-btn{width:100%;padding:10px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.invoice-row{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.invoice-card{background:#fff;border-radius:12px;border:1px solid var(--border2);padding:18px}
.invoice-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px}
.invoice-info{display:flex;flex-direction:column;gap:8px}
.invoice-item{display:flex;justify-content:space-between;font-size:12.5px;padding:7px 0;border-bottom:1px solid var(--border2)}
.invoice-item:last-child{border-bottom:none}
.invoice-key{color:var(--text2)}
.invoice-val{font-weight:600;color:var(--text)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:420px;width:90%;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);animation:fadeInScale 0.2s ease}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.modal-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.form-group{margin-bottom:12px}
.form-group label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border2);font-size:13px;font-family:inherit;color:var(--text);outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--primary)}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btn-cancel{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border2);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text2)}
.modal-btn-confirm{flex:1;padding:10px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:5px;padding:14px 0}
.page-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border2);background:#fff;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;color:var(--text2);transition:all 0.12s}
.page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:700}
.page-btn:hover:not(.active){background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const {RadarChart,Radar,PolarGrid,PolarAngleAxis,BarChart,Bar,LineChart,Line,AreaChart,Area,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Cell} = Recharts;

// ─── 더미 데이터 ───
const RADAR_DATA = [
  {subject:'소진',A:68},{subject:'냉소',A:74},{subject:'효능감',A:42},
  {subject:'몰입',A:55},{subject:'관계',A:61},{subject:'자기효능',A:48},

  {name:'임채원',dept:'마케팅팀',score:38,trend:'↓',diagnosis:'2025.02.16',risk:'양호'},
  {name:'한지훈',dept:'기획팀',score:29,trend:'↓',diagnosis:'2025.02.20',risk:'양호'},

const TREND_DATA = [
  {month:'11월',개발팀:72,디자인팀:60,마케팅팀:58},{month:'12월',개발팀:69,디자인팀:57,마케팅팀:55},
  {month:'1월',개발팀:74,디자인팀:58,마케팅팀:53},{month:'2월',개발팀:68,디자인팀:55,마케팅팀:51},

        </div>

      </div>

      <div className="page-content">

          </>

      </div>

      {modalOpen && (
        <div className="modal-overlay" onClick={()=>setModalOpen(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>

              <button className="modal-btn-cancel" onClick={()=>setModalOpen(false)}>취소</button>
              <button className="modal-btn-confirm" onClick={()=>setModalOpen(false)}>상담 신청</button>

      <div className="plan-grid">
        {[
          {name:'Free',price:'₩0',per:'팀원당/월',desc:'소규모 팀 번아웃 진단',features:['번아웃 진단 1회/월','기본 레이더 차트','AI 코칭 3회/월'],btn:'현재 요금제',current:false,btnStyle:{border:'1.5px solid var(--border2)',background:'#fff',color:'var(--text2)'}},
          {name:'Pro',price:'₩4,900',per:'팀원당/월',desc:'성장하는 팀을 위한 풀 기능',features:['번아웃 진단 무제한','AI 코칭 무제한 (RAG)','팀 웰니스 모니터링','월간 리포트','인보이스 자동 발행'],btn:'이용 중',current:true,btnStyle:{background:'var(--primary)',color:'#fff',border:'none'}},
          {name:'Enterprise',price:'협의',per:'30명+ 팀 커스텀',desc:'대규모 조직을 위한 맞춤 플랜',features:['모든 Pro 기능 포함','전담 HR 컨설턴트','커스텀 진단 문항','SSO 연동','전용 인프라 옵션'],btn:'문의하기',current:false,btnStyle:{background:'#0F172A',color:'#fff',border:'none'}},
        ].map((p,i)=>(
          <div key={i} className={`plan-card${p.current?' current':''}`}>
            <div className="plan-name">{p.name}</div>
            <div className="plan-price">{p.price} <span>/{p.per}</span></div>
            <div className="plan-per" style={{marginTop:-2,marginBottom:14,fontSize:11.5,color:'var(--text3)'}}>{p.desc}</div>
            <div className="plan-features">
              {p.features.map((f,j)=>(
                <div key={j} className="plan-feature">
                  <span style={{color:p.current?'var(--primary)':'var(--green)',fontWeight:700}}>✓</span>{f}
                </div>
              ))}
            </div>
            <button className="plan-btn" style={p.btnStyle} onClick={p.name==='Enterprise'?()=>setModalOpen(true):undefined}>{p.btn}</button>
          </div>
        ))}
      </div>

      <div className="invoice-row">
        <div className="invoice-card">
          <div className="invoice-title">📋 현재 구독 정보</div>
          <div className="invoice-info">
            {[
              {k:'구독 플랜',v:'웰핏 Pro'},
              {k:'팀 규모',v:'12명'},
              {k:'월 결제액',v:'₩58,800'},
              {k:'다음 결제일',v:'2025.04.01'},
              {k:'자동 갱신',v:'활성화'},
            ].map((r,i)=>(
              <div key={i} className="invoice-item">
                <span className="invoice-key">{r.k}</span>
                <span className="invoice-val" style={r.k==='자동 갱신'?{color:'var(--green)'}:{}}>{r.v}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="invoice-card">
          <div className="invoice-title">🧾 최근 인보이스</div>
          <div className="invoice-info">
            {[
              {k:'INV-2025-03',v:'₩58,800'},
              {k:'INV-2025-02',v:'₩49,000'},
              {k:'INV-2025-01',v:'₩49,000'},
              {k:'INV-2024-12',v:'₩49,000'},
            ].map((r,i)=>(
              <div key={i} className="invoice-item">
                <span className="invoice-key" style={{fontSize:12,fontFamily:'monospace'}}>{r.k}</span>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span className="invoice-val">{r.v}</span>
                  <span className="badge badge-green">발행</span>
                </div>
              </div>
            ))}
          </div>
          <button className="btn btn-outline btn-sm" style={{marginTop:12,width:'100%'}}>전체 인보이스 다운로드</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
