<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마인드케어 — 심리 웰니스 SaaS 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.3.1/umd/react-is.development.js"></script>
<script src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#FFF8F4;color:#2D1B0E;word-break:keep-all;overflow-wrap:break-word}
:root{
  --primary:#E8724A;--primary-dark:#C4562E;--primary-light:#FDDFD4;
  --secondary:#F5A97F;--accent:#FFD4BB;
  --bg:#FFF8F4;--surface:#FFFFFF;
  --text:#2D1B0E;--text2:#7A5C4A;--text3:#B09080;
  --border:#EDD9CE;--border2:#F5EDE8;
  --sidebar-w:260px;
  --green:#059669;--green-bg:#D1FAE5;
  --blue:#2563EB;--blue-bg:#DBEAFE;
  --red:#DC2626;--red-bg:#FEE2E2;
  --yellow:#D97706;--yellow-bg:#FEF3C7;
}
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:22px 20px 14px;border-bottom:1px solid var(--border2)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;flex-shrink:0}
.logo-text{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.3px}
.logo-sub{font-size:10px;color:var(--text3);margin-top:1px;font-weight:500}
.sidebar-nav{padding:14px 10px;flex:1}
.nav-section-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding:0 10px;margin-bottom:6px;margin-top:16px}
.nav-section-title:first-child{margin-top:0}
.nav-btn{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:9px 12px;border-radius:8px;font-size:13.5px;font-weight:500;color:var(--text2);transition:all 0.15s;display:flex;align-items:center;gap:10px;font-family:inherit}
.nav-btn:hover{background:var(--primary-light);color:var(--primary-dark)}
.nav-btn.active{background:linear-gradient(135deg,var(--primary-light),#FFD0BB);color:var(--primary-dark);font-weight:700}
.nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sidebar-footer{padding:14px;border-top:1px solid var(--border2)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border-radius:10px;border:1px solid var(--border2)}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:var(--text)}
.user-plan{font-size:10px;font-weight:600;color:var(--primary);background:var(--primary-light);padding:2px 7px;border-radius:10px;margin-top:2px;display:inline-block}

/* Main area */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:16px;font-weight:700;color:var(--text)}
.topbar-tag{font-size:11px;font-weight:600;color:var(--primary);background:var(--primary-light);padding:2px 9px;border-radius:10px}
.topbar-right{display:flex;align-items:center;gap:10px}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text2)}
.content{flex:1;overflow-y:auto;padding:24px}

/* Skeleton */
.skel{background:linear-gradient(90deg,#F5EDE8 25%,#EDD9CE 50%,#F5EDE8 75%);background-size:400% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--border);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--secondary))}
.stat-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:28px;opacity:0.15}
.stat-label{font-size:11.5px;color:var(--text2);font-weight:500;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:800;color:var(--text);margin-bottom:3px;letter-spacing:-1px}
.stat-sub{font-size:11px;color:var(--text3)}

/* Buttons */
.btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all 0.15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:#fff;color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg)}
.btn-sm{padding:6px 12px;font-size:12px}

/* Section header */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:14.5px;font-weight:700;color:var(--text)}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:10.5px;font-weight:600;white-space:nowrap}
.badge-green{background:var(--green-bg);color:#065F46}
.badge-blue{background:var(--blue-bg);color:#1E40AF}
.badge-red{background:var(--red-bg);color:#991B1B}
.badge-yellow{background:var(--yellow-bg);color:#92400E}
.badge-orange{background:var(--primary-light);color:var(--primary-dark)}
.badge-gray{background:#F3F4F6;color:#6B7280}

/* Chat View */
.chat-layout{display:grid;grid-template-columns:1fr 320px;gap:20px;height:calc(100vh - 120px);max-height:680px}
.chat-main{background:#fff;border-radius:14px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:16px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:12px}
.chat-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.chat-ai-name{font-size:14px;font-weight:700;color:var(--text)}
.chat-ai-sub{font-size:11px;color:var(--text3)}
.online-dot{width:8px;height:8px;border-radius:50%;background:#10B981;flex-shrink:0}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-ai-avatar{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff}
.msg-user-avatar{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;font-size:12px;font-weight:700}
.msg-bubble{max-width:75%;padding:12px 16px;border-radius:14px;font-size:13.5px;line-height:1.6;color:var(--text)}
.msg-ai .msg-bubble{background:#F9F4F1;border:1px solid var(--border2);border-top-left-radius:4px}
.msg-user .msg-bubble{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-top-right-radius:4px}
.msg-time{font-size:10px;color:var(--text3);margin-top:4px;text-align:right}
.rag-ref{margin-top:10px;background:var(--bg);border-radius:8px;padding:10px;border-left:3px solid var(--primary)}
.rag-ref-label{font-size:10px;font-weight:700;color:var(--primary);margin-bottom:4px}
.rag-ref-text{font-size:12px;color:var(--text2);line-height:1.5}
.chat-input-area{padding:14px 16px;border-top:1px solid var(--border2)}
.chat-input-row{display:flex;gap:8px;align-items:center}
.chat-input{flex:1;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:13.5px;font-family:inherit;color:var(--text);background:#FAFAFA;outline:none}
.chat-input:focus{border-color:var(--primary);background:#fff}
.send-btn{width:38px;height:38px;border-radius:10px;background:var(--primary);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-hint{font-size:11px;color:var(--text3);margin-top:8px;text-align:center}

/* Coaching reference panel */
.ref-panel{background:#fff;border-radius:14px;border:1px solid var(--border);display:flex;flex-direction:column;gap:0;overflow:hidden}
.ref-panel-header{padding:16px 18px;border-bottom:1px solid var(--border2)}
.ref-panel-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.ref-panel-sub{font-size:11px;color:var(--text3)}
.ref-card{padding:14px 18px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background 0.12s}
.ref-card:hover{background:var(--bg)}
.ref-card:last-child{border-bottom:none}
.ref-tag{display:inline-flex;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;margin-bottom:6px}
.ref-title{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.4}
.ref-snippet{font-size:11.5px;color:var(--text2);line-height:1.5}
.ref-match{font-size:10px;color:var(--primary);font-weight:600;margin-top:4px}

/* Calendar View */
.calendar-layout{display:grid;grid-template-columns:1fr 300px;gap:20px}
.cal-card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:20px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-month{font-size:16px;font-weight:800;color:var(--text)}
.cal-nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-size:11px;font-weight:600;color:var(--text3);text-align:center;padding:6px 0}
.cal-dow:first-child{color:#DC2626}
.cal-day{border-radius:8px;padding:6px 4px;min-height:68px;border:1px solid transparent;cursor:pointer;transition:all 0.12s;position:relative}
.cal-day:hover{border-color:var(--border);background:var(--bg)}
.cal-day.today{border-color:var(--primary);background:var(--primary-light)}
.cal-day.other-month{opacity:0.35}
.cal-day-num{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px;text-align:right}
.cal-day.today .cal-day-num{color:var(--primary-dark)}
.energy-bar{height:4px;border-radius:2px;margin-bottom:4px}
.cal-missions{display:flex;flex-direction:column;gap:2px}
.cal-mission-dot{font-size:10px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Routine sidebar */
.streak-card{background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:12px;padding:18px;color:#fff;margin-bottom:14px}
.streak-title{font-size:12px;font-weight:600;opacity:0.85;margin-bottom:6px}
.streak-num{font-size:36px;font-weight:800;line-height:1}
.streak-unit{font-size:13px;font-weight:500;opacity:0.8;margin-top:4px}
.streak-dots{display:flex;gap:4px;margin-top:12px}
.streak-dot{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:12px}
.streak-dot.done{background:rgba(255,255,255,0.9)}
.today-missions{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden}
.mission-header{padding:12px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.mission-title{font-size:13px;font-weight:700;color:var(--text)}
.mission-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border2);cursor:pointer}
.mission-item:last-child{border-bottom:none}
.mission-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.mission-check.done{background:var(--green);border-color:var(--green);color:#fff;font-size:12px}
.mission-text{font-size:13px;color:var(--text);flex:1}
.mission-text.done{text-decoration:line-through;color:var(--text3)}
.mission-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px}

/* Report View */
.report-layout{display:flex;flex-direction:column;gap:20px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.chart-card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:20px}
.chart-card-wide{background:#fff;border-radius:14px;border:1px solid var(--border);padding:20px}
.chart-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.chart-sub{font-size:11.5px;color:var(--text3);margin-bottom:16px}
.emotion-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.emotion-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:10px;font-size:11.5px;font-weight:600}
.month-selector{display:flex;gap:6px;margin-bottom:0}
.month-btn{padding:4px 12px;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text2);font-family:inherit;transition:all 0.12s}
.month-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.summary-card{background:var(--bg);border-radius:10px;padding:14px;text-align:center}
.summary-label{font-size:11.5px;color:var(--text2);margin-bottom:6px}
.summary-value{font-size:22px;font-weight:800;color:var(--text)}
.summary-value.primary{color:var(--primary)}

/* Subscription View */
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px}
.plan-card{background:#fff;border-radius:14px;border:2px solid var(--border);padding:24px;transition:border-color 0.15s;position:relative;overflow:hidden}
.plan-card.current{border-color:var(--primary)}
.plan-card.current::before{content:'현재 플랜';position:absolute;top:16px;right:16px;background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px}
.plan-name{font-size:11.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.plan-price{font-size:32px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-1px}
.plan-price span{font-size:14px;font-weight:500;color:var(--text3)}
.plan-desc{font-size:12.5px;color:var(--text2);margin-bottom:18px;line-height:1.5}
.plan-features{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.plan-feature{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text)}
.plan-feature-icon{font-size:14px;flex-shrink:0}
.plan-btn{width:100%;padding:11px;border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:all 0.15s}
.sub-info-card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:20px;margin-bottom:18px}
.sub-info-title{font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:14px}
.sub-info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border2)}
.sub-info-row:last-child{border-bottom:none}
.sub-key{font-size:12.5px;color:var(--text2)}
.sub-val{font-size:12.5px;font-weight:600;color:var(--text)}
.payment-methods{display:flex;flex-direction:column;gap:10px}
.payment-method{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#F9F9F9;border-radius:10px;border:1px solid var(--border2)}
.card-icon{width:42px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;flex-shrink:0}
.card-info{flex:1}
.card-name{font-size:13px;font-weight:600;color:var(--text)}
.card-number{font-size:11.5px;color:var(--text3)}

/* Table */
.table-wrap{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden}
.table-header{padding:14px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.table-title{font-size:13.5px;font-weight:700;color:var(--text)}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;padding:10px 18px;background:#F9F4F1;text-align:left;white-space:nowrap}
td{font-size:13px;color:var(--text);padding:12px 18px;border-bottom:1px solid var(--border2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:420px;width:90%;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);animation:fadeInScale 0.2s ease}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.modal-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.form-group{margin-bottom:12px}
.form-group label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-family:inherit;color:var(--text);outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btn-cancel{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text2)}
.modal-btn-confirm{flex:1;padding:10px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:5px;padding:14px 0}
.page-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;color:var(--text2);transition:all 0.12s}
.page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:700}
.page-btn:hover:not(.active){background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const {RadarChart,Radar,PolarGrid,PolarAngleAxis,AreaChart,Area,BarChart,Bar,LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,Legend} = Recharts;

// ─── 더미 데이터 ───
const CHAT_HISTORY = [
