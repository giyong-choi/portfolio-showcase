<!DOCTYPE html>
<html lang="ko">

<meta charset="UTF-8">

<title>루틴랩 — AI 행동 미션·커뮤니티 통합 라이프스타일 플랫폼</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#F5F3FF;color:#1E1B4B;word-break:keep-all;overflow-wrap:break-word}
:root{
  --primary:#7C3AED;--primary-dark:#6D28D9;--primary-light:#EDE9FE;
  --secondary:#A78BFA;--accent:#EC4899;
  --bg:#F5F3FF;--surface:#FFFFFF;
  --text:#1E1B4B;--text2:#5B4B8A;--text3:#9B8CC4;
  --border:#DDD6FE;--border2:#EDE9FE;
  --sidebar-w:240px;
  --green:#059669;--green-bg:#D1FAE5;
  --blue:#2563EB;--blue-bg:#DBEAFE;
  --pink:#DB2777;--pink-bg:#FCE7F3;
  --yellow:#D97706;--yellow-bg:#FEF3C7;
}
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar — bright-workspace */
.sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border2);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border2)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;flex-shrink:0}
.logo-text{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.4px}
.logo-sub{font-size:10px;color:var(--text3);font-weight:500}
.sidebar-nav{padding:12px 10px;flex:1}
.nav-group-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;padding:0 10px;margin:14px 0 6px;display:flex;align-items:center;gap:6px}
.nav-group-label:first-child{margin-top:0}
.nav-btn{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:9px 12px;border-radius:9px;font-size:13px;font-weight:500;color:var(--text2);transition:all 0.12s;display:flex;align-items:center;gap:10px;font-family:inherit}
.nav-btn:hover{background:var(--primary-light);color:var(--primary-dark)}
.nav-btn.active{background:linear-gradient(135deg,var(--primary-light),#E8E0FD);color:var(--primary);font-weight:700;box-shadow:inset 3px 0 0 var(--primary)}
.nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--primary);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 7px}
.sidebar-footer{padding:14px;border-top:1px solid var(--border2)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;background:var(--primary-light);border-radius:10px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.user-name{font-size:13px;font-weight:700;color:var(--text)}
.user-level{font-size:10px;color:var(--primary);font-weight:600}

/* Main */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:#fff;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:800;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:10px}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text2)}
.content{flex:1;overflow-y:auto;padding:24px}

/* Skeleton */
.skel{background:linear-gradient(90deg,#EDE9FE 25%,#DDD6FE 50%,#EDE9FE 75%);background-size:400% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:14px;padding:20px;border:1px solid var(--border2);position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--primary),var(--accent))}
.stat-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:28px;opacity:0.13}
.stat-label{font-size:11.5px;color:var(--text2);font-weight:500;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:800;color:var(--text);margin-bottom:3px;letter-spacing:-1px}
.stat-sub{font-size:11px;color:var(--text3)}

/* Btn */
.btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all 0.15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:#fff;color:var(--text2);border:1px solid var(--border2)}
.btn-outline:hover{background:var(--bg)}
.btn-pink{background:var(--accent);color:#fff;border:none}
.btn-sm{padding:6px 12px;font-size:12px}

/* Section header */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:14.5px;font-weight:700;color:var(--text)}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:10.5px;font-weight:600;white-space:nowrap}
.badge-purple{background:var(--primary-light);color:var(--primary)}
.badge-green{background:var(--green-bg);color:#065F46}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-pink{background:var(--pink-bg);color:var(--pink)}
.badge-yellow{background:var(--yellow-bg);color:#92400E}
.badge-gray{background:#F1F5F9;color:#64748B}

/* Mission Recommendation */
.mission-hero{background:linear-gradient(135deg,var(--primary),#5B21B6,var(--accent));border-radius:16px;padding:24px;color:#fff;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.mission-hero-left{flex:1}
.mission-hero-title{font-size:12.5px;font-weight:600;opacity:0.8;margin-bottom:6px}
.mission-hero-msg{font-size:20px;font-weight:800;line-height:1.3;margin-bottom:8px}
.mission-hero-sub{font-size:13px;opacity:0.8;line-height:1.5}
.mission-hero-right{font-size:64px;opacity:0.9;flex-shrink:0;margin-left:20px}
.mood-chips{display:flex;gap:8px;margin-top:12px}
.mood-chip{padding:6px 14px;border-radius:20px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:#fff;transition:all 0.12s}
.mood-chip.active{background:rgba(255,255,255,0.9);color:var(--primary-dark)}
.mission-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.mission-card{background:#fff;border-radius:14px;border:1px solid var(--border2);padding:20px;transition:all 0.15s;cursor:pointer;position:relative;overflow:hidden}
.mission-card:hover{border-color:var(--primary);box-shadow:0 4px 20px rgba(124,58,237,0.12)}
.mission-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.mission-card-1::before{background:linear-gradient(90deg,var(--primary),var(--secondary))}
.mission-card-2::before{background:linear-gradient(90deg,var(--accent),#F472B6)}
.mission-card-3::before{background:linear-gradient(90deg,#06B6D4,#0EA5E9)}
.mission-emoji{font-size:32px;margin-bottom:12px}
.mission-tag{display:inline-flex;padding:3px 9px;border-radius:8px;font-size:10.5px;font-weight:700;margin-bottom:8px}
.mission-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px}
.mission-desc{font-size:12.5px;color:var(--text2);line-height:1.5;margin-bottom:14px}
.mission-meta{display:flex;align-items:center;gap:8px}
.mission-time{font-size:11.5px;color:var(--text3)}
.mission-diff{font-size:11.5px;font-weight:600}
.start-btn{margin-top:12px;width:100%;padding:9px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;border:none}

/* Heatmap */
.heatmap-section{background:#fff;border-radius:14px;border:1px solid var(--border2);padding:20px;margin-bottom:20px}
.heatmap-grid{display:grid;grid-template-columns:repeat(52,1fr);gap:2px;margin:12px 0}
.heatmap-cell{aspect-ratio:1;border-radius:2px;cursor:pointer;transition:transform 0.1s}
.heatmap-cell:hover{transform:scale(1.3)}
.heatmap-legend{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.heatmap-legend-cell{width:12px;height:12px;border-radius:2px}
.tracking-layout{display:grid;grid-template-columns:1fr 280px;gap:20px}
.chart-card{background:#fff;border-radius:14px;border:1px solid var(--border2);padding:20px;margin-bottom:16px}
.chart-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.chart-sub{font-size:11.5px;color:var(--text3);margin-bottom:14px}
.goal-card{background:#fff;border-radius:14px;border:1px solid var(--border2);padding:18px;margin-bottom:14px}
.goal-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px}
.goal-item{margin-bottom:14px}
.goal-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.goal-name{font-size:12.5px;color:var(--text)}
.goal-pct{font-size:12.5px;font-weight:700;color:var(--primary)}
.goal-track{height:8px;background:var(--primary-light);border-radius:4px;overflow:hidden}
.goal-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--primary),var(--secondary))}

/* Challenge */
.challenge-layout{display:grid;grid-template-columns:1fr 300px;gap:20px}
.challenge-card{background:#fff;border-radius:14px;border:1px solid var(--border2);padding:18px;margin-bottom:12px;cursor:pointer;transition:all 0.14s}
.challenge-card:hover{border-color:var(--primary);box-shadow:0 3px 16px rgba(124,58,237,0.1)}
.challenge-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.challenge-thumb{width:48px;height:48px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.challenge-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.challenge-meta{font-size:11.5px;color:var(--text3)}
.challenge-prog{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;margin-bottom:8px}
.challenge-fill{height:100%;border-radius:3px}
.challenge-footer{display:flex;align-items:center;justify-content:space-between}
.leaderboard-card{background:#fff;border-radius:14px;border:1px solid var(--border2);overflow:hidden}
.lb-header{padding:14px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.lb-title{font-size:13px;font-weight:700;color:var(--text)}
.lb-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border2)}
.lb-item:last-child{border-bottom:none}
.lb-rank{width:24px;font-size:13px;font-weight:800;text-align:center;flex-shrink:0}
.lb-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.lb-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.lb-score{font-size:13px;font-weight:700;color:var(--primary)}

/* Content Library */
.content-toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.tag-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border2);background:#fff;color:var(--text2);font-family:inherit;transition:all 0.12s}
.tag-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.content-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.content-card{background:#fff;border-radius:14px;border:1px solid var(--border2);overflow:hidden;cursor:pointer;transition:all 0.15s}
.content-card:hover{border-color:var(--primary);box-shadow:0 4px 18px rgba(124,58,237,0.1)}
.content-cover{height:130px;display:flex;align-items:center;justify-content:center;font-size:40px}
.content-body{padding:14px}
.content-tag-row{margin-bottom:8px}
.content-title{font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.4}
.content-desc{font-size:11.5px;color:var(--text2);line-height:1.5;margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.content-footer{display:flex;align-items:center;justify-content:space-between}
.content-plan{font-size:10.5px;font-weight:600}
.content-date{font-size:10.5px;color:var(--text3)}
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;background:var(--primary-light);cursor:pointer;margin-bottom:16px;transition:all 0.12s}
.upload-zone:hover{border-color:var(--primary);background:#E8E0FD}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:5px;padding:14px 0}
.page-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border2);background:#fff;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;color:var(--text2);transition:all 0.12s}
.page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:700}
.page-btn:hover:not(.active){background:var(--primary-light);border-color:var(--primary);color:var(--primary)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:420px;width:90%;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);animation:fadeInScale 0.2s ease}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.modal-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.form-group{margin-bottom:12px}
.form-group label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border2);font-size:13px;font-family:inherit;color:var(--text);outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btn-cancel{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border2);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text2)}
.modal-btn-confirm{flex:1;padding:10px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>

        <div style={{fontSize:24,marginBottom:8}}>📤</div>
        <div style={{fontSize:14,fontWeight:700,color:'var(--primary)',marginBottom:4}}>새 콘텐츠 업로드</div>
        <div style={{fontSize:12,color:'var(--text3)'}}>아티클, 명상 가이드, 루틴 템플릿을 등록하세요 · AWS S3 Presigned URL 업로드</div>
      </div>

      <div className="content-toolbar">
        {tags.map(t=>(
          <button key={t} className={`tag-btn${tagFilter===t?' active':''}`} onClick={()=>{setTagFilter(t);setContentPage(1);}}>{t}</button>
        ))}
        <div style={{marginLeft:'auto',fontSize:12,color:'var(--text3)'}}>전체 {filtered.length}개</div>
      </div>

      <div className="content-grid">
        {items.map((c,i)=>(
          <div key={i} className="content-card">
            <div className="content-cover" style={{background:c.bg}}>{c.emoji}</div>
            <div className="content-body">
              <div className="content-tag-row">
                <span className={`badge ${c.tagColor}`}>{c.tag}</span>
              </div>
              <div className="content-title">{c.title}</div>
              <div className="content-desc">{c.desc}</div>
              <div className="content-footer">
                <span className="content-plan" style={{color:c.planColor,background:c.plan==='PRO'?'var(--primary-light)':'var(--green-bg)',padding:'2px 8px',borderRadius:6}}>
                  {c.plan}
                </span>
                <span className="content-date">{c.date}</span>
              </div>
            </div>
          </div>
        ))}
      </div>

      <div className="pagination">
        <button className="page-btn" onClick={()=>setContentPage(p=>Math.max(1,p-1))}>‹</button>
        {Array.from({length:total},(_,i)=>i+1).map(n=>(
          <button key={n} className={`page-btn${contentPage===n?' active':''}`} onClick={()=>setContentPage(n)}>{n}</button>
        ))}
        <button className="page-btn" onClick={()=>setContentPage(p=>Math.min(total,p+1))}>›</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
