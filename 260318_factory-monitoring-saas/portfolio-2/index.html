// === Components ===
function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{typeof end==='number'&&end%1!==0?val.toFixed(1):val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Badge({color,children}){
  return <span style={{display:'inline-block',padding:'3px 12px',borderRadius:20,fontSize:12,fontWeight:600,background:color+'18',color}}>{children}</span>;

function Btn({onClick,children,variant='primary',size='md',style:s={}}){
  const base={border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:600,borderRadius:12,transition:'all 200ms',display:'inline-flex',alignItems:'center',gap:6};
  const sizes={sm:{padding:'6px 14px',fontSize:12},md:{padding:'8px 18px',fontSize:13},lg:{padding:'10px 22px',fontSize:14}};
  const variants={primary:{background:C.accent,color:'#fff'},secondary:{background:'#fff',color:C.primary,border:`1px solid ${C.border}`},danger:{background:C.danger+'15',color:C.danger}};
  return <button onClick={onClick} style={{...base,...sizes[size],...variants[variant],...s}} onMouseEnter={e=>e.currentTarget.style.opacity='0.85'} onMouseLeave={e=>e.currentTarget.style.opacity='1'}>{children}</button>;
}

      </div>

      {/* Vehicle Table */}
      <div style={{background:C.surface,borderRadius:16,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:C.secondary,color:'#fff'}}>
              {['차량 번호','번호판','허브','노선','상태','기사','출발','도착 예정'].map(h=>(
                <th key={h} style={{padding:'12px 16px',textAlign:'left',fontSize:12,fontWeight:600}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((v,i)=>(
              <tr key={v.id} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'all 150ms',animation:`slideUp 300ms ease ${i*50}ms both`}}
                onMouseEnter={e=>{e.currentTarget.style.background=C.accent+'08';e.currentTarget.style.borderLeft=`3px solid ${C.accent}`}}
                onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderLeft='3px solid transparent'}}
                onClick={()=>setDrawer({title:`차량 ${v.id}`,type:'vehicle',data:v})}>
                <td style={{padding:'14px 16px',fontSize:13,fontWeight:700}}>{v.id}</td>
                <td style={{padding:'14px 16px',fontSize:13,color:C.textLight}}>{v.plate}</td>
                <td style={{padding:'14px 16px',fontSize:13}}>{v.hub}</td>
                <td style={{padding:'14px 16px',fontSize:13,fontWeight:600}}>{v.route}</td>
                <td style={{padding:'14px 16px'}}><Badge color={VH_STATUS_COLOR[v.status]}>{v.status}</Badge></td>
                <td style={{padding:'14px 16px',fontSize:13}}>{v.driver}</td>
                <td style={{padding:'14px 16px',fontSize:13,color:C.textLight}}>{v.departure}</td>
                <td style={{padding:'14px 16px',fontSize:13,color:C.textLight}}>{v.eta}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function EventAlertPage({setDrawer}){
  const [filter,setFilter]=useState('all');
  const [events,setEvents]=useState(EVENTS);
  const filtered = filter==='all'?events:events.filter(e=>e.severity===filter);

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',gap:8,marginBottom:24}}>
        {[{key:'all',label:'전체'},{key:'critical',label:'긴급'},{key:'warning',label:'주의'},{key:'info',label:'정보'}].map(f=>(
          <button key={f.key} onClick={()=>setFilter(f.key)} style={{padding:'8px 18px',borderRadius:20,border:`1.5px solid ${filter===f.key?(SEV_COLOR[f.key]||C.accent):C.border}`,background:filter===f.key?(SEV_COLOR[f.key]||C.accent)+'15':'#fff',color:filter===f.key?(SEV_COLOR[f.key]||C.accent):C.textLight,fontWeight:filter===f.key?600:400,cursor:'pointer',fontFamily:'inherit',fontSize:13,transition:'all 200ms'}}>
            {f.label} ({f.key==='all'?events.length:events.filter(e=>e.severity===f.key).length})
          </button>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
        {filtered.map((evt,i)=>(
          <div key={evt.id} style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',borderTop:`3px solid ${SEV_COLOR[evt.severity]}`,cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.15)'}}
            onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.10)'}}
            onClick={()=>setDrawer({title:'이벤트 상세',type:'event',data:evt})}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <Badge color={SEV_COLOR[evt.severity]}>{SEV_LABEL[evt.severity]}</Badge>
              <span style={{fontSize:12,color:C.textMuted}}>{evt.hub}</span>
              <span style={{fontSize:12,color:C.textMuted,marginLeft:'auto'}}>{evt.time}</span>
            </div>
            <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>{evt.type}</div>
            <div style={{fontSize:13,color:C.textLight,lineHeight:1.6}}>{evt.msg}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AccountMgmtPage({setDrawer,setToast}){
  const [showCreate,setShowCreate]=useState(false);

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <span style={{fontSize:13,color:C.textMuted}}>전체 {ACCOUNTS.length}명</span>
        <Btn onClick={()=>setShowCreate(true)}>+ 계정 추가</Btn>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {ACCOUNTS.map((acc,i)=>(
          <div key={acc.id} style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.15)'}}
            onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.10)'}}
            onClick={()=>setDrawer({title:acc.name,type:'account',data:acc})}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
              <div style={{width:40,height:40,borderRadius:'50%',background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:16}}>{acc.name[0]}</div>
              <div>
                <div style={{fontSize:15,fontWeight:700}}>{acc.name}</div>
                <div style={{fontSize:12,color:C.textMuted}}>{acc.email}</div>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <Badge color={acc.role==='admin'?C.accent:acc.role==='manager'?C.success:C.textMuted}>{ROLE_LABEL[acc.role]}</Badge>
              <Badge color={acc.status==='active'?C.success:C.textMuted}>{acc.status==='active'?'활성':'비활성'}</Badge>
            </div>
            <div style={{fontSize:12,color:C.textLight}}>접근 허브: {acc.hubs.length===5?'전체':acc.hubs.join(', ')}</div>
            <div style={{fontSize:11,color:C.textMuted,marginTop:6}}>마지막 로그인: {acc.lastLogin}</div>
          </div>
        ))}
      </div>

      {showCreate&&(
        <Modal title="계정 추가" onClose={()=>setShowCreate(false)}>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div><label style={{fontSize:12,fontWeight:600,color:C.textMuted,display:'block',marginBottom:4}}>이름</label><input placeholder="이름" style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontFamily:'inherit',fontSize:14}}/></div>
            <div><label style={{fontSize:12,fontWeight:600,color:C.textMuted,display:'block',marginBottom:4}}>이메일</label><input placeholder="이메일" style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontFamily:'inherit',fontSize:14}}/></div>
            <div><label style={{fontSize:12,fontWeight:600,color:C.textMuted,display:'block',marginBottom:4}}>역할</label>
              <select style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontFamily:'inherit',fontSize:14,background:'#fff'}}>
                <option value="admin">전체 관리자</option><option value="manager">허브 관리자</option><option value="viewer">뷰어</option>
              </select>
            </div>
            <div><label style={{fontSize:12,fontWeight:600,color:C.textMuted,display:'block',marginBottom:8}}>접근 허브</label>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{HUBS.map(h=>(<label key={h.id} style={{display:'flex',alignItems:'center',gap:4,fontSize:13,cursor:'pointer'}}><input type="checkbox"/>{h.name}</label>))}</div>
            </div>
            <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
              <Btn variant="secondary" onClick={()=>setShowCreate(false)}>취소</Btn>
              <Btn onClick={()=>{setShowCreate(false);setToast('계정이 추가되었습니다.')}}>추가</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// === Drawer Content ===
function DrawerContent({drawer,onClose,setToast}){
  if(!drawer) return null;
  const {type,data}=drawer;

  if(type==='hub') return(
    <Drawer item={drawer} onClose={onClose}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
        <div style={{background:C.bg,borderRadius:12,padding:16,textAlign:'center'}}><div style={{fontSize:11,color:C.textMuted}}>입고</div><div style={{fontSize:28,fontWeight:800,color:C.accent}}>{data.inbound}</div></div>
        <div style={{background:C.bg,borderRadius:12,padding:16,textAlign:'center'}}><div style={{fontSize:11,color:C.textMuted}}>출고</div><div style={{fontSize:28,fontWeight:800,color:C.primary}}>{data.outbound}</div></div>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style={{fontSize:13}}>적재율</span><span style={{fontSize:13,fontWeight:700,color:data.stock>85?C.warning:C.success}}>{data.stock}%</span></div>
        <div style={{height:10,background:C.bg,borderRadius:5,overflow:'hidden'}}><div style={{height:'100%',background:data.stock>85?C.warning:C.success,borderRadius:5,width:`${data.stock}%`}}/></div>
      </div>
      <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>차량 현황</div>
      <div style={{fontSize:13,color:C.textLight,marginBottom:16}}>{data.activeVehicles}대 가동 중 / 총 {data.vehicles}대</div>
      <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>메모</div>
      <textarea placeholder="허브 메모 입력..." style={{width:'100%',minHeight:80,padding:12,borderRadius:10,border:`1px solid ${C.border}`,fontFamily:'inherit',fontSize:13,resize:'vertical'}}/>
      <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:16}}>
        <Btn variant="secondary" onClick={onClose}>닫기</Btn>
        <Btn onClick={()=>{onClose();setToast('메모가 저장되었습니다.')}}>저장</Btn>
      </div>
    </Drawer>
  );

  if(type==='vehicle') return(
    <Drawer item={drawer} onClose={onClose}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        {[{l:'차량 번호',v:data.id},{l:'번호판',v:data.plate},{l:'노선',v:data.route},{l:'상태',v:data.status,badge:true},{l:'기사',v:data.driver},{l:'화물',v:data.cargo},{l:'출발 시간',v:data.departure},{l:'도착 예정',v:data.eta}].map((f,i)=>(
          <div key={i} style={{background:C.bg,borderRadius:10,padding:12}}>
            <div style={{fontSize:11,color:C.textMuted,marginBottom:2}}>{f.l}</div>
            {f.badge?<Badge color={VH_STATUS_COLOR[f.v]}>{f.v}</Badge>:<div style={{fontSize:14,fontWeight:600}}>{f.v}</div>}
          </div>
        ))}
      </div>
      <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>배차 메모</div>
      <textarea placeholder="배차 관련 메모..." style={{width:'100%',minHeight:80,padding:12,borderRadius:10,border:`1px solid ${C.border}`,fontFamily:'inherit',fontSize:13,resize:'vertical'}}/>
      <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:16}}>
        <Btn variant="secondary" onClick={onClose}>닫기</Btn>
        <Btn onClick={()=>{onClose();setToast('저장되었습니다.')}}>저장</Btn>
      </div>
    </Drawer>
  );

  if(type==='event') return(
    <Drawer item={drawer} onClose={onClose}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
        <Badge color={SEV_COLOR[data.severity]}>{SEV_LABEL[data.severity]}</Badge>
        <span style={{fontSize:13,color:C.textMuted}}>{data.hub} | {data.type}</span>
        <span style={{fontSize:13,color:C.textMuted,marginLeft:'auto'}}>{data.time}</span>
      </div>
      <div style={{fontSize:15,fontWeight:600,marginBottom:8}}>{data.msg}</div>
      <div style={{fontSize:13,color:C.textLight,lineHeight:1.7,background:C.bg,borderRadius:10,padding:16,marginBottom:16}}>{data.detail}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        <div><span style={{fontSize:12,color:C.textMuted}}>담당자</span><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{data.assignee}</div></div>
        <div><span style={{fontSize:12,color:C.textMuted}}>이벤트 유형</span><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{data.type}</div></div>
      </div>
      <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>조치 내용</div>
      <textarea placeholder="조치 사항 입력..." style={{width:'100%',minHeight:80,padding:12,borderRadius:10,border:`1px solid ${C.border}`,fontFamily:'inherit',fontSize:13,resize:'vertical'}}/>
      <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:16}}>
        <Btn variant="secondary" onClick={onClose}>닫기</Btn>
        <Btn onClick={()=>{onClose();setToast('조치 내용이 기록되었습니다.')}}>저장</Btn>
      </div>
    </Drawer>
  );

  if(type==='account') return(
    <Drawer item={drawer} onClose={onClose}>
      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:20}}>
        <div style={{width:52,height:52,borderRadius:'50%',background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:20}}>{data.name[0]}</div>
        <div><div style={{fontSize:18,fontWeight:700}}>{data.name}</div><div style={{fontSize:13,color:C.textMuted}}>{data.email}</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        <div><span style={{fontSize:12,color:C.textMuted}}>역할</span><div style={{marginTop:4}}><Badge color={data.role==='admin'?C.accent:data.role==='manager'?C.success:C.textMuted}>{ROLE_LABEL[data.role]}</Badge></div></div>
        <div><span style={{fontSize:12,color:C.textMuted}}>상태</span><div style={{marginTop:4}}><Badge color={data.status==='active'?C.success:C.textMuted}>{data.status==='active'?'활성':'비활성'}</Badge></div></div>
      </div>
      <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>접근 허브</div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>{data.hubs.map(h=><Badge key={h} color={C.accent}>{h}</Badge>)}</div>
      <div style={{fontSize:12,color:C.textMuted}}>마지막 로그인: {data.lastLogin}</div>
      <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:20}}>
        <Btn variant="secondary" onClick={onClose}>닫기</Btn>
        <Btn onClick={()=>{onClose();setToast('계정이 수정되었습니다.')}}>편집</Btn>
      </div>
    </Drawer>
  );

  return null;
}

// === Main App ===
function App(){
  const [tab,setTab]=useState('home');
  const [drawer,setDrawer]=useState(null);
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  const TABS = [
    {id:'home',label:'허브 운영 현황판',icon:'&#127968;'},
    {id:'vehicle-dispatch',label:'차량 배차 현황',icon:'&#128666;'},
    {id:'event-alert',label:'입출고 이벤트 알림',icon:'&#128276;'},
    {id:'account-mgmt',label:'운영자 계정 관리',icon:'&#128100;'},
  ];

  const PAGE_META = {
    'home':{title:'허브 운영 현황판',kpis:[{label:'총 입고',value:HUBS.reduce((a,h)=>a+h.inbound,0),suffix:'건'},{label:'총 출고',value:HUBS.reduce((a,h)=>a+h.outbound,0),suffix:'건'},{label:'평균 적재율',value:'74.4',suffix:'%'}]},
    'vehicle-dispatch':{title:'차량 배차 현황',kpis:[{label:'총 차량',value:HUBS.reduce((a,h)=>a+h.vehicles,0),suffix:'대'},{label:'운행중',value:VEHICLES.filter(v=>v.status==='운행중').length,suffix:'대'},{label:'대기',value:VEHICLES.filter(v=>v.status==='대기').length,suffix:'대'}]},
    'event-alert':{title:'입출고 이벤트 알림',kpis:[{label:'전체',value:EVENTS.length,suffix:'건'},{label:'긴급',value:EVENTS.filter(e=>e.severity==='critical').length,suffix:'건'},{label:'주의',value:EVENTS.filter(e=>e.severity==='warning').length,suffix:'건'}]},
    'account-mgmt':{title:'운영자 계정 관리',kpis:[{label:'전체',value:ACCOUNTS.length,suffix:'명'},{label:'활성',value:ACCOUNTS.filter(a=>a.status==='active').length,suffix:'명'},{label:'관리자',value:ACCOUNTS.filter(a=>a.role==='admin').length,suffix:'명'}]},
  };

  if(loading) return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      <div style={{height:56,background:C.surface}}/>
      <div style={{padding:24}}>
        {[...Array(3)].map((_,i)=>(<div key={i} style={{height:120,borderRadius:16,marginBottom:16,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>))}
      </div>
    </div>
  );

  const critCount = EVENTS.filter(e=>e.severity==='critical').length;

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* Top Nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4}}>
        <div style={{fontSize:18,fontWeight:800,color:C.secondary,marginRight:20,display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:20}}>&#128230;</span> LogiHub
        </div>
        {TABS.map(t=>(
          <button key={t.id} title={t.label} onClick={()=>setTab(t.id)} style={{padding:'6px 16px',borderRadius:10,border:'none',background:tab===t.id?C.secondary:C.bg,color:tab===t.id?'#fff':C.textLight,fontWeight:tab===t.id?700:500,cursor:'pointer',fontFamily:'inherit',fontSize:13,transition:'all 200ms',display:'flex',alignItems:'center',gap:6}}>
            <span dangerouslySetInnerHTML={{__html:t.icon}} style={{fontSize:14}}/>
            {t.label}
            {t.id==='event-alert'&&critCount>0&&<span style={{background:C.danger,color:'#fff',borderRadius:10,padding:'1px 6px',fontSize:10,fontWeight:700}}>{critCount}</span>}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{position:'relative'}}>
          <input placeholder="검색..." style={{padding:'7px 12px 7px 30px',borderRadius:10,border:`1px solid ${C.border}`,fontFamily:'inherit',fontSize:13,width:180,background:C.bg}}/>
          <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',fontSize:13,color:C.textMuted}}>&#128269;</span>
        </div>
        <div style={{width:32,height:32,borderRadius:'50%',background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700,marginLeft:8}}>K</div>
      </header>

      {/* Hero Banner */}
      <div style={{background:C.gradient,padding:'28px 32px',color:'#fff'}}>
        <h1 style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em'}}>{PAGE_META[tab].title}</h1>
        <div style={{display:'flex',gap:32,marginTop:12}}>
          {PAGE_META[tab].kpis.map(k=>(
            <div key={k.label} style={{display:'flex',alignItems:'baseline',gap:8}}>
              <span style={{fontSize:13,opacity:0.8}}>{k.label}</span>
              <span style={{fontSize:22,fontWeight:800}}><CountUp end={parseFloat(k.value)} suffix={k.suffix}/></span>
            </div>
          ))}
        </div>
      </div>

      {/* Content */}
      <main style={{padding:'24px 32px'}}>
        {tab==='home'&&<HubOverviewPage setDrawer={setDrawer}/>}
        {tab==='vehicle-dispatch'&&<VehicleDispatchPage setDrawer={setDrawer}/>}
        {tab==='event-alert'&&<EventAlertPage setDrawer={setDrawer}/>}
        {tab==='account-mgmt'&&<AccountMgmtPage setDrawer={setDrawer} setToast={setToast}/>}
      </main>

      {/* Drawer */}
      <DrawerContent drawer={drawer} onClose={()=>setDrawer(null)} setToast={setToast}/>
      {/* Toast */}
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
