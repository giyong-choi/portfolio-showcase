@keyframes fadeIn{from{opacity:0}to{opacity:1}}

// Components
function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let start=0;const step=end/(duration/16);
    const timer=setInterval(()=>{start+=step;if(start>=end){setVal(end);clearInterval(timer)}else setVal(Math.floor(start))},16);
    return()=>clearInterval(timer);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,.2)',fontSize:14}}>
      ✅ {message}
    </div>
  );
}

function Modal({title,onClose,children,width=560}){
  return(

      <div style={{position:'relative',width,maxHeight:'85vh',background:'#fff',borderRadius:12,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,.15)'}}>

          <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>

}

function Badge({label,color}){
  const colors={
    '진행중':{bg:'#DCFCE7',text:'#166534'},
    '예정':{bg:'#DBEAFE',text:'#1E40AF'},
    '완료':{bg:'#F1F5F9',text:'#475569'},
    '활성':{bg:'#DCFCE7',text:'#166534'},
    '비활성':{bg:'#FEF3C7',text:'#92400E'},
  };
  const c=colors[label]||{bg:'#F1F5F9',text:'#475569'};
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:12,fontSize:12,fontWeight:600,background:c.bg,color:c.text}}>{label}</span>;
}

function KpiCard({icon,label,value,suffix,sub,index}){
  return(
    <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,.08)',animation:`slideUp 400ms ease ${index*80}ms both`,transition:'all 200ms ease',cursor:'default'}}
      onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,.12)'}}
      onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='0 1px 3px rgba(0,0,0,.08)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
        <span style={{fontSize:24}}>{icon}</span>
        <span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span>
      </div>
      <div style={{fontSize:28,fontWeight:700,color:C.text}}>
        <CountUp end={value} suffix={suffix} />
      </div>
      {sub && <div style={{fontSize:12,color:C.textLight,marginTop:6}}>{sub}</div>}
    </div>
  );
}

            ))}

            <h3 style={{fontSize:16,fontWeight:600,marginBottom:20}}>미리보기</h3>
            <div style={{width:'100%',aspectRatio:'1',borderRadius:12,background:`linear-gradient(135deg,${C.primary}10,${C.accent}10)`,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}}>

                {ROULETTE_ITEMS.map((item,i)=>{
                  const total=ROULETTE_ITEMS.reduce((s,it)=>s+it.probability,0);
                  let startAngle=0;
                  for(let j=0;j<i;j++) startAngle+=ROULETTE_ITEMS[j].probability/total*360;
                  const angle=item.probability/total*360;
                  const rad1=startAngle*Math.PI/180;
                  const rad2=(startAngle+angle)*Math.PI/180;
                  const x1=100+80*Math.cos(rad1);
                  const y1=100+80*Math.sin(rad1);
                  const x2=100+80*Math.cos(rad2);
                  const y2=100+80*Math.sin(rad2);
                  const large=angle>180?1:0;
                  return <path key={i} d={`M100,100 L${x1},${y1} A80,80 0 ${large} 1 ${x2},${y2} Z`} fill={item.color} opacity="0.7" />;
                })}
                <circle cx="100" cy="100" r="20" fill="#fff" />
                <text x="100" y="104" textAnchor="middle" fontSize="10" fontWeight="700" fill={C.text}>SPIN</text>

        </div>

      )}

  );
}

    );
  }

  const PAGE_TITLES={dashboard:'이벤트 통합 대시보드','game-config':'게임 설정 관리',participants:'참여자 현황 관리',schedule:'이벤트 일정 관리'};

  const renderPage=()=>{
    switch(page){
      case 'dashboard': return <DashboardPage setModal={setModal} />;
      case 'game-config': return <GameConfigPage setModal={setModal} />;
      case 'participants': return <ParticipantsPage setModal={setModal} />;
      case 'schedule': return <SchedulePage setModal={setModal} />;
      default: return <DashboardPage setModal={setModal} />;
    }
  };

  const renderModal=()=>{
    if(!modal) return null;
    switch(modal.type){
      case 'detail-event': return <EventDetailModal item={modal.item} onClose={()=>setModal(null)} />;
      case 'create-event': return <CreateEventModal onClose={()=>setModal(null)} setToast={setToast} />;
      case 'detail-participant': return <ParticipantDetailModal item={modal.item} onClose={()=>setModal(null)} />;
      case 'edit-config': return <ConfigEditModal item={modal.item} onClose={()=>setModal(null)} setToast={setToast} />;
      case 'create-schedule': return <ScheduleCreateModal onClose={()=>setModal(null)} setToast={setToast} />;
      case 'edit-schedule': return <EventDetailModal item={modal.item} onClose={()=>setModal(null)} />;
      case 'export': return <ExportModal onClose={()=>setModal(null)} setToast={setToast} />;
      default: return null;
    }
  };

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      {/* Sidebar */}
      <aside style={{width:260,background:C.sidebarBg,display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'20px 20px 24px',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:18,fontWeight:700}}>E</div>
          <div>
            <div style={{color:'#fff',fontWeight:700,fontSize:15}}>EventHub</div>
            <div style={{color:C.sidebarText,fontSize:11}}>이벤트 관리 플랫폼</div>
          </div>
        </div>
        <div style={{flex:1,padding:'0 12px'}}>
          {MENUS.map(m=>(
            <button key={m.id} onClick={()=>setPage(m.id)} title={m.label} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'11px 14px',borderRadius:8,border:'none',cursor:'pointer',marginBottom:4,background:page===m.id?`${C.sidebarActive}15`:'transparent',color:page===m.id?C.sidebarActive:C.sidebarText,fontSize:14,fontWeight:page===m.id?600:400,transition:'all 150ms',fontFamily:'inherit',textAlign:'left'}}>
              <span style={{fontSize:18}}>{m.icon}</span>
              {m.label}
            </button>
          ))}
        </div>
        <div style={{padding:'16px 20px',borderTop:`1px solid ${C.sidebarActive}20`}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:`${C.sidebarActive}30`,display:'flex',alignItems:'center',justifyContent:'center',color:C.sidebarActive,fontSize:14,fontWeight:700}}>관</div>
            <div>
              <div style={{color:'#fff',fontSize:13,fontWeight:500}}>관리자</div>
              <div style={{color:C.sidebarText,fontSize:11}}>admin@eventhub.kr</div>
            </div>
          </div>
        </div>
      </aside>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <header style={{height:56,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 24px',justifyContent:'space-between',flexShrink:0}}>
          <h2 style={{fontSize:18,fontWeight:700}}>{PAGE_TITLES[page]}</h2>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <div style={{position:'relative'}}>
              <input placeholder="이벤트 검색..." style={{padding:'7px 14px 7px 32px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,width:220,outline:'none',fontFamily:'inherit'}} />
              <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:14}}>🔍</span>
            </div>
            <div style={{position:'relative',cursor:'pointer'}}>
              <span style={{fontSize:20}}>🔔</span>
              <div style={{position:'absolute',top:-2,right:-4,width:8,height:8,borderRadius:'50%',background:C.danger}} />
            </div>
          </div>
        </header>
        <main style={{flex:1,overflow:'auto',padding:24}}>
          {renderPage()}
        </main>
      </div>

      {renderModal()}
      {toast && <Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
