@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

@keyframes slideDown{from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px}}

function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let start=0;const step=end/(duration/16);
    const timer=setInterval(()=>{start+=step;if(start>=end){setVal(end);clearInterval(timer)}else setVal(Math.floor(start))},16);
    return()=>clearInterval(timer);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:14,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,.2)',fontSize:14}}>
      ✅ {message}
    </div>
  );
}

function Badge({label}){

  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:14,fontSize:11,fontWeight:600,background:c.bg,color:c.text}}>{label}</span>;
}

                <h4 style={{fontSize:13,fontWeight:700,marginBottom:8}}>변경 내용</h4>
                <p style={{fontSize:14,color:C.textLight,lineHeight:1.7}}>{selected.changes}</p>
              </div>
              <div style={{display:'flex',gap:8,marginTop:16}}>
                <button onClick={()=>setToast(`${selected.version}으로 롤백합니다`)} style={{padding:'8px 16px',background:`${C.warning}10`,color:C.warning,border:'none',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>이 버전으로 롤백</button>
              </div>
            </div>
          ):(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:C.textLight}}>
              <div style={{textAlign:'center'}}>
                <span style={{fontSize:48,display:'block',marginBottom:12}}>📋</span>
                <div>버전을 선택하면 상세 내용이 표시됩니다</div>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  return(
    <div style={{display:'flex',overflow:'hidden',height:'100%'}}>
      <div style={{width:'42%',borderRight:`1px solid ${C.border}`,overflowY:'auto'}}>
        {CMS_ITEMS.map((item,i)=>(
          <div key={item.id} onClick={()=>setSelected(item)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',cursor:'pointer',transition:'all 150ms',background:selected?.id===item.id?`${C.primary}08`:'transparent',borderLeft:selected?.id===item.id?`3px solid ${C.primary}`:'3px solid transparent',animation:`slideUp 300ms ease ${i*60}ms both`}}
            onMouseEnter={e=>{if(selected?.id!==item.id)e.currentTarget.style.background=`${C.primary}04`}}
            onMouseLeave={e=>{if(selected?.id!==item.id)e.currentTarget.style.background='transparent'}}>
            <div style={{flex:1}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:13,fontWeight:600}}>{item.name}</span>
                <Badge label={item.status} />
              </div>
              <div style={{fontSize:11,color:C.textLight,marginTop:2}}>{item.game} · {item.probability} · 수량 {item.qty}개</div>
            </div>
          </div>
        ))}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:20}}>
        {selected ? (
          <div style={{animation:'fadeIn 200ms ease'}}>
            <h3 style={{fontSize:18,fontWeight:700,marginBottom:20}}>항목 편집</h3>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              {[{l:'항목명',v:selected.name,type:'text'},{l:'소속 게임',v:selected.game,type:'text'},{l:'당첨 확률',v:selected.probability,type:'text'},{l:'수량',v:selected.qty,type:'number'}].map(({l,v,type})=>(
                <div key={l}>
                  <label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:4,color:C.textLight}}>{l}</label>
                  <input defaultValue={v} type={type} style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,outline:'none',fontFamily:'inherit'}} />
                </div>
              ))}
              <div>
                <label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:4,color:C.textLight}}>설명</label>
                <textarea defaultValue="보상 항목에 대한 상세 설명을 입력하세요." style={{width:'100%',height:80,padding:12,borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,resize:'none',fontFamily:'inherit',outline:'none'}} />
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>setToast('항목이 저장되었습니다')} style={{flex:1,padding:'10px',background:C.primary,color:'#fff',border:'none',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>저장</button>
                <button style={{padding:'10px 16px',background:`${C.danger}10`,color:C.danger,border:'none',borderRadius:10,cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>삭제</button>
              </div>
            </div>
          </div>
        ):(
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:C.textLight}}>
            <div style={{textAlign:'center'}}>
              <span style={{fontSize:48,display:'block',marginBottom:12}}>📝</span>
              <div>항목을 선택하면 편집 폼이 표시됩니다</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function ThemeStudioPage({setToast}){
  const [activeTheme,setActiveTheme]=useState(THEME_PRESETS[0]);
  const [customPrimary,setCustomPrimary]=useState('#F43F5E');
  return(
    <div style={{display:'flex',overflow:'hidden',height:'100%'}}>
      <div style={{width:'42%',borderRight:`1px solid ${C.border}`,overflowY:'auto',padding:16}}>
        <h4 style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:C.textLight,marginBottom:12}}>테마 프리셋</h4>
        {THEME_PRESETS.map((t,i)=>(
          <div key={t.id} onClick={()=>{setActiveTheme(t);setCustomPrimary(t.primary)}} style={{display:'flex',alignItems:'center',gap:12,padding:12,borderRadius:14,cursor:'pointer',transition:'all 150ms',background:activeTheme.id===t.id?`${t.primary}10`:'transparent',border:activeTheme.id===t.id?`2px solid ${t.primary}`:`2px solid transparent`,marginBottom:8,animation:`slideUp 300ms ease ${i*60}ms both`}}
            onMouseEnter={e=>{if(activeTheme.id!==t.id)e.currentTarget.style.background=`${t.primary}08`}}
            onMouseLeave={e=>{if(activeTheme.id!==t.id)e.currentTarget.style.background='transparent'}}>
            <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${t.primary},${t.secondary})`,flexShrink:0}} />
            <div>
              <div style={{fontSize:14,fontWeight:600}}>{t.name}</div>
              <div style={{fontSize:11,color:C.textLight}}>{t.primary}</div>
            </div>
          </div>
        ))}
        <div style={{marginTop:20}}>
          <h4 style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:C.textLight,marginBottom:12}}>커스텀 컬러</h4>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <input type="color" value={customPrimary} onChange={e=>setCustomPrimary(e.target.value)} style={{width:40,height:40,border:'none',borderRadius:8,cursor:'pointer'}} />
            <input value={customPrimary} onChange={e=>setCustomPrimary(e.target.value)} style={{flex:1,padding:'8px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'monospace',outline:'none'}} />
          </div>
        </div>
        <button onClick={()=>setToast('테마가 적용되었습니다')} style={{width:'100%',padding:12,background:customPrimary,color:'#fff',border:'none',borderRadius:10,cursor:'pointer',fontSize:14,fontWeight:700,marginTop:16,fontFamily:'inherit'}}>테마 적용</button>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:20}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>미리보기</h3>
        <div style={{borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden'}}>
          {/* Mini preview */}
          <div style={{height:40,background:customPrimary,display:'flex',alignItems:'center',padding:'0 16px',gap:8}}>
            <div style={{width:20,height:20,borderRadius:6,background:'rgba(255,255,255,.3)'}} />
            <span style={{color:'#fff',fontSize:12,fontWeight:600}}>브랜드 게임</span>
            <div style={{flex:1}} />
            {['게임1','게임2','게임3'].map(t=>(
              <span key={t} style={{color:'rgba(255,255,255,.7)',fontSize:11,padding:'2px 8px'}}>{t}</span>
            ))}
          </div>
          <div style={{padding:20,background:'#fafafa'}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
              {[{emoji:'🎡',name:'럭키 룰렛'},{emoji:'🎲',name:'보물찾기'},{emoji:'🃏',name:'카드게임'}].map((g,i)=>(
                <div key={i} style={{background:'#fff',borderRadius:12,padding:16,textAlign:'center',border:'1px solid #eee',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
                  <span style={{fontSize:32,display:'block',marginBottom:8}}>{g.emoji}</span>
                  <div style={{fontSize:12,fontWeight:600}}>{g.name}</div>
                  <button style={{marginTop:8,padding:'4px 12px',background:customPrimary,color:'#fff',border:'none',borderRadius:6,fontSize:10,cursor:'pointer'}}>시작</button>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div style={{marginTop:20}}>
          <h4 style={{fontSize:14,fontWeight:700,marginBottom:12}}>브랜드 로고 업로드</h4>
          <div style={{padding:24,borderRadius:14,border:`2px dashed ${C.border}`,textAlign:'center',cursor:'pointer',transition:'border-color 200ms'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=C.primary}
            onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
            <span style={{fontSize:32,display:'block',marginBottom:8}}>📤</span>
            <div style={{fontSize:13,color:C.textLight}}>클릭하여 로고 이미지를 업로드하세요</div>
            <div style={{fontSize:11,color:C.textLight,marginTop:4}}>PNG, SVG (최대 2MB)</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,marginTop:16}}>
          <button onClick={()=>setToast('테마 JSON이 내보내졌습니다')} style={{flex:1,padding:'10px',background:`${C.primary}10`,color:C.primary,border:'none',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>JSON 내보내기</button>
          <button style={{flex:1,padding:'10px',background:`${C.primary}10`,color:C.primary,border:'none',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>테마 저장</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [section,setSection]=useState('launcher');
  const [tab,setTab]=useState(0);
  const [selected,setSelected]=useState(null);
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);
  useEffect(()=>{setTab(0);setSelected(null)},[section]);

  if(loading){
    return(
      <div style={{display:'flex',minHeight:'100vh'}}>
        <div style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`}} />
        <div style={{flex:1,padding:20}}>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            {[...Array(4)].map((_,i)=>(
              <div key={i} style={{height:i===0?40:120,borderRadius:14,background:'linear-gradient(90deg,#FFF1F2 25%,#FECDD3 50%,#FFF1F2 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}} />
            ))}
          </div>
        </div>
      </div>
    );
  }

  const tabs=SECTION_TABS[section]||[];

  const renderContent=()=>{
    switch(section){
      case 'launcher': return <LauncherPage selected={selected} setSelected={setSelected} tab={tab} setToast={setToast} />;
      case 'realtime-stats': return <RealtimeStatsPage selected={selected} setSelected={setSelected} tab={tab} />;
      case 'content-cms': return <ContentCMSPage selected={selected} setSelected={setSelected} tab={tab} setToast={setToast} />;
      case 'theme-studio': return <ThemeStudioPage setToast={setToast} />;
      case 'settings': return(
        <div style={{padding:20,textAlign:'center',color:C.textLight}}>
          <span style={{fontSize:48,display:'block',marginBottom:12}}>⚙️</span>
          <div style={{fontSize:15}}>설정 페이지</div>
        </div>
      );
      default: return null;
    }
  };

  return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      {/* Bright Sidebar */}
      <nav style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',paddingTop:16,flexShrink:0}}>
        <div style={{padding:'0 16px 20px',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:15,fontWeight:700}}>G</div>
          <span style={{fontWeight:700,fontSize:16,color:C.text}}>GameHub</span>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:2,padding:'0 8px'}}>
          {NAV_ITEMS.filter(n=>n.id!=='settings').map(item=>(
            <SideNavItem key={item.id} icon={item.icon} label={item.label} active={section===item.id} onClick={()=>setSection(item.id)} />
          ))}
        </div>
        <div style={{padding:'8px'}}>
          <SideNavItem icon="⚙️" label="설정" active={section==='settings'} onClick={()=>setSection('settings')} />
        </div>
        <div style={{padding:'12px 16px',borderTop:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:28,height:28,borderRadius:'50%',background:`${C.primary}20`,display:'flex',alignItems:'center',justifyContent:'center',color:C.primary,fontSize:12,fontWeight:700}}>관</div>
          <div>
            <div style={{fontSize:12,fontWeight:600}}>관리자</div>
            <div style={{fontSize:10,color:C.textLight}}>admin@gamehub.kr</div>
          </div>
        </div>
      </nav>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* App Bar */}
        <header style={{height:40,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 16px',gap:8,background:C.surface,flexShrink:0}}>
          <span style={{fontSize:12,color:C.textLight}}>GameHub</span>
          <span style={{fontSize:12,color:C.border}}>›</span>
          <span style={{fontSize:12,color:C.text,fontWeight:600}}>{NAV_ITEMS.find(n=>n.id===section)?.label}</span>
          {tabs[tab] && <>
            <span style={{fontSize:12,color:C.border}}>›</span>
            <span style={{fontSize:12,color:C.textLight}}>{tabs[tab].label}</span>
          </>}
          <div style={{flex:1}} />
          <div style={{position:'relative'}}>
            <input placeholder="검색..." style={{padding:'5px 10px 5px 26px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:12,width:160,outline:'none',fontFamily:'inherit'}} />
            <span style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',fontSize:11}}>🔍</span>
          </div>
          <div style={{width:24,height:24,borderRadius:'50%',background:`${C.primary}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:C.primary,fontWeight:700,cursor:'pointer'}}>관</div>
        </header>

        {/* Tab Strip */}
        {tabs.length>0 && (
          <div style={{height:38,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'flex-end',padding:'0 16px',gap:0,background:C.surface,flexShrink:0}}>
            {tabs.map((t,i)=>(
              <TabUnderline key={t.id} label={t.label} active={tab===i} onClick={()=>{setTab(i);setSelected(null)}} />
            ))}
            <div style={{flex:1}} />
          </div>
        )}

        {/* Content */}
        <div style={{flex:1,overflow:'hidden',animation:'fadeIn 300ms ease'}}>
          {renderContent()}
        </div>
      </div>

      {toast && <Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
