*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#FAF5FF;color:#1E1B4B;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C4B5FD;border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px}}
@keyframes ripple{0%{transform:scale(0);opacity:.5}100%{transform:scale(4);opacity:0}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let start=0;const step=end/(duration/16);
    const timer=setInterval(()=>{start+=step;if(start>=end){setVal(end);clearInterval(timer)}else setVal(Math.floor(start))},16);
    return()=>clearInterval(timer);
  },[end]);
  return <span>{typeof end==='string'?end:`${val.toLocaleString()}${suffix}`}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,.2)',fontSize:14}}>
      ✅ {message}
    </div>
  );
}

function Drawer({item,onClose,children}){
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:200,animation:'fadeIn 200ms ease'}} />
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:480,background:C.surface,boxShadow:'-8px 0 40px rgba(0,0,0,.15)',zIndex:201,overflowY:'auto',padding:28,animation:'slideInRight 200ms ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>

          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        {children}
      </div>
    </>

}

function Badge({label}){
  const colors={
    '초급':{bg:'#DCFCE7',text:'#166534'},'중급':{bg:'#FEF3C7',text:'#92400E'},'고급':{bg:'#FEE2E2',text:'#991B1B'},
    '진행중':{bg:'#EDE9FE',text:'#5B21B6'},'완료':{bg:'#DCFCE7',text:'#166534'},'미시작':{bg:'#F1F5F9',text:'#475569'},
  };
  const c=colors[label]||{bg:'#F1F5F9',text:'#475569'};
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:c.bg,color:c.text}}>{label}</span>;
}

function ProgressBar({value,color,height=8}){
  return(
    <div style={{width:'100%',height,borderRadius:height/2,background:`${color}20`,overflow:'hidden'}}>
      <div style={{width:`${value}%`,height:'100%',borderRadius:height/2,background:color,transition:'width 800ms ease'}} />
    </div>
  );
}

      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
        {[{l:'학습 개념',v:item.concept},{l:'난이도',v:item.level},{l:'스테이지',v:`${item.stages}개`},{l:'완료',v:`${item.completed}개`}].map(({l,v})=>(
          <div key={l} style={{padding:14,background:`${C.primary}06`,borderRadius:12}}>
            <div style={{fontSize:11,color:C.textLight,marginBottom:4}}>{l}</div>
            <div style={{fontSize:14,fontWeight:600}}>{v}</div>
          </div>
        ))}
      </div>
      <p style={{fontSize:14,color:C.textLight,lineHeight:1.7,marginBottom:20}}>{item.desc}</p>
      <ProgressBar value={Math.round(item.completed/item.stages*100)} color={item.color} />
      <div style={{fontSize:12,color:C.textLight,marginTop:8,textAlign:'center'}}>{item.completed}/{item.stages} 스테이지 완료</div>

      <div style={{marginTop:24}}>
        <h4 style={{fontSize:14,fontWeight:700,marginBottom:12}}>스테이지 목록</h4>
        {[...Array(item.stages)].map((_,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:i<item.stages-1?`1px solid ${C.border}`:'none'}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:i<item.completed?item.color:`${item.color}20`,color:i<item.completed?'#fff':item.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700}}>
              {i<item.completed?'✓':i+1}
            </div>
            <span style={{fontSize:13,fontWeight:i<item.completed?400:500,color:i<item.completed?C.textLight:C.text}}>스테이지 {i+1}</span>
            {i===item.completed && <Badge label="현재" />}
          </div>
        ))}
      </div>

      <button style={{width:'100%',padding:14,background:C.primary,color:'#fff',border:'none',borderRadius:12,fontSize:15,fontWeight:700,cursor:'pointer',marginTop:20,fontFamily:'inherit'}}>
        {item.completed>0?'이어서 학습하기':'학습 시작하기'} 🚀
      </button>
    </Drawer>
  );
}

function CurriculumDrawer({item,onClose}){
  const units=[
    {name:`${item.subject} 기초`,stages:5,completed:item.progress>=25?5:Math.floor(item.progress/5)},
    {name:`${item.subject} 응용`,stages:5,completed:item.progress>=50?5:Math.max(0,Math.floor((item.progress-25)/5))},
    {name:`${item.subject} 심화`,stages:5,completed:item.progress>=75?5:Math.max(0,Math.floor((item.progress-50)/5))},
    {name:`${item.subject} 마스터`,stages:5,completed:item.progress>=100?5:Math.max(0,Math.floor((item.progress-75)/5))},
  ];
  return(
    <Drawer item={item} onClose={onClose}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <div style={{width:48,height:48,borderRadius:14,background:`${item.color}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{item.icon}</div>
        <div>
          <div style={{fontSize:14,fontWeight:700}}>{item.subject}</div>
          <div style={{fontSize:12,color:C.textLight}}>{item.units}개 유닛 · {item.progress}% 완료</div>
        </div>
      </div>
      <ProgressBar value={item.progress} color={item.color} height={8} />

      <div style={{marginTop:24}}>
        <h4 style={{fontSize:14,fontWeight:700,marginBottom:12}}>유닛 목록</h4>
        {units.map((u,i)=>(
          <div key={i} style={{padding:16,borderRadius:12,background:`${C.primary}04`,marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:14,fontWeight:600}}>{u.name}</span>
              <span style={{fontSize:12,color:C.textLight}}>{u.completed}/{u.stages}</span>
            </div>
            <ProgressBar value={Math.round(u.completed/u.stages*100)} color={item.color} height={4} />
          </div>
        ))}
      </div>
    </Drawer>
  );
}

function AssignmentDrawer({item,onClose}){
  return(
    <Drawer item={item} onClose={onClose}>
      <Badge label={item.status} />
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,margin:'20px 0'}}>
        {[{l:'과목',v:item.subject},{l:'교사',v:item.teacher},{l:'마감일',v:item.deadline},{l:'진도',v:`${item.progress}%`}].map(({l,v})=>(
          <div key={l} style={{padding:14,background:`${C.primary}06`,borderRadius:12}}>
            <div style={{fontSize:11,color:C.textLight,marginBottom:4}}>{l}</div>
            <div style={{fontSize:14,fontWeight:600}}>{v}</div>
          </div>
        ))}
      </div>
      <ProgressBar value={item.progress} color={item.status==='완료'?C.success:C.primary} />

      <div style={{marginTop:24}}>
        <label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:8}}>학습 메모</label>
        <textarea placeholder="학습 중 메모를 남겨보세요..." style={{width:'100%',height:80,padding:12,borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,resize:'none',fontFamily:'inherit',outline:'none'}} />
      </div>

      {item.status!=='완료' && (
        <button style={{width:'100%',padding:14,background:C.primary,color:'#fff',border:'none',borderRadius:12,fontSize:15,fontWeight:700,cursor:'pointer',marginTop:20,fontFamily:'inherit'}}>
          과제 시작하기 📝
        </button>
      )}
    </Drawer>
  );
}

function App(){
  const [tab,setTab]=useState('home');
  const [drawer,setDrawer]=useState(null);
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  if(loading){
    return(
      <div style={{minHeight:'100vh',background:C.bg}}>
        <div style={{height:56,background:C.surface}} />
        <div style={{height:120,background:C.gradient}} />
        <div style={{padding:'24px 32px',display:'flex',flexDirection:'column',gap:16}}>
          {[...Array(3)].map((_,i)=>(
            <div key={i} style={{height:120,borderRadius:16,background:'linear-gradient(90deg,#F5F3FF 25%,#EDE9FE 50%,#F5F3FF 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}} />
          ))}
        </div>
      </div>
    );
  }

  const hero=HERO_META[tab];

  const renderContent=()=>{
    switch(tab){
      case 'home': return <HomePage setDrawer={setDrawer} />;
      case 'curriculum': return <CurriculumPage setDrawer={setDrawer} />;
      case 'progress': return <ProgressPage setDrawer={setDrawer} />;
      case 'assignments': return <AssignmentsPage setDrawer={setDrawer} />;
      default: return <HomePage setDrawer={setDrawer} />;
    }
  };

  const renderDrawer=()=>{
    if(!drawer) return null;
    if(drawer.emoji) return <GameDrawer item={drawer} onClose={()=>setDrawer(null)} />;
    if(drawer.icon) return <CurriculumDrawer item={drawer} onClose={()=>setDrawer(null)} />;
    if(drawer.teacher) return <AssignmentDrawer item={drawer} onClose={()=>setDrawer(null)} />;
    return <CurriculumDrawer item={drawer} onClose={()=>setDrawer(null)} />;
  };

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* Top Nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:16}}>
          <div style={{width:32,height:32,borderRadius:8,background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:16,fontWeight:700}}>C</div>
          <span style={{fontWeight:700,fontSize:16,color:C.text}}>CodePlay</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} title={t.label} style={{padding:'8px 14px',borderRadius:20,border:'none',background:tab===t.id?`${C.primary}12`:'transparent',color:tab===t.id?C.primary:C.textLight,fontSize:13,fontWeight:tab===t.id?700:400,cursor:'pointer',fontFamily:'inherit',transition:'all 200ms',display:'flex',alignItems:'center',gap:6}}>
            <span>{t.icon}</span>
            {t.label}
          </button>
        ))}
        <div style={{flex:1}} />
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{position:'relative'}}>
            <input placeholder="검색..." style={{padding:'7px 14px 7px 30px',borderRadius:20,border:`1px solid ${C.border}`,fontSize:13,width:180,outline:'none',fontFamily:'inherit',background:`${C.primary}04`}} />
            <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:13}}>🔍</span>
          </div>
          <span style={{fontSize:18,cursor:'pointer'}}>🔔</span>
          <div style={{width:32,height:32,borderRadius:'50%',background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700}}>김</div>
        </div>
      </header>

      {/* Hero Banner */}
      <div style={{background:C.gradient,padding:'28px 32px',color:'#fff'}}>
        <h1 style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:4}}>{hero.title}</h1>
        <p style={{fontSize:14,opacity:0.9,marginBottom:16}}>{hero.desc}</p>
        <div style={{display:'flex',gap:32}}>
          {hero.kpis.map(k=>(
            <div key={k.label}>
              <div style={{fontSize:11,opacity:0.7}}>{k.label}</div>
              <div style={{fontSize:20,fontWeight:700}}>{k.value}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Content */}
      <main style={{padding:'24px 32px',height:'calc(100vh - 56px - 130px)',overflowY:'auto'}}>
        {renderContent()}
      </main>

      {renderDrawer()}
      {toast && <Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
