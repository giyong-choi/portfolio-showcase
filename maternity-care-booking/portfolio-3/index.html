*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#F8FAFC;color:#0F172A;overflow:hidden}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.skeleton{background:linear-gradient(90deg,#E2E8F0 25%,#CBD5E1 50%,#E2E8F0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
::-webkit-scrollbar{width:6px;height:6px}

/* ── 유틸 컴포넌트 ── */
function Badge({ children, color=C.primary, bg }) {
  return <span style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'2px 10px', borderRadius:20, fontSize:12, fontWeight:600, color, background:bg||color+'18' }}>{children}</span>;
}
function StatusBadge({ status }) {
  const m = { '입실중':{c:C.success,b:'#D1FAE5'}, '예약확정':{c:C.info,b:'#E0F2FE'}, '공실':{c:C.textLight,b:'#F1F5F9'}, '주간':{c:C.info,b:'#DBEAFE'}, '야간':{c:C.primary,b:C.primaryLight}, '휴무':{c:C.textLight,b:'#F1F5F9'}, '완료':{c:C.success,b:'#D1FAE5'}, '필요':{c:C.warning,b:'#FEF3C7'} };
  const s = m[status]||{c:C.textSub,b:'#F1F5F9'};
  return <Badge color={s.c} bg={s.b}>{status}</Badge>;
}
function Toast({ message, onClose }) {
  useEffect(()=>{ const t=setTimeout(onClose,3000); return ()=>clearTimeout(t); },[]);
  return <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:C.primary, color:'#fff', padding:'12px 24px', borderRadius:12, animation:'slideUp 300ms ease', boxShadow:'0 4px 16px rgba(99,102,241,0.3)', fontSize:14 }}>{message}</div>;
}
function Modal({ open, onClose, title, width=560, children }) {
  if (!open) return null;
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', zIndex:500 }} />
      <div style={{ position:'fixed', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width, maxWidth:'90vw', maxHeight:'85vh', overflowY:'auto', background:C.surface, borderRadius:20, border:`1px solid ${C.border}`, boxShadow:'0 20px 60px rgba(0,0,0,0.15)', zIndex:501, animation:'fadeInScale 200ms ease' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 24px', borderBottom:`1px solid ${C.border}` }}>
          <h3 style={{ fontSize:18, fontWeight:700 }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, color:C.textLight }}>✕</button>
        </div>
        <div style={{ padding:24 }}>{children}</div>
      </div>
    </>
  );
}
function InputField({ label, value, onChange, type='text', placeholder, textarea, readOnly }) {
  const s = { width:'100%', padding:'10px 14px', border:`1px solid ${C.border}`, borderRadius:12, fontSize:14, fontFamily:'inherit', outline:'none', background:readOnly?'#F9FAFB':C.surface };
  return (
    <div style={{ marginBottom:16 }}>
      <label style={{ display:'block', fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', color:C.textLight, marginBottom:6 }}>{label}</label>
      {textarea ? <textarea value={value} onChange={onChange} placeholder={placeholder} readOnly={readOnly} rows={4} style={{...s, resize:'vertical'}} /> : <input type={type} value={value} onChange={onChange} placeholder={placeholder} readOnly={readOnly} style={s} />}
    </div>
  );
}
function SelectField({ label, value, onChange, options }) {
  return (
    <div style={{ marginBottom:16 }}>
      <label style={{ display:'block', fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', color:C.textLight, marginBottom:6 }}>{label}</label>
      <select value={value} onChange={onChange} style={{ width:'100%', padding:'10px 14px', border:`1px solid ${C.border}`, borderRadius:12, fontSize:14, fontFamily:'inherit', outline:'none', background:C.surface, cursor:'pointer' }}>
        {options.map(o => <option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
      </select>
    </div>
  );
}
function Btn({ children, onClick, variant='primary', size='md', style:sx={} }) {
  const base = { border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, borderRadius:12, display:'inline-flex', alignItems:'center', gap:6, transition:'all 150ms' };
  const sizes = { sm:{padding:'6px 12px',fontSize:12}, md:{padding:'8px 16px',fontSize:13}, lg:{padding:'10px 20px',fontSize:14} };
  const variants = { primary:{background:C.primary,color:'#fff'}, secondary:{background:C.bg,color:C.primary,border:`1px solid ${C.border}`}, danger:{background:C.danger,color:'#fff'}, ghost:{background:'transparent',color:C.textSub} };
  return <button onClick={onClick} style={{...base,...sizes[size],...variants[variant],...sx}} onMouseOver={e=>{e.currentTarget.style.background=variant==='primary'?C.primaryDark:variant==='ghost'?`${C.primary}08`:C.primaryLight;}} onMouseOut={e=>{e.currentTarget.style.background=variants[variant].background;}}>{children}</button>;
}

/* ── 산모 모니터링 ── */
function MonitoringPage({ showToast }) {
  const [selected, setSelected] = useState(MOTHERS_DATA[0]);
  const [chartType, setChartType] = useState('temp');

  const chartLabels = { temp:'체온 (°C)', bp:'혈압 (mmHg)', weight:'체중 (kg)' };
  const dayLabels = ['1일차','2일차','3일차','4일차','5일차','6일차','7일차'];

  function getChartData() {
    if (!selected.health[chartType] || selected.health[chartType].length === 0) return [];
    if (chartType === 'bp') return selected.health.bp.map(v => parseInt(v.split('/')[0]));
    return selected.health[chartType];
  }

  const data = getChartData();
  const maxVal = data.length ? Math.max(...data) : 100;
  const minVal = data.length ? Math.min(...data) : 0;
  const range = maxVal - minVal || 1;

  return (
    <div style={{ display:'flex', height:'100%', animation:'fadeIn 300ms ease' }}>
      {/* 마스터 */}
      <div style={{ width:'42%', borderRight:`1px solid ${C.border}`, overflowY:'auto' }}>
        <div style={{ padding:'12px 16px', borderBottom:`1px solid ${C.border}` }}>
          <input placeholder="산모 검색..." style={{ width:'100%', padding:'8px 12px', border:`1px solid ${C.border}`, borderRadius:10, fontSize:13, outline:'none', fontFamily:'inherit' }} />
        </div>
        {MOTHERS_DATA.map((m,i) => (
          <div key={m.id} onClick={()=>setSelected(m)} style={{
            padding:'14px 16px', borderBottom:`1px solid ${C.border}`, cursor:'pointer',
            background:selected.id===m.id ? C.primaryLight : 'transparent',
            borderLeft:selected.id===m.id ? `3px solid ${C.primary}` : '3px solid transparent',
            transition:'all 150ms', animation:`slideInRight 200ms ease ${i*40}ms both`,
          }}
          onMouseOver={e=>{if(selected.id!==m.id)e.currentTarget.style.background=`${C.primary}04`;}}
          onMouseOut={e=>{if(selected.id!==m.id)e.currentTarget.style.background='transparent';}}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <div>
                <div style={{ fontSize:14, fontWeight:600 }}>{m.name} <span style={{ fontSize:12, color:C.textLight }}>({m.age}세)</span></div>
                <div style={{ fontSize:12, color:C.textSub, marginTop:2 }}>{m.room} · 아기: {m.baby}</div>
              </div>
              <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:4 }}>
                <StatusBadge status={m.status} />
                {m.alerts.length > 0 && <Badge color={C.warning} bg="#FEF3C7">⚠ {m.alerts[0]}</Badge>}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* 디테일 */}
      <div style={{ flex:1, overflowY:'auto', padding:20 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <div>
            <h2 style={{ fontSize:22, fontWeight:700, letterSpacing:'-0.01em' }}>{selected.name}</h2>
            <div style={{ fontSize:13, color:C.textSub, marginTop:4 }}>{selected.room} · {selected.program} 프로그램 · 아기: {selected.baby}</div>
          </div>
          <Btn onClick={()=>showToast('건강 리포트가 생성되었습니다')}>📋 리포트 생성</Btn>
        </div>

        {/* 건강 차트 */}
        <div style={{ background:C.surface, borderRadius:C.card.borderRadius, border:C.card.border, boxShadow:C.card.boxShadow, padding:C.card.padding, marginBottom:16 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
            <h3 style={{ fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', color:C.textLight }}>건강 지표 추이</h3>
            <div style={{ display:'flex', gap:4 }}>
              {['temp','bp','weight'].map(t => (
                <button key={t} onClick={()=>setChartType(t)} style={{ padding:'4px 12px', borderRadius:8, border:`1px solid ${chartType===t?C.primary:C.border}`, background:chartType===t?C.primaryLight:'transparent', color:chartType===t?C.primary:C.textSub, fontSize:12, fontWeight:500, cursor:'pointer', fontFamily:'inherit' }}>{chartLabels[t]}</button>
              ))}
            </div>
          </div>
          {data.length > 0 ? (
            <div style={{ position:'relative', height:160 }}>
              <svg viewBox="0 0 600 160" style={{ width:'100%', height:'100%' }}>
                <defs>
                  <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={C.primary} stopOpacity="0.2" />
                    <stop offset="100%" stopColor={C.primary} stopOpacity="0" />
                  </linearGradient>
                </defs>
                {/* grid lines */}
                {[0,1,2,3].map(i => <line key={i} x1={40} y1={10+i*40} x2={580} y2={10+i*40} stroke={C.border} strokeWidth={1} />)}
                {/* area */}
                <path d={`M${data.map((v,i) => `${40+i*(540/(data.length-1))},${10+((maxVal-v)/range)*130}`).join(' L')} L${40+(data.length-1)*(540/(data.length-1))},140 L40,140 Z`} fill="url(#chartGrad)" />
                {/* line */}
                <path d={`M${data.map((v,i) => `${40+i*(540/(data.length-1))},${10+((maxVal-v)/range)*130}`).join(' L')}`} fill="none" stroke={C.primary} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round" />
                {/* dots */}
                {data.map((v,i) => <circle key={i} cx={40+i*(540/(data.length-1))} cy={10+((maxVal-v)/range)*130} r={4} fill={C.primary} stroke="#fff" strokeWidth={2} />)}
                {/* labels */}
                {dayLabels.map((l,i) => <text key={i} x={40+i*(540/(data.length-1))} y={155} textAnchor="middle" fontSize={10} fill={C.textLight}>{l}</text>)}
                {/* values */}
                {data.map((v,i) => <text key={i} x={40+i*(540/(data.length-1))} y={10+((maxVal-v)/range)*130-10} textAnchor="middle" fontSize={10} fill={C.primary} fontWeight={600}>{chartType==='bp'?selected.health.bp[i]:v}</text>)}
              </svg>
            </div>
          ) : (

/* ── 스켈레톤 + 엔트리 ── */
function SkeletonLoader() {
  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <div style={{ width:240, background:'#fff', borderRight:`1px solid ${C.border}`, flexShrink:0 }}>
        <div style={{ padding:20 }}>
          <div className="skeleton" style={{ height:24, width:120, marginBottom:24 }} />
          {[...Array(5)].map((_,i) => <div key={i} className="skeleton" style={{ height:20, width:160, marginBottom:12 }} />)}
        </div>
      </div>
      <div style={{ flex:1 }}>
        <div className="skeleton" style={{ height:40, margin:0 }} />
        <div style={{ display:'flex', height:'calc(100vh - 40px)' }}>
          <div style={{ width:'42%', borderRight:`1px solid ${C.border}`, padding:16 }}>
            {[...Array(5)].map((_,i) => <div key={i} className="skeleton" style={{ height:60, marginBottom:8 }} />)}
          </div>
          <div style={{ flex:1, padding:20 }}>
            <div className="skeleton" style={{ height:32, width:200, marginBottom:20 }} />
            <div className="skeleton" style={{ height:200, marginBottom:16 }} />
            <div className="skeleton" style={{ height:150 }} />
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [loading, setLoading] = useState(true);
  useEffect(() => { setTimeout(() => setLoading(false), 1500); }, []);
  if (loading) return <SkeletonLoader />;
  return <MainApp />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
