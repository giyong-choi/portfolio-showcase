/* ── 유틸 컴포넌트 ── */
function Badge({ children, color=C.primary, bg }) {
  return <span style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'2px 10px', borderRadius:20, fontSize:12, fontWeight:600, color, background:bg||color+'18' }}>{children}</span>;
}
function StatusBadge({ status }) {
  const m = { '입실중':{c:C.success,b:'#D1FAE5'}, '입실':{c:C.success,b:'#D1FAE5'}, '예약확정':{c:C.info,b:'#E0F2FE'}, '확정':{c:C.info,b:'#E0F2FE'}, '청소중':{c:C.warning,b:'#FEF3C7'}, '공실':{c:C.textLight,b:'#F1F5F9'}, '대기':{c:C.warning,b:'#FEF3C7'}, '발송완료':{c:C.success,b:'#D1FAE5'}, '발송예정':{c:C.info,b:'#E0F2FE'}, '발송실패':{c:C.danger,b:'#FEE2E2'} };
  const s = m[status]||{c:C.textSub,b:'#F1F5F9'};
  return <Badge color={s.c} bg={s.b}>{status}</Badge>;
}
function CountUp({ end, suffix='', prefix='' }) {
  const [val, setVal] = useState(0);
  useEffect(()=>{ let s=0; const step=end/50; const t=setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);} else setVal(Math.floor(s)); },24); return ()=>clearInterval(t); },[end]);
  return <span style={{ animation:'countUp 400ms ease' }}>{prefix}{val.toLocaleString()}{suffix}</span>;
}
function Toast({ message, onClose }) {
  useEffect(()=>{ const t=setTimeout(onClose,3000); return ()=>clearTimeout(t); },[]);
  return <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:C.primary, color:'#fff', padding:'12px 24px', borderRadius:8, animation:'slideUp 300ms ease', boxShadow:'0 4px 16px rgba(0,0,0,0.2)', fontSize:14 }}>{message}</div>;
}
function Modal({ open, onClose, title, width=560, children }) {
  if (!open) return null;
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', zIndex:500 }} />
      <div style={{ position:'fixed', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width, maxWidth:'90vw', maxHeight:'85vh', overflowY:'auto', background:C.surface, borderRadius:16, boxShadow:'0 20px 60px rgba(0,0,0,0.2)', zIndex:501, animation:'fadeInScale 200ms ease' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 24px', borderBottom:`1px solid ${C.border}` }}>
          <h3 style={{ fontSize:18, fontWeight:700 }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, color:C.textLight }}>✕</button>
        </div>
        <div style={{ padding:24 }}>{children}</div>
      </div>
    </>
  );
}
function InputField({ label, value, onChange, type='text', placeholder, textarea, readOnly }) {
  const s = { width:'100%', padding:'10px 14px', border:`1px solid ${C.border}`, borderRadius:8, fontSize:14, fontFamily:'inherit', outline:'none', background:readOnly?'#F8FAFC':C.surface, transition:'border-color 150ms' };
  return (
    <div style={{ marginBottom:16 }}>
      <label style={{ display:'block', fontSize:13, fontWeight:600, color:C.textSub, marginBottom:6 }}>{label}</label>
      {textarea ? <textarea value={value} onChange={onChange} placeholder={placeholder} readOnly={readOnly} rows={4} style={{...s, resize:'vertical'}} /> : <input type={type} value={value} onChange={onChange} placeholder={placeholder} readOnly={readOnly} style={s} />}
    </div>
  );
}
function SelectField({ label, value, onChange, options }) {
  return (
    <div style={{ marginBottom:16 }}>
      <label style={{ display:'block', fontSize:13, fontWeight:600, color:C.textSub, marginBottom:6 }}>{label}</label>
      <select value={value} onChange={onChange} style={{ width:'100%', padding:'10px 14px', border:`1px solid ${C.border}`, borderRadius:8, fontSize:14, fontFamily:'inherit', outline:'none', background:C.surface, cursor:'pointer' }}>
        {options.map(o => <option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
      </select>
    </div>
  );
}
function Btn({ children, onClick, variant='primary', size='md', style:sx={} }) {
  const base = { border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, borderRadius:8, display:'inline-flex', alignItems:'center', gap:6, transition:'all 150ms' };
  const sizes = { sm:{padding:'6px 12px',fontSize:12}, md:{padding:'8px 16px',fontSize:13}, lg:{padding:'10px 20px',fontSize:14} };
  const variants = { primary:{background:C.primary,color:'#fff'}, secondary:{background:C.bg,color:C.primary,border:`1px solid ${C.border}`}, danger:{background:C.danger,color:'#fff'}, ghost:{background:'transparent',color:C.textSub} };
  return <button onClick={onClick} style={{...base,...sizes[size],...variants[variant],...sx}} onMouseOver={e=>{if(variant==='primary')e.target.style.filter='brightness(1.05)';}} onMouseOut={e=>e.target.style.filter='none'}>{children}</button>;
}

/* ── 예약 관리 ── */
function ReservationPage({ showToast }) {
  const [view, setView] = useState('table');
  const [modal, setModal] = useState(null);
  const [filter, setFilter] = useState('전체');
  const [currentPage, setCurrentPage] = useState(1);
  const PER_PAGE = 5;

  const filtered = filter === '전체' ? RESERVATIONS : RESERVATIONS.filter(r => r.status === filter);
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  const paged = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

  const calDays = Array.from({length:31}, (_,i) => i+1);
  const roomTypes = ['스위트 A','스위트 B','패밀리 A','패밀리 B','스탠다드 1','스탠다드 2','스탠다드 3','프리미엄'];

  function getReservationForCell(room, day) {
    return RESERVATIONS.find(r => {
      if (r.room !== room) return false;
      const inDay = parseInt(r.checkIn.split('-')[2]);
      const outDay = parseInt(r.checkOut.split('-')[2]);
      const inMonth = parseInt(r.checkIn.split('-')[1]);
      const outMonth = parseInt(r.checkOut.split('-')[1]);
      if (inMonth === 3 && outMonth === 3) return day >= inDay && day <= outDay;
      if (inMonth < 3 && outMonth === 3) return day <= outDay;
      if (inMonth === 3 && outMonth > 3) return day >= inDay;
      return false;
    });
  }

  return (
    <div style={{ animation:'fadeIn 300ms ease' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
        <div style={{ display:'flex', gap:8 }}>
          <Btn variant={view==='table'?'primary':'secondary'} size="sm" onClick={()=>setView('table')}>📋 테이블</Btn>
          <Btn variant={view==='calendar'?'primary':'secondary'} size="sm" onClick={()=>setView('calendar')}>📅 캘린더</Btn>
        </div>
        <Btn onClick={()=>setModal('create')}>+ 예약 등록</Btn>
      </div>

      {view === 'table' ? (
        <div style={{ background:C.surface, borderRadius:C.card.borderRadius, boxShadow:C.card.boxShadow, padding:C.card.padding }}>
          <div style={{ display:'flex', gap:8, marginBottom:16 }}>
            {['전체','입실','확정','대기'].map(f => (
              <button key={f} onClick={()=>{setFilter(f);setCurrentPage(1);}} style={{ padding:'6px 14px', borderRadius:20, border:`1px solid ${filter===f?C.primary:C.border}`, background:filter===f?C.primaryLight:'transparent', color:filter===f?C.primary:C.textSub, fontSize:13, fontWeight:500, cursor:'pointer', fontFamily:'inherit' }}>{f}</button>
            ))}
          </div>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ borderBottom:`2px solid ${C.border}` }}>
                {['예약자','객실','입실일','퇴실일','프로그램','금액','결제','상태',''].map(h => (
                  <th key={h} style={{ textAlign:'left', padding:'12px 8px', fontSize:12, fontWeight:600, color:C.textLight, textTransform:'uppercase' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {paged.map((r,i) => (
                <tr key={r.id} style={{ borderBottom:`1px solid ${C.border}`, cursor:'pointer', transition:'background 150ms' }}
                    onMouseOver={e=>e.currentTarget.style.background=C.primaryLight+'40'}
                    onMouseOut={e=>e.currentTarget.style.background='transparent'}
                    onClick={()=>setModal(r)}>
                  <td style={{ padding:'14px 8px', fontSize:14, fontWeight:500 }}>{r.guest}</td>
                  <td style={{ padding:'14px 8px', fontSize:13 }}>{r.room}</td>
                  <td style={{ padding:'14px 8px', fontSize:13 }}>{r.checkIn}</td>
                  <td style={{ padding:'14px 8px', fontSize:13 }}>{r.checkOut}</td>
                  <td style={{ padding:'14px 8px', fontSize:13 }}>{r.program}</td>
                  <td style={{ padding:'14px 8px', fontSize:13 }}>{(r.amount/10000).toLocaleString()}만원</td>
                  <td style={{ padding:'14px 8px' }}><Badge color={r.paid?C.success:C.warning}>{r.paid?'완료':'미결제'}</Badge></td>
                  <td style={{ padding:'14px 8px' }}><StatusBadge status={r.status} /></td>
                  <td style={{ padding:'14px 8px' }}><Btn variant="ghost" size="sm" onClick={e=>{e.stopPropagation();setModal(r);}}>상세</Btn></td>
                </tr>
              ))}
            </tbody>
          </table>
          {totalPages > 1 && (
            <div style={{ display:'flex', justifyContent:'center', gap:4, marginTop:16 }}>
              <button onClick={()=>setCurrentPage(p=>Math.max(1,p-1))} disabled={currentPage===1} style={{ padding:'6px 10px', border:`1px solid ${C.border}`, borderRadius:6, background:'transparent', cursor:'pointer', fontSize:13, fontFamily:'inherit', color:currentPage===1?C.textLight:C.text }}>‹</button>
              {Array.from({length:totalPages},(_,i)=>i+1).map(p => (
                <button key={p} onClick={()=>setCurrentPage(p)} style={{ padding:'6px 12px', border:`1px solid ${p===currentPage?C.primary:C.border}`, borderRadius:6, background:p===currentPage?C.primary:'transparent', color:p===currentPage?'#fff':C.text, cursor:'pointer', fontSize:13, fontWeight:p===currentPage?600:400, fontFamily:'inherit' }}>{p}</button>
              ))}
              <button onClick={()=>setCurrentPage(p=>Math.min(totalPages,p+1))} disabled={currentPage===totalPages} style={{ padding:'6px 10px', border:`1px solid ${C.border}`, borderRadius:6, background:'transparent', cursor:'pointer', fontSize:13, fontFamily:'inherit', color:currentPage===totalPages?C.textLight:C.text }}>›</button>
            </div>
          )}
        </div>
      ) : (
        <div style={{ background:C.surface, borderRadius:C.card.borderRadius, boxShadow:C.card.boxShadow, padding:16, overflowX:'auto' }}>

          <div style={{ display:'grid', gridTemplateColumns:`100px repeat(31, minmax(28px, 1fr))`, gap:0, fontSize:11 }}>
            <div style={{ padding:4, fontWeight:600, borderBottom:`2px solid ${C.border}` }}></div>
            {calDays.map(d => <div key={d} style={{ padding:4, textAlign:'center', fontWeight:600, borderBottom:`2px solid ${C.border}`, color:C.textSub }}>{d}</div>)}
            {roomTypes.map(room => (
              <React.Fragment key={room}>
                <div style={{ padding:'8px 4px', fontWeight:500, fontSize:11, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center' }}>{room}</div>
                {calDays.map(d => {
                  const res = getReservationForCell(room, d);
                  return <div key={d} style={{ padding:2, borderBottom:`1px solid ${C.border}`, borderLeft:`1px solid ${C.border}20`, background:res ? (res.status==='입실'?'#D1FAE5':res.status==='확정'?'#DBEAFE':'#FEF3C7') : 'transparent', cursor:res?'pointer':'default', minHeight:28 }} onClick={()=>res&&setModal(res)} />;
                })}
              </React.Fragment>
            ))}
          </div>
          <div style={{ display:'flex', gap:16, marginTop:12, padding:'0 8px' }}>
            <span style={{ fontSize:11, color:C.textSub }}><span style={{ display:'inline-block', width:10, height:10, borderRadius:2, background:'#D1FAE5', marginRight:4 }}/>입실</span>
            <span style={{ fontSize:11, color:C.textSub }}><span style={{ display:'inline-block', width:10, height:10, borderRadius:2, background:'#DBEAFE', marginRight:4 }}/>확정</span>
            <span style={{ fontSize:11, color:C.textSub }}><span style={{ display:'inline-block', width:10, height:10, borderRadius:2, background:'#FEF3C7', marginRight:4 }}/>대기</span>
          </div>
        </div>
      )}

      <Modal open={modal==='create'} onClose={()=>setModal(null)} title="예약 등록" width={600}>

          <SelectField label="객실" value="" onChange={()=>{}} options={['객실 선택',...roomTypes]} />
          <InputField label="입실일" value="" onChange={()=>{}} type="date" />

          <SelectField label="프로그램" value="" onChange={()=>{}} options={['프로그램 선택','프리미엄 케어','스탠다드 케어','VIP 케어']} />
          <InputField label="연락처" value="" onChange={()=>{}} placeholder="010-0000-0000" />
        </div>
        <InputField label="비고" value="" onChange={()=>{}} textarea placeholder="특이사항을 입력하세요" />
        <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:8 }}>

        </div>
      </Modal>

      <Modal open={modal && modal !== 'create'} onClose={()=>setModal(null)} title="예약 상세" width={560}>
        {modal && modal !== 'create' && (
          <>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 16px' }}>
              <InputField label="예약자" value={modal.guest} readOnly />
              <InputField label="객실" value={modal.room} readOnly />
              <InputField label="입실일" value={modal.checkIn} readOnly />
              <InputField label="퇴실일" value={modal.checkOut} readOnly />
              <InputField label="프로그램" value={modal.program} readOnly />
              <InputField label="금액" value={`${(modal.amount/10000).toLocaleString()}만원`} readOnly />

        )}
      </Modal>

      <Modal open={modal && modal.type === 'deleteProgram'} onClose={()=>setModal(null)} title="프로그램 삭제" width={400}>
        {modal && modal.type === 'deleteProgram' && (
          <>
            <div style={{ textAlign:'center', padding:'16px 0' }}>
              <div style={{ fontSize:32, marginBottom:12 }}>⚠️</div>
              <div style={{ fontSize:15, fontWeight:600, marginBottom:8 }}>정말 삭제하시겠습니까?</div>
              <div style={{ fontSize:13, color:C.textSub }}>'{modal.name}' 프로그램이 삭제됩니다.</div>
            </div>
            <div style={{ display:'flex', justifyContent:'center', gap:8 }}>
              <Btn variant="secondary" onClick={()=>setModal(null)}>취소</Btn>
              <Btn variant="danger" onClick={()=>{setModal(null);showToast('프로그램이 삭제되었습니다');}}>삭제</Btn>
            </div>
          </>
        )}
      </Modal>
    </div>
  );
}

/* ── 메인 앱 ── */
function MainApp() {
  const [page, setPage] = useState('dashboard');
  const [toast, setToast] = useState(null);
  const showToast = (msg) => setToast(msg);

  const PAGE_TITLES = { dashboard:'대시보드', reservation:'예약 관리', mother:'산모 관리', notification:'알림 관리', settings:'시설 설정' };

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      {/* 사이드바 */}
      <aside style={{ width:260, background:C.sidebar, flexShrink:0, display:'flex', flexDirection:'column' }}>
        <div style={{ padding:'24px 20px', borderBottom:'1px solid rgba(255,255,255,0.08)' }}>
          <div style={{ fontSize:20, fontWeight:800, color:'#fff' }}>🏥 맘스케어</div>
          <div style={{ fontSize:11, color:'rgba(255,255,255,0.5)', marginTop:4 }}>통합 운영 플랫폼</div>
        </div>
        <nav style={{ flex:1, padding:'12px 8px', display:'flex', flexDirection:'column', gap:2 }}>
          {PAGES.map(p => (
            <button key={p.key} onClick={()=>setPage(p.key)} style={{
              display:'flex', alignItems:'center', gap:12, width:'100%', padding:'12px 16px',
              borderRadius:8, border:'none', cursor:'pointer', fontFamily:'inherit', fontSize:14,
              background:page===p.key ? 'rgba(45,212,191,0.15)' : 'transparent',
              color:page===p.key ? C.accent : 'rgba(255,255,255,0.6)',
              fontWeight:page===p.key ? 600 : 400, transition:'all 150ms',
            }}
            onMouseOver={e=>{if(page!==p.key)e.target.style.background='rgba(255,255,255,0.05)';}}
            onMouseOut={e=>{if(page!==p.key)e.target.style.background='transparent';}}
            >
              <span style={{ fontSize:18 }}>{p.icon}</span>{p.label}
            </button>
          ))}
        </nav>
        <div style={{ padding:'16px 20px', borderTop:'1px solid rgba(255,255,255,0.08)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:36, height:36, borderRadius:18, background:'rgba(45,212,191,0.2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, color:C.accent }}>관</div>
            <div>
              <div style={{ fontSize:13, fontWeight:600, color:'#fff' }}>관리자</div>
              <div style={{ fontSize:11, color:'rgba(255,255,255,0.4)' }}>admin@momscare.co.kr</div>
            </div>
          </div>
        </div>
      </aside>

      {/* 메인 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <header style={{ height:56, background:C.surface, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 24px', flexShrink:0 }}>
          <h1 style={{ fontSize:18, fontWeight:700 }}>{PAGE_TITLES[page]}</h1>
          <div style={{ display:'flex', alignItems:'center', gap:16 }}>
            <div style={{ position:'relative' }}>
              <input placeholder="검색..." style={{ padding:'8px 14px 8px 36px', border:`1px solid ${C.border}`, borderRadius:8, fontSize:13, width:200, outline:'none', fontFamily:'inherit' }} />
              <span style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', fontSize:14, color:C.textLight }}>🔍</span>
            </div>
            <span onClick={()=>setPage('notification')} style={{ fontSize:20, cursor:'pointer', position:'relative' }}>🔔<span style={{ position:'absolute', top:-2, right:-2, width:8, height:8, borderRadius:4, background:C.danger }} /></span>
          </div>
        </header>
        <main style={{ flex:1, overflow:'auto', padding:24 }}>
          {page==='dashboard' && <DashboardPage />}
          {page==='reservation' && <ReservationPage showToast={showToast} />}
          {page==='mother' && <MotherPage showToast={showToast} />}
          {page==='notification' && <NotificationPage showToast={showToast} />}
          {page==='settings' && <SettingsPage showToast={showToast} />}
        </main>
      </div>

      {toast && <Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

/* ── 스켈레톤 + 엔트리 ── */
function SkeletonLoader() {
  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <div style={{ width:260, background:C.sidebar, flexShrink:0 }}>
        <div style={{ padding:20 }}>
          <div className="skeleton" style={{ height:32, width:140, marginBottom:32 }} />
          {[...Array(5)].map((_,i) => <div key={i} className="skeleton" style={{ height:20, width:180, marginBottom:16, opacity:0.3 }} />)}
        </div>
      </div>
      <div style={{ flex:1, padding:24 }}>
        <div className="skeleton" style={{ height:32, width:200, marginBottom:24 }} />
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:20, marginBottom:24 }}>
          {[...Array(4)].map((_,i) => <div key={i} className="skeleton" style={{ height:100 }} />)}
        </div>
        <div className="skeleton" style={{ height:300 }} />
      </div>
    </div>
  );
}

function App() {
  const [loading, setLoading] = useState(true);
  useEffect(() => { setTimeout(() => setLoading(false), 1500); }, []);
  if (loading) return <SkeletonLoader />;
  return <MainApp />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
