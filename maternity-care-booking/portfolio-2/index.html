@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.skeleton{background:linear-gradient(90deg,#F3E8FF 25%,#E9D5FF 50%,#F3E8FF 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}

/* ── 유틸 컴포넌트 ── */
function Badge({ children, color=C.primary, bg }) {
  return <span style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'3px 12px', borderRadius:20, fontSize:12, fontWeight:600, color, background:bg||color+'18' }}>{children}</span>;
}
function StatusBadge({ status }) {
  const m = { '확정':{c:C.success,b:'#D1FAE5'}, '대기':{c:C.warning,b:'#FEF3C7'}, '취소':{c:C.danger,b:'#FEE2E2'} };
  const s = m[status]||{c:C.textSub,b:'#F1F5F9'};
  return <Badge color={s.c} bg={s.b}>{status}</Badge>;
}
function GradeBadge({ grade }) {
  const m = { 'VIP':{c:'#B45309',b:'#FEF3C7'}, '골드':{c:C.primary,b:C.primaryLight}, '실버':{c:C.textSub,b:'#F1F5F9'} };
  const s = m[grade]||{c:C.textSub,b:'#F1F5F9'};
  return <Badge color={s.c} bg={s.b}>{grade}</Badge>;
}
function CountUp({ end, suffix='', prefix='' }) {
  const [val, setVal] = useState(0);
  useEffect(()=>{ let s=0; const step=end/50; const t=setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);} else setVal(Math.floor(s)); },24); return ()=>clearInterval(t); },[end]);
  return <span style={{ animation:'countUp 400ms ease' }}>{prefix}{val.toLocaleString()}{suffix}</span>;
}
function Toast({ message, onClose }) {
  useEffect(()=>{ const t=setTimeout(onClose,3000); return ()=>clearTimeout(t); },[]);
  return <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:C.primary, color:'#fff', padding:'12px 24px', borderRadius:12, animation:'slideUp 300ms ease', boxShadow:'0 4px 16px rgba(124,58,237,0.3)', fontSize:14 }}>{message}</div>;
}
function Modal({ open, onClose, title, width=560, children }) {
  if (!open) return null;
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', zIndex:500 }} />
      <div style={{ position:'fixed', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width, maxWidth:'90vw', maxHeight:'85vh', overflowY:'auto', background:C.surface, borderRadius:20, boxShadow:'0 20px 60px rgba(0,0,0,0.2)', zIndex:501, animation:'fadeInScale 200ms ease' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 24px', borderBottom:`1px solid ${C.border}` }}>
          <h3 style={{ fontSize:18, fontWeight:800 }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, color:C.textLight }}>✕</button>
        </div>
        <div style={{ padding:24 }}>{children}</div>
      </div>
    </>
  );
}
function Drawer({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', zIndex:200 }} />
      <div style={{ position:'fixed', top:0, right:0, bottom:0, width:480, background:C.surface, boxShadow:'-8px 0 40px rgba(0,0,0,0.15)', zIndex:201, overflowY:'auto', animation:'slideInRight 200ms ease' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 24px', borderBottom:`1px solid ${C.border}` }}>
          <h3 style={{ fontSize:18, fontWeight:800 }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, color:C.textLight }}>✕</button>
        </div>
        <div style={{ padding:24 }}>{children}</div>
      </div>
    </>
  );
}
function InputField({ label, value, onChange, type='text', placeholder, textarea, readOnly }) {
  const s = { width:'100%', padding:'10px 14px', border:`1px solid ${C.border}`, borderRadius:12, fontSize:14, fontFamily:'inherit', outline:'none', background:readOnly?'#F9FAFB':C.surface };
  return (
    <div style={{ marginBottom:16 }}>
      <label style={{ display:'block', fontSize:13, fontWeight:600, color:C.textSub, marginBottom:6 }}>{label}</label>
      {textarea ? <textarea value={value} onChange={onChange} placeholder={placeholder} readOnly={readOnly} rows={4} style={{...s, resize:'vertical'}} /> : <input type={type} value={value} onChange={onChange} placeholder={placeholder} readOnly={readOnly} style={s} />}
    </div>
  );
}
function SelectField({ label, value, onChange, options }) {
  return (
    <div style={{ marginBottom:16 }}>
      <label style={{ display:'block', fontSize:13, fontWeight:600, color:C.textSub, marginBottom:6 }}>{label}</label>
      <select value={value} onChange={onChange} style={{ width:'100%', padding:'10px 14px', border:`1px solid ${C.border}`, borderRadius:12, fontSize:14, fontFamily:'inherit', outline:'none', background:C.surface, cursor:'pointer' }}>
        {options.map(o => <option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
      </select>
    </div>
  );
}
function Btn({ children, onClick, variant='primary', size='md', style:sx={} }) {
  const base = { border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:700, borderRadius:12, display:'inline-flex', alignItems:'center', gap:6, transition:'all 200ms' };
  const sizes = { sm:{padding:'6px 14px',fontSize:12}, md:{padding:'10px 20px',fontSize:13}, lg:{padding:'12px 24px',fontSize:14} };
  const variants = { primary:{background:`linear-gradient(135deg,${C.primary},${C.accent})`,color:'#fff'}, secondary:{background:C.primaryLight,color:C.primary}, danger:{background:C.danger,color:'#fff'}, ghost:{background:'transparent',color:C.textSub} };
  return <button onClick={onClick} style={{...base,...sizes[size],...variants[variant],...sx}} onMouseOver={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 4px 16px rgba(124,58,237,0.25)';}} onMouseOut={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='none';}}>{children}</button>;
}

/* ── 예약 관리 ── */
function BookingPage({ showToast, setDrawer }) {
  const [view, setView] = useState('timeline');
  const [modal, setModal] = useState(null);

  function getBookingForCell(dayIdx, hour) {
    const dateMap = { 0:'2025-07-07', 1:'2025-07-08', 2:'2025-07-09' };
    return BOOKINGS.find(b => {
      if (b.date !== dateMap[dayIdx]) return false;
      const startH = parseInt(b.time.split('-')[0].split(':')[0]);
      const endH = parseInt(b.time.split('-')[1].split(':')[0]);
      return parseInt(hour) >= startH && parseInt(hour) < endH;
    });
  }

  return (
    <div style={{ animation:'fadeIn 300ms ease' }}>
      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:16 }}>
        <div style={{ display:'flex', gap:8 }}>
          <Btn variant={view==='timeline'?'primary':'secondary'} size="sm" onClick={()=>setView('timeline')}>타임라인</Btn>
          <Btn variant={view==='list'?'primary':'secondary'} size="sm" onClick={()=>setView('list')}>목록</Btn>
        </div>
        <Btn onClick={()=>setModal('create')}>+ 예약 등록</Btn>

      {view === 'timeline' && (

          <div style={{ display:'grid', gridTemplateColumns:'60px repeat(7,1fr)', gap:0, fontSize:11 }}>
            <div style={{ padding:4, borderBottom:`2px solid ${C.border}` }}></div>
            {WEEKDAYS.map(d => <div key={d} style={{ padding:'6px 4px', textAlign:'center', fontWeight:700, borderBottom:`2px solid ${C.border}`, fontSize:11, color:C.textSub }}>{d}</div>)}

                  const b = getBookingForCell(dayIdx, h);
                  return <div key={dayIdx} style={{ padding:2, borderBottom:`1px solid ${C.border}`, borderLeft:`1px solid ${C.border}30`, background:b?(b.status==='확정'?C.primaryLight+'80':b.status==='대기'?'#FEF3C7':'#FEE2E2'):'transparent', cursor:b?'pointer':'default', minHeight:32, borderRadius:b?4:0, display:'flex', alignItems:'center', justifyContent:'center' }}

                    {b && <span style={{ fontSize:10, fontWeight:600, color:b.status==='확정'?C.primary:b.status==='대기'?C.warning:C.danger }}>{b.guest}</span>}

            ))}
          </div>
        </div>
      )}

      {view === 'list' && (
        <div style={{ background:C.surface, borderRadius:C.card.borderRadius, boxShadow:C.card.boxShadow, padding:C.card.padding }}>
          {BOOKINGS.map((b,i) => (

                <div style={{ fontSize:12, color:C.textSub }}>{b.space} · {b.type}</div>
              </div>
              <div style={{ fontSize:13, fontWeight:600 }}>{b.amount.toLocaleString()}원</div>
              <StatusBadge status={b.status} />
            </div>
          ))}

        {tab==='booking' && <BookingPage showToast={showToast} setDrawer={setDrawer} />}
        {tab==='customer' && <CustomerPage setDrawer={setDrawer} />}
        {tab==='review' && <ReviewPage showToast={showToast} />}
        {tab==='pricing' && <PricingPage showToast={showToast} />}
      </main>

      {/* Drawer */}
      <Drawer open={!!drawer} onClose={()=>setDrawer(null)} title={drawer?.type==='customer'?'고객 상세':drawer?.guest?'예약 상세':'공간 상세'}>
        {drawer && drawer.hourlyRate !== undefined && (
          <div>
            <div style={{ textAlign:'center', fontSize:48, marginBottom:16 }}>{drawer.image}</div>
            <h3 style={{ fontSize:18, fontWeight:800, marginBottom:4 }}>{drawer.name}</h3>
            <div style={{ fontSize:13, color:C.textSub, marginBottom:20 }}>{drawer.type} · 최대 {drawer.capacity}인</div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:20 }}>
              <div style={{ padding:16, background:C.bg, borderRadius:12, textAlign:'center' }}>
                <div style={{ fontSize:11, color:C.textSub }}>시간당 요금</div>
                <div style={{ fontSize:18, fontWeight:800, color:C.primary }}>{drawer.hourlyRate.toLocaleString()}원</div>
              </div>
              <div style={{ padding:16, background:C.bg, borderRadius:12, textAlign:'center' }}>
                <div style={{ fontSize:11, color:C.textSub }}>평점</div>
                <div style={{ fontSize:18, fontWeight:800 }}>⭐ {drawer.rating}</div>
              </div>
              <div style={{ padding:16, background:C.bg, borderRadius:12, textAlign:'center' }}>
                <div style={{ fontSize:11, color:C.textSub }}>오늘 예약</div>
                <div style={{ fontSize:18, fontWeight:800 }}>{drawer.bookingsToday}건</div>
              </div>
              <div style={{ padding:16, background:C.bg, borderRadius:12, textAlign:'center' }}>
                <div style={{ fontSize:11, color:C.textSub }}>가동률</div>
                <div style={{ fontSize:18, fontWeight:800 }}>{drawer.utilization}%</div>
              </div>
            </div>
          </div>
        )}
        {drawer && drawer.guest && (
          <div>
            <InputField label="예약자" value={drawer.guest} readOnly />
            <InputField label="공간" value={drawer.space} readOnly />
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 16px' }}>
              <InputField label="날짜" value={drawer.date} readOnly />
              <InputField label="시간" value={drawer.time} readOnly />
            </div>
            <InputField label="이용 목적" value={drawer.type} readOnly />
            <InputField label="금액" value={`${drawer.amount.toLocaleString()}원`} readOnly />
            <div style={{ marginBottom:16 }}><StatusBadge status={drawer.status} /></div>
            <div style={{ display:'flex', gap:8 }}>
              <Btn variant="secondary" onClick={()=>{setDrawer(null);showToast('예약이 수정되었습니다');}}>수정</Btn>
              {drawer.status === '대기' && <Btn onClick={()=>{setDrawer(null);showToast('예약이 확정되었습니다');}}>확정</Btn>}
              {drawer.status !== '취소' && <Btn variant="danger" size="sm" onClick={()=>{setDrawer(null);showToast('예약이 취소되었습니다');}}>취소</Btn>}
            </div>
          </div>
        )}
        {drawer && drawer.type === 'customer' && (
          <div>
            <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
              <div style={{ width:56, height:56, borderRadius:28, background:`linear-gradient(135deg,${C.primary},${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:22, fontWeight:800 }}>{drawer.name[0]}</div>
              <div>
                <div style={{ fontSize:18, fontWeight:800 }}>{drawer.name}</div>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:4 }}><GradeBadge grade={drawer.grade} /><span style={{ fontSize:12, color:C.textLight }}>가입 {drawer.joinDate}</span></div>
              </div>
            </div>
            <InputField label="이메일" value={drawer.email} readOnly />
            <InputField label="연락처" value={drawer.phone} readOnly />
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:16 }}>
              <div style={{ padding:16, background:C.bg, borderRadius:12, textAlign:'center' }}>
                <div style={{ fontSize:11, color:C.textSub }}>총 방문</div>
                <div style={{ fontSize:20, fontWeight:800 }}>{drawer.visits}회</div>
              </div>
              <div style={{ padding:16, background:C.bg, borderRadius:12, textAlign:'center' }}>
                <div style={{ fontSize:11, color:C.textSub }}>누적 금액</div>
                <div style={{ fontSize:20, fontWeight:800, color:C.primary }}>{(drawer.totalSpent/10000).toFixed(0)}만원</div>
              </div>
            </div>
            <InputField label="선호 공간" value={drawer.favoriteSpace} readOnly />
            <InputField label="최근 방문" value={drawer.lastVisit} readOnly />
          </div>
        )}
      </Drawer>

      {toast && <Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

/* ── 스켈레톤 + 엔트리 ── */
function SkeletonLoader() {
  return (
    <div style={{ minHeight:'100vh', background:C.bg }}>
      <div style={{ height:56, background:C.surface, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', padding:'0 24px', gap:16 }}>
        <div className="skeleton" style={{ height:24, width:140 }} />
        {[...Array(5)].map((_,i) => <div key={i} className="skeleton" style={{ height:16, width:60 }} />)}
      </div>
      <div className="skeleton" style={{ height:116, margin:0 }} />
      <div style={{ padding:24 }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:16 }}>
          {[...Array(6)].map((_,i) => <div key={i} className="skeleton" style={{ height:180 }} />)}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [loading, setLoading] = useState(true);
  useEffect(() => { setTimeout(() => setLoading(false), 1500); }, []);
  if (loading) return <SkeletonLoader />;
  return <MainApp />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
