          <span style={{ fontSize:16, fontWeight:700, color:C.text }}>{title}</span>

        <div style={{ padding:'20px 24px' }}>{children}</div>
      </div>
    </div>
  );
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2500); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:28, right:28, background:C.secondary, color:'#fff', padding:'12px 20px', borderRadius:10, zIndex:2000, fontSize:13, fontWeight:500, boxShadow:'0 8px 24px rgba(0,0,0,0.2)', animation:'slideUp 200ms ease', display:'flex', alignItems:'center', gap:8 }}>

  );
}

// ── Booking Page ──
function BookingPage({ toast }) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [modal, setModal] = useState(null);
  const [detail, setDetail] = useState(null);

  const filtered = BOOKINGS.filter(b => {
    if(filter!=='all' && b.status!==filter) return false;
    if(search && !b.customer.toLowerCase().includes(search.toLowerCase()) && !b.id.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const FILTERS = ['all','pending','confirmed','dispatched','ongoing','completed','cancelled'];
  const FILTER_LABELS = { all:'전체', pending:'대기', confirmed:'확정', dispatched:'배차', ongoing:'운행중', completed:'완료', cancelled:'취소' };

  return (
    <div style={{ padding:24, animation:'fadeIn 250ms ease' }}>
      {/* Controls */}
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:16 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, background:C.surface, borderRadius:8, padding:'8px 12px', border:`1px solid ${C.border}`, flex:1, maxWidth:320 }}>
          <span style={{ color:C.text3 }}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="예약번호, 고객명 검색..." style={{ border:'none', outline:'none', fontSize:13, color:C.text, background:'transparent', flex:1 }} />
        </div>
        <div style={{ display:'flex', gap:6 }}>
          {FILTERS.map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{ padding:'7px 12px', borderRadius:7, border:`1px solid ${filter===f?C.primary:C.border}`, background:filter===f?C.primaryLight:'transparent', color:filter===f?C.primary:C.text2, fontSize:12, fontWeight:600, cursor:'pointer' }}>
              {FILTER_LABELS[f]}
            </button>
          ))}
        </div>
        <button onClick={()=>setModal('create')} style={{ marginLeft:'auto', padding:'9px 18px', borderRadius:8, border:'none', background:C.primary, color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer' }}>
          + 예약 등록
        </button>
      </div>
      {/* Summary cards */}
      <div style={{ display:'flex', gap:10, marginBottom:16 }}>
        {[{l:'전체',v:BOOKINGS.length,c:C.text2},{l:'대기/확정',v:BOOKINGS.filter(b=>['pending','confirmed'].includes(b.status)).length,c:C.primary},{l:'운행중',v:BOOKINGS.filter(b=>['dispatched','ongoing'].includes(b.status)).length,c:C.success},{l:'오늘 매출',v:'₩'+fmtNum(BOOKINGS.filter(b=>b.status==='completed').reduce((a,b)=>a+b.price,0)),c:C.warning}].map(s=>(
          <div key={s.l} style={{ background:C.surface, borderRadius:10, padding:'12px 16px', border:`1px solid ${C.border}`, flex:1 }}>
            <div style={{ fontSize:11, color:C.text2, marginBottom:4 }}>{s.l}</div>
            <div style={{ fontSize:20, fontWeight:800, color:s.c }}>{s.v}</div>
          </div>
        ))}
      </div>
      {/* Table */}
      <div style={{ background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ background:C.bg }}>
              {['예약번호','고객명','출발지','목적지','차량','일시','금액','상태','배차기사',''].map(h=>(

                <td style={{ padding:'12px 14px', fontSize:12, fontWeight:700, color:C.primary }}>{b.id}</td>
                <td style={{ padding:'12px 14px', fontSize:13, fontWeight:600, color:C.text }}>{b.customer}</td>
                <td style={{ padding:'12px 14px', fontSize:12, color:C.text2, maxWidth:140 }}><div style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{b.from}</div></td>
                <td style={{ padding:'12px 14px', fontSize:12, color:C.text2, maxWidth:120 }}><div style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{b.to}</div></td>

              </tr>

      </div>
      {/* Detail modal */}

        <Modal title={`예약 상세 — ${detail.id}`} onClose={()=>setDetail(null)} width={600}>

            {[['예약번호',detail.id],['고객명',detail.customer],['연락처',detail.phone],['출발지',detail.from],['목적지',detail.to],['차량 유형',detail.vehicle],['탑승 인원',`${detail.passengers}명`],['예약 일시',detail.date],['금액',`${fmtNum(detail.price)}원`],['배차 기사',detail.driver],['기사 연락처',detail.driverPhone]].map(([k,v])=>(
              <div key={k}>
                <div style={{ fontSize:11, color:C.text2, marginBottom:4 }}>{k}</div>
                <div style={{ fontSize:13, fontWeight:600, color:C.text }}>{v}</div>
              </div>
            ))}
            <div>
              <div style={{ fontSize:11, color:C.text2, marginBottom:4 }}>상태</div>
              <Badge label={statusLabel(detail.status)} color={statusColor(detail.status)} />
            </div>
          </div>
          <div style={{ marginTop:16 }}>
            <div style={{ fontSize:11, color:C.text2, marginBottom:6 }}>관리자 메모</div>

          </div>
          <div style={{ display:'flex', justifyContent:'flex-end', gap:10, marginTop:16 }}>
            <button onClick={()=>setDetail(null)} style={{ padding:'9px 20px', borderRadius:8, border:`1px solid ${C.border}`, background:'transparent', color:C.text2, fontSize:13, cursor:'pointer' }}>닫기</button>
            <button onClick={()=>{setDetail(null);toast('상태가 업데이트되었습니다.');}} style={{ padding:'9px 20px', borderRadius:8, border:'none', background:C.primary, color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer' }}>저장</button>
          </div>
        </Modal>
      )}
      {/* Create modal */}
      {modal==='create' && (
        <Modal title="신규 예약 등록" onClose={()=>setModal(null)}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            {[['고객명','text','홍길동'],['연락처','text','010-0000-0000'],['출발지','text','인천국제공항 T1'],['목적지','text','강남구 역삼동'],['탑승 인원','number','2'],['예약 일시','datetime-local','']].map(([l,t,p])=>(
              <div key={l}>
                <div style={{ fontSize:12, color:C.text2, marginBottom:5 }}>{l}</div>
                <input type={t} placeholder={p} style={{ width:'100%', padding:'8px 12px', border:`1px solid ${C.border}`, borderRadius:8, fontSize:13, outline:'none', color:C.text }} />
              </div>
            ))}
            <div>
              <div style={{ fontSize:12, color:C.text2, marginBottom:5 }}>차량 유형</div>
              <select style={{ width:'100%', padding:'8px 12px', border:`1px solid ${C.border}`, borderRadius:8, fontSize:13, outline:'none', color:C.text }}>
                {['소형 콜밴','대형 콜밴','리무진 밴','미니버스(솔라티)','대형버스(28인승)'].map(v=><option key={v}>{v}</option>)}
              </select>

          <div style={{ display:'flex', justifyContent:'flex-end', gap:10, marginTop:20 }}>

            <button onClick={()=>{setModal(null);toast('예약이 등록되었습니다.');}} style={{ padding:'9px 20px', borderRadius:8, border:'none', background:C.primary, color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer' }}>등록</button>
          </div>
        </Modal>

    </div>

  return (
    <div style={{ padding:48, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:16, color:C.text2 }}>

// ── App ──
function App() {
  const [page, setPage] = useState('dashboard');
  const [toast, setToast] = useState(null);
  const showToast = (msg) => setToast(msg);

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden' }}>
      <Sidebar page={page} setPage={setPage} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <TopBar title={PAGE_TITLES[page] || page} />
        <main style={{ flex:1, overflow:'auto', background:'#F0F4FA' }} className="scrollbar-hide">
          {page==='dashboard' && <DashboardPage />}
          {page==='booking' && <BookingPage toast={showToast} />}
          {page==='dispatch' && <DispatchPage toast={showToast} />}
          {page==='drivers' && <DriversPage toast={showToast} />}
          {page==='vehicles' && <VehiclesPage toast={showToast} />}
          {!['dashboard','booking','dispatch','drivers','vehicles'].includes(page) && <PlaceholderPage name={PAGE_TITLES[page]} />}
        </main>
      </div>
      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
