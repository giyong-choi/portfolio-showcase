function App() {
  const [tab, setTab] = useState('matching');
  const [toast, setToast] = useState(null);
  const showToast = msg => setToast(msg);

  const renderContent = () => {
    if(tab==='matching') return <MatchingPage toast={showToast} />;
    if(tab==='schedule') return <SchedulePage toast={showToast} />;
    if(tab==='caregiver-profile') return <CaregiverProfilePage toast={showToast} />;
    if(tab==='settlement') return <SettlementPage />;
    if(tab==='request-tracking') return <RequestTrackingPage toast={showToast} />;
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', width:'100%', minHeight:'100vh', background:C.bg }}>
      <Header tab={tab} setTab={setTab} />
      <HeroBanner meta={PAGE_META[tab]} />
      <main>{renderContent()}</main>
      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
