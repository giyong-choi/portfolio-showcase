*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#FAF5FF;color:#1E1B4B;overflow:hidden}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.skeleton{background:linear-gradient(90deg,#F3E8FF 25%,#E9D5FF 50%,#F3E8FF 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C4B5FD;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#A78BFA}

// ── Utility Components ──
function Badge({children,color=C.primary,bg}){
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 12px',borderRadius:24,fontSize:12,fontWeight:600,color,background:bg||color+'18'}}>{children}</span>;
}
function VerdictBadge({verdict}){
  const map = {'적용가능':{color:C.success,bg:'#D1FAE5'},'조건부':{color:C.warning,bg:'#FEF3C7'},'검토필요':{color:C.danger,bg:'#FEE2E2'},'불가':{color:'#6B7280',bg:'#F3F4F6'}};
  const s = map[verdict]||{color:C.textLight,bg:'#F3F4F6'};
  return <Badge color={s.color} bg={s.bg}>{verdict}</Badge>;
}
function TypeBadge({type}){
  const map = {'행위':{color:'#7C3AED',bg:'#EDE9FE'},'약제':{color:'#0284C7',bg:'#E0F2FE'},'재료':{color:'#D97706',bg:'#FEF3C7'}};
  const s = map[type]||{color:C.textSub,bg:'#F3F4F6'};
  return <Badge color={s.color} bg={s.bg}>{type}</Badge>;
}
function StatusBadge({status}){
  const map = {mapped:{color:C.success,bg:'#D1FAE5',label:'매핑완료'},review:{color:C.warning,bg:'#FEF3C7',label:'검토필요'},confirmed:{color:'#7C3AED',bg:'#EDE9FE',label:'확정'}};
  const s = map[status]||{color:C.textLight,bg:'#F3F4F6',label:status};
  return <Badge color={s.color} bg={s.bg}>{s.label}</Badge>;
}
function CountUp({end,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/50;const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},24);return()=>clearInterval(t);},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}
function Toast({message,type='success',onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  const bg = type==='success'?C.success:type==='error'?C.danger:C.primary;
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 20px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(0,0,0,0.25)',display:'flex',alignItems:'center',gap:10,minWidth:240,borderLeft:`4px solid ${bg}`}}>
      <span style={{fontSize:14}}>{message}</span>
    </div>
  );
}
function Modal({title,onClose,children,width=560}){
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:300}}/>
      <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',zIndex:301,background:C.surface,borderRadius:20,width,maxWidth:'95vw',maxHeight:'90vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.2)',animation:'fadeInScale 200ms ease'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <span style={{fontSize:16,fontWeight:700}}>{title}</span>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:C.textLight,lineHeight:1}}>×</button>
        </div>
        <div style={{padding:24}}>{children}</div>
      </div>
    </>
  );
}
function FormField({label,children,required}){
  return(
    <div style={{marginBottom:16}}>
      <label style={{display:'block',fontSize:13,fontWeight:600,color:C.textSub,marginBottom:6}}>{label}{required&&<span style={{color:C.danger,marginLeft:2}}>*</span>}</label>
      {children}
    </div>
  );
}
function Card({children,style={},hover=true}){
  const [h,setH]=useState(false);
  return(
    <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{background:C.surface,borderRadius:C.card.borderRadius,boxShadow:h&&hover?'0 8px 24px rgba(0,0,0,0.15)':C.card.boxShadow,padding:C.card.padding,transition:'all 200ms ease',transform:h&&hover?'scale(1.01)':'none',...style}}>
      {children}
    </div>
  );
}
function ConfidenceBar({rate}){
  const color = rate>=90?C.success:rate>=80?'#7C3AED':rate>=70?C.warning:C.danger;
  return(
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      <div style={{flex:1,height:6,borderRadius:3,background:'#E5E7EB'}}>
        <div style={{height:'100%',borderRadius:3,background:color,width:`${rate}%`,animation:'barGrow 800ms ease',['--target-width']:`${rate}%`}}/>
      </div>
      <span style={{fontSize:12,fontWeight:600,color,minWidth:36}}>{rate}%</span>
    </div>
  );
}
function Pagination({current,total,onChange}){
  return(
    <div style={{display:'flex',alignItems:'center',gap:4,justifyContent:'center',marginTop:16}}>
      <button onClick={()=>onChange(Math.max(1,current-1))} disabled={current===1}
        style={{...btnSecondary,padding:'6px 10px',fontSize:12,opacity:current===1?0.4:1}}>‹ 이전</button>
      {Array.from({length:total},(_,i)=>i+1).map(p=>
        <button key={p} onClick={()=>onChange(p)} style={{...btnSecondary,padding:'6px 12px',fontSize:12,
          background:p===current?`linear-gradient(135deg,${C.primary},${C.accent})`:'transparent',color:p===current?'#fff':C.primary,border:p===current?'none':`1px solid ${C.primary}`}}>{p}</button>
      )}
      <button onClick={()=>onChange(Math.min(total,current+1))} disabled={current===total}
        style={{...btnSecondary,padding:'6px 10px',fontSize:12,opacity:current===total?0.4:1}}>다음 ›</button>
    </div>
  );
}

// ── Drawer (Slide-over) ──
function Drawer({item,onClose,onConfirm,onReject}){
  if(!item) return null;
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:200}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:500,background:C.surface,boxShadow:'-8px 0 40px rgba(0,0,0,0.15)',zIndex:201,overflowY:'auto',padding:28,animation:'slideInRight 200ms ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
          <span style={{fontSize:18,fontWeight:700}}>코드 상세</span>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:C.textLight}}>✕</button>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:20}}>
          <TypeBadge type={item.type}/><StatusBadge status={item.status}/><VerdictBadge verdict={item.verdict}/>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,color:C.textLight,marginBottom:4}}>진료 코드</div>
          <div style={{fontSize:22,fontWeight:800,color:C.primary}}>{item.code}</div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,color:C.textLight,marginBottom:4}}>진료 항목명</div>
          <div style={{fontSize:15,fontWeight:600}}>{item.name}</div>
        </div>
        <div style={{padding:16,borderRadius:12,background:C.primaryLight,marginBottom:20}}>
          <div style={{fontSize:12,color:C.primary,fontWeight:600,marginBottom:6}}>AI 매핑 급여기준</div>
          <div style={{fontSize:14,fontWeight:600,color:C.secondary}}>{item.matched}</div>
          <div style={{fontSize:12,color:C.textSub,marginTop:4}}>참조 페이지: p.{item.page}</div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,color:C.textLight,marginBottom:8}}>매핑 신뢰도</div>
          <ConfidenceBar rate={item.confidence}/>
        </div>
        <div style={{padding:16,borderRadius:12,border:`1px solid ${C.border}`,marginBottom:20}}>
          <div style={{fontSize:12,color:C.textLight,marginBottom:8}}>관련 조항 원문 (발췌)</div>
          <div style={{fontSize:13,lineHeight:1.8,color:C.text}}>
            제{Math.floor(Math.random()*20+1)}조(급여기준) ① 요양기관이 제공하는 {item.name}에 대하여는 이 고시에서 정하는 바에 따라 요양급여를 실시한다. ② 해당 항목의 산정은 별표 {Math.floor(Math.random()*10+1)}에서 정한 기준에 의한다.
          </div>
        </div>
        <div style={{display:'flex',gap:12}}>
          {item.status!=='confirmed'&&<button onClick={()=>{onConfirm(item.id);onClose();}} style={{...btnPrimary,flex:1}}>✅ 확정</button>}
          {item.status==='confirmed'&&<button onClick={()=>{onReject(item.id);onClose();}} style={{...btnSecondary,flex:1}}>↩️ 반려</button>}
          <button onClick={onClose} style={{...btnSecondary,flex:1}}>닫기</button>
        </div>
      </div>
    </>
  );
}

// ── Code Input Page ──
function CodeInputPage({toast}){
  const [text,setText]=useState('');
  const [parsed,setParsed]=useState([]);
  const [processing,setProcessing]=useState(false);
  const [progress,setProgress]=useState(0);
  const [done,setDone]=useState(false);

  const sampleText = "AA157 경피적관상동맥중재술\nAA261 복강경하 담낭절제술\n641601ATB 아목시실린캡슐 500mg\nM2041 인공관절 임플란트\nBB101 흉부 X-ray (2매)\nCC202 혈액투석(주 3회)\n641300ATB 세프트리악손주사 1g\nDD301 자기공명영상(MRI) 뇌";

  const handleSample=()=>{
    setText(sampleText);
    const lines=sampleText.split('\n').filter(l=>l.trim());
    setParsed(lines.map((l,i)=>{
      const parts=l.trim().split(/\s+/);
      const code=parts[0];
      const name=parts.slice(1).join(' ');
      const type=code.startsWith('M')?'재료':/^\d/.test(code)?'약제':'행위';
      return {id:i+1,code,name,type,valid:true};
    }));
  };

  const handleParse=()=>{
    if(!text.trim()) return;
    const lines=text.split('\n').filter(l=>l.trim());
    setParsed(lines.map((l,i)=>{
      const parts=l.trim().split(/\s+/);
      const code=parts[0]||'';
      const name=parts.slice(1).join(' ')||parts[0];
      const type=code.startsWith('M')?'재료':/^\d/.test(code)?'약제':'행위';
      return {id:i+1,code,name,type,valid:code.length>=2};
    }));
  };

  const handleSubmit=()=>{
    if(parsed.length===0)return;
    setProcessing(true);setProgress(0);setDone(false);
    const interval=setInterval(()=>{
      setProgress(p=>{
        if(p>=100){clearInterval(interval);setProcessing(false);setDone(true);toast('AI 매핑 처리가 완료되었습니다.','success');return 100;}
        return p+3;
      });
    },50);
  };

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <Card>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div style={{fontSize:16,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',fontSize:13}}>진료 코드 입력</div>
            <button onClick={handleSample} style={{...btnSecondary,padding:'6px 14px',fontSize:12}}>샘플 데이터</button>
          </div>
          <FormField label="진료 코드 리스트" required>
            <textarea value={text} onChange={e=>{setText(e.target.value);setParsed([]);setDone(false);}}
              placeholder="코드 항목명 형식으로 입력합니다&#10;예: AA157 경피적관상동맥중재술&#10;한 줄에 하나의 코드를 입력합니다"
              style={{...inputStyle,height:260,resize:'none',lineHeight:1.7}}/>
          </FormField>
          <div style={{display:'flex',gap:12}}>
            <button onClick={handleParse} style={{...btnSecondary,flex:1}} disabled={!text.trim()}>📋 파싱</button>
            <button onClick={handleSubmit} style={{...btnPrimary,flex:1,opacity:parsed.length?1:0.5}} disabled={parsed.length===0||processing}>🚀 AI 매핑 시작</button>
          </div>
        </Card>

        <Card>
          <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:16}}>파싱 결과</div>
          {processing&&(
            <div style={{marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <span style={{fontSize:13,fontWeight:600,color:C.primary}}>급여기준 매핑 중...</span>
                <span style={{fontSize:13,fontWeight:700,color:C.primary}}>{progress}%</span>
              </div>
              <div style={{height:8,borderRadius:4,background:'#F3E8FF'}}>
                <div style={{height:'100%',borderRadius:4,background:`linear-gradient(90deg,${C.primary},${C.accent})`,width:`${progress}%`,transition:'width 80ms'}}/>
              </div>
            </div>
          )}
          {done&&(
            <div style={{padding:14,borderRadius:12,background:'#D1FAE5',marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:18}}>✅</span>
              <div><div style={{fontSize:14,fontWeight:600,color:'#065F46'}}>매핑 완료</div><div style={{fontSize:12,color:'#047857'}}>{parsed.length}건 처리 완료</div></div>
            </div>
          )}
          {parsed.length>0?(
            <div style={{maxHeight:done?320:380,overflowY:'auto'}}>
              {parsed.map((p,i)=>(
                <div key={p.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',borderBottom:`1px solid ${C.border}`,animation:`slideInRight 200ms ease ${i*40}ms both`}}>
                  <span style={{fontSize:12,color:C.textLight,width:24}}>{p.id}</span>
                  <TypeBadge type={p.type}/>
                  <span style={{fontSize:13,fontWeight:600,color:C.primary,minWidth:80}}>{p.code}</span>
                  <span style={{fontSize:13,flex:1}}>{p.name}</span>
                  {p.valid?<span style={{color:C.success}}>✓</span>:<span style={{color:C.danger}}>✕</span>}
                </div>
              ))}
            </div>
          ):(
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:300,color:C.textLight}}>
              <span style={{fontSize:48,marginBottom:12}}>📋</span>
              <span style={{fontSize:14}}>진료 코드를 입력하세요</span>
            </div>
          )}
        </Card>
      </div>
    </div>
  );
}

// ── Mapping Result Page ──
function MappingResultPage({toast}){
  const [items,setItems]=useState(CODES_DATA);
  const [filter,setFilter]=useState('all');
  const [drawerItem,setDrawerItem]=useState(null);
  const [currentPage,setCurrentPage]=useState(1);

  const filtered = filter==='all'?items:items.filter(i=>i.status===filter);
  const totalPages = Math.ceil(filtered.length/PER_PAGE);
  const paged = filtered.slice((currentPage-1)*PER_PAGE,currentPage*PER_PAGE);

  const handleConfirm=(id)=>{setItems(prev=>prev.map(i=>i.id===id?{...i,status:'confirmed',verdict:'적용가능'}:i));toast('확정되었습니다.','success');};
  const handleReject=(id)=>{setItems(prev=>prev.map(i=>i.id===id?{...i,status:'review',verdict:'검토필요'}:i));toast('반려되었습니다.','info');};

  const tabs=[{id:'all',label:'전체',count:items.length},{id:'mapped',label:'매핑완료',count:items.filter(i=>i.status==='mapped').length},{id:'review',label:'검토필요',count:items.filter(i=>i.status==='review').length},{id:'confirmed',label:'확정',count:items.filter(i=>i.status==='confirmed').length}];

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>{setFilter(t.id);setCurrentPage(1);}}
            style={{padding:'8px 16px',borderRadius:10,border:filter===t.id?'none':`1px solid ${C.border}`,background:filter===t.id?`linear-gradient(135deg,${C.primary},${C.accent})`:'transparent',color:filter===t.id?'#fff':C.textLight,fontSize:13,fontWeight:filter===t.id?700:400,cursor:'pointer',fontFamily:'inherit'}}>
            {t.label} ({t.count})
          </button>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {paged.map((item,i)=>(
          <Card key={item.id} style={{animation:`slideUp 400ms ease ${i*80}ms both`,cursor:'pointer'}} hover
            onClick={()=>setDrawerItem(item)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <div style={{display:'flex',gap:6}}><TypeBadge type={item.type}/><VerdictBadge verdict={item.verdict}/></div>
              <StatusBadge status={item.status}/>
            </div>
            <div style={{fontSize:18,fontWeight:800,color:C.primary,marginBottom:4}}>{item.code}</div>
            <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>{item.name}</div>
            <div style={{padding:12,borderRadius:10,background:C.bg,marginBottom:12}}>
              <div style={{fontSize:11,color:C.textLight,marginBottom:4}}>매핑 급여기준</div>
              <div style={{fontSize:12,fontWeight:500,color:C.secondary}}>{item.matched}</div>
              <div style={{fontSize:11,color:C.textLight,marginTop:4}}>p.{item.page}</div>
            </div>
            <ConfidenceBar rate={item.confidence}/>
          </Card>
        ))}
      </div>
      {totalPages>1 && <Pagination current={currentPage} total={totalPages} onChange={setCurrentPage}/>}

      <Drawer item={drawerItem} onClose={()=>setDrawerItem(null)} onConfirm={handleConfirm} onReject={handleReject}/>
    </div>
  );
}

// ── Review Page ──
function ReviewPage({toast}){
  const [items,setItems]=useState(CODES_DATA);
  const [filter,setFilter]=useState('all');
  const [currentPage,setCurrentPage]=useState(1);
  const [opinionModal,setOpinionModal]=useState(null);
  const [opinion,setOpinion]=useState('');
  const [verdictChoice,setVerdictChoice]=useState('');

  const filtered = filter==='all'?items:items.filter(i=>i.status===filter);
  const totalPages = Math.ceil(filtered.length/PER_PAGE);
  const paged = filtered.slice((currentPage-1)*PER_PAGE,currentPage*PER_PAGE);

  const handleConfirm=(id)=>{setItems(prev=>prev.map(i=>i.id===id?{...i,status:'confirmed'}:i));toast('확정되었습니다.','success');};
  const handleReject=(id)=>{setItems(prev=>prev.map(i=>i.id===id?{...i,status:'review'}:i));toast('반려되었습니다.','info');};

  const submitOpinion=()=>{
    if(!opinion.trim()) return;
    setItems(prev=>prev.map(i=>i.id===opinionModal.id?{...i,status:'confirmed',verdict:verdictChoice||i.verdict}:i));
    setOpinionModal(null);setOpinion('');setVerdictChoice('');
    toast('심사 의견이 등록되었습니다.','success');
  };

  const tabs=[{id:'all',label:'전체'},{id:'review',label:'검토 대기'},{id:'confirmed',label:'확정'}];

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:24}}>
        {[{l:'검토 대기',v:items.filter(i=>i.status!=='confirmed').length,c:C.warning},{l:'확정 완료',v:items.filter(i=>i.status==='confirmed').length,c:C.success},{l:'진행률',v:Math.round(items.filter(i=>i.status==='confirmed').length/items.length*100),c:C.primary,s:'%'}].map((k,i)=>(
          <Card key={i} style={{animation:`slideUp 400ms ease ${i*80}ms both`,textAlign:'center'}}>
            <div style={{fontSize:13,color:C.textLight,marginBottom:6}}>{k.l}</div>
            <div style={{fontSize:28,fontWeight:800,color:k.c}}><CountUp end={k.v} suffix={k.s||'건'}/></div>
          </Card>
        ))}
      </div>

      <Card>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{display:'flex',gap:8}}>
            {tabs.map(t=><button key={t.id} onClick={()=>{setFilter(t.id);setCurrentPage(1);}} style={{padding:'8px 16px',borderRadius:10,border:filter===t.id?'none':`1px solid ${C.border}`,background:filter===t.id?`linear-gradient(135deg,${C.primary},${C.accent})`:'transparent',color:filter===t.id?'#fff':C.textLight,fontSize:13,fontWeight:filter===t.id?700:400,cursor:'pointer',fontFamily:'inherit'}}>{t.label}</button>)}
          </div>
        </div>

        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{borderBottom:`2px solid ${C.border}`}}>
              {['코드','항목명','유형','매핑 급여기준','신뢰도','판정','상태','작업'].map(h=><th key={h} style={{padding:'10px 8px',fontSize:12,fontWeight:700,color:C.textLight,textAlign:'left',textTransform:'uppercase',letterSpacing:'0.05em'}}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {paged.map((item,i)=>(
              <tr key={item.id} style={{borderBottom:`1px solid ${C.border}`,transition:'background 150ms',cursor:'pointer'}}
                onMouseEnter={e=>{e.currentTarget.style.background=C.primary+'06';e.currentTarget.style.borderLeft=`3px solid ${C.primary}`;}}
                onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderLeft='none';}}>
                <td style={{padding:'12px 8px',fontSize:13,fontWeight:600,color:C.primary}}>{item.code}</td>
                <td style={{padding:'12px 8px',fontSize:13}}>{item.name}</td>
                <td style={{padding:'12px 8px'}}><TypeBadge type={item.type}/></td>
                <td style={{padding:'12px 8px',fontSize:12,color:C.secondary,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.matched}</td>
                <td style={{padding:'12px 8px',width:110}}><ConfidenceBar rate={item.confidence}/></td>
                <td style={{padding:'12px 8px'}}><VerdictBadge verdict={item.verdict}/></td>
                <td style={{padding:'12px 8px'}}><StatusBadge status={item.status}/></td>
                <td style={{padding:'12px 8px'}}>
                  <div style={{display:'flex',gap:4}}>
                    <button onClick={()=>{setOpinionModal(item);setVerdictChoice(item.verdict);}} style={{background:'none',border:'none',cursor:'pointer',fontSize:14}} title="의견 등록">💬</button>
                    {item.status!=='confirmed'&&<button onClick={()=>handleConfirm(item.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14}} title="확정">✅</button>}
                    {item.status==='confirmed'&&<button onClick={()=>handleReject(item.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14}} title="반려">↩️</button>}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {totalPages>1 && <Pagination current={currentPage} total={totalPages} onChange={setCurrentPage}/>}
      </Card>

      <Card style={{marginTop:16}}>
        <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:16}}>심사 이력 타임라인</div>
        {REVIEW_HISTORY.map((h,i)=>(
          <div key={i} style={{display:'flex',gap:16,padding:'12px 0',borderBottom:i<REVIEW_HISTORY.length-1?`1px solid ${C.border}`:'none'}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',minWidth:16}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:h.action==='확정'?C.success:h.action==='수정'?C.warning:C.primary,flexShrink:0}}/>
              {i<REVIEW_HISTORY.length-1&&<div style={{width:2,flex:1,background:C.border,marginTop:4}}/>}
            </div>
            <div style={{flex:1}}>
              <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:13,fontWeight:600}}>{h.action} — {h.code}</span><span style={{fontSize:11,color:C.textLight}}>{h.date}</span></div>
              <div style={{fontSize:12,color:C.textSub,marginTop:2}}>{h.user} · {h.note}</div>
            </div>
          </div>
        ))}
      </Card>

      {opinionModal&&(
        <Modal title={`심사 의견 등록 — ${opinionModal.code}`} onClose={()=>{setOpinionModal(null);setOpinion('');setVerdictChoice('');}}>
          <div style={{padding:14,borderRadius:12,background:C.primaryLight,marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600,color:C.primary}}>{opinionModal.name}</div>
            <div style={{fontSize:12,color:C.secondary,marginTop:4}}>{opinionModal.matched}</div>
          </div>
          <FormField label="판정 변경" required>
            <div style={{display:'flex',gap:8}}>
              {['적용가능','조건부','검토필요','불가'].map(v=>(
                <button key={v} onClick={()=>setVerdictChoice(v)} style={{padding:'8px 14px',borderRadius:10,border:verdictChoice===v?`2px solid ${C.primary}`:`1px solid ${C.border}`,background:verdictChoice===v?C.primaryLight:'transparent',color:verdictChoice===v?C.primary:C.textSub,fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>{v}</button>
              ))}
            </div>
          </FormField>
          <FormField label="심사 의견" required>
            <textarea value={opinion} onChange={e=>setOpinion(e.target.value)} placeholder="판정 근거 또는 수정 사유를 입력해주세요" style={{...inputStyle,height:100,resize:'none'}}/>
          </FormField>
          <div style={{display:'flex',gap:12,marginTop:8}}>
            <button onClick={()=>{setOpinionModal(null);setOpinion('');}} style={{...btnSecondary,flex:1}}>취소</button>
            <button onClick={submitOpinion} style={{...btnPrimary,flex:1,opacity:opinion.trim()?1:0.5}} disabled={!opinion.trim()}>등록</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Skeleton ──
function SkeletonLoader(){
  return(
    <div style={{minHeight:'100vh'}}>
      <div style={{height:56,background:C.surface,borderBottom:`1px solid ${C.border}`}}/>
      <div style={{height:120,background:`linear-gradient(135deg,${C.primary}40,${C.accent}40)`}}/>
      <div style={{padding:24}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:24}}>
          {[1,2,3].map(i=><div key={i} className="skeleton" style={{height:100}}/>)}
        </div>
        <div className="skeleton" style={{height:300}}/>
      </div>
    </div>
  );
}

// ── App ──
function App(){
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('home');
  const [toasts,setToasts]=useState([]);

  useEffect(()=>{setTimeout(()=>setLoading(false),1500);},[]);

  const addToast=(msg,type='success')=>{const id=Date.now();setToasts(prev=>[...prev,{id,message:msg,type}]);};
  const removeToast=(id)=>setToasts(prev=>prev.filter(t=>t.id!==id));

  if(loading) return <SkeletonLoader/>;

  const renderContent=()=>{
    switch(tab){
      case 'home': return <HomePage/>;
      case 'code-input': return <CodeInputPage toast={addToast}/>;
      case 'mapping-result': return <MappingResultPage toast={addToast}/>;
      case 'review': return <ReviewPage toast={addToast}/>;
      default: return <HomePage/>;
    }
  };

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      <TopNav tab={tab} setTab={setTab}/>
      <HeroBanner tab={tab}/>
      <main style={{padding:'24px 32px',maxHeight:'calc(100vh - 56px - 120px)',overflow:'auto'}}>
        {renderContent()}
      </main>
      {toasts.map(t=><Toast key={t.id} message={t.message} type={t.type} onClose={()=>removeToast(t.id)}/>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
