*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

function Badge({children,color=C.primary,bg}){
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 10px',borderRadius:20,fontSize:12,fontWeight:600,color,background:bg||color+'18'}}>{children}</span>;
}
function StatusBadge({status}){
  const map = {
    matched:{color:C.success,bg:'#D1FAE5',label:'매칭완료'},
    review:{color:C.warning,bg:'#FEF3C7',label:'검토필요'},
    confirmed:{color:C.info,bg:'#DBEAFE',label:'확정'},
    '검수중':{color:C.warning,bg:'#FEF3C7'},
    '완료':{color:C.success,bg:'#D1FAE5'},
    '인덱싱중':{color:C.info,bg:'#E0F2FE'},
  };
  const s = map[status]||{color:C.textSub,bg:'#F1F5F9'};
  return <Badge color={s.color} bg={s.bg}>{s.label||status}</Badge>;
}
function CountUp({end,suffix='',prefix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/50;
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},24);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{val.toLocaleString()}{suffix}</span>;
}
function Toast({message,type='success',onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  const colors={success:'#059669',error:'#DC2626',info:'#0066CC'};
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'#0F172A',color:'#fff',padding:'12px 20px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(0,0,0,0.25)',display:'flex',alignItems:'center',gap:10,minWidth:240,borderLeft:`4px solid ${colors[type]}`}}>
      <span style={{fontSize:16}}>{type==='success'?'✓':type==='error'?'✕':'ℹ'}</span>
      <span style={{fontSize:14}}>{message}</span>
    </div>
  );
}
function Modal({title,onClose,children,width=560}){
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:300}}/>
      <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',zIndex:301,background:C.surface,borderRadius:16,width,maxWidth:'95vw',maxHeight:'90vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.2)',animation:'fadeInScale 200ms ease'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <span style={{fontSize:16,fontWeight:700}}>{title}</span>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:C.textSub,lineHeight:1}}>×</button>
        </div>
        <div style={{padding:24}}>{children}</div>
      </div>
    </>
  );
}
function FormField({label,children,required}){
  return(
    <div style={{marginBottom:16}}>
      <label style={{display:'block',fontSize:13,fontWeight:600,color:C.textSub,marginBottom:6}}>{label}{required&&<span style={{color:C.danger,marginLeft:2}}>*</span>}</label>
      {children}
    </div>
  );
}
function Card({children,style={},hover=true,...props}){
  const [h,setH]=useState(false);
  return(
    <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{background:C.surface,borderRadius:C.card.borderRadius,boxShadow:h&&hover?'0 4px 12px rgba(0,0,0,0.12)':C.card.boxShadow,padding:C.card.padding,transition:'all 200ms ease',transform:h&&hover?'translateY(-2px)':'none',...style}} {...props}>
      {children}
    </div>
  );
}
function ConfidenceBar({rate}){
  const color = rate>=90?C.success:rate>=80?C.info:rate>=70?C.warning:C.danger;
  return(
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      <div style={{flex:1,height:6,borderRadius:3,background:'#E2E8F0'}}>
        <div style={{height:'100%',borderRadius:3,background:color,width:`${rate}%`,animation:'barGrow 800ms ease',['--target-width']:`${rate}%`}}/>
      </div>
      <span style={{fontSize:12,fontWeight:600,color,minWidth:36}}>{rate}%</span>
    </div>
  );
}
function Pagination({current,total,onChange}){
  return(
    <div style={{display:'flex',alignItems:'center',gap:4,justifyContent:'center',marginTop:16}}>
      <button onClick={()=>onChange(Math.max(1,current-1))} disabled={current===1}
        style={{...btnSecondary,padding:'6px 10px',fontSize:12,opacity:current===1?0.4:1}}>‹ 이전</button>
      {Array.from({length:total},(_,i)=>i+1).map(p=>
        <button key={p} onClick={()=>onChange(p)} style={{...btnSecondary,padding:'6px 12px',fontSize:12,
          background:p===current?C.primary:'transparent',color:p===current?'#fff':C.primary}}>{p}</button>
      )}
      <button onClick={()=>onChange(Math.min(total,current+1))} disabled={current===total}
        style={{...btnSecondary,padding:'6px 10px',fontSize:12,opacity:current===total?0.4:1}}>다음 ›</button>
    </div>
  );
}

  const sampleText = "합성수지관(PVC) 75mm\n무수축 몰탈 25kg\n스텐파이프 100A\n전산볼트 M12×150\n에폭시 도장\nFRP 그레이팅 T30\n보온재 글라스울 50T\n가스켓 150A EPDM\n전선관 28C\n후렉시블 조인트 100A";

  const handlePaste = () => {
    setText(sampleText);

  };

  const handleParse = () => {

// ── Match Result Page ──
function MatchResultPage({toast}){
  const [items,setItems]=useState(ITEMS_RAW);
  const [filter,setFilter]=useState('all');
  const [currentPage,setCurrentPage]=useState(1);
  const [detailItem,setDetailItem]=useState(null);
  const [editItem,setEditItem]=useState(null);
  const [sortCol,setSortCol]=useState(null);
  const [sortDir,setSortDir]=useState('asc');

  const filtered = useMemo(()=>{
    let f = filter==='all'?items:items.filter(i=>i.status===filter);
    if(sortCol){
      f=[...f].sort((a,b)=>{
        const va=a[sortCol],vb=b[sortCol];
        if(typeof va==='number') return sortDir==='asc'?va-vb:vb-va;
        return sortDir==='asc'?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
      });
    }
    return f;
  },[items,filter,sortCol,sortDir]);

  const totalPages = Math.ceil(filtered.length/PER_PAGE);
  const paged = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

  const handleSort=(col)=>{
    if(sortCol===col) setSortDir(d=>d==='asc'?'desc':'asc');
    else{setSortCol(col);setSortDir('asc');}
  };

  const handleEdit=(item)=>{
    setEditItem({...item});
  };
  const handleSaveEdit=()=>{
    setItems(prev=>prev.map(i=>i.id===editItem.id?editItem:i));
    setEditItem(null);
    toast('매칭 결과가 수정되었습니다.','success');
  };

  const tabs = [{id:'all',label:'전체',count:items.length},{id:'matched',label:'매칭완료',count:items.filter(i=>i.status==='matched').length},{id:'review',label:'검토필요',count:items.filter(i=>i.status==='review').length},{id:'confirmed',label:'확정',count:items.filter(i=>i.status==='confirmed').length}];

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <Card>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{display:'flex',gap:8}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>{setFilter(t.id);setCurrentPage(1);}}
                style={{padding:'8px 16px',borderRadius:8,border:`1px solid ${filter===t.id?C.primary:C.border}`,background:filter===t.id?C.primary:'transparent',color:filter===t.id?'#fff':C.textSub,fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>
                {t.label} <span style={{fontWeight:700,marginLeft:4}}>{t.count}</span>
              </button>
            ))}
          </div>
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:900}}>
            <thead>
              <tr style={{borderBottom:`2px solid ${C.border}`}}>
                {[{key:'id',label:'#',w:50},{key:'name',label:'입력 품목명',w:180},{key:'category',label:'분류',w:80},{key:'matchedName',label:'매칭 품셈 항목',w:200},{key:'matchRate',label:'매칭률',w:120},{key:'qty',label:'공량',w:80},{key:'page',label:'참조 페이지',w:80},{key:'status',label:'상태',w:90},{key:'action',label:'',w:80}].map(h=>(
                  <th key={h.key} onClick={()=>h.key!=='action'&&handleSort(h.key)}
                    style={{padding:'10px 8px',fontSize:12,fontWeight:600,color:C.textSub,textAlign:'left',width:h.w,cursor:h.key!=='action'?'pointer':'default',userSelect:'none'}}>
                    {h.label}{sortCol===h.key&&(sortDir==='asc'?' ▲':' ▼')}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {paged.map((item,i)=>(
                <tr key={item.id} style={{borderBottom:`1px solid ${C.border}`,animation:`slideInRight 300ms ease ${i*40}ms both`,transition:'background 150ms'}}
                  onMouseEnter={e=>e.currentTarget.style.background=C.primary+'06'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <td style={{padding:'12px 8px',fontSize:12,color:C.textSub}}>{item.id}</td>
                  <td style={{padding:'12px 8px',fontSize:13,fontWeight:500}}>{item.name}</td>
                  <td style={{padding:'12px 8px'}}><Badge>{item.category}</Badge></td>
                  <td style={{padding:'12px 8px',fontSize:13,color:C.primary,cursor:'pointer',fontWeight:500}} onClick={()=>setDetailItem(item)}>{item.matchedName}</td>
                  <td style={{padding:'12px 8px',width:120}}><ConfidenceBar rate={item.matchRate}/></td>
                  <td style={{padding:'12px 8px',fontSize:13,fontWeight:600}}>{item.qty}</td>
                  <td style={{padding:'12px 8px',fontSize:13,color:C.primary,cursor:'pointer'}} onClick={()=>setDetailItem(item)}>p.{item.page}</td>
                  <td style={{padding:'12px 8px'}}><StatusBadge status={item.status}/></td>
                  <td style={{padding:'12px 8px'}}>
                    <button onClick={()=>handleEdit(item)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,color:C.primary}} title="수정">✏️</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {totalPages>1 && <Pagination current={currentPage} total={totalPages} onChange={setCurrentPage}/>}
      </Card>

      {detailItem && (
        <Modal title="매칭 상세 정보" onClose={()=>setDetailItem(null)} width={640}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>

              <ConfidenceBar rate={detailItem.matchRate}/>

            <div>
              <div style={{fontSize:13,fontWeight:600,color:C.textSub,marginBottom:8}}>공량</div>
              <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:20}}>{detailItem.qty}</div>
              <div style={{fontSize:13,fontWeight:600,color:C.textSub,marginBottom:8}}>참조 PDF 페이지</div>
              <div style={{padding:12,borderRadius:8,background:C.bg,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:14,fontWeight:600,color:C.primary}}>📄 2024 건설공사 표준품셈</div>
                <div style={{fontSize:13,color:C.textSub,marginTop:4}}>p.{detailItem.page} — {detailItem.category} 섹션</div>
              </div>
              <div style={{fontSize:13,fontWeight:600,color:C.textSub,marginTop:16,marginBottom:8}}>분류</div>
              <Badge>{detailItem.category}</Badge>
            </div>
          </div>
        </Modal>
      )}

      {editItem && (
        <Modal title="매칭 결과 수정" onClose={()=>setEditItem(null)}>
          <FormField label="입력 품목명">
            <input value={editItem.name} readOnly style={{...inputStyle,background:'#F8FAFC'}}/>
          </FormField>
          <FormField label="매칭 품셈 항목" required>
            <input value={editItem.matchedName} onChange={e=>setEditItem({...editItem,matchedName:e.target.value})} style={inputStyle}/>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <FormField label="공량" required>
              <input value={editItem.qty} onChange={e=>setEditItem({...editItem,qty:e.target.value})} style={inputStyle}/>

function ReviewPage({toast}){

  const [historyModal,setHistoryModal]=useState(null);

  const filtered = filter==='all'?items:items.filter(i=>i.status===filter);
  const totalPages = Math.ceil(filtered.length/PER_PAGE);
  const paged = filtered.slice((currentPage-1)*PER_PAGE,currentPage*PER_PAGE);

  const pending = items.filter(i=>i.status==='matched'||i.status==='review');
  const confirmed = items.filter(i=>i.status==='confirmed');

  const toggleSelect=(id)=>{
    setSelectedIds(prev=>{const next=new Set(prev);next.has(id)?next.delete(id):next.add(id);return next;});
  };
  const toggleAll=()=>{
    if(selectedIds.size===paged.length) setSelectedIds(new Set());
    else setSelectedIds(new Set(paged.map(i=>i.id)));

    if(selectedIds.size===0) return;
    setConfirmModal(true);

    setItems(prev=>prev.map(i=>selectedIds.has(i.id)?{...i,status:'confirmed'}:i));

        </Card>
        <Card style={{animation:'slideUp 400ms ease 160ms both'}}>
          <div style={{fontSize:13,color:C.textSub,marginBottom:6}}>전체 진행률</div>
          <div style={{fontSize:28,fontWeight:800,color:C.primary}}><CountUp end={Math.round(confirmed.length/items.length*100)} suffix="%"/></div>
          <div style={{height:6,borderRadius:3,background:'#E2E8F0',marginTop:8}}>
            <div style={{height:'100%',borderRadius:3,background:C.primary,width:`${confirmed.length/items.length*100}%`,transition:'width 300ms'}}/>
          </div>
        </Card>
      </div>

      <Card>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{display:'flex',gap:8}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>{setFilter(t.id);setCurrentPage(1);setSelectedIds(new Set());}}
                style={{padding:'8px 16px',borderRadius:8,border:`1px solid ${filter===t.id?C.primary:C.border}`,background:filter===t.id?C.primary:'transparent',color:filter===t.id?'#fff':C.textSub,fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>
                {t.label} ({t.count})
              </button>
            ))}
          </div>
          <button onClick={handleConfirmSelected} style={{...btnPrimary,opacity:selectedIds.size>0?1:0.5}} disabled={selectedIds.size===0}>
            ✅ 선택 항목 일괄 확정 ({selectedIds.size}건)
          </button>
        </div>

        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{borderBottom:`2px solid ${C.border}`}}>
              <th style={{padding:'10px 8px',width:36}}><input type="checkbox" onChange={toggleAll} checked={selectedIds.size===paged.length&&paged.length>0}/></th>
              {['#','입력 품목명','매칭 품셈 항목','매칭률','공량','상태','작업'].map(h=><th key={h} style={{padding:'10px 8px',fontSize:12,fontWeight:600,color:C.textSub,textAlign:'left'}}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {paged.map((item,i)=>(
              <tr key={item.id} style={{borderBottom:`1px solid ${C.border}`,background:selectedIds.has(item.id)?C.primary+'08':'transparent',transition:'background 150ms'}}>
                <td style={{padding:'12px 8px'}}><input type="checkbox" checked={selectedIds.has(item.id)} onChange={()=>toggleSelect(item.id)}/></td>
                <td style={{padding:'12px 8px',fontSize:12,color:C.textSub}}>{item.id}</td>
                <td style={{padding:'12px 8px',fontSize:13,fontWeight:500}}>{item.name}</td>
                <td style={{padding:'12px 8px',fontSize:13,color:C.primary}}>{item.matchedName}</td>
                <td style={{padding:'12px 8px',width:110}}><ConfidenceBar rate={item.matchRate}/></td>
                <td style={{padding:'12px 8px',fontSize:13,fontWeight:600}}>{item.qty}</td>
                <td style={{padding:'12px 8px'}}><StatusBadge status={item.status}/></td>
                <td style={{padding:'12px 8px',display:'flex',gap:4}}>
                  {item.status!=='confirmed'&&<button onClick={()=>handleConfirmSingle(item.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:16}} title="확정">✅</button>}
                  {item.status==='confirmed'&&<button onClick={()=>handleReject(item.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:16}} title="반려">↩️</button>}
                  <button onClick={()=>setHistoryModal(item)} style={{background:'none',border:'none',cursor:'pointer',fontSize:16}} title="이력">📜</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {totalPages>1 && <Pagination current={currentPage} total={totalPages} onChange={setCurrentPage}/>}
      </Card>

      {confirmModal && (
        <Modal title="일괄 확정 확인" onClose={()=>setConfirmModal(false)} width={440}>
          <div style={{textAlign:'center',padding:'16px 0'}}>
            <span style={{fontSize:48}}>✅</span>
            <div style={{fontSize:16,fontWeight:600,marginTop:12}}>선택한 {selectedIds.size}건을 확정하시겠습니까?</div>
            <div style={{fontSize:13,color:C.textSub,marginTop:8}}>확정 후에도 반려 처리가 가능합니다.</div>
          </div>
          <div style={{display:'flex',gap:12,marginTop:16}}>
            <button onClick={()=>setConfirmModal(false)} style={{...btnSecondary,flex:1}}>취소</button>
            <button onClick={doConfirm} style={{...btnPrimary,flex:1}}>확정</button>
          </div>
        </Modal>
      )}

      {historyModal && (
        <Modal title={`변경 이력 — ${historyModal.name}`} onClose={()=>setHistoryModal(null)} width={580}>
          <div style={{display:'flex',flexDirection:'column',gap:0}}>
            {history.map((h,i)=>(
              <div key={i} style={{display:'flex',gap:16,padding:'16px 0',borderBottom:i<history.length-1?`1px solid ${C.border}`:'none'}}>
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',minWidth:20}}>
                  <div style={{width:10,height:10,borderRadius:'50%',background:i===0?C.primary:C.border,flexShrink:0}}/>
                  {i<history.length-1&&<div style={{width:2,flex:1,background:C.border,marginTop:4}}/>}
                </div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:14,fontWeight:600}}>{h.action}</span>
                    <span style={{fontSize:12,color:C.textSub}}>{h.date}</span>
                  </div>
                  <div style={{fontSize:13,color:C.textSub,marginTop:4}}>{h.user} · {h.note}</div>
                  <div style={{fontSize:12,color:C.textLight,marginTop:2}}>{h.from} → {h.to}</div>
                </div>
              </div>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Skeleton ──
function SkeletonLoader(){
  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <div style={{width:260,background:C.sidebar}}>
        <div style={{padding:24}}><div className="skeleton" style={{height:36,width:160,background:'rgba(255,255,255,0.05)'}}/></div>
        {[1,2,3,4].map(i=><div key={i} style={{padding:'8px 20px'}}><div className="skeleton" style={{height:40,background:'rgba(255,255,255,0.05)'}}/></div>)}
      </div>
      <div style={{flex:1,padding:24}}>
        <div className="skeleton" style={{height:56,marginBottom:24}}/>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:20,marginBottom:24}}>
          {[1,2,3,4].map(i=><div key={i} className="skeleton" style={{height:100}}/>)}
        </div>
        <div className="skeleton" style={{height:300}}/>
      </div>
    </div>
  );
}

// ── App ──
function App(){
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState('dashboard');
  const [toasts,setToasts]=useState([]);

  useEffect(()=>{setTimeout(()=>setLoading(false),1500);},[]);

  const addToast=(msg,type='success')=>{
    const id=Date.now();
    setToasts(prev=>[...prev,{id,message:msg,type}]);
  };
  const removeToast=(id)=>setToasts(prev=>prev.filter(t=>t.id!==id));

  if(loading) return <SkeletonLoader/>;

  const PAGE_TITLES = {'dashboard':'대시보드','item-input':'품목 입력','match-result':'매칭 결과','review':'검수 확정'};

  const renderPage=()=>{
    switch(page){
      case 'dashboard': return <DashboardPage/>;
      case 'item-input': return <ItemInputPage toast={addToast}/>;
      case 'match-result': return <MatchResultPage toast={addToast}/>;
      case 'review': return <ReviewPage toast={addToast}/>;
      default: return <DashboardPage/>;
    }
  };

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar page={page} setPage={setPage}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar title={PAGE_TITLES[page]}/>
        <main style={{flex:1,overflow:'auto',padding:24}}>
          {renderPage()}
        </main>
      </div>
      {toasts.map(t=><Toast key={t.id} message={t.message} type={t.type} onClose={()=>removeToast(t.id)}/>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
