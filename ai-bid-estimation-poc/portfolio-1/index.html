*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

function Badge({children,color=C.primary,bg}){
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 10px',borderRadius:20,fontSize:12,fontWeight:600,color,background:bg||color+'18'}}>{children}</span>;
}
function StatusBadge({status}){
  const map = {
    matched:{color:C.success,bg:'#D1FAE5',label:'매칭완료'},
    review:{color:C.warning,bg:'#FEF3C7',label:'검토필요'},
    confirmed:{color:C.info,bg:'#DBEAFE',label:'확정'},
    '검수중':{color:C.warning,bg:'#FEF3C7'},
    '완료':{color:C.success,bg:'#D1FAE5'},
    '인덱싱중':{color:C.info,bg:'#E0F2FE'},
  };
  const s = map[status]||{color:C.textSub,bg:'#F1F5F9'};
  return <Badge color={s.color} bg={s.bg}>{s.label||status}</Badge>;
}
function CountUp({end,suffix='',prefix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/50;
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},24);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{val.toLocaleString()}{suffix}</span>;
}
function Toast({message,type='success',onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  const colors={success:'#059669',error:'#DC2626',info:'#0066CC'};
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'#0F172A',color:'#fff',padding:'12px 20px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(0,0,0,0.25)',display:'flex',alignItems:'center',gap:10,minWidth:240,borderLeft:`4px solid ${colors[type]}`}}>
      <span style={{fontSize:16}}>{type==='success'?'✓':type==='error'?'✕':'ℹ'}</span>
      <span style={{fontSize:14}}>{message}</span>
    </div>
  );
}
function Modal({title,onClose,children,width=560}){
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:300}}/>
      <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',zIndex:301,background:C.surface,borderRadius:16,width,maxWidth:'95vw',maxHeight:'90vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.2)',animation:'fadeInScale 200ms ease'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <span style={{fontSize:16,fontWeight:700}}>{title}</span>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:C.textSub,lineHeight:1}}>×</button>
        </div>
        <div style={{padding:24}}>{children}</div>
      </div>
    </>
  );
}
function FormField({label,children,required}){
  return(
    <div style={{marginBottom:16}}>
      <label style={{display:'block',fontSize:13,fontWeight:600,color:C.textSub,marginBottom:6}}>{label}{required&&<span style={{color:C.danger,marginLeft:2}}>*</span>}</label>
      {children}
    </div>
  );
}
function Card({children,style={},hover=true,...props}){
  const [h,setH]=useState(false);
  return(
    <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{background:C.surface,borderRadius:C.card.borderRadius,boxShadow:h&&hover?'0 4px 12px rgba(0,0,0,0.12)':C.card.boxShadow,padding:C.card.padding,transition:'all 200ms ease',transform:h&&hover?'translateY(-2px)':'none',...style}} {...props}>
      {children}
    </div>
  );
}
function ConfidenceBar({rate}){
  const color = rate>=90?C.success:rate>=80?C.info:rate>=70?C.warning:C.danger;
  return(
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      <div style={{flex:1,height:6,borderRadius:3,background:'#E2E8F0'}}>
        <div style={{height:'100%',borderRadius:3,background:color,width:`${rate}%`,animation:'barGrow 800ms ease',['--target-width']:`${rate}%`}}/>
      </div>
      <span style={{fontSize:12,fontWeight:600,color,minWidth:36}}>{rate}%</span>
    </div>
  );
}
function Pagination({current,total,onChange}){
  return(
    <div style={{display:'flex',alignItems:'center',gap:4,justifyContent:'center',marginTop:16}}>
      <button onClick={()=>onChange(Math.max(1,current-1))} disabled={current===1}
        style={{...btnSecondary,padding:'6px 10px',fontSize:12,opacity:current===1?0.4:1}}>‹ 이전</button>
      {Array.from({length:total},(_,i)=>i+1).map(p=>
        <button key={p} onClick={()=>onChange(p)} style={{...btnSecondary,padding:'6px 12px',fontSize:12,
          background:p===current?C.primary:'transparent',color:p===current?'#fff':C.primary}}>{p}</button>
      )}
      <button onClick={()=>onChange(Math.min(total,current+1))} disabled={current===total}
        style={{...btnSecondary,padding:'6px 10px',fontSize:12,opacity:current===total?0.4:1}}>다음 ›</button>
    </div>
  );
}

function BulkSimulation({toast}){
  const [running,setRunning]=useState(false);
  const [stage,setStage]=useState(-1);
  const [stageProgress,setStageProgress]=useState(0);
  const [result,setResult]=useState(null);
  const [itemCount]=useState(3000);

  const STAGES = [
    {name:'품목 데이터 파싱',desc:'3,000건 텍스트 → 구조화 데이터 변환',icon:'📋',duration:1200},
    {name:'임베딩 벡터 생성',desc:'품목명 → 768차원 벡터 변환 (text-embedding-3-small)',icon:'🧮',duration:2400},
    {name:'벡터 유사도 검색',desc:'품셈집 4종 인덱스 대상 코사인 유사도 매칭',icon:'🔍',duration:3000},
    {name:'결과 후처리 및 집계',desc:'매칭률 기반 분류 + 신뢰도 순 정렬 + 통계 산출',icon:'📊',duration:1000},
  ];

  const startSim=()=>{
    setRunning(true);setResult(null);setStage(0);setStageProgress(0);
    let currentStage=0;
    const runStage=(si)=>{
      if(si>=STAGES.length){
        setRunning(false);
        setResult({
          total:3000,matched90:1920,matched80:680,matched70:280,below70:120,
          avgRate:88.4,topCategory:'배관설비',elapsed:7.6,speed:395
        });
        toast('3,000건 대량 매칭이 완료되었습니다.','success');
        return;
      }
      setStage(si);setStageProgress(0);
      const dur=STAGES[si].duration;
      const step=50;
      let p=0;
      const iv=setInterval(()=>{
        p+=step/dur*100;
        if(p>=100){clearInterval(iv);setStageProgress(100);setTimeout(()=>runStage(si+1),200);}
        else setStageProgress(Math.min(p,99));
      },step);
    };
    runStage(0);
  };

  return(
    <Card style={{marginTop:24,border:`1px solid ${C.primary}30`,background:`linear-gradient(135deg,${C.primary}04,${C.primary}08)`}}>

          <div style={{fontSize:13,color:C.textSub,marginTop:4}}>3,000건 품목을 4종 품셈집 인덱스에 대해 일괄 매칭하는 전체 프로세스를 시뮬레이션합니다.</div>
        </div>
        <button onClick={startSim} disabled={running} style={{...btnPrimary,opacity:running?0.6:1,minWidth:160}}>
          {running?'처리 중...':'🚀 3,000건 매칭 시작'}
        </button>
      </div>

      {running && (
        <div style={{animation:'fadeIn 200ms ease'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
            {STAGES.map((s,i)=>{
              const isActive=i===stage;
              const isDone=i<stage;
              return(
                <div key={i} style={{padding:14,borderRadius:10,border:`1px solid ${isDone?C.success:isActive?C.primary:C.border}`,background:isDone?C.success+'08':isActive?C.primary+'08':'#fff',transition:'all 300ms'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                    <span style={{fontSize:18}}>{isDone?'✅':s.icon}</span>
                    <span style={{fontSize:13,fontWeight:600,color:isDone?C.success:isActive?C.primary:C.textSub}}>{s.name}</span>
                  </div>
                  <div style={{fontSize:11,color:C.textSub,marginBottom:8}}>{s.desc}</div>
                  <div style={{height:4,borderRadius:2,background:'#E2E8F0'}}>
                    <div style={{height:'100%',borderRadius:2,background:isDone?C.success:C.primary,width:`${isDone?100:isActive?stageProgress:0}%`,transition:'width 100ms'}}/>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{padding:12,borderRadius:8,background:'#0F172A',color:'#fff',fontSize:12,fontFamily:'monospace',lineHeight:1.8}}>
            {stage>=0&&<div><span style={{color:'#38BDF8'}}>{'>'}</span> 품목 데이터 파싱 완료: {itemCount.toLocaleString()}건 구조화</div>}
            {stage>=1&&<div><span style={{color:'#38BDF8'}}>{'>'}</span> 임베딩 생성: {itemCount.toLocaleString()}건 × 768dim → 벡터 DB 적재</div>}
            {stage>=2&&<div><span style={{color:'#38BDF8'}}>{'>'}</span> 벡터 검색: 품셈집 {(4280+2150+1830+1240).toLocaleString()}항목 대상 cosine similarity</div>}
            {stage>=3&&<div><span style={{color:'#38BDF8'}}>{'>'}</span> 후처리: Top-K 필터링 + 신뢰도 분류 + 통계 집계</div>}
            {stage>=0&&<div style={{color:'#94A3B8',animation:'pulse 1s infinite'}}>
              <span style={{color:'#FCD34D'}}>⟳</span> {STAGES[Math.min(stage,STAGES.length-1)].name} 진행 중... ({Math.round(stage>=STAGES.length?100:stageProgress)}%)

function MatchResultPage({toast}){
  const [items,setItems]=useState(ITEMS_RAW);

  const [currentPage,setCurrentPage]=useState(1);
  const [detailItem,setDetailItem]=useState(null);
  const [editItem,setEditItem]=useState(null);
  const [sortCol,setSortCol]=useState(null);
  const [sortDir,setSortDir]=useState('asc');

  const filtered = useMemo(()=>{
    let f = filter==='all'?items:items.filter(i=>i.status===filter);
    if(sortCol){
      f=[...f].sort((a,b)=>{
        const va=a[sortCol],vb=b[sortCol];
        if(typeof va==='number') return sortDir==='asc'?va-vb:vb-va;
        return sortDir==='asc'?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
      });
    }
    return f;
  },[items,filter,sortCol,sortDir]);

  const totalPages = Math.ceil(filtered.length/PER_PAGE);
  const paged = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

  const handleSort=(col)=>{
    if(sortCol===col) setSortDir(d=>d==='asc'?'desc':'asc');
    else{setSortCol(col);setSortDir('asc');}
  };

  const handleEdit=(item)=>{
    setEditItem({...item});
  };
  const handleSaveEdit=()=>{
    setItems(prev=>prev.map(i=>i.id===editItem.id?editItem:i));
    setEditItem(null);
    toast('매칭 결과가 수정되었습니다.','success');
  };

  const tabs = [{id:'all',label:'전체',count:items.length},{id:'matched',label:'매칭완료',count:items.filter(i=>i.status==='matched').length},{id:'review',label:'검토필요',count:items.filter(i=>i.status==='review').length},{id:'confirmed',label:'확정',count:items.filter(i=>i.status==='confirmed').length}];

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>

          <div style={{display:'flex',gap:8}}>

              <button key={t.id} onClick={()=>{setFilter(t.id);setCurrentPage(1);}}
                style={{padding:'8px 16px',borderRadius:8,border:`1px solid ${filter===t.id?C.primary:C.border}`,background:filter===t.id?C.primary:'transparent',color:filter===t.id?'#fff':C.textSub,fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>
                {t.label} <span style={{fontWeight:700,marginLeft:4}}>{t.count}</span>
              </button>
            ))}
          </div>
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:900}}>

// ── Review Page ──
function ReviewPage({toast}){
  const [items,setItems]=useState(ITEMS_RAW);
  const [filter,setFilter]=useState('all');
  const [currentPage,setCurrentPage]=useState(1);
  const [selectedIds,setSelectedIds]=useState(new Set());
  const [confirmModal,setConfirmModal]=useState(false);
  const [historyModal,setHistoryModal]=useState(null);

  const filtered = filter==='all'?items:items.filter(i=>i.status===filter);
  const totalPages = Math.ceil(filtered.length/PER_PAGE);
  const paged = filtered.slice((currentPage-1)*PER_PAGE,currentPage*PER_PAGE);

  const pending = items.filter(i=>i.status==='matched'||i.status==='review');
  const confirmed = items.filter(i=>i.status==='confirmed');

  const toggleSelect=(id)=>{
    setSelectedIds(prev=>{const next=new Set(prev);next.has(id)?next.delete(id):next.add(id);return next;});
  };
  const toggleAll=()=>{
    if(selectedIds.size===paged.length) setSelectedIds(new Set());
    else setSelectedIds(new Set(paged.map(i=>i.id)));
  };

  const handleConfirmSelected=()=>{
    if(selectedIds.size===0) return;
    setConfirmModal(true);
  };
  const doConfirm=()=>{
    setItems(prev=>prev.map(i=>selectedIds.has(i.id)?{...i,status:'confirmed'}:i));
    setSelectedIds(new Set());
    setConfirmModal(false);
    toast(`${selectedIds.size}건이 확정되었습니다.`,'success');
  };

  const handleConfirmSingle=(id)=>{
    setItems(prev=>prev.map(i=>i.id===id?{...i,status:'confirmed'}:i));
    toast('해당 항목이 확정되었습니다.','success');
  };
  const handleReject=(id)=>{
    setItems(prev=>prev.map(i=>i.id===id?{...i,status:'review'}:i));
    toast('해당 항목이 반려되었습니다.','info');
  };

  const history = [
    {date:'2026-02-25 14:32',user:'김민수',action:'확정',from:'매칭완료',to:'확정',note:'단가 확인 완료'},
    {date:'2026-02-25 11:15',user:'이준호',action:'수정',from:'4포',to:'5포',note:'현장 확인 후 수량 변경'},
    {date:'2026-02-24 16:48',user:'AI 엔진',action:'매칭',from:'-',to:'매칭완료',note:'매칭률 92%'},
  ];

  const tabs = [{id:'all',label:'전체',count:items.length},{id:'review',label:'미검수',count:pending.length},{id:'confirmed',label:'확정완료',count:confirmed.length}];

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20,marginBottom:24}}>
        <Card style={{animation:'slideUp 400ms ease 0ms both'}}>
          <div style={{fontSize:13,color:C.textSub,marginBottom:6}}>미검수 항목</div>
          <div style={{fontSize:28,fontWeight:800,color:C.warning}}><CountUp end={pending.length} suffix="건"/></div>
        </Card>
        <Card style={{animation:'slideUp 400ms ease 80ms both'}}>
          <div style={{fontSize:13,color:C.textSub,marginBottom:6}}>확정 완료</div>
          <div style={{fontSize:28,fontWeight:800,color:C.success}}><CountUp end={confirmed.length} suffix="건"/></div>
        </Card>
        <Card style={{animation:'slideUp 400ms ease 160ms both'}}>
          <div style={{fontSize:13,color:C.textSub,marginBottom:6}}>전체 진행률</div>
          <div style={{fontSize:28,fontWeight:800,color:C.primary}}><CountUp end={Math.round(confirmed.length/items.length*100)} suffix="%"/></div>
          <div style={{height:6,borderRadius:3,background:'#E2E8F0',marginTop:8}}>
            <div style={{height:'100%',borderRadius:3,background:C.primary,width:`${confirmed.length/items.length*100}%`,transition:'width 300ms'}}/>
          </div>
        </Card>
      </div>

      <Card>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{display:'flex',gap:8}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>{setFilter(t.id);setCurrentPage(1);setSelectedIds(new Set());}}
                style={{padding:'8px 16px',borderRadius:8,border:`1px solid ${filter===t.id?C.primary:C.border}`,background:filter===t.id?C.primary:'transparent',color:filter===t.id?'#fff':C.textSub,fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>
                {t.label} ({t.count})
              </button>
            ))}
          </div>
          <button onClick={handleConfirmSelected} style={{...btnPrimary,opacity:selectedIds.size>0?1:0.5}} disabled={selectedIds.size===0}>
            ✅ 선택 항목 일괄 확정 ({selectedIds.size}건)
          </button>
        </div>

        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{borderBottom:`2px solid ${C.border}`}}>
              <th style={{padding:'10px 8px',width:36}}><input type="checkbox" onChange={toggleAll} checked={selectedIds.size===paged.length&&paged.length>0}/></th>
              {['#','입력 품목명','매칭 품셈 항목','매칭률','공량','상태','작업'].map(h=><th key={h} style={{padding:'10px 8px',fontSize:12,fontWeight:600,color:C.textSub,textAlign:'left'}}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {paged.map((item,i)=>(
              <tr key={item.id} style={{borderBottom:`1px solid ${C.border}`,background:selectedIds.has(item.id)?C.primary+'08':'transparent',transition:'background 150ms'}}>
                <td style={{padding:'12px 8px'}}><input type="checkbox" checked={selectedIds.has(item.id)} onChange={()=>toggleSelect(item.id)}/></td>
                <td style={{padding:'12px 8px',fontSize:12,color:C.textSub}}>{item.id}</td>
                <td style={{padding:'12px 8px',fontSize:13,fontWeight:500}}>{item.name}</td>
                <td style={{padding:'12px 8px',fontSize:13,color:C.primary}}>{item.matchedName}</td>
                <td style={{padding:'12px 8px',width:110}}><ConfidenceBar rate={item.matchRate}/></td>
                <td style={{padding:'12px 8px',fontSize:13,fontWeight:600}}>{item.qty}</td>
                <td style={{padding:'12px 8px'}}><StatusBadge status={item.status}/></td>
                <td style={{padding:'12px 8px',display:'flex',gap:4}}>
                  {item.status!=='confirmed'&&<button onClick={()=>handleConfirmSingle(item.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:16}} title="확정">✅</button>}
                  {item.status==='confirmed'&&<button onClick={()=>handleReject(item.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:16}} title="반려">↩️</button>}
                  <button onClick={()=>setHistoryModal(item)} style={{background:'none',border:'none',cursor:'pointer',fontSize:16}} title="이력">📜</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {totalPages>1 && <Pagination current={currentPage} total={totalPages} onChange={setCurrentPage}/>}
      </Card>

      {confirmModal && (
        <Modal title="일괄 확정 확인" onClose={()=>setConfirmModal(false)} width={440}>
          <div style={{textAlign:'center',padding:'16px 0'}}>
            <span style={{fontSize:48}}>✅</span>
            <div style={{fontSize:16,fontWeight:600,marginTop:12}}>선택한 {selectedIds.size}건을 확정하시겠습니까?</div>
            <div style={{fontSize:13,color:C.textSub,marginTop:8}}>확정 후에도 반려 처리가 가능합니다.</div>
          </div>
          <div style={{display:'flex',gap:12,marginTop:16}}>
            <button onClick={()=>setConfirmModal(false)} style={{...btnSecondary,flex:1}}>취소</button>
            <button onClick={doConfirm} style={{...btnPrimary,flex:1}}>확정</button>
          </div>
        </Modal>
      )}

      {historyModal && (
        <Modal title={`변경 이력 — ${historyModal.name}`} onClose={()=>setHistoryModal(null)} width={580}>
          <div style={{display:'flex',flexDirection:'column',gap:0}}>
            {history.map((h,i)=>(
              <div key={i} style={{display:'flex',gap:16,padding:'16px 0',borderBottom:i<history.length-1?`1px solid ${C.border}`:'none'}}>
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',minWidth:20}}>
                  <div style={{width:10,height:10,borderRadius:'50%',background:i===0?C.primary:C.border,flexShrink:0}}/>
                  {i<history.length-1&&<div style={{width:2,flex:1,background:C.border,marginTop:4}}/>}
                </div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:14,fontWeight:600}}>{h.action}</span>
                    <span style={{fontSize:12,color:C.textSub}}>{h.date}</span>
                  </div>
                  <div style={{fontSize:13,color:C.textSub,marginTop:4}}>{h.user} · {h.note}</div>
                  <div style={{fontSize:12,color:C.textLight,marginTop:2}}>{h.from} → {h.to}</div>
                </div>
              </div>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
}

function PDFExplorerPage(){
  const [expanded,setExpanded]=useState(new Set(['doc-1']));
  const [selected,setSelected]=useState(null);
  const [search,setSearch]=useState('');
  const [searchResults,setSearchResults]=useState([]);

  const toggle=(id)=>{
    setExpanded(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  };

  const handleSearch=()=>{
    if(!search.trim()){setSearchResults([]);return;}
    const q=search.toLowerCase();
    const results=[];
    Object.entries(PDF_SECTION_CONTENT).forEach(([id,sec])=>{
      if(sec.content.toLowerCase().includes(q)||sec.title.toLowerCase().includes(q)){
        results.push({id,title:sec.title,source:sec.source,page:sec.page,matches:sec.matches?.length||0});
      }
    });
    setSearchResults(results);
  };

  const totalMatches = Object.values(PDF_SECTION_CONTENT).reduce((s,v)=>s+(v.matches?.length||0),0);
  const sec = selected ? PDF_SECTION_CONTENT[selected] : null;

  const renderNode=(node,depth=0)=>{
    const isDoc=depth===0;
    const isCh=depth===1;
    const hasChildren=node.children&&node.children.length>0;
    const isOpen=expanded.has(node.id);
    const isSelected=selected===node.id;
    const hasContent=!!PDF_SECTION_CONTENT[node.id];

    return(
      <div key={node.id}>
        <div onClick={()=>{if(hasChildren)toggle(node.id);if(hasContent){setSelected(node.id);setSearchResults([]);}}}
          style={{display:'flex',alignItems:'center',gap:8,padding:`6px 8px 6px ${8+depth*20}px`,borderRadius:6,cursor:'pointer',fontSize:isDoc?14:13,fontWeight:isDoc?700:isCh?600:400,
            background:isSelected?C.primary+'15':'transparent',color:isSelected?C.primary:C.text,
            transition:'all 150ms',borderLeft:isSelected?`3px solid ${C.primary}`:'3px solid transparent'}}
          onMouseEnter={e=>{if(!isSelected)e.currentTarget.style.background=C.bg;}}
          onMouseLeave={e=>{if(!isSelected)e.currentTarget.style.background='transparent';}}>
          {hasChildren ? <span style={{fontSize:10,color:C.textLight,transition:'transform 200ms',transform:isOpen?'rotate(90deg)':'rotate(0deg)',display:'inline-block'}}>▶</span>
            : <span style={{width:10}}/>}
          <span style={{fontSize:isDoc?16:14}}>{isDoc?'📕':isCh?'📁':'📄'}</span>
          <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{node.name}</span>
          {isDoc && <span style={{fontSize:11,color:C.textLight}}>{node.pages}p</span>}
          {node.matchCount>0 && <span style={{fontSize:10,padding:'1px 6px',borderRadius:10,background:C.success+'20',color:C.success,fontWeight:600}}>{node.matchCount}</span>}
        </div>
        {hasChildren && isOpen && node.children.map(c=>renderNode(c,depth+1))}
      </div>
    );
  };

  return(
    <div style={{animation:'fadeIn 300ms ease',display:'flex',gap:20,height:'calc(100vh - 108px)'}}>
      {/* Left: Tree Navigation */}
      <Card style={{width:360,flexShrink:0,display:'flex',flexDirection:'column',overflow:'hidden',padding:0}}>
        <div style={{padding:'16px 16px 12px',borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:12}}>품셈집 문서 인덱스</div>
          <div style={{display:'flex',gap:8}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSearch()}
              placeholder="품셈 항목 검색..." style={{...inputStyle,height:34,fontSize:12,flex:1}}/>
            <button onClick={handleSearch} style={{...btnPrimary,padding:'6px 12px',fontSize:12}}>검색</button>
          </div>
          <div style={{display:'flex',gap:12,marginTop:10,fontSize:11,color:C.textSub}}>
            <span>📕 문서 4종</span><span>📄 {(620+384+296+210).toLocaleString()}페이지</span><span>🎯 매칭 {totalMatches}건</span>
          </div>
        </div>
        {searchResults.length>0 ? (
          <div style={{flex:1,overflowY:'auto',padding:12}}>
            <div style={{fontSize:12,fontWeight:600,color:C.textSub,marginBottom:8}}>검색 결과 ({searchResults.length}건)</div>
            {searchResults.map(r=>(
              <div key={r.id} onClick={()=>{setSelected(r.id);setSearchResults([]);}}
                style={{padding:10,borderRadius:8,border:`1px solid ${C.border}`,marginBottom:8,cursor:'pointer',transition:'all 150ms'}}
                onMouseEnter={e=>e.currentTarget.style.background=C.bg}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <div style={{fontSize:13,fontWeight:600}}>{r.title}</div>
                <div style={{fontSize:11,color:C.textSub,marginTop:4}}>{r.source} · p.{r.page}</div>
                {r.matches>0&&<Badge color={C.success} bg={C.success+'15'}>매칭 {r.matches}건</Badge>}
              </div>
            ))}
          </div>
        ) : (
          <div style={{flex:1,overflowY:'auto',padding:'8px 12px'}}>
            {PDF_TREE.map(doc=>renderNode(doc,0))}
          </div>
        )}
      </Card>

      {/* Right: Content Viewer */}
      <Card style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',padding:0}}>
        {sec ? (
          <>
            <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,background:'#F8FAFC'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:16,fontWeight:700}}>{sec.title}</div>
                  <div style={{fontSize:12,color:C.textSub,marginTop:4}}>{sec.source} · p.{sec.page}</div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  {sec.matches&&sec.matches.length>0&&<Badge color={C.success} bg={C.success+'15'}>매칭 {sec.matches.length}건 발견</Badge>}
                  <Badge color={C.primary} bg={C.primary+'10'}>PDF 원문</Badge>
                </div>
              </div>
            </div>
            {sec.matches&&sec.matches.length>0&&(
              <div style={{padding:'12px 20px',borderBottom:`1px solid ${C.border}`,background:C.success+'08'}}>
                <div style={{fontSize:12,fontWeight:600,color:C.success,marginBottom:8}}>🎯 이 섹션의 AI 매칭 항목</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                  {sec.matches.map((m,i)=>(
                    <div key={i} style={{padding:'8px 12px',borderRadius:8,background:'#fff',border:`1px solid ${C.success}40`,fontSize:12}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{fontWeight:600,color:C.primary}}>{m.term}</span>
                        <span style={{color:C.textLight}}>←</span>
                        <span style={{color:C.textSub}}>{m.input}</span>
                        <Badge color={m.rate>=90?C.success:m.rate>=80?C.info:C.warning}>{m.rate}%</Badge>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div style={{flex:1,overflowY:'auto',padding:20}}>
              <pre style={{fontFamily:'Pretendard, monospace',fontSize:13,lineHeight:1.8,whiteSpace:'pre-wrap',color:C.text,margin:0,background:'#FAFAFA',padding:20,borderRadius:10,border:`1px solid ${C.border}`}}>
                {sec.content}
              </pre>
            </div>
          </>
        ) : (
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:C.textLight}}>
            <span style={{fontSize:64,marginBottom:16}}>📖</span>
            <div style={{fontSize:16,fontWeight:600,marginBottom:8}}>품셈집 문서를 탐색하세요</div>
            <div style={{fontSize:13,maxWidth:360,textAlign:'center',lineHeight:1.6}}>
              좌측 트리에서 문서 → 편 → 장을 선택하면 PDF 원문과 AI 매칭 항목을 함께 확인할 수 있습니다.
            </div>
            <div style={{marginTop:20,display:'flex',gap:12}}>
              {['s-1-5-3','s-1-4-1','s-1-3-2'].map(id=>{
                const s=PDF_SECTION_CONTENT[id];
                return s?(
                  <button key={id} onClick={()=>{setSelected(id);setExpanded(prev=>{const n=new Set(prev);n.add('doc-1');return n;});}}
                    style={{...btnSecondary,padding:'8px 14px',fontSize:12}}>
                    {s.title} <span style={{color:C.success,marginLeft:4}}>({s.matches?.length}건)</span>
                  </button>
                ):null;
              })}
            </div>
          </div>
        )}
      </Card>
    </div>
  );
}

        {[1,2,3,4].map(i=><div key={i} style={{padding:'8px 20px'}}><div className="skeleton" style={{height:40,background:'rgba(255,255,255,0.05)'}}/></div>)}
      </div>

// ── App ──
function App(){
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState('dashboard');
  const [toasts,setToasts]=useState([]);

  useEffect(()=>{setTimeout(()=>setLoading(false),1500);},[]);

  const addToast=(msg,type='success')=>{
    const id=Date.now();
    setToasts(prev=>[...prev,{id,message:msg,type}]);
  };
  const removeToast=(id)=>setToasts(prev=>prev.filter(t=>t.id!==id));

  if(loading) return <SkeletonLoader/>;

  const PAGE_TITLES = {'dashboard':'대시보드','pdf-explorer':'품셈집 탐색','item-input':'품목 입력','match-result':'매칭 결과','review':'검수 확정'};

  const renderPage=()=>{
    switch(page){
      case 'dashboard': return <DashboardPage/>;
      case 'pdf-explorer': return <PDFExplorerPage/>;
      case 'item-input': return <ItemInputPage toast={addToast}/>;
      case 'match-result': return <MatchResultPage toast={addToast}/>;
      case 'review': return <ReviewPage toast={addToast}/>;
      default: return <DashboardPage/>;
    }
  };

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar page={page} setPage={setPage}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar title={PAGE_TITLES[page]}/>
        <main style={{flex:1,overflow:'auto',padding:24}}>
          {renderPage()}
        </main>
      </div>
      {toasts.map(t=><Toast key={t.id} message={t.message} type={t.type} onClose={()=>removeToast(t.id)}/>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
