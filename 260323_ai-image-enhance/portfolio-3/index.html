// ── Components ──
function Skeleton(){return(<div style={{display:'flex',minHeight:'100vh'}}><div style={{width:240,background:C.sidebarBg}}/><div style={{flex:1,padding:28}}><div className="skeleton" style={{width:'50%',height:24,marginBottom:16}}/><div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>{[1,2,3,4].map(i=><div key={i} className="skeleton" style={{height:90}}/>)}</div></div></div>);}

function Badge({text}){
  const colors={완료:{bg:'#D1FAE5',t:'#065F46'},처리중:{bg:'#DBEAFE',t:'#1D4ED8'},대기:{bg:'#F3F4F6',t:'#374151'},실패:{bg:'#FEE2E2',t:'#991B1B'},프로:{bg:'#EDE9FE',t:'#5B21B6'},베이직:{bg:'#DBEAFE',t:'#1D4ED8'},엔터프라이즈:{bg:'#FEF3C7',t:'#92400E'}};
  const c=colors[text]||{bg:'#F3F4F6',t:'#374151'};
  return <span style={{padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.t}}>{text}</span>;
}

function KPICard({icon,label,value,sub}){
  return(<div style={{background:C.surface,borderRadius:12,padding:'18px 20px',border:`1px solid ${C.border}`,display:'flex',gap:12,alignItems:'center',animation:'fadeIn .4s'}}>
    <div style={{width:42,height:42,borderRadius:10,background:`${C.primary}12`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{icon}</div>
    <div><div style={{fontSize:12,color:C.textSec}}>{label}</div><div style={{fontSize:20,fontWeight:700}}>{value}</div>{sub&&<div style={{fontSize:11,color:C.textSec}}>{sub}</div>}</div>
  </div>);
}

function ProgressBar({done,total,failed}){
  const pct=total>0?(done/total)*100:0;
  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
      <span style={{color:C.textSec}}>{done}/{total}장</span>
      <span style={{fontWeight:600}}>{Math.round(pct)}%</span>
    </div>
    <div style={{height:6,background:C.border,borderRadius:3,overflow:'hidden',display:'flex'}}>
      <div style={{height:'100%',width:`${pct}%`,background:C.success,borderRadius:3,transition:'width .3s'}}/>
      {failed>0&&<div style={{height:'100%',width:`${(failed/total)*100}%`,background:C.danger}}/>}
    </div>
  </div>);
}

// ── Pages ──

          <div style={{fontSize:11,color:C.textSec,marginTop:6}}>이미지 1장당 1 크레딧 차감</div>

function HistoryPage({setSelected}){

    <div style={{marginBottom:24}}><h2 style={{fontSize:22,fontWeight:700}}>이미지 이력</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>보정된 이미지를 검색·필터링하고 다운로드합니다</p></div>
    <div style={{display:'flex',gap:8,marginBottom:20}}>
      {statuses.map(s=><button key={s} onClick={()=>setFilter(s)} style={{padding:'8px 16px',borderRadius:20,border:filter===s?'none':`1px solid ${C.border}`,background:filter===s?C.primary:'transparent',color:filter===s?'#fff':C.text,fontSize:13,fontWeight:500,cursor:'pointer'}}>{s}</button>)}

      <button style={{padding:'8px 16px',borderRadius:8,border:`1px solid ${C.primary}`,background:'transparent',color:C.primary,fontSize:13,fontWeight:600,cursor:'pointer'}}>📥 일괄 다운로드</button>
    </div>
    <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{background:'#FAFAFE',borderBottom:`2px solid ${C.border}`}}>
          {['파일명','원본','보정','향상','엔진','배치','상태','일자'].map(h=><th key={h} style={{padding:'12px 14px',textAlign:'left',fontSize:12,fontWeight:600,color:C.textSec}}>{h}</th>)}
        </tr></thead>
        <tbody>{filtered.map(img=><tr key={img.id} onClick={()=>setSelected({type:'image',data:img})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background='#FAFAFE'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>

          <td style={{padding:'14px',fontSize:12,color:C.textSec}}>{img.date}</td>

  </div>);

        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>{['이름','플랜','잔여','사용'].map(h=><th key={h} style={{padding:'8px 10px',textAlign:'left',fontSize:12,fontWeight:600,color:C.textSec}}>{h}</th>)}</tr></thead>
          <tbody>{users.map(u=><tr key={u.id} onClick={()=>setSelected({type:'user',data:u})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background='#FAFAFE'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <td style={{padding:'10px',fontSize:13,fontWeight:600}}>{u.name}</td>
            <td style={{padding:'10px'}}><Badge text={u.plan}/></td>
            <td style={{padding:'10px',fontSize:13,fontWeight:600,color:C.primary}}>{u.credits}</td>
            <td style={{padding:'10px',fontSize:13,color:C.textSec}}>{u.used}</td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>
  </div>);
}

// ── Detail Panel ──
function DetailPanel({selected,onClose}){
  if(!selected)return null;
  const d=selected.data;
  return(<div style={{width:400,borderLeft:`1px solid ${C.border}`,background:C.surface,overflow:'auto',animation:'fadeIn .2s',flexShrink:0}}>
    <div style={{padding:'18px 22px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:C.surface,zIndex:1}}>
      <h3 style={{fontSize:16,fontWeight:700}}>{selected.type==='batch'?'배치 상세':selected.type==='image'?'이미지 상세':'사용자 상세'}</h3>
      <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:C.textSec}}>✕</button>
    </div>
    <div style={{padding:22}}>
      {selected.type==='batch'&&<div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontSize:17,fontWeight:700}}>{d.name}</span><Badge text={d.status}/>
        </div>
        <div style={{marginBottom:16}}><ProgressBar done={d.done} total={d.total} failed={d.failed}/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          {[['배치 ID',d.id],['사용자',d.user],['총 이미지',`${d.total}장`],['완료',`${d.done}장`],['실패',`${d.failed}장`],['일자',d.date]].map(([k,v])=><div key={k} style={{background:'#FAFAFE',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:13,fontWeight:600,marginTop:2}}>{v}</div></div>)}
        </div>
        <label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>관리자 메모</label>
        <textarea rows={3} placeholder="배치 관련 메모..." style={{width:'100%',padding:10,border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:'Pretendard',resize:'vertical',marginBottom:12}}/>
        <div style={{display:'flex',gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:'10px',borderRadius:8,border:`1px solid ${C.border}`,background:C.surface,fontSize:13,cursor:'pointer'}}>닫기</button>
          {d.failed>0&&<button onClick={onClose} style={{flex:1,padding:'10px',borderRadius:8,border:'none',background:C.warning,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>실패 건 재시도</button>}
          <button onClick={onClose} style={{flex:1,padding:'10px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>전체 다운로드</button>
        </div>
      </div>}
      {selected.type==='image'&&<div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          <div style={{height:120,background:'#F1F5F9',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>
            <span style={{fontSize:32}}>🖼️</span><span style={{fontSize:11,color:C.textSec,marginTop:4}}>원본 ({d.original}점)</span>
          </div>
          <div style={{height:120,background:`linear-gradient(135deg,#F5F3FF,#EDE9FE)`,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>
            <span style={{fontSize:32}}>✨</span><span style={{fontSize:11,color:C.primary,marginTop:4,fontWeight:600}}>보정 ({d.enhanced||'-'}점)</span>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          {[['파일명',d.name],['엔진',d.engine||'-'],['향상',d.enhanced?`+${d.enhanced-d.original}점`:'-'],['배치',d.batch],['상태',d.status],['일자',d.date]].map(([k,v])=><div key={k} style={{background:'#FAFAFE',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:13,fontWeight:600,marginTop:2}}>{v}</div></div>)}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:'10px',borderRadius:8,border:`1px solid ${C.border}`,background:C.surface,fontSize:13,cursor:'pointer'}}>닫기</button>
          <button onClick={onClose} style={{flex:1,padding:'10px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>다운로드</button>
        </div>
      </div>}
      {selected.type==='user'&&<div>
        <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:16}}>
          <div style={{width:48,height:48,borderRadius:10,background:`${C.primary}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700,color:C.primary}}>{d.name[0]}</div>
          <div><div style={{fontSize:16,fontWeight:700}}>{d.name}</div><div style={{fontSize:12,color:C.textSec}}>{d.email}</div></div>
          <Badge text={d.plan}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          {[['잔여 크레딧',`${d.credits}`],['사용 크레딧',`${d.used}`],['배치 수',`${d.batches}건`],['플랜',d.plan]].map(([k,v])=><div key={k} style={{background:'#FAFAFE',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:13,fontWeight:600,marginTop:2}}>{v}</div></div>)}
        </div>
        <div style={{background:`${C.primary}06`,borderRadius:10,padding:14,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>크레딧 사용률</div>
          <div style={{height:6,background:C.border,borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',width:`${(d.used/(d.credits+d.used))*100}%`,background:C.primary,borderRadius:3}}/></div>
          <div style={{fontSize:11,color:C.textSec,marginTop:4}}>{d.used} / {d.credits+d.used} 사용</div>
        </div>
        <label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>관리자 메모</label>
        <textarea rows={2} placeholder="사용자 메모..." style={{width:'100%',padding:10,border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:'Pretendard',resize:'vertical',marginBottom:12}}/>
        <div style={{display:'flex',gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:'10px',borderRadius:8,border:`1px solid ${C.border}`,background:C.surface,fontSize:13,cursor:'pointer'}}>닫기</button>
          <button onClick={onClose} style={{flex:1,padding:'10px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>크레딧 추가</button>
        </div>
      </div>}
    </div>
  </div>);
}

// ── App ──
function App(){
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState('batch-upload');
  const [selected,setSelected]=useState(null);
  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading)return <Skeleton/>;

  const menus=[
    {key:'batch-upload',icon:'📤',label:'배치 업로드'},
    {key:'pipeline',icon:'⚙️',label:'파이프라인 현황'},
    {key:'history',icon:'📂',label:'이미지 이력'},
    {key:'admin-dashboard',icon:'📊',label:'관리자 대시보드'}
  ];

  return(<div style={{display:'flex',minHeight:'100vh'}}>
    <aside style={{width:240,background:C.sidebarBg,flexShrink:0,display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,bottom:0,zIndex:100,borderRight:`1px solid ${C.border}`}}>
      <div style={{padding:'22px 18px',borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'#fff'}}>✨</div>
          <div><div style={{fontSize:17,fontWeight:800}}>픽스랩</div><div style={{fontSize:11,color:C.textSec}}>AI 이미지 보정 SaaS</div></div>
        </div>
      </div>
      <nav style={{flex:1,padding:'10px 8px'}}>
        {menus.map(m=><button key={m.key} onClick={()=>{setPage(m.key);setSelected(null)}} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'11px 12px',borderRadius:10,border:'none',background:page===m.key?`${C.primary}14`:'transparent',color:page===m.key?C.primary:C.textSec,fontSize:14,fontWeight:page===m.key?700:400,cursor:'pointer',marginBottom:2,transition:'all .15s',textAlign:'left'}} onMouseEnter={e=>{if(page!==m.key)e.currentTarget.style.background=C.sidebarHover}} onMouseLeave={e=>{if(page!==m.key)e.currentTarget.style.background='transparent'}}>
          <span style={{fontSize:16}}>{m.icon}</span>{m.label}
          {m.key==='pipeline'&&<span style={{marginLeft:'auto',padding:'2px 7px',borderRadius:10,fontSize:11,fontWeight:700,background:C.warning,color:'#fff'}}>2</span>}
        </button>)}
      </nav>
      <div style={{padding:'14px 18px',borderTop:`1px solid ${C.border}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:10,background:`${C.primary}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:C.primary,fontWeight:600}}>관</div>
          <div><div style={{fontSize:12,fontWeight:500}}>관리자</div><div style={{fontSize:10,color:C.textSec}}>admin@fixlab.kr</div></div>
        </div>
      </div>
    </aside>
    <div style={{display:'flex',flex:1,marginLeft:240}}>
      <main style={{flex:1,minWidth:0}}>
        <header style={{height:54,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 26px',position:'sticky',top:0,zIndex:50}}>
          <div style={{fontSize:15,fontWeight:700}}>{menus.find(m=>m.key===page)?.label}</div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <input placeholder="검색..." style={{padding:'7px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,width:200,outline:'none',fontFamily:'Pretendard'}}/>
            <button style={{background:'none',border:'none',fontSize:16,cursor:'pointer',position:'relative'}}>🔔<span style={{position:'absolute',top:-2,right:-4,width:7,height:7,background:C.danger,borderRadius:'50%'}}/></button>
          </div>
        </header>
        <div style={{padding:26}}>
          {page==='batch-upload'&&<BatchUploadPage setSelected={setSelected}/>}
          {page==='pipeline'&&<PipelinePage setSelected={setSelected}/>}
          {page==='history'&&<HistoryPage setSelected={setSelected}/>}
          {page==='admin-dashboard'&&<AdminDashboardPage setSelected={setSelected}/>}
        </div>
      </main>
      {selected&&<DetailPanel selected={selected} onClose={()=>setSelected(null)}/>}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
