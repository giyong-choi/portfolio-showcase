// ── Components ──
function Skeleton(){return(<div style={{display:'flex',minHeight:'100vh'}}><div style={{width:260,background:C.sidebarBg}}/><div style={{flex:1,padding:32}}><div className="skeleton" style={{width:'50%',height:24,marginBottom:20}}/><div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>{[1,2,3,4].map(i=><div key={i} className="skeleton" style={{height:100}}/>)}</div><div className="skeleton" style={{height:300,marginTop:20}}/></div></div>);}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,animation:'fadeIn .2s'}}>
    <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:16,width:'90%',maxWidth:600,maxHeight:'85vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSec}}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>);
}

function Badge({text}){
  const colors={완료:{bg:'#D1FAE5',t:'#065F46'},처리중:{bg:'#DBEAFE',t:'#1D4ED8'},대기:{bg:'#F3F4F6',t:'#374151'},결제완료:{bg:'#D1FAE5',t:'#065F46'},환불:{bg:'#FEE2E2',t:'#991B1B'},프로:{bg:'#EDE9FE',t:'#5B21B6'},베이직:{bg:'#DBEAFE',t:'#1D4ED8'},무료:{bg:'#F3F4F6',t:'#374151'}};
  const c=colors[text]||{bg:'#F3F4F6',t:'#374151'};
  return <span style={{padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.t}}>{text}</span>;
}

function KPICard({icon,label,value,sub,trend}){
  return(<div style={{background:C.surface,borderRadius:12,padding:'20px 24px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',display:'flex',gap:14,alignItems:'center',animation:'fadeIn .4s'}}>
    <div style={{width:48,height:48,borderRadius:12,background:`${C.accent}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{icon}</div>
    <div style={{flex:1}}><div style={{fontSize:13,color:C.textSec,marginBottom:2}}>{label}</div><div style={{fontSize:22,fontWeight:700}}>{value}</div>{sub&&<div style={{fontSize:12,color:trend==='up'?C.success:C.textSec,marginTop:2}}>{sub}</div>}</div>
  </div>);
}

function ScoreBar({label,score,max=100}){
  const pct=(score/max)*100;
  const color=score>=80?C.success:score>=60?C.warning:C.danger;
  return(<div style={{marginBottom:14}}>
    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:13,fontWeight:600}}>{label}</span><span style={{fontSize:13,fontWeight:700,color}}>{score}점</span></div>
    <div style={{height:8,background:C.border,borderRadius:4,overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:color,borderRadius:4,transition:'width .6s ease'}}/></div>
  </div>);
}

// ── Pages ──
function UploadPage({setModal}){
  const [dragging,setDragging]=useState(false);
  const [uploaded,setUploaded]=useState(false);
  const [analyzing,setAnalyzing]=useState(false);
  const [analyzed,setAnalyzed]=useState(false);
  const doUpload=()=>{setUploaded(true);setAnalyzing(true);setTimeout(()=>{setAnalyzing(false);setAnalyzed(true);},2000);};
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}><h2 style={{fontSize:22,fontWeight:700}}>이미지 업로드</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>이미지를 업로드하면 AI가 품질을 분석합니다</p></div>
    {!uploaded?<div onClick={doUpload} onDragOver={e=>{e.preventDefault();setDragging(true)}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);doUpload()}} style={{background:C.surface,border:`2px dashed ${dragging?C.accent:C.border}`,borderRadius:16,padding:'64px 32px',textAlign:'center',cursor:'pointer',transition:'all .2s',boxShadow:dragging?`0 0 0 4px ${C.accent}20`:'none'}}>
      <div style={{fontSize:56,marginBottom:16}}>📸</div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>이미지를 드래그하거나 클릭하여 업로드</div>
      <div style={{fontSize:14,color:C.textSec}}>JPG, PNG, WEBP (최대 20MB)</div>
    </div>
    :analyzing?<div style={{background:C.surface,borderRadius:16,padding:48,textAlign:'center',boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
      <div style={{fontSize:48,marginBottom:16,animation:'pulse 1.5s infinite'}}>🔍</div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Vision AI가 이미지를 분석하고 있습니다...</div>
      <div style={{width:200,height:6,background:C.border,borderRadius:3,margin:'16px auto',overflow:'hidden'}}><div style={{height:'100%',background:C.accent,borderRadius:3,animation:'shimmer 1.5s infinite',width:'60%'}}/></div>
      <div style={{fontSize:13,color:C.textSec}}>구도 · 조명 · 선명도 · 색감 항목별 분석 중</div>
    </div>
    :<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h3 style={{fontSize:16,fontWeight:700}}>원본 이미지</h3>
          <Badge text="분석 완료"/>
        </div>
        <div style={{height:200,background:'#F1F5F9',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:64,marginBottom:16}}>🖼️</div>
        <div style={{fontSize:13,color:C.textSec}}>product_shot_01.jpg · 4032×3024 · 4.2MB</div>
      </div>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h3 style={{fontSize:16,fontWeight:700}}>AI 분석 결과</h3>
          <div style={{fontSize:24,fontWeight:800,color:C.accent}}>{analysisResult.overall.score}점</div>
        </div>
        {Object.values(analysisResult).filter(a=>a.label!=='종합').map(a=><ScoreBar key={a.label} label={a.label} score={a.score}/>)}
        <div style={{background:`${C.accent}08`,borderRadius:10,padding:14,marginTop:8}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>💡 보정 추천</div>
          <div style={{fontSize:12,color:C.textSec,lineHeight:1.6}}>{analysisResult.overall.detail}</div>
        </div>
        <button onClick={()=>setModal({type:'start-enhance'})} style={{width:'100%',marginTop:16,padding:'14px',borderRadius:10,border:'none',background:C.accent,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer'}}>AI 보정 시작 →</button>
      </div>
    </div>}
  </div>);
}

function GenerationPage({setModal}){
  const [generating,setGenerating]=useState(true);

    {generating?<div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
      {[1,2,3,4].map(i=><div key={i} style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',textAlign:'center'}}>

        <div style={{fontSize:14,fontWeight:600}}>보정 {String.fromCharCode(64+i)}</div>
        <div style={{fontSize:12,color:C.textSec,marginTop:4}}>{['Claid','SD + ControlNet','SD img2img','Claid + SD'][i-1]}</div>
      </div>)}
    </div>
    :<div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16,marginBottom:20}}>
        {enhancedResults.map(r=><div key={r.id} onClick={()=>setModal({type:'compare-detail',data:r})} style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',cursor:'pointer',border:r.recommended?`2px solid ${C.accent}`:`2px solid transparent`,position:'relative',transition:'all .2s'}} onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 8px 25px rgba(0,0,0,0.08)'}} onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='0 1px 3px rgba(0,0,0,0.06)'}}>
          {r.recommended&&<div style={{position:'absolute',top:12,right:12,padding:'4px 10px',borderRadius:20,background:C.accent,color:'#fff',fontSize:11,fontWeight:700}}>⭐ 추천</div>}

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:12,color:C.textSec}}>{r.engine}</span>
            <span style={{fontSize:13,fontWeight:700,color:C.success}}>{r.diff}점 향상</span>
          </div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{r.tags.map(t=><span key={t} style={{padding:'3px 8px',borderRadius:8,fontSize:11,background:'#F1F5F9',color:C.textSec}}>{t}</span>)}</div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24,marginBottom:24}}>

        <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>원본</h3>
        <div style={{height:240,background:'#F1F5F9',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:56,marginBottom:12}}>🖼️</div>
        <div style={{textAlign:'center'}}><span style={{fontSize:28,fontWeight:800,color:C.textSec}}>69점</span></div>

      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:`2px solid ${C.accent}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>

  </div>);

    <div style={{marginBottom:24}}><h2 style={{fontSize:22,fontWeight:700}}>선택 및 결제</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>보정 이미지를 결제하고 다운로드하세요</p></div>
    <div style={{display:'flex',gap:8,marginBottom:20}}>
      {['결제내역','관리자'].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:'8px 16px',borderRadius:8,border:tab===t?'none':`1px solid ${C.border}`,background:tab===t?C.primary:'transparent',color:tab===t?'#fff':C.text,fontSize:13,fontWeight:600,cursor:'pointer'}}>{t}</button>)}
    </div>
    {tab==='결제내역'?<div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{background:'#F8FAFC',borderBottom:`2px solid ${C.border}`}}>
          {['주문번호','이미지','금액','결제수단','상태','일자',''].map(h=><th key={h} style={{padding:'12px 14px',textAlign:'left',fontSize:13,fontWeight:600,color:C.textSec}}>{h}</th>)}
        </tr></thead>
        <tbody>{orders.map(o=><tr key={o.id} onClick={()=>setModal({type:'order-detail',data:o})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <td style={{padding:'14px',fontSize:13,fontWeight:600,color:C.accent}}>{o.id}</td>
          <td style={{padding:'14px',fontSize:13}}>{o.image}</td>
          <td style={{padding:'14px',fontSize:13,fontWeight:600}}>{o.amount.toLocaleString()}원</td>
          <td style={{padding:'14px',fontSize:13}}>{o.method}</td>
          <td style={{padding:'14px'}}><Badge text={o.status}/></td>
          <td style={{padding:'14px',fontSize:13,color:C.textSec}}>{o.date}</td>
          <td style={{padding:'14px'}}><button onClick={e=>{e.stopPropagation();setModal({type:'download'})}} style={{padding:'6px 12px',borderRadius:6,border:`1px solid ${C.accent}`,background:'transparent',color:C.accent,fontSize:12,fontWeight:600,cursor:'pointer'}}>다운로드</button></td>
        </tr>)}</tbody>
      </table>
    </div>
    :<div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:20}}>
        <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>일별 처리 현황</h3>
          <ResponsiveContainer width="100%" height={220}><LineChart data={dailyStats}><CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/><XAxis dataKey="day" tick={{fontSize:12}}/><YAxis tick={{fontSize:12}}/><Tooltip/><Legend/><Line type="monotone" dataKey="uploads" stroke={C.primary} strokeWidth={2} name="업로드"/><Line type="monotone" dataKey="enhanced" stroke={C.accent} strokeWidth={2} name="보정완료"/></LineChart></ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>엔진 사용 비율</h3>
          <ResponsiveContainer width="100%" height={220}><PieChart><Pie data={engineUsage} cx="50%" cy="50%" innerRadius={40} outerRadius={75} dataKey="value" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`}>{engineUsage.map((_,i)=><Cell key={i} fill={pieColors[i]}/>)}</Pie><Tooltip/></PieChart></ResponsiveContainer>
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',overflow:'hidden'}}>
        <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`}}><h3 style={{fontSize:15,fontWeight:700}}>사용자 관리</h3></div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>{['이름','이메일','플랜','업로드 수','가입일'].map(h=><th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:13,fontWeight:600,color:C.textSec}}>{h}</th>)}</tr></thead>
          <tbody>{users.map(u=><tr key={u.id} onClick={()=>setModal({type:'user-detail',data:u})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <td style={{padding:'12px 14px',fontSize:13,fontWeight:600}}>{u.name}</td>
            <td style={{padding:'12px 14px',fontSize:13,color:C.textSec}}>{u.email}</td>
            <td style={{padding:'12px 14px'}}><Badge text={u.plan}/></td>
            <td style={{padding:'12px 14px',fontSize:13}}>{u.uploads}건</td>
            <td style={{padding:'12px 14px',fontSize:13,color:C.textSec}}>{u.date}</td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>}
  </div>);
}

// ── Modal Contents ──
function ModalContent({modal,onClose}){
  if(!modal)return null;
  const d=modal.data;
  switch(modal.type){
    case 'start-enhance':return(<div style={{textAlign:'center'}}>
      <div style={{fontSize:48,marginBottom:16}}>🚀</div>
      <h4 style={{fontSize:18,fontWeight:700,marginBottom:8}}>AI 보정을 시작합니다</h4>
      <p style={{fontSize:14,color:C.textSec,lineHeight:1.6,marginBottom:20}}>Vision 분석 결과를 기반으로 4가지 엔진이 보정 이미지를 생성합니다.<br/>약 30초~1분이 소요됩니다.</p>
      <div style={{display:'flex',gap:8}}><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,fontSize:14,cursor:'pointer'}}>취소</button><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:C.accent,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>시작</button></div>
    </div>);
    case 'compare-detail':return(<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <span style={{fontSize:18,fontWeight:800}}>{d.label}</span><span style={{fontSize:24,fontWeight:800,color:C.accent}}>{d.score}점</span>
      </div>
      <div style={{height:200,background:'linear-gradient(135deg,#F0F9FF 0%,#E0F2FE 100%)',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:56,marginBottom:16}}>✨</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        {[['엔진',d.engine],['점수 향상',d.diff+'점'],['추천 여부',d.recommended?'⭐ 추천':'일반'],['태그',d.tags.join(', ')]].map(([k,v])=><div key={k} style={{background:'#F8FAFC',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{v}</div></div>)}
      </div>
      <div style={{display:'flex',gap:8}}><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,fontSize:14,cursor:'pointer'}}>닫기</button><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:C.accent,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>이 이미지 선택</button></div>
    </div>);
    case 'checkout':return(<div>
      <h4 style={{fontSize:16,fontWeight:700,marginBottom:16}}>결제 정보</h4>
      <div style={{background:'#F8FAFC',borderRadius:12,padding:20,marginBottom:16}}>
        {[['선택 이미지',d?.label||'보정 B'],['엔진',d?.engine||'SD + ControlNet'],['품질 점수',`${d?.score||91}점`]].map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}><span style={{color:C.textSec,fontSize:13}}>{k}</span><span style={{fontWeight:600,fontSize:13}}>{v}</span></div>)}
        <div style={{display:'flex',justifyContent:'space-between',paddingTop:12,marginTop:4}}><span style={{fontWeight:700}}>결제 금액</span><span style={{fontSize:20,fontWeight:800,color:C.accent}}>3,900원</span></div>
      </div>
      <div style={{marginBottom:16}}><label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>결제 수단</label>
        <div style={{display:'flex',gap:8}}>{['카드','카카오페이','토스'].map(m=><button key={m} style={{flex:1,padding:'10px',borderRadius:8,border:`1px solid ${C.border}`,background:C.surface,fontSize:13,cursor:'pointer'}}>{m}</button>)}</div>
      </div>
      <button onClick={onClose} style={{width:'100%',padding:'14px',borderRadius:10,border:'none',background:C.accent,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer'}}>결제하기</button>
    </div>);
    case 'order-detail':return(<div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        {[['주문번호',d.id],['이미지',d.image],['결제금액',`${d.amount.toLocaleString()}원`],['결제수단',d.method],['상태',d.status],['일자',d.date]].map(([k,v])=><div key={k} style={{background:'#F8FAFC',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{v}</div></div>)}
      </div>
      <div style={{display:'flex',gap:8}}><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,fontSize:14,cursor:'pointer'}}>닫기</button><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:C.accent,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>다운로드</button></div>
    </div>);
    case 'download':return(<div style={{textAlign:'center'}}><div style={{fontSize:48,marginBottom:12}}>✅</div><h4 style={{fontSize:18,fontWeight:700,marginBottom:8}}>다운로드 준비 완료</h4><p style={{fontSize:14,color:C.textSec,marginBottom:20}}>고해상도 보정 이미지를 다운로드합니다.</p><button onClick={onClose} style={{padding:'12px 32px',borderRadius:10,border:'none',background:C.accent,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>다운로드</button></div>);
    case 'user-detail':return(<div>
      <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:16}}>
        <div style={{width:48,height:48,borderRadius:'50%',background:`${C.accent}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700,color:C.accent}}>{d.name[0]}</div>
        <div><div style={{fontSize:16,fontWeight:700}}>{d.name}</div><div style={{fontSize:13,color:C.textSec}}>{d.email}</div></div>
        <Badge text={d.plan}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        {[['업로드',`${d.uploads}건`],['플랜',d.plan],['가입일',d.date]].map(([k,v])=><div key={k} style={{background:'#F8FAFC',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{v}</div></div>)}
      </div>
      <button onClick={onClose} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>닫기</button>
    </div>);
    default:return null;
  }
}

// ── App ──
function App(){
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState('upload');
  const [modal,setModal]=useState(null);
  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading)return <Skeleton/>;

  const menus=[
    {key:'upload',icon:'📤',label:'이미지 업로드'},
    {key:'generation',icon:'✨',label:'AI 보정 생성'},
    {key:'comparison',icon:'🔍',label:'결과 비교'},
    {key:'checkout',icon:'💳',label:'선택 및 결제'}
  ];
  const modalTitles={'start-enhance':'AI 보정 시작','compare-detail':'보정 상세',checkout:'결제','order-detail':'주문 상세',download:'다운로드','user-detail':'사용자 상세'};

  return(<div style={{display:'flex',minHeight:'100vh'}}>
    <aside style={{width:260,background:C.sidebarBg,flexShrink:0,display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,bottom:0,zIndex:100}}>
      <div style={{padding:'24px 20px',borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{fontSize:20,fontWeight:800,color:'#fff'}}>✨ 픽스AI</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,0.5)',marginTop:4}}>AI 이미지 보정 서비스</div>
      </div>
      <nav style={{flex:1,padding:'12px 10px'}}>
        {menus.map((m,i)=><button key={m.key} onClick={()=>setPage(m.key)} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'12px 14px',borderRadius:10,border:'none',background:page===m.key?C.sidebarActive:'transparent',color:page===m.key?'#fff':'rgba(255,255,255,0.6)',fontSize:14,fontWeight:page===m.key?600:400,cursor:'pointer',marginBottom:2,transition:'all .15s',textAlign:'left'}} onMouseEnter={e=>{if(page!==m.key)e.currentTarget.style.background=C.sidebarHover}} onMouseLeave={e=>{if(page!==m.key)e.currentTarget.style.background='transparent'}}>
          <span style={{fontSize:18}}>{m.icon}</span>
          <span>{m.label}</span>
          {i<3&&<span style={{marginLeft:'auto',fontSize:11,color:'rgba(255,255,255,0.3)'}}>Step {i+1}</span>}
        </button>)}
      </nav>
      <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:'rgba(255,255,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff',fontWeight:600}}>관</div>
          <div><div style={{fontSize:13,color:'#fff',fontWeight:500}}>관리자</div><div style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>admin@fixai.kr</div></div>
        </div>
      </div>
    </aside>
    <main style={{flex:1,marginLeft:260}}>
      <header style={{height:60,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',position:'sticky',top:0,zIndex:50}}>
        <div style={{fontSize:16,fontWeight:700}}>{menus.find(m=>m.key===page)?.label}</div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <input placeholder="검색..." style={{padding:'8px 14px 8px 36px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,width:220,outline:'none',fontFamily:'Pretendard'}}/>
          <button style={{background:'none',border:'none',fontSize:18,cursor:'pointer',position:'relative'}}>🔔<span style={{position:'absolute',top:-2,right:-4,width:8,height:8,background:C.danger,borderRadius:'50%'}}/></button>
        </div>
      </header>
      <div style={{padding:32}}>
        {page==='upload'&&<UploadPage setModal={setModal}/>}
        {page==='generation'&&<GenerationPage setModal={setModal}/>}
        {page==='comparison'&&<ComparisonPage setModal={setModal}/>}
        {page==='checkout'&&<CheckoutPage setModal={setModal}/>}
      </div>
    </main>
    <Modal open={!!modal} onClose={()=>setModal(null)} title={modal?modalTitles[modal.type]||'상세':''}><ModalContent modal={modal} onClose={()=>setModal(null)}/></Modal>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
