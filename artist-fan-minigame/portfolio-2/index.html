function CountUp({end,suffix='',duration=1200}){
  const isNum=typeof end==='number';
  const [v,setV]=useState(0);
  useEffect(()=>{
    if(!isNum) return;
    let cur=0;const step=end/(duration/16);
    const t=setInterval(()=>{
      cur+=step;
      if(cur>=end){setV(end);clearInterval(t);}
      else setV(Math.floor(cur));
    },16);
    return()=>clearInterval(t);
  },[end]);
  if(!isNum) return <span>{end}</span>;
  return <span>{v.toLocaleString()}{suffix}</span>;
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:28,right:28,zIndex:9999,
      background:C.grad,color:'#fff',padding:'13px 22px',borderRadius:10,
      animation:'slideUp 300ms ease',boxShadow:'0 6px 20px rgba(255,107,53,0.4)',fontWeight:600,fontSize:14}}>
      {msg}
    </div>
  );
}

function PageGame(){
  const [score,setScore]=useState(0);
  const [running,setRunning]=useState(false);
  const [stage,setStage]=useState(1);
  const [modal,setModal]=useState(false);
  const timerRef=useRef(null);

  const start=()=>{
    setScore(0);setRunning(true);
    if(timerRef.current) clearInterval(timerRef.current);
    timerRef.current=setInterval(()=>setScore(s=>{
      const limit=stage*2000;
      if(s>=limit){clearInterval(timerRef.current);setRunning(false);return s;}
      return s+(5+stage*2);
    }),50);
  };
  const crash=()=>{
    if(timerRef.current) clearInterval(timerRef.current);
    setRunning(false);setModal(true);
  };
  useEffect(()=>()=>{if(timerRef.current) clearInterval(timerRef.current);},[]);

              <div>
                <div style={{fontSize:10,color:'#888',textTransform:'uppercase',letterSpacing:'0.08em'}}>SCORE</div>
