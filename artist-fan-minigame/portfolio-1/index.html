function CountUp({end,suffix='',duration=1200}){
  const [v,setV]=useState(0);
  useEffect(()=>{
    let cur=0;const step=end/(duration/16);
    const t=setInterval(()=>{
      cur+=step;
      if(cur>=end){setV(end);clearInterval(t);}
      else setV(Math.floor(cur));
    },16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{v.toLocaleString()}{suffix}</span>;
}

function Modal({title,onClose,children,width=580}){

      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.65)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:C.surf,borderRadius:16,zIndex:501,

}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:28,right:28,zIndex:9999,

    </div>
  );
}

function PageGame(){
  const [score,setScore]=useState(0);
  const [running,setRunning]=useState(false);
  const [gameOver,setGameOver]=useState(false);
  const [modal,setModal]=useState(false);
  const timerRef=useRef(null);

  const startGame=()=>{
    setScore(0);setRunning(true);setGameOver(false);
    if(timerRef.current) clearInterval(timerRef.current);
    timerRef.current=setInterval(()=>{
      setScore(s=>{
        if(s>=2000){clearInterval(timerRef.current);setRunning(false);return s;}
        return s+7;
      });
    },50);
  };
  const triggerGameOver=()=>{
    if(timerRef.current) clearInterval(timerRef.current);
    setRunning(false);setGameOver(true);setModal(true);
  };

    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:16}}>
        {/* Game Viewport */}
        <div style={{background:C.surf,borderRadius:12,border:`1px solid ${C.border}`,overflow:'hidden'}}>

              <div style={{width:1,background:C.border}}/>
              <div>
                <div style={{fontSize:11,color:C.muted,textTransform:'uppercase',letterSpacing:'0.08em'}}>STAGE</div>
                <div style={{fontSize:22,fontWeight:800,color:C.sub}}>01</div>
              </div>
            </div>
            <div style={{display:'flex',gap:6}}>
              {[1,2,3].map(h=>(
                <div key={h} style={{fontSize:20,filter:h<=2?'none':'grayscale(1) opacity(0.3)',
                  animation:`pulse 1.5s ease-in-out ${h*300}ms infinite`}}>❤️</div>
              ))}
            </div>
          </div>

          {/* Game Canvas Area */}
          <div style={{position:'relative',height:240,background:'linear-gradient(180deg,#1A0A3E 0%,#0F0A1E 60%,#1A0A3E 100%)',
            overflow:'hidden'}}>
            {/* Star particles */}
            {[...Array(18)].map((_,i)=>(
              <div key={i} style={{position:'absolute',
                left:`${(i*37+13)%100}%`,top:`${(i*23+7)%55}%`,
                width:i%3===0?2:1,height:i%3===0?2:1,
                borderRadius:'50%',background:'#fff',opacity:0.4+i%4*0.15,
                animation:`pulse ${1.5+i%3*0.5}s ease-in-out ${i*200}ms infinite`}}/>
            ))}

            {/* Scrolling ground tiles */}
            <div style={{position:'absolute',bottom:40,left:0,right:0,height:4,
              background:'linear-gradient(90deg,#7C3AED,#EC4899,#7C3AED)',
              boxShadow:'0 0 12px rgba(124,58,237,0.6)'}}/>

            {/* Ground shadow */}
            <div style={{position:'absolute',bottom:0,left:0,right:0,height:40,
              background:'linear-gradient(0deg,rgba(10,6,24,0.9),transparent)'}}/>

            {/* Pixel ground pattern */}
            <div style={{position:'absolute',bottom:0,left:0,right:0,height:40,
              backgroundImage:'repeating-linear-gradient(90deg,transparent 0px,transparent 18px,rgba(124,58,237,0.08) 18px,rgba(124,58,237,0.08) 20px)',

                <div style={{position:'absolute',top:10,right:6,width:6,height:6,background:'#fff',borderRadius:'50%'}}/>
                {/* Smile */}

              </div>
              {/* Legs */}
              {running&&[0,1].map(l=>(

              ))}
            </div>

            {/* Obstacle (animated) */}

              <div style={{position:'absolute',bottom:44,right:'-60px',width:28,height:36,

                <div style={{fontSize:20,textAlign:'center',paddingTop:4}}>⭐</div>

                    boxShadow:'0 4px 20px rgba(124,58,237,0.5)'}}>
                    게임 시작

                </div>
              </div>
            )}
          </div>

          {/* Game Controls */}
          <div style={{display:'flex',gap:10,padding:'14px 20px',background:C.bg,borderTop:`1px solid ${C.border}`}}>

            {running&&(

        {/* Info Panel */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{background:C.surf,borderRadius:12,padding:20,border:`1px solid ${C.border}`}}>
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>게임 규칙</h3>
            {[

            <span style={{fontSize:14}}>🔍</span>
            <input placeholder="검색..." style={{background:'none',border:'none',outline:'none',
              color:C.sub,fontSize:13,width:160,fontFamily:'inherit'}}/>
          </div>
          <div style={{display:'flex',gap:8}}>
            {['🔔','📣'].map((ic,i)=>(
              <button key={i} style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:8,
                width:36,height:36,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                {ic}
              </button>
            ))}
            <div style={{width:36,height:36,borderRadius:'50%',background:C.grad,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,color:'#fff',cursor:'pointer'}}>
              김
            </div>
          </div>
        </header>

        {/* Content */}
        <main style={{flex:1,overflowY:'auto',padding:24}}>
          {loading?(
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              {[...Array(3)].map((_,i)=>(
                <div key={i} style={{height:100,borderRadius:12,
                  background:'linear-gradient(90deg,#1E1340 25%,#261850 50%,#1E1340 75%)',
                  backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>
              ))}
            </div>
          ):(
            <div key={page} style={{animation:'fadeIn 300ms ease'}}>
              {renderPage()}
            </div>
          )}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
