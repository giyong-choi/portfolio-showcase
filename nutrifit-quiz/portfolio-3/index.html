.topbar-right{display:flex;align-items:center;gap:10px}
.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#10B981;color:#fff}
.btn-primary:hover{background:#059669}
.btn-outline{background:#fff;color:#334155;border:1.5px solid #CBD5E1}

.btn-danger{background:#FEE2E2;color:#DC2626;border:none}

.content{flex:1;overflow-y:auto;padding:24px}

/* 탭 */

.inline-tab{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:#64748B;border:none;background:none;transition:all .15s}
.inline-tab.active{background:#fff;color:#0F172A;font-weight:800;box-shadow:0 1px 3px rgba(0,0,0,.08)}

.kpi-card{background:#fff;border-radius:10px;border:1px solid #E2E8F0;padding:16px}
.kpi-label{font-size:11px;color:#64748B;font-weight:600;margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:900;color:#0F172A}

.q-num{font-size:11px;color:#64748B;font-weight:700}
.q-title{font-size:17px;font-weight:800;color:#0F172A;margin-bottom:5px;line-height:1.4}
.q-hint{font-size:12px;color:#64748B;margin-bottom:20px}
.q-opts{display:flex;flex-direction:column;gap:8px}

.q-opt:hover{border-color:#10B981;background:#F0FDF4;color:#0F172A}
.q-opt.selected{border-color:#10B981;background:#ECFDF5;color:#059669;font-weight:700}
.q-opt-icon{font-size:20px;flex-shrink:0}

.section-title{font-size:14px;font-weight:800;color:#0F172A}
.section-sub{font-size:12px;color:#64748B;margin-top:2px}

.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.badge-green{background:#ECFDF5;color:#059669}
.badge-slate{background:#F1F5F9;color:#334155}
.badge-red{background:#FEF2F2;color:#DC2626}
.badge-amber{background:#FFFBEB;color:#D97706}

.hist-item{display:flex;align-items:center;gap:12px;padding:12px;background:#F8FAFC;border-radius:9px;border:1px solid #E2E8F0;margin-bottom:8px;cursor:pointer;transition:all .15s}
.hist-item:hover{border-color:#10B981;background:#F0FDF4}
/* admin 차트 */
.admin-card{background:#fff;border-radius:12px;border:1px solid #E2E8F0;padding:18px}
/* 필터 */
.filter-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #E2E8F0;background:#fff;color:#64748B;transition:all .15s}
.pill.active{border-color:#10B981;background:#ECFDF5;color:#059669}
.pill:hover:not(.active){border-color:#334155;color:#334155}
/* toast */
.toast{position:fixed;bottom:24px;right:24px;background:#0F172A;color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:9999;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;padding:28px;width:460px;max-width:90vw;max-height:80vh;overflow-y:auto;animation:fadeInScale .2s ease}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
</style>
</head>

function DiagnosisPage({onDone}){
  const [step,setStep]=useState(0);
  const [answers,setAnswers]=useState({});
  const total=QUIZ_DATA.length;
  const cur=QUIZ_DATA[step];
  const progress=((step+(answers[cur.id]!==undefined?1:0))/total)*100;

  const select=(idx)=>{
    const next={...answers,[cur.id]:idx};
    setAnswers(next);
    if(step<total-1){setTimeout(()=>setStep(s=>s+1),320);}
    else{
      const scores=HEALTH_AREAS.map((_,i)=>55+Math.round(Math.random()*38));
      setTimeout(()=>onDone({scores,answers:next}),380);
    }
  };

  return(
    <div className="quiz-wrap">
      <div style={{marginBottom:18}}>
        <div style={{fontSize:16,fontWeight:800,color:'#0F172A',marginBottom:3}}>건강 진단 설문</div>
        <div style={{fontSize:12,color:'#64748B'}}>솔직하게 답변할수록 더 정확한 영양제를 추천받을 수 있습니다</div>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {QUIZ_DATA.map((_,i)=>(
          <div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?'#10B981':'#E2E8F0',transition:'background .3s'}} />
        ))}
      </div>

      <div className="quiz-card">
        <div style={{fontSize:11,color:'#64748B',fontWeight:700,marginBottom:12}}>질문 {step+1} / {total}</div>
        <div className="q-title">{cur.q}</div>
        <div className="q-hint">{cur.hint}</div>
        <div className="q-opts-grid">
          {cur.opts.map((o,i)=>(
            <button key={i} className={`q-opt${answers[cur.id]===i?' selected':''}`} onClick={()=>select(i)}>
              <span className="q-opt-icon">{o.e}</span>
              {o.t}
            </button>
          ))}
        </div>
        {step>0 && (
          <button style={{marginTop:14,background:'none',border:'none',fontSize:12,color:'#94A3B8',cursor:'pointer',fontWeight:600}} onClick={()=>setStep(s=>Math.max(0,s-1))}>← 이전 질문</button>
        )}
      </div>
    </div>
  );
}

      <div className="section-hd" style={{marginBottom:16}}>

// ─── 앱 ───────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState('main');
  const [diagResult,setDiagResult]=useState(null);
  const [cart,setCart]=useState([]);
  const [toast,setToast]=useState(null);

  const navItems=[
    {key:'main',icon:'🏠',label:'건강 진단 홈'},
    {key:'diagnosis',icon:'🔬',label:'건강 진단'},
    {key:'products',icon:'💊',label:'맞춤 영양제'},
    {key:'admin',icon:'📊',label:'어드민 분석'},
    {key:'history',icon:'📈',label:'건강 히스토리'},
  ];

  const addToCart=(item)=>{
    setCart(c=>{
      const ex=c.find(i=>i.id===item.id);
      if(ex) return c.map(i=>i.id===item.id?{...i,qty:i.qty+1}:i);
      return [...c,{...item,qty:1}];
    });
    setToast(`${item.name} 장바구니에 담겼습니다`);
  };

  const pageTitle={main:'건강 진단 홈',diagnosis:'건강 진단',products:'맞춤 영양제',admin:'어드민 분석',history:'건강 히스토리'};

  return(
    <div className="layout">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-wrap">
            <div className="logo-icon">W</div>
            <div>
              <div className="logo-name">웰핏</div>
              <div className="logo-sub">헬스케어 통합 플랫폼</div>
            </div>
          </div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-section-label">메뉴</div>
          {navItems.map(n=>(
            <button key={n.key} className={`nav-item${page===n.key?' active':''}`} onClick={()=>setPage(n.key)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
              {n.key==='products' && cart.length>0 && <span className="nav-badge">{cart.length}</span>}
              {n.key==='admin' && <span className="nav-badge-gray">NEW</span>}
            </button>
          ))}
        </div>
        {diagResult && (
          <div style={{margin:'0 8px 8px',padding:'12px',background:'#F0FDF4',borderRadius:10,border:'1px solid #D1FAE5'}}>
            <div style={{fontSize:10,color:'#059669',fontWeight:700,marginBottom:6}}>최근 진단 결과</div>
            <div style={{fontSize:18,fontWeight:900,color:'#0F172A'}}>평균 {Math.round(diagResult.scores.reduce((a,b)=>a+b,0)/diagResult.scores.length)}점</div>
            <div style={{fontSize:11,color:'#64748B',marginTop:2}}>건강 지수</div>
          </div>
        )}
        <div className="sidebar-footer">
          <div className="user-row">
            <div className="user-av">박</div>
            <div>
              <div className="user-name">박지수 님</div>
              <div className="user-tag">프리미엄 회원</div>
            </div>
          </div>
        </div>
      </aside>

      <main className="main">
        <div className="topbar">
          <div className="topbar-left">
            <span className="breadcrumb">웰핏 / <span>{pageTitle[page]}</span></span>
          </div>
          <div className="topbar-right">
            <button className="btn btn-outline btn-sm" onClick={()=>setPage('diagnosis')}>🔬 재진단</button>
            <button className="btn btn-primary btn-sm" onClick={()=>setPage('products')}>💊 장바구니 {cart.length>0?`(${cart.length})`:''}</button>
          </div>
        </div>
        <div className="content">
          {page==='main' && <MainPage diagResult={diagResult} onNav={setPage} cart={cart} />}
          {page==='diagnosis' && <DiagnosisPage onDone={(r)=>{setDiagResult(r);setPage('products');}} />}
          {page==='products' && <ProductsPage diagResult={diagResult} onCart={addToCart} />}
          {page==='admin' && <AdminPage />}
          {page==='history' && <HistoryPage diagResult={diagResult} onNav={setPage} />}
        </div>
      </main>

      {toast && <Toast msg={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
