<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스킨핏 — 피부 타입 진단 스킨케어 추천</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.3.1/umd/react-is.development.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#F7FAFF;color:#1A2C4E;word-break:keep-all;overflow-wrap:break-word}
.layout{display:flex;height:100vh;overflow:hidden}
/* 사이드바 */
.sidebar{width:260px;min-width:260px;background:#fff;border-right:1px solid #E2ECF7;display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid #E2ECF7}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#0066CC,#0099FF);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700}
.logo-text{font-size:18px;font-weight:800;color:#0066CC;letter-spacing:-0.5px}
.logo-sub{font-size:11px;color:#6B7280;margin-top:1px}
.sidebar-section{padding:12px 12px 8px}
.sidebar-section-label{font-size:10px;font-weight:700;color:#9CA3AF;letter-spacing:1px;text-transform:uppercase;padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .15s;font-size:14px;font-weight:500;color:#4B5563;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:#F0F7FF;color:#0066CC}
.nav-item.active{background:#EBF5FF;color:#0066CC;font-weight:700}
.nav-item .nav-icon{font-size:17px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:#0066CC;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid #E2ECF7}
.user-card{display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#0066CC,#0099FF);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
.user-info-name{font-size:13px;font-weight:700;color:#1A2C4E}
.user-info-type{font-size:11px;color:#0066CC;font-weight:600}
/* 메인 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:60px;background:#fff;border-bottom:1px solid #E2ECF7;display:flex;align-items:center;justify-content:space-between;padding:0 28px}
.topbar-title{font-size:17px;font-weight:800;color:#1A2C4E}
.topbar-actions{display:flex;align-items:center;gap:12px}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#0066CC;color:#fff}
.btn-primary:hover{background:#0055BB}
.btn-outline{background:#fff;color:#0066CC;border:1.5px solid #0066CC}
.btn-outline:hover{background:#EBF5FF}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px}
.content{flex:1;overflow-y:auto;padding:28px}
/* 카드 */
.card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,102,204,.08),0 4px 16px rgba(0,102,204,.05);padding:22px}
.card-sm{padding:16px}
/* 그리드 */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
/* 배지 */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-blue{background:#EBF5FF;color:#0066CC}
.badge-green{background:#ECFDF5;color:#059669}
.badge-pink{background:#FFF0F6;color:#DB2777}
.badge-yellow{background:#FFFBEB;color:#D97706}
.badge-purple{background:#F5F3FF;color:#7C3AED}
/* 피부 타입 카드 */
.skin-type-card{border-radius:14px;padding:20px;position:relative;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;border:2px solid transparent}
.skin-type-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.skin-type-card.selected{border-color:#0066CC}
/* 제품 카드 */
.product-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,102,204,.06),0 4px 12px rgba(0,102,204,.04);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s}
.product-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,102,204,.12)}
.product-img{height:160px;display:flex;align-items:center;justify-content:center;font-size:52px}
.product-info{padding:14px}
.product-name{font-size:14px;font-weight:700;color:#1A2C4E;margin-bottom:4px}
.product-brand{font-size:12px;color:#6B7280;margin-bottom:8px}
.product-price{font-size:16px;font-weight:800;color:#0066CC}
.product-fit{display:flex;align-items:center;gap:6px;margin-top:8px}
.fit-bar-wrap{flex:1;height:6px;background:#E8F4FF;border-radius:3px;overflow:hidden}
.fit-bar{height:100%;background:linear-gradient(90deg,#0066CC,#0099FF);border-radius:3px}
/* 설문 */
.quiz-step{background:#fff;border-radius:16px;padding:32px;box-shadow:0 2px 8px rgba(0,102,204,.08)}
.quiz-progress{height:6px;background:#E8F4FF;border-radius:3px;overflow:hidden;margin-bottom:28px}
.quiz-progress-bar{height:100%;background:linear-gradient(90deg,#0066CC,#0099FF);border-radius:3px;transition:width .4s ease}
.quiz-q{font-size:20px;font-weight:800;color:#1A2C4E;margin-bottom:8px;line-height:1.4}
.quiz-sub{font-size:14px;color:#6B7280;margin-bottom:24px}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.quiz-option{padding:16px 18px;border:2px solid #E2ECF7;border-radius:12px;cursor:pointer;transition:all .15s;text-align:left;background:#fff;font-size:14px;font-weight:500;color:#374151}
.quiz-option:hover{border-color:#0066CC;background:#F0F7FF;color:#0066CC}
.quiz-option.selected{border-color:#0066CC;background:#EBF5FF;color:#0066CC;font-weight:700}
.quiz-option .opt-emoji{font-size:22px;margin-bottom:6px;display:block}
/* 결과 */
.result-hero{background:linear-gradient(135deg,#0066CC 0%,#0088DD 50%,#0099FF 100%);border-radius:16px;padding:28px;color:#fff;margin-bottom:20px}
.result-type-badge{display:inline-block;background:rgba(255,255,255,.2);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:12px;backdrop-filter:blur(4px)}
.result-type-name{font-size:28px;font-weight:900;margin-bottom:8px}
.result-type-desc{font-size:14px;opacity:.9;line-height:1.6}
.result-scores{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:20px}
.score-item{background:rgba(255,255,255,.15);border-radius:10px;padding:12px 8px;text-align:center;backdrop-filter:blur(4px)}
.score-label{font-size:11px;opacity:.85;margin-bottom:4px}
.score-val{font-size:22px;font-weight:900}
/* 장바구니 */
.cart-item{display:flex;align-items:center;gap:16px;padding:16px;background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,102,204,.06);margin-bottom:10px}
.cart-img{width:64px;height:64px;border-radius:10px;background:#F0F7FF;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.cart-name{font-size:14px;font-weight:700;color:#1A2C4E;margin-bottom:3px}
.cart-brand{font-size:12px;color:#6B7280;margin-bottom:8px}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid #D1D5DB;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#374151;transition:all .15s}
.qty-btn:hover{border-color:#0066CC;color:#0066CC}
.qty-num{font-size:14px;font-weight:700;color:#1A2C4E;min-width:20px;text-align:center}
.cart-price{margin-left:auto;text-align:right}
.cart-price-val{font-size:16px;font-weight:800;color:#0066CC}
.cart-summary{background:#fff;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(0,102,204,.08)}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F3F4F6;font-size:14px}
.summary-row:last-child{border-bottom:none;font-weight:800;font-size:16px;color:#0066CC}
/* 토스트 */
.toast{position:fixed;bottom:28px;right:28px;background:#0066CC;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(0,102,204,.3);z-index:9999;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
/* stat */
.stat-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 4px rgba(0,102,204,.08)}
.stat-label{font-size:12px;color:#6B7280;font-weight:600;margin-bottom:6px}
.stat-val{font-size:28px;font-weight:900;color:#0066CC}
.stat-sub{font-size:12px;color:#6B7280;margin-top:4px}
/* 태그 */
.skin-tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;margin:3px}
/* routine */
.routine-step{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid #F3F4F6}
.routine-step:last-child{border-bottom:none}
.routine-num{width:32px;height:32px;border-radius:50%;background:#0066CC;color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.routine-name{font-size:14px;font-weight:700;color:#1A2C4E;margin-bottom:3px}
.routine-desc{font-size:13px;color:#6B7280}
/* 섹션 헤더 */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:16px;font-weight:800;color:#1A2C4E}
.section-sub{font-size:13px;color:#6B7280;margin-top:2px}
/* filter bar */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #D1D5DB;background:#fff;color:#4B5563;transition:all .15s}
.filter-chip.active{border-color:#0066CC;background:#0066CC;color:#fff}
.filter-chip:hover:not(.active){border-color:#0066CC;color:#0066CC}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:20px;padding:32px;width:480px;max-width:90vw;max-height:80vh;overflow-y:auto;animation:fadeInScale .2s ease}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
</style>
</head>

function QuizPage({ onDone }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const total = QUIZ_DATA.length;
  const cur = QUIZ_DATA[step];
  const selectOpt = (idx) => {
    const next = { ...answers, [cur.id]: idx };
    setAnswers(next);
    if (step < total - 1) { setTimeout(() => setStep(s => s+1), 350); }
    else {
      const typeKeys = ['dry','oily','combination','sensitive','normal'];
      const typeIdx = Object.values(next).reduce((a,b)=>a+b,0) % typeKeys.length;
      setTimeout(() => onDone(typeKeys[typeIdx]), 400);
    }
  };
  const progress = ((step + (answers[cur.id]!==undefined ? 1 : 0)) / total) * 100;
  return (
    <div style={{maxWidth:680,margin:'0 auto'}}>
      <div className="section-header" style={{marginBottom:20}}>
        <div><div className="section-title">피부 진단 설문</div><div className="section-sub">질문 {step+1} / {total}</div></div>
        <button className="btn btn-outline btn-sm" onClick={()=>setStep(Math.max(0,step-1))} disabled={step===0}>이전</button>
      </div>
      <div className="quiz-step">
        <div className="quiz-progress"><div className="quiz-progress-bar" style={{width:`${progress}%`}} /></div>
        <div className="quiz-q">{cur.q}</div>
        <div className="quiz-sub">{cur.sub}</div>
        <div className="quiz-options">
          {cur.opts.map((o,i)=>(
            <button key={i} className={`quiz-option${answers[cur.id]===i?' selected':''}`} onClick={()=>selectOpt(i)}>
              <span className="opt-emoji">{o.e}</span>
              {o.t}
            </button>
          ))}
        </div>
      </div>
      <div style={{marginTop:16,textAlign:'right'}}>
        <div style={{fontSize:13,color:'#9CA3AF'}}>복수 선택이 가능한 문항은 모두 선택 후 자동 진행됩니다</div>
      </div>
    </div>
  );
}

    <div className="layout">
      {/* 사이드바 */}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">
            <div className="logo-icon">S</div>
            <div>
              <div className="logo-text">스킨핏</div>
              <div className="logo-sub">피부 맞춤 스킨케어</div>
            </div>
          </div>
        </div>
        <div className="sidebar-section">
          <div className="sidebar-section-label">메뉴</div>
          {navItems.map(n=>(
            <button key={n.key} className={`nav-item${page===n.key?' active':''}`} onClick={()=>setPage(n.key)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
              {n.key==='cart' && cart.length>0 && <span className="nav-badge">{cart.length}</span>}
            </button>
          ))}
        </div>
        {diagResult && (
          <div className="sidebar-section">
            <div className="sidebar-section-label">내 피부 타입</div>
            <div style={{background:SKIN_TYPES[diagResult].bg,borderRadius:10,padding:'12px 14px'}}>
              <div style={{fontSize:22,marginBottom:4}}>{SKIN_TYPES[diagResult].emoji}</div>
              <div style={{fontSize:13,fontWeight:800,color:SKIN_TYPES[diagResult].color}}>{SKIN_TYPES[diagResult].label}</div>
              <div style={{fontSize:11,color:'#6B7280',marginTop:3}}>최근 진단 결과</div>
            </div>
          </div>
        )}
        <div className="sidebar-footer">
          <div className="user-card">
            <div className="user-avatar">김</div>
            <div>
              <div className="user-info-name">김지현 님</div>
              <div className="user-info-type">{diagResult ? SKIN_TYPES[diagResult].label : '진단 전'}</div>
            </div>
          </div>
        </div>
      </aside>

      {/* 메인 */}
      <main className="main">
        <div className="topbar">
          <div className="topbar-title">{pageTitle[page]}</div>
          <div className="topbar-actions">
            <button className="btn btn-outline btn-sm" onClick={()=>setPage('quiz')}>📋 재진단</button>
            <button className="btn btn-primary btn-sm" onClick={()=>setPage('cart')}>🛒 {cart.length > 0 ? `${cart.length}개` : '장바구니'}</button>
          </div>
        </div>
        <div className="content">
          {page === 'main' && <MainHome onNav={setPage} diagResult={diagResult} />}
          {page === 'quiz' && <QuizPage onDone={(t)=>{setDiagResult(t);setPage('result');}} />}
          {page === 'result' && (diagResult ? <ResultPage skinType={diagResult} onNav={setPage} onAddToCart={addToCart} /> :
            <div className="card" style={{textAlign:'center',padding:60}}>
              <div style={{fontSize:48,marginBottom:16}}>🔬</div>
              <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>진단 결과가 없습니다</div>
              <button className="btn btn-primary" onClick={()=>setPage('quiz')}>피부 진단 시작</button>
            </div>)}
          {page === 'products' && <ProductsPage onAddToCart={addToCart} skinType={diagResult} />}
          {page === 'cart' && <CartPage cart={cart} setCart={setCart} onNav={setPage} />}
        </div>
      </main>

      {toast && <Toast msg={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
