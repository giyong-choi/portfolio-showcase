function Badge({text}){
  const colors={'수집완료':{bg:'#ECFDF5',c:'#059669'},'AI분석중':{bg:'#EFF6FF',c:'#0066CC'},'크롤링중':{bg:'#FEF3C7',c:'#D97706'},'정상':{bg:'#ECFDF5',c:'#059669'},'자동승인':{bg:'#ECFDF5',c:'#059669'},'수동검토':{bg:'#FEF3C7',c:'#D97706'}};
  const s=colors[text]||{bg:'#F1F5F9',c:'#475569'};
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:6,fontSize:12,fontWeight:600,background:s.bg,color:s.c}}>{text}</span>;
}
function KpiCard({icon,label,value,sub,accent}){
  return(<div style={{background:C.surface,borderRadius:8,padding:'20px 24px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`,animation:'slideUp 500ms ease'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span><span style={{fontSize:20}}>{icon}</span></div>
    <div style={{fontSize:28,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{value}</div>
    {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:6}}>{sub}</div>}
  </div>);
}

        ))}
      </div>
      <div style={{background:C.surface,borderRadius:8,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>개인정보 필터링</div>
        {[['이메일 패턴 감지','켜짐 (저장 차단)'],['010 번호 감지','켜짐 (저장 차단)'],['대표자명 마스킹','성 제외 마스킹'],['크롤링 딜레이','2~5초 무작위']].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
            <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600,color:C.primary}}>{v}</span>
          </div>
        ))}
      </div>
    </div>
  </div>);
}

function App(){
  const[page,setPage]=useState('통합 대시보드');
  const menus=[{name:'통합 대시보드',icon:'📊'},{name:'공공 API 수집',icon:'🔗'},{name:'데이터 그리드',icon:'📋'},{name:'AI 키워드 추출',icon:'🤖'},{name:'엑셀 업로드',icon:'📤'},{name:'시스템 설정',icon:'⚙️'}];
  const renderPage=()=>{switch(page){case '통합 대시보드':return <DashboardPage/>;case '공공 API 수집':return <CollectionPage/>;case '데이터 그리드':return <GridPage/>;case 'AI 키워드 추출':return <AIExtractPage/>;case '엑셀 업로드':return <ExcelPage/>;case '시스템 설정':return <SettingsPage/>;default:return <DashboardPage/>;}};
  return(<div style={{display:'flex',height:'100vh'}}>
    <div style={{width:260,background:C.sidebarBg,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column'}}>
      <div style={{padding:'20px 24px',borderBottom:'1px solid rgba(255,255,255,0.1)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:36,height:36,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>📡</div><div><div style={{fontSize:16,fontWeight:800,color:'#fff'}}>BizRadar</div><div style={{fontSize:11,color:C.sidebarText}}>B2B 데이터 수집·정제</div></div></div>
      </div>
      <nav style={{flex:1,padding:'12px 14px'}}>{menus.map(m=>(<button key={m.name} onClick={()=>setPage(m.name)} title={m.name} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'12px 14px',borderRadius:8,border:'none',background:page===m.name?C.sidebarActive:'transparent',color:page===m.name?'#fff':C.sidebarText,fontSize:14,fontWeight:page===m.name?600:400,cursor:'pointer',marginBottom:4,textAlign:'left'}}><span style={{fontSize:18}}>{m.icon}</span>{m.name}</button>))}</nav>
      <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.1)'}}><div style={{fontSize:11,color:C.sidebarText}}>수집 기업: 850 · AI 완료: 742</div></div>
    </div>
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'14px 28px',borderBottom:`1px solid ${C.border}`,background:C.surface,display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:13,fontWeight:600}}>{page}</span><span style={{padding:'4px 10px',borderRadius:6,background:'#ECFDF5',color:C.success,fontSize:12,fontWeight:600}}>● 시스템 정상</span></div>
      <div style={{flex:1,overflow:'auto',padding:28}}>{renderPage()}</div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
