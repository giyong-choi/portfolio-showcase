<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JobPulse — 채용공고 수집·분석</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Pretendard',sans-serif;background:#FAF5FF;color:#1E1B4B;overflow:hidden;height:100vh}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#C4B5FD;border-radius:3px}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const {BarChart,Bar,LineChart,Line,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,AreaChart,Area}=Recharts;
const C={primary:'#7C3AED',secondary:'#1E1B4B',accent:'#A78BFA',bg:'#FAF5FF',surface:'#FFFFFF',border:'#E5E7EB',text:'#1E1B4B',textLight:'#6B7280',textMuted:'#9CA3AF',success:'#059669',warning:'#D97706',danger:'#DC2626'};

const TREND_DATA=[{month:'1월',frontend:120,backend:95,data:45},{month:'2월',frontend:135,backend:108,data:52},{month:'3월',frontend:148,backend:115,data:68},{month:'4월',frontend:162,backend:128,data:72},{month:'5월',frontend:175,backend:142,data:85}];
const SKILL_RANK=[{skill:'React',count:342,change:'+12'},{skill:'TypeScript',count:298,change:'+18'},{skill:'Python',count:267,change:'+8'},{skill:'Node.js',count:234,change:'+5'},{skill:'AWS',count:198,change:'+15'},{skill:'Docker',count:187,change:'+22'},{skill:'PostgreSQL',count:165,change:'+3'},{skill:'Kubernetes',count:142,change:'+28'}];
const CRAWLERS=[{platform:'사람인',status:'수집중',collected:2341,fail:12,lastRun:'14:20',schedule:'30분'},{platform:'잡코리아',status:'수집중',collected:1892,fail:8,lastRun:'14:18',schedule:'1시간'},{platform:'원티드',status:'대기',collected:987,fail:3,lastRun:'13:45',schedule:'2시간'},{platform:'LinkedIn',status:'수집중',collected:456,fail:21,lastRun:'14:10',schedule:'3시간'}];
const JOBS=[
  {id:1,title:'시니어 프론트엔드 개발자',company:'네이버',location:'판교',salary:'7,000~9,000만',skills:['React','TypeScript','Next.js'],platform:'원티드',date:'2025.08.15'},
  {id:2,title:'백엔드 엔지니어',company:'카카오',location:'판교',salary:'6,500~8,500만',skills:['Python','FastAPI','PostgreSQL'],platform:'사람인',date:'2025.08.14'},
  {id:3,title:'데이터 엔지니어',company:'쿠팡',location:'서울',salary:'7,500~10,000만',skills:['Spark','Airflow','AWS'],platform:'잡코리아',date:'2025.08.14'},
  {id:4,title:'DevOps 엔지니어',company:'토스',location:'서울',salary:'8,000~11,000만',skills:['Kubernetes','Docker','Terraform'],platform:'원티드',date:'2025.08.13'},
  {id:5,title:'풀스택 개발자',company:'당근마켓',location:'서울',salary:'6,000~8,000만',skills:['React','Node.js','PostgreSQL'],platform:'LinkedIn',date:'2025.08.13'},
];
const AI_CLASSIFY=[
  {job:'시니어 프론트엔드 개발자',skills:['React','TypeScript','Next.js','CSS-in-JS'],seniority:'시니어 (5~8년)',confidence:96,status:'자동승인'},
  {job:'백엔드 엔지니어',skills:['Python','FastAPI','PostgreSQL','Redis'],seniority:'중급 (3~5년)',confidence:92,status:'자동승인'},
  {job:'데이터 엔지니어',skills:['Spark','Airflow','AWS EMR','SQL'],seniority:'시니어 (5~8년)',confidence:88,status:'자동승인'},
  {job:'DevOps 엔지니어',skills:['Kubernetes','Docker','Terraform','CI/CD'],seniority:'중급~시니어',confidence:72,status:'수동검토'},
];

function Badge({text}){const colors={'수집중':{bg:'#F3E8FF',c:'#7C3AED'},'대기':{bg:'#FEF3C7',c:'#D97706'},'자동승인':{bg:'#ECFDF5',c:'#059669'},'수동검토':{bg:'#FEF3C7',c:'#D97706'}};const s=colors[text]||{bg:'#F3F4F6',c:'#6B7280'};return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:s.bg,color:s.c}}>{text}</span>;}
function KpiCard({icon,label,value,sub,accent}){return(<div style={{background:C.surface,borderRadius:16,padding:'20px 24px',boxShadow:'0 4px 16px rgba(124,58,237,0.06)',animation:'slideUp 500ms ease'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span><span style={{fontSize:20}}>{icon}</span></div><div style={{fontSize:28,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{value}</div>{sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:6}}>{sub}</div>}</div>);}

function DashboardPage(){
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <div style={{background:`linear-gradient(135deg,${C.secondary},${C.primary})`,borderRadius:16,padding:'32px 36px',marginBottom:24,color:'#fff'}}>
      <div style={{fontSize:13,opacity:.7,marginBottom:4}}>채용 데이터 수집·분석</div>
      <h2 style={{fontSize:24,fontWeight:800,marginBottom:8}}>2025년 채용 트렌드 분석</h2>
      <div style={{display:'flex',gap:20,fontSize:14}}><span>📊 수집 공고: 5,676건</span><span>🤖 AI 분류: 5,420건</span><span>🏢 기업: 1,247개</span></div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
      <KpiCard icon="📋" label="수집 공고" value="5,676" sub="4개 플랫폼"/>
      <KpiCard icon="🤖" label="AI 분류 완료" value="5,420" accent={C.success}/>
      <KpiCard icon="📈" label="인기 스킬 1위" value="React" sub="342건"/>
      <KpiCard icon="💰" label="평균 연봉" value="7,200만" sub="시니어 기준"/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20}}>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>직군별 공고량 추이</div>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={TREND_DATA}><CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/><XAxis dataKey="month" tick={{fontSize:12,fill:C.textMuted}}/><YAxis tick={{fontSize:12,fill:C.textMuted}}/><Tooltip/><Bar dataKey="frontend" fill={C.primary} name="프론트엔드" radius={[0,0,0,0]}/><Bar dataKey="backend" fill={C.accent} name="백엔드"/><Bar dataKey="data" fill="#34D399" name="데이터" radius={[4,4,0,0]}/></BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>기술 스택 수요 TOP 8</div>
        {SKILL_RANK.map((s,i)=>(<div key={s.skill} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 0',borderBottom:`1px solid ${C.border}`}}>
          <span style={{width:20,fontSize:12,fontWeight:700,color:i<3?C.primary:C.textMuted}}>{i+1}</span>
          <span style={{flex:1,fontSize:13,fontWeight:500}}>{s.skill}</span>
          <span style={{fontSize:12,color:C.textMuted}}>{s.count}건</span>
          <span style={{fontSize:11,color:C.success,fontWeight:600}}>{s.change}</span>
        </div>))}
      </div>
    </div>
  </div>);
}

function CrawlerPage(){
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>크롤링 작업 관리</h2>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
      {CRAWLERS.map(cr=>(<div key={cr.platform} style={{background:C.surface,borderRadius:16,padding:22,boxShadow:'0 2px 8px rgba(0,0,0,0.04)',borderLeft:`4px solid ${C.primary}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><span style={{fontSize:16,fontWeight:700}}>{cr.platform}</span><Badge text={cr.status}/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:12}}>
          <div style={{padding:8,background:'#FAFAFE',borderRadius:8}}><div style={{color:C.textMuted}}>수집</div><div style={{fontSize:16,fontWeight:800,color:C.success}}>{cr.collected.toLocaleString()}</div></div>
          <div style={{padding:8,background:'#FAFAFE',borderRadius:8}}><div style={{color:C.textMuted}}>실패</div><div style={{fontSize:16,fontWeight:800,color:C.danger}}>{cr.fail}</div></div>
        </div>
        <div style={{fontSize:11,color:C.textMuted,marginTop:8}}>마지막: {cr.lastRun} · 주기: {cr.schedule}</div>
      </div>))}
    </div>
  </div>);
}

function ExplorerPage(){
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <h2 style={{fontSize:22,fontWeight:800}}>공고 데이터 탐색</h2>
      <input placeholder="기술 스택, 기업명, 직군 검색..." style={{padding:'8px 14px',borderRadius:12,border:`1px solid ${C.border}`,fontSize:13,outline:'none',width:280}}/>
    </div>
    <div style={{background:C.surface,borderRadius:16,boxShadow:'0 2px 8px rgba(0,0,0,0.04)',overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style={{borderBottom:`2px solid ${C.border}`,background:'#FAFAFE'}}>{['공고','기업','지역','연봉','기술 스택','플랫폼','날짜'].map(h=><th key={h} style={{padding:'12px 14px',textAlign:'left',color:C.textMuted,fontWeight:600,fontSize:12}}>{h}</th>)}</tr></thead>
        <tbody>{JOBS.map(j=><tr key={j.id} style={{borderBottom:`1px solid ${C.border}`}}>
          <td style={{padding:'14px',fontWeight:600}}>{j.title}</td>
          <td style={{padding:'14px'}}>{j.company}</td>
          <td style={{padding:'14px',color:C.textLight}}>{j.location}</td>
          <td style={{padding:'14px',fontWeight:600,color:C.primary}}>{j.salary}</td>
          <td style={{padding:'14px'}}><div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{j.skills.map(s=><span key={s} style={{padding:'2px 8px',borderRadius:8,background:'#F3E8FF',fontSize:11,color:C.primary}}>{s}</span>)}</div></td>
          <td style={{padding:'14px'}}><span style={{padding:'3px 8px',borderRadius:4,background:'#F3E8FF',fontSize:11,fontWeight:600,color:C.primary}}>{j.platform}</span></td>
          <td style={{padding:'14px',color:C.textMuted,fontSize:12}}>{j.date}</td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>);
}

function SkillClassifyPage(){
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>AI 스킬 분류</h2>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:20}}>
      <KpiCard icon="🤖" label="분류 완료" value="5,420" accent={C.success}/>
      <KpiCard icon="✅" label="자동 승인" value="5,156"/>
      <KpiCard icon="👁️" label="수동 검토" value="264" accent={C.warning}/>
    </div>
    <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
      {AI_CLASSIFY.map(a=>(<div key={a.job} style={{padding:16,border:`1px solid ${C.border}`,borderRadius:12,marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <span style={{fontSize:14,fontWeight:700}}>{a.job}</span>
          <div style={{display:'flex',gap:8,alignItems:'center'}}><span style={{fontSize:12,color:a.confidence>=80?C.success:C.warning,fontWeight:700}}>신뢰도 {a.confidence}%</span><Badge text={a.status}/></div>
        </div>
        <div style={{display:'flex',gap:6,marginBottom:6}}>{a.skills.map(s=><span key={s} style={{padding:'4px 10px',borderRadius:8,background:'#F3E8FF',fontSize:12,color:C.primary}}>{s}</span>)}</div>
        <div style={{fontSize:12,color:C.textMuted}}>경력: {a.seniority}</div>
      </div>))}
    </div>
  </div>);
}

function ExportPage(){
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>데이터 엑스포트</h2>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>엑스포트 설정</div>
        {[['포맷','Excel (.xlsx)'],['필터','전체 공고'],['기간','2025.08.01 ~ 2025.08.15'],['포함 항목','공고·기업·기술·연봉']].map(([k,v])=>(<div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}><span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600}}>{v}</span></div>))}
        <button style={{marginTop:16,width:'100%',padding:'10px',borderRadius:12,background:C.primary,color:'#fff',border:'none',fontSize:14,fontWeight:600,cursor:'pointer'}}>📥 다운로드</button>
      </div>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>최근 엑스포트 이력</div>
        {[['job_data_20250815.xlsx','5,676건','2.4MB','14:30'],['job_data_20250810.xlsx','4,821건','2.1MB','13:45'],['job_data_20250805.xlsx','3,952건','1.8MB','10:20']].map(([name,rows,size,time])=>(<div key={name} style={{padding:12,border:`1px solid ${C.border}`,borderRadius:8,marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div><div style={{fontSize:13,fontWeight:600}}>{name}</div><div style={{fontSize:11,color:C.textMuted}}>{rows} · {size}</div></div>
          <span style={{fontSize:11,color:C.textMuted}}>{time}</span>
        </div>))}
      </div>
    </div>
  </div>);
}

function SettingsPage(){return(<div style={{animation:'fadeIn 400ms ease'}}><h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>설정</h2><div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:20}}><div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}><div style={{fontSize:16,fontWeight:700,marginBottom:16}}>크롤링 설정</div>{[['기본 딜레이','2~5초'],['User-Agent 풀','12종'],['셀렉터 설정','JSON 파일 관리'],['CAPTCHA 감지','자동 스킵+알림']].map(([k,v])=>(<div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}><span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600}}>{v}</span></div>))}</div><div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}><div style={{fontSize:16,fontWeight:700,marginBottom:16}}>AI 분류 설정</div>{[['OpenAI 모델','GPT-4o-mini'],['자동승인 임계값','80%'],['배치 크기','50건/회'],['Few-shot 예시','12개']].map(([k,v])=>(<div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}><span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600,color:C.primary}}>{v}</span></div>))}</div></div></div>);}

function App(){
  const[page,setPage]=useState('채용 트렌드 대시보드');
  const tabs=[{name:'채용 트렌드 대시보드',icon:'📊'},{name:'크롤링 작업 관리',icon:'🤖'},{name:'공고 데이터 탐색',icon:'🔍'},{name:'AI 스킬 분류',icon:'🏷️'},{name:'데이터 엑스포트',icon:'📥'},{name:'설정',icon:'⚙️'}];
  const renderPage=()=>{switch(page){case '채용 트렌드 대시보드':return <DashboardPage/>;case '크롤링 작업 관리':return <CrawlerPage/>;case '공고 데이터 탐색':return <ExplorerPage/>;case 'AI 스킬 분류':return <SkillClassifyPage/>;case '데이터 엑스포트':return <ExportPage/>;case '설정':return <SettingsPage/>;default:return <DashboardPage/>;}};
  return(<div style={{height:'100vh',display:'flex',flexDirection:'column'}}>
    <header style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'0 32px',display:'flex',alignItems:'center',justifyContent:'space-between',height:56,flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff',fontWeight:800}}>JP</div><span style={{fontSize:16,fontWeight:800}}>JobPulse</span></div>
      <nav style={{display:'flex',gap:2}}>{tabs.map(t=>(<button key={t.name} onClick={()=>setPage(t.name)} title={t.name} style={{padding:'6px 14px',borderRadius:8,border:'none',background:page===t.name?`${C.primary}10`:'transparent',color:page===t.name?C.primary:C.textMuted,fontSize:13,fontWeight:page===t.name?600:400,cursor:'pointer',display:'flex',alignItems:'center',gap:5}}><span style={{fontSize:14}}>{t.icon}</span>{t.name}</button>))}</nav>
      <span style={{fontSize:12,color:C.textMuted}}>Pro Plan</span>
    </header>
    <main style={{flex:1,overflow:'auto',padding:28}}>{renderPage()}</main>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
