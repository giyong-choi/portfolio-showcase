<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LeadForge — B2B 영업 리드 통합 플랫폼</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Pretendard',sans-serif;background:#F0FDF4;color:#064E3B;overflow:hidden;height:100vh}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#A7F3D0;border-radius:3px}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const {BarChart,Bar,LineChart,Line,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer}=Recharts;
const C={primary:'#059669',secondary:'#064E3B',accent:'#34D399',bg:'#F0FDF4',surface:'#FFFFFF',surfaceWarm:'#ECFDF5',border:'#D1D5DB',text:'#064E3B',textLight:'#4B5563',textMuted:'#9CA3AF',success:'#059669',warning:'#D97706',danger:'#DC2626',sidebarBg:'#ECFDF5',sidebarActive:'#059669'};

const FUNNEL=[{stage:'탐색',count:245,color:'#94A3B8'},{stage:'검토',count:128,color:'#38BDF8'},{stage:'컨택',count:67,color:'#A78BFA'},{stage:'협상',count:28,color:'#F59E0B'},{stage:'성사',count:12,color:'#059669'}];
const LEADS=[
  {id:1,name:'(주)테크솔루션',stage:'컨택',score:92,owner:'김영업',lastContact:'2025.12.14',value:'1.2억'},
  {id:2,name:'(주)그린에너지',stage:'협상',score:87,owner:'박매니저',lastContact:'2025.12.13',value:'2.5억'},
  {id:3,name:'(주)스마트팩토리',stage:'검토',score:95,owner:'김영업',lastContact:'2025.12.12',value:'3.8억'},
  {id:4,name:'(주)핀테크코리아',stage:'컨택',score:91,owner:'이대리',lastContact:'2025.12.11',value:'1.8억'},
  {id:5,name:'(주)로지스틱스',stage:'탐색',score:88,owner:'—',lastContact:'—',value:'—'},
  {id:6,name:'(주)에듀테크',stage:'탐색',score:72,owner:'—',lastContact:'—',value:'—'},
];
const KANBAN_COLS=['탐색','검토','컨택','협상','성사'];
const COLLECT_STATUS=[{name:'국세청 API',status:'정상',collected:4520},{name:'DART API',status:'정상',collected:3210},{name:'웹 크롤링',status:'수집중',collected:1850},{name:'AI 스코어링',status:'대기',collected:0}];
const AI_REPORTS=[
  {company:'(주)테크솔루션',summary:'클라우드 보안 SaaS 기업. API 게이트웨이 솔루션 주력. 디지털 활성도 높음.',score:92,date:'2025.12.14'},
  {company:'(주)그린에너지',summary:'태양광 모듈 및 ESS 솔루션 제조. 정부 보조금 사업 활발.',score:87,date:'2025.12.13'},
  {company:'(주)스마트팩토리',summary:'제조업 MES 및 IoT 솔루션. 대기업 납품 이력 다수.',score:95,date:'2025.12.12'},
];
const MONTHLY_LEADS=[{month:'8월',new:45,converted:8},{month:'9월',new:52,converted:12},{month:'10월',new:68,converted:15},{month:'11월',new:73,converted:18},{month:'12월',new:85,converted:22}];

function Badge({text}){const colors={'탐색':{bg:'#F3F4F6',c:'#6B7280'},'검토':{bg:'#EFF6FF',c:'#2563EB'},'컨택':{bg:'#F3E8FF',c:'#7C3AED'},'협상':{bg:'#FEF3C7',c:'#D97706'},'성사':{bg:'#ECFDF5',c:'#059669'},'정상':{bg:'#ECFDF5',c:'#059669'},'수집중':{bg:'#EFF6FF',c:'#2563EB'},'대기':{bg:'#F3F4F6',c:'#6B7280'}};const s=colors[text]||{bg:'#F3F4F6',c:'#6B7280'};return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:6,fontSize:12,fontWeight:600,background:s.bg,color:s.c}}>{text}</span>;}
function KpiCard({icon,label,value,sub,accent}){return(<div style={{background:C.surface,borderRadius:12,padding:'18px 22px',border:`1px solid ${C.border}`,animation:'slideUp 500ms ease'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span><span style={{fontSize:18}}>{icon}</span></div><div style={{fontSize:24,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{value}</div>{sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:5}}>{sub}</div>}</div>);}

function DashboardPage(){
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>리드 파이프라인 대시보드</h2>
    <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:20}}>
      {FUNNEL.map(f=>(<div key={f.stage} style={{background:C.surface,borderRadius:12,padding:16,border:`1px solid ${C.border}`,textAlign:'center',borderTop:`3px solid ${f.color}`}}>
        <div style={{fontSize:22,fontWeight:800,color:f.color}}>{f.count}</div>
        <div style={{fontSize:12,color:C.textMuted}}>{f.stage}</div>
      </div>))}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:20}}>
      <div style={{background:C.surface,borderRadius:12,padding:22,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>월별 신규 리드·전환 추이</div>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={MONTHLY_LEADS}><CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/><XAxis dataKey="month" tick={{fontSize:12,fill:C.textMuted}}/><YAxis tick={{fontSize:12,fill:C.textMuted}}/><Tooltip/><Bar dataKey="new" fill={C.primary} name="신규" radius={[0,0,0,0]}/><Bar dataKey="converted" fill={C.accent} name="전환" radius={[4,4,0,0]}/></BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:12,padding:22,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>수집 파이프라인 상태</div>
        {COLLECT_STATUS.map(s=>(<div key={s.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
          <span style={{fontSize:13,fontWeight:500}}>{s.name}</span>
          <div style={{display:'flex',gap:8,alignItems:'center'}}><span style={{fontSize:12,color:C.textMuted}}>{s.collected>0?`${s.collected.toLocaleString()}건`:''}</span><Badge text={s.status}/></div>
        </div>))}
      </div>
    </div>
  </div>);
}

function LeadsPage(){
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <h2 style={{fontSize:20,fontWeight:800}}>리드 관리</h2>
      <div style={{display:'flex',gap:8}}>
        <button style={{padding:'7px 14px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 리드 추가</button>
      </div>
    </div>
    {/* Kanban */}
    <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:8}}>
      {KANBAN_COLS.map(col=>{
        const items=LEADS.filter(l=>l.stage===col);
        return(<div key={col} style={{minWidth:220,flex:1}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontSize:13,fontWeight:700}}>{col}</span>
            <span style={{padding:'2px 8px',borderRadius:10,background:C.surfaceWarm,fontSize:11,fontWeight:600,color:C.primary}}>{items.length}</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {items.map(l=>(<div key={l.id} style={{background:C.surface,borderRadius:10,padding:14,border:`1px solid ${C.border}`,cursor:'grab'}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{l.name}</div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.textMuted}}>
                <span>스코어: <span style={{fontWeight:700,color:l.score>=90?C.success:C.warning}}>{l.score}</span></span>
                {l.value!=='—'&&<span style={{fontWeight:600,color:C.primary}}>{l.value}</span>}
              </div>
              {l.owner!=='—'&&<div style={{fontSize:11,color:C.textMuted,marginTop:4}}>담당: {l.owner} · {l.lastContact}</div>}
            </div>))}
            {items.length===0&&<div style={{padding:20,textAlign:'center',color:C.textMuted,fontSize:12,background:C.surfaceWarm,borderRadius:8,border:`1px dashed ${C.border}`}}>리드 없음</div>}
          </div>
        </div>);
      })}
    </div>
  </div>);
}

function CollectionPage(){
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>기업 데이터 수집</h2>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
      <KpiCard icon="🔗" label="API 수집" value="7,730" sub="국세청+DART"/>
      <KpiCard icon="🌐" label="크롤링" value="1,850" sub="홈페이지 수집"/>
      <KpiCard icon="📊" label="스코어링 완료" value="6,420" accent={C.success}/>
      <KpiCard icon="🤖" label="AI 분석" value="5,840"/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div style={{background:C.surface,borderRadius:12,padding:22,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>수집 파이프라인</div>
        {COLLECT_STATUS.map(s=>(<div key={s.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',background:C.surfaceWarm,borderRadius:8,marginBottom:8,border:`1px solid ${C.border}`}}>
          <span style={{fontSize:13,fontWeight:600}}>{s.name}</span>
          <div style={{display:'flex',gap:8,alignItems:'center'}}><span style={{fontSize:12,fontWeight:600}}>{s.collected>0?`${s.collected.toLocaleString()}건`:'-'}</span><Badge text={s.status}/></div>
        </div>))}
      </div>
      <div style={{background:C.surface,borderRadius:12,padding:22,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>스코어링 설정</div>
        {[['소셜미디어 활동','가중치 30%'],['웹사이트 갱신 주기','가중치 30%'],['뉴스 언급 빈도','가중치 40%'],['스코어링 주기','주 1회 자동']].map(([k,v])=>(<div key={k} style={{display:'flex',justifyContent:'space-between',padding:'11px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}><span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600}}>{v}</span></div>))}
      </div>
    </div>
  </div>);
}

function AIReportPage(){
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <h2 style={{fontSize:20,fontWeight:800}}>AI 기업 분석 리포트</h2>
      <button style={{padding:'8px 14px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 리포트 생성</button>
    </div>
    {AI_REPORTS.map(r=>(<div key={r.company} style={{background:C.surface,borderRadius:12,padding:22,border:`1px solid ${C.border}`,marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div><div style={{fontSize:16,fontWeight:700}}>{r.company}</div><div style={{fontSize:12,color:C.textMuted}}>{r.date}</div></div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:13,fontWeight:700,color:r.score>=90?C.success:C.warning}}>스코어 {r.score}</span>
          <button style={{padding:'4px 12px',borderRadius:6,background:C.surfaceWarm,border:`1px solid ${C.border}`,fontSize:12,color:C.primary,fontWeight:600,cursor:'pointer'}}>📄 PDF</button>
        </div>
      </div>
      <div style={{padding:14,background:C.surfaceWarm,borderRadius:8,fontSize:14,lineHeight:1.6,color:C.textLight}}>{r.summary}</div>
    </div>))}
    <div style={{background:C.surface,borderRadius:12,padding:22,border:`1px solid ${C.border}`}}>
      <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>AI 리포트 스트리밍 미리보기</div>
      <div style={{padding:16,background:'#F9FAFB',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,lineHeight:1.8,color:C.textLight}}>
        <span style={{fontWeight:700,color:C.text}}>(주)테크솔루션</span>은 클라우드 보안 분야의 SaaS 기업으로, API 게이트웨이 솔루션을 주력으로 제공합니다. 최근 3년간 꾸준한 매출 성장세를 보이며, 디지털 마케팅 채널 활성도가 높아 <span style={{fontWeight:700,color:C.primary}}>영업 접근 우선순위가 높은</span> 기업으로 판단됩니다...
        <span style={{display:'inline-block',width:2,height:16,background:C.primary,verticalAlign:'middle',marginLeft:2,animation:'pulse 1s infinite'}}/>
      </div>
    </div>
  </div>);
}

function SettingsPage(){return(<div style={{animation:'fadeIn 400ms ease'}}><h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>설정</h2><div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}><div style={{background:C.surface,borderRadius:12,padding:22,border:`1px solid ${C.border}`}}><div style={{fontSize:15,fontWeight:700,marginBottom:14}}>API 키 관리</div>{[['국세청','****-ABCD'],['DART','****-EFGH'],['OpenAI','sk-****']].map(([k,v])=>(<div key={k} style={{display:'flex',justifyContent:'space-between',padding:'11px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}><span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600,fontFamily:'monospace',fontSize:12}}>{v}</span></div>))}</div><div style={{background:C.surface,borderRadius:12,padding:22,border:`1px solid ${C.border}`}}><div style={{fontSize:15,fontWeight:700,marginBottom:14}}>팀 설정</div>{[['팀원 수','4명'],['역할','관리자 1 · 영업 3'],['알림 채널','슬랙 #leads'],['개인정보 필터링','켜짐 (이메일/010 차단)']].map(([k,v])=>(<div key={k} style={{display:'flex',justifyContent:'space-between',padding:'11px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}><span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600,color:C.primary}}>{v}</span></div>))}</div></div></div>);}

function App(){
  const[page,setPage]=useState('리드 파이프라인 대시보드');
  const menus=[{name:'리드 파이프라인 대시보드',icon:'📊'},{name:'리드 관리',icon:'🎯'},{name:'기업 데이터 수집',icon:'🔗'},{name:'AI 기업 분석 리포트',icon:'🤖'},{name:'설정',icon:'⚙️'}];
  const renderPage=()=>{switch(page){case '리드 파이프라인 대시보드':return <DashboardPage/>;case '리드 관리':return <LeadsPage/>;case '기업 데이터 수집':return <CollectionPage/>;case 'AI 기업 분석 리포트':return <AIReportPage/>;case '설정':return <SettingsPage/>;default:return <DashboardPage/>;}};
  return(<div style={{display:'flex',height:'100vh'}}>
    <div style={{width:240,background:C.sidebarBg,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column'}}>
      <div style={{padding:'18px 20px',borderBottom:`1px solid ${C.border}`}}><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:34,height:34,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🎯</div><div><div style={{fontSize:15,fontWeight:800}}>LeadForge</div><div style={{fontSize:10,color:C.textMuted}}>B2B 영업 리드 플랫폼</div></div></div></div>
      <nav style={{flex:1,padding:'10px 12px'}}>{menus.map(m=>(<button key={m.name} onClick={()=>setPage(m.name)} title={m.name} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 12px',borderRadius:8,border:'none',background:page===m.name?`${C.primary}18`:'transparent',color:page===m.name?C.secondary:C.textLight,fontSize:13,fontWeight:page===m.name?600:400,cursor:'pointer',marginBottom:2,textAlign:'left'}}><span style={{fontSize:16}}>{m.icon}</span>{m.name}</button>))}</nav>
      <div style={{padding:'14px 18px',borderTop:`1px solid ${C.border}`}}><div style={{fontSize:11,color:C.textMuted}}>리드 480 · 성사 12</div></div>
    </div>
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'12px 24px',borderBottom:`1px solid ${C.border}`,background:C.surface,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}><span style={{fontSize:13,fontWeight:600}}>{page}</span><span style={{fontSize:12,color:C.textMuted}}>수집 기업: 9,580</span></div>
      <div style={{flex:1,overflow:'auto',padding:24}}>{renderPage()}</div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
