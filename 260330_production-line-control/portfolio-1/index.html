<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>종량제봉투 생산라인 제어 대시보드 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#F0F9FF;color:#0F172A;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#E2E8F0;}::-webkit-scrollbar-thumb{background:#94A3B8;border-radius:3px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes blink{0%,100%{background:#059669}50%{background:#34D399}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback}=React;
const {BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,LineChart,Line,CartesianGrid,Legend,AreaChart,Area}=Recharts;

const C={primary:'#0066CC',primaryLight:'#DBEAFE',secondary:'#1A365D',accent:'#38BDF8',bg:'#F0F9FF',surface:'#FFFFFF',text:'#0F172A',textSec:'#475569',border:'#E2E8F0',success:'#059669',successBg:'#D1FAE5',warning:'#D97706',warningBg:'#FEF3C7',danger:'#DC2626',dangerBg:'#FEE2E2',info:'#0066CC',infoBg:'#DBEAFE',sidebarBg:'#0F172A',sidebarHover:'#1E293B',sidebarActive:'#0066CC'};

// ── Data ──
const markers=[
  {id:1,brand:'Domino',model:'Ax350i',protocol:'Codenet',ip:'192.168.1.101',port:9100,status:'연결됨',lastPing:'12ms',printed:4852,errors:2},
  {id:2,brand:'Markem-Imaje',model:'9450',protocol:'NGPCL',ip:'192.168.1.102',port:9200,status:'연결됨',lastPing:'8ms',printed:3241,errors:0},
  {id:3,brand:'Videojet',model:'1580',protocol:'CLARiTY',ip:'192.168.1.103',port:9300,status:'오프라인',lastPing:'-',printed:0,errors:5}
];

const productions=[
  {qr_id:'QR-2025-00001',range:'A001-A100',status:'NORMAL',printed:10,total:10,marker:'Domino',time:'14:32:05'},
  {qr_id:'QR-2025-00002',range:'A001-A100',status:'NORMAL',printed:10,total:10,marker:'Domino',time:'14:32:08'},
  {qr_id:'QR-2025-00003',range:'A001-A100',status:'SENDING',printed:6,total:10,marker:'Domino',time:'14:32:11'},
  {qr_id:'QR-2025-00004',range:'A001-A100',status:'ISSUED',printed:0,total:10,marker:'-',time:'-'},
  {qr_id:'QR-2025-00005',range:'A001-A100',status:'ISSUED',printed:0,total:10,marker:'-',time:'-'},
  {qr_id:'QR-2025-00006',range:'A001-A100',status:'DISCARDED',printed:3,total:10,marker:'Markem-Imaje',time:'14:30:22'},
  {qr_id:'QR-2025-00007',range:'A001-A100',status:'SKIPPED',printed:0,total:10,marker:'-',time:'14:29:55'},
  {qr_id:'QR-2025-00008',range:'A001-A100',status:'NORMAL',printed:10,total:10,marker:'Markem-Imaje',time:'14:31:40'},
  {qr_id:'QR-2025-00009',range:'A001-A100',status:'NORMAL',printed:10,total:10,marker:'Domino',time:'14:31:55'},
  {qr_id:'QR-2025-00010',range:'A001-A100',status:'SENDING',printed:8,total:10,marker:'Markem-Imaje',time:'14:32:15'}
];

const statusColors={ISSUED:{bg:C.infoBg,text:C.info,label:'발급'},SENDING:{bg:C.warningBg,text:C.warning,label:'전송중'},NORMAL:{bg:C.successBg,text:C.success,label:'완료'},DISCARDED:{bg:C.dangerBg,text:C.danger,label:'폐기'},SKIPPED:{bg:'#F1F5F9',text:'#64748B',label:'건너뜀'}};

const commLogs=[
  {time:'14:32:15',device:'Markem-Imaje',dir:'→',cmd:'PRINT_DATA',payload:'QR-2025-00010',result:'ACK'},
  {time:'14:32:11',device:'Domino',dir:'→',cmd:'PRINT_DATA',payload:'QR-2025-00003',result:'ACK'},
  {time:'14:32:08',device:'Domino',dir:'←',cmd:'PRINT_DONE',payload:'QR-2025-00002',result:'OK'},
  {time:'14:32:05',device:'Domino',dir:'←',cmd:'PRINT_DONE',payload:'QR-2025-00001',result:'OK'},
  {time:'14:31:55',device:'Domino',dir:'←',cmd:'PRINT_DONE',payload:'QR-2025-00009',result:'OK'},
  {time:'14:31:40',device:'Markem-Imaje',dir:'←',cmd:'PRINT_DONE',payload:'QR-2025-00008',result:'OK'},
  {time:'14:30:22',device:'Markem-Imaje',dir:'←',cmd:'PRINT_FAIL',payload:'QR-2025-00006',result:'ERR_JAM'},
  {time:'14:30:00',device:'Videojet',dir:'→',cmd:'HEALTH_CHECK',payload:'',result:'TIMEOUT'},
  {time:'14:29:55',device:'System',dir:'—',cmd:'SKIP',payload:'QR-2025-00007',result:'MANUAL'}
];

const hourlyData=[
  {hour:'08',count:320},{hour:'09',count:480},{hour:'10',count:520},{hour:'11',count:490},
  {hour:'12',count:180},{hour:'13',count:510},{hour:'14',count:340}
];

const syncQueue=[
  {id:1,qr_id:'QR-2025-00045',status:'대기',retries:0,created:'14:28:30',size:'2.4KB'},
  {id:2,qr_id:'QR-2025-00046',status:'대기',retries:0,created:'14:28:32',size:'2.4KB'},
  {id:3,qr_id:'QR-2025-00047',status:'전송중',retries:1,created:'14:28:35',size:'2.4KB'},
  {id:4,qr_id:'QR-2025-00048',status:'실패',retries:3,created:'14:25:10',size:'2.4KB'},
  {id:5,qr_id:'QR-2025-00049',status:'완료',retries:0,created:'14:24:50',size:'2.4KB'}
];
const syncStatusColor={대기:{bg:C.infoBg,text:C.info},전송중:{bg:C.warningBg,text:C.warning},실패:{bg:C.dangerBg,text:C.danger},완료:{bg:C.successBg,text:C.success}};

const rangeInfo={file:'range_A001-A100.json',loaded:'2025-01-20 08:00',start:'QR-2025-00001',end:'QR-2025-00100',total:100,produced:52,remaining:48,hardLock:false};

// ── Components ──
function Badge({children,color=C.primary,bg=C.primaryLight}){
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:12,fontSize:12,fontWeight:600,color,background:bg}}>{children}</span>;
}
function StatCard({icon,label,value,sub,color=C.primary,pulse:p}){
  return <div style={{background:C.surface,borderRadius:10,padding:'18px 22px',border:`1px solid ${C.border}`,animation:'fadeIn .4s'}}>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
      <span style={{fontSize:18}}>{icon}</span>
      <span style={{fontSize:12,color:C.textSec}}>{label}</span>
      {p && <span style={{width:8,height:8,borderRadius:'50%',background:color,animation:'pulse 1.5s infinite'}}/>}
    </div>
    <div style={{fontSize:26,fontWeight:800,color}}>{value}</div>
    {sub && <div style={{fontSize:11,color:C.textSec,marginTop:4}}>{sub}</div>}
  </div>;
}
function ConnDot({status}){
  const isOn=status==='연결됨';
  return <span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',background:isOn?C.success:C.danger,boxShadow:isOn?'0 0 6px rgba(5,150,105,.5)':'none',animation:isOn?'blink 2s infinite':'none'}}/>;
}
function ProgressBar({value,max,color=C.primary}){
  const pct=Math.min((value/max)*100,100);
  return <div style={{height:8,background:C.border,borderRadius:4,overflow:'hidden'}}>
    <div style={{width:`${pct}%`,height:'100%',background:color,borderRadius:4,transition:'width .3s'}}/>
  </div>;
}

// ── Pages ──
function DashboardPage(){
  const normal=productions.filter(p=>p.status==='NORMAL').length;
  const sending=productions.filter(p=>p.status==='SENDING').length;
  const onlineMarkers=markers.filter(m=>m.status==='연결됨').length;
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <div><h2 style={{fontSize:22,fontWeight:800}}>생산라인 제어 대시보드</h2><p style={{fontSize:13,color:C.textSec,marginTop:4}}>실시간 QR 마킹 현황 · 마킹기 상태 · 생산량 관리</p></div>
      {rangeInfo.hardLock && <div style={{background:C.danger,color:'#fff',padding:'8px 20px',borderRadius:8,fontSize:14,fontWeight:700,animation:'pulse 1s infinite'}}>⛔ HARD LOCK — 생산 범위 초과</div>}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:24}}>
      <StatCard icon="📦" label="생산 완료" value={`${rangeInfo.produced}/${rangeInfo.total}`} sub={`잔여 ${rangeInfo.remaining}건`} color={C.success} pulse/>
      <StatCard icon="🖨️" label="마킹기 온라인" value={`${onlineMarkers}/${markers.length}`} sub="TCP/IP 연결 기준" color={onlineMarkers===markers.length?C.success:C.warning}/>
      <StatCard icon="📤" label="전송 중" value={`${sending}건`} sub="Print Done 대기" color={C.warning}/>
      <StatCard icon="🔄" label="동기화 대기" value={`${syncQueue.filter(s=>s.status!=='완료').length}건`} sub="오프라인 큐" color={C.info}/>
    </div>
    <div style={{background:rangeInfo.hardLock?C.dangerBg:C.successBg,borderRadius:10,padding:'16px 24px',marginBottom:24,display:'flex',justifyContent:'space-between',alignItems:'center',border:`1px solid ${rangeInfo.hardLock?C.danger:C.success}`}}>
      <div>
        <div style={{fontSize:14,fontWeight:700,color:rangeInfo.hardLock?C.danger:C.success}}>{rangeInfo.hardLock?'⛔ Hard Lock 활성':'✅ 생산 범위 정상'}</div>
        <div style={{fontSize:12,color:C.textSec,marginTop:2}}>범위: {rangeInfo.start} ~ {rangeInfo.end} · 파일: {rangeInfo.file}</div>
      </div>
      <div style={{textAlign:'right'}}>
        <div style={{fontSize:20,fontWeight:800,color:rangeInfo.hardLock?C.danger:C.success}}>{Math.round(rangeInfo.produced/rangeInfo.total*100)}%</div>
        <ProgressBar value={rangeInfo.produced} max={rangeInfo.total} color={rangeInfo.hardLock?C.danger:C.success}/>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>마킹기 연결 상태</h3>
        {markers.map(m=><div key={m.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:`1px solid ${C.border}`}}>
          <ConnDot status={m.status}/>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:600}}>{m.brand} {m.model}</div>
            <div style={{fontSize:11,color:C.textSec}}>{m.protocol} · {m.ip}:{m.port}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:13,fontWeight:600}}>{m.printed.toLocaleString()}장</div>
            <div style={{fontSize:11,color:C.textSec}}>Ping: {m.lastPing}</div>
          </div>
        </div>)}
      </div>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>시간대별 인쇄량</h3>
        <ResponsiveContainer width="100%" height={200}>
          <AreaChart data={hourlyData}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="hour" tick={{fontSize:11}} tickFormatter={v=>`${v}시`}/><YAxis tick={{fontSize:11}}/><Tooltip contentStyle={{borderRadius:8}}/><Area type="monotone" dataKey="count" name="인쇄 수" fill={C.primaryLight} stroke={C.primary} strokeWidth={2}/></AreaChart>
        </ResponsiveContainer>
      </div>
    </div>
    <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>최근 생산 현황</h3>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
            {['QR ID','범위','상태','인쇄','마킹기','시각'].map(h=><th key={h} style={{padding:'8px 12px',textAlign:'left',fontSize:11,fontWeight:700,color:C.textSec}}>{h}</th>)}
          </tr></thead>
          <tbody>{productions.slice(0,8).map(p=><tr key={p.qr_id} style={{borderBottom:`1px solid ${C.border}`}}>
            <td style={{padding:'8px 12px',fontSize:12,fontWeight:600,fontFamily:'monospace'}}>{p.qr_id}</td>
            <td style={{padding:'8px 12px',fontSize:12}}>{p.range}</td>
            <td style={{padding:'8px 12px'}}>{(()=>{const s=statusColors[p.status];return <Badge color={s.text} bg={s.bg}>{s.label}</Badge>})()}</td>
            <td style={{padding:'8px 12px'}}><div style={{display:'flex',alignItems:'center',gap:6}}><ProgressBar value={p.printed} max={p.total} color={statusColors[p.status].text}/><span style={{fontSize:11,minWidth:40}}>{p.printed}/{p.total}</span></div></td>
            <td style={{padding:'8px 12px',fontSize:12}}>{p.marker}</td>
            <td style={{padding:'8px 12px',fontSize:12,fontFamily:'monospace',color:C.textSec}}>{p.time}</td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>
  </div>;
}

function CommPage(){
  const [filter,setFilter]=useState('전체');
  const filtered=filter==='전체'?commLogs:commLogs.filter(l=>l.device===filter);
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}>
      <h2 style={{fontSize:22,fontWeight:800}}>마킹기 통신 모니터링</h2>
      <p style={{fontSize:13,color:C.textSec,marginTop:4}}>TCP/IP 통신 로그 · 연결 상태 · 응답 시간</p>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:24}}>
      {markers.map(m=><div key={m.id} style={{background:C.surface,borderRadius:10,padding:20,border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}><ConnDot status={m.status}/><span style={{fontSize:16,fontWeight:700}}>{m.brand}</span></div>
          <Badge color={m.status==='연결됨'?C.success:C.danger} bg={m.status==='연결됨'?C.successBg:C.dangerBg}>{m.status}</Badge>
        </div>
        <div style={{fontSize:12,color:C.textSec,marginBottom:8}}>모델: {m.model} · 프로토콜: {m.protocol}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div style={{background:C.bg,borderRadius:6,padding:8,textAlign:'center'}}><div style={{fontSize:18,fontWeight:800,color:C.primary}}>{m.printed.toLocaleString()}</div><div style={{fontSize:10,color:C.textSec}}>인쇄 완료</div></div>
          <div style={{background:C.bg,borderRadius:6,padding:8,textAlign:'center'}}><div style={{fontSize:18,fontWeight:800,color:m.errors>0?C.danger:C.success}}>{m.errors}</div><div style={{fontSize:10,color:C.textSec}}>오류</div></div>
        </div>
        <div style={{marginTop:8,fontSize:11,color:C.textSec}}>IP: {m.ip}:{m.port} · Ping: {m.lastPing}</div>
      </div>)}
    </div>
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      {['전체','Domino','Markem-Imaje','Videojet','System'].map(t=><button key={t} onClick={()=>setFilter(t)} style={{padding:'6px 14px',borderRadius:16,border:`1px solid ${filter===t?C.primary:C.border}`,background:filter===t?C.primary:'transparent',color:filter===t?'#fff':C.textSec,fontSize:12,fontWeight:600,cursor:'pointer'}}>{t}</button>)}
    </div>
    <div style={{background:C.surface,borderRadius:10,border:`1px solid ${C.border}`,overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
          {['시각','장비','방향','명령','페이로드','결과'].map(h=><th key={h} style={{padding:'8px 12px',textAlign:'left',fontSize:11,fontWeight:700,color:C.textSec}}>{h}</th>)}
        </tr></thead>
        <tbody>{filtered.map((l,i)=><tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>
          <td style={{padding:'8px 12px',fontSize:12,fontFamily:'monospace'}}>{l.time}</td>
          <td style={{padding:'8px 12px',fontSize:12,fontWeight:600}}>{l.device}</td>
          <td style={{padding:'8px 12px',fontSize:14,textAlign:'center'}}>{l.dir}</td>
          <td style={{padding:'8px 12px'}}><span style={{padding:'2px 8px',borderRadius:4,background:l.cmd.includes('FAIL')||l.cmd.includes('TIMEOUT')?C.dangerBg:C.bg,fontSize:11,fontFamily:'monospace',fontWeight:600,color:l.cmd.includes('FAIL')||l.cmd.includes('TIMEOUT')?C.danger:C.text}}>{l.cmd}</span></td>
          <td style={{padding:'8px 12px',fontSize:12,fontFamily:'monospace',color:C.textSec}}>{l.payload||'-'}</td>
          <td style={{padding:'8px 12px'}}><Badge color={l.result==='ACK'||l.result==='OK'?C.success:C.danger} bg={l.result==='ACK'||l.result==='OK'?C.successBg:C.dangerBg}>{l.result}</Badge></td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>;
}

function StatusPage(){
  const [selected,setSelected]=useState(null);
  const states=['ISSUED','SENDING','NORMAL','DISCARDED','SKIPPED'];
  const fsmTransitions=[{from:'ISSUED',to:'SENDING',label:'QR 전송'},{from:'SENDING',to:'NORMAL',label:'Print Done ×10'},{from:'SENDING',to:'DISCARDED',label:'인쇄 오류'},{from:'ISSUED',to:'SKIPPED',label:'수동 건너뜀'}];
  const counts=Object.fromEntries(states.map(s=>[s,productions.filter(p=>p.status===s).length]));
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}>
      <h2 style={{fontSize:22,fontWeight:800}}>생산 상태 관리</h2>
      <p style={{fontSize:13,color:C.textSec,marginTop:4}}>QR_ID 상태 전이 (FSM) · 상태별 현황 · 이력 관리</p>
    </div>
    <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`,marginBottom:24}}>
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>상태 전이 다이어그램 (FSM)</h3>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:0,flexWrap:'wrap',padding:'16px 0'}}>
        {states.map((s,i)=>{const sc=statusColors[s];return <React.Fragment key={s}>
          <div style={{textAlign:'center',padding:'12px 16px',borderRadius:10,background:sc.bg,border:`2px solid ${sc.text}`,minWidth:100}}>
            <div style={{fontSize:14,fontWeight:700,color:sc.text}}>{sc.label}</div>
            <div style={{fontSize:20,fontWeight:800,color:sc.text,marginTop:4}}>{counts[s]}</div>
            <div style={{fontSize:10,color:C.textSec}}>{s}</div>
          </div>
          {i<states.length-1 && <div style={{fontSize:20,color:C.textSec,margin:'0 8px'}}>→</div>}
        </React.Fragment>})}
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:12,flexWrap:'wrap'}}>
        {fsmTransitions.map((t,i)=><div key={i} style={{background:C.bg,borderRadius:6,padding:'6px 12px',fontSize:11}}>
          <span style={{fontWeight:600}}>{t.from}</span> → <span style={{fontWeight:600}}>{t.to}</span>: {t.label}
        </div>)}
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:20}}>
      {states.map(s=>{const sc=statusColors[s];return <div key={s} style={{background:C.surface,borderRadius:8,padding:14,border:`1px solid ${C.border}`,textAlign:'center',cursor:'pointer'}} onClick={()=>setSelected(s===selected?null:s)}>
        <div style={{fontSize:24,fontWeight:800,color:sc.text}}>{counts[s]}</div>
        <div style={{fontSize:12,color:C.textSec}}>{sc.label} ({s})</div>
      </div>})}
    </div>
    <div style={{background:C.surface,borderRadius:10,border:`1px solid ${C.border}`,overflow:'hidden'}}>
      <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3 style={{fontSize:15,fontWeight:700}}>QR_ID 목록 {selected && `— ${statusColors[selected].label}`}</h3>
        {selected && <button onClick={()=>setSelected(null)} style={{fontSize:12,color:C.primary,background:'none',border:'none',cursor:'pointer'}}>필터 해제</button>}
      </div>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
          {['QR ID','상태','인쇄 진행','마킹기','시각','액션'].map(h=><th key={h} style={{padding:'8px 12px',textAlign:'left',fontSize:11,fontWeight:700,color:C.textSec}}>{h}</th>)}
        </tr></thead>
        <tbody>{(selected?productions.filter(p=>p.status===selected):productions).map(p=><tr key={p.qr_id} style={{borderBottom:`1px solid ${C.border}`}}>
          <td style={{padding:'8px 12px',fontSize:12,fontWeight:600,fontFamily:'monospace'}}>{p.qr_id}</td>
          <td style={{padding:'8px 12px'}}>{(()=>{const s=statusColors[p.status];return <Badge color={s.text} bg={s.bg}>{s.label}</Badge>})()}</td>
          <td style={{padding:'8px 12px',width:140}}><ProgressBar value={p.printed} max={p.total} color={statusColors[p.status].text}/><span style={{fontSize:10,color:C.textSec}}>{p.printed}/{p.total}</span></td>
          <td style={{padding:'8px 12px',fontSize:12}}>{p.marker}</td>
          <td style={{padding:'8px 12px',fontSize:12,fontFamily:'monospace'}}>{p.time}</td>
          <td style={{padding:'8px 12px'}}>{p.status==='ISSUED'&&<button style={{padding:'4px 10px',borderRadius:6,background:C.primary,color:'#fff',border:'none',fontSize:11,fontWeight:600,cursor:'pointer'}}>전송</button>}{p.status==='SENDING'&&<button style={{padding:'4px 10px',borderRadius:6,background:C.danger,color:'#fff',border:'none',fontSize:11,fontWeight:600,cursor:'pointer'}}>폐기</button>}</td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>;
}

function SyncPage(){
  const pending=syncQueue.filter(s=>s.status!=='완료').length;
  const failed=syncQueue.filter(s=>s.status==='실패').length;
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}>
      <h2 style={{fontSize:22,fontWeight:800}}>오프라인 동기화 큐</h2>
      <p style={{fontSize:13,color:C.textSec,marginTop:4}}>네트워크 단절 시 FIFO 큐 · 동기화 현황</p>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:24}}>
      <StatCard icon="📡" label="네트워크 상태" value="온라인" sub="서버 연결 정상" color={C.success}/>
      <StatCard icon="📋" label="큐 대기" value={`${pending}건`} sub="FIFO 순서 보장" color={C.warning}/>
      <StatCard icon="❌" label="전송 실패" value={`${failed}건`} sub="재시도 3회 초과" color={C.danger}/>
      <StatCard icon="💾" label="WAL 상태" value="정상" sub="SQLite WAL 모드" color={C.success}/>
    </div>
    <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`,marginBottom:24}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h3 style={{fontSize:15,fontWeight:700}}>동기화 진행률</h3>
        <span style={{fontSize:12,color:C.textSec}}>{syncQueue.filter(s=>s.status==='완료').length}/{syncQueue.length} 완료</span>
      </div>
      <ProgressBar value={syncQueue.filter(s=>s.status==='완료').length} max={syncQueue.length} color={C.primary}/>
      <div style={{fontSize:12,color:C.textSec,marginTop:8}}>SSE 스트림으로 진행률 실시간 수신 중</div>
    </div>
    <div style={{background:C.surface,borderRadius:10,border:`1px solid ${C.border}`,overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
          {['#','QR ID','상태','재시도','생성 시각','크기','액션'].map(h=><th key={h} style={{padding:'8px 12px',textAlign:'left',fontSize:11,fontWeight:700,color:C.textSec}}>{h}</th>)}
        </tr></thead>
        <tbody>{syncQueue.map(s=><tr key={s.id} style={{borderBottom:`1px solid ${C.border}`}}>
          <td style={{padding:'8px 12px',fontSize:12,fontWeight:600}}>{s.id}</td>
          <td style={{padding:'8px 12px',fontSize:12,fontFamily:'monospace'}}>{s.qr_id}</td>
          <td style={{padding:'8px 12px'}}>{(()=>{const sc=syncStatusColor[s.status]||{};return <Badge color={sc.text} bg={sc.bg}>{s.status}</Badge>})()}</td>
          <td style={{padding:'8px 12px',fontSize:12,color:s.retries>=3?C.danger:C.textSec,fontWeight:s.retries>=3?700:400}}>{s.retries}/3</td>
          <td style={{padding:'8px 12px',fontSize:12,fontFamily:'monospace'}}>{s.created}</td>
          <td style={{padding:'8px 12px',fontSize:12}}>{s.size}</td>
          <td style={{padding:'8px 12px'}}>{s.status==='실패'&&<button style={{padding:'4px 10px',borderRadius:6,background:C.warning,color:'#fff',border:'none',fontSize:11,fontWeight:600,cursor:'pointer'}}>재시도</button>}</td>
        </tr>)}</tbody>
      </table>
    </div>
    <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`,marginTop:16}}>
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>WAL 복구 가이드</h3>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {[{icon:'💾',title:'SQLite WAL 모드',desc:'Write-Ahead Logging으로 비정상 종료 시 데이터 무결성을 보장합니다'},{icon:'🔄',title:'자동 재개',desc:'마지막 커밋 지점부터 자동으로 작업을 재개합니다'},{icon:'📡',title:'FIFO 동기화',desc:'오프라인 데이터를 순서대로 서버에 동기화합니다'}].map((g,i)=><div key={i} style={{background:C.bg,borderRadius:8,padding:16}}>
          <div style={{fontSize:24,marginBottom:8}}>{g.icon}</div>
          <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{g.title}</div>
          <div style={{fontSize:12,color:C.textSec,lineHeight:1.5}}>{g.desc}</div>
        </div>)}
      </div>
    </div>
  </div>;
}

// ── App ──
function App(){
  const [page,setPage]=useState('생산라인 제어 대시보드');
  const [loading,setLoading]=useState(true);
  useEffect(()=>{setTimeout(()=>setLoading(false),500);},[]);
  const menuItems=[
    {name:'생산라인 제어 대시보드',icon:'🏭'},
    {name:'마킹기 통신 모니터링',icon:'🖨️'},
    {name:'생산 상태 관리',icon:'📊'},
    {name:'오프라인 동기화 큐',icon:'📡'}
  ];
  if(loading)return <div style={{display:'flex',minHeight:'100vh'}}><div style={{width:260,background:C.sidebarBg}}/><div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{textAlign:'center'}}><div style={{fontSize:40,marginBottom:12}}>🏭</div><div style={{color:C.textSec}}>로딩 중...</div></div></div></div>;
  return <div style={{display:'flex',minHeight:'100vh'}}>
    <div style={{width:260,background:C.sidebarBg,position:'fixed',top:0,bottom:0,display:'flex',flexDirection:'column',zIndex:100}}>
      <div style={{padding:'24px 20px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:8,background:'linear-gradient(135deg,#0066CC,#38BDF8)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🏭</div>
          <div><div style={{color:'#fff',fontWeight:800,fontSize:15}}>LineControl</div><div style={{color:'rgba(255,255,255,.5)',fontSize:11}}>생산라인 제어</div></div>
        </div>
      </div>
      <div style={{padding:'16px 12px',flex:1}}>
        {menuItems.map(item=><button key={item.name} title={item.name} onClick={()=>setPage(item.name)} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'11px 16px',borderRadius:8,border:'none',background:page===item.name?C.sidebarActive:'transparent',color:page===item.name?'#fff':'rgba(255,255,255,.6)',fontSize:13,fontWeight:page===item.name?600:400,cursor:'pointer',marginBottom:4,transition:'all .15s',textAlign:'left'}}>
          <span style={{fontSize:16}}>{item.icon}</span>{item.name}
        </button>)}
      </div>
      <div style={{padding:'16px 12px',borderTop:'1px solid rgba(255,255,255,.08)'}}>
        <div style={{padding:'8px 12px',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>👷</div>
          <div><div style={{color:'#fff',fontSize:13,fontWeight:600}}>작업자</div><div style={{color:'rgba(255,255,255,.4)',fontSize:11}}>라인 A · 주간 교대</div></div>
        </div>
      </div>
    </div>
    <div style={{flex:1,marginLeft:260}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'14px 32px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:50}}>
        <div style={{fontSize:14,color:C.textSec}}>종량제봉투 생산라인 제어 시스템</div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <ConnDot status="연결됨"/><span style={{fontSize:12,color:C.success}}>서버 연결</span>
          <span style={{fontSize:12,color:C.textSec}}>2025.01.20 14:32</span>
        </div>
      </div>
      <div style={{padding:32}}>
        {page==='생산라인 제어 대시보드' && <DashboardPage/>}
        {page==='마킹기 통신 모니터링' && <CommPage/>}
        {page==='생산 상태 관리' && <StatusPage/>}
        {page==='오프라인 동기화 큐' && <SyncPage/>}
      </div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
