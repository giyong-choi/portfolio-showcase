<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트 팩토리 멀티라인 MES 대시보드 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#FAFAFA;color:#1E1B4B;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#EDE9FE;}::-webkit-scrollbar-thumb{background:#A78BFA;border-radius:3px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo}=React;
const {BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,LineChart,Line,CartesianGrid,Legend,PieChart,Pie,Cell,ComposedChart,Area,RadarChart,Radar,PolarGrid,PolarAngleAxis,PolarRadiusAxis}=Recharts;

const C={primary:'#7C3AED',primaryLight:'#EDE9FE',secondary:'#1E1B4B',accent:'#A78BFA',bg:'#FAFAFA',surface:'#FFFFFF',text:'#1E1B4B',textSec:'#6B7280',border:'#E5E7EB',success:'#059669',successBg:'#D1FAE5',warning:'#D97706',warningBg:'#FEF3C7',danger:'#DC2626',dangerBg:'#FEE2E2',info:'#2563EB',infoBg:'#DBEAFE',sidebarBg:'#FAFAFA',sidebarHover:'#EDE9FE',sidebarActive:'#7C3AED'};

// ── Data ──
const lines=[
  {id:1,name:'라인 1 (종량제 3L)',status:'가동',target:5000,produced:3420,defect:12,oee:87.2,shift:'주간'},
  {id:2,name:'라인 2 (종량제 5L)',status:'가동',target:4000,produced:2890,defect:8,oee:91.5,shift:'주간'},
  {id:3,name:'라인 3 (종량제 10L)',status:'점검',target:3000,produced:0,defect:0,oee:0,shift:'-'},
  {id:4,name:'라인 4 (종량제 20L)',status:'가동',target:2500,produced:1850,defect:5,oee:89.8,shift:'주간'}
];
const lineStatusColor={가동:{c:C.success,bg:C.successBg},점검:{c:C.warning,bg:C.warningBg},정지:{c:C.danger,bg:C.dangerBg}};

const defectData=[
  {hour:'08',line1:2,line2:1,line4:0},{hour:'09',line1:1,line2:0,line4:1},{hour:'10',line1:3,line2:2,line4:0},
  {hour:'11',line1:1,line2:1,line4:1},{hour:'12',line1:0,line2:0,line4:0},{hour:'13',line1:2,line2:1,line4:2},{hour:'14',line1:3,line2:3,line4:1}
];
const defectTypes=[{type:'인쇄 번짐',count:15,pct:32},{type:'QR 미인식',count:10,pct:22},{type:'봉투 찢어짐',count:8,pct:17},{type:'규격 이탈',count:6,pct:13},{type:'잉크 부족',count:4,pct:9},{type:'기타',count:3,pct:7}];
const defectPieColors=[C.danger,'#F87171','#FCA5A5',C.warning,'#FDE68A',C.textSec];

const equipments=[
  {id:1,name:'Domino Ax350i',line:'라인 1',runHours:4520,nextCheck:'2025-02-01',status:'정상',errorCount:2,lastError:'2025-01-18'},
  {id:2,name:'Markem-Imaje 9450',line:'라인 2',runHours:3890,nextCheck:'2025-01-25',status:'점검 임박',errorCount:0,lastError:'-'},
  {id:3,name:'Videojet 1580',line:'라인 3',runHours:5120,nextCheck:'2025-01-22',status:'점검중',errorCount:5,lastError:'2025-01-20'},
  {id:4,name:'Domino Ax550i',line:'라인 4',runHours:2100,nextCheck:'2025-03-15',status:'정상',errorCount:1,lastError:'2025-01-10'},
  {id:5,name:'컨베이어 모터 A',line:'라인 1',runHours:8200,nextCheck:'2025-01-28',status:'점검 임박',errorCount:3,lastError:'2025-01-15'},
  {id:6,name:'라벨러 B',line:'라인 2',runHours:3500,nextCheck:'2025-04-01',status:'정상',errorCount:0,lastError:'-'}
];
const eqStatusColor={정상:{c:C.success,bg:C.successBg},'점검 임박':{c:C.warning,bg:C.warningBg},점검중:{c:C.info,bg:C.infoBg}};

const shiftData=[
  {shift:'주간 1교대',line1:1820,line2:1450,line4:980,defect1:5,defect2:3,defect4:2},
  {shift:'주간 2교대',line1:1600,line2:1440,line4:870,defect1:7,defect2:5,defect4:3}
];
const radarData=[
  {kpi:'OEE',line1:87,line2:92,line4:90},
  {kpi:'처리량',line1:68,line2:72,line4:74},
  {kpi:'품질',line1:96,line2:98,line4:97},
  {kpi:'가동률',line1:92,line2:95,line4:91},
  {kpi:'불량률(역)',line1:88,line2:94,line4:93}
];

// ── Components ──
function Badge({children,color=C.primary,bg=C.primaryLight}){
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:12,fontSize:11,fontWeight:600,color,background:bg}}>{children}</span>;
}
function KPICard({icon,label,value,sub,color=C.primary}){
  return <div style={{background:C.surface,borderRadius:14,padding:'18px 20px',border:`1px solid ${C.border}`,animation:'fadeIn .4s'}}>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
      <span style={{fontSize:18}}>{icon}</span><span style={{fontSize:12,color:C.textSec}}>{label}</span>
    </div>
    <div style={{fontSize:24,fontWeight:800,color}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:C.textSec,marginTop:4}}>{sub}</div>}
  </div>;
}
function ProgressBar({value,max,color=C.primary}){
  const pct=max>0?Math.min((value/max)*100,100):0;
  return <div style={{height:8,background:'#E5E7EB',borderRadius:4,overflow:'hidden'}}>
    <div style={{width:`${pct}%`,height:'100%',background:color,borderRadius:4,transition:'width .3s'}}/>
  </div>;
}

// ── Pages ──
function MultiLinePage(){
  const totalProduced=lines.reduce((s,l)=>s+l.produced,0);
  const totalTarget=lines.reduce((s,l)=>s+l.target,0);
  const totalDefect=lines.reduce((s,l)=>s+l.defect,0);
  const avgOee=lines.filter(l=>l.oee>0).reduce((s,l)=>s+l.oee,0)/lines.filter(l=>l.oee>0).length;
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <div><h2 style={{fontSize:22,fontWeight:800}}>멀티라인 생산 현황</h2><p style={{fontSize:13,color:C.textSec,marginTop:4}}>4개 라인 동시 모니터링 · 교대별 목표 달성률</p></div>
      <Badge color={C.success} bg={C.successBg}>실시간 연결</Badge>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:24}}>
      <KPICard icon="📦" label="총 생산량" value={totalProduced.toLocaleString()} sub={`목표 ${totalTarget.toLocaleString()}`} color={C.primary}/>
      <KPICard icon="🎯" label="목표 달성률" value={`${Math.round(totalProduced/totalTarget*100)}%`} color={C.success}/>
      <KPICard icon="⚙️" label="평균 OEE" value={`${avgOee.toFixed(1)}%`} color={C.info}/>
      <KPICard icon="⚠️" label="총 불량" value={`${totalDefect}건`} sub={`불량률 ${(totalDefect/totalProduced*100).toFixed(2)}%`} color={totalDefect>20?C.danger:C.warning}/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:14,marginBottom:24}}>
      {lines.map(l=>{const sc=lineStatusColor[l.status]||{};return <div key={l.id} style={{background:C.surface,borderRadius:14,padding:20,border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{width:10,height:10,borderRadius:'50%',background:sc.c||C.textSec}}/>
            <span style={{fontSize:16,fontWeight:700}}>{l.name}</span>
          </div>
          <Badge color={sc.c} bg={sc.bg}>{l.status}</Badge>
        </div>
        {l.status==='가동'?<div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <span style={{fontSize:12,color:C.textSec}}>생산 진행률</span>
            <span style={{fontSize:13,fontWeight:700}}>{l.produced.toLocaleString()} / {l.target.toLocaleString()}</span>
          </div>
          <ProgressBar value={l.produced} max={l.target} color={C.primary}/>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginTop:12}}>
            <div style={{background:C.bg,borderRadius:8,padding:8,textAlign:'center'}}><div style={{fontSize:16,fontWeight:800,color:C.info}}>{l.oee}%</div><div style={{fontSize:10,color:C.textSec}}>OEE</div></div>
            <div style={{background:C.bg,borderRadius:8,padding:8,textAlign:'center'}}><div style={{fontSize:16,fontWeight:800,color:l.defect>10?C.danger:C.warning}}>{l.defect}</div><div style={{fontSize:10,color:C.textSec}}>불량</div></div>
            <div style={{background:C.bg,borderRadius:8,padding:8,textAlign:'center'}}><div style={{fontSize:16,fontWeight:800}}>{l.shift}</div><div style={{fontSize:10,color:C.textSec}}>교대</div></div>
          </div>
        </div>:<div style={{padding:'20px 0',textAlign:'center',color:C.textSec}}><div style={{fontSize:24,marginBottom:4}}>🔧</div><div style={{fontSize:13}}>점검 진행 중</div></div>}
      </div>})}
    </div>
  </div>;
}

function DefectPage(){
  const [tab,setTab]=useState('추이');
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}>
      <h2 style={{fontSize:22,fontWeight:800}}>불량률 추적 및 분석</h2>
      <p style={{fontSize:13,color:C.textSec,marginTop:4}}>공정별 불량 유형 · SPC 관리도 · 파레토 분석</p>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:20}}>
      {['추이','유형 분석'].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:'8px 18px',borderRadius:20,border:`1px solid ${tab===t?C.primary:C.border}`,background:tab===t?C.primary:'transparent',color:tab===t?'#fff':C.textSec,fontSize:13,fontWeight:600,cursor:'pointer'}}>{t}</button>)}
    </div>
    {tab==='추이'&&<div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:20}}>
        <KPICard icon="⚠️" label="오늘 불량" value="25건" color={C.danger}/>
        <KPICard icon="📊" label="불량률" value="0.31%" sub="목표 0.50% 이하" color={C.warning}/>
        <KPICard icon="🔔" label="알림" value="1건" sub="라인1 임계값 초과" color={C.danger}/>
      </div>
      <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>시간대별 불량 발생 (SPC 관리도)</h3>
        <ResponsiveContainer width="100%" height={260}>
          <ComposedChart data={defectData}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="hour" tick={{fontSize:11}} tickFormatter={v=>`${v}시`}/><YAxis tick={{fontSize:11}}/><Tooltip contentStyle={{borderRadius:8,border:`1px solid ${C.border}`}}/><Legend iconType="circle" wrapperStyle={{fontSize:11}}/><Bar dataKey="line1" name="라인1" fill={C.primary} radius={[2,2,0,0]} stackId="a"/><Bar dataKey="line2" name="라인2" fill={C.accent} radius={[2,2,0,0]} stackId="a"/><Bar dataKey="line4" name="라인4" fill={C.info} radius={[2,2,0,0]} stackId="a"/><Line type="monotone" dataKey="line1" name="UCL" stroke={C.danger} strokeDasharray="5 5" dot={false}/></ComposedChart>
        </ResponsiveContainer>
      </div>
    </div>}
    {tab==='유형 분석'&&<div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>불량 유형 분포</h3>
          <ResponsiveContainer width="100%" height={240}>
            <PieChart><Pie data={defectTypes} cx="50%" cy="50%" innerRadius={50} outerRadius={85} dataKey="count" label={({type,pct})=>`${type} ${pct}%`} labelLine={false}>{defectTypes.map((_,i)=><Cell key={i} fill={defectPieColors[i]}/>)}</Pie><Tooltip/></PieChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>파레토 분석</h3>
          {defectTypes.map((d,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
            <span style={{fontSize:12,width:80,color:C.textSec}}>{d.type}</span>
            <div style={{flex:1,height:20,background:'#F3F4F6',borderRadius:4,overflow:'hidden'}}>
              <div style={{width:`${d.pct}%`,height:'100%',background:defectPieColors[i],borderRadius:4}}/>
            </div>
            <span style={{fontSize:12,fontWeight:600,minWidth:40,textAlign:'right'}}>{d.count}건</span>
          </div>)}
        </div>
      </div>
    </div>}
  </div>;
}

function MaintenancePage(){
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}>
      <h2 style={{fontSize:22,fontWeight:800}}>설비 예지보전 알림</h2>
      <p style={{fontSize:13,color:C.textSec,marginTop:4}}>가동 시간 추적 · 점검 주기 · 유지보수 일정</p>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:24}}>
      <KPICard icon="🔧" label="점검 임박" value={`${equipments.filter(e=>e.status==='점검 임박').length}대`} color={C.warning}/>
      <KPICard icon="🛠️" label="점검중" value={`${equipments.filter(e=>e.status==='점검중').length}대`} color={C.info}/>
      <KPICard icon="✅" label="정상" value={`${equipments.filter(e=>e.status==='정상').length}대`} color={C.success}/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
      {equipments.map(e=>{const sc=eqStatusColor[e.status]||{};return <div key={e.id} style={{background:C.surface,borderRadius:14,padding:20,border:`1px solid ${e.status==='점검 임박'?C.warning:C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
          <span style={{fontWeight:700,fontSize:14}}>{e.name}</span>
          <Badge color={sc.c} bg={sc.bg}>{e.status}</Badge>
        </div>
        <div style={{fontSize:12,color:C.textSec,marginBottom:12}}>{e.line}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div><div style={{fontSize:10,color:C.textSec}}>가동 시간</div><div style={{fontSize:15,fontWeight:700}}>{e.runHours.toLocaleString()}h</div></div>
          <div><div style={{fontSize:10,color:C.textSec}}>다음 점검</div><div style={{fontSize:13,fontWeight:600,color:new Date(e.nextCheck)<new Date('2025-01-25')?C.warning:C.text}}>{e.nextCheck}</div></div>
          <div><div style={{fontSize:10,color:C.textSec}}>오류 횟수</div><div style={{fontSize:15,fontWeight:700,color:e.errorCount>3?C.danger:C.text}}>{e.errorCount}회</div></div>
          <div><div style={{fontSize:10,color:C.textSec}}>최근 오류</div><div style={{fontSize:13}}>{e.lastError}</div></div>
        </div>
        {e.status==='점검 임박'&&<button style={{width:'100%',marginTop:12,padding:'8px',borderRadius:8,background:C.warning,color:'#fff',border:'none',fontSize:12,fontWeight:600,cursor:'pointer'}}>점검 등록</button>}
      </div>})}
    </div>
  </div>;
}

function ShiftReportPage(){
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <div><h2 style={{fontSize:22,fontWeight:800}}>생산 통계 및 교대 리포트</h2><p style={{fontSize:13,color:C.textSec,marginTop:4}}>교대별 집계 · 라인 비교 · PDF 리포트</p></div>
      <button style={{padding:'8px 20px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>📄 PDF 다운로드</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
      <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>교대별 생산량</h3>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={shiftData}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="shift" tick={{fontSize:11}}/><YAxis tick={{fontSize:11}}/><Tooltip contentStyle={{borderRadius:8}}/><Legend iconType="circle" wrapperStyle={{fontSize:11}}/><Bar dataKey="line1" name="라인1" fill={C.primary} radius={[2,2,0,0]}/><Bar dataKey="line2" name="라인2" fill={C.accent} radius={[2,2,0,0]}/><Bar dataKey="line4" name="라인4" fill={C.info} radius={[2,2,0,0]}/></BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>라인별 KPI 비교 (레이더)</h3>
        <ResponsiveContainer width="100%" height={220}>
          <RadarChart data={radarData}><PolarGrid stroke={C.border}/><PolarAngleAxis dataKey="kpi" tick={{fontSize:10}}/><PolarRadiusAxis tick={{fontSize:9}} domain={[0,100]}/><Tooltip/><Radar name="라인1" dataKey="line1" stroke={C.primary} fill={C.primary} fillOpacity={.2}/><Radar name="라인2" dataKey="line2" stroke={C.accent} fill={C.accent} fillOpacity={.2}/><Radar name="라인4" dataKey="line4" stroke={C.info} fill={C.info} fillOpacity={.2}/><Legend iconType="circle" wrapperStyle={{fontSize:11}}/></RadarChart>
        </ResponsiveContainer>
      </div>
    </div>
    <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>교대 인수인계 요약</h3>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
            {['교대','라인1 생산','라인2 생산','라인4 생산','라인1 불량','라인2 불량','라인4 불량'].map(h=><th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:11,fontWeight:700,color:C.textSec}}>{h}</th>)}
          </tr></thead>
          <tbody>{shiftData.map((s,i)=><tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>
            <td style={{padding:'10px 14px',fontWeight:600,fontSize:13}}>{s.shift}</td>
            <td style={{padding:'10px 14px',fontSize:13}}>{s.line1.toLocaleString()}</td>
            <td style={{padding:'10px 14px',fontSize:13}}>{s.line2.toLocaleString()}</td>
            <td style={{padding:'10px 14px',fontSize:13}}>{s.line4.toLocaleString()}</td>
            <td style={{padding:'10px 14px',fontSize:13,color:s.defect1>5?C.danger:C.text}}>{s.defect1}</td>
            <td style={{padding:'10px 14px',fontSize:13,color:s.defect2>5?C.danger:C.text}}>{s.defect2}</td>
            <td style={{padding:'10px 14px',fontSize:13,color:s.defect4>5?C.danger:C.text}}>{s.defect4}</td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>
  </div>;
}
