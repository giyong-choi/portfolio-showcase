  {id:5,branch:'인천송도점',order:'PH-2025-006',rating:4,comment:'전반적으로 좋지만 조명 보정을 좀 더 밝게 해주세요.',date:'2025-01-16',retoucher:'정다은'}

// ── Components ──
function Badge({children,color=C.primary,bg=C.primaryLight}){
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:12,fontSize:12,fontWeight:600,color,background:bg}}>{children}</span>;
}

function KPICard({icon,label,value,sub,color=C.primary,accent}){
  return <div style={{background:C.surface,borderRadius:10,padding:'18px 20px',border:`1px solid ${C.border}`,position:'relative',overflow:'hidden',animation:'fadeIn .4s'}}>
    <div style={{position:'absolute',top:-10,right:-10,width:60,height:60,borderRadius:'50%',background:`${color}10`,opacity:.5}}/>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
      <span style={{fontSize:18}}>{icon}</span>
      <span style={{fontSize:12,color:C.textSec,fontWeight:500}}>{label}</span>
    </div>
    <div style={{fontSize:26,fontWeight:800,color}}>{value}</div>
    {sub && <div style={{fontSize:11,color:C.textSec,marginTop:4}}>{sub}</div>}
  </div>;
}

function ConfidenceMeter({value}){
  const color=value>=80?C.success:value>=60?C.warning:C.danger;
  return <div style={{display:'flex',alignItems:'center',gap:8}}>
    <div style={{flex:1,height:6,background:'#E5E7EB',borderRadius:3,overflow:'hidden'}}>
      <div style={{width:`${value}%`,height:'100%',background:color,borderRadius:3,transition:'width .5s'}}/>
    </div>
    <span style={{fontSize:12,fontWeight:700,color,minWidth:36}}>{value}%</span>
  </div>;
}

function StarRating({value}){
  return <span style={{fontSize:14}}>{Array.from({length:5},(_,i)=>i<Math.floor(value)?'★':'☆').join('')} <span style={{fontSize:12,fontWeight:700,color:C.accent}}>{value}</span></span>;
}

function Drawer({open,onClose,title,children}){
  if(!open)return null;
  return <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.35)',zIndex:1000,animation:'fadeIn .15s'}}>
    <div onClick={e=>e.stopPropagation()} style={{position:'absolute',right:0,top:0,bottom:0,width:520,background:C.surface,boxShadow:'-8px 0 30px rgba(0,0,0,.12)',overflow:'auto'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:C.surface,zIndex:1}}>
        <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSec}}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>;
}

// ── Pages ──

      <div style={{display:'flex',gap:8}}>
        {['오늘','이번 주','이번 달'].map((t,i)=><button key={t} style={{padding:'6px 14px',borderRadius:6,border:`1px solid ${i===2?C.primary:C.border}`,background:i===2?C.primaryLight:'transparent',color:i===2?C.primary:C.textSec,fontSize:12,fontWeight:600,cursor:'pointer'}}>{t}</button>)}
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:24}}>
      <KPICard icon="📊" label="총 주문" value={kpiData.totalOrders.toLocaleString()+'건'} sub="전월 대비 +12%" color={C.primary}/>
      <KPICard icon="🤖" label="AI 처리 건수" value={kpiData.aiProcessed.toLocaleString()+'건'} sub={`전체의 ${Math.round(kpiData.aiProcessed/kpiData.totalOrders*100)}%`} color={C.info}/>
      <KPICard icon="⭐" label="평균 품질 점수" value={kpiData.avgQuality+'/5.0'} sub="보정사 5명 평균" color={C.accent}/>
      <KPICard icon="💰" label="미정산 가맹점" value={kpiData.pendingSettlement+'곳'} sub="이번 달 정산 대기" color={C.warning}/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:24}}>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>

        </ResponsiveContainer>

      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>AI 자동화율</h3>
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{fontSize:48,fontWeight:800,color:C.primary}}>68%</div>
          <div style={{fontSize:12,color:C.textSec}}>AI 자동 처리 비율</div>
        </div>
        <ResponsiveContainer width="100%" height={140}>
          <PieChart><Pie data={aiRateData} cx="50%" cy="50%" innerRadius={40} outerRadius={60} dataKey="value">{aiRateData.map((_,i)=><Cell key={i} fill={pieColors[i]}/>)}</Pie></PieChart>

function AIProcessPage(){
  const [tab,setTab]=useState('전체');
  const [selected,setSelected]=useState(null);
  const filtered=tab==='전체'?aiQueue:aiQueue.filter(a=>a.status===tab);
  const tabs=['전체','자동 승인','검토 필요','수동 전환'];
  const aiStatusColor={'자동 승인':{color:C.success,bg:C.successBg},'검토 필요':{color:C.warning,bg:C.warningBg},'수동 전환':{color:C.danger,bg:C.dangerBg}};
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <div><h2 style={{fontSize:22,fontWeight:800}}>AI 보정 파이프라인</h2><p style={{fontSize:13,color:C.textSec,marginTop:4}}>OpenAI Vision API 기반 자동 보정 결과를 관리합니다</p></div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:C.success,animation:'glow 2s infinite'}}/>
        <span style={{fontSize:12,color:C.success,fontWeight:600}}>AI 엔진 가동중</span>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:20}}>
      <KPICard icon="✅" label="자동 승인" value={`${aiQueue.filter(a=>a.status==='자동 승인').length}건`} sub="신뢰도 80% 이상" color={C.success}/>
      <KPICard icon="👁️" label="검토 필요" value={`${aiQueue.filter(a=>a.status==='검토 필요').length}건`} sub="신뢰도 60~79%" color={C.warning}/>
      <KPICard icon="🔄" label="수동 전환" value={`${aiQueue.filter(a=>a.status==='수동 전환').length}건`} sub="신뢰도 60% 미만" color={C.danger}/>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      {tabs.map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:'7px 16px',borderRadius:20,border:`1px solid ${tab===t?C.primary:C.border}`,background:tab===t?C.primary:'transparent',color:tab===t?'#fff':C.textSec,fontSize:13,fontWeight:600,cursor:'pointer'}}>{t}</button>)}
    </div>
    <div style={{background:C.surface,borderRadius:10,border:`1px solid ${C.border}`,overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
          {['ID','주문번호','가맹점','유형','사진 수','AI 결과','신뢰도','처리속도','상태'].map(h=><th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:11,fontWeight:700,color:C.textSec}}>{h}</th>)}
        </tr></thead>
        <tbody>{filtered.map(a=><tr key={a.id} onClick={()=>setSelected(a)} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background=C.secondary} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <td style={{padding:'10px 14px',fontSize:12,fontWeight:600,color:C.primary}}>{a.id}</td>
          <td style={{padding:'10px 14px',fontSize:12}}>{a.order}</td>
          <td style={{padding:'10px 14px',fontSize:12}}>{a.branch}</td>
          <td style={{padding:'10px 14px',fontSize:12}}>{a.type}</td>
          <td style={{padding:'10px 14px',fontSize:12}}>{a.photos}장</td>
          <td style={{padding:'10px 14px',fontSize:12}}>{a.aiResult}</td>
          <td style={{padding:'10px 14px',width:130}}><ConfidenceMeter value={a.confidence}/></td>
          <td style={{padding:'10px 14px',fontSize:12,fontFamily:'monospace'}}>{a.time}</td>
          <td style={{padding:'10px 14px'}}>{(()=>{const s=aiStatusColor[a.status]||{};return <Badge color={s.color} bg={s.bg}>{a.status}</Badge>})()}</td>
        </tr>)}</tbody>
      </table>
    </div>
    <Drawer open={!!selected} onClose={()=>setSelected(null)} title={`AI 보정 상세 — ${selected?.id||''}`}>
      {selected && <div>
        <div style={{background:C.secondary,borderRadius:10,padding:20,marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
            <span style={{fontSize:14,fontWeight:700}}>신뢰도 스코어</span>
            {(()=>{const s=aiStatusColor[selected.status]||{};return <Badge color={s.color} bg={s.bg}>{selected.status}</Badge>})()}
          </div>
          <ConfidenceMeter value={selected.confidence}/>
          <div style={{fontSize:12,color:C.textSec,marginTop:8}}>
            {selected.confidence>=80?'높은 신뢰도로 자동 승인되었습니다.':selected.confidence>=60?'중간 신뢰도입니다. 관리자 검토가 필요합니다.':'낮은 신뢰도로 수동 보정으로 전환됩니다.'}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
          {[['주문번호',selected.order],['가맹점',selected.branch],['사진 유형',selected.type],['사진 수',`${selected.photos}장`],['AI 결과',selected.aiResult],['처리 속도',selected.time]].map(([k,v])=><div key={k} style={{background:'#FAFAF9',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec,marginBottom:2}}>{k}</div><div style={{fontSize:13,fontWeight:600}}>{v}</div></div>)}
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>AI 처리 파이프라인</div>
          {['원본 업로드','Vision API 분석','보정 유형 분류','자동 보정 적용','신뢰도 판정'].map((s,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
            <div style={{width:24,height:24,borderRadius:'50%',background:i<=3?C.primary:C.border,color:i<=3?'#fff':C.textSec,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>{i<=3?'✓':i+1}</div>
            <span style={{fontSize:13,color:i<=3?C.text:C.textSec}}>{s}</span>
          </div>)}
        </div>
        {selected.status==='검토 필요' && <div style={{display:'flex',gap:8}}>
          <button style={{flex:1,padding:'10px',borderRadius:8,background:C.success,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>승인</button>
          <button style={{flex:1,padding:'10px',borderRadius:8,background:C.surface,color:C.danger,border:`1px solid ${C.danger}`,fontSize:13,fontWeight:600,cursor:'pointer'}}>재처리</button>
        </div>}
      </div>}
    </Drawer>
  </div>;
}

function SettlementPage(){
  const [selected,setSelected]=useState(null);
  const [period,setPeriod]=useState('2025년 1월');
  const periodFiltered=settlements.filter(s=>s.period===period);
  const totalGross=periodFiltered.reduce((s,r)=>s+parseInt(r.gross.replace(/,/g,'')),0);
  const totalFee=periodFiltered.reduce((s,r)=>s+parseInt(r.fee.replace(/,/g,'')),0);
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <div><h2 style={{fontSize:22,fontWeight:800}}>가맹점 정산</h2><p style={{fontSize:13,color:C.textSec,marginTop:4}}>월별 정산 집계 및 정산서를 관리합니다</p></div>
      <div style={{display:'flex',gap:8}}>
        {['2024년 12월','2025년 1월'].map(p=><button key={p} onClick={()=>setPeriod(p)} style={{padding:'8px 16px',borderRadius:8,border:`1px solid ${period===p?C.primary:C.border}`,background:period===p?C.primary:'transparent',color:period===p?'#fff':C.textSec,fontSize:13,fontWeight:600,cursor:'pointer'}}>{p}</button>)}
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
      <KPICard icon="💰" label="총 매출" value={`${(totalGross/10000).toLocaleString()}만원`} color={C.primary}/>
      <KPICard icon="📝" label="수수료 합계" value={`${(totalFee/10000).toLocaleString()}만원`} sub="수수료율 10%" color={C.accent}/>
      <KPICard icon="✅" label="확정" value={`${periodFiltered.filter(s=>s.status==='확정').length}건`} color={C.info}/>
      <KPICard icon="⏳" label="미확정" value={`${periodFiltered.filter(s=>s.status==='미확정').length}건`} color={C.warning}/>
    </div>
    <div style={{background:C.surface,borderRadius:10,border:`1px solid ${C.border}`,overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
          {['가맹점','정산 기간','주문 수','총 매출','수수료','정산 금액','상태','액션'].map(h=><th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:11,fontWeight:700,color:C.textSec}}>{h}</th>)}
        </tr></thead>
        <tbody>{periodFiltered.map(s=><tr key={s.id} onClick={()=>setSelected(s)} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background=C.secondary} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <td style={{padding:'10px 14px',fontSize:13,fontWeight:600}}>{s.branch}</td>
          <td style={{padding:'10px 14px',fontSize:12}}>{s.period}</td>
          <td style={{padding:'10px 14px',fontSize:12}}>{s.orders}건</td>
          <td style={{padding:'10px 14px',fontSize:12,fontWeight:600}}>{s.gross}원</td>
          <td style={{padding:'10px 14px',fontSize:12,color:C.danger}}>-{s.fee}원</td>
          <td style={{padding:'10px 14px',fontSize:13,fontWeight:700,color:C.primary}}>{s.net}원</td>
          <td style={{padding:'10px 14px'}}>{(()=>{const st=settlementStatus[s.status]||{};return <Badge color={st.color} bg={st.bg}>{s.status}</Badge>})()}</td>
          <td style={{padding:'10px 14px'}}>
            {s.status==='미확정' && <button style={{padding:'5px 12px',borderRadius:6,background:C.primary,color:'#fff',border:'none',fontSize:11,fontWeight:600,cursor:'pointer'}}>확정</button>}
            {s.status==='확정' && <button style={{padding:'5px 12px',borderRadius:6,background:C.accent,color:'#fff',border:'none',fontSize:11,fontWeight:600,cursor:'pointer'}}>PDF 발행</button>}
          </td>
        </tr>)}</tbody>
      </table>
    </div>
    <Drawer open={!!selected} onClose={()=>setSelected(null)} title={`정산 상세 — ${selected?.branch||''}`}>
      {selected && <div>
        <div style={{background:C.secondary,borderRadius:10,padding:24,textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:12,color:C.textSec,marginBottom:4}}>정산 금액</div>
          <div style={{fontSize:32,fontWeight:800,color:C.primary}}>{selected.net}원</div>
          <div style={{fontSize:12,color:C.textSec,marginTop:4}}>{selected.period}</div>
        </div>
        <div style={{marginBottom:20}}>
          {[['총 매출',`${selected.gross}원`],['수수료 (10%)',`-${selected.fee}원`],['정산 금액',`${selected.net}원`],['주문 수',`${selected.orders}건`],['상태',selected.status],['지급일',selected.paidDate||'미지급']].map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
            <span style={{fontSize:13,color:C.textSec}}>{k}</span>
            <span style={{fontSize:13,fontWeight:600}}>{v}</span>
          </div>)}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button style={{flex:1,padding:'10px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>PDF 정산서 생성</button>
          <button style={{flex:1,padding:'10px',borderRadius:8,background:C.surface,color:C.text,border:`1px solid ${C.border}`,fontSize:13,fontWeight:600,cursor:'pointer'}}>알림톡 발송</button>
        </div>
      </div>}
    </Drawer>
  </div>;
}

function QualityPage(){
  const [tab,setTab]=useState('보정사 현황');
  const trendColor={상승:C.success,유지:C.textSec,하락:C.danger};
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}>
      <h2 style={{fontSize:22,fontWeight:800}}>보정 품질 관리</h2>
      <p style={{fontSize:13,color:C.textSec,marginTop:4}}>보정사별 품질 점수와 피드백을 관리합니다</p>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:20}}>
      {['보정사 현황','품질 추이','피드백'].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:'8px 18px',borderRadius:20,border:`1px solid ${tab===t?C.primary:C.border}`,background:tab===t?C.primary:'transparent',color:tab===t?'#fff':C.textSec,fontSize:13,fontWeight:600,cursor:'pointer'}}>{t}</button>)}
    </div>
    {tab==='보정사 현황' && <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:20}}>
        <KPICard icon="⭐" label="평균 품질" value="4.3/5.0" color={C.accent}/>
        <KPICard icon="🔄" label="평균 재작업률" value="4.7%" color={C.warning}/>
        <KPICard icon="👥" label="활동 보정사" value={`${qualityData.length}명`} color={C.primary}/>
      </div>
      <div style={{background:C.surface,borderRadius:10,border:`1px solid ${C.border}`,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
            {['보정사','평균 점수','처리 건수','재작업','재작업률','추세'].map(h=><th key={h} style={{padding:'12px 16px',textAlign:'left',fontSize:11,fontWeight:700,color:C.textSec}}>{h}</th>)}
          </tr></thead>
          <tbody>{qualityData.map((q,i)=><tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>
            <td style={{padding:'12px 16px'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:32,height:32,borderRadius:'50%',background:C.primaryLight,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>👤</div>
                <span style={{fontSize:14,fontWeight:600}}>{q.retoucher}</span>
              </div>
            </td>
            <td style={{padding:'12px 16px'}}><StarRating value={q.avg}/></td>
            <td style={{padding:'12px 16px',fontSize:13}}>{q.total}건</td>
            <td style={{padding:'12px 16px',fontSize:13}}>{q.rework}건</td>
            <td style={{padding:'12px 16px'}}><span style={{fontWeight:600,color:parseFloat(q.reworkRate)>5?C.danger:parseFloat(q.reworkRate)>3?C.warning:C.success}}>{q.reworkRate}</span></td>
            <td style={{padding:'12px 16px'}}><Badge color={trendColor[q.trend]} bg={q.trend==='상승'?C.successBg:q.trend==='하락'?C.dangerBg:'#F1F5F9'}>{q.trend==='상승'?'↑':'↓'} {q.trend}</Badge></td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>}
    {tab==='품질 추이' && <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>월별 평균 품질 점수</h3>
          <ResponsiveContainer width="100%" height={240}>
            <LineChart data={qualityTrend}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="month" tick={{fontSize:12}}/><YAxis domain={[3.5,5]} tick={{fontSize:12}}/><Tooltip contentStyle={{borderRadius:8}}/><Line type="monotone" dataKey="avg" name="평균 점수" stroke={C.accent} strokeWidth={3} dot={{r:4,fill:C.accent}}/></LineChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>월별 재작업 건수</h3>
          <ResponsiveContainer width="100%" height={240}>
            <BarChart data={qualityTrend}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="month" tick={{fontSize:12}}/><YAxis tick={{fontSize:12}}/><Tooltip contentStyle={{borderRadius:8}}/><Bar dataKey="rework" name="재작업" fill={C.danger} radius={[4,4,0,0]}/></BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>}
    {tab==='피드백' && <div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {feedbacks.map(f=><div key={f.id} style={{background:C.surface,borderRadius:10,padding:20,border:`1px solid ${C.border}`,animation:'fadeIn .4s'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontWeight:700,fontSize:14}}>{f.branch}</span>
              <span style={{fontSize:12,color:C.textSec}}>{f.order}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <StarRating value={f.rating}/>
              <span style={{fontSize:12,color:C.textSec}}>{f.date}</span>
            </div>
          </div>
          <div style={{fontSize:14,lineHeight:1.6,color:C.text,marginBottom:8}}>{f.comment}</div>
          <div style={{fontSize:12,color:C.textSec}}>보정사: <span style={{fontWeight:600,color:C.text}}>{f.retoucher}</span></div>
        </div>)}
      </div>
    </div>}
  </div>;
}

// ── App ──
function App(){
  const [page,setPage]=useState('통합 대시보드');
  const [loading,setLoading]=useState(true);
  useEffect(()=>{setTimeout(()=>setLoading(false),500);},[]);

  const menuItems=[
    {name:'통합 대시보드',icon:'📊',desc:'전체 현황'},
    {name:'AI 보정 파이프라인',icon:'🤖',desc:'자동 보정'},
    {name:'가맹점 정산',icon:'💰',desc:'정산 관리'},
    {name:'보정 품질 관리',icon:'⭐',desc:'품질 모니터'}
  ];

  if(loading)return <div style={{display:'flex',minHeight:'100vh'}}><div style={{width:240,background:C.sidebarBg}}/><div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{textAlign:'center'}}><div style={{fontSize:40,marginBottom:12}}>🤖</div><div style={{fontSize:16,color:C.textSec}}>로딩 중...</div></div></div></div>;

  return <div style={{display:'flex',minHeight:'100vh'}}>
    <div style={{width:240,background:C.sidebarBg,borderRight:`1px solid ${C.border}`,position:'fixed',top:0,bottom:0,display:'flex',flexDirection:'column',zIndex:100}}>
      <div style={{padding:'22px 18px',borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:'linear-gradient(135deg,#059669,#34D399)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🤖</div>
          <div><div style={{fontWeight:800,fontSize:15,color:C.text}}>PhotoFlow+</div><div style={{fontSize:10,color:C.textSec}}>AI 보정 확장판</div></div>
        </div>
      </div>
      <div style={{padding:'14px 10px',flex:1}}>
        {menuItems.map(item=><button key={item.name} title={item.name} onClick={()=>setPage(item.name)} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:8,border:'none',background:page===item.name?C.sidebarActive:'transparent',color:page===item.name?'#fff':C.text,fontSize:13,fontWeight:page===item.name?600:400,cursor:'pointer',marginBottom:2,transition:'all .15s',textAlign:'left'}}>
          <span style={{fontSize:15,width:24,textAlign:'center'}}>{item.icon}</span>
          <div>
            <div>{item.name.length>8?item.name.substring(0,8)+'..':item.name}</div>
            <div style={{fontSize:10,opacity:.6,marginTop:1}}>{item.desc}</div>
          </div>
        </button>)}
      </div>
      <div style={{padding:'14px 10px',borderTop:`1px solid ${C.border}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px'}}>
          <div style={{width:30,height:30,borderRadius:'50%',background:C.primaryLight,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}}>👤</div>
          <div><div style={{fontSize:12,fontWeight:600,color:C.text}}>운영 관리자</div><div style={{fontSize:10,color:C.textSec}}>admin@photoflow.kr</div></div>
        </div>
      </div>
    </div>
    <div style={{flex:1,marginLeft:240}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'12px 28px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:50}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:14,color:C.textSec}}>사진 보정 플랫폼 확장판</span>
          <Badge color={C.success} bg={C.successBg}>AI 엔진 ON</Badge>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:13,color:C.textSec}}>2025.01.20</span>
          <span style={{fontSize:18,cursor:'pointer'}}>🔔</span>
        </div>
      </div>
      <div style={{padding:28}}>
        {page==='통합 대시보드' && <DashboardPage/>}
        {page==='AI 보정 파이프라인' && <AIProcessPage/>}
        {page==='가맹점 정산' && <SettlementPage/>}
        {page==='보정 품질 관리' && <QualityPage/>}
      </div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
