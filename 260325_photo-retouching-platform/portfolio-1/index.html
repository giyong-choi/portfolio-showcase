  {id:'PH-2025-010',branch:'강남점',photos:18,size:'프로필사진 5x7',total:324000,status:'보정중',date:'2025-01-14',deadline:'2025-01-17'}

  {id:2,msg:'홍대점 주문 PH-2025-002 보정이 시작되었습니다.',time:'25분 전',read:false},
  {id:3,msg:'부산서면점 주문 PH-2025-003 결과물이 전달되었습니다.',time:'1시간 전',read:true},
  {id:4,msg:'수원점 가맹점 가입 승인 요청이 도착했습니다.',time:'2시간 전',read:false}

// ── Components ──
function Badge({children,color=C.primary,bg=C.primaryLight}){
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:12,fontSize:12,fontWeight:600,color,background:bg}}>{children}</span>;
}

function StatCard({icon,label,value,sub,color=C.primary}){
  return <div style={{background:C.surface,borderRadius:10,padding:'20px 24px',border:`1px solid ${C.border}`,animation:'fadeIn .4s'}}>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
      <span style={{fontSize:20}}>{icon}</span>
      <span style={{fontSize:13,color:C.textSec}}>{label}</span>
    </div>
    <div style={{fontSize:28,fontWeight:800,color}}>{value}</div>
    {sub && <div style={{fontSize:12,color:C.textSec,marginTop:4}}>{sub}</div>}
  </div>;
}

function StatusBadge({status}){
  const s=statusColors[status]||{bg:'#F1F5F9',text:'#64748B',icon:'📋'};
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:600,background:s.bg,color:s.text}}>{s.icon} {status}</span>;
}

function Table({columns,data,onRowClick}){
  return <div style={{background:C.surface,borderRadius:10,border:`1px solid ${C.border}`,overflow:'hidden'}}>
    <div style={{overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead>
          <tr style={{borderBottom:`2px solid ${C.border}`}}>
            {columns.map((col,i)=><th key={i} style={{padding:'12px 16px',textAlign:'left',fontSize:12,fontWeight:700,color:C.textSec,textTransform:'uppercase',letterSpacing:.5,whiteSpace:'nowrap'}}>{col.label}</th>)}
          </tr>
        </thead>
        <tbody>
          {data.map((row,ri)=><tr key={ri} onClick={()=>onRowClick&&onRowClick(row)} style={{borderBottom:`1px solid ${C.border}`,cursor:onRowClick?'pointer':'default',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background=C.secondary} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            {columns.map((col,ci)=><td key={ci} style={{padding:'12px 16px',fontSize:13,whiteSpace:'nowrap'}}>{col.render?col.render(row):row[col.key]}</td>)}
          </tr>)}
        </tbody>
      </table>
    </div>
  </div>;
}

function Drawer({open,onClose,title,children}){
  if(!open)return null;
  return <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.35)',zIndex:1000,animation:'fadeIn .15s'}}>
    <div onClick={e=>e.stopPropagation()} style={{position:'absolute',right:0,top:0,bottom:0,width:520,background:C.surface,boxShadow:'-8px 0 30px rgba(0,0,0,.12)',overflow:'auto'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:C.surface,zIndex:1}}>
        <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSec}}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>;
}

// ── Pages ──
function DashboardPage(){
  const pending=orders.filter(o=>o.status==='접수').length;
  const processing=orders.filter(o=>o.status==='보정중').length;
  const completed=orders.filter(o=>o.status==='완료'||o.status==='전달').length;
  const totalRevenue=orders.reduce((s,o)=>s+o.total,0);
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <div><h2 style={{fontSize:22,fontWeight:800}}>대시보드</h2><p style={{fontSize:13,color:C.textSec,marginTop:4}}>사진 보정 주문 현황을 한눈에 확인하세요</p></div>
      <div style={{display:'flex',gap:8}}>{notifications.filter(n=>!n.read).length>0 && <span style={{background:C.danger,color:'#fff',borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:600,animation:'pulse 2s infinite'}}>알림 {notifications.filter(n=>!n.read).length}건</span>}</div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:28}}>
      <StatCard icon="📥" label="접수 대기" value={`${pending}건`} sub="금일 신규 접수" color={C.info}/>
      <StatCard icon="🖌️" label="보정 진행중" value={`${processing}건`} sub="작업자 배정 완료" color={C.warning}/>
      <StatCard icon="✅" label="처리 완료" value={`${completed}건`} sub="이번 주 완료" color={C.success}/>
      <StatCard icon="💰" label="이번 달 매출" value={`${(totalRevenue/10000).toFixed(0)}만원`} sub={`주문 ${orders.length}건 기준`} color={C.primary}/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:28}}>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>월별 주문량 및 매출 추이</h3>
        <ResponsiveContainer width="100%" height={240}>
          <AreaChart data={monthlyData}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="month" tick={{fontSize:12}} stroke={C.textSec}/><YAxis yAxisId="left" tick={{fontSize:12}} stroke={C.textSec}/><YAxis yAxisId="right" orientation="right" tick={{fontSize:12}} stroke={C.textSec}/><Tooltip contentStyle={{borderRadius:8,border:`1px solid ${C.border}`}}/><Area yAxisId="left" type="monotone" dataKey="orders" name="주문 수" fill={C.primaryLight} stroke={C.primary} strokeWidth={2}/><Line yAxisId="right" type="monotone" dataKey="revenue" name="매출(만원)" stroke={C.accent} strokeWidth={2} dot={{r:3}}/></AreaChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>가맹점별 주문 비율</h3>
        <ResponsiveContainer width="100%" height={240}>
          <PieChart><Pie data={branchSales} cx="50%" cy="50%" innerRadius={50} outerRadius={85} dataKey="value" label={({name,value})=>`${name} ${value}%`} labelLine={false}>{branchSales.map((_,i)=><Cell key={i} fill={pieColors[i]}/>)}</Pie><Tooltip/></PieChart>
        </ResponsiveContainer>
      </div>
    </div>
    <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h3 style={{fontSize:15,fontWeight:700}}>최근 주문</h3>
        <span style={{fontSize:12,color:C.primary,cursor:'pointer',fontWeight:600}}>전체 보기 →</span>
      </div>
      <Table columns={[
        {label:'주문번호',key:'id'},
        {label:'가맹점',key:'branch'},
        {label:'사진 수',render:r=>`${r.photos}장`},
        {label:'규격',key:'size'},
        {label:'금액',render:r=>`${r.total.toLocaleString()}원`},
        {label:'상태',render:r=><StatusBadge status={r.status}/>},
        {label:'마감일',key:'deadline'}
      ]} data={orders.slice(0,5)}/>
    </div>
    <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`,marginTop:16}}>
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>최근 알림</h3>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {notifications.map(n=><div key={n.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderRadius:8,background:n.read?'transparent':C.secondary,border:`1px solid ${n.read?C.border:'transparent'}`}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:n.read?'transparent':C.primary,flexShrink:0}}/>
          <span style={{flex:1,fontSize:13,color:n.read?C.textSec:C.text}}>{n.msg}</span>
          <span style={{fontSize:11,color:C.textSec,whiteSpace:'nowrap'}}>{n.time}</span>
        </div>)}
      </div>
    </div>
  </div>;
}

function OrderPage(){
  const [filter,setFilter]=useState('전체');
  const [selected,setSelected]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [newOrder,setNewOrder]=useState({branch:'강남점',size:sizeOptions[0].name,photos:1});
  const filtered=filter==='전체'?orders:orders.filter(o=>o.status===filter);
  const tabs=['전체','접수','보정중','완료','전달'];
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <div><h2 style={{fontSize:22,fontWeight:800}}>주문 관리</h2><p style={{fontSize:13,color:C.textSec,marginTop:4}}>사진 보정 주문을 관리하고 상태를 추적합니다</p></div>
      <button onClick={()=>setShowNew(true)} style={{background:C.primary,color:'#fff',border:'none',borderRadius:8,padding:'10px 20px',fontSize:14,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>+ 수동 접수</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
      <StatCard icon="📥" label="접수 대기" value={`${orders.filter(o=>o.status==='접수').length}건`} color={C.info}/>
      <StatCard icon="🖌️" label="보정중" value={`${orders.filter(o=>o.status==='보정중').length}건`} color={C.warning}/>
      <StatCard icon="✅" label="완료" value={`${orders.filter(o=>o.status==='완료').length}건`} color={C.success}/>
      <StatCard icon="📦" label="전달" value={`${orders.filter(o=>o.status==='전달').length}건`} color={C.primary}/>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      {tabs.map(t=><button key={t} onClick={()=>setFilter(t)} style={{padding:'8px 18px',borderRadius:20,border:`1px solid ${filter===t?C.primary:C.border}`,background:filter===t?C.primary:'transparent',color:filter===t?'#fff':C.textSec,fontSize:13,fontWeight:600,cursor:'pointer',transition:'all .2s'}}>{t} {t!=='전체'&&<span style={{marginLeft:4,opacity:.7}}>({orders.filter(o=>t==='전체'||o.status===t).length})</span>}</button>)}
    </div>
    <Table columns={[
      {label:'주문번호',key:'id',render:r=><span style={{fontWeight:600,color:C.primary}}>{r.id}</span>},
      {label:'가맹점',key:'branch'},
      {label:'사진 수',render:r=>`${r.photos}장`},
      {label:'규격',key:'size'},
      {label:'금액',render:r=><span style={{fontWeight:600}}>{r.total.toLocaleString()}원</span>},
      {label:'상태',render:r=><StatusBadge status={r.status}/>},
      {label:'접수일',key:'date'},
      {label:'마감일',key:'deadline'}
    ]} data={filtered} onRowClick={r=>setSelected(r)}/>
    <Drawer open={!!selected} onClose={()=>setSelected(null)} title={`주문 상세 — ${selected?.id||''}`}>
      {selected && <div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
          <div><div style={{fontSize:12,color:C.textSec,marginBottom:4}}>가맹점</div><div style={{fontSize:15,fontWeight:600}}>{selected.branch}</div></div>
          <div><div style={{fontSize:12,color:C.textSec,marginBottom:4}}>상태</div><StatusBadge status={selected.status}/></div>
          <div><div style={{fontSize:12,color:C.textSec,marginBottom:4}}>사진 수</div><div style={{fontSize:15,fontWeight:600}}>{selected.photos}장</div></div>
          <div><div style={{fontSize:12,color:C.textSec,marginBottom:4}}>규격</div><div style={{fontSize:15,fontWeight:600}}>{selected.size}</div></div>
          <div><div style={{fontSize:12,color:C.textSec,marginBottom:4}}>결제 금액</div><div style={{fontSize:15,fontWeight:700,color:C.primary}}>{selected.total.toLocaleString()}원</div></div>
          <div><div style={{fontSize:12,color:C.textSec,marginBottom:4}}>마감일</div><div style={{fontSize:15,fontWeight:600}}>{selected.deadline}</div></div>
        </div>
        <div style={{marginBottom:24}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>주문 타임라인</div>
          {['접수','보정중','완료','전달'].map((step,i)=>{
            const isActive=['접수','보정중','완료','전달'].indexOf(selected.status)>=i;
            return <div key={i} style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
              <div style={{width:28,height:28,borderRadius:'50%',background:isActive?C.primary:C.border,color:isActive?'#fff':C.textSec,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700}}>{i+1}</div>
              <span style={{fontSize:13,fontWeight:isActive?600:400,color:isActive?C.text:C.textSec}}>{step}</span>
            </div>;
          })}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button style={{flex:1,padding:'10px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>상태 변경</button>
          <button style={{flex:1,padding:'10px',borderRadius:8,background:C.surface,color:C.text,border:`1px solid ${C.border}`,fontSize:13,fontWeight:600,cursor:'pointer'}}>원본 다운로드</button>
        </div>
      </div>}
    </Drawer>
    <Drawer open={showNew} onClose={()=>setShowNew(false)} title="수동 주문 접수">
      <div style={{display:'flex',flexDirection:'column',gap:20}}>
        <div>
          <label style={{fontSize:13,fontWeight:600,marginBottom:6,display:'block'}}>가맹점 선택</label>
          <select value={newOrder.branch} onChange={e=>setNewOrder({...newOrder,branch:e.target.value})} style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14}}>
            {branches.filter(b=>b.status==='활성').map(b=><option key={b.id}>{b.name}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:13,fontWeight:600,marginBottom:6,display:'block'}}>사진 규격</label>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {sizeOptions.map(s=><label key={s.name} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderRadius:8,border:`1px solid ${newOrder.size===s.name?C.primary:C.border}`,background:newOrder.size===s.name?C.secondary:'transparent',cursor:'pointer',transition:'all .15s'}}>
              <input type="radio" checked={newOrder.size===s.name} onChange={()=>setNewOrder({...newOrder,size:s.name})} style={{display:'none'}}/>
              <div style={{width:18,height:18,borderRadius:'50%',border:`2px solid ${newOrder.size===s.name?C.primary:C.border}`,display:'flex',alignItems:'center',justifyContent:'center'}}>{newOrder.size===s.name && <div style={{width:10,height:10,borderRadius:'50%',background:C.primary}}/>}</div>
              <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{s.name}</div><div style={{fontSize:12,color:C.textSec}}>{s.desc}</div></div>
              <div style={{fontSize:14,fontWeight:700,color:C.primary}}>{s.price.toLocaleString()}원/장</div>
            </label>)}
          </div>
        </div>
        <div>
          <label style={{fontSize:13,fontWeight:600,marginBottom:6,display:'block'}}>사진 수량</label>
          <input type="number" min="1" value={newOrder.photos} onChange={e=>setNewOrder({...newOrder,photos:parseInt(e.target.value)||1})} style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14}}/>
        </div>
        <div style={{background:C.secondary,borderRadius:8,padding:16}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}><span>단가</span><span>{(sizeOptions.find(s=>s.name===newOrder.size)?.price||0).toLocaleString()}원</span></div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:8}}><span>수량</span><span>{newOrder.photos}장</span></div>
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:8,display:'flex',justifyContent:'space-between'}}><span style={{fontSize:15,fontWeight:700}}>합계</span><span style={{fontSize:18,fontWeight:800,color:C.primary}}>{((sizeOptions.find(s=>s.name===newOrder.size)?.price||0)*newOrder.photos).toLocaleString()}원</span></div>
        </div>
        <button style={{padding:'12px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:15,fontWeight:700,cursor:'pointer'}}>주문 접수 + 결제 요청</button>
      </div>
    </Drawer>
  </div>;
}

function BranchPage(){
  const [selected,setSelected]=useState(null);
  const [search,setSearch]=useState('');
  const filtered=branches.filter(b=>b.name.includes(search)||b.owner.includes(search));
  const gradeColors={프리미엄:{bg:'#FEF3C7',text:'#92400E'},일반:{bg:'#F1F5F9',text:'#475569'}};
  const stColors={활성:{bg:C.successBg,text:C.success},승인대기:{bg:C.warningBg,text:C.warning},정지:{bg:C.dangerBg,text:C.danger}};
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <div><h2 style={{fontSize:22,fontWeight:800}}>가맹점 관리</h2><p style={{fontSize:13,color:C.textSec,marginTop:4}}>가맹점 등록/승인 및 현황을 관리합니다</p></div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
      <StatCard icon="🏪" label="전체 가맹점" value={`${branches.length}개`} color={C.primary}/>
      <StatCard icon="✅" label="활성" value={`${branches.filter(b=>b.status==='활성').length}개`} color={C.success}/>
      <StatCard icon="⏳" label="승인 대기" value={`${branches.filter(b=>b.status==='승인대기').length}개`} color={C.warning}/>
      <StatCard icon="⭐" label="프리미엄" value={`${branches.filter(b=>b.grade==='프리미엄').length}개`} color="#D97706"/>
    </div>
    <div style={{marginBottom:16}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="가맹점명 또는 대표자 검색..." style={{width:320,padding:'10px 16px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,outline:'none'}}/>
    </div>
    <Table columns={[
      {label:'가맹점명',render:r=><span style={{fontWeight:600}}>{r.name}</span>},
      {label:'대표자',key:'owner'},
      {label:'연락처',key:'phone'},
      {label:'등급',render:r=>{const g=gradeColors[r.grade]||{};return <Badge color={g.text} bg={g.bg}>{r.grade}</Badge>}},
      {label:'상태',render:r=>{const s=stColors[r.status]||{};return <Badge color={s.text} bg={s.bg}>{r.status}</Badge>}},
      {label:'총 주문',render:r=>`${r.orders}건`},
      {label:'월 매출',key:'monthly'},
      {label:'가입일',key:'joinDate'}
    ]} data={filtered} onRowClick={r=>setSelected(r)}/>
    <Drawer open={!!selected} onClose={()=>setSelected(null)} title={`가맹점 상세 — ${selected?.name||''}`}>
      {selected && <div>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{width:80,height:80,borderRadius:'50%',background:C.primaryLight,display:'flex',alignItems:'center',justifyContent:'center',fontSize:32,margin:'0 auto 12px'}}>🏪</div>
          <div style={{fontSize:20,fontWeight:800}}>{selected.name}</div>
          <div style={{fontSize:13,color:C.textSec,marginTop:4}}>대표: {selected.owner}</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
          <div style={{background:C.secondary,borderRadius:8,padding:16,textAlign:'center'}}><div style={{fontSize:24,fontWeight:800,color:C.primary}}>{selected.orders}</div><div style={{fontSize:12,color:C.textSec}}>총 주문 수</div></div>
          <div style={{background:C.secondary,borderRadius:8,padding:16,textAlign:'center'}}><div style={{fontSize:18,fontWeight:800,color:C.success}}>{selected.monthly}</div><div style={{fontSize:12,color:C.textSec}}>월 매출</div></div>
        </div>
        <div style={{marginBottom:24}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>기본 정보</div>
          {[['연락처',selected.phone],['등급',selected.grade],['상태',selected.status],['가입일',selected.joinDate]].map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:13,color:C.textSec}}>{k}</span><span style={{fontSize:13,fontWeight:600}}>{v}</span></div>)}
        </div>
        {selected.status==='승인대기' && <div style={{display:'flex',gap:8}}>
          <button style={{flex:1,padding:'10px',borderRadius:8,background:C.success,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>승인</button>
          <button style={{flex:1,padding:'10px',borderRadius:8,background:C.danger,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>반려</button>
        </div>}
      </div>}
    </Drawer>
  </div>;
}

function FilePage(){
  const [tab,setTab]=useState('전체');
  const filtered=tab==='전체'?files:files.filter(f=>f.type===(tab==='원본'?'original':'result'));
  const typeLabel={original:'원본',result:'결과물'};
  const typeColor={original:{bg:C.infoBg,text:C.info},result:{bg:C.successBg,text:C.success}};
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}>
      <h2 style={{fontSize:22,fontWeight:800}}>파일 관리</h2>
      <p style={{fontSize:13,color:C.textSec,marginTop:4}}>원본 사진 다운로드 및 보정 결과물을 관리합니다</p>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
      <StatCard icon="📁" label="전체 파일" value={`${files.length}건`} color={C.primary}/>
      <StatCard icon="📸" label="원본" value={`${files.filter(f=>f.type==='original').length}건`} color={C.info}/>
      <StatCard icon="🖼️" label="결과물" value={`${files.filter(f=>f.type==='result').length}건`} color={C.success}/>
      <StatCard icon="💾" label="전체 용량" value="2.1GB" sub="S3 버킷 기준" color={C.warning}/>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      {['전체','원본','결과물'].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:'8px 18px',borderRadius:20,border:`1px solid ${tab===t?C.primary:C.border}`,background:tab===t?C.primary:'transparent',color:tab===t?'#fff':C.textSec,fontSize:13,fontWeight:600,cursor:'pointer'}}>{t}</button>)}
    </div>
    <Table columns={[
      {label:'주문번호',render:r=><span style={{fontWeight:600,color:C.primary}}>{r.order}</span>},
      {label:'가맹점',key:'branch'},
      {label:'유형',render:r=>{const tc=typeColor[r.type];return <Badge color={tc.text} bg={tc.bg}>{typeLabel[r.type]}</Badge>}},
      {label:'파일 수',render:r=>`${r.count}장`},
      {label:'용량',key:'size'},
      {label:'업로드',key:'uploaded'},
      {label:'상태',key:'status'},
      {label:'액션',render:r=><div style={{display:'flex',gap:6}}>
        <button style={{padding:'6px 12px',borderRadius:6,background:C.primary,color:'#fff',border:'none',fontSize:11,fontWeight:600,cursor:'pointer'}}>{r.type==='original'?'다운로드':'전달'}</button>
        {r.type==='original' && <button style={{padding:'6px 12px',borderRadius:6,background:C.surface,color:C.primary,border:`1px solid ${C.primary}`,fontSize:11,fontWeight:600,cursor:'pointer'}}>결과 업로드</button>}
      </div>}
    ]} data={filtered}/>
    <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`,marginTop:16}}>
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>파일 업로드 가이드</h3>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {[{icon:'📤',title:'S3 Multipart Upload',desc:'대용량 파일을 청크 단위로 분할 업로드하여 안정적으로 처리합니다'},{icon:'🔒',title:'Presigned URL',desc:'보안 서명된 URL로 결과물을 안전하게 다운로드할 수 있습니다'},{icon:'📦',title:'ZIP 묶음 다운로드',desc:'여러 파일을 ZIP으로 묶어 스트리밍 다운로드를 제공합니다'}].map((g,i)=><div key={i} style={{background:C.secondary,borderRadius:8,padding:16}}>
          <div style={{fontSize:24,marginBottom:8}}>{g.icon}</div>
          <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{g.title}</div>
          <div style={{fontSize:12,color:C.textSec,lineHeight:1.5}}>{g.desc}</div>
        </div>)}
      </div>
    </div>
  </div>;
}

// ── App ──
function App(){
  const [page,setPage]=useState('대시보드');
  const [loading,setLoading]=useState(true);
  useEffect(()=>{setTimeout(()=>setLoading(false),600);},[]);

  const menuItems=[
    {name:'대시보드',icon:'📊'},
    {name:'주문 관리',icon:'📋'},
    {name:'가맹점 관리',icon:'🏪'},
    {name:'파일 관리',icon:'📁'}
  ];

  if(loading)return <div style={{display:'flex',minHeight:'100vh'}}><div style={{width:260,background:C.sidebarBg}}/><div style={{flex:1,padding:32,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{textAlign:'center'}}><div style={{fontSize:40,marginBottom:12}}>📸</div><div style={{fontSize:16,color:C.textSec}}>로딩 중...</div></div></div></div>;

  return <div style={{display:'flex',minHeight:'100vh'}}>
    <div style={{width:260,background:C.sidebarBg,padding:'0',position:'fixed',top:0,bottom:0,display:'flex',flexDirection:'column',zIndex:100}}>
      <div style={{padding:'24px 20px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:8,background:'linear-gradient(135deg,#2563EB,#0EA5E9)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>📸</div>
          <div><div style={{color:'#fff',fontWeight:800,fontSize:15}}>PhotoFlow</div><div style={{color:'rgba(255,255,255,.5)',fontSize:11}}>사진 보정 관리</div></div>
        </div>
      </div>
      <div style={{padding:'16px 12px',flex:1}}>
        {menuItems.map(item=><button key={item.name} title={item.name} onClick={()=>setPage(item.name)} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'11px 16px',borderRadius:8,border:'none',background:page===item.name?C.sidebarActive:'transparent',color:page===item.name?'#fff':'rgba(255,255,255,.6)',fontSize:14,fontWeight:page===item.name?600:400,cursor:'pointer',marginBottom:4,transition:'all .15s',textAlign:'left'}}>
          <span style={{fontSize:16}}>{item.icon}</span>{item.name}
        </button>)}
      </div>
      <div style={{padding:'16px 12px',borderTop:'1px solid rgba(255,255,255,.08)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px'}}>
          <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>👤</div>
          <div><div style={{color:'#fff',fontSize:13,fontWeight:600}}>관리자</div><div style={{color:'rgba(255,255,255,.4)',fontSize:11}}>admin@photoflow.kr</div></div>
        </div>
      </div>
    </div>
    <div style={{flex:1,marginLeft:260}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'14px 32px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:50}}>
        <div style={{fontSize:14,color:C.textSec}}>사진 보정 주문 관리 플랫폼</div>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <span style={{fontSize:13,color:C.textSec}}>2025.01.20</span>
          <div style={{position:'relative'}}>
            <span style={{fontSize:18,cursor:'pointer'}}>🔔</span>
            {notifications.filter(n=>!n.read).length>0 && <span style={{position:'absolute',top:-4,right:-4,width:16,height:16,borderRadius:'50%',background:C.danger,color:'#fff',fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{notifications.filter(n=>!n.read).length}</span>}
          </div>
        </div>
      </div>
      <div style={{padding:32}}>
        {page==='대시보드' && <DashboardPage/>}
        {page==='주문 관리' && <OrderPage/>}
        {page==='가맹점 관리' && <BranchPage/>}
        {page==='파일 관리' && <FilePage/>}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
