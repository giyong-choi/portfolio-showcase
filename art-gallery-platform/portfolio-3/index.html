<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아트리빙 — AI 아트 어드바이저 통합 플랫폼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.3.1/umd/react-is.development.js"></script>
<script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#F8FAFC;color:#1A1A2E;word-break:keep-all;overflow-wrap:break-word}
:root{
  --primary:#334155;--primary-dark:#0F172A;--primary-light:#475569;
  --accent:#06B6D4;--accent-light:#CFFAFE;--accent-dark:#0891B2;
  --bg:#F8FAFC;--surface:#FFFFFF;
  --text:#1A1A2E;--text2:#64748B;--text3:#94A3B8;
  --border:#E2E8F0;--border2:#F1F5F9;
  --sidebar-w:240px;
  --cyan:#06B6D4;--cyan-light:#ECFEFF;
}
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:#1E293B;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:20px 16px 16px}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#06B6D4,#0891B2);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0}
.logo-name{font-size:15px;font-weight:800;color:#fff;letter-spacing:-0.3px}
.logo-sub{font-size:9px;color:#94A3B8;font-weight:500;margin-top:1px;letter-spacing:0.5px}
.sidebar-nav{padding:8px;flex:1}
.nav-group{margin-bottom:24px}
.nav-group-title{font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:1px;padding:0 10px;margin-bottom:6px}
.nav-item{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:9px 10px;border-radius:8px;font-size:13px;font-weight:500;color:#94A3B8;transition:all 0.15s;display:flex;align-items:center;gap:10px;font-family:inherit;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:rgba(255,255,255,0.06);color:#CBD5E1}
.nav-item.active{background:rgba(6,182,212,0.15);color:#06B6D4;font-weight:600}
.nav-item.active .nav-icon-wrap{background:rgba(6,182,212,0.2)}
.nav-icon-wrap{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;background:rgba(255,255,255,0.06);flex-shrink:0;transition:background 0.15s}
.nav-badge{margin-left:auto;background:#06B6D4;color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,0.07)}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.05)}
.user-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#06B6D4,#0891B2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:#CBD5E1}
.user-role{font-size:10px;color:#64748B}

/* Main area */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#F8FAFC}
.topbar{height:54px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:8px}
.breadcrumb{font-size:12px;color:var(--text3)}
.breadcrumb span{color:var(--accent);font-weight:600}
.topbar-title{font-size:15px;font-weight:700;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:8px}
.tb-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.15s}
.tb-btn:hover{background:var(--accent-light);border-color:var(--accent)}
.tb-badge{background:var(--primary-dark);color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:5px}
.content{flex:1;overflow-y:auto;padding:20px}

/* Skeleton */
.skel{background:linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%);background-size:400% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:10px;padding:16px;border:1px solid var(--border);position:relative}
.kpi-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.kpi-label{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:5px}
.kpi-val{font-size:22px;font-weight:800;color:var(--text);margin-bottom:3px}
.kpi-sub{font-size:11px;color:var(--text3)}
.kpi-trend{position:absolute;top:14px;right:14px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px}
.trend-up{background:#CFFAFE;color:#0E7490}
.trend-neutral{background:#F1F5F9;color:#64748B}

/* Charts */
.chart-row{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:20px}
.chart-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:18px}
.chart-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.chart-sub{font-size:11px;color:var(--text2);font-weight:400;margin-left:4px}

/* AI Advisor */
.ai-layout{display:grid;grid-template-columns:1fr 380px;gap:16px;align-items:start}
.ai-upload-zone{background:#fff;border-radius:12px;border:2px dashed var(--border);padding:32px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:14px}
.ai-upload-zone:hover{border-color:var(--accent);background:var(--cyan-light)}
.ai-upload-icon{font-size:40px;margin-bottom:12px}
.ai-upload-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.ai-upload-sub{font-size:12px;color:var(--text2)}
.analysis-result{background:#fff;border-radius:12px;border:1px solid var(--border);padding:20px}
.analysis-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border2)}
.artwork-preview{width:70px;height:70px;border-radius:10px;background:linear-gradient(135deg,#CFFAFE,#A5F3FC);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.analysis-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px}
.analysis-meta{font-size:11px;color:var(--text2)}
.confidence-badge{background:#CFFAFE;color:#0E7490;font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;margin-left:auto;flex-shrink:0}
.provenance-chain{display:flex;flex-direction:column;gap:0}
.chain-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;position:relative}
.chain-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:3px}
.chain-line{position:absolute;left:4px;top:20px;bottom:-8px;width:2px;background:linear-gradient(180deg,var(--accent),rgba(6,182,212,0.2))}
.chain-item:last-child .chain-line{display:none}
.chain-text{font-size:12px;color:var(--text);font-weight:500}
.chain-sub{font-size:11px;color:var(--text2)}
.chain-date{font-size:10px;color:var(--text3);margin-top:2px}
.recommend-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
.rec-card{background:#F8FAFC;border-radius:9px;border:1px solid var(--border);padding:12px;cursor:pointer;transition:all 0.15s}
.rec-card:hover{border-color:var(--accent);background:var(--cyan-light)}
.rec-img{font-size:24px;margin-bottom:6px}
.rec-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.rec-artist{font-size:10px;color:var(--text2)}
.rec-sim{font-size:10px;color:var(--accent);font-weight:600;background:var(--cyan-light);padding:2px 6px;border-radius:4px;display:inline-block;margin-top:4px}
.ai-side-panel{display:flex;flex-direction:column;gap:14px}
.score-card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:18px}
.score-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px}
.score-bar-item{margin-bottom:10px}
.score-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px}
.score-row span{color:var(--text);font-weight:600}
.score-bar{height:6px;background:#F1F5F9;border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#0891B2)}
.style-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.style-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:5px;background:var(--cyan-light);color:var(--accent-dark)}

/* Artfair */
.artfair-layout{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start}
.fair-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.fair-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s}
.fair-card:hover{border-color:var(--accent);box-shadow:0 3px 10px rgba(6,182,212,0.1)}
.fair-card.active{border-color:var(--accent);background:#ECFEFF}
.fair-date-block{background:var(--primary-dark);color:#fff;border-radius:8px;padding:8px 12px;text-align:center;min-width:54px;flex-shrink:0}
.fair-month{font-size:9px;font-weight:700;text-transform:uppercase;color:#94A3B8;margin-bottom:2px}
.fair-day{font-size:20px;font-weight:900;color:#fff}
.fair-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.fair-venue{font-size:11px;color:var(--text2)}
.fair-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.fair-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px}
.tag-open{background:#CFFAFE;color:#0E7490}
.tag-reg{background:#FEF3C7;color:#92400E}
.tag-end{background:#F1F5F9;color:#64748B}
.booth-map{background:#fff;border-radius:10px;border:1px solid var(--border);padding:16px;margin-bottom:14px}
.booth-map-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px}
.booth-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.booth{border-radius:7px;padding:8px 4px;text-align:center;cursor:pointer;transition:all 0.15s;border:1.5px solid transparent}
.booth-l{background:#CFFAFE;border-color:#67E8F9;min-height:56px}
.booth-m{background:#DBEAFE;border-color:#93C5FD;min-height:46px}
.booth-s{background:#F1F5F9;border-color:#CBD5E1;min-height:38px}
.booth-empty{background:#fff;border:1.5px dashed #E2E8F0;opacity:0.5}
.booth-selected{border-color:var(--accent)!important;box-shadow:0 0 0 2px rgba(6,182,212,0.3)}
.booth-name{font-size:9px;font-weight:600;color:var(--text2)}
.booth-size{font-size:8px;color:var(--text3)}
.fair-stats{display:flex;flex-direction:column;gap:8px}
.fair-stat-row{display:flex;justify-content:space-between;padding:8px;background:#F8FAFC;border-radius:7px;font-size:12px}
.fair-stat-key{color:var(--text2)}
.fair-stat-val{color:var(--text);font-weight:600}

/* Settlement */
.settlement-layout{display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:start}
.settlement-table{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden}
.tbl-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tbl-title{font-size:13px;font-weight:700;color:var(--text)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;padding:9px 16px;background:#F8FAFC;text-align:left;white-space:nowrap}
td{font-size:12px;color:var(--text);padding:11px 16px;border-bottom:1px solid var(--border2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#ECFEFF}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600}
.badge-green{background:#D1FAE5;color:#065F46}
.badge-cyan{background:#CFFAFE;color:#0E7490}
.badge-yellow{background:#FEF3C7;color:#92400E}
.badge-slate{background:#F1F5F9;color:#475569}
.royalty-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:18px;margin-bottom:14px}
.royalty-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px}
.royalty-summary{background:linear-gradient(135deg,#ECFEFF,#CFFAFE);border-radius:9px;padding:14px;margin-bottom:14px}
.royalty-amount{font-size:24px;font-weight:900;color:var(--accent-dark);margin-bottom:3px}
.royalty-desc{font-size:11px;color:#0E7490}
.royalty-rows{display:flex;flex-direction:column;gap:6px}
.royalty-row{display:flex;justify-content:space-between;font-size:12px;padding:7px 0;border-bottom:1px solid var(--border2)}
.royalty-row:last-child{border-bottom:none}
.royalty-key{color:var(--text2)}
.royalty-val{color:var(--text);font-weight:600}
.royalty-btn{width:100%;padding:10px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px}

/* Gallery Management */
.gallery-mgmt-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.gallery-list-table{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden}
.search-filter{display:flex;gap:8px;margin-bottom:14px}
.search-inp{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-family:inherit;color:var(--text)}
.search-inp:focus{outline:none;border-color:var(--accent)}
.btn-sm{padding:7px 13px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff;border:none}
.btn-primary:hover{background:var(--accent-dark)}
.btn-outline{background:#fff;color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{background:var(--cyan-light);border-color:var(--accent);color:var(--accent)}
.detail-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:18px}
.detail-card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px}
.gallery-avatar{width:60px;height:60px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:12px}
.detail-info-rows{display:flex;flex-direction:column;gap:0}
.detail-info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border2);font-size:12px}
.detail-info-row:last-child{border-bottom:none}
.detail-key{color:var(--text2)}
.detail-val{color:var(--text);font-weight:600}
.pagination{display:flex;align-items:center;justify-content:center;gap:5px;padding:12px 0}
.page-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;color:var(--text2);transition:all 0.15s}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.page-btn:hover:not(.active){background:var(--cyan-light);border-color:var(--accent);color:var(--accent)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:420px;width:90%;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);animation:fadeInScale 0.2s ease}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.modal h3{font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px}
.modal p{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.5}
.modal-actions{display:flex;gap:8px;margin-top:8px}
.modal-cancel{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text2)}
.modal-confirm{flex:1;padding:10px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const {AreaChart,Area,BarChart,Bar,LineChart,Line,RadarChart,Radar,PolarGrid,PolarAngleAxis,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,PieChart,Pie,Cell} = Recharts;

const TREND_DATA = [

const GALLERY_LIST = [

  {name:'스페이스 아트리움',owner:'정현우',works:38,status:'pending',icon:'✨',bg:'linear-gradient(135deg,#F1F5F9,#E2E8F0)',joined:'2025.01',sales:'₩8.4M'},
  {name:'갤러리 온',owner:'한소미',works:61,status:'active',icon:'🌟',bg:'linear-gradient(135deg,#ECFEFF,#CFFAFE)',joined:'2025.01',sales:'₩15.7M'},
