<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아트원 — 갤러리 입점형 온라인 아트 마켓플레이스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.3.1/umd/react-is.development.js"></script>
<script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#FFFBEB;color:#1A1A2E;word-break:keep-all;overflow-wrap:break-word}
:root{
  --primary:#D97706;--primary-dark:#B45309;--primary-light:#FDE68A;
  --secondary:#78350F;--accent:#FCD34D;
  --bg:#FFFBEB;--surface:#FFFFFF;
  --text:#1A1A2E;--text2:#6B7280;--text3:#9CA3AF;
  --border:#E5E7EB;--border2:#F3F4F6;
  --sidebar-w:260px;
}
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:#FFFFFF;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid var(--border2)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}
.logo-text{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.3px}
.logo-sub{font-size:10px;color:var(--text2);margin-top:1px;font-weight:500}
.sidebar-nav{padding:12px 8px;flex:1}
.nav-section{margin-bottom:20px}
.nav-section-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding:0 12px;margin-bottom:6px}
.nav-btn{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:9px 12px;border-radius:8px;font-size:13.5px;font-weight:500;color:var(--text2);transition:all 0.15s;display:flex;align-items:center;gap:10px;font-family:inherit}
.nav-btn:hover{background:#FFFBEB;color:var(--text)}
.nav-btn.active{background:linear-gradient(135deg,#FEF3C7,#FDE68A);color:var(--primary-dark);font-weight:600}
.nav-btn .icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sidebar-footer{padding:16px;border-top:1px solid var(--border2)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;background:#FFFBEB;border-radius:8px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.user-info .name{font-size:13px;font-weight:600;color:var(--text)}
.user-info .role{font-size:11px;color:var(--text2)}

/* Topbar */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-badge{background:var(--primary);color:#fff;border-radius:20px;font-size:11px;font-weight:600;padding:3px 10px}
.topbar-icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px}

/* Content */
.content{flex:1;overflow-y:auto;padding:24px}

/* Skeleton */
.skel{background:linear-gradient(90deg,#F3F4F6 25%,#E5E7EB 50%,#F3F4F6 75%);background-size:400% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* Cards */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--border);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent))}
.stat-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:8px}
.stat-value{font-size:26px;font-weight:800;color:var(--text);margin-bottom:4px}
.stat-sub{font-size:11px;color:var(--text3)}
.stat-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:28px;opacity:0.18}

/* Grid */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:15px;font-weight:700;color:var(--text)}
.see-all{font-size:12px;color:var(--primary);font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit}
.artwork-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.artwork-card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:all 0.2s}
.artwork-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.09)}
.artwork-img{height:160px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
.artwork-badge{position:absolute;top:8px;left:8px;background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.artwork-edition{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.55);color:#fff;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px}
.artwork-info{padding:12px}
.artwork-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.artwork-artist{font-size:11px;color:var(--text2);margin-bottom:8px}
.artwork-footer{display:flex;align-items:center;justify-content:space-between}
.artwork-price{font-size:14px;font-weight:700;color:var(--primary-dark)}
.artwork-like{font-size:11px;color:var(--text3)}

/* Gallery row */
.gallery-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.gallery-card{background:#fff;border-radius:12px;padding:18px;border:1px solid var(--border);display:flex;align-items:center;gap:14px;cursor:pointer;transition:box-shadow 0.2s}
.gallery-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.07)}
.gallery-thumb{width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.gallery-name{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:3px}
.gallery-count{font-size:11px;color:var(--text2)}
.gallery-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-left:auto;flex-shrink:0}
.status-active{background:#D1FAE5;color:#065F46}
.status-new{background:#FDE68A;color:#92400E}

/* Artwork detail */
.detail-layout{display:grid;grid-template-columns:1.2fr 1fr;gap:28px;align-items:start}
.detail-gallery{background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--border)}
.detail-main-img{height:360px;display:flex;align-items:center;justify-content:center;font-size:80px;background:linear-gradient(135deg,#FFFBEB,#FEF3C7)}
.detail-thumbs{display:flex;gap:8px;padding:12px}
.detail-thumb{width:60px;height:60px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid var(--border);cursor:pointer}
.detail-thumb.active{border-color:var(--primary)}
.detail-info{display:flex;flex-direction:column;gap:16px}
.detail-title{font-size:22px;font-weight:800;color:var(--text);line-height:1.3}
.detail-artist-row{display:flex;align-items:center;gap:10px}
.artist-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
.artist-name{font-size:13px;font-weight:600;color:var(--text)}
.artist-gallery{font-size:11px;color:var(--text2)}
.detail-price-box{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border-radius:12px;padding:18px;border:1px solid #FDE68A}
.detail-price{font-size:28px;font-weight:800;color:var(--primary-dark)}
.detail-price-sub{font-size:12px;color:var(--text2);margin-top:3px}
.edition-select{margin-top:4px}
.edition-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px}
.edition-list{display:flex;gap:8px;flex-wrap:wrap}
.edition-btn{padding:6px 14px;border-radius:6px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--text);font-family:inherit;transition:all 0.15s}
.edition-btn.active{border-color:var(--primary);background:var(--primary);color:#fff}
.edition-btn:disabled{opacity:0.4;cursor:not-allowed;text-decoration:line-through}
.buy-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity 0.15s}
.buy-btn:hover{opacity:0.9}
.provenance-box{background:#fff;border-radius:12px;border:1px solid var(--border);padding:16px}
.prov-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.prov-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2)}
.prov-item:last-child{border-bottom:none}
.prov-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0}
.prov-text{font-size:12px;color:var(--text2)}
.prov-date{font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap}

/* Gallery management */
.table-wrap{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-title{font-size:14px;font-weight:700;color:var(--text)}
.table-actions{display:flex;gap:8px}
.btn-sm{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn-primary{background:var(--primary);color:#fff;border:none}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:#fff;color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{background:#F9FAFB}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;padding:10px 20px;background:#F9FAFB;text-align:left;white-space:nowrap}
td{font-size:13px;color:var(--text);padding:13px 20px;border-bottom:1px solid var(--border2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FFFBEB}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap}
.badge-green{background:#D1FAE5;color:#065F46}
.badge-yellow{background:#FDE68A;color:#92400E}
.badge-red{background:#FEE2E2;color:#991B1B}
.badge-blue{background:#DBEAFE;color:#1E40AF}
.badge-gray{background:#F3F4F6;color:#6B7280}
.action-btn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:#fff;color:var(--text2)}
.action-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-tag{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text2);font-family:inherit;transition:all 0.15s}
.filter-tag.active{background:var(--primary);border-color:var(--primary);color:#fff}
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-input{flex:1;padding:8px 14px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-family:inherit;color:var(--text);background:#fff}
.search-input:focus{outline:none;border-color:var(--primary)}

/* Resale market */
.resale-layout{display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start}
.chart-card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:20px;margin-bottom:16px}
.chart-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px}
.resale-list{display:flex;flex-direction:column;gap:10px}
.resale-item{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:box-shadow 0.15s}
.resale-item:hover{box-shadow:0 3px 12px rgba(0,0,0,0.07)}
.resale-img{width:56px;height:56px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;background:linear-gradient(135deg,#FFFBEB,#FDE68A);flex-shrink:0}
.resale-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.resale-meta{font-size:11px;color:var(--text2)}
.resale-price{margin-left:auto;text-align:right;flex-shrink:0}
.resale-current{font-size:14px;font-weight:700;color:var(--primary-dark)}
.resale-original{font-size:11px;color:var(--text3);text-decoration:line-through}
.resale-royalty{font-size:10px;color:#065F46;background:#D1FAE5;padding:2px 6px;border-radius:4px;margin-top:3px;display:inline-block}
.info-panel{background:#fff;border-radius:12px;border:1px solid var(--border);padding:18px}
.info-panel-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border2)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;color:var(--text2)}
.info-val{font-size:12px;font-weight:600;color:var(--text)}

/* Admin */
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.chart-card-full{background:#fff;border-radius:12px;border:1px solid var(--border);padding:20px}
.approval-list{display:flex;flex-direction:column;gap:8px}
.approval-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#F9FAFB;border-radius:8px}
.approval-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;background:#fff;border:1px solid var(--border);flex-shrink:0}
.approval-name{font-size:13px;font-weight:600;color:var(--text)}
.approval-sub{font-size:11px;color:var(--text2)}
.approval-actions{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
.approve-btn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:var(--primary);color:#fff;font-family:inherit}
.reject-btn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text2);font-family:inherit}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:460px;width:90%;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);animation:fadeInScale 0.2s ease}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.modal-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.modal-form{display:flex;flex-direction:column;gap:12px}
.form-group label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-family:inherit;color:var(--text)}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary)}
.modal-btns{display:flex;gap:8px;margin-top:8px}
.modal-btn-cancel{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text2)}
.modal-btn-confirm{flex:1;padding:10px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px 0}
.page-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;color:var(--text2);transition:all 0.15s}
.page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:700}
.page-btn:hover:not(.active){background:#FFFBEB;border-color:var(--primary);color:var(--primary)}
</style>
</head>

          {label:'오늘 거래 건수',value:'24건',sub:'전일 대비 +6건',icon:'📦'},
          {label:'오늘 거래액',value:'₩38.4M',sub:'전일 대비 +14%',icon:'💰'},
          {label:'활성 갤러리',value:'91곳',sub:'미납 리마인더 4건',icon:'🏛️'},
          {label:'대기중 승인',value:'3건',sub:'평균 처리 1.2일',icon:'⏳'},
        ].map((s,i)=>(
          <div key={i} className="stat-card">
            <div className="stat-icon">{s.icon}</div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value">{s.value}</div>
            <div className="stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>
      <div className="admin-grid">
        <div className="chart-card-full">
          <div className="chart-title">📊 월별 거래 현황</div>
          <ResponsiveContainer width="100%" height={220}>
            <ComposedChart data={MONTHLY_SALES}>
              <CartesianGrid strokeDasharray="3 3" stroke="#F3F4F6"/>
              <XAxis dataKey="month" tick={{fontSize:11}}/>
              <YAxis yAxisId="left" tick={{fontSize:11}} tickFormatter={v=>`${v}건`}/>
              <YAxis yAxisId="right" orientation="right" tick={{fontSize:11}} tickFormatter={v=>`${v}M`}/>
              <Tooltip/>
              <Bar yAxisId="left" dataKey="sales" fill="#FDE68A" name="거래 건수" radius={[4,4,0,0]}/>
              <Line yAxisId="right" type="monotone" dataKey="amount" stroke="#D97706" strokeWidth={2} dot={{fill:'#D97706',r:4}} name="거래액(M)"/>
            </ComposedChart>
          </ResponsiveContainer>
        </div>
        <div className="chart-card-full">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div className="chart-title" style={{marginBottom:0}}>⏳ 갤러리 입점 승인 대기</div>
            <span className="badge badge-yellow">{approvals.length}건</span>
          </div>
          <div className="approval-list">
            {approvals.map((a,i)=>(
              <div key={i} className="approval-item">
                <div className="approval-icon">{a.icon}</div>
                <div>
                  <div className="approval-name">{a.name}</div>
                  <div className="approval-sub">{a.owner} · {a.doc}</div>
                </div>
                <div className="approval-actions">
                  <button className="approve-btn" onClick={()=>setApprovals(prev=>prev.filter((_,j)=>j!==i))}>승인</button>
                  <button className="reject-btn" onClick={()=>setApprovals(prev=>prev.filter((_,j)=>j!==i))}>거절</button>
                </div>
              </div>
            ))}
            {approvals.length===0 && <div style={{textAlign:'center',padding:24,color:'#9CA3AF',fontSize:13}}>모든 신청 처리 완료 ✓</div>}
          </div>
        </div>
      </div>
      <div className="table-wrap">
        <div className="table-header">
          <div className="table-title">📋 최근 거래 내역</div>
          <button className="btn-sm btn-outline">보고서 다운로드</button>
        </div>
        <table>
          <thead>
            <tr><th>작품명</th><th>갤러리</th><th>구매자</th><th>에디션</th><th>거래액</th><th>추급권</th><th>일시</th></tr>
          </thead>
          <tbody>
            {[
              {work:'새벽의 고요',gallery:'아트스페이스 서울',buyer:'김**',edition:'#07',amount:'₩4,800,000',royalty:'₩144,000',date:'2025.02.14'},
              {work:'도시의 빛',gallery:'현대갤러리 강남',buyer:'이**',edition:'#12',amount:'₩2,400,000',royalty:'₩55,000',date:'2025.02.13'},
              {work:'자연의 숨결',gallery:'갤러리 나눔',buyer:'박**',edition:'#02',amount:'₩7,200,000',royalty:'₩216,000',date:'2025.02.12'},
              {work:'기억의 파편',gallery:'블루아트홀',buyer:'최**',edition:'#01',amount:'₩9,500,000',royalty:'₩285,000',date:'2025.02.11'},
              {work:'여름의 끝',gallery:'아트스페이스 서울',buyer:'정**',edition:'#18',amount:'₩1,350,000',royalty:'₩37,500',date:'2025.02.10'},
            ].map((r,i)=>(
              <tr key={i}>
                <td style={{fontWeight:600}}>{r.work}</td>
                <td>{r.gallery}</td>
                <td>{r.buyer}</td>
                <td><span className="badge badge-blue">{r.edition}</span></td>
                <td style={{fontWeight:600,color:'#D97706'}}>{r.amount}</td>
                <td style={{color:'#065F46',fontWeight:600}}>{r.royalty}</td>
                <td style={{color:'#9CA3AF',fontSize:12}}>{r.date}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
