<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>주거 하자 통합 관리 시스템 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#F0F9FF;color:#1A365D}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo} = React;
const {ResponsiveContainer,PieChart,Pie,Cell,BarChart,Bar,XAxis,YAxis,Tooltip,CartesianGrid,LineChart,Line,Legend,AreaChart,Area} = Recharts;

// ─── Colors ───
const C = {
  primary:'#0066CC',secondary:'#1A365D',accent:'#38BDF8',
  bg:'#F0F9FF',surface:'#FFFFFF',border:'#E2E8F0',
  text:'#1A365D',textLight:'#6B7280',
  success:'#059669',warning:'#D97706',danger:'#DC2626',
  sidebarBg:'#1A365D',sidebarText:'#94A3B8',sidebarActive:'#38BDF8',
};

// ─── Data ───
const MENUS = [
  {id:'dashboard',icon:'📊',label:'통합 현황 대시보드'},
  {id:'defect-list',icon:'📋',label:'하자 접수 관리'},
  {id:'workflow',icon:'🔄',label:'처리자 배정·워크플로우'},
  {id:'archive',icon:'📁',label:'입주 전후 아카이브'},
  {id:'reports',icon:'📈',label:'리포트·통계'},
];

const BUILDINGS = ['101동','102동','103동','104동','105동'];
const DEFECT_TYPES = ['도배','누수','균열','타일','도장','전기','설비','창호'];
const STATUSES = [{label:'접수',color:'#3B82F6'},{label:'확인',color:'#F59E0B'},{label:'처리중',color:'#8B5CF6'},{label:'완료',color:'#10B981'},{label:'반려',color:'#EF4444'}];

const DEFECTS = Array.from({length:42},(_,i)=>({
  id:`DF-2025-${String(i+1).padStart(4,'0')}`,
  building:BUILDINGS[i%5],
  unit:`${Math.floor(Math.random()*15+3)}0${Math.floor(Math.random()*4+1)}호`,
  type:DEFECT_TYPES[i%8],
  title:[`${DEFECT_TYPES[i%8]} 하자 발견`,`${BUILDINGS[i%5]} ${DEFECT_TYPES[i%8]} 불량`,`입주 점검 시 ${DEFECT_TYPES[i%8]} 이상`][i%3],
  status:STATUSES[i<8?0:i<16?1:i<28?2:i<38?3:4].label,
  statusColor:STATUSES[i<8?0:i<16?1:i<28?2:i<38?3:4].color,
  assignee:['김민수','이준호','박서진','정하윤','최우진'][i%5],
  date:`2025.${String(Math.floor(i/7)+1).padStart(2,'0')}.${String((i%28)+1).padStart(2,'0')}`,
  priority:['높음','보통','낮음'][i%3],
  priorityColor:['#EF4444','#F59E0B','#22C55E'][i%3],
  description:`${BUILDINGS[i%5]} ${Math.floor(Math.random()*15+3)}0${Math.floor(Math.random()*4+1)}호에서 발견된 ${DEFECT_TYPES[i%8]} 관련 하자입니다. 입주 전 점검에서 확인되었으며 조치가 필요합니다.`,
  photos:Math.floor(Math.random()*5+1),
  history:[
    {date:'2025.01.15',action:'접수',user:'시스템'},
    {date:'2025.01.16',action:'담당자 배정',user:'관리팀'},
    {date:'2025.01.18',action:'현장 확인',user:['김민수','이준호','박서진'][i%3]},
  ],
}));

const WORKERS = [
  {name:'김민수',role:'시설팀 팀장',active:8,completed:24,avatar:'👷'},
  {name:'이준호',role:'시설팀 대리',active:6,completed:18,avatar:'🔧'},
  {name:'박서진',role:'협력업체 담당',active:5,completed:15,avatar:'🏗️'},
  {name:'정하윤',role:'전기 설비 전문',active:4,completed:21,avatar:'⚡'},
  {name:'최우진',role:'도배·타일 전문',active:3,completed:19,avatar:'🎨'},
];

const ARCHIVE_DATA = BUILDINGS.flatMap(b=>
  ['입주 전 점검','입주 후 점검'].map(phase=>({
    building:b, phase, date:phase.includes('전')?'2025.01.10':'2025.02.15',
    total:Math.floor(Math.random()*15+5), resolved:Math.floor(Math.random()*10+3),
    photos:Math.floor(Math.random()*30+10),
    units:Array.from({length:Math.floor(Math.random()*8+3)},(_,i)=>({
      unit:`${Math.floor(i/4+3)}0${(i%4)+1}호`,
      defects:Math.floor(Math.random()*5+1),
      photos:Math.floor(Math.random()*8+2),
      status:['완료','처리중','미처리'][i%3],
    })),
  }))
);

const monthlyTrend = ['1월','2월','3월','4월','5월','6월'].map((m,i)=>({
  month:m, 접수:Math.floor(Math.random()*20+15), 완료:Math.floor(Math.random()*18+10), 반려:Math.floor(Math.random()*5+1),
}));

const typeDistribution = DEFECT_TYPES.map(t=>({name:t,value:Math.floor(Math.random()*25+5)}));
const PIE_COLORS = ['#0066CC','#38BDF8','#059669','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6'];

const buildingHeatmap = BUILDINGS.map(b=>({
  building:b, 접수:Math.floor(Math.random()*15+5), 처리중:Math.floor(Math.random()*10+3), 완료:Math.floor(Math.random()*20+8),
}));

// ─── Components ───
function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,.2)',fontSize:14}}>{message}</div>;
}

function Modal({title,onClose,children,width=600}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.4)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:'#fff',borderRadius:12,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,.15)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:'1px solid #E2E8F0'}}>
          <h3 style={{fontSize:18,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function Badge({text,color,bg}){
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:600,color:color||'#fff',background:bg||C.primary}}>{text}</span>;
}

function KpiCard({icon,label,value,suffix,sub,color,index}){
  return(
    <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,.08)',animation:`slideUp 400ms ease ${index*80}ms both`,transition:'all 200ms',cursor:'default'}}
      onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,.12)'}}
      onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 1px 3px rgba(0,0,0,.08)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
        <span style={{fontSize:24}}>{icon}</span>
        <span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span>
      </div>
      <div style={{fontSize:32,fontWeight:800,color:color||C.text,letterSpacing:'-0.02em'}}>
        <CountUp end={value} suffix={suffix||''} />
      </div>
      {sub && <div style={{fontSize:12,color:C.textLight,marginTop:6}}>{sub}</div>}
    </div>
  );
}

// ─── Pages ───
function DashboardPage({setModal}){
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:20,marginBottom:32}}>
        <KpiCard icon="📋" label="총 접수 건수" value={42} sub="이번 달 +12건" color={C.primary} index={0}/>
        <KpiCard icon="🔄" label="처리중" value={12} sub="전체의 28.6%" color="#8B5CF6" index={1}/>
        <KpiCard icon="✅" label="처리 완료" value={10} sub="완료율 23.8%" color={C.success} index={2}/>
        <KpiCard icon="⚠️" label="미처리 7일 초과" value={5} sub="긴급 대응 필요" color={C.danger} index={3}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20,marginBottom:24}}>
        <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,.08)'}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>월별 접수·처리 추이</h3>
          <ResponsiveContainer width="100%" height={280}>
            <BarChart data={monthlyTrend}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/>
              <XAxis dataKey="month" fontSize={12} stroke="#94A3B8"/>
              <YAxis fontSize={12} stroke="#94A3B8"/>
              <Tooltip contentStyle={{borderRadius:8,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,.1)'}}/>
              <Bar dataKey="접수" fill={C.primary} radius={[4,4,0,0]}/>
              <Bar dataKey="완료" fill={C.success} radius={[4,4,0,0]}/>
              <Bar dataKey="반려" fill={C.danger} radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,.08)'}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>하자 유형 분포</h3>
          <ResponsiveContainer width="100%" height={280}>
            <PieChart>
              <Pie data={typeDistribution} cx="50%" cy="50%" innerRadius={55} outerRadius={90} paddingAngle={3} dataKey="value">
                {typeDistribution.map((e,i)=><Cell key={i} fill={PIE_COLORS[i%8]}/>)}
              </Pie>
              <Tooltip/>
            </PieChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,.08)'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>동별 하자 현황</h3>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={buildingHeatmap} layout="vertical">
            <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/>
            <XAxis type="number" fontSize={12} stroke="#94A3B8"/>
            <YAxis dataKey="building" type="category" fontSize={12} stroke="#94A3B8" width={60}/>
            <Tooltip contentStyle={{borderRadius:8,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,.1)'}}/>
            <Bar dataKey="접수" stackId="a" fill={C.primary} radius={[0,0,0,0]}/>
            <Bar dataKey="처리중" stackId="a" fill="#8B5CF6"/>
            <Bar dataKey="완료" stackId="a" fill={C.success} radius={[0,4,4,0]}/>
            <Legend/>
          </BarChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

function DefectListPage({setModal,setToast}){
  const [filter,setFilter]=useState({building:'',type:'',status:''});
  const [search,setSearch]=useState('');
  const filtered = useMemo(()=>DEFECTS.filter(d=>{
    if(filter.building && d.building!==filter.building) return false;
    if(filter.type && d.type!==filter.type) return false;
    if(filter.status && d.status!==filter.status) return false;
    if(search && !d.title.includes(search) && !d.id.includes(search)) return false;
    return true;
  }),[filter,search]);
  const [page,setPage]=useState(1);
  const perPage=10;
  const paged=filtered.slice((page-1)*perPage,page*perPage);
  const totalPages=Math.ceil(filtered.length/perPage);

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap',alignItems:'center'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="하자 ID 또는 제목 검색..." style={{flex:1,minWidth:200,padding:'10px 16px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,outline:'none',fontFamily:'inherit'}}/>
        <select value={filter.building} onChange={e=>setFilter(f=>({...f,building:e.target.value}))} style={{padding:'10px 16px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',cursor:'pointer'}}>
          <option value="">전체 동</option>{BUILDINGS.map(b=><option key={b}>{b}</option>)}
        </select>
        <select value={filter.type} onChange={e=>setFilter(f=>({...f,type:e.target.value}))} style={{padding:'10px 16px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',cursor:'pointer'}}>
          <option value="">전체 유형</option>{DEFECT_TYPES.map(t=><option key={t}>{t}</option>)}
        </select>
        <select value={filter.status} onChange={e=>setFilter(f=>({...f,status:e.target.value}))} style={{padding:'10px 16px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',cursor:'pointer'}}>
          <option value="">전체 상태</option>{STATUSES.map(s=><option key={s.label}>{s.label}</option>)}
        </select>
        <button onClick={()=>setModal({type:'create'})} style={{padding:'10px 20px',background:C.primary,color:'#fff',border:'none',borderRadius:8,fontWeight:600,cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>+ 접수 등록</button>
      </div>
      <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,.08)',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#F8FAFC'}}>
              {['하자 ID','동·호수','유형','제목','상태','우선순위','담당자','접수일','사진'].map(h=>(
                <th key={h} style={{padding:'14px 16px',fontSize:12,fontWeight:600,color:C.textLight,textAlign:'left',borderBottom:`1px solid ${C.border}`}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {paged.map((d,i)=>(
              <tr key={d.id} onClick={()=>setModal({type:'detail',item:d})} style={{cursor:'pointer',animation:`slideUp 300ms ease ${i*40}ms both`,transition:'background 150ms'}}
                onMouseEnter={e=>e.currentTarget.style.background=`${C.primary}08`} onMouseLeave={e=>e.currentTarget.style.background=''}>
                <td style={{padding:'14px 16px',fontSize:13,fontWeight:600,color:C.primary,borderBottom:`1px solid ${C.border}`}}>{d.id}</td>
                <td style={{padding:'14px 16px',fontSize:13,borderBottom:`1px solid ${C.border}`}}>{d.building} {d.unit}</td>
                <td style={{padding:'14px 16px',fontSize:13,borderBottom:`1px solid ${C.border}`}}>{d.type}</td>
                <td style={{padding:'14px 16px',fontSize:13,borderBottom:`1px solid ${C.border}`,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.title}</td>
                <td style={{padding:'14px 16px',borderBottom:`1px solid ${C.border}`}}><Badge text={d.status} bg={d.statusColor}/></td>
                <td style={{padding:'14px 16px',borderBottom:`1px solid ${C.border}`}}><Badge text={d.priority} bg={d.priorityColor}/></td>
                <td style={{padding:'14px 16px',fontSize:13,borderBottom:`1px solid ${C.border}`}}>{d.assignee}</td>
                <td style={{padding:'14px 16px',fontSize:13,color:C.textLight,borderBottom:`1px solid ${C.border}`}}>{d.date}</td>
                <td style={{padding:'14px 16px',fontSize:13,borderBottom:`1px solid ${C.border}`}}>📷 {d.photos}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 16px',borderTop:`1px solid ${C.border}`}}>
          <span style={{fontSize:13,color:C.textLight}}>총 {filtered.length}건 중 {(page-1)*perPage+1}-{Math.min(page*perPage,filtered.length)}건</span>
          <div style={{display:'flex',gap:4}}>
            {Array.from({length:totalPages},(_,i)=>(
              <button key={i} onClick={()=>setPage(i+1)} style={{width:32,height:32,borderRadius:6,border:page===i+1?'none':`1px solid ${C.border}`,background:page===i+1?C.primary:'transparent',color:page===i+1?'#fff':C.text,fontSize:13,cursor:'pointer',fontWeight:page===i+1?700:400,fontFamily:'inherit'}}>{i+1}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function WorkflowPage({setModal,setToast}){
  const columns = STATUSES.slice(0,4);
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{display:'flex',gap:16}}>
          {WORKERS.map(w=>(
            <div key={w.name} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',background:C.surface,borderRadius:8,boxShadow:'0 1px 3px rgba(0,0,0,.06)',fontSize:13}}>
              <span>{w.avatar}</span><span style={{fontWeight:600}}>{w.name}</span><Badge text={`${w.active}건`} bg={`${C.primary}20`} color={C.primary}/>
            </div>
          ))}
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
        {columns.map(col=>{
          const items=DEFECTS.filter(d=>d.status===col.label);
          return(
            <div key={col.label} style={{background:C.surface,borderRadius:12,padding:16,boxShadow:'0 1px 3px rgba(0,0,0,.08)',minHeight:400}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:10,height:10,borderRadius:'50%',background:col.color}}/>
                  <span style={{fontWeight:700,fontSize:14}}>{col.label}</span>
                </div>
                <Badge text={items.length} bg={`${col.color}20`} color={col.color}/>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {items.slice(0,6).map((d,i)=>(
                  <div key={d.id} onClick={()=>setModal({type:'detail',item:d})} style={{padding:14,borderRadius:8,border:`1px solid ${C.border}`,cursor:'pointer',transition:'all 200ms',animation:`slideUp 300ms ease ${i*60}ms both`}}
                    onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,.1)'}}
                    onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow=''}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                      <span style={{fontSize:12,fontWeight:600,color:C.primary}}>{d.id}</span>
                      <Badge text={d.priority} bg={d.priorityColor}/>
                    </div>
                    <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>{d.title}</div>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.textLight}}>
                      <span>{d.building} {d.unit}</span>
                      <span>{d.assignee}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}

            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button onClick={()=>{setModal(null);setToast('하자가 접수되었습니다')}} style={{padding:'10px 24px',background:C.primary,color:'#fff',border:'none',borderRadius:8,fontWeight:600,cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>접수 등록</button>
              <button onClick={()=>setModal(null)} style={{padding:'10px 20px',background:'#E2E8F0',color:C.text,border:'none',borderRadius:8,fontWeight:600,cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>취소</button>
            </div>
          </div>
        </Modal>
      )}
      {modal?.type==='worker-detail' && (
        <Modal title={`${modal.item.name} — 상세 정보`} onClose={()=>setModal(null)} width={480}>
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{fontSize:52,marginBottom:8}}>{modal.item.avatar}</div>
            <div style={{fontWeight:700,fontSize:18}}>{modal.item.name}</div>
            <div style={{fontSize:13,color:C.textLight}}>{modal.item.role}</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
            <div style={{padding:16,background:'#F8FAFC',borderRadius:8,textAlign:'center'}}><div style={{fontSize:28,fontWeight:800,color:C.primary}}>{modal.item.active}</div><div style={{fontSize:12,color:C.textLight}}>현재 진행중</div></div>
            <div style={{padding:16,background:'#F8FAFC',borderRadius:8,textAlign:'center'}}><div style={{fontSize:28,fontWeight:800,color:C.success}}>{modal.item.completed}</div><div style={{fontSize:12,color:C.textLight}}>총 완료 건수</div></div>
          </div>
          <div><label style={{fontSize:12,color:C.textLight,fontWeight:600}}>배정 메모</label>
            <textarea rows={3} placeholder="메모를 입력하세요..." style={{width:'100%',marginTop:6,padding:12,borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',resize:'vertical'}}/></div>
        </Modal>
      )}
      {modal?.type==='archive-detail' && (
        <Modal title={`${modal.item.building} — ${modal.item.phase}`} onClose={()=>setModal(null)} width={600}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
            <div style={{padding:14,background:'#F8FAFC',borderRadius:8,textAlign:'center'}}><div style={{fontSize:22,fontWeight:800,color:C.primary}}>{modal.item.total}</div><div style={{fontSize:11,color:C.textLight}}>전체 하자</div></div>
            <div style={{padding:14,background:'#F8FAFC',borderRadius:8,textAlign:'center'}}><div style={{fontSize:22,fontWeight:800,color:C.success}}>{modal.item.resolved}</div><div style={{fontSize:11,color:C.textLight}}>해결 완료</div></div>
            <div style={{padding:14,background:'#F8FAFC',borderRadius:8,textAlign:'center'}}><div style={{fontSize:22,fontWeight:800,color:C.accent}}>{modal.item.photos}</div><div style={{fontSize:11,color:C.textLight}}>첨부 사진</div></div>
          </div>
          <h4 style={{fontSize:14,fontWeight:700,marginBottom:12}}>세대별 현황</h4>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {modal.item.units.map((u,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:'#F8FAFC',borderRadius:8}}>
                <span style={{fontWeight:600,fontSize:13}}>{u.unit}</span>
                <div style={{display:'flex',gap:12,alignItems:'center'}}>
                  <span style={{fontSize:12}}>하자 {u.defects}건 · 사진 {u.photos}장</span>
                  <Badge text={u.status} bg={u.status==='완료'?C.success:u.status==='처리중'?'#8B5CF6':C.danger}/>
                </div>
              </div>
            ))}
          </div>
        </Modal>
      )}
      {modal?.type==='export-pdf' && (
        <Modal title="PDF 점검 보고서 생성" onClose={()=>setModal(null)} width={480}>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div><label style={{fontSize:12,color:C.textLight,fontWeight:600,display:'block',marginBottom:6}}>대상 동</label>
              <select style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit'}}><option>전체 동</option>{BUILDINGS.map(b=><option key={b}>{b}</option>)}</select></div>
            <div><label style={{fontSize:12,color:C.textLight,fontWeight:600,display:'block',marginBottom:6}}>점검 시점</label>
              <select style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit'}}><option>입주 전 점검</option><option>입주 후 점검</option><option>전체</option></select></div>
            <div><label style={{fontSize:12,color:C.textLight,fontWeight:600,display:'block',marginBottom:6}}>포함 항목</label>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {['사진 포함','처리 이력 포함','통계 요약 포함'].map(opt=>(
                  <label key={opt} style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer'}}>
                    <input type="checkbox" defaultChecked/>{opt}
                  </label>
                ))}
              </div>
            </div>
            <button onClick={()=>{setModal(null);setToast('PDF 보고서 생성이 시작되었습니다')}} style={{padding:'12px 24px',background:C.primary,color:'#fff',border:'none',borderRadius:8,fontWeight:600,cursor:'pointer',fontSize:14,fontFamily:'inherit',marginTop:8}}>📄 PDF 생성 시작</button>
          </div>
        </Modal>
      )}

      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
