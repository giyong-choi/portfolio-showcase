function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

  return <span style={{display:'inline-block',padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function Btn({children,onClick,variant='primary',size='md',style:s={}}){
  const base={border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:700,borderRadius:12,transition:'all 200ms',display:'inline-flex',alignItems:'center',gap:6};
  const vars={
    primary:{background:`linear-gradient(135deg,${C.primary},${C.accent})`,color:'#fff',padding:size==='sm'?'7px 16px':'11px 22px',fontSize:size==='sm'?12:14},
    outline:{background:'transparent',color:C.primary,border:`2px solid ${C.primary}`,padding:size==='sm'?'5px 14px':'9px 20px',fontSize:size==='sm'?12:14},
    ghost:{background:'transparent',color:C.textLight,padding:size==='sm'?'7px 16px':'11px 22px',fontSize:size==='sm'?12:14},
  };
  return <button onClick={onClick} style={{...base,...vars[variant],...s}} onMouseEnter={e=>e.currentTarget.style.opacity='0.9'} onMouseLeave={e=>e.currentTarget.style.opacity='1'}>{children}</button>;
}

          <Badge text={it.status}/>
        </div>
        <div style={{height:220,marginBottom:20}}>
          <ResponsiveContainer width="100%" height="100%">
            <RadarChart data={RADAR_HEALTH}>
              <PolarGrid stroke="#F3E8E8"/>
              <PolarAngleAxis dataKey="item" tick={{fontSize:11}}/>
              <PolarRadiusAxis tick={{fontSize:10}} domain={[0,100]}/>
              <Radar dataKey="ref" stroke="#E5E7EB" fill="#E5E7EB" fillOpacity={0.15} name="기준"/>
              <Radar dataKey="score" stroke={C.primary} fill={C.primary} fillOpacity={0.25} name="결과"/>
              <Tooltip/>
            </RadarChart>
          </ResponsiveContainer>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse',marginBottom:16}}>
          <thead>
            <tr style={{borderBottom:`2px solid ${C.border}`}}>
              {['항목','수치','기준','판정'].map(h=><th key={h} style={{padding:'10px 12px',textAlign:'left',fontSize:11,color:C.textLight,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {[{item:'혈압',val:'128/82',ref:'<120/80',status:'경계'},{item:'혈당',val:'95',ref:'<100',status:'정상'},{item:'콜레스테롤',val:'198',ref:'<200',status:'정상'},{item:'간기능(AST)',val:'28',ref:'<40',status:'정상'}].map(r=>(
              <tr key={r.item} style={{borderBottom:`1px solid ${C.border}`}}>
                <td style={{padding:'10px 12px',fontSize:14,fontWeight:700}}>{r.item}</td>
                <td style={{padding:'10px 12px',fontSize:14}}>{r.val}</td>
                <td style={{padding:'10px 12px',fontSize:13,color:C.textLight}}>{r.ref}</td>
                <td style={{padding:'10px 12px'}}><Badge text={r.status}/></td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{display:'flex',gap:8}}>
          <Btn variant="outline" onClick={()=>setDrawer(null)}>닫기</Btn>
          <Btn onClick={()=>{setDrawer(null);setToast('PDF 리포트가 생성되었습니다.')}}>📥 PDF 다운로드</Btn>
        </div>
      </Drawer>
    );
    if(drawer.type==='item-detail') return(
      <Drawer item={{name:it.name}} onClose={()=>setDrawer(null)}>
        <div style={{fontSize:24,fontWeight:800,marginBottom:8}}>{it.name} 상세</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
          {[{l:'정상',v:`${it.normal}%`,c:C.success},{l:'경계',v:`${it.border}%`,c:C.warning},{l:'이상',v:`${it.abnormal}%`,c:C.danger}].map(s=>(
            <div key={s.l} style={{background:`${s.c}10`,borderRadius:12,padding:16,textAlign:'center'}}>
              <div style={{fontSize:12,color:s.c,fontWeight:700}}>{s.l}</div>
              <div style={{fontSize:24,fontWeight:800,color:s.c,marginTop:4}}>{s.v}</div>
            </div>
          ))}
        </div>
        <div style={{height:200}}>
          <ResponsiveContainer width="100%" height="100%">
            <PieChart>
              <Pie data={[{name:'정상',value:it.normal},{name:'경계',value:it.border},{name:'이상',value:it.abnormal}]}
                cx="50%" cy="50%" innerRadius={50} outerRadius={75} paddingAngle={3} dataKey="value" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`}>
                {PIE_COLORS.map((c,ci)=><Cell key={ci} fill={c}/>)}
              </Pie>
              <Tooltip/>
            </PieChart>
          </ResponsiveContainer>
        </div>
        <div style={{padding:16,background:C.bg,borderRadius:12,marginTop:16}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>관리자 메모</div>
          <textarea style={{width:'100%',height:80,border:`1px solid ${C.border}`,borderRadius:8,padding:12,fontSize:14,fontFamily:'inherit',resize:'vertical'}} placeholder="항목에 대한 메모를 입력하세요..."/>
        </div>
        <Btn variant="outline" onClick={()=>setDrawer(null)} style={{marginTop:16}}>닫기</Btn>
      </Drawer>
    );
    return null;
  };

  const renderContent=()=>{
    switch(tab){
      case 'dashboard': return <DashboardPage setDrawer={setDrawer}/>;
      case 'data-input': return <DataInputPage setToast={setToast}/>;
      case 'analysis': return <AnalysisPage/>;
      case 'report-gen': return <ReportGenPage setDrawer={setDrawer} setToast={setToast}/>;
      case 'patients': return <PatientsPage setDrawer={setDrawer}/>;
      case 'settings': return <SettingsPage setToast={setToast}/>;
      default: return <DashboardPage setDrawer={setDrawer}/>;
    }
  };

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* Top Nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 28px',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:20}}>
          <div style={{width:32,height:32,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🏥</div>
          <span style={{fontWeight:800,fontSize:16,letterSpacing:'-0.03em'}}>HealthCheck</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:'8px 16px',border:'none',background:tab===t.id?`${C.primary}10`:'transparent',color:tab===t.id?C.primary:C.textLight,
              fontWeight:tab===t.id?700:500,fontSize:14,cursor:'pointer',borderRadius:8,transition:'all 200ms',fontFamily:'inherit'}}
            onMouseEnter={e=>{if(tab!==t.id)e.currentTarget.style.background=`${C.primary}06`}}
            onMouseLeave={e=>{if(tab!==t.id)e.currentTarget.style.background='transparent'}}>{t.label}</button>
        ))}
        <div style={{flex:1}}/>
        <div style={{position:'relative'}}>
          <input placeholder="검색..." style={{padding:'7px 14px 7px 32px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:13,width:180,fontFamily:'inherit',outline:'none'}}/>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:14}}>🔍</span>
        </div>
        <div style={{width:32,height:32,borderRadius:8,background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:14,position:'relative'}}>
          🔔<div style={{position:'absolute',top:2,right:2,width:7,height:7,borderRadius:'50%',background:C.danger}}/>
        </div>
        <div style={{width:32,height:32,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary}20,${C.accent}30)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,cursor:'pointer'}}>👤</div>
      </header>

      {/* Hero Banner */}
      <div style={{background:`linear-gradient(135deg,${C.primary},${C.accent})`,padding:'28px 32px',color:'#fff'}}>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em'}}>{hero.title}</div>
        <div style={{fontSize:14,opacity:0.85,marginTop:4}}>{hero.sub}</div>
        <div style={{display:'flex',gap:32,marginTop:16}}>
          {hero.kpis.map(k=>(
            <div key={k.label} style={{background:'rgba(255,255,255,0.15)',backdropFilter:'blur(10px)',borderRadius:12,padding:'12px 20px'}}>
              <div style={{fontSize:12,opacity:0.8}}>{k.label}</div>
              <div style={{fontSize:22,fontWeight:800,marginTop:2}}><CountUp end={k.value} suffix={k.suffix}/></div>
            </div>
          ))}
        </div>
      </div>

      {/* Content */}
      <main style={{padding:'24px 32px'}}>
        {renderContent()}
      </main>

      {renderDrawer()}
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
