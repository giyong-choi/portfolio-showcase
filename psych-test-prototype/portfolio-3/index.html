// ─── Components ───
function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:20,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Badge({text,size='sm'}){
  const colors={상담중:{bg:'#DBEAFE',text:'#1D4ED8'},종결:{bg:'#D1FAE5',text:'#065F46'},대기:{bg:'#FEF3C7',text:'#92400E'},최소:{bg:'#D1FAE5',text:'#065F46'},경미:{bg:'#FEF9C3',text:'#854D0E'},중등도:{bg:'#FED7AA',text:'#9A3412'},심각:{bg:'#FEE2E2',text:'#991B1B'}};
  const c=colors[text]||{bg:'#F3F4F6',text:'#6B7280'};
  return <span style={{display:'inline-block',padding:size==='xs'?'2px 8px':'3px 10px',borderRadius:20,fontSize:size==='xs'?11:12,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function Btn({children,onClick,variant='primary',size='md',style:s={}}){
  const base={border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:700,borderRadius:20,transition:'all 200ms',display:'inline-flex',alignItems:'center',gap:6};
  const vars={primary:{background:C.primary,color:'#fff',padding:size==='sm'?'6px 14px':'10px 20px',fontSize:size==='sm'?12:14},
    outline:{background:'transparent',color:C.primary,border:`1px solid ${C.primary}`,padding:size==='sm'?'5px 13px':'9px 19px',fontSize:size==='sm'?12:14},
    ghost:{background:'transparent',color:C.textLight,padding:size==='sm'?'6px 14px':'10px 20px',fontSize:size==='sm'?12:14}};
  return <button onClick={onClick} style={{...base,...vars[variant],...s}} onMouseEnter={e=>e.currentTarget.style.background=variant==='primary'?'#047857':variant==='outline'?`${C.primary}08`:'#F3F4F6'} onMouseLeave={e=>e.currentTarget.style.background=vars[variant].background}>{children}</button>;
}

function SideNavItem({icon,label,active,onClick}){

      background:active?`${C.primary}10`:'transparent',color:active?C.primary:C.textLight,
      borderLeft:active?`3px solid ${C.primary}`:'3px solid transparent',fontSize:14,fontWeight:active?600:400,transition:'all 150ms',fontFamily:'inherit',textAlign:'left'}}
      onMouseEnter={e=>{if(!active)e.currentTarget.style.background=`${C.primary}04`}} onMouseLeave={e=>{if(!active)e.currentTarget.style.background='transparent'}}>
      <span style={{fontSize:18}}>{icon}</span>{label}

  );

      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:C.textLight}}>
        <div style={{textAlign:'center'}}><div style={{fontSize:48,marginBottom:16}}>📋</div><div>좌측에서 검사 이력을 선택하세요</div></div>
      </div>
    </div>
  );

  if(selectedTest&&step>0){
    const questions=[
      '나는 슬프다고 느낀다','나는 미래에 대해 비관적이다','나는 과거에 대해 실패감을 느낀다','나는 예전만큼 즐겁지 않다','나는 죄책감을 느낀다',
    ];
    const q=questions[step-1];
    const progress=Math.round((Object.keys(answers).length/questions.length)*100);
    return(
      <div style={{flex:1,overflowY:'auto',padding:24}}>
        <div style={{maxWidth:640,margin:'0 auto',animation:'fadeIn 300ms ease'}}>
          <div style={{background:C.surface,borderRadius:20,padding:20,border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',marginBottom:20}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontSize:16,fontWeight:700}}>{selectedTest.fullName}</div>
              <div style={{fontSize:13,fontWeight:600,color:C.primary}}>{progress}%</div>
            </div>
            <div style={{height:4,background:'#E5E7EB',borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',background:C.primary,borderRadius:2,width:`${progress}%`,transition:'width 500ms ease'}}/>
            </div>
          </div>
          <div style={{display:'flex',gap:6,marginBottom:16}}>
            {questions.map((_,i)=>(
              <div key={i} style={{flex:1,height:4,borderRadius:2,background:answers[i]!==undefined?C.primary:step-1===i?C.accent:C.border,transition:'all 200ms'}}/>
            ))}
          </div>
          <div style={{background:C.surface,borderRadius:20,padding:28,border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',animation:'slideInRight 250ms ease'}}>
            <div style={{display:'flex',gap:8,marginBottom:16}}>
              <span style={{background:`${C.primary}10`,color:C.primary,padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:600}}>문항 {step}/{questions.length}</span>
            </div>
            <div style={{fontSize:16,fontWeight:600,lineHeight:1.7,marginBottom:24}}>{q}</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {['전혀 아니다 (0)','약간 그렇다 (1)','상당히 그렇다 (2)','매우 심하다 (3)'].map((opt,oi)=>(
                <button key={oi} onClick={()=>setAnswers(p=>({...p,[step-1]:oi}))}
                  style={{padding:'14px 20px',borderRadius:16,border:`1px solid ${answers[step-1]===oi?C.primary:C.border}`,
                    background:answers[step-1]===oi?`${C.primary}08`:'#fff',textAlign:'left',fontSize:14,cursor:'pointer',
                    fontFamily:'inherit',transition:'all 200ms',fontWeight:answers[step-1]===oi?600:400,color:answers[step-1]===oi?C.primary:C.text}}
                  onMouseEnter={e=>{if(answers[step-1]!==oi)e.currentTarget.style.borderColor=C.accent}}
                  onMouseLeave={e=>{if(answers[step-1]!==oi)e.currentTarget.style.borderColor=C.border}}>
                  {opt}
                </button>
              ))}
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:24}}>
              <Btn variant="outline" onClick={()=>setStep(Math.max(1,step-1))}>← 이전</Btn>
              {step<questions.length?
                <Btn onClick={()=>setStep(step+1)}>다음 →</Btn>:
                <Btn onClick={()=>{setSelectedTest(null);setStep(0);setAnswers({});setToast('검사가 완료되었습니다. 채점 결과: 15점 (최소 수준)')}}>제출</Btn>
              }
            </div>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{flex:1,display:'flex',overflow:'hidden'}}>
      <div style={{width:'42%',borderRight:`1px solid ${C.border}`,overflowY:'auto'}}>
        {ASSESSMENTS.map((a,i)=>(
          <div key={a.id} onClick={()=>setSelectedTest(a)}
            style={{padding:'14px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'all 150ms',
              background:selectedTest?.id===a.id?`${C.primary}06`:'transparent',borderLeft:selectedTest?.id===a.id?`3px solid ${C.primary}`:'3px solid transparent',
              animation:`slideUp 300ms ease ${i*60}ms both`}}
            onMouseEnter={e=>{if(selectedTest?.id!==a.id){e.currentTarget.style.background=`${C.primary}04`;e.currentTarget.style.borderLeft=`3px solid ${C.primary}`}}}
            onMouseLeave={e=>{if(selectedTest?.id!==a.id){e.currentTarget.style.background='transparent';e.currentTarget.style.borderLeft='3px solid transparent'}}}>
            <div style={{fontSize:14,fontWeight:600}}>{a.name}</div>
            <div style={{fontSize:12,color:C.textLight,marginTop:2}}>{a.questions}문항 · {a.type} · {a.time}</div>
          </div>
        ))}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:20}}>
        {selectedTest?(
          <div style={{animation:'fadeIn 200ms ease'}}>
            <div style={{fontSize:22,fontWeight:700,marginBottom:4}}>{selectedTest.fullName}</div>
            <div style={{fontSize:13,color:C.textLight,marginBottom:20}}>{selectedTest.desc}</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:24}}>
              {[{l:'문항 수',v:`${selectedTest.questions}문항`},{l:'응답 유형',v:selectedTest.type},{l:'소요 시간',v:selectedTest.time}].map(s=>(
                <div key={s.l} style={{background:C.bg,borderRadius:20,padding:14,border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:12,color:C.textLight,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em'}}>{s.l}</div>
                  <div style={{fontSize:16,fontWeight:700,marginTop:4}}>{s.v}</div>
                </div>
              ))}
            </div>
            <Btn onClick={()=>setStep(1)}>검사 시작 →</Btn>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:C.textLight}}>
            <div style={{fontSize:48,marginBottom:16}}>📝</div><div>좌측에서 검사를 선택하세요</div>
          </div>
        )}
      </div>
    </div>
  );
}

  if(tab===1) return(
    <div style={{flex:1,overflowY:'auto',padding:24,animation:'fadeIn 300ms ease'}}>
      <div style={{background:C.surface,borderRadius:20,padding:24,border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
        <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:16}}>채점 기준 관리</div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
            {['검사','척도','채점 방식','역채점','비고'].map(h=><th key={h} style={{padding:'10px 12px',textAlign:'left',fontSize:12,color:C.textLight,fontWeight:700}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {[{test:'BDI-II',scale:'우울',scoring:'0-3점 합산',reverse:'없음',note:'21문항 총점 0-63'},
              {test:'BAI',scale:'불안',scoring:'0-3점 합산',reverse:'없음',note:'21문항 총점 0-63'},
              {test:'PSS',scale:'스트레스',scoring:'0-4점 합산',reverse:'4,5,7,8번',note:'10문항 총점 0-40'},
              {test:'RSES',scale:'자존감',scoring:'1-4점 합산',reverse:'3,5,8,9,10번',note:'10문항 총점 10-40'}].map(r=>(
              <tr key={r.test} style={{borderBottom:`1px solid ${C.border}`}}>
                <td style={{padding:'12px',fontSize:14,fontWeight:600}}>{r.test}</td>
                <td style={{padding:'12px',fontSize:14}}>{r.scale}</td>
                <td style={{padding:'12px',fontSize:13}}>{r.scoring}</td>
                <td style={{padding:'12px',fontSize:13,color:r.reverse==='없음'?C.textLight:C.primary}}>{r.reverse}</td>
                <td style={{padding:'12px',fontSize:12,color:C.textLight}}>{r.note}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );

  if(tab===2) return(
    <div style={{flex:1,overflowY:'auto',padding:24,animation:'fadeIn 300ms ease'}}>
      <div style={{background:C.surface,borderRadius:20,padding:24,border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
        <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:16}}>권한 관리</div>
        {COUNSELORS.map(c=>(
          <div key={c.id} style={{display:'flex',alignItems:'center',gap:16,padding:'14px 16px',border:`1px solid ${C.border}`,borderRadius:16,marginBottom:8}}>
            <div style={{width:40,height:40,borderRadius:'50%',background:`${C.primary}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:700,color:C.primary}}>{c.name[0]}</div>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{c.name}</div><div style={{fontSize:12,color:C.textLight}}>{c.title}</div></div>
            <div style={{display:'flex',gap:6}}>
              {['검사실시','결과조회','리포트생성','내담자관리'].map(p=>(
                <span key={p} style={{padding:'4px 8px',borderRadius:8,fontSize:11,fontWeight:600,background:`${C.primary}10`,color:C.primary}}>{p}</span>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  return(
    <div style={{flex:1,overflowY:'auto',padding:24,animation:'fadeIn 300ms ease'}}>
      <div style={{background:C.surface,borderRadius:20,padding:24,border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
        <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:16}}>검사 유형 관리</div>
        {ASSESSMENTS.map((a,i)=>(
          <div key={a.id} style={{display:'flex',alignItems:'center',gap:16,padding:'14px 16px',border:`1px solid ${C.border}`,borderRadius:16,marginBottom:8,animation:`slideUp 300ms ease ${i*60}ms both`}}>
            <div style={{width:40,height:40,borderRadius:12,background:`${C.primary}10`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>📝</div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700}}>{a.fullName}</div>
              <div style={{fontSize:12,color:C.textLight}}>{a.questions}문항 · {a.type} · {a.time}</div>
            </div>
            <Badge text="활성" size="xs"/>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Main App ───
function App(){
  const [section,setSection]=useState('workspace');
  const [tab,setTab]=useState(0);
  const [selected,setSelected]=useState(null);
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);
  useEffect(()=>{setTab(0);setSelected(null)},[section]);

  if(loading) return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <div style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`}}/>
      <div style={{flex:1,padding:20,display:'flex',flexDirection:'column',gap:12}}>
        {[40,38,null].map((h,i)=>h?<div key={i} style={{height:h,background:C.surface}}/>:
          <div key={i} style={{flex:1,display:'flex',gap:12}}>
            <div style={{width:'42%',background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite',borderRadius:8}}/>
            <div style={{flex:1,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite',borderRadius:8}}/>
          </div>
        )}
      </div>
    </div>
  );

  const tabs=SECTION_TABS[section]||[];

  const renderContent=()=>{
    switch(section){
      case 'workspace': return <WorkspacePage selected={selected} setSelected={setSelected} tab={tab}/>;
      case 'assessment': return <AssessmentPage tab={tab} setToast={setToast}/>;
      case 'comparison': return <ComparisonPage tab={tab}/>;
      case 'counselor': return <CounselorPage tab={tab} setToast={setToast}/>;
      case 'report-center': return <ReportCenterPage tab={tab} setToast={setToast}/>;
      case 'settings': return <SettingsPage tab={tab}/>;
      default: return <WorkspacePage selected={selected} setSelected={setSelected} tab={tab}/>;
    }
  };

  return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      {/* Bright Sidebar */}
      <nav style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',paddingTop:16,flexShrink:0,position:'sticky',top:0,height:'100vh'}}>
        <div style={{padding:'0 16px 16px',display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🧠</div>
          <span style={{fontWeight:700,fontSize:15}}>MindCare</span>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:2,padding:'0 8px'}}>
          {NAV_ITEMS.filter(n=>n.id!=='settings').map(item=>(
            <SideNavItem key={item.id} icon={item.icon} label={item.label} active={section===item.id} onClick={()=>setSection(item.id)}/>
          ))}
        </div>
        <div style={{padding:'0 8px 12px'}}>
          <SideNavItem icon="⚙️" label="시스템 설정" active={section==='settings'} onClick={()=>setSection('settings')}/>
        </div>
      </nav>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
        {/* App Bar */}
        <header style={{height:40,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 16px',gap:8,background:C.surface,flexShrink:0}}>
          <span style={{fontSize:12,color:C.textLight}}>MindCare</span>
          <span style={{fontSize:12,color:C.textLight}}>{'>'}</span>
          <span style={{fontSize:12,fontWeight:600}}>{NAV_ITEMS.find(n=>n.id===section)?.label}</span>
          {tabs[tab]&&<><span style={{fontSize:12,color:C.textLight}}>{'>'}</span><span style={{fontSize:12,color:C.primary,fontWeight:600}}>{tabs[tab].label}</span></>}
          <div style={{flex:1}}/>
          <div style={{position:'relative'}}>
            <input placeholder="검색..." style={{padding:'5px 10px 5px 28px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,width:160,fontFamily:'inherit',outline:'none'}}/>
            <span style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',fontSize:12}}>🔍</span>
          </div>
          <div style={{width:28,height:28,borderRadius:'50%',background:`${C.primary}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,cursor:'pointer'}}>👤</div>
        </header>

        {/* Tab Strip */}
        <div style={{height:38,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'flex-end',padding:'0 16px',background:C.surface,flexShrink:0}}>
          {tabs.map((t,i)=><TabUnderline key={t.id} label={t.label} active={tab===i} onClick={()=>{setTab(i);setSelected(null)}}/>)}
          <div style={{flex:1}}/>
        </div>

        {/* Content */}
        {renderContent()}
      </div>

      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
