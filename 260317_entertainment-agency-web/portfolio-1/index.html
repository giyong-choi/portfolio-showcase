<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>아르카 크리에이티브 — 공연기획 포트폴리오 CMS</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#FAF5FF;color:#1E1B4B;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#C4B5FD;border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const {BarChart,Bar,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,AreaChart,Area,LineChart,Line}=Recharts;

const C={
  primary:'#7C3AED',secondary:'#1E1B4B',accent:'#A78BFA',
  bg:'#FAF5FF',surface:'#FFFFFF',border:'#E5E7EB',
  text:'#1E1B4B',textLight:'#6B7280',textMuted:'#9CA3AF',
  success:'#059669',warning:'#D97706',danger:'#DC2626',
  sidebarBg:'#1E1B4B',sidebarText:'#C4B5FD',sidebarActive:'#7C3AED',
};

/* ─── Data ─── */
const PORTFOLIO_ITEMS=[
  {id:1,title:'서울 뮤직 페스티벌 2025',cat:'Festival',thumb:'🎪',date:'2025.06',views:3420,status:'발행'},
  {id:2,title:'아이유 콘서트 — 골든 아워',cat:'Concert',thumb:'🎤',date:'2025.05',views:5840,status:'발행'},
  {id:3,title:'현대자동차 브랜드 체험관',cat:'BTL',thumb:'🏢',date:'2025.04',views:2150,status:'발행'},
  {id:4,title:'서울대학교 축제 기획',cat:'University',thumb:'🎓',date:'2025.03',views:1870,status:'발행'},
  {id:5,title:'LoL 챔피언스 코리아 무대',cat:'E-Sport',thumb:'🎮',date:'2025.02',views:4230,status:'발행'},
  {id:6,title:'카카오프렌즈 팝업스토어',cat:'IP-Business',thumb:'🧸',date:'2025.01',views:3650,status:'발행'},
  {id:7,title:'부산 록 페스티벌',cat:'Festival',thumb:'🎸',date:'2025.06',views:0,status:'임시저장'},
  {id:8,title:'BTS 월드 투어 VCR',cat:'Concert',thumb:'🌟',date:'2025.06',views:0,status:'예약'},
];

const MAGAZINES=[
  {id:1,title:'2025 페스티벌 트렌드 리포트',series:'트렌드',status:'발행',date:'2025.06.10',views:1240},
  {id:2,title:'무대 조명 디자인의 진화',series:'기술',status:'발행',date:'2025.05.25',views:890},
  {id:3,title:'공연 기획자가 알아야 할 5가지',series:'인사이트',status:'예약',date:'2025.06.20',views:0},
  {id:4,title:'ESG와 지속 가능한 이벤트',series:'트렌드',status:'임시저장',date:'—',views:0},
];

const RECRUITS=[
  {id:1,position:'공연 기획 PD',status:'모집중',applicants:23,deadline:'2025.07.15'},
  {id:2,position:'무대 디자이너',status:'모집중',applicants:15,deadline:'2025.07.10'},
  {id:3,position:'영상 디렉터',status:'마감',applicants:42,deadline:'2025.06.01'},
];

const INQUIRIES=[
  {id:1,name:'(주)에이비씨',subject:'기업 행사 기획 문의',date:'2025.06.14',status:'신규'},
  {id:2,name:'서울시청',subject:'시민 축제 협업 제안',date:'2025.06.12',status:'검토중'},
  {id:3,name:'넷마블',subject:'게임 론칭 이벤트 견적',date:'2025.06.10',status:'완료'},
  {id:4,name:'개인',subject:'소규모 웨딩 파티 문의',date:'2025.06.08',status:'완료'},
];

const CAT_CHART=[
  {month:'1월',Festival:2,Concert:1,BTL:3,University:1,ESport:0,IP:1},
  {month:'2월',Festival:1,Concert:2,BTL:2,University:0,ESport:1,IP:0},
  {month:'3월',Festival:3,Concert:1,BTL:1,University:2,ESport:1,IP:2},
  {month:'4월',Festival:2,Concert:3,BTL:2,University:1,ESport:0,IP:1},
  {month:'5월',Festival:1,Concert:2,BTL:3,University:1,ESport:2,IP:1},
  {month:'6월',Festival:4,Concert:2,BTL:1,University:2,ESport:1,IP:2},
];

const STATUS_PIE=[
  {name:'발행',value:6,color:C.success},{name:'예약',value:1,color:C.primary},{name:'임시저장',value:1,color:C.warning},
];

/* ─── Components ─── */
function Badge({text}){
  const colors={'발행':{bg:'#ECFDF5',c:'#059669'},'예약':{bg:'#F3E8FF',c:'#7C3AED'},'임시저장':{bg:'#FEF3C7',c:'#D97706'},'모집중':{bg:'#ECFDF5',c:'#059669'},'마감':{bg:'#F3F4F6',c:'#6B7280'},'신규':{bg:'#FEF2F2',c:'#DC2626'},'검토중':{bg:'#FEF3C7',c:'#D97706'},'완료':{bg:'#ECFDF5',c:'#059669'}};
  const s=colors[text]||{bg:'#F3F4F6',c:'#6B7280'};
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:6,fontSize:12,fontWeight:600,background:s.bg,color:s.c}}>{text}</span>;
}

function KpiCard({icon,label,value,sub,accent}){
  return(
    <div style={{background:C.surface,borderRadius:12,padding:'20px 24px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`,animation:'slideUp 500ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span>
        <span style={{fontSize:20}}>{icon}</span>
      </div>
      <div style={{fontSize:28,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{value}</div>
      {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:6}}>{sub}</div>}
    </div>
  );
}

/* ─── Pages ─── */
function DashboardPage(){
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>대시보드</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
        <KpiCard icon="🎨" label="전체 포트폴리오" value="8" sub="6개 카테고리"/>
        <KpiCard icon="📰" label="매거진 아티클" value="4" sub="발행 2 · 예약 1"/>
        <KpiCard icon="💼" label="채용 공고" value="3" sub="모집중 2"/>
        <KpiCard icon="📩" label="신규 문의" value="1" sub="미처리" accent={C.danger}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20,marginBottom:24}}>
        <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>월별 카테고리별 콘텐츠 발행</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={CAT_CHART}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/>
              <XAxis dataKey="month" tick={{fontSize:12,fill:C.textMuted}}/>
              <YAxis tick={{fontSize:12,fill:C.textMuted}}/>
              <Tooltip contentStyle={{borderRadius:8,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}}/>
              <Bar dataKey="Festival" stackId="a" fill="#7C3AED" name="Festival"/>
              <Bar dataKey="Concert" stackId="a" fill="#A78BFA" name="Concert"/>
              <Bar dataKey="BTL" stackId="a" fill="#06B6D4" name="BTL"/>
              <Bar dataKey="University" stackId="a" fill="#059669" name="University"/>
              <Bar dataKey="ESport" stackId="a" fill="#F59E0B" name="E-Sport"/>
              <Bar dataKey="IP" stackId="a" fill="#EC4899" name="IP-Business" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>발행 상태 분포</div>
          <ResponsiveContainer width="100%" height={170}>
            <PieChart><Pie data={STATUS_PIE} cx="50%" cy="50%" innerRadius={45} outerRadius={68} dataKey="value" paddingAngle={4}>{STATUS_PIE.map((e,i)=><Cell key={i} fill={e.color}/>)}</Pie><Tooltip/></PieChart>
          </ResponsiveContainer>
          <div style={{display:'flex',justifyContent:'center',gap:14,marginTop:8}}>
            {STATUS_PIE.map(d=><div key={d.name} style={{display:'flex',alignItems:'center',gap:5,fontSize:12}}><div style={{width:8,height:8,borderRadius:'50%',background:d.color}}/>{d.name} {d.value}</div>)}
          </div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <div style={{background:C.surface,borderRadius:12,padding:24,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>최근 문의</div>
          {INQUIRIES.slice(0,3).map(q=>(
            <div key={q.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
              <div><div style={{fontSize:13,fontWeight:600}}>{q.subject}</div><div style={{fontSize:11,color:C.textMuted}}>{q.name} · {q.date}</div></div>
              <Badge text={q.status}/>
            </div>
          ))}
        </div>
        <div style={{background:C.surface,borderRadius:12,padding:24,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>채용 현황</div>
          {RECRUITS.map(r=>(
            <div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
              <div><div style={{fontSize:13,fontWeight:600}}>{r.position}</div><div style={{fontSize:11,color:C.textMuted}}>지원자 {r.applicants}명 · 마감 {r.deadline}</div></div>
              <Badge text={r.status}/>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function GalleryPage(){
  const[cat,setCat]=useState('전체');
  const cats=['전체','Festival','Concert','BTL','University','E-Sport','IP-Business'];
  const filtered=cat==='전체'?PORTFOLIO_ITEMS:PORTFOLIO_ITEMS.filter(p=>p.cat===cat);
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h2 style={{fontSize:22,fontWeight:800}}>포트폴리오 갤러리 관리</h2>
        <button style={{padding:'8px 16px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 포트폴리오 등록</button>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
        {cats.map(c=><button key={c} onClick={()=>setCat(c)} style={{padding:'6px 14px',borderRadius:20,border:`1px solid ${cat===c?C.primary:C.border}`,background:cat===c?C.primary:'transparent',color:cat===c?'#fff':C.textLight,fontSize:12,fontWeight:500,cursor:'pointer'}}>{c}</button>)}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
        {filtered.map(p=>(
          <div key={p.id} style={{background:C.surface,borderRadius:12,overflow:'hidden',border:`1px solid ${C.border}`,cursor:'pointer',transition:'transform 150ms'}} onMouseOver={e=>e.currentTarget.style.transform='translateY(-2px)'} onMouseOut={e=>e.currentTarget.style.transform='none'}>
            <div style={{height:160,background:`linear-gradient(135deg,${C.primary}20,${C.accent}30)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:52}}>{p.thumb}</div>
            <div style={{padding:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div style={{fontSize:14,fontWeight:700,lineHeight:1.3}}>{p.title}</div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{padding:'3px 8px',borderRadius:4,background:'#F3E8FF',fontSize:11,color:C.primary,fontWeight:600}}>{p.cat}</span>
                <Badge text={p.status}/>
              </div>
              <div style={{fontSize:11,color:C.textMuted,marginTop:6}}>{p.date} · 조회 {p.views.toLocaleString()}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function MagazinePage(){
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h2 style={{fontSize:22,fontWeight:800}}>매거진 관리</h2>
        <button style={{padding:'8px 16px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 아티클 작성</button>
      </div>

      <div style={{background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`,background:'#FAFAFE'}}>
            {['제목','시리즈','상태','발행일','조회수'].map(h=><th key={h} style={{padding:'12px 14px',textAlign:'left',color:C.textMuted,fontWeight:600,fontSize:12}}>{h}</th>)}
          </tr></thead>
          <tbody>{MAGAZINES.map(m=><tr key={m.id} style={{borderBottom:`1px solid ${C.border}`}}>
            <td style={{padding:'14px',fontWeight:600}}>{m.title}</td>
            <td style={{padding:'14px'}}><span style={{padding:'3px 8px',borderRadius:4,background:'#F3E8FF',fontSize:11,color:C.primary,fontWeight:600}}>{m.series}</span></td>
            <td style={{padding:'14px'}}><Badge text={m.status}/></td>
            <td style={{padding:'14px',color:C.textMuted}}>{m.date}</td>
            <td style={{padding:'14px'}}>{m.views>0?m.views.toLocaleString():'—'}</td>
          </tr>)}</tbody>
        </table>
      </div>

      <div style={{marginTop:24,background:C.surface,borderRadius:12,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>에디터 미리보기</div>
        <div style={{padding:20,background:'#FAFAFE',borderRadius:8,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:11,color:C.textMuted,marginBottom:8}}>Tiptap Rich Text Editor</div>
          <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
            {['B','I','U','H1','H2','H3','🔗','📷','❝','📦'].map(b=><button key={b} style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.border}`,background:'#fff',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>{b}</button>)}
          </div>
          <div style={{minHeight:120,padding:16,background:'#fff',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,lineHeight:1.8,color:C.textLight}}>
            2025년 공연 산업의 핵심 트렌드를 분석합니다. 올해 주목할 키워드는 <span style={{fontWeight:700,color:C.text}}>"몰입형 경험"</span>과 <span style={{fontWeight:700,color:C.text}}>"지속 가능성"</span>입니다...
          </div>
        </div>
      </div>
    </div>
  );
}

function RecruitPage(){
  const[tab,setTab]=useState('채용');
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>채용 및 문의 관리</h2>

      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {['채용','지원자','문의'].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:'8px 18px',borderRadius:8,border:`1px solid ${tab===t?C.primary:C.border}`,background:tab===t?C.primary:'transparent',color:tab===t?'#fff':C.textLight,fontSize:13,fontWeight:600,cursor:'pointer'}}>{t}</button>)}
      </div>

      {tab==='채용'&&<div style={{background:C.surface,borderRadius:12,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:700}}>채용 공고</div>
          <button style={{padding:'8px 16px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 공고 등록</button>
        </div>
        {RECRUITS.map(r=>(
          <div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:16,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:10}}>
            <div>
              <div style={{fontSize:15,fontWeight:700}}>{r.position}</div>
              <div style={{fontSize:12,color:C.textMuted}}>지원자 {r.applicants}명 · 마감 {r.deadline}</div>
            </div>
            <Badge text={r.status}/>
          </div>
        ))}
      </div>}

      {tab==='지원자'&&<div style={{background:C.surface,borderRadius:12,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>지원자 인박스</div>
        {[
          {name:'김서연',position:'공연 기획 PD',date:'2025.06.14',status:'서류심사'},
          {name:'박지민',position:'공연 기획 PD',date:'2025.06.13',status:'면접예정'},
          {name:'이현우',position:'무대 디자이너',date:'2025.06.12',status:'서류심사'},
          {name:'최수진',position:'영상 디렉터',date:'2025.06.10',status:'합격'},
        ].map((a,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:`1px solid ${C.border}`}}>
            <div><div style={{fontSize:14,fontWeight:600}}>{a.name}</div><div style={{fontSize:12,color:C.textMuted}}>{a.position} · {a.date}</div></div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <Badge text={a.status}/>
              <button style={{padding:'4px 10px',borderRadius:6,background:'#F3E8FF',border:'none',fontSize:11,color:C.primary,fontWeight:600,cursor:'pointer'}}>📎 이력서</button>
            </div>
          </div>
        ))}
      </div>}

      {tab==='문의'&&<div style={{background:C.surface,borderRadius:12,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>문의 인박스</div>
        {INQUIRIES.map(q=>(
          <div key={q.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:`1px solid ${C.border}`}}>
            <div>
              <div style={{fontSize:14,fontWeight:600}}>{q.subject}</div>
              <div style={{fontSize:12,color:C.textMuted}}>{q.name} · {q.date}</div>
            </div>
            <Badge text={q.status}/>
          </div>
        ))}
      </div>}
    </div>
  );
}

function SettingsPage(){
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>사이트 설정</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:20}}>
        <div style={{background:C.surface,borderRadius:12,padding:24,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>사이트 정보</div>

          {[['메타 제목','아르카 크리에이티브 — 공연·이벤트 기획'],['메타 설명','페스티벌, 콘서트, BTL...'],['OG 이미지','설정됨'],['사이트맵','자동 생성 (매일 04:00)']].map(([k,v])=>(

/* ─── App Shell ─── */
function App(){
  const[page,setPage]=useState('대시보드');
  const menus=[
    {name:'대시보드',icon:'📊'},
    {name:'포트폴리오 갤러리 관리',icon:'🎨'},
    {name:'매거진 관리',icon:'📰'},
    {name:'채용 및 문의 관리',icon:'💼'},
    {name:'사이트 설정',icon:'⚙️'},
  ];

  const renderPage=()=>{
    switch(page){
      case '대시보드':return <DashboardPage/>;
      case '포트폴리오 갤러리 관리':return <GalleryPage/>;
      case '매거진 관리':return <MagazinePage/>;
      case '채용 및 문의 관리':return <RecruitPage/>;
      case '사이트 설정':return <SettingsPage/>;
      default:return <DashboardPage/>;
    }
  };

  return(
    <div style={{display:'flex',height:'100vh'}}>
      <div style={{width:260,background:C.sidebarBg,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'20px 24px',borderBottom:'1px solid rgba(255,255,255,0.1)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🎨</div>
            <div><div style={{fontSize:16,fontWeight:800,color:'#fff'}}>아르카</div><div style={{fontSize:11,color:C.sidebarText}}>Creative CMS</div></div>
          </div>
        </div>
        <nav style={{flex:1,padding:'12px 14px'}}>
          {menus.map(m=>(
            <button key={m.name} onClick={()=>setPage(m.name)} title={m.name} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'12px 14px',borderRadius:10,border:'none',background:page===m.name?C.sidebarActive:'transparent',color:page===m.name?'#fff':C.sidebarText,fontSize:14,fontWeight:page===m.name?600:400,cursor:'pointer',marginBottom:4,transition:'all 150ms',textAlign:'left'}}>
              <span style={{fontSize:18}}>{m.icon}</span>{m.name}
            </button>
          ))}
        </nav>
        <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.1)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(167,139,250,0.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff'}}>👤</div>
            <div><div style={{fontSize:13,fontWeight:600,color:'#fff'}}>관리자</div><div style={{fontSize:11,color:C.sidebarText}}>admin@arka.co</div></div>
          </div>
        </div>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'14px 28px',borderBottom:`1px solid ${C.border}`,background:C.surface,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:13,fontWeight:600}}>{page}</span>
          <span style={{padding:'4px 10px',borderRadius:6,background:'#F3E8FF',color:C.primary,fontSize:12,fontWeight:600}}>포트폴리오 8 · 매거진 4</span>
        </div>
        <div style={{flex:1,overflow:'auto',padding:28}}>{renderPage()}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
