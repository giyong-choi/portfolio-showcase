/* ─── Components ─── */
function Badge({text}){
  const colors={'발행':{bg:'#ECFDF5',c:'#059669'},'예약':{bg:'#EFF6FF',c:'#2563EB'},'임시저장':{bg:'#FEF3C7',c:'#D97706'},'신규':{bg:'#FEF2F2',c:'#DC2626'},'검토중':{bg:'#FEF3C7',c:'#D97706'},'완료':{bg:'#ECFDF5',c:'#059669'}};
  const s=colors[text]||{bg:'#F1F5F9',c:'#475569'};
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:s.bg,color:s.c}}>{text}</span>;
}

function KpiCard({icon,label,value,sub,accent}){
  return(
    <div style={{background:C.surface,borderRadius:8,padding:'20px 24px',boxShadow:'0 4px 16px rgba(0,0,0,0.04)',animation:'slideUp 500ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span>
        <span style={{fontSize:20}}>{icon}</span>
      </div>
      <div style={{fontSize:28,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{value}</div>
      {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:6}}>{sub}</div>}
    </div>
  );
}

function ShowcasePage(){

    <div style={{animation:'fadeIn 400ms ease'}}>

function App(){
  const[page,setPage]=useState('프로젝트 쇼케이스');
  const tabs=[
    {name:'프로젝트 쇼케이스',icon:'🏗️'},
    {name:'프로젝트 상세 관리',icon:'📋'},
    {name:'인사이트 아티클 관리',icon:'📝'},
    {name:'견적 문의 관리',icon:'📩'},
    {name:'미디어 라이브러리',icon:'📷'},
    {name:'설정',icon:'⚙️'},
  ];

  const renderPage=()=>{
    switch(page){
      case '프로젝트 쇼케이스':return <ShowcasePage/>;
      case '프로젝트 상세 관리':return <ProjectMgmtPage/>;
      case '인사이트 아티클 관리':return <ArticlePage/>;
      case '견적 문의 관리':return <InquiryPage/>;
      case '미디어 라이브러리':return <MediaPage/>;
      case '설정':return <SettingsPage/>;
      default:return <ShowcasePage/>;
    }
  };

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column'}}>
      <header style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'0 32px',display:'flex',alignItems:'center',justifyContent:'space-between',height:56,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:30,height:30,borderRadius:4,background:C.secondary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff',fontWeight:800}}>O</div>
          <span style={{fontSize:16,fontWeight:800,letterSpacing:1}}>OMNIA</span>
        </div>
        <nav style={{display:'flex',gap:2}}>
          {tabs.map(t=>(
            <button key={t.name} onClick={()=>setPage(t.name)} title={t.name} style={{padding:'6px 14px',borderRadius:4,border:'none',background:page===t.name?`${C.accent}15`:'transparent',color:page===t.name?C.accent:C.textMuted,fontSize:13,fontWeight:page===t.name?600:400,cursor:'pointer',display:'flex',alignItems:'center',gap:5}}>
              <span style={{fontSize:14}}>{t.icon}</span>{t.name}
            </button>
          ))}
        </nav>
        <span style={{fontSize:12,color:C.textMuted}}>관리자</span>
      </header>
      <main style={{flex:1,overflow:'auto',padding:28}}>{renderPage()}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
