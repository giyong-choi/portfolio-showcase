function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Badge({text}){
  const map={'접수중':{bg:'#DBEAFE',c:'#1D4ED8'},'진행중':{bg:'#FEF3C7',c:'#B45309'},'종료':{bg:'#F1F5F9',c:'#475569'},'발송완료':{bg:'#DCFCE7',c:'#15803D'},'접수완료':{bg:'#DBEAFE',c:'#1D4ED8'},'체크인완료':{bg:'#DCFCE7',c:'#15803D'},'미접수':{bg:'#FEE2E2',c:'#B91C1C'},'알림톡':{bg:'#DBEAFE',c:'#1D4ED8'},'SMS':{bg:'#F3E8FF',c:'#7C3AED'}};
  const s=map[text]||{bg:'#F1F5F9',c:'#475569'};
  return <span style={{background:s.bg,color:s.c,padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:600}}>{text}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Modal({title,onClose,children,width=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:'#fff',borderRadius:16,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:'1px solid #FECDD3'}}>
          <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#64748B'}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function Btn({children,primary,onClick,small}){
  return <button onClick={onClick} style={{background:primary?C.primary:'#fff',color:primary?'#fff':C.text,border:primary?'none':`1px solid ${C.border}`,padding:small?'6px 14px':'10px 20px',borderRadius:10,fontSize:small?12:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit',transition:'all 150ms'}}
    onMouseEnter={e=>{e.currentTarget.style.opacity='0.85'}} onMouseLeave={e=>{e.currentTarget.style.opacity='1'}}>{children}</button>;
}

        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
            {['ID','이벤트','채널','발송수','성공','실패','일시','템플릿'].map(h=><th key={h} style={{padding:'14px 16px',textAlign:'left',fontSize:11,fontWeight:700,color:C.textLight,textTransform:'uppercase',letterSpacing:'0.05em'}}>{h}</th>)}
          </tr></thead>
          <tbody>{SEND_HISTORY.map((s,i)=>(
            <tr key={s.id} onClick={()=>setDrawer({item:s,type:'send'})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'all 150ms',animation:`slideUp 300ms ease ${i*50}ms both`}}
              onMouseEnter={e=>{e.currentTarget.style.background=`${C.primary}06`;e.currentTarget.style.borderLeft=`3px solid ${C.primary}`}} onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderLeft='3px solid transparent'}}>
              <td style={{padding:'14px 16px',fontSize:13,fontFamily:'monospace',color:C.primary,fontWeight:600}}>{s.id}</td>
              <td style={{padding:'14px 16px',fontSize:14}}>{s.event}</td>
              <td style={{padding:'14px 16px'}}><Badge text={s.channel}/></td>
              <td style={{padding:'14px 16px',fontSize:14}}>{s.sent}</td>
              <td style={{padding:'14px 16px',fontSize:14,color:C.success,fontWeight:600}}>{s.success}</td>
              <td style={{padding:'14px 16px',fontSize:14,color:s.fail>0?C.danger:C.textMuted}}>{s.fail}</td>
              <td style={{padding:'14px 16px',fontSize:13,color:C.textLight}}>{s.date}</td>
              <td style={{padding:'14px 16px',fontSize:13}}>{s.template}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

function DataPage({setDrawer}){
  const[filter,setFilter]=useState('전체');
  const filtered=filter==='전체'?PARTICIPANTS:PARTICIPANTS.filter(p=>p.status===filter);
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{display:'flex',gap:8}}>
          {['전체','접수완료','체크인완료','미접수'].map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{padding:'6px 16px',borderRadius:20,border:`1px solid ${filter===f?C.primary:C.border}`,background:filter===f?C.primary:'#fff',color:filter===f?'#fff':C.textLight,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>{f}</button>
          ))}
        </div>
        <Btn onClick={()=>{}}>📥 CSV 내보내기</Btn>
      </div>
      <div style={{background:C.surface,borderRadius:16,boxShadow:'0 4px 16px rgba(0,0,0,0.06)'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
            {['이름','연락처','이벤트','접수일시','상태'].map(h=><th key={h} style={{padding:'14px 16px',textAlign:'left',fontSize:11,fontWeight:700,color:C.textLight,textTransform:'uppercase',letterSpacing:'0.05em'}}>{h}</th>)}
          </tr></thead>
          <tbody>{filtered.map((p,i)=>(
            <tr key={p.id} onClick={()=>setDrawer({item:p,type:'participant'})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'all 150ms',animation:`slideUp 300ms ease ${i*50}ms both`}}
              onMouseEnter={e=>{e.currentTarget.style.background=`${C.primary}06`;e.currentTarget.style.borderLeft=`3px solid ${C.primary}`}} onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderLeft='3px solid transparent'}}>
              <td style={{padding:'14px 16px',fontSize:14,fontWeight:600}}>{p.name}</td>
              <td style={{padding:'14px 16px',fontSize:13,color:C.textLight}}>{p.phone}</td>
              <td style={{padding:'14px 16px',fontSize:13}}>{p.event}</td>
              <td style={{padding:'14px 16px',fontSize:13,color:C.textLight}}>{p.registeredAt}</td>
              <td style={{padding:'14px 16px'}}><Badge text={p.status}/></td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

function SettingsPage({setToast}){
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>발송 채널 설정</div>
          {[{name:'카카오 알림톡',st:'연동완료'},{name:'NCP SMS',st:'연동완료'},{name:'이메일 SMTP',st:'미설정'}].map((ch,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 0',borderBottom:i<2?`1px solid ${C.border}`:'none'}}>
              <span style={{fontSize:14,fontWeight:600}}>{ch.name}</span>
              <Badge text={ch.st}/>
            </div>
          ))}
        </div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>계정 정보</div>
          <div style={{marginBottom:12}}><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>이메일</label><input defaultValue="admin@formrelay.co" style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit'}}/></div>
          <div style={{marginBottom:12}}><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>연락처</label><input defaultValue="010-1234-5678" style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit'}}/></div>
          <Btn primary onClick={()=>setToast('저장되었습니다.')}>저장</Btn>
        </div>
      </div>
    </div>
  );
}

/* ─── App ─── */
function App(){
  const[tab,setTab]=useState('home');
  const[drawer,setDrawer]=useState(null);
  const[modal,setModal]=useState(null);
  const[toast,setToast]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  if(loading) return <div style={{minHeight:'100vh',background:C.bg}}><div style={{height:56,background:C.surface,borderBottom:`1px solid ${C.border}`}}/><div style={{padding:32,display:'flex',flexDirection:'column',gap:16}}>{[...Array(4)].map((_,i)=><div key={i} style={{height:120,borderRadius:16,background:'linear-gradient(90deg,#FFF5F5 25%,#FECDD3 50%,#FFF5F5 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}</div></div>;

  const heroMeta={
    home:{title:'이벤트 운영 현황',kpis:[{l:'등록 이벤트',v:'6개'},{l:'총 접수자',v:'724명'},{l:'체크인',v:'239명'}]},
    event:{title:'이벤트 관리',kpis:[{l:'전체 이벤트',v:'6개'},{l:'접수중',v:'4개'},{l:'종료',v:'1개'}]},
    send:{title:'참가자 발송',kpis:[{l:'총 발송',v:'919건'},{l:'성공률',v:'99.0%'},{l:'실패',v:'9건'}]},
    data:{title:'데이터 수집 현황',kpis:[{l:'총 접수',v:'724건'},{l:'체크인',v:'239건'},{l:'미접수',v:'48건'}]},
    settings:{title:'설정',kpis:[]},
  };

  function renderContent(){
    switch(tab){
      case 'home': return <HomePage/>;
      case 'event': return <EventPage setDrawer={setDrawer} setModal={setModal} setToast={setToast}/>;
      case 'send': return <SendPage setDrawer={setDrawer} setModal={setModal} setToast={setToast}/>;
      case 'data': return <DataPage setDrawer={setDrawer}/>;
      case 'settings': return <SettingsPage setToast={setToast}/>;
      default: return <HomePage/>;
    }
  }

  function renderModal(){
    if(!modal)return null;
    const close=()=>setModal(null);
    switch(modal.type){
      case 'createEvent': return <Modal title="이벤트 등록" onClose={close} width={600}>
        <div style={{marginBottom:16}}><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>이벤트명</label><input placeholder="예: 2025 AI 컨퍼런스" style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit'}}/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
          <div><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>날짜</label><input type="date" style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit'}}/></div>
          <div><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>정원</label><input type="number" placeholder="100" style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit'}}/></div>
        </div>
        <div style={{marginBottom:16}}><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>장소</label><input placeholder="예: 코엑스 그랜드볼룸" style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit'}}/></div>
        <div style={{marginBottom:16}}><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>접수 폼 항목</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>{['텍스트','선택','날짜','체크박스'].map(t=><span key={t} style={{padding:'6px 12px',background:'#FFF5F5',borderRadius:20,fontSize:12,border:`1px dashed ${C.border}`,cursor:'grab'}}>{t}</span>)}</div>
        </div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:24}}><Btn onClick={close}>취소</Btn><Btn primary onClick={()=>{close();setToast('이벤트가 등록되었습니다. 단축 URL과 QR코드가 생성됩니다.')}}>등록</Btn></div>
      </Modal>;
      case 'uploadList': return <Modal title="명단 업로드" onClose={close}>
        <div style={{border:`2px dashed ${C.border}`,borderRadius:16,padding:40,textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:40,marginBottom:12}}>📂</div>
          <div style={{fontSize:14,fontWeight:600}}>CSV 또는 엑셀 파일을 드래그하거나 클릭</div>
          <div style={{fontSize:12,color:C.textLight,marginTop:4}}>이름, 연락처, 이메일 컬럼을 자동 인식합니다</div>
        </div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8}}><Btn onClick={close}>취소</Btn><Btn primary onClick={()=>{close();setToast('명단 85건이 업로드되었습니다.')}}>업로드</Btn></div>
      </Modal>;
      case 'newSend': return <Modal title="새 발송" onClose={close} width={600}>
        <div style={{marginBottom:16}}><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>이벤트 선택</label>
          <select style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit'}}>{EVENTS.map(e=><option key={e.id}>{e.name}</option>)}</select></div>
        <div style={{marginBottom:16}}><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>채널</label>
          <div style={{display:'flex',gap:8}}>{['알림톡','SMS'].map(ch=><label key={ch} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 16px',border:`1px solid ${C.border}`,borderRadius:10,cursor:'pointer',fontSize:14}}><input type="radio" name="ch" defaultChecked={ch==='알림톡'}/>{ch}</label>)}</div></div>
        <div style={{marginBottom:16}}><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>발송 문구</label>
          <textarea rows={4} defaultValue={"[FormRelay] {이벤트명} 초대\n\n아래 링크에서 사전 접수를 완료해주세요.\n{접수URL}"} style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit',resize:'vertical'}}/></div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:24}}><Btn onClick={close}>취소</Btn><Btn primary onClick={()=>{close();setToast('342명에게 발송이 시작되었습니다.')}}>발송</Btn></div>
      </Modal>;
      default: return null;
    }
  }

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:24}}>
          <div style={{width:32,height:32,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:14}}>FR</div>
          <span style={{fontWeight:700,fontSize:16}}>FormRelay</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'8px 16px',border:'none',cursor:'pointer',background:tab===t.id?`${C.primary}10`:'transparent',color:tab===t.id?C.primary:C.textLight,fontSize:14,fontWeight:tab===t.id?700:400,borderRadius:8,fontFamily:'inherit',transition:'all 150ms'}}>{t.label}</button>
        ))}
        <div style={{flex:1}}/>
        <div style={{padding:'6px 14px',background:'#FFF5F5',borderRadius:8,fontSize:13,color:C.textLight}}>🔍 검색</div>
        <div style={{position:'relative',cursor:'pointer',marginLeft:8}}><span style={{fontSize:18}}>🔔</span><span style={{position:'absolute',top:-2,right:-2,width:7,height:7,borderRadius:4,background:C.danger}}/></div>
        <div style={{width:32,height:32,borderRadius:8,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700,marginLeft:8}}>관</div>
      </header>

      {heroMeta[tab].kpis.length>0 && (
        <div style={{background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`,padding:'28px 32px',color:'#fff'}}>
          <h1 style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:12}}>{heroMeta[tab].title}</h1>
          <div style={{display:'flex',gap:32}}>
            {heroMeta[tab].kpis.map(k=>(
              <div key={k.l} style={{background:'rgba(255,255,255,0.15)',backdropFilter:'blur(10px)',padding:'10px 20px',borderRadius:12}}>
                <div style={{fontSize:11,opacity:0.8,marginBottom:2}}>{k.l}</div>
                <div style={{fontSize:20,fontWeight:800}}>{k.v}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <main style={{padding:'24px 32px',height:heroMeta[tab].kpis.length>0?'calc(100vh - 56px - 108px)':'calc(100vh - 56px)',overflow:'auto'}}>
        {renderContent()}
      </main>

      {drawer && <Drawer item={drawer.item} type={drawer.type} onClose={()=>setDrawer(null)} setToast={setToast}/>}
      {renderModal()}
      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
