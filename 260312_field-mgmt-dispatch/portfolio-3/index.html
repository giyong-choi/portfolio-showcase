function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Badge({text}){
  const map={'정상':{bg:'#DCFCE7',c:'#15803D'},'주의':{bg:'#FEF3C7',c:'#B45309'},'이상':{bg:'#FEE2E2',c:'#B91C1C'},'진행중':{bg:'#DBEAFE',c:'#1D4ED8'},'발송완료':{bg:'#E0E7FF',c:'#4338CA'},'완료':{bg:'#DCFCE7',c:'#15803D'},'지연':{bg:'#FEE2E2',c:'#B91C1C'},'높음':{bg:'#FEF3C7',c:'#B45309'},'보통':{bg:'#F1F5F9',c:'#475569'},'긴급':{bg:'#FEE2E2',c:'#B91C1C'}};
  const s=map[text]||{bg:'#F1F5F9',c:'#475569'};
  return <span style={{background:s.bg,color:s.c,padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:600}}>{text}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Modal({title,onClose,children,width=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:'#fff',borderRadius:20,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>

          <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>

        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>

/* ─── Detail Pane (bright-workspace pattern) ─── */
function SiteDetail({site}){
  return(
    <div style={{animation:'fadeIn 200ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
        <div><div style={{fontSize:18,fontWeight:700}}>{site.name}</div><div style={{fontSize:13,color:C.textLight,fontFamily:'monospace',marginTop:4}}>{site.code}</div></div>
        <Badge text={site.status}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
        {[['작업자',site.workers+'명'],['응답률',site.rate+'%'],['작업 지시',site.orders+'건'],['완료',site.completed+'건'],['알림',site.alerts+'건'],['최종 갱신',site.lastUpdate]].map(([l,v])=>(
          <div key={l} style={{padding:14,background:'#F0FDF4',borderRadius:12,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:12,color:C.textLight}}>{l}</div>
            <div style={{fontSize:16,fontWeight:700,marginTop:4}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textMuted,marginBottom:10}}>응답률 추이</div>
      <ResponsiveContainer width="100%" height={160}>
        <AreaChart data={ANALYTICS_DATA}><defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.primary} stopOpacity={0.2}/><stop offset="95%" stopColor={C.primary} stopOpacity={0}/></linearGradient></defs>
          <CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/><XAxis dataKey="day" tick={{fontSize:11}} stroke="#9CA3AF"/><YAxis domain={[60,100]} tick={{fontSize:11}} stroke="#9CA3AF"/><Tooltip/>
          <Area type="monotone" dataKey="rate" stroke={C.primary} fill="url(#sg)" strokeWidth={2} name="응답률(%)"/>
        </AreaChart>
      </ResponsiveContainer>
    </div>
  );
}

function OrderDetail({order}){
  const timeline=['작성','발송','수신확인','진행중','완료'];
  const currentStep=order.status==='완료'?4:order.status==='진행중'?3:order.status==='발송완료'?2:order.status==='지연'?3:1;
  return(
    <div style={{animation:'fadeIn 200ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
        <div><div style={{fontSize:18,fontWeight:700}}>{order.title}</div><div style={{fontSize:13,color:C.textLight,marginTop:4}}>{order.site}</div></div>
        <div style={{display:'flex',gap:6}}><Badge text={order.status}/><Badge text={order.priority}/></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
        {[['지시 ID',order.id],['담당자',order.assignee],['생성',order.created],['마감',order.deadline]].map(([l,v])=>(
          <div key={l} style={{padding:14,background:'#F0FDF4',borderRadius:12,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:12,color:C.textLight}}>{l}</div>
            <div style={{fontSize:14,fontWeight:600,marginTop:4}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textMuted,marginBottom:12}}>상태 타임라인</div>
      <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:20}}>
        {timeline.map((step,i)=>(
          <React.Fragment key={step}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <div style={{width:28,height:28,borderRadius:14,background:i<=currentStep?C.primary:'#E5E7EB',color:i<=currentStep?'#fff':C.textMuted,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700}}>{i+1}</div>
              <span style={{fontSize:10,color:i<=currentStep?C.primary:C.textMuted,fontWeight:i<=currentStep?600:400}}>{step}</span>
            </div>
            {i<4 && <div style={{flex:1,height:2,background:i<currentStep?C.primary:'#E5E7EB',borderRadius:1}}/>}
          </React.Fragment>
        ))}
      </div>
      <div style={{padding:14,background:'#F0FDF4',borderRadius:12,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:12,color:C.textLight,marginBottom:6}}>관리자 메모</div>
        <textarea rows={3} placeholder="메모를 입력하세요..." style={{width:'100%',border:'none',background:'transparent',fontSize:14,fontFamily:'inherit',resize:'none',outline:'none'}}/>
      </div>
    </div>
  );
}

function AlertDetail({alert}){
  return(
    <div style={{animation:'fadeIn 200ms ease'}}>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:20}}>
        <div style={{width:10,height:10,borderRadius:5,background:alert.severity==='high'?C.danger:C.warning}}/>
        <span style={{fontSize:18,fontWeight:700}}>{alert.type} 알림</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
        {[['현장',alert.site],['시각',alert.time],['유형',alert.type],['심각도',alert.severity==='high'?'높음':'보통']].map(([l,v])=>(
          <div key={l} style={{padding:14,background:'#F0FDF4',borderRadius:12,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:12,color:C.textLight}}>{l}</div>
            <div style={{fontSize:14,fontWeight:600,marginTop:4}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{padding:16,background:alert.severity==='high'?'#FEF2F2':'#FEF3C7',borderRadius:12,fontSize:14}}>{alert.message}</div>
    </div>
  );
}

  function selectItem(item,type){setSelected(item);setSelType(type)}

  function getListItems(){
    if(section==='dashboard') return SITES;
    if(section==='work-order'){
      if(tab===0) return WORK_ORDERS.filter(o=>o.status==='진행중'||o.status==='발송완료'||o.status==='지연');
      if(tab===1) return WORK_ORDERS.filter(o=>o.status==='완료');
      return WORK_ORDERS;
    }
    if(section==='analytics') return SITES;
    if(section==='alerts'){
      if(tab===0) return ALERTS;
      return ALERTS;
    }
    if(section==='settings') return [];
    return [];
  }

  function renderListItem(item){
    if(section==='dashboard'||section==='analytics'){
      return(
        <div onClick={()=>selectItem(item,'site')} style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',display:'flex',alignItems:'center',gap:12,transition:'all 150ms',background:selected?.id===item.id?`${C.primary}08`:'transparent',borderLeft:selected?.id===item.id?`3px solid ${C.primary}`:'3px solid transparent'}}
          onMouseEnter={e=>{if(selected?.id!==item.id){e.currentTarget.style.background=`${C.primary}04`}}} onMouseLeave={e=>{if(selected?.id!==item.id){e.currentTarget.style.background='transparent'}}}>
          <div style={{width:8,height:8,borderRadius:4,background:item.status==='정상'?C.success:item.status==='주의'?C.warning:C.danger,flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</div>
            <div style={{fontSize:12,color:C.textLight,marginTop:2}}>{item.workers}명 · 응답률 {item.rate}%</div>
          </div>
          {item.alerts>0 && <span style={{background:'#FEE2E2',color:'#B91C1C',padding:'2px 8px',borderRadius:10,fontSize:11,fontWeight:700}}>{item.alerts}</span>}
        </div>
      );
    }
    if(section==='work-order'){
      return(
        <div onClick={()=>selectItem(item,'order')} style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'all 150ms',background:selected?.id===item.id?`${C.primary}08`:'transparent',borderLeft:selected?.id===item.id?`3px solid ${C.primary}`:'3px solid transparent'}}
          onMouseEnter={e=>{if(selected?.id!==item.id){e.currentTarget.style.background=`${C.primary}04`}}} onMouseLeave={e=>{if(selected?.id!==item.id){e.currentTarget.style.background='transparent'}}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>

      );
    }
    if(section==='alerts'){
      return(
        <div onClick={()=>selectItem(item,'alert')} style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',display:'flex',alignItems:'flex-start',gap:10,transition:'all 150ms',background:selected?.id===item.id?`${C.primary}08`:'transparent',borderLeft:selected?.id===item.id?`3px solid ${C.primary}`:'3px solid transparent'}}

          <div style={{flex:1}}>

            <div style={{fontSize:11,color:C.textMuted,marginTop:4}}>{item.time}</div>

        </div>

    }
    return null;
  }

  function renderDetail(){
    if(!selected) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:C.textMuted,fontSize:14}}>좌측 목록에서 항목을 선택하세요</div>;
    if(selType==='site') return <SiteDetail site={selected}/>;
    if(selType==='order') return <OrderDetail order={selected}/>;
    if(selType==='alert') return <AlertDetail alert={selected}/>;
    return null;

          <div style={{background:C.surface,borderRadius:20,padding:24,border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
            <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textMuted,marginBottom:16}}>관리자 계정</div>
            {[['이름','최현장'],['이메일','admin@fieldops.co.kr'],['연락처','010-1234-5678']].map(([l,v])=>(
              <div key={l} style={{marginBottom:14}}><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>{l}</label>
                <input defaultValue={v} style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit',outline:'none'}} onFocus={e=>{e.target.style.borderColor=C.primary}} onBlur={e=>{e.target.style.borderColor=C.border}}/></div>
            ))}
            <button onClick={()=>setToast('저장되었습니다.')} style={{padding:'10px 24px',background:C.primary,color:'#fff',border:'none',borderRadius:10,fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>저장</button>
          </div>
          <div style={{background:C.surface,borderRadius:20,padding:24,border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
            <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textMuted,marginBottom:16}}>권한 관리</div>
            {[['슈퍼관리자','전체 현장 접근 + 설정 변경'],['현장관리자','배정 현장만 접근 + 작업지시 생성'],['조회자','데이터 조회만 가능']].map(([role,desc],i)=>(
              <div key={role} style={{padding:'14px 0',borderBottom:i<2?`1px solid ${C.border}`:'none'}}>
                <div style={{fontSize:14,fontWeight:600}}>{role}</div>
                <div style={{fontSize:12,color:C.textLight,marginTop:2}}>{desc}</div>
              </div>
            ))}
          </div>
        </div>}
        {tab===1 && <div style={{background:C.surface,borderRadius:20,padding:24,border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textMuted,marginBottom:16}}>발송 채널</div>
          {[{name:'카카오 알림톡',st:'연동완료',key:'KAKAO-****-7X2M'},{name:'NCP SMS',st:'연동완료',key:'NCP-****-K9R1'},{name:'이메일 SMTP',st:'미설정',key:'-'}].map((ch,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 0',borderBottom:i<2?`1px solid ${C.border}`:'none'}}>
              <div><div style={{fontSize:14,fontWeight:600}}>{ch.name}</div><div style={{fontSize:12,color:C.textLight,marginTop:2}}>API Key: {ch.key}</div></div>
              <Badge text={ch.st}/>
            </div>
          ))}
        </div>}
        {tab===2 && <div style={{background:C.surface,borderRadius:20,padding:24,border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textMuted,marginBottom:16}}>알림 임계치 설정</div>
          {[['응답률 주의 임계치','80','%'],['응답률 이상 임계치','70','%'],['연속 미응답 감지','3','회'],['작업 지시 마감 알림','30','분 전']].map(([l,v,u])=>(
            <div key={l} style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
              <span style={{fontSize:14,fontWeight:600,flex:1}}>{l}</span>
              <input defaultValue={v} style={{width:80,padding:'8px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:'inherit',textAlign:'right'}}/>
              <span style={{fontSize:13,color:C.textLight,width:30}}>{u}</span>
            </div>
          ))}
          <div style={{marginTop:16}}><button onClick={()=>setToast('임계치가 저장되었습니다.')} style={{padding:'10px 24px',background:C.primary,color:'#fff',border:'none',borderRadius:10,fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>저장</button></div>
        </div>}
      </div>
    );
  }

  const listItems=getListItems();
  const showMasterDetail=section!=='settings';

  return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      {/* Bright sidebar */}
      <nav style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',paddingTop:16,flexShrink:0}}>
        <div style={{padding:'0 16px 16px',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:14}}>FO</div>
          <span style={{fontWeight:700,fontSize:16}}>FieldOps</span>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:2,padding:'0 8px'}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setSection(n.id)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'8px 12px',borderRadius:8,border:'none',cursor:'pointer',background:section===n.id?`${C.primary}10`:'transparent',color:section===n.id?C.primary:C.textLight,fontSize:14,fontWeight:section===n.id?600:400,borderLeft:section===n.id?`3px solid ${C.primary}`:'3px solid transparent',fontFamily:'inherit',transition:'all 150ms',textAlign:'left'}}>
              <span style={{fontSize:18}}>{n.icon}</span>{n.label}
              {n.id==='alerts' && <span style={{marginLeft:'auto',background:'#FEE2E2',color:'#B91C1C',padding:'1px 6px',borderRadius:8,fontSize:10,fontWeight:700}}>5</span>}
            </button>
          ))}
        </div>
      </nav>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* App bar */}
        <header style={{height:40,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 16px',gap:8,background:C.surface,flexShrink:0}}>
          <span style={{fontSize:12,color:C.textMuted}}>FieldOps</span>
          <span style={{fontSize:12,color:C.textMuted}}>/</span>
          <span style={{fontSize:12,fontWeight:600}}>{NAV.find(n=>n.id===section)?.label}</span>
          <div style={{flex:1}}/>
          <div style={{padding:'4px 12px',background:'#F0FDF4',borderRadius:6,fontSize:12,color:C.textLight}}>🔍</div>
          <div style={{width:28,height:28,borderRadius:7,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11,fontWeight:700}}>최</div>
        </header>

        {/* Tab strip */}
        <div style={{height:38,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'flex-end',padding:'0 16px',gap:0,background:C.surface,flexShrink:0}}>
          {(SECTION_TABS[section]||[]).map((t,i)=>(
            <button key={t.id} onClick={()=>{setTab(i);setSelected(null);setSelType(null)}} style={{padding:'8px 14px 6px',border:'none',cursor:'pointer',background:'transparent',fontFamily:'inherit',fontSize:13,color:tab===i?C.primary:C.textLight,fontWeight:tab===i?600:400,borderBottom:tab===i?`2px solid ${C.primary}`:'2px solid transparent',marginBottom:-1,transition:'all 150ms'}}>{t.label}</button>
          ))}
          <div style={{flex:1}}/>
          {section==='work-order' && <button onClick={()=>setModal({type:'createOrder'})} style={{padding:'5px 14px',background:C.primary,color:'#fff',border:'none',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit',marginBottom:4}}>+ 작업 지시</button>}
          {section==='analytics' && <button onClick={()=>setToast('엑셀 보고서 다운로드가 시작됩니다.')} style={{padding:'5px 14px',background:C.primary,color:'#fff',border:'none',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit',marginBottom:4}}>📥 보고서</button>}
        </div>

        {/* Content */}
        {showMasterDetail ? (
          <div style={{flex:1,display:'flex',overflow:'hidden'}}>
            {/* Master */}
            <div style={{width:'42%',borderRight:`1px solid ${C.border}`,overflowY:'auto'}}>
              {listItems.length===0 ? <div style={{padding:20,color:C.textMuted,fontSize:14,textAlign:'center'}}>항목이 없습니다</div> :
                listItems.map((item,i)=><div key={item.id} style={{animation:`slideUp 300ms ease ${i*40}ms both`}}>{renderListItem(item)}</div>)
              }
            </div>
            {/* Detail */}
            <div style={{flex:1,overflowY:'auto',padding:20}}>
              {renderDetail()}
            </div>
          </div>
        ) : renderSettings()}
      </div>

      {/* Modals */}
      {modal?.type==='createOrder' && <Modal title="작업 지시 생성" onClose={()=>setModal(null)} width={600}>
        <div style={{marginBottom:16}}><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>현장 선택</label>
          <select style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit'}}>{SITES.map(s=><option key={s.id}>{s.name}</option>)}</select></div>
        <div style={{marginBottom:16}}><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>제목</label>
          <input placeholder="예: 클린룸 온습도 점검 보고" style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit'}}/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
          <div><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>우선순위</label>
            <select style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit'}}><option>보통</option><option>높음</option><option>긴급</option></select></div>
          <div><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>마감일시</label>
            <input type="datetime-local" style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit'}}/></div>
        </div>
        <div style={{marginBottom:16}}><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>작업자 그룹</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>{['A동 정비팀','B동 생산팀','품질관리팀','안전관리팀'].map(g=><label key={g} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',border:`1px solid ${C.border}`,borderRadius:8,cursor:'pointer',fontSize:13}}><input type="checkbox"/>{g}</label>)}</div></div>
        <div style={{marginBottom:16}}><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textLight}}>발송 채널</label>
          <div style={{display:'flex',gap:8}}>{['알림톡','SMS'].map(ch=><label key={ch} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 14px',border:`1px solid ${C.border}`,borderRadius:8,cursor:'pointer',fontSize:13}}><input type="radio" name="ch" defaultChecked={ch==='알림톡'}/>{ch}</label>)}</div></div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:24}}>
          <button onClick={()=>setModal(null)} style={{padding:'10px 20px',border:`1px solid ${C.border}`,borderRadius:10,background:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>취소</button>
          <button onClick={()=>{setModal(null);setToast('작업 지시가 생성되고 발송되었습니다.')}} style={{padding:'10px 20px',background:C.primary,color:'#fff',border:'none',borderRadius:10,fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>생성 및 발송</button>
        </div>
      </Modal>}

      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
