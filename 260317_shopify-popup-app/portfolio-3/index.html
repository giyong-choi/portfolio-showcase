// Components
function CountUp({end,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(1200/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}
function Badge({label,color}){return <span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:`${color}15`,color}}>{label}</span>}
function Toast({message,onClose}){useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);return<div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>}
function Modal({title,onClose,children,width=560}){
  return(<div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)',animation:'fadeIn 200ms ease'}}/>
    <div style={{position:'relative',width,maxHeight:'85vh',background:'#fff',borderRadius:16,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>

        <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
      </div>
      <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
    </div>
  </div>);
}

        {[{icon:'📅',label:'총 예약',value:totalRes,suffix:'건'},{icon:'✅',label:'체크인',value:totalChk,suffix:'건'},{icon:'💰',label:'총 매출',value:Math.round(totalRev/10000),suffix:'만원'},{icon:'🏪',label:'운영 팝업',value:POPUPS.filter(p=>p.status==='운영중').length,suffix:'개'}].map((k,i)=>(
          <div key={k.label} style={{background:C.surface,borderRadius:20,padding:18,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`,animation:`slideUp 400ms ease ${i*80}ms both`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div><div style={{fontSize:11,color:C.textLight,marginBottom:6}}>{k.label}</div><div style={{fontSize:24,fontWeight:700}}><CountUp end={k.value} suffix={k.suffix}/></div></div>
              <div style={{width:36,height:36,borderRadius:12,background:`${C.primary}10`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{k.icon}</div>
            </div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'3fr 2fr',gap:14,marginBottom:24}}>
        <div style={{background:C.surface,borderRadius:20,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`,animation:'slideUp 400ms ease 320ms both'}}>
          <div style={{fontSize:13,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:C.textLight,marginBottom:16}}>일별 예약·매출 추이</div>
          <ResponsiveContainer width="100%" height={220}>
            <ComposedChart data={DAILY_DATA}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E9D5FF40"/>
              <XAxis dataKey="date" tick={{fontSize:11,fill:C.textLight}} axisLine={false} tickLine={false}/>
              <YAxis yAxisId="left" tick={{fontSize:11,fill:C.textLight}} axisLine={false} tickLine={false}/>
              <YAxis yAxisId="right" orientation="right" tick={{fontSize:11,fill:C.textLight}} axisLine={false} tickLine={false}/>
              <Tooltip contentStyle={{borderRadius:10,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}}/>
              <Bar yAxisId="left" dataKey="예약" fill={`${C.primary}40`} radius={[4,4,0,0]}/>
              <Line yAxisId="right" type="monotone" dataKey="매출" stroke={C.accent} strokeWidth={2} dot={{fill:C.accent,r:3}}/>
            </ComposedChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:20,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`,animation:'slideUp 400ms ease 400ms both'}}>
          <div style={{fontSize:13,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:C.textLight,marginBottom:16}}>채널별 매출</div>
          <ResponsiveContainer width="100%" height={160}>
            <PieChart>
              <Pie data={CHANNEL_DATA} dataKey="value" cx="50%" cy="50%" innerRadius={40} outerRadius={65} paddingAngle={3}>
                <Cell fill={C.primary}/><Cell fill={C.accent}/>
              </Pie>
              <Tooltip formatter={v=>`₩${v.toLocaleString()}`} contentStyle={{borderRadius:10,border:'none'}}/>
            </PieChart>
          </ResponsiveContainer>
          <div style={{display:'flex',justifyContent:'center',gap:20,marginTop:8}}>
            {CHANNEL_DATA.map((d,i)=>(
              <div key={d.name} style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{width:10,height:10,borderRadius:3,background:i===0?C.primary:C.accent}}/>
                <span style={{fontSize:12,color:C.textLight}}>{d.name}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{background:C.surface,borderRadius:20,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`,animation:'slideUp 400ms ease 480ms both'}}>
        <div style={{fontSize:13,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:C.textLight,marginBottom:16}}>팝업별 현황</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12}}>
          {POPUPS.map((p,i)=>(
            <div key={p.name} style={{padding:16,borderRadius:14,border:`1px solid ${C.border}`,background:`${C.primary}03`,transition:'all 200ms',cursor:'default'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{fontSize:14,fontWeight:600}}>{p.name}</span>
                <Badge label={p.status} color={p.status==='운영중'?C.success:C.warning}/>
              </div>
              <div style={{display:'flex',gap:16}}>
                <div><div style={{fontSize:11,color:C.textLight}}>예약</div><div style={{fontSize:16,fontWeight:700}}>{p.reservations}</div></div>
                <div><div style={{fontSize:11,color:C.textLight}}>체크인</div><div style={{fontSize:16,fontWeight:700}}>{p.checkins}</div></div>
                <div><div style={{fontSize:11,color:C.textLight}}>매출</div><div style={{fontSize:16,fontWeight:700}}>₩{(p.revenue/10000).toFixed(0)}만</div></div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// List renderers
function ReservationList({selected,onSelect}){
  return RESERVATIONS.map((r,i)=>(
    <div key={r.id} onClick={()=>onSelect(r)} style={{
      padding:'12px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'all 150ms',
      background:selected?.id===r.id?`${C.primary}08`:'transparent',
      borderLeft:selected?.id===r.id?`3px solid ${C.primary}`:'3px solid transparent',
      animation:`slideUp 200ms ease ${i*40}ms both`,
    }} onMouseEnter={e=>{if(selected?.id!==r.id)e.currentTarget.style.background=`${C.primary}04`}} onMouseLeave={e=>{if(selected?.id!==r.id)e.currentTarget.style.background='transparent'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
        <span style={{fontSize:13,fontWeight:600}}>{r.customer}</span>
        <Badge {...RES_STATUS[r.status]}/>
      </div>
      <div style={{fontSize:12,color:C.textLight}}>{r.popup} · {r.date} {r.time} · {r.people}명</div>
    </div>
  ));
}

function CustomerList({selected,onSelect}){
  return CUSTOMERS.map((c,i)=>(
    <div key={c.id} onClick={()=>onSelect(c)} style={{
      padding:'12px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'all 150ms',
      background:selected?.id===c.id?`${C.primary}08`:'transparent',
      borderLeft:selected?.id===c.id?`3px solid ${C.primary}`:'3px solid transparent',
      animation:`slideUp 200ms ease ${i*40}ms both`,
    }} onMouseEnter={e=>{if(selected?.id!==c.id)e.currentTarget.style.background=`${C.primary}04`}} onMouseLeave={e=>{if(selected?.id!==c.id)e.currentTarget.style.background='transparent'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
        <span style={{fontSize:13,fontWeight:600}}>{c.name}</span>
        <Badge label={c.segment} color={SEG_MAP[c.segment]?.color||C.textLight}/>
      </div>
      <div style={{fontSize:12,color:C.textLight}}>방문 {c.visits}회 · 스탬프 {c.stamps} · ₩{(c.purchases/10000).toFixed(0)}만</div>
    </div>
  ));
}

function SettlementList({selected,onSelect}){
  return SETTLEMENTS.map((s,i)=>(
    <div key={`${s.popup}-${s.channel}`} onClick={()=>onSelect(s)} style={{
      padding:'12px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'all 150ms',
      background:selected&&selected.popup===s.popup&&selected.channel===s.channel?`${C.primary}08`:'transparent',
      borderLeft:selected&&selected.popup===s.popup&&selected.channel===s.channel?`3px solid ${C.primary}`:'3px solid transparent',
      animation:`slideUp 200ms ease ${i*40}ms both`,
    }} onMouseEnter={e=>{if(!(selected&&selected.popup===s.popup&&selected.channel===s.channel))e.currentTarget.style.background=`${C.primary}04`}} onMouseLeave={e=>{if(!(selected&&selected.popup===s.popup&&selected.channel===s.channel))e.currentTarget.style.background='transparent'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
        <span style={{fontSize:13,fontWeight:600}}>{s.popup}</span>
        <span style={{fontSize:12,padding:'2px 8px',borderRadius:12,background:s.channel==='Shopify'?'#EDE9FE':'#F0FDF4',color:s.channel==='Shopify'?C.primary:C.success,fontWeight:500}}>{s.channel}</span>
      </div>
      <div style={{fontSize:12,color:C.textLight}}>주문 {s.orders}건 · 정산 ₩{(s.net/10000).toFixed(0)}만</div>
    </div>
  ));
}

// Skeleton
function SkeletonLoader(){
  return(<div style={{display:'flex',minHeight:'100vh'}}>
    <nav style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`}}/>
    <div style={{flex:1,padding:20}}>{[...Array(4)].map((_,i)=><div key={i} style={{height:80,borderRadius:20,marginBottom:14,background:'linear-gradient(90deg,#F3E8FF 25%,#E9D5FF 50%,#F3E8FF 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}</div>
  </div>);
}

// App
function App(){
  const [loading,setLoading]=useState(true);
  const [section,setSection]=useState('dashboard');
  const [tab,setTab]=useState(0);
  const [selected,setSelected]=useState(null);
  const [toast,setToast]=useState(null);
  const [createModal,setCreateModal]=useState(false);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);
  useEffect(()=>{setSelected(null);setTab(0)},[section]);

  if(loading) return <SkeletonLoader/>;

  const SECTION_TABS = {
    'multi-reservation':[{id:'all',label:'전체'},{id:'confirmed',label:'확정'},{id:'waiting',label:'대기'},{id:'cancelled',label:'취소'}],
    crm:[{id:'all',label:'전체 고객'},{id:'vip',label:'VIP'},{id:'normal',label:'일반'},{id:'potential',label:'잠재'}],
    settlement:[{id:'all',label:'전체'},{id:'자체예약',label:'자체예약'},{id:'Shopify',label:'Shopify'}],
  };

  const breadcrumb = section==='dashboard'?'대시보드':NAV.find(n=>n.id===section)?.label||'';

  return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      {/* Bright Sidebar */}
      <nav style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100vh',flexShrink:0}}>
        <div style={{padding:'18px 18px 14px',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'#fff'}}>🏪</div>
          <span style={{fontWeight:700,fontSize:15,color:C.secondary}}>PopFeed</span>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:2,padding:'0 8px'}}>
          {NAV.map(n=><SideNavItem key={n.id} icon={n.icon} label={n.label} active={section===n.id} onClick={()=>setSection(n.id)}/>)}
        </div>
        <div style={{padding:'12px 14px',borderTop:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:28,height:28,borderRadius:14,background:`${C.primary}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}}>관</div>
          <div><div style={{fontSize:12,fontWeight:500}}>운영 관리자</div><div style={{fontSize:10,color:C.textLight}}>admin@popfeed.kr</div></div>
        </div>
      </nav>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Appbar */}
        <header style={{height:40,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 16px',gap:8,background:C.surface,flexShrink:0}}>
          <span style={{fontSize:12,color:C.textLight}}>PopFeed</span>
          <span style={{fontSize:12,color:C.textLight}}>/</span>
          <span style={{fontSize:12,fontWeight:500}}>{breadcrumb}</span>
          {SECTION_TABS[section]&&tab>0&&<><span style={{fontSize:12,color:C.textLight}}>/</span><span style={{fontSize:12}}>{SECTION_TABS[section][tab]?.label}</span></>}
          <div style={{flex:1}}/>
          <span style={{fontSize:14,cursor:'pointer'}}>🔍</span>
          <div style={{width:24,height:24,borderRadius:12,background:`${C.primary}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11}}>👤</div>
        </header>

        {section==='dashboard'?<DashboardPage/>:(
          <>
            {/* Tab strip */}
            <div style={{height:38,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'flex-end',padding:'0 16px',background:C.surface,flexShrink:0}}>
              {(SECTION_TABS[section]||[]).map((t,i)=><TabUnderline key={t.id} label={t.label} active={tab===i} onClick={()=>{setTab(i);setSelected(null)}}/>)}
              <div style={{flex:1}}/>
              {section==='multi-reservation'&&<button onClick={()=>setCreateModal(true)} style={{padding:'5px 14px',borderRadius:6,background:C.primary,color:'#fff',border:'none',fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:'inherit',marginBottom:4}}>+ 예약 추가</button>}
              {section==='settlement'&&<button onClick={()=>setToast('엑셀 내보내기를 시작합니다.')} style={{padding:'5px 14px',borderRadius:6,border:`1px solid ${C.border}`,background:'#fff',fontSize:12,cursor:'pointer',fontFamily:'inherit',marginBottom:4}}>📥 전체 내보내기</button>}
            </div>

            {/* Master-Detail */}
            <div style={{flex:1,display:'flex',overflow:'hidden'}}>
              <div style={{width:'42%',borderRight:`1px solid ${C.border}`,overflowY:'auto'}}>
                {section==='multi-reservation'&&<ReservationList selected={selected} onSelect={setSelected}/>}
                {section==='crm'&&<CustomerList selected={selected} onSelect={setSelected}/>}
                {section==='settlement'&&<SettlementList selected={selected} onSelect={setSelected}/>}
              </div>
              <div style={{flex:1,overflowY:'auto',padding:20}}>
                <DetailPanel item={selected} section={section} showToast={m=>setToast(m)}/>
              </div>
            </div>
          </>
        )}
      </div>

      {createModal&&<Modal title="새 예약 등록" onClose={()=>setCreateModal(false)}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>고객명</label><input style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit'}} placeholder="고객명"/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>팝업스토어</label><select style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',background:'#fff'}}>{POPUPS.map(p=><option key={p.name}>{p.name}</option>)}</select></div>
            <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>인원</label><input type="number" defaultValue={1} min={1} style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit'}}/></div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>날짜</label><input type="date" style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit'}}/></div>
            <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>시간</label><select style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',background:'#fff'}}><option>10:00</option><option>11:00</option><option>13:00</option><option>14:00</option><option>15:00</option><option>16:00</option></select></div>
          </div>
          <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>세그먼트</label><select style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',background:'#fff'}}><option>VIP</option><option>일반</option><option>잠재</option></select></div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:4}}>
            <button onClick={()=>setCreateModal(false)} style={{padding:'9px 18px',borderRadius:8,border:`1px solid ${C.border}`,background:'#fff',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>취소</button>
            <button onClick={()=>{setCreateModal(false);setToast('예약이 등록되었습니다.')}} style={{padding:'9px 18px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>등록</button>
          </div>
        </div>
      </Modal>}
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
