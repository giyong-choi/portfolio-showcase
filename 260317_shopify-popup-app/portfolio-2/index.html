// Components
function CountUp({end,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(1200/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Badge({label,color}){
  return <span style={{padding:'4px 12px',borderRadius:20,fontSize:11,fontWeight:600,background:`${color}15`,color}}>{label}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Modal({title,onClose,children,width=560}){

          <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

}

            onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.10)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <div>
                <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>{mc.title}</div>
                <div style={{fontSize:13,color:C.textLight}}>{mc.instructor} · 다음 수업: {mc.nextDate}</div>
              </div>
              <Badge label={mc.type} color={C.primary}/>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{flex:1,height:8,background:'#E2E8F0',borderRadius:4,overflow:'hidden'}}>
                <div style={{height:'100%',background:C.gradient,width:`${mc.progress}%`,borderRadius:4,transformOrigin:'left',animation:'barGrow 800ms ease both'}}/>
              </div>
              <span style={{fontSize:13,fontWeight:600,color:C.primary}}>{mc.attended}/{mc.total}회</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// Attendance Page

          </div>
          <div style={{marginTop:20}}>

      <div style={{background:C.surface,borderRadius:16,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',overflow:'hidden'}}>

          <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 14px',borderRadius:20,background:`${C.success}10`,fontSize:12,color:C.success}}>

        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{borderBottom:`2px solid ${C.border}`}}>

            </tr>
          </thead>
          <tbody>
            {ATTENDANCE_LOG.map((a,i)=>(
              <tr key={a.id} style={{borderBottom:`1px solid ${C.border}`,transition:'background 150ms',animation:`slideUp 300ms ease ${i*60}ms both`}}
                onMouseEnter={e=>e.currentTarget.style.background=`${C.primary}06`} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'14px 20px',fontSize:14,fontWeight:500}}>{a.name}</td>
                <td style={{padding:'14px 20px',fontSize:13}}>{a.class}</td>
                <td style={{padding:'14px 20px',fontSize:13}}>{a.time}</td>
                <td style={{padding:'14px 20px'}}><span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:a.method==='QR'?`${C.primary}10`:'#F1F5F9',color:a.method==='QR'?C.primary:C.textLight}}>{a.method}</span></td>
                <td style={{padding:'14px 20px'}}><Badge label={a.status==='present'?'출석':a.status==='late'?'지각':'결석'} color={a.status==='present'?C.success:a.status==='late'?C.warning:C.danger}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>

// Community Page
function CommunityPage({showToast}){
  const [postCat,setPostCat]=useState('전체');
  const [writeModal,setWriteModal]=useState(false);
  const filtered=postCat==='전체'?POSTS:POSTS.filter(p=>p.category===postCat);
  const [selectedPost,setSelectedPost]=useState(null);
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}>
        <div style={{display:'flex',gap:8}}>
          {['전체','후기','질문','공지'].map(c=>(
            <button key={c} onClick={()=>setPostCat(c)} style={{padding:'8px 18px',borderRadius:24,border:postCat===c?'none':`1px solid ${C.border}`,background:postCat===c?C.primary:'#fff',color:postCat===c?'#fff':C.text,fontSize:13,fontWeight:500,cursor:'pointer',transition:'all 200ms',fontFamily:'inherit'}}>{c}</button>
          ))}
        </div>
        <button onClick={()=>setWriteModal(true)} style={{padding:'8px 20px',borderRadius:12,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>✍️ 글쓰기</button>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {filtered.map((p,i)=>(
          <div key={p.id} onClick={()=>setSelectedPost(p)} style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*60}ms both`}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.01)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.15)'}}
            onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.10)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  <Badge label={p.category} color={p.category==='공지'?C.danger:p.category==='후기'?C.primary:C.warning}/>
                  {p.image&&<span style={{fontSize:12,color:C.textLight}}>📷</span>}
                </div>
                <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>{p.title}</div>
                <div style={{fontSize:12,color:C.textLight}}>{p.author} · {p.date}</div>
              </div>
              <div style={{display:'flex',gap:16,alignItems:'center',marginLeft:16}}>
                <span style={{fontSize:13,color:C.textLight}}>❤️ {p.likes}</span>
                <span style={{fontSize:13,color:C.textLight}}>💬 {p.comments}</span>
              </div>
            </div>
          </div>
        ))}
      </div>

      {selectedPost&&(
        <>
          <div onClick={()=>setSelectedPost(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:200,animation:'fadeIn 200ms ease'}}/>
          <div style={{position:'fixed',top:0,right:0,bottom:0,width:520,background:C.surface,boxShadow:'-8px 0 40px rgba(0,0,0,0.15)',zIndex:201,overflowY:'auto',animation:'slideDrawer 200ms ease',display:'flex',flexDirection:'column'}}>
            <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
              <Badge label={selectedPost.category} color={selectedPost.category==='공지'?C.danger:selectedPost.category==='후기'?C.primary:C.warning}/>
              <button onClick={()=>setSelectedPost(null)} style={{background:'none',border:'none',fontSize:20,cursor:'pointer'}}>✕</button>
            </div>
            <div style={{padding:24,flex:1}}>
              <h2 style={{fontSize:20,fontWeight:700,marginBottom:12}}>{selectedPost.title}</h2>
              <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:20}}>
                <div style={{width:32,height:32,borderRadius:16,background:`${C.primary}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>{selectedPost.author[0]}</div>
                <div><div style={{fontSize:13,fontWeight:500}}>{selectedPost.author}</div><div style={{fontSize:11,color:C.textLight}}>{selectedPost.date}</div></div>
              </div>
              {selectedPost.image&&<div style={{height:200,background:`linear-gradient(135deg,${C.primary}10,${C.accent}15)`,borderRadius:12,marginBottom:16,display:'flex',alignItems:'center',justifyContent:'center',fontSize:48}}>📷</div>}
              <p style={{fontSize:14,lineHeight:1.8,color:C.text,marginBottom:20}}>
                {selectedPost.category==='후기'?'수업이 정말 알차고 강사님도 친절하셔서 매주 가는 게 즐거워요. 같이 듣는 수강생분들도 좋고 분위기가 너무 좋습니다. 다음 기수도 꼭 등록할 생각이에요!':'이 부분에 대해 궁금한 점이 있어서 여쭤봅니다. 혹시 경험 있으신 분들 답변 부탁드려요.'}
              </p>
              <div style={{display:'flex',gap:16,marginBottom:24}}>
                <span style={{fontSize:14,color:C.textLight,cursor:'pointer'}}>❤️ {selectedPost.likes}</span>
                <span style={{fontSize:14,color:C.textLight}}>💬 {selectedPost.comments}</span>
              </div>
              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16}}>
                <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>댓글 {selectedPost.comments}개</div>
                {[{name:'이지은',text:'저도 동감이에요! 정말 좋은 수업이죠 👍',time:'2시간 전'},{name:'강민재',text:'다음 기수 같이 들어요!',time:'1시간 전'}].map((c,i)=>(
                  <div key={i} style={{padding:'12px 0',borderBottom:`1px solid ${C.border}`}}>
                    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
                      <div style={{width:24,height:24,borderRadius:12,background:`${C.primary}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11}}>{c.name[0]}</div>
                      <span style={{fontSize:13,fontWeight:500}}>{c.name}</span>
                      <span style={{fontSize:11,color:C.textLight}}>{c.time}</span>
                    </div>
                    <div style={{fontSize:13,marginLeft:32}}>{c.text}</div>
                  </div>
                ))}
                <div style={{display:'flex',gap:8,marginTop:12}}>
                  <input placeholder="댓글을 입력하세요..." style={{flex:1,padding:'10px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit'}}/>
                  <button onClick={()=>showToast('댓글이 등록되었습니다.')} style={{padding:'10px 16px',borderRadius:10,background:C.primary,color:'#fff',border:'none',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>등록</button>
                </div>
              </div>
            </div>
          </div>
        </>
      )}

      {writeModal&&<Modal title="글쓰기" onClose={()=>setWriteModal(false)} width={600}>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div><label style={{fontSize:13,fontWeight:500,display:'block',marginBottom:6}}>카테고리</label>
            <div style={{display:'flex',gap:8}}>{['후기','질문','자유'].map(c=><button key={c} style={{padding:'8px 16px',borderRadius:20,border:`1px solid ${C.border}`,background:'#fff',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>{c}</button>)}</div>
          </div>
          <div><label style={{fontSize:13,fontWeight:500,display:'block',marginBottom:6}}>제목</label><input style={{width:'100%',padding:'10px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit'}} placeholder="제목을 입력하세요"/></div>
          <div><label style={{fontSize:13,fontWeight:500,display:'block',marginBottom:6}}>내용</label><textarea rows={6} style={{width:'100%',padding:'10px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',resize:'vertical'}} placeholder="내용을 입력하세요"/></div>
          <div><label style={{fontSize:13,fontWeight:500,display:'block',marginBottom:6}}>이미지 첨부</label>
            <div style={{padding:24,border:`2px dashed ${C.border}`,borderRadius:10,textAlign:'center',color:C.textLight,fontSize:13,cursor:'pointer'}}>클릭하여 이미지를 선택하세요 (최대 5장)</div>
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
            <button onClick={()=>setWriteModal(false)} style={{padding:'10px 20px',borderRadius:10,border:`1px solid ${C.border}`,background:'#fff',fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>취소</button>
            <button onClick={()=>{setWriteModal(false);showToast('게시글이 등록되었습니다.')}} style={{padding:'10px 20px',borderRadius:10,background:C.primary,color:'#fff',border:'none',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>등록</button>
          </div>
        </div>
      </Modal>}
    </div>
  );
}

// Skeleton
function SkeletonLoader(){
  return(
    <div style={{padding:32}}>
      <div style={{height:140,borderRadius:0,background:'linear-gradient(90deg,#D1FAE5 25%,#A7F3D0 50%,#D1FAE5 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite',marginBottom:24}}/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {[...Array(6)].map((_,i)=><div key={i} style={{height:200,borderRadius:16,background:'linear-gradient(90deg,#D1FAE5 25%,#A7F3D0 50%,#D1FAE5 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}
      </div>
    </div>
  );
}

// App
function App(){
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('home');
  const [drawer,setDrawer]=useState(null);
  const [toast,setToast]=useState(null);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  if(loading) return <SkeletonLoader/>;

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* Top Nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 28px',gap:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:32}}>
          <div style={{width:32,height:32,borderRadius:10,background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'#fff'}}>🎓</div>
          <span style={{fontWeight:700,fontSize:16,color:C.secondary}}>CultureLink</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} title={t.label} style={{
            padding:'16px 20px',border:'none',cursor:'pointer',background:'transparent',fontFamily:'inherit',
            fontSize:14,fontWeight:tab===t.id?700:400,color:tab===t.id?C.primary:C.textLight,
            borderBottom:tab===t.id?`3px solid ${C.primary}`:'3px solid transparent',transition:'all 200ms',
          }}>{t.label}</button>
        ))}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <span style={{fontSize:18,cursor:'pointer'}}>🔍</span>
          <div style={{position:'relative',cursor:'pointer'}}><span style={{fontSize:18}}>🔔</span><span style={{position:'absolute',top:-4,right:-4,width:14,height:14,borderRadius:7,background:C.danger,color:'#fff',fontSize:9,display:'flex',alignItems:'center',justifyContent:'center'}}>2</span></div>
          <div style={{width:32,height:32,borderRadius:16,background:`${C.primary}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>👤</div>
        </div>
      </header>

      {/* Hero */}
      <HeroBanner tab={tab}/>

      {/* Content */}
      <main style={{padding:'24px 32px',maxWidth:1200,margin:'0 auto'}}>
        {tab==='home'&&<HomePage setDrawer={setDrawer}/>}
        {tab==='my-classes'&&<MyClassesPage setDrawerItem={setDrawer}/>}
        {tab==='attendance'&&<AttendancePage showToast={m=>setToast(m)}/>}
        {tab==='community'&&<CommunityPage showToast={m=>setToast(m)}/>}
      </main>

      <Drawer item={drawer} onClose={()=>setDrawer(null)} showToast={m=>setToast(m)}/>
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
