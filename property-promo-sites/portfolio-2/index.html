/* ─── 유틸 ─── */
function CountUp({end,duration=1200,suffix=''}){
  const [v,setV]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setV(end);clearInterval(t)}else setV(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{v.toLocaleString()}{suffix}</span>;
}

function Badge({text,colors}){
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:colors.bg,color:colors.color}}>{text}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primary,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(139,105,20,.3)',fontSize:14}}>{message}</div>;
}

function FormField({label,children}){

          {item.type==='시즌 프로모션'?'여름 성수기를 앞두고 얼리버드 예약 고객에게 객실 요금 30% 할인 혜택을 제공합니다. 디럭스 트윈 기준 1박 196,000원부터 투숙이 가능하며, 인피니티 풀 무료 이용권이 포함됩니다.'
          :item.type==='이벤트'?'허니문 패키지는 마운틴뷰 스위트 2박 + 시그니처 레스토랑 디너 코스 2인 세트로 구성됩니다. 객실에는 와인 1병과 꽃 장식이 제공되며, 스파 30% 할인 쿠폰이 포함됩니다.'
          :'라비에르 리조트가 2025년 5월 공식 오픈하였습니다. 총 64실 규모의 프리미엄 리조트로, 인피니티 풀, 스파 & 웰니스, 시그니처 레스토랑 등 차별화된 부대시설을 갖추고 있습니다.'}
        </div>
      </FormField>
      <FormField label="썸네일 이미지">
        <div style={{height:80,border:`2px dashed ${C.border}`,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:C.textLight,fontSize:13}}
          onClick={()=>setToast('이미지가 업로드되었습니다.')}>
          📤 클릭하여 업로드
        </div>
      </FormField>

      <div style={{display:'flex',gap:10,marginTop:12}}>
        <button onClick={onClose} style={{flex:1,padding:'11px',borderRadius:12,border:`1px solid ${C.border}`,background:'#fff',cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>닫기</button>
        <button onClick={()=>{setToast('프로모션이 업데이트되었습니다.');onClose()}} style={{flex:1,padding:'11px',borderRadius:12,border:'none',background:C.primary,color:'#fff',cursor:'pointer',fontSize:13,fontFamily:'inherit',fontWeight:600}}>저장</button>
      </div>
    </Drawer>
  );
}

function PromoCreateDrawer({onClose,setToast}){
  return(
    <Drawer title="프로모션 등록" onClose={onClose}>
      <FormField label="제목"><input style={inp} placeholder="프로모션 제목"/></FormField>
      <FormField label="유형">
        <select style={inp}><option>시즌 프로모션</option><option>이벤트</option><option>공지사항</option></select>
      </FormField>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <FormField label="게시 시작일"><input type="date" style={inp}/></FormField>
        <FormField label="게시 종료일"><input type="date" style={inp}/></FormField>
      </div>
      <FormField label="본문">
        <textarea rows={5} style={{...inp,resize:'vertical'}} placeholder="프로모션 내용을 입력하세요..."/>
      </FormField>
      <FormField label="썸네일 이미지">
        <div style={{height:80,border:`2px dashed ${C.border}`,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:C.textLight,fontSize:13}}>📤 클릭하여 업로드</div>
      </FormField>
      <div style={{display:'flex',gap:10,marginTop:8}}>
        <button onClick={onClose} style={{flex:1,padding:'11px',borderRadius:12,border:`1px solid ${C.border}`,background:'#fff',cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>취소</button>
        <button onClick={()=>{setToast('프로모션이 등록되었습니다.');onClose()}} style={{flex:1,padding:'11px',borderRadius:12,border:'none',background:C.primary,color:'#fff',cursor:'pointer',fontSize:13,fontFamily:'inherit',fontWeight:600}}>등록</button>
      </div>
    </Drawer>
  );
}

/* ─── 방문 분석 ─── */
function AnalyticsPage(){
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1.5fr 1fr',gap:16,marginBottom:20}}>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,.1)',animation:'slideUp 400ms ease both'}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>월간 방문 추이</h3>
          <ResponsiveContainer width="100%" height={240}>
            <LineChart data={VISIT_DATA}>
              <CartesianGrid strokeDasharray="3 3" stroke="#F0EBE4"/>
              <XAxis dataKey="month" tick={{fontSize:12,fill:C.textLight}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fontSize:12,fill:C.textLight}} axisLine={false} tickLine={false}/>
              <Tooltip contentStyle={{borderRadius:12,border:'none',boxShadow:'0 4px 16px rgba(0,0,0,.1)',fontSize:13}}/>
              <Legend wrapperStyle={{fontSize:12}}/>
              <Line type="monotone" dataKey="page" name="페이지뷰" stroke={C.primary} strokeWidth={2.5} dot={{r:4}}/>
              <Line type="monotone" dataKey="unique" name="고유 방문자" stroke={C.accent} strokeWidth={2.5} dot={{r:4}}/>
            </LineChart>
          </ResponsiveContainer>
        </div>

        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,.1)',animation:'slideUp 400ms ease 80ms both'}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>유입 경로 분석</h3>
          <ResponsiveContainer width="100%" height={240}>
            <PieChart><Pie data={[{name:'네이버 검색',value:38},{name:'구글 검색',value:22},{name:'SNS',value:18},{name:'직접 유입',value:14},{name:'광고',value:8}]} cx="50%" cy="50%" innerRadius={50} outerRadius={80} dataKey="value" paddingAngle={2}>
              {[0,1,2,3,4].map(i=><Cell key={i} fill={PIE_COLORS[i]}/>)}
            </Pie><Tooltip contentStyle={{borderRadius:12,border:'none',boxShadow:'0 4px 16px rgba(0,0,0,.1)',fontSize:13}}/></PieChart>
          </ResponsiveContainer>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:4}}>
            {['네이버 검색','구글 검색','SNS','직접 유입','광고'].map((n,i)=><span key={i} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:C.textSec}}><span style={{width:7,height:7,borderRadius:2,background:PIE_COLORS[i]}}/>{n}</span>)}
          </div>
        </div>
      </div>

      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,.1)',animation:'slideUp 400ms ease 160ms both'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>인기 페이지 순위</h3>
        {PAGE_VIEWS.map((p,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:16,padding:'12px 0',borderBottom:i<PAGE_VIEWS.length-1?`1px solid ${C.border}`:'none'}}>
            <div style={{width:28,height:28,borderRadius:8,background:`${C.primary}10`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:C.primary}}>{i+1}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{p.page}</div>
              <div style={{height:6,borderRadius:3,background:'#F0EBE4',overflow:'hidden'}}>
                <div style={{height:'100%',borderRadius:3,background:`linear-gradient(90deg,${C.primary},${C.accent})`,width:`${p.pct}%`,transition:'width 800ms ease'}}/>
              </div>
            </div>
            <div style={{fontSize:14,fontWeight:600,color:C.primary,minWidth:60,textAlign:'right'}}>{p.views.toLocaleString()}</div>
            <div style={{fontSize:12,color:C.textLight,minWidth:36}}>{p.pct}%</div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
