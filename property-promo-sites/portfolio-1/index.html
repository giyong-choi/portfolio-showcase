/* ─── 유틸 컴포넌트 ─── */
function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,.2)',fontSize:14}}>{message}</div>;
}

/* ─── 문의 관리 ─── */
function InquiryPage({setModal,setToast}){
  const [filter,setFilter]=useState({status:'전체',type:'전체',search:''});
  const [currentPage,setCurrentPage]=useState(1);
  const perPage=8;

  const filtered=useMemo(()=>{
    return INQUIRIES.filter(q=>{
      if(filter.status!=='전체'&&q.status!==filter.status)return false;
      if(filter.type!=='전체'&&q.type!==filter.type)return false;
      if(filter.search&&!q.name.includes(filter.search)&&!q.phone.includes(filter.search))return false;
      return true;

  return(

          <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:14,color:C.textLight}}>{IC.search}</span>
        </div>
        <select value={filter.status} onChange={e=>setFilter({...filter,status:e.target.value})} style={{padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:'inherit'}}>
          <option>전체</option><option>신규</option><option>확인</option><option>상담</option><option>완료</option>
        </select>
        <select value={filter.type} onChange={e=>setFilter({...filter,type:e.target.value})} style={{padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:'inherit'}}>

      <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,.08)',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#F8FAFC'}}>
              {['고객명','연락처','관심 평형','지역','유입 경로','상태','접수일',''].map(h=>(
                <th key={h} style={{padding:'12px 14px',fontSize:12,fontWeight:600,color:C.textSec,textAlign:'left',borderBottom:`1px solid ${C.border}`}}>{h}</th>
