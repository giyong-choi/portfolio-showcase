/* ─── 유틸 ─── */
function CountUp({end,duration=1200,suffix=''}){
  const [v,setV]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setV(end);clearInterval(t)}else setV(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{v.toLocaleString()}{suffix}</span>;
}
function Badge({text,colors}){return <span style={{display:'inline-block',padding:'2px 8px',borderRadius:6,fontSize:11,fontWeight:600,background:colors?.bg||'#F3F4F6',color:colors?.color||'#374151'}}>{text}</span>}
function Toast({message,onClose}){useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(0,0,0,.2)',fontSize:14}}>{message}</div>}
function FormField({label,children}){return <div style={{marginBottom:14}}><label style={{display:'block',fontSize:12,fontWeight:700,color:C.textSec,marginBottom:5,textTransform:'uppercase',letterSpacing:'.06em'}}>{label}</label>{children}</div>}

          <div key={i} style={{padding:12,background:'#F8FAFC',borderRadius:10,border:`1px solid ${C.border}`}}>

/* ─── 마케팅 통계 ─── */
function MarketingPage({tab,selected,setSelected}){
  if(tab===0) return <MarketingChannel selected={selected} setSelected={setSelected}/>;
  if(tab===1) return <MarketingCost/>;
  return <MarketingCompare/>;
}

function MarketingChannel({selected,setSelected}){
  const ch = selected?CHANNEL_PERF.find((_,i)=>i+1===selected):null;

  const master=(
    <div>
      <div style={{padding:'14px 16px',borderBottom:`1px solid ${C.border}`,background:'#F8FAFC'}}>
        <span style={{fontSize:11,fontWeight:700,color:C.textSec,textTransform:'uppercase',letterSpacing:'.06em'}}>마케팅 채널 ({CHANNEL_PERF.length})</span>
      </div>
      {CHANNEL_PERF.map((c,i)=>(
        <ListItem key={i} active={selected===i+1} onClick={()=>setSelected(i+1)}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:13,fontWeight:600}}>{c.channel}</div>
              <div style={{fontSize:11,color:C.textSec}}>문의 {c.inquiries}건 · 전환률 {c.conversion}%</div>
            </div>
            <div style={{fontSize:13,fontWeight:700,color:C.accent}}>₩{c.cpi}</div>
          </div>
        </ListItem>
      ))}
    </div>
  );

  const detail = ch ? (
    <div>
      <h3 style={{fontSize:18,fontWeight:700,marginBottom:16}}>{ch.channel}</h3>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,marginBottom:20}}>
        {[{l:'문의 건수',v:`${ch.inquiries}건`},{l:'투입 비용',v:`₩${ch.cost}`},{l:'건당 비용(CPI)',v:`₩${ch.cpi}`},{l:'전환률',v:`${ch.conversion}%`}].map((f,i)=>(
          <div key={i} style={{padding:14,background:'#F8FAFC',borderRadius:12,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:10,color:C.textLight,marginBottom:3}}>{f.l}</div>
            <div style={{fontSize:16,fontWeight:700}}>{f.v}</div>
          </div>
        ))}
      </div>
      <div style={{background:'#F8FAFC',borderRadius:12,border:`1px solid ${C.border}`,padding:16}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>현장별 채널 성과</div>
        {SITES.filter(s=>s.status!=='완료').map((s,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<1?`1px solid ${C.border}`:'none'}}>
            <span style={{fontSize:12,width:120}}>{s.name}</span>
            <div style={{flex:1,height:6,borderRadius:3,background:'#E2E8F0',overflow:'hidden'}}>
              <div style={{height:'100%',borderRadius:3,background:C.accent,width:`${30+Math.random()*50}%`}}/>
            </div>
            <span style={{fontSize:12,fontWeight:600,color:C.textSec}}>{Math.floor(ch.inquiries*(0.3+i*0.2))}건</span>
          </div>
        ))}
      </div>
    </div>
  ) : <EmptyDetail/>;

  return <MasterDetail master={master} detail={detail}/>;
}

function MarketingCost(){
  return(
    <div style={{padding:20}}>
      <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,padding:20,marginBottom:16}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>채널별 비용 대비 효율</h3>
        <ResponsiveContainer width="100%" height={260}>
          <BarChart data={CHANNEL_PERF} layout="vertical">
            <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" horizontal={false}/>
            <XAxis type="number" tick={{fontSize:11,fill:C.textLight}} axisLine={false} tickLine={false}/>
            <YAxis dataKey="channel" type="category" width={90} tick={{fontSize:11,fill:C.textSec}} axisLine={false} tickLine={false}/>
            <Tooltip contentStyle={{borderRadius:8,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,.1)',fontSize:12}}/>
            <Legend wrapperStyle={{fontSize:11}}/>
            <Bar dataKey="inquiries" name="문의 건수" fill={C.primary} radius={[0,4,4,0]} barSize={14}/>
            <Bar dataKey="conversion" name="전환률(%)" fill={C.accent} radius={[0,4,4,0]} barSize={14}/>
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'#F8FAFC'}}>
            {['채널','문의 건수','투입 비용','건당 비용','전환률'].map(h=><th key={h} style={{padding:'10px 14px',fontSize:11,fontWeight:600,color:C.textSec,textAlign:'left',borderBottom:`1px solid ${C.border}`}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {CHANNEL_PERF.map((c,i)=>(
              <tr key={i} style={{borderBottom:`1px solid ${C.border}`,transition:'background 150ms'}}
                onMouseEnter={e=>{e.currentTarget.style.background='#F8FAFC';e.currentTarget.style.borderLeft=`2px solid ${C.accent}`}}
                onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderLeft='none'}}
              >
                <td style={{padding:'10px 14px',fontSize:13,fontWeight:600}}>{c.channel}</td>
                <td style={{padding:'10px 14px',fontSize:13}}>{c.inquiries}건</td>
                <td style={{padding:'10px 14px',fontSize:13,color:C.textSec}}>₩{c.cost}</td>
                <td style={{padding:'10px 14px',fontSize:13,fontWeight:600,color:C.accent}}>₩{c.cpi}</td>
                <td style={{padding:'10px 14px',fontSize:13}}>{c.conversion}%</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function MarketingCompare(){
  return(
    <div style={{padding:20}}>
      <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,padding:20}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>현장 간 채널 성과 비교</h3>
        <ResponsiveContainer width="100%" height={300}>
          <RadarChart data={RADAR_DATA}>
            <PolarGrid stroke="#E2E8F0"/>
            <PolarAngleAxis dataKey="subject" tick={{fontSize:11,fill:C.textSec}}/>
            <PolarRadiusAxis tick={{fontSize:10,fill:C.textLight}} domain={[0,100]}/>
            <Radar name="파크뷰" dataKey="파크뷰" stroke={C.primary} fill={C.primary} fillOpacity={.15} strokeWidth={2}/>
            <Radar name="리버사이드" dataKey="리버사이드" stroke={C.accent} fill={C.accent} fillOpacity={.15} strokeWidth={2}/>
            <Radar name="센트럴파크" dataKey="센트럴파크" stroke={C.success} fill={C.success} fillOpacity={.15} strokeWidth={2}/>
            <Legend wrapperStyle={{fontSize:12}}/>
            <Tooltip contentStyle={{borderRadius:8,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,.1)',fontSize:12}}/>
          </RadarChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

/* ─── 시스템 설정 ─── */
function SettingsPage({tab,setToast}){
  if(tab===0) return(
    <div style={{padding:20,maxWidth:500}}>
      <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>계정 관리</h3>
      <FormField label="이름"><input defaultValue="관리자" style={inp}/></FormField>
      <FormField label="이메일"><input defaultValue="admin@propmaster.kr" style={inp}/></FormField>
      <FormField label="연락처"><input defaultValue="02-1234-5678" style={inp}/></FormField>
      <FormField label="비밀번호"><input type="password" placeholder="새 비밀번호" style={inp}/></FormField>
      <button onClick={()=>setToast('계정 정보가 저장되었습니다.')} style={{padding:'9px 18px',borderRadius:10,border:'none',background:C.accent,color:'#fff',cursor:'pointer',fontSize:13,fontFamily:'inherit',fontWeight:600}}>저장</button>
    </div>
  );
  if(tab===1) return(
    <div style={{padding:20}}>
      <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>현장 권한 설정</h3>
      <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'#F8FAFC'}}>
            {['현장명','접근 권한','문의 관리','콘텐츠 편집','통계 조회'].map(h=><th key={h} style={{padding:'10px 14px',fontSize:11,fontWeight:600,color:C.textSec,textAlign:'left',borderBottom:`1px solid ${C.border}`}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {SITES.map((s,i)=>(
              <tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>
                <td style={{padding:'10px 14px',fontSize:13,fontWeight:600}}>{s.name}</td>
                {['전체','읽기/쓰기','읽기/쓰기','읽기'].map((v,j)=>(
                  <td key={j} style={{padding:'10px 14px',fontSize:12,color:C.textSec}}>{v}</td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
  return(
    <div style={{padding:20,maxWidth:500}}>
      <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>알림 채널 설정</h3>
      {[{l:'신규 문의 알림',d:'새 문의 접수 시 푸시',on:true},{l:'일일 요약 리포트',d:'매일 오전 9시 발송',on:false},{l:'주간 마케팅 리포트',d:'매주 월요일 발송',on:true},{l:'현장 상태 변경',d:'분양 상태 변경 시 알림',on:true}].map((n,i)=>(
        <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 0',borderBottom:i<3?`1px solid ${C.border}`:'none'}}>
          <div><div style={{fontSize:14,fontWeight:600}}>{n.l}</div><div style={{fontSize:12,color:C.textSec,marginTop:2}}>{n.d}</div></div>
          <div onClick={()=>setToast('알림 설정이 변경되었습니다.')} style={{width:38,height:20,borderRadius:10,background:n.on?C.success:'#D1D5DB',position:'relative',cursor:'pointer'}}>
            <div style={{width:16,height:16,borderRadius:'50%',background:'#fff',position:'absolute',top:2,left:n.on?20:2,boxShadow:'0 1px 2px rgba(0,0,0,.2)',transition:'left 200ms'}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
