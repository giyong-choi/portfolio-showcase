// ===== Components =====
function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);return()=>clearInterval(t);},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Badge({text}){
  const colors={승인:{bg:'#ECFDF5',fg:'#059669'},거절:{bg:'#FEF2F2',fg:'#EF4444'},활성:{bg:'#ECFDF5',fg:'#059669'},일시정지:{bg:'#FEF3C7',fg:'#D97706'},심사중:{bg:'#EFF6FF',fg:'#3B82F6'},정산완료:{bg:'#ECFDF5',fg:'#059669'},정산예정:{bg:'#FEF3C7',fg:'#D97706'}};
  const c=colors[text]||{bg:'#F1F5F9',fg:'#64748B'};
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:c.bg,color:c.fg,border:`1px solid ${c.fg}20`}}>{text}</span>;
}

            <div style={{marginTop:8,height:6,background:`${C.primary}10`,borderRadius:3}}>
              <div style={{height:'100%',borderRadius:3,background:`linear-gradient(90deg,${C.primary},${C.accent})`,width:`${(m.sales/1230)*100}%`,animation:`barGrow 800ms ease ${i*100}ms both`}}/>
            </div>
          </div>
        ))}

        <div style={{padding:16}}>
          <div style={{fontSize:13,fontWeight:700,color:C.textLight,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12}}>업종별 분포</div>
          <ResponsiveContainer width="100%" height={180}>
            <PieChart>
              <Pie data={[{name:'음식점',value:42,color:C.primary},{name:'편의점',value:25,color:C.accent},{name:'카페',value:18,color:'#C4B5FD'},{name:'기타',value:15,color:'#E9D5FF'}]} cx="50%" cy="50%" innerRadius={40} outerRadius={65} paddingAngle={3} dataKey="value">
                {[C.primary,C.accent,'#C4B5FD','#E9D5FF'].map((c,i)=><Cell key={i} fill={c}/>)}
              </Pie>
              <Legend formatter={v=><span style={{fontSize:11}}>{v}</span>}/>
            </PieChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:20}}>
        <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:16}}>주간 매출·거래건수 추이</div>
        <div style={{background:C.surface,borderRadius:20,border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',padding:20,marginBottom:20}}>
          <ResponsiveContainer width="100%" height={240}>
            <ComposedChart data={weeklyRevenue}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/>
              <XAxis dataKey="day" tick={{fontSize:12,fill:C.textLight}}/>
              <YAxis yAxisId="left" tick={{fontSize:12,fill:C.textLight}} tickFormatter={v=>`${v/100}만`}/>
              <YAxis yAxisId="right" orientation="right" tick={{fontSize:12,fill:C.textLight}}/>
              <Tooltip/>
              <Bar yAxisId="left" dataKey="매출" fill={C.primary} radius={[4,4,0,0]} barSize={24}/>
              <Line yAxisId="right" type="monotone" dataKey="건수" stroke={C.accent} strokeWidth={2} dot={{fill:C.accent}}/>
            </ComposedChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:20,border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',padding:20}}>
          <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:12}}>시간대별 결제 히트맵</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(13,1fr)',gap:4}}>
            {hourlyData.map((h,i)=>(
              <div key={i} style={{textAlign:'center'}}>
                <div style={{width:'100%',aspectRatio:'1',borderRadius:6,background:`rgba(124,58,237,${Math.min(h.v/80,1)})`,marginBottom:4}}/>
                <span style={{fontSize:10,color:C.textLight}}>{h.h}</span>
              </div>
            ))}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginTop:12,justifyContent:'flex-end'}}>
            <span style={{fontSize:11,color:C.textLight}}>적음</span>
            {[0.1,0.3,0.5,0.7,0.9].map(o=><div key={o} style={{width:16,height:16,borderRadius:4,background:`rgba(124,58,237,${o})`}}/>)}
            <span style={{fontSize:11,color:C.textLight}}>많음</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function SettlementContent({selected,setSelected}){
  return(
    <div style={{flex:1,display:'flex',overflow:'hidden',animation:'fadeIn 300ms ease'}}>
      <div style={{width:'42%',borderRight:`1px solid ${C.border}`,overflowY:'auto'}}>
        <div style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,background:'#FAFAFA'}}>
          <div style={{fontSize:13,fontWeight:700,color:C.textLight,textTransform:'uppercase',letterSpacing:'0.06em'}}>정산 내역</div>
        </div>
        {SETTLEMENTS.map((s,i)=>(
          <div key={s.id} onClick={()=>setSelected(s)} style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'all 150ms',background:selected?.id===s.id?`${C.primary}08`:'transparent',borderLeft:selected?.id===s.id?`3px solid ${C.primary}`:'3px solid transparent',animation:`slideUp 300ms ease ${i*50}ms both`}}
            onMouseEnter={e=>{if(selected?.id!==s.id)e.currentTarget.style.background=`${C.primary}04`;}}
            onMouseLeave={e=>{if(selected?.id!==s.id)e.currentTarget.style.background='transparent';}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:14,fontWeight:600}}>{s.merchant}</span>
              <Badge text={s.status}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.textLight}}>
              <span>{s.period}</span>
              <span style={{fontWeight:600,color:C.success}}>₩{(s.net/10000).toFixed(0)}만</span>
            </div>
          </div>
        ))}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:20}}>
        {selected ? (
          <div style={{animation:'slideInRight 250ms ease'}}>
            <h3 style={{fontSize:20,fontWeight:700,marginBottom:4}}>{selected.merchant}</h3>
            <p style={{fontSize:13,color:C.textLight,marginBottom:20}}>{selected.period} · {selected.id}</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:20}}>
              <div style={{padding:16,background:`${C.primary}06`,borderRadius:20,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:11,color:C.textLight,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em'}}>총 매출</div>
                <div style={{fontSize:20,fontWeight:700,color:C.text,marginTop:4}}>₩{selected.gross.toLocaleString()}</div>
              </div>
              <div style={{padding:16,background:'#FEF2F208',borderRadius:20,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:11,color:C.textLight,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em'}}>수수료</div>
                <div style={{fontSize:20,fontWeight:700,color:C.danger,marginTop:4}}>-₩{selected.fee.toLocaleString()}</div>
              </div>
              <div style={{padding:16,background:'#ECFDF508',borderRadius:20,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:11,color:C.textLight,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em'}}>정산액</div>
                <div style={{fontSize:20,fontWeight:700,color:C.success,marginTop:4}}>₩{selected.net.toLocaleString()}</div>
              </div>
            </div>
            <div style={{background:C.surface,borderRadius:20,border:`1px solid ${C.border}`,padding:20,marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:C.textLight,marginBottom:8}}>정산 상세</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div><span style={{fontSize:12,color:C.textLight}}>정산 상태</span><div style={{marginTop:4}}><Badge text={selected.status}/></div></div>
                <div><span style={{fontSize:12,color:C.textLight}}>정산 예정일</span><div style={{fontSize:14,fontWeight:600,marginTop:4}}>{selected.date}</div></div>
              </div>
            </div>
            <div><div style={{fontSize:13,fontWeight:600,marginBottom:8}}>메모</div>
            <textarea style={{width:'100%',padding:12,border:`1px solid ${C.border}`,borderRadius:8,minHeight:60,fontFamily:'inherit',fontSize:14,resize:'vertical'}} placeholder="정산 메모..."/></div>
          </div>
        ) : (
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:C.textLight}}>
            <div style={{textAlign:'center'}}>
              <span style={{fontSize:48}}>📑</span>
              <p style={{marginTop:12,fontSize:14}}>좌측에서 정산 건을 선택하세요</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function MerchantSettingsContent({selected,setSelected,setToast}){
  return(
    <div style={{flex:1,display:'flex',overflow:'hidden',animation:'fadeIn 300ms ease'}}>
      <div style={{width:'42%',borderRight:`1px solid ${C.border}`,overflowY:'auto'}}>
        <div style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,background:'#FAFAFA',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:13,fontWeight:700,color:C.textLight}}>가맹점 목록</span>
        </div>
        {MERCHANTS.map((m,i)=>(
          <div key={m.id} onClick={()=>setSelected(m)} style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'all 150ms',background:selected?.id===m.id?`${C.primary}08`:'transparent',borderLeft:selected?.id===m.id?`3px solid ${C.primary}`:'3px solid transparent',animation:`slideUp 300ms ease ${i*50}ms both`}}
            onMouseEnter={e=>{if(selected?.id!==m.id)e.currentTarget.style.background=`${C.primary}04`;}}
            onMouseLeave={e=>{if(selected?.id!==m.id)e.currentTarget.style.background='transparent';}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:14,fontWeight:600}}>{m.name}</span>
              <Badge text={m.status}/>

            <div style={{fontSize:12,color:C.textLight}}>{m.category} · {m.region} · {m.fee}</div>

      </div>
      <div style={{flex:1,overflowY:'auto',padding:20}}>
        {selected ? (
          <div style={{animation:'slideInRight 250ms ease'}}>
            <h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>가맹점 설정 — {selected.name}</h3>
            {[{l:'가맹점명',v:selected.name},{l:'업종',v:selected.category},{l:'대표자',v:selected.owner},{l:'지역',v:selected.region},{l:'수수료율',v:selected.fee},{l:'가입일',v:selected.joinDate}].map(f=>(
              <div key={f.l} style={{marginBottom:14}}>
                <label style={{display:'block',fontSize:12,fontWeight:600,color:C.textLight,marginBottom:4,textTransform:'uppercase',letterSpacing:'0.06em'}}>{f.l}</label>
                <input defaultValue={f.v} style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:'inherit',outline:'none'}}/>
              </div>
            ))}
            <div style={{display:'flex',gap:12,marginTop:20}}>
              <button onClick={()=>setToast('설정이 저장되었습니다')} style={{padding:'10px 24px',background:C.primary,color:'#fff',border:'none',borderRadius:8,fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>저장</button>
              <button style={{padding:'10px 24px',border:`1px solid ${C.border}`,borderRadius:8,background:'#fff',fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>취소</button>
            </div>
          </div>
        ) : (
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:C.textLight}}>
            <div style={{textAlign:'center'}}>
              <span style={{fontSize:48}}>⚙️</span>
              <p style={{marginTop:12,fontSize:14}}>좌측에서 가맹점을 선택하세요</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ===== Main =====
function App(){
  const [loading,setLoading]=useState(true);
  const [section,setSection]=useState('dashboard');
  const [tab,setTab]=useState(0);
  const [selected,setSelected]=useState(null);
  const [toast,setToast]=useState(null);

  useEffect(()=>{setTimeout(()=>setLoading(false),1500);},[]);
  useEffect(()=>{setSelected(null);setTab(0);},[section]);

  if(loading) return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <div style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`}}/>
      <div style={{flex:1,padding:20}}>
        {[...Array(4)].map((_,i)=><div key={i} style={{height:100,borderRadius:20,background:'linear-gradient(90deg,#FAF5FF 25%,#EDE9FE 50%,#FAF5FF 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite',marginBottom:16}}/>)}
      </div>
    </div>
  );

  const NAV=[
    {id:'dashboard',icon:'📊',label:'통합 결제 현황'},
    {id:'payment-simulation',icon:'💳',label:'QR 결제 시뮬레이션'},
    {id:'merchant-analytics',icon:'📈',label:'가맹점 매출 분석'},
    {id:'settlement-management',icon:'📑',label:'정산 관리'},
    {id:'merchant-settings',icon:'⚙️',label:'가맹점 설정'},
  ];

  const SECTION_TABS = {
    dashboard:[{id:'overview',label:'실시간 현황'},{id:'daily',label:'일별 통계'}],
    'payment-simulation':[{id:'live',label:'실시간 피드'},{id:'history',label:'결제 이력'}],
    'merchant-analytics':[{id:'ranking',label:'매출 랭킹'},{id:'trend',label:'추이 분석'}],
    'settlement-management':[{id:'pending',label:'정산 예정'},{id:'completed',label:'완료'}],
    'merchant-settings':[{id:'info',label:'기본 정보'},{id:'qr',label:'QR 설정'}],
  };

  function renderContent(){
    switch(section){
      case 'dashboard': return <DashboardContent selected={selected} setSelected={setSelected}/>;
      case 'payment-simulation': return <PaymentSimContent selected={selected} setSelected={setSelected}/>;
      case 'merchant-analytics': return <AnalyticsContent selected={selected} setSelected={setSelected}/>;
      case 'settlement-management': return <SettlementContent selected={selected} setSelected={setSelected}/>;
      case 'merchant-settings': return <MerchantSettingsContent selected={selected} setSelected={setSelected} setToast={setToast}/>;
      default: return <DashboardContent selected={selected} setSelected={setSelected}/>;
    }
  }

  return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      {/* Bright Sidebar */}
      <nav style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',paddingTop:16,flexShrink:0,position:'sticky',top:0,height:'100vh'}}>
        <div style={{padding:'0 16px 16px',display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={{fontSize:16,color:'#fff'}}>💎</span>
          </div>
          <span style={{fontWeight:700,fontSize:16}}>QR Platform</span>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:2,padding:'0 8px'}}>
          {NAV.map(n=><SideNavItem key={n.id} icon={n.icon} label={n.label} active={section===n.id} onClick={()=>setSection(n.id)}/>)}
        </div>
        <div style={{padding:'12px 16px',borderTop:`1px solid ${C.border}`}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:C.primary,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700}}>본</div>
            <div><div style={{fontSize:13,fontWeight:600}}>본사 관리자</div><div style={{fontSize:11,color:C.textLight}}>HQ Admin</div></div>
          </div>
        </div>
      </nav>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Appbar */}
        <header style={{height:40,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 16px',gap:8,background:C.surface,flexShrink:0}}>
          <span style={{fontSize:12,color:C.textLight}}>QR Platform</span>
          <span style={{fontSize:12,color:C.textLight}}>›</span>
          <span style={{fontSize:12,fontWeight:600,color:C.text}}>{NAV.find(n=>n.id===section)?.label}</span>
          <div style={{flex:1}}/>
          <input placeholder="검색..." style={{padding:'4px 12px',border:`1px solid ${C.border}`,borderRadius:6,fontSize:12,width:180,fontFamily:'inherit',outline:'none'}}/>
          <div style={{width:28,height:28,borderRadius:'50%',background:C.primary,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>관</div>
        </header>

        {/* Tab Strip */}
        <div style={{height:38,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'flex-end',padding:'0 16px',gap:0,background:C.surface,flexShrink:0}}>
          {(SECTION_TABS[section]||[]).map((t,i)=><TabUnderline key={t.id} label={t.label} active={tab===i} onClick={()=>setTab(i)}/>)}
        </div>

        {/* Workspace */}
        {renderContent()}
      </div>

      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
