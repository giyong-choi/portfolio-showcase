@keyframes fadeIn{from{opacity:0}to{opacity:1}}

@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px}}

  {id:'CH-002',date:'2025.03.14 14:20',card:'**** 7823',amount:30000,method:'자동충전',location:'-',user:'이지은'},

// ===== Components =====
function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);return()=>clearInterval(t);},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Badge({text}){
  const colors={활성:{bg:'#ECFDF5',fg:'#059669'},잔액부족:{bg:'#FEF3C7',fg:'#D97706'},분실신고:{bg:'#FEF2F2',fg:'#EF4444'},승차:{bg:'#EFF6FF',fg:'#0066CC'},환승:{bg:'#F0FDF4',fg:'#059669'},성인:{bg:'#F1F5F9',fg:'#475569'},학생:{bg:'#FFFBEB',fg:'#D97706'}};
  const c=colors[text]||{bg:'#F1F5F9',fg:'#64748B'};
  return <span style={{display:'inline-block',padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.fg}}>{text}</span>;
}

function Drawer({item,onClose,children}){
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:200,animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:480,background:C.surface,boxShadow:'-8px 0 40px rgba(0,0,0,0.15)',zIndex:201,overflowY:'auto',padding:28,animation:'slideInRight 200ms ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
          <h3 style={{fontSize:18,fontWeight:700}}>상세 정보</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        {children}
      </div>
    </>
  );
}

function Modal({title,onClose,children,width=520}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:'#fff',borderRadius:16,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>

// ===== Pages =====

          <div style={{fontSize:16,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:16,fontSize:13,color:C.textLight}}>주간 이용 트렌드</div>

        <div style={{background:C.surface,borderRadius:16,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',padding:20}}>
          <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:16,color:C.textLight}}>노선별 이용</div>
          <ResponsiveContainer width="100%" height={240}>
            <PieChart>

function QRChargePage({setToast}){
  const [step,setStep]=useState(0);

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>

          <h3 style={{fontSize:16,fontWeight:700,marginBottom:20}}>🔋 QR 충전</h3>
          {step===0 && (
            <div>
              <p style={{fontSize:14,color:C.textLight,marginBottom:16}}>충전할 금액을 선택하세요</p>
              <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10}}>
                {amounts.map(a=>(
                  <button key={a} onClick={()=>{setChargeAmount(a);setStep(1);}} style={{padding:'16px',border:`2px solid ${C.border}`,borderRadius:12,background:'#fff',fontSize:16,fontWeight:700,cursor:'pointer',transition:'all 200ms',fontFamily:'inherit'}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=C.primary;e.currentTarget.style.background=`${C.primary}08`;}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background='#fff';}}>
                    ₩{a.toLocaleString()}
                  </button>
                ))}
              </div>
            </div>
          )}
          {step===1 && (
            <div style={{textAlign:'center',animation:'fadeInScale 400ms ease'}}>
              <div style={{fontSize:14,color:C.textLight,marginBottom:8}}>충전 금액</div>
              <div style={{fontSize:28,fontWeight:800,color:C.primary,marginBottom:20}}>₩{chargeAmount?.toLocaleString()}</div>
              <div style={{width:180,height:180,margin:'0 auto 20px',background:'#fff',border:`2px solid ${C.border}`,borderRadius:12,display:'grid',gridTemplateColumns:'repeat(7,1fr)',gridTemplateRows:'repeat(7,1fr)',gap:2,padding:12}}>
                {[...Array(49)].map((_,i)=><div key={i} style={{background:Math.random()>0.45?C.secondary:'transparent',borderRadius:1}}/>)}
              </div>
              <p style={{fontSize:13,color:C.textLight,marginBottom:4}}>편의점 또는 충전기에서</p>
              <p style={{fontSize:13,color:C.textLight,marginBottom:16}}>이 QR을 스캔하세요</p>
              <div style={{fontSize:12,color:C.warning,marginBottom:16}}>⏱ 유효시간: 4분 52초</div>
              <div style={{display:'flex',gap:10,justifyContent:'center'}}>
                <button onClick={()=>setStep(0)} style={{padding:'10px 24px',border:`1px solid ${C.border}`,borderRadius:8,background:'#fff',fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>취소</button>

              </div>
            </div>
          )}
          {step===2 && (
            <div style={{textAlign:'center',padding:'40px 0',animation:'fadeIn 300ms ease'}}>
              <div style={{width:60,height:60,borderRadius:'50%',background:'#ECFDF5',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
                <span style={{fontSize:30}}>✓</span>
              </div>
              <h3 style={{fontSize:20,fontWeight:700,color:C.success}}>충전 처리 중...</h3>
              <p style={{fontSize:14,color:C.textLight,marginTop:8}}>잠시만 기다려주세요</p>
            </div>
          )}
        </div>

        <div style={{background:C.surface,borderRadius:16,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',padding:24}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:20}}>📋 최근 충전 내역</h3>

                <span style={{fontSize:15,fontWeight:700,color:C.success}}>+₩{ch.amount.toLocaleString()}</span>

                <span style={{fontSize:12,color:C.textLight}}>{ch.date}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

            onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.10)';}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:20}}>🚇</span>
              <Badge text={u.type}/>
            </div>
            <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>{u.route}</div>
            <div style={{fontSize:13,color:C.textLight,marginBottom:8}}>{u.from} → {u.to}</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

          </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:24}}>
        {stats.map((s,i)=>(
          <div key={s.label} style={{background:C.surface,borderRadius:16,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',padding:20,animation:`slideUp 400ms ease ${i*80}ms both`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:13,color:C.textLight,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>{s.label}</span>
              <span style={{fontSize:20}}>{s.icon}</span>
            </div>
            <div style={{fontSize:24,fontWeight:800,color:C.primary}}>{s.value}</div>
            {s.change && <div style={{fontSize:12,color:C.success,marginTop:4}}>{s.change}</div>}
          </div>
        ))}
      </div>

      <div style={{background:C.surface,borderRadius:16,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',padding:20,marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',color:C.textLight,marginBottom:16}}>시간대별 이용 현황</div>
        <ResponsiveContainer width="100%" height={240}>
          <BarChart data={[{h:'06',v:12},{h:'07',v:45},{h:'08',v:78},{h:'09',v:56},{h:'10',v:23},{h:'11',v:18},{h:'12',v:34},{h:'13',v:28},{h:'14',v:22},{h:'15',v:19},{h:'16',v:25},{h:'17',v:52},{h:'18',v:67},{h:'19',v:42},{h:'20',v:28},{h:'21',v:15}]}>
            <CartesianGrid strokeDasharray="3 3" stroke="#D1FAE5"/>
            <XAxis dataKey="h" tick={{fontSize:11,fill:C.textLight}} tickFormatter={v=>`${v}시`}/>
            <YAxis tick={{fontSize:11,fill:C.textLight}}/>
            <Tooltip formatter={v=>[`${v}건`,'이용건수']}/>
            <Bar dataKey="v" fill={C.primary} radius={[4,4,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </div>

      <div style={{background:C.surface,borderRadius:16,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',padding:20}}>
        <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',color:C.textLight,marginBottom:16}}>카드 현황</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
          {CARDS.map((card,i)=>(
            <div key={card.id} onClick={()=>setDrawerItem({type:'card',data:card})} style={{padding:16,border:`1px solid ${C.border}`,borderRadius:12,cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}}
              onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,0.08)';}}
              onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='';}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <span style={{fontWeight:600,fontSize:14}}>{card.name}</span>
                <Badge text={card.status}/>
              </div>
              <div style={{fontSize:12,color:C.textLight}}>{card.cardNo}</div>
              <div style={{fontSize:16,fontWeight:700,color:C.primary,marginTop:4}}>₩{card.balance.toLocaleString()}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function CardManagementPage({setDrawerItem,setToast}){
  const [showCreate,setShowCreate]=useState(false);
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontSize:14,color:C.textLight}}>총 <strong style={{color:C.text}}>{CARDS.length}장</strong> 등록</div>
        <button onClick={()=>setShowCreate(true)} style={{padding:'10px 20px',background:C.primary,color:'#fff',border:'none',borderRadius:20,fontSize:14,fontWeight:600,cursor:'pointer'}}>+ 카드 등록</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {CARDS.map((card,i)=>(
          <div key={card.id} onClick={()=>setDrawerItem({type:'card',data:card})} style={{background:C.surface,borderRadius:16,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',padding:20,cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.15)';}}
            onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.10)';}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
              <div>
                <div style={{fontSize:15,fontWeight:700}}>{card.name}</div>
                <div style={{fontSize:12,color:C.textLight}}>{card.cardNo}</div>
              </div>
              <Badge text={card.status}/>
            </div>
            <div style={{fontSize:20,fontWeight:800,color:C.primary,marginBottom:8}}>₩{card.balance.toLocaleString()}</div>
            <div style={{fontSize:12,color:C.textLight}}>이번 달: ₩{card.usageThisMonth.toLocaleString()}</div>
            <div style={{fontSize:11,color:C.textLight,marginTop:4}}>마지막 이용: {card.lastUsed}</div>
          </div>
        ))}
      </div>
      {showCreate && (
        <Modal title="카드 등록" onClose={()=>setShowCreate(false)}>
          <div style={{marginBottom:16}}>
            <label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6}}>소유자명</label>
            <input style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:'inherit'}} placeholder="이름 입력"/>
          </div>
          <div style={{marginBottom:16}}>
            <label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6}}>카드 유형</label>
            <select style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:'inherit',background:'#fff'}}>
              <option>성인</option><option>학생</option><option>어린이</option>
            </select>
          </div>
          <div style={{marginBottom:16}}>
            <label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6}}>초기 충전액</label>
            <input type="number" style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:'inherit'}} placeholder="0"/>
          </div>
          <div style={{display:'flex',gap:12,justifyContent:'flex-end',marginTop:24}}>
            <button onClick={()=>setShowCreate(false)} style={{padding:'10px 24px',border:`1px solid ${C.border}`,borderRadius:8,background:'#fff',fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>취소</button>
            <button onClick={()=>{setShowCreate(false);setToast('카드가 등록되었습니다');}} style={{padding:'10px 24px',background:C.primary,color:'#fff',border:'none',borderRadius:8,fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>등록</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ===== Drawer Contents =====
function CardDrawer({data}){
  return(
    <div>
      <div style={{padding:20,background:`${C.primary}08`,borderRadius:12,marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
          <span style={{fontSize:18,fontWeight:700}}>{data.name}</span>
          <Badge text={data.status}/>
        </div>
        <div style={{fontSize:13,color:C.textLight,marginBottom:4}}>{data.cardNo} · <Badge text={data.type}/></div>
        <div style={{fontSize:28,fontWeight:800,color:C.primary,marginTop:8}}>₩{data.balance.toLocaleString()}</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
        <div style={{padding:12,background:'#F8FAFC',borderRadius:8}}>
          <div style={{fontSize:11,color:C.textLight}}>이번 달 이용</div>
          <div style={{fontSize:16,fontWeight:700}}>₩{data.usageThisMonth.toLocaleString()}</div>
        </div>
        <div style={{padding:12,background:'#F8FAFC',borderRadius:8}}>
          <div style={{fontSize:11,color:C.textLight}}>마지막 이용</div>
          <div style={{fontSize:13,fontWeight:600}}>{data.lastUsed}</div>
        </div>
      </div>
      <div><label style={{fontSize:13,fontWeight:600}}>관리자 메모</label>
      <textarea style={{width:'100%',marginTop:6,padding:12,border:`1px solid ${C.border}`,borderRadius:8,minHeight:80,fontFamily:'inherit',fontSize:14,resize:'vertical'}} placeholder="메모..."/></div>
    </div>
  );
}

function UsageDrawer({data}){
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div><div style={{fontSize:11,color:C.textLight}}>이용 ID</div><div style={{fontWeight:600}}>{data.id}</div></div>
        <div><div style={{fontSize:11,color:C.textLight}}>일시</div><div>{data.date}</div></div>
        <div><div style={{fontSize:11,color:C.textLight}}>노선</div><div style={{fontWeight:600}}>{data.route}</div></div>
        <div><div style={{fontSize:11,color:C.textLight}}>유형</div><Badge text={data.type}/></div>
        <div><div style={{fontSize:11,color:C.textLight}}>출발</div><div>{data.from}</div></div>
        <div><div style={{fontSize:11,color:C.textLight}}>도착</div><div>{data.to}</div></div>
        <div><div style={{fontSize:11,color:C.textLight}}>금액</div><div style={{fontSize:18,fontWeight:700,color:C.primary}}>₩{data.amount.toLocaleString()}</div></div>
        <div><div style={{fontSize:11,color:C.textLight}}>카드</div><div>{data.card}</div></div>
      </div>
      <div style={{marginTop:16}}><label style={{fontSize:13,fontWeight:600}}>메모</label>
      <textarea style={{width:'100%',marginTop:6,padding:12,border:`1px solid ${C.border}`,borderRadius:8,minHeight:80,fontFamily:'inherit',fontSize:14,resize:'vertical'}} placeholder="메모..."/></div>
    </div>
  );
}

// ===== Main =====
function App(){
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('home');
  const [drawerItem,setDrawerItem]=useState(null);
  const [toast,setToast]=useState(null);

  useEffect(()=>{setTimeout(()=>setLoading(false),1500);},[]);

  if(loading) return(
    <div style={{padding:24}}>
      <div style={{height:56,background:'#fff',borderBottom:`1px solid ${C.border}`,marginBottom:16}}/>
      {[...Array(3)].map((_,i)=><div key={i} style={{height:140,borderRadius:16,background:'linear-gradient(90deg,#ECFDF5 25%,#D1FAE5 50%,#ECFDF5 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite',marginBottom:16}}/>)}
    </div>
  );

  const TABS=[
    {id:'home',label:'충전 현황 홈',icon:'🏠'},
    {id:'qr-charge',label:'QR 충전',icon:'🔋'},
    {id:'usage-history',label:'이용 내역',icon:'📋'},
    {id:'operations-management',label:'운영 관리',icon:'📊'},
    {id:'card-management',label:'카드 관리',icon:'💳'},
  ];

  const PAGE_META = {
    home:{title:'충전 현황 홈',kpis:[{label:'총 잔액',value:'₩183,600'},{label:'활성 카드',value:'4장'},{label:'이번 주',value:'48건'}]},
    'qr-charge':{title:'QR 충전',kpis:[{label:'오늘 충전',value:'₩80,000'},{label:'QR 충전',value:'2건'},{label:'자동충전',value:'1건'}]},
    'usage-history':{title:'이용 내역',kpis:[{label:'총 이용',value:'8건'},{label:'승차',value:'6건'},{label:'환승',value:'2건'}]},
    'operations-management':{title:'운영 관리',kpis:[{label:'일일 충전',value:'₩200K'},{label:'일일 이용',value:'12건'},{label:'등록 카드',value:'6장'}]},
    'card-management':{title:'카드 관리',kpis:[{label:'활성',value:'4장'},{label:'잔액부족',value:'1장'},{label:'분실',value:'1장'}]},
  };
  const meta = PAGE_META[tab];

  function renderContent(){
    switch(tab){
      case 'home': return <HomePage setDrawerItem={setDrawerItem}/>;
      case 'qr-charge': return <QRChargePage setToast={setToast}/>;
      case 'usage-history': return <UsageHistoryPage setDrawerItem={setDrawerItem}/>;
      case 'operations-management': return <OperationsPage setDrawerItem={setDrawerItem}/>;
      case 'card-management': return <CardManagementPage setDrawerItem={setDrawerItem} setToast={setToast}/>;
      default: return <HomePage setDrawerItem={setDrawerItem}/>;
    }
  }

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* TopNav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:20}}>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={{fontSize:16,color:'#fff'}}>🚇</span>
          </div>
          <span style={{fontSize:16,fontWeight:700,color:C.text}}>T-Card</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'8px 16px',borderRadius:8,border:'none',background:tab===t.id?`${C.primary}12`:'transparent',color:tab===t.id?C.primary:C.textLight,fontSize:13,fontWeight:tab===t.id?700:500,cursor:'pointer',transition:'all 200ms',fontFamily:'inherit',display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:14}}>{t.icon}</span>{t.label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:18,cursor:'pointer'}}>🔍</span>
          <span style={{fontSize:18,cursor:'pointer',position:'relative'}}>🔔<div style={{position:'absolute',top:-2,right:-2,width:7,height:7,borderRadius:'50%',background:C.danger}}/></span>
          <div style={{width:32,height:32,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:12,fontWeight:700}}>관</div>
        </div>
      </header>

      {/* Hero Banner */}
      <div style={{background:`linear-gradient(135deg,${C.primary},${C.accent})`,padding:'28px 32px',color:'#fff'}}>
        <h1 style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em'}}>{meta.title}</h1>
        <div style={{display:'flex',gap:32,marginTop:12}}>
          {meta.kpis.map(k=>(
            <div key={k.label}>
              <div style={{fontSize:12,opacity:0.8}}>{k.label}</div>
              <div style={{fontSize:20,fontWeight:700}}>{k.value}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Content */}
      <main style={{padding:'24px 32px'}}>
        {renderContent()}
      </main>

      {/* Drawer */}
      {drawerItem && (
        <Drawer onClose={()=>setDrawerItem(null)}>
          {drawerItem.type==='card' && <CardDrawer data={drawerItem.data}/>}
          {drawerItem.type==='usage' && <UsageDrawer data={drawerItem.data}/>}
        </Drawer>
      )}

      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
