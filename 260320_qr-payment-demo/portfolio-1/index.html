// ===== Components =====
function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Modal({title,onClose,children,width=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:'#fff',borderRadius:12,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:'1px solid #E2E8F0'}}>
          <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function Badge({text,color}){
  const colors={완료:{bg:'#ECFDF5',fg:'#059669'},취소:{bg:'#FEF2F2',fg:'#EF4444'},활성:{bg:'#ECFDF5',fg:'#059669'},일시정지:{bg:'#FEF3C7',fg:'#D97706'},정지:{bg:'#FEF2F2',fg:'#EF4444'},결제:{bg:'#EFF6FF',fg:'#0066CC'},충전:{bg:'#F0FDF4',fg:'#059669'}};
  const c=colors[text]||{bg:'#F1F5F9',fg:'#64748B'};
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:12,fontSize:12,fontWeight:600,background:c.bg,color:c.fg}}>{text}</span>;
}

function InputField({label,value,onChange,type='text',placeholder=''}){
  return(

}

function SelectField({label,value,onChange,options}){

                <td style={{padding:'14px 16px',fontSize:13,color:C.textLight}}>{tx.date}</td>

function App(){
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState('dashboard');
  const [toast,setToast]=useState(null);
  const [modal,setModal]=useState(null);

  useEffect(()=>{setTimeout(()=>setLoading(false),1500);},[]);

  if(loading) return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <div style={{width:260,background:C.sidebarBg,flexShrink:0}}/>
      <div style={{flex:1,padding:24}}>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {[...Array(4)].map((_,i)=><div key={i} style={{height:120,borderRadius:12,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}
        </div>
      </div>
    </div>
  );

  const PAGES = {dashboard:'대시보드 홈','qr-payment':'QR 결제','transaction-history':'거래 내역','merchant-management':'가맹점 관리','user-management':'사용자 관리'};
  const NAV = [
    {id:'dashboard',icon:'📊',label:'대시보드 홈'},
    {id:'qr-payment',icon:'💳',label:'QR 결제'},
    {id:'transaction-history',icon:'📋',label:'거래 내역'},
    {id:'merchant-management',icon:'🏪',label:'가맹점 관리'},
    {id:'user-management',icon:'👥',label:'사용자 관리'},
  ];

  function renderPage(){
    switch(page){
      case 'dashboard': return <DashboardPage/>;
      case 'qr-payment': return <QRPaymentPage/>;
      case 'transaction-history': return <TransactionPage onDetail={item=>setModal({type:'tx',item})}/>;
      case 'merchant-management': return <MerchantPage onDetail={item=>setModal({type:'merchant',item})} setToast={setToast}/>;
      case 'user-management': return <UserPage onDetail={item=>setModal({type:'user',item})} setToast={setToast}/>;
      default: return <DashboardPage/>;
    }
  }

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      {/* Sidebar */}
      <aside style={{width:260,background:C.sidebarBg,flexShrink:0,display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100vh'}}>
        <div style={{padding:'20px 24px',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={{fontSize:20,color:'#fff'}}>💳</span>
          </div>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:'#fff'}}>QR 결제 데모</div>
            <div style={{fontSize:11,color:C.sidebarText}}>맞춤 구현 데모</div>
          </div>
        </div>
        <div style={{flex:1,padding:'8px 12px',display:'flex',flexDirection:'column',gap:2}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'12px 16px',borderRadius:8,border:'none',cursor:'pointer',background:page===n.id?`${C.sidebarActive}18`:'transparent',color:page===n.id?C.sidebarActive:C.sidebarText,fontSize:14,fontWeight:page===n.id?600:400,transition:'all 150ms',fontFamily:'inherit',textAlign:'left'}}>
              <span style={{fontSize:18}}>{n.icon}</span>
              {n.label}
            </button>
          ))}
        </div>
        <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.08)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14,fontWeight:700}}>관</div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#fff'}}>관리자</div>
              <div style={{fontSize:11,color:C.sidebarText}}>admin@qrpay.com</div>
            </div>
          </div>
        </div>
      </aside>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column'}}>
        <header style={{height:60,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',flexShrink:0}}>
          <h1 style={{fontSize:20,fontWeight:700,color:C.text}}>{PAGES[page]}</h1>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <div style={{position:'relative'}}>
              <input placeholder="검색..." style={{padding:'8px 16px 8px 36px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,width:220,fontFamily:'inherit',outline:'none'}}/>
              <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:14}}>🔍</span>
            </div>
            <div style={{width:36,height:36,borderRadius:'50%',background:`${C.primary}10`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative'}}>
              <span style={{fontSize:18}}>🔔</span>
              <div style={{position:'absolute',top:2,right:2,width:8,height:8,borderRadius:'50%',background:C.danger}}/>
            </div>
          </div>
        </header>

        <main style={{flex:1,overflow:'auto',padding:28}}>
          {renderPage()}
        </main>
      </div>

      {/* Modals */}
      {modal?.type==='tx' && <TransactionDetailModal item={modal.item} onClose={()=>setModal(null)}/>}
      {modal?.type==='merchant' && <MerchantDetailModal item={modal.item} onClose={()=>setModal(null)}/>}
      {modal?.type==='user' && <UserDetailModal item={modal.item} onClose={()=>setModal(null)}/>}

      {/* Toast */}
      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
