@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

// ── 관리자 데이터 ──
const demoUsers=[
  {id:1,name:'张伟 (장웨이)',phone:'+86 138****1234',balance:128500,transactions:7,status:'활성',created:'2025-03-18'},
  {id:2,name:'李娜 (리나)',phone:'+86 139****5678',balance:85000,transactions:12,status:'활성',created:'2025-03-17'},
  {id:3,name:'王强 (왕치앙)',phone:'+86 136****9012',balance:200000,transactions:3,status:'활성',created:'2025-03-19'},
  {id:4,name:'刘芳 (류팡)',phone:'+86 137****3456',balance:42000,transactions:9,status:'비활성',created:'2025-03-16'}

const allTransactions=[
  {id:'T001',user:'张伟',merchant:'星巴克 明洞店',amount:4500,type:'결제',status:'완료',date:'03/20 14:32'},
  {id:'T002',user:'张伟',merchant:'-',amount:50000,type:'충전',status:'완료',date:'03/20 10:15'},
  {id:'T003',user:'李娜',merchant:'CU 明洞中央店',amount:8200,type:'결제',status:'완료',date:'03/20 09:45'},
  {id:'T004',user:'王强',merchant:'OLIVE YOUNG',amount:32000,type:'결제',status:'완료',date:'03/19 16:20'},

// ── Components ──
function Skeleton(){return(<div style={{display:'flex',minHeight:'100vh'}}><div style={{width:260,background:C.sidebarBg}}/><div style={{flex:1,padding:32}}><div className="skeleton" style={{width:'50%',height:24,marginBottom:20}}/><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}><div className="skeleton" style={{height:400}}/><div className="skeleton" style={{height:400}}/></div></div></div>);}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,animation:'fadeIn .2s'}}>
    <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:16,width:'90%',maxWidth:560,maxHeight:'85vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSec}}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>);
}

function Badge({text}){
  const colors={활성:{bg:'#D1FAE5',t:'#065F46'},비활성:{bg:'#FEE2E2',t:'#991B1B'},완료:{bg:'#D1FAE5',t:'#065F46'},승인대기:{bg:'#FEF3C7',t:'#92400E'}};
  const c=colors[text]||{bg:'#F3F4F6',t:'#374151'};
  return <span style={{padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.t}}>{text}</span>;
}

// ── 모바일 앱 프리뷰 (중국어 UI) ──
function MobileAppPreview({setModal}){
  const [balance,setBalance]=useState(userBalance);
  const [appScreen,setAppScreen]=useState('home');
  const [scanning,setScanning]=useState(false);
  const [payStep,setPayStep]=useState(0);
  const [payAmount,setPayAmount]=useState('');

  const doCharge=(amount)=>{setBalance(b=>b+amount);setModal({type:'charge-success',data:{amount}});};
  const startScan=()=>{setScanning(true);setTimeout(()=>{setScanning(false);setPayStep(1);},2000);};

  const phoneStyle={width:320,background:'#000',borderRadius:36,padding:'12px 8px',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'};
  const screenStyle={background:'#fff',borderRadius:28,overflow:'hidden',height:580,display:'flex',flexDirection:'column'};

  return(<div style={{display:'flex',justifyContent:'center',alignItems:'flex-start',gap:32}}>
    <div style={phoneStyle}>
      {/* Notch */}
      <div style={{display:'flex',justifyContent:'center',marginBottom:4}}><div style={{width:100,height:6,background:'#333',borderRadius:3}}/></div>
      <div style={screenStyle}>
        {/* App Header */}
        <div style={{background:`linear-gradient(135deg, ${C.primary} 0%, #1D4ED8 100%)`,padding:'16px 20px',color:'#fff'}}>
          <div style={{fontSize:11,opacity:0.8,marginBottom:4}}>中国游客专用 · 시연용 데모</div>
          <div style={{fontSize:20,fontWeight:800}}>快捷支付</div>
          <div style={{fontSize:11,opacity:0.7}}>간편결제 데모 앱</div>
        </div>

        {appScreen==='home'&&<div style={{flex:1,overflow:'auto',padding:16}}>
          {/* Balance Card */}
          <div style={{background:`linear-gradient(135deg, #1E3A5C 0%, ${C.primary} 100%)`,borderRadius:16,padding:20,color:'#fff',marginBottom:16}}>
            <div style={{fontSize:12,opacity:0.8}}>余额 (잔액)</div>
            <div style={{fontSize:32,fontWeight:800,margin:'8px 0'}}>¥{(balance/170).toFixed(0)} <span style={{fontSize:14,fontWeight:400,opacity:0.7}}>≈ ₩{balance.toLocaleString()}</span></div>
            <div style={{display:'flex',gap:8,marginTop:12}}>
              {chargeAmounts.slice(0,2).map(a=><button key={a} onClick={()=>doCharge(a)} style={{flex:1,padding:'8px',borderRadius:8,border:'1px solid rgba(255,255,255,0.3)',background:'rgba(255,255,255,0.1)',color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer'}}>+₩{(a/1000)}K 充值</button>)}
            </div>
          </div>
          {/* QR Payment Button */}
          <button onClick={()=>{setAppScreen('qr');startScan();}} style={{width:'100%',padding:'16px',borderRadius:14,border:'none',background:C.primary,color:'#fff',fontSize:16,fontWeight:700,cursor:'pointer',marginBottom:16,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <span style={{fontSize:20}}>📱</span> 扫码支付 (QR 결제)
          </button>
          {/* Quick Actions */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:16}}>
            {[['💰','充值','충전'],['📋','记录','내역'],['🏪','商户','가맹점'],['⚙️','设置','설정']].map(([icon,zh,ko])=>
              <div key={zh} onClick={()=>{if(zh==='记录')setAppScreen('history')}} style={{textAlign:'center',padding:'12px 4px',background:'#F8FAFC',borderRadius:10,cursor:'pointer'}}>
                <div style={{fontSize:20,marginBottom:4}}>{icon}</div>
                <div style={{fontSize:11,fontWeight:600}}>{zh}</div>
                <div style={{fontSize:9,color:C.textSec}}>{ko}</div>
              </div>
            )}
          </div>
          {/* Recent */}
          <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>最近交易 (최근 거래)</div>
          {transactions.slice(0,4).map(t=><div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
            <div><div style={{fontSize:13,fontWeight:600}}>{t.desc}</div><div style={{fontSize:10,color:C.textSec}}>{t.date}</div></div>
            <span style={{fontSize:14,fontWeight:700,color:t.amount>0?C.success:C.text}}>{t.amount>0?'+':''}₩{Math.abs(t.amount).toLocaleString()}</span>
          </div>)}
        </div>}

        {appScreen==='qr'&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#000',position:'relative'}}>
          {scanning?<>
            <div style={{width:220,height:220,border:'3px solid rgba(255,255,255,0.3)',borderRadius:16,position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',width:'100%',height:3,background:C.primary,boxShadow:`0 0 10px ${C.primary}`,animation:'scanLine 1.5s ease-in-out infinite'}}/>
              <div style={{position:'absolute',top:0,left:0,width:24,height:24,borderTop:'3px solid #fff',borderLeft:'3px solid #fff',borderRadius:'4px 0 0 0'}}/>
              <div style={{position:'absolute',top:0,right:0,width:24,height:24,borderTop:'3px solid #fff',borderRight:'3px solid #fff',borderRadius:'0 4px 0 0'}}/>
              <div style={{position:'absolute',bottom:0,left:0,width:24,height:24,borderBottom:'3px solid #fff',borderLeft:'3px solid #fff',borderRadius:'0 0 0 4px'}}/>
              <div style={{position:'absolute',bottom:0,right:0,width:24,height:24,borderBottom:'3px solid #fff',borderRight:'3px solid #fff',borderRadius:'0 0 4px 0'}}/>
            </div>
            <div style={{color:'#fff',marginTop:16,fontSize:14}}>扫描商户二维码...</div>
            <div style={{color:'rgba(255,255,255,0.6)',fontSize:11,marginTop:4}}>가맹점 QR 코드를 스캔하세요</div>
          </>
          :payStep===1?<div style={{background:'#fff',borderRadius:20,padding:24,width:280,textAlign:'center'}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>星巴克 明洞店</div>
            <div style={{fontSize:12,color:C.textSec,marginBottom:16}}>스타벅스 명동점</div>
            <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>支付金额 (결제 금액)</div>
            <input value={payAmount} onChange={e=>setPayAmount(e.target.value)} placeholder="₩ 0" style={{width:'100%',padding:'14px',border:`2px solid ${C.primary}`,borderRadius:12,fontSize:24,fontWeight:700,textAlign:'center',outline:'none',fontFamily:'Pretendard'}}/>
            <button onClick={()=>setPayStep(2)} style={{width:'100%',marginTop:16,padding:'14px',borderRadius:12,border:'none',background:C.primary,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer'}}>确认 (확인)</button>
            <button onClick={()=>{setAppScreen('home');setPayStep(0);setPayAmount('')}} style={{width:'100%',marginTop:8,padding:'10px',borderRadius:8,border:'none',background:'transparent',color:C.textSec,fontSize:13,cursor:'pointer'}}>取消 (취소)</button>
          </div>
          :payStep===2?<div style={{background:'#fff',borderRadius:20,padding:24,width:280,textAlign:'center'}}>
            <div style={{fontSize:14,fontWeight:600,marginBottom:16}}>请输入密码 (비밀번호 입력)</div>
            <div style={{display:'flex',gap:12,justifyContent:'center',marginBottom:20}}>
              {[1,2,3,4,5,6].map(i=><div key={i} style={{width:14,height:14,borderRadius:'50%',background:i<=4?C.primary:C.border}}/>)}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((n,i)=><button key={i} onClick={()=>{if(n!=='')setPayStep(3)}} style={{padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,background:n===''?'transparent':C.surface,fontSize:18,fontWeight:600,cursor:n===''?'default':'pointer'}}>{n}</button>)}
            </div>
          </div>
          :<div style={{background:'#fff',borderRadius:20,padding:32,width:280,textAlign:'center'}}>
            <div style={{fontSize:56,marginBottom:12}}>✅</div>
            <div style={{fontSize:20,fontWeight:800,color:C.success,marginBottom:4}}>支付成功!</div>
            <div style={{fontSize:14,color:C.textSec,marginBottom:16}}>결제 완료</div>
            <div style={{fontSize:28,fontWeight:800,marginBottom:4}}>₩{payAmount||'4,500'}</div>
            <div style={{fontSize:12,color:C.textSec,marginBottom:20}}>星巴克 明洞店</div>
            <button onClick={()=>{setAppScreen('home');setPayStep(0);setPayAmount('')}} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>返回首页 (홈으로)</button>
          </div>}
          {scanning&&<button onClick={()=>{setAppScreen('home');setScanning(false)}} style={{position:'absolute',bottom:30,padding:'10px 24px',borderRadius:8,border:'1px solid rgba(255,255,255,0.3)',background:'transparent',color:'#fff',fontSize:13,cursor:'pointer'}}>取消</button>}
        </div>}

        {appScreen==='history'&&<div style={{flex:1,overflow:'auto',padding:16}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
            <button onClick={()=>setAppScreen('home')} style={{background:'none',border:'none',fontSize:18,cursor:'pointer'}}>←</button>
            <span style={{fontSize:16,fontWeight:700}}>交易记录 (거래 내역)</span>
          </div>
          {transactions.map(t=><div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <div style={{width:36,height:36,borderRadius:10,background:t.amount>0?`${C.success}14`:`${C.primary}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>{t.amount>0?'💰':'🛒'}</div>
              <div><div style={{fontSize:13,fontWeight:600}}>{t.desc}</div><div style={{fontSize:10,color:C.textSec}}>{t.date}{t.merchant!=='-'?` · ${t.merchant}`:''}</div></div>
            </div>
            <span style={{fontSize:14,fontWeight:700,color:t.amount>0?C.success:C.text}}>{t.amount>0?'+':''}₩{Math.abs(t.amount).toLocaleString()}</span>
          </div>)}
        </div>}

        {/* Bottom Nav */}
        <div style={{display:'flex',borderTop:`1px solid ${C.border}`,background:'#fff',flexShrink:0}}>
          {[['🏠','首页',appScreen==='home'],['📱','扫码',false],['📋','记录',appScreen==='history'],['👤','我的',false]].map(([icon,label,active])=>
            <button key={label} onClick={()=>{if(label==='首页')setAppScreen('home');if(label==='记录')setAppScreen('history');if(label==='扫码'){setAppScreen('qr');startScan();}}} style={{flex:1,padding:'8px 0',border:'none',background:'transparent',cursor:'pointer',textAlign:'center'}}>
              <div style={{fontSize:16}}>{icon}</div>
              <div style={{fontSize:10,color:active?C.primary:C.textSec,fontWeight:active?700:400}}>{label}</div>
            </button>
          )}
        </div>
      </div>
    </div>
  </div>);
}

// ── Pages ──

    </div>
    <div style={{display:'grid',gridTemplateColumns:'380px 1fr',gap:32}}>
      <MobileAppPreview setModal={setModal}/>
      <div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)',marginBottom:16}}>

            ③ "扫码支付" 버튼 → QR 스캔 시뮬레이션<br/>
            ④ 결제 금액 입력 → 비밀번호 입력<br/>
            ⑤ 결제 완료 화면 → 거래 내역 확인
          </div>
        </div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)',marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>가맹점 결제 승인 (Mock)</h3>

          </div>
        </div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>구현 기술 요약</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[['프론트엔드','React Native (Android APK)'],['백엔드','Firebase Auth + Firestore'],['QR 처리','react-native-camera + QR 파싱'],['다국어','중국어 UI + 한국어 관리자']].map(([k,v])=>
              <div key={k} style={{background:'#F8FAFC',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:12,fontWeight:600,marginTop:2}}>{v}</div></div>
            )}
          </div>
        </div>
      </div>
    </div>
  </div>);
}

function TransactionPage({setModal}){
  const [search,setSearch]=useState('');
  const [typeFilter,setTypeFilter]=useState('전체');
  const filtered=allTransactions.filter(t=>(typeFilter==='전체'||t.type===typeFilter)&&(search===''||t.user.includes(search)||t.merchant.includes(search)));
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}><h2 style={{fontSize:22,fontWeight:700}}>거래 내역</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>시스템 전체 가상 거래 내역 조회 및 검색</p></div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
      {[['💳','오늘 거래','7건','전체 가상 거래'],['💰','충전 합계','₩150,000','가상 충전 총액'],['🛒','결제 합계','₩44,000','가상 결제 총액'],['👥','활성 사용자','3명','오늘 거래 발생']].map(([icon,label,value,sub])=>
        <div key={label} style={{background:C.surface,borderRadius:12,padding:'18px 20px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',display:'flex',gap:12,alignItems:'center'}}>
          <div style={{width:42,height:42,borderRadius:10,background:`${C.primary}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{icon}</div>
          <div><div style={{fontSize:12,color:C.textSec}}>{label}</div><div style={{fontSize:18,fontWeight:700}}>{value}</div><div style={{fontSize:11,color:C.textSec}}>{sub}</div></div>
        </div>
      )}
    </div>
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      {['전체','결제','충전'].map(t=><button key={t} onClick={()=>setTypeFilter(t)} style={{padding:'8px 16px',borderRadius:20,border:typeFilter===t?'none':`1px solid ${C.border}`,background:typeFilter===t?C.primary:'transparent',color:typeFilter===t?'#fff':C.text,fontSize:13,fontWeight:500,cursor:'pointer'}}>{t}</button>)}
      <div style={{flex:1}}/>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="사용자 / 가맹점 검색..." style={{padding:'8px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,width:220,outline:'none',fontFamily:'Pretendard'}}/>
    </div>
    <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{background:'#F8FAFC',borderBottom:`2px solid ${C.border}`}}>
          {['거래ID','사용자','가맹점','금액','유형','상태','일시'].map(h=><th key={h} style={{padding:'12px 14px',textAlign:'left',fontSize:13,fontWeight:600,color:C.textSec}}>{h}</th>)}
        </tr></thead>
        <tbody>{filtered.map(t=><tr key={t.id} onClick={()=>setModal({type:'tx-detail',data:t})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <td style={{padding:'14px',fontSize:13,fontWeight:600,color:C.primary}}>{t.id}</td>
          <td style={{padding:'14px',fontSize:13}}>{t.user}</td>
          <td style={{padding:'14px',fontSize:13}}>{t.merchant}</td>
          <td style={{padding:'14px',fontSize:13,fontWeight:600,color:t.type==='충전'?C.success:C.text}}>₩{t.amount.toLocaleString()}</td>
          <td style={{padding:'14px',fontSize:13}}>{t.type}</td>
          <td style={{padding:'14px'}}><Badge text={t.status}/></td>
          <td style={{padding:'14px',fontSize:13,color:C.textSec}}>{t.date}</td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>);
}

function MerchantPage({setModal}){
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <div><h2 style={{fontSize:22,fontWeight:700}}>가맹점 관리</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>테스트용 가맹점 등록 및 QR 코드 정보 관리</p></div>
      <button onClick={()=>setModal({type:'add-merchant'})} style={{padding:'10px 20px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 가맹점 등록</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:20}}>
      <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>일별 가상 매출 추이</h3>
        <ResponsiveContainer width="100%" height={200}><BarChart data={merchantSales}><CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/><XAxis dataKey="day" tick={{fontSize:12}}/><YAxis tick={{fontSize:12}} tickFormatter={v=>`${v/10}만`}/><Tooltip formatter={v=>`₩${(v*1000).toLocaleString()}`}/><Bar dataKey="sales" fill={C.primary} radius={[6,6,0,0]} name="매출(천원)"/></BarChart></ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>업종별 거래 비율</h3>
        <ResponsiveContainer width="100%" height={200}><PieChart><Pie data={catDist} cx="50%" cy="50%" innerRadius={40} outerRadius={70} dataKey="value" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`}>{catDist.map((_,i)=><Cell key={i} fill={pieColors[i]}/>)}</Pie><Tooltip/></PieChart></ResponsiveContainer>
      </div>
    </div>
    <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{background:'#F8FAFC',borderBottom:`2px solid ${C.border}`}}>
          {['가맹점명 (중국어)','한국어명','QR 코드','업종','오늘 매출','건수','상태'].map(h=><th key={h} style={{padding:'12px 14px',textAlign:'left',fontSize:13,fontWeight:600,color:C.textSec}}>{h}</th>)}
        </tr></thead>
        <tbody>{merchants.map(m=><tr key={m.id} onClick={()=>setModal({type:'merchant-detail',data:m})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <td style={{padding:'14px',fontSize:14,fontWeight:600}}>{m.name}</td>
          <td style={{padding:'14px',fontSize:13,color:C.textSec}}>{m.nameKo}</td>
          <td style={{padding:'14px'}}><span style={{padding:'3px 8px',borderRadius:6,fontSize:11,background:`${C.primary}10`,color:C.primary,fontFamily:'monospace'}}>{m.qrCode}</span></td>
          <td style={{padding:'14px',fontSize:13}}>{m.category}</td>
          <td style={{padding:'14px',fontSize:13,fontWeight:600}}>₩{m.todaySales.toLocaleString()}</td>
          <td style={{padding:'14px',fontSize:13}}>{m.todayCount}건</td>
          <td style={{padding:'14px'}}><Badge text={m.status}/></td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>);
}

function UserMgmtPage({setModal}){
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <div><h2 style={{fontSize:22,fontWeight:700}}>사용자 관리</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>데모용 사용자 계정 생성, 조회 및 관리</p></div>
      <button onClick={()=>setModal({type:'add-user'})} style={{padding:'10px 20px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 사용자 추가</button>
    </div>
    <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{background:'#F8FAFC',borderBottom:`2px solid ${C.border}`}}>
          {['이름 (중국어)','연락처','잔액','거래 수','상태','가입일'].map(h=><th key={h} style={{padding:'12px 14px',textAlign:'left',fontSize:13,fontWeight:600,color:C.textSec}}>{h}</th>)}
        </tr></thead>
        <tbody>{demoUsers.map(u=><tr key={u.id} onClick={()=>setModal({type:'user-detail',data:u})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <td style={{padding:'14px',fontSize:14,fontWeight:600}}>{u.name}</td>
          <td style={{padding:'14px',fontSize:13,color:C.textSec}}>{u.phone}</td>
          <td style={{padding:'14px',fontSize:13,fontWeight:600}}>₩{u.balance.toLocaleString()}</td>
          <td style={{padding:'14px',fontSize:13}}>{u.transactions}건</td>
          <td style={{padding:'14px'}}><Badge text={u.status}/></td>
          <td style={{padding:'14px',fontSize:13,color:C.textSec}}>{u.created}</td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>);
}

// ── Modals ──
function ModalContent({modal,onClose}){
  if(!modal)return null;
  const d=modal.data;
  switch(modal.type){
    case 'charge-success':return(<div style={{textAlign:'center'}}><div style={{fontSize:48,marginBottom:12}}>✅</div><h4 style={{fontSize:18,fontWeight:700,color:C.success}}>充值成功! (충전 완료)</h4><div style={{fontSize:24,fontWeight:800,margin:'12px 0'}}>+₩{d.amount.toLocaleString()}</div><button onClick={onClose} style={{padding:'12px 32px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>确认</button></div>);
    case 'tx-detail':return(<div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        {[['거래 ID',d.id],['사용자',d.user],['가맹점',d.merchant],['금액',`₩${d.amount.toLocaleString()}`],['유형',d.type],['상태',d.status],['일시',d.date]].map(([k,v])=><div key={k} style={{background:'#F8FAFC',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{v}</div></div>)}
      </div>
      <button onClick={onClose} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>닫기</button>
    </div>);
    case 'merchant-detail':return(<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div><div style={{fontSize:18,fontWeight:700}}>{d.name}</div><div style={{fontSize:13,color:C.textSec}}>{d.nameKo}</div></div>
        <Badge text={d.status}/>
      </div>
      <div style={{background:'#F8FAFC',borderRadius:12,padding:20,textAlign:'center',marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>가맹점 QR 코드</div>
        <div style={{width:120,height:120,background:'#fff',border:`2px solid ${C.border}`,borderRadius:12,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>
          <div style={{fontSize:36}}>📱</div>
          <div style={{fontSize:10,color:C.textSec,marginTop:4,fontFamily:'monospace'}}>{d.qrCode}</div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        {[['업종',d.category],['오늘 매출',`₩${d.todaySales.toLocaleString()}`],['오늘 건수',`${d.todayCount}건`],['QR 코드',d.qrCode]].map(([k,v])=><div key={k} style={{background:'#F8FAFC',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{v}</div></div>)}
      </div>
      <div style={{display:'flex',gap:8}}><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,fontSize:14,cursor:'pointer'}}>닫기</button><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>QR 재생성</button></div>
    </div>);
    case 'user-detail':return(<div>
      <div style={{display:'flex',gap:14,alignItems:'center',marginBottom:16}}>
        <div style={{width:48,height:48,borderRadius:'50%',background:`${C.primary}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700,color:C.primary}}>{d.name[0]}</div>
        <div><div style={{fontSize:18,fontWeight:700}}>{d.name}</div><div style={{fontSize:13,color:C.textSec}}>{d.phone}</div></div>
        <Badge text={d.status}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        {[['잔액',`₩${d.balance.toLocaleString()}`],['거래 수',`${d.transactions}건`],['가입일',d.created],['상태',d.status]].map(([k,v])=><div key={k} style={{background:'#F8FAFC',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{v}</div></div>)}
      </div>
      <div style={{display:'flex',gap:8}}><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,fontSize:14,cursor:'pointer'}}>닫기</button><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>잔액 초기화</button></div>
    </div>);
    case 'add-merchant':return(<div>
      {[['가맹점명 (중국어)',''],['한국어명',''],['업종','카페'],['주소','']].map(([label])=><div key={label} style={{marginBottom:14}}><label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>{label}</label><input placeholder={`${label} 입력`} style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none',fontFamily:'Pretendard'}}/></div>)}
      <div style={{display:'flex',gap:8,marginTop:8}}><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,fontSize:14,cursor:'pointer'}}>취소</button><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>등록 + QR 생성</button></div>
    </div>);
    case 'add-user':return(<div>
      {[['이름 (중국어)',''],['연락처',''],['초기 잔액','100000']].map(([label,val])=><div key={label} style={{marginBottom:14}}><label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>{label}</label><input defaultValue={val} placeholder={`${label} 입력`} style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none',fontFamily:'Pretendard'}}/></div>)}
      <div style={{display:'flex',gap:8,marginTop:8}}><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,fontSize:14,cursor:'pointer'}}>취소</button><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>추가</button></div>
    </div>);
    default:return null;
  }
}

// ── App ──
function App(){
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState('qr-payment');
  const [modal,setModal]=useState(null);
  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading)return <Skeleton/>;

  const menus=[
    {key:'qr-payment',icon:'📱',label:'QR 결제'},
    {key:'transactions',icon:'📋',label:'거래 내역'},
    {key:'merchants',icon:'🏪',label:'가맹점 관리'},
    {key:'users',icon:'👥',label:'사용자 관리'}
  ];
  const modalTitles={'charge-success':'충전 완료','tx-detail':'거래 상세','merchant-detail':'가맹점 상세','user-detail':'사용자 상세','add-merchant':'가맹점 등록','add-user':'사용자 추가'};

  return(<div style={{display:'flex',minHeight:'100vh'}}>
    <aside style={{width:260,background:C.sidebarBg,flexShrink:0,display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,bottom:0,zIndex:100}}>
      <div style={{padding:'24px 20px',borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{fontSize:20,fontWeight:800,color:'#fff'}}>📱 QR 결제 데모</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,0.5)',marginTop:4}}>맞춤 구현 데모</div>
      </div>
      <div style={{padding:'12px 16px',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <div style={{padding:'10px 12px',background:'rgba(255,255,255,0.05)',borderRadius:8,fontSize:11,color:'rgba(255,255,255,0.6)',lineHeight:1.5}}>
          중국 관광객 대상 QR 결제 시연용<br/>데모 앱 + 관리자 페이지
        </div>
      </div>
      <nav style={{flex:1,padding:'12px 10px'}}>
        {menus.map(m=><button key={m.key} onClick={()=>setPage(m.key)} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'12px 14px',borderRadius:10,border:'none',background:page===m.key?C.sidebarActive:'transparent',color:page===m.key?'#fff':'rgba(255,255,255,0.6)',fontSize:14,fontWeight:page===m.key?600:400,cursor:'pointer',marginBottom:2,transition:'all .15s',textAlign:'left'}} onMouseEnter={e=>{if(page!==m.key)e.currentTarget.style.background=C.sidebarHover}} onMouseLeave={e=>{if(page!==m.key)e.currentTarget.style.background='transparent'}}>
          <span style={{fontSize:18}}>{m.icon}</span>{m.label}
        </button>)}
      </nav>
      <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:'rgba(255,255,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff',fontWeight:600}}>관</div>
          <div><div style={{fontSize:13,color:'#fff',fontWeight:500}}>관리자</div><div style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>admin@demo.kr</div></div>
        </div>
      </div>
    </aside>
    <main style={{flex:1,marginLeft:260}}>
      <header style={{height:60,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',position:'sticky',top:0,zIndex:50}}>
        <div style={{fontSize:16,fontWeight:700}}>{menus.find(m=>m.key===page)?.label}</div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <span style={{padding:'4px 10px',borderRadius:8,fontSize:12,fontWeight:600,background:`${C.warning}14`,color:C.warning}}>시연 모드</span>
          <button style={{background:'none',border:'none',fontSize:18,cursor:'pointer'}}>🔔</button>
        </div>
      </header>
      <div style={{padding:32}}>
        {page==='qr-payment'&&<QRPaymentPage setModal={setModal}/>}
        {page==='transactions'&&<TransactionPage setModal={setModal}/>}
        {page==='merchants'&&<MerchantPage setModal={setModal}/>}
        {page==='users'&&<UserMgmtPage setModal={setModal}/>}
      </div>
    </main>
    <Modal open={!!modal} onClose={()=>setModal(null)} title={modal?modalTitles[modal.type]||'상세':''}><ModalContent modal={modal} onClose={()=>setModal(null)}/></Modal>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
