/* ─── Components ─── */
function KpiCard({icon,label,value,sub,accent}){
  return(
    <div style={{background:C.surface,borderRadius:14,padding:'18px 22px',border:`1px solid ${C.border}`,animation:'slideUp 500ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span>
        <span style={{fontSize:18}}>{icon}</span>
      </div>
      <div style={{fontSize:24,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{value}</div>
      {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:5}}>{sub}</div>}
    </div>
  );
}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(<>
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.35)',zIndex:1000}}/>
    <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:560,maxHeight:'85vh',background:C.surface,borderRadius:16,boxShadow:'0 20px 40px rgba(0,0,0,0.12)',zIndex:1001,animation:'fadeInScale 250ms ease',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'18px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3 style={{fontSize:17,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:C.textMuted,borderRadius:8,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
      </div>
      <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
    </div>
  </>);
}

/* ─── Pages ─── */
function ChatPage(){
  const[mode,setMode]=useState('group');
  const[selScenario,setSelScenario]=useState(GROUP_SCENARIOS[0]);
  const[msgs,setMsgs]=useState(GROUP_CHAT);
  const[input,setInput]=useState('');
  const[typing,setTyping]=useState(false);
  const endRef=useRef(null);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs]);

  const send=()=>{
    if(!input.trim())return;
    setMsgs(p=>[...p,{char:'나',avatar:'👤',color:C.primary,text:input}]);
    setInput('');
    setTyping(true);
    setTimeout(()=>{
      const responders=[
        {char:'유키',avatar:'❄️',color:'#60A5FA',text:'...그래? 뭐, 네 말도 일리가 있긴 하네.'},
        {char:'블레이즈',avatar:'🔥',color:'#EF4444',text:'오!! 좋은 아이디어야! 바로 실행하자!'},
      ];
      setMsgs(p=>[...p,responders[0]]);
      setTimeout(()=>{
        setTyping(false);
        setMsgs(p=>[...p,responders[1]]);
      },800);
    },1200);
  };

  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <button onClick={()=>setMode('group')} style={{padding:'8px 18px',borderRadius:8,border:`1px solid ${mode==='group'?C.primary:C.border}`,background:mode==='group'?C.primary:'transparent',color:mode==='group'?'#fff':C.textLight,fontSize:13,fontWeight:600,cursor:'pointer'}}>그룹 시나리오</button>
        <button onClick={()=>setMode('1on1')} style={{padding:'8px 18px',borderRadius:8,border:`1px solid ${mode==='1on1'?C.primary:C.border}`,background:mode==='1on1'?C.primary:'transparent',color:mode==='1on1'?'#fff':C.textLight,fontSize:13,fontWeight:600,cursor:'pointer'}}>1:1 채팅</button>
      </div>

      {mode==='group'&&<>
        {/* Scenario cards */}
        <div style={{display:'flex',gap:12,marginBottom:20,overflowX:'auto',paddingBottom:4}}>
          {GROUP_SCENARIOS.map(s=>(
            <div key={s.id} onClick={()=>setSelScenario(s)} style={{minWidth:220,padding:16,background:selScenario.id===s.id?C.surfaceWarm:C.surface,borderRadius:12,border:`2px solid ${selScenario.id===s.id?C.primary:C.border}`,cursor:'pointer',transition:'all 150ms'}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{s.name}</div>
              <div style={{fontSize:12,color:C.textMuted,marginBottom:8}}>{s.desc}</div>
              <div style={{display:'flex',gap:4}}>
                {s.chars.map(ch=>{const c=CHARACTERS.find(x=>x.name===ch);return c?<span key={ch} title={ch} style={{fontSize:16}}>{c.avatar}</span>:null})}
              </div>
              <div style={{fontSize:11,color:C.textMuted,marginTop:6}}>▶ {s.plays.toLocaleString()}회 · ⭐ {s.rating}</div>
            </div>
          ))}
        </div>

        {/* Group chat */}
        <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden'}}>
          <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:15,fontWeight:700}}>{selScenario.name}</span>
            <span style={{fontSize:12,color:C.textMuted}}>— {selScenario.chars.join(', ')}</span>
          </div>
          <div style={{height:340,overflowY:'auto',padding:'16px 20px'}}>
            {msgs.map((m,i)=>(
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:14,animation:'slideUp 300ms ease'}}>
                <div style={{width:34,height:34,borderRadius:'50%',background:`${m.color}18`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>{m.avatar}</div>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:m.color,marginBottom:3}}>{m.char}</div>
                  <div style={{padding:'10px 14px',borderRadius:'4px 14px 14px 14px',background:m.char==='나'?`${C.primary}15`:C.surfaceWarm,fontSize:14,lineHeight:1.6,border:`1px solid ${C.border}`}}>{m.text}</div>
                </div>
              </div>
            ))}
            {typing&&<div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:34,height:34,borderRadius:'50%',background:'#EF444418',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🔥</div>
              <div style={{padding:'10px 14px',borderRadius:'4px 14px 14px 14px',background:C.surfaceWarm,border:`1px solid ${C.border}`}}>
                <div style={{display:'flex',gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:'50%',background:C.textMuted,animation:`typing 1s ${i*.2}s infinite`}}/>)}</div>
              </div>
            </div>}
            <div ref={endRef}/>
          </div>
          <div style={{padding:'14px 20px',borderTop:`1px solid ${C.border}`,display:'flex',gap:10}}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="시나리오에 참여하기..." style={{flex:1,padding:'10px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,outline:'none',color:C.text}}/>
            <button onClick={send} style={{padding:'10px 20px',borderRadius:10,background:C.primary,color:'#fff',border:'none',fontSize:14,fontWeight:600,cursor:'pointer'}}>참여</button>
          </div>
        </div>
      </>}

      {mode==='1on1'&&<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
        {CHARACTERS.slice(0,4).map(ch=>(
          <div key={ch.id} style={{background:C.surface,borderRadius:14,padding:20,border:`1px solid ${C.border}`,cursor:'pointer',transition:'transform 150ms'}} onMouseOver={e=>e.currentTarget.style.transform='translateY(-2px)'} onMouseOut={e=>e.currentTarget.style.transform='none'}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
              <div style={{width:44,height:44,borderRadius:'50%',background:`${ch.color}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{ch.avatar}</div>
              <div><div style={{fontWeight:700}}>{ch.name}</div><div style={{fontSize:12,color:C.textMuted}}>{ch.personality}</div></div>
            </div>
            <p style={{fontSize:13,color:C.textLight,marginBottom:12}}>{ch.desc}</p>
            <button style={{width:'100%',padding:'8px',borderRadius:8,background:`${ch.color}15`,color:ch.color,border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>대화 시작</button>
          </div>
        ))}
      </div>}
    </div>
  );
}

        <div style={{padding:'14px 18px',borderTop:`1px solid ${C.border}`}}>
