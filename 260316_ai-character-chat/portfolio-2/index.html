  {role:'user',text:'이차방정식의 근의 공식 유도 과정을 알려줘'},
  {role:'ai',text:'좋은 질문이야! 📐 이차방정식 ax² + bx + c = 0의 근의 공식을 유도해볼게.\n\n**Step 1: 양변을 a로 나누기**\nx² + (b/a)x + c/a = 0\n\n**Step 2: 완전제곱식 만들기**\nx² + (b/a)x = -c/a\n(x + b/2a)² = b²/4a² - c/a\n\n**Step 3: 정리하면**\nx = (-b ± √(b²-4ac)) / 2a\n\n여기서 b²-4ac를 **판별식(D)**이라고 해. D > 0이면 서로 다른 두 실근, D = 0이면 중근, D < 0이면 허근이야!'},

function KpiCard({icon,label,value,sub,accent}){
  return(
    <div style={{background:C.surface,borderRadius:16,padding:'20px 24px',boxShadow:'0 2px 8px rgba(0,0,0,0.06)',animation:'slideUp 500ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>

        <span style={{fontSize:20}}>{icon}</span>

      {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:6}}>{sub}</div>}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(<>
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000}}/>
    <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:560,maxHeight:'85vh',background:C.surface,borderRadius:16,boxShadow:'0 24px 48px rgba(0,0,0,0.15)',zIndex:1001,animation:'fadeInScale 250ms ease',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:C.textLight,borderRadius:8,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
      </div>
      <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
    </div>
  </>);
}

function ChatPage(){
  const[selMentor,setSelMentor]=useState(MENTORS[0]);
  const[msgs,setMsgs]=useState(CHAT_MSGS);
  const[input,setInput]=useState('');
  const[typing,setTyping]=useState(false);
  const endRef=useRef(null);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs]);

  const send=()=>{
    if(!input.trim())return;
    setMsgs(p=>[...p,{role:'user',text:input}]);
    setInput('');
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      setMsgs(p=>[...p,{role:'ai',text:'좋은 질문이야! 이 부분에 대해 자세히 설명해줄게 📚\n\n핵심 포인트를 정리하면...\n\n더 궁금한 점이 있으면 물어봐! 😊'}]);
    },1800);
  };

  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      {/* Hero Banner */}
      <div style={{background:`linear-gradient(135deg,${C.secondary},${C.primary})`,borderRadius:20,padding:'32px 36px',marginBottom:24,color:'#fff'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:13,opacity:.7,marginBottom:4}}>현재 학습 중</div>
            <h2 style={{fontSize:24,fontWeight:800,marginBottom:8}}>미적분 완전정복</h2>
            <div style={{display:'flex',gap:16,fontSize:13,opacity:.8}}>
              <span>📐 {selMentor.name}</span>
              <span>📝 16/24 레슨 완료</span>
              <span>⭐ {selMentor.rating}</span>
            </div>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{width:80,height:80,borderRadius:'50%',background:'rgba(255,255,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:38,marginBottom:8}}>{selMentor.avatar}</div>
            <div style={{fontSize:12,opacity:.7}}>AI 멘토</div>
          </div>
        </div>
        <div style={{marginTop:16,background:'rgba(255,255,255,.15)',borderRadius:10,height:8}}>
          <div style={{width:'67%',height:'100%',borderRadius:10,background:'#38BDF8'}}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:12,opacity:.7}}>
          <span>진도 67%</span><span>8레슨 남음</span>
        </div>
      </div>

      {/* Mentor selector */}
      <div style={{display:'flex',gap:12,marginBottom:20}}>
        {MENTORS.map(m=>(
          <button key={m.id} onClick={()=>setSelMentor(m)} style={{display:'flex',alignItems:'center',gap:8,padding:'10px 16px',borderRadius:12,border:`2px solid ${selMentor.id===m.id?m.color:C.border}`,background:selMentor.id===m.id?`${m.color}10`:C.surface,cursor:'pointer',fontSize:13,fontWeight:selMentor.id===m.id?600:400,color:C.text,transition:'all 150ms'}}>
            <span style={{fontSize:18}}>{m.avatar}</span>{m.name}
          </button>
        ))}
      </div>

      {/* Chat area */}
      <div style={{background:C.surface,borderRadius:16,border:`1px solid ${C.border}`,boxShadow:'0 2px 8px rgba(0,0,0,0.04)',overflow:'hidden'}}>
        <div style={{height:380,overflowY:'auto',padding:'20px 24px'}}>
          {msgs.map((m,i)=>(
            <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start',marginBottom:16,animation:'slideUp 300ms ease'}}>
              {m.role==='ai'&&<div style={{width:36,height:36,borderRadius:'50%',background:`${selMentor.color}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginRight:10,flexShrink:0}}>{selMentor.avatar}</div>}
              <div style={{maxWidth:'70%',padding:'14px 18px',borderRadius:m.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',background:m.role==='user'?C.primary:`${selMentor.color}08`,color:m.role==='user'?'#fff':C.text,fontSize:14,lineHeight:1.7,whiteSpace:'pre-wrap',border:m.role==='ai'?`1px solid ${C.border}`:'none'}}>
                {m.text}
              </div>
            </div>
          ))}
          {typing&&<div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:'50%',background:`${selMentor.color}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{selMentor.avatar}</div>
            <div style={{padding:'14px 18px',borderRadius:'16px 16px 16px 4px',background:`${selMentor.color}08`,border:`1px solid ${C.border}`}}>
              <div style={{display:'flex',gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:C.textMuted,animation:`typing 1s ${i*.2}s infinite`}}/>)}</div>
            </div>
          </div>}
          <div ref={endRef}/>
        </div>
        <div style={{padding:'16px 24px',borderTop:`1px solid ${C.border}`,display:'flex',gap:10}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder={`${selMentor.name}에게 질문하기...`} style={{flex:1,padding:'12px 16px',borderRadius:12,border:`1px solid ${C.border}`,fontSize:14,outline:'none',color:C.text}}/>
          <button onClick={send} style={{padding:'12px 24px',borderRadius:12,background:C.primary,color:'#fff',border:'none',fontSize:14,fontWeight:600,cursor:'pointer'}}>질문하기</button>
        </div>
      </div>
    </div>
  );
}

function CoursesPage(){
  const[filter,setFilter]=useState('전체');
  const[detail,setDetail]=useState(null);
  const difficulties=['전체','입문','중급','고급'];
  const filtered=filter==='전체'?COURSES:COURSES.filter(c=>c.difficulty===filter);
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:800,marginBottom:4}}>코스 탐색</h2>
          <p style={{fontSize:14,color:C.textLight}}>AI 멘토가 1:1로 가르치는 맞춤형 코스</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          {difficulties.map(d=><button key={d} onClick={()=>setFilter(d)} style={{padding:'8px 16px',borderRadius:20,border:`1px solid ${filter===d?C.primary:C.border}`,background:filter===d?C.primary:C.surface,color:filter===d?'#fff':C.textLight,fontSize:13,fontWeight:500,cursor:'pointer'}}>{d}</button>)}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {filtered.map(course=>(
          <div key={course.id} onClick={()=>setDetail(course)} style={{background:C.surface,borderRadius:16,overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.06)',cursor:'pointer',transition:'transform 150ms'}} onMouseOver={e=>e.currentTarget.style.transform='translateY(-3px)'} onMouseOut={e=>e.currentTarget.style.transform='none'}>
            <div style={{height:8,background:MENTORS.find(m=>m.name===course.mentor)?.color||C.primary}}/>
            <div style={{padding:22}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                <div>
                  <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>{course.name}</div>
                  <div style={{fontSize:12,color:C.textMuted}}>{course.mentor}</div>
                </div>
                <span style={{padding:'4px 10px',borderRadius:8,background:course.difficulty==='입문'?'#ECFDF5':course.difficulty==='중급'?'#FEF3C7':'#EFF6FF',color:course.difficulty==='입문'?'#059669':course.difficulty==='중급'?'#D97706':'#2563EB',fontSize:11,fontWeight:600}}>{course.difficulty}</span>
              </div>
              <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
                {course.tags.map(t=><span key={t} style={{padding:'3px 8px',borderRadius:6,background:'#F1F5F9',fontSize:11,color:C.textLight}}>#{t}</span>)}
              </div>
              {course.progress>0&&<div style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.textMuted,marginBottom:4}}>
                  <span>진도</span><span>{course.progress}%</span>
                </div>
                <div style={{height:6,background:'#F1F5F9',borderRadius:3}}>
                  <div style={{width:`${course.progress}%`,height:'100%',borderRadius:3,background:C.primary,transition:'width 500ms'}}/>
                </div>
              </div>}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:12,color:C.textMuted}}>📚 {course.lessons}레슨 · 👥 {course.enrolled}명</span>
                <span style={{fontSize:15,fontWeight:700,color:C.primary}}>₩{course.price.toLocaleString()}</span>
              </div>
            </div>
          </div>
        ))}
      </div>

      <Modal open={!!detail} onClose={()=>setDetail(null)} title={detail?.name||''}>
        {detail&&<div>
          <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
            {detail.tags.map(t=><span key={t} style={{padding:'4px 10px',borderRadius:8,background:'#F1F5F9',fontSize:12,color:C.textLight}}>#{t}</span>)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
            <div style={{padding:14,background:'#F8FAFC',borderRadius:10,textAlign:'center'}}>
              <div style={{fontSize:20,fontWeight:800,color:C.primary}}>{detail.lessons}</div>
              <div style={{fontSize:11,color:C.textMuted}}>레슨</div>
            </div>
            <div style={{padding:14,background:'#F8FAFC',borderRadius:10,textAlign:'center'}}>
              <div style={{fontSize:20,fontWeight:800,color:C.success}}>{detail.enrolled}</div>
              <div style={{fontSize:11,color:C.textMuted}}>수강생</div>
            </div>
            <div style={{padding:14,background:'#F8FAFC',borderRadius:10,textAlign:'center'}}>
              <div style={{fontSize:20,fontWeight:800,color:C.warning}}>{detail.difficulty}</div>
              <div style={{fontSize:11,color:C.textMuted}}>난이도</div>
            </div>
          </div>
          <button style={{width:'100%',padding:'12px',borderRadius:12,background:C.primary,color:'#fff',border:'none',fontSize:15,fontWeight:600,cursor:'pointer'}}>수강 시작하기 · ₩{detail.price.toLocaleString()}</button>
        </div>}
      </Modal>
    </div>
  );
}

      <p style={{fontSize:14,color:C.textLight,marginBottom:24}}>나의 학습 진도와 성취를 확인하세요</p>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
        <KpiCard icon="📚" label="수강 코스" value="4" sub="1개 완료"/>
        <KpiCard icon="⏱️" label="총 학습시간" value="115시간" sub="이번 달 34시간"/>
        <KpiCard icon="🔥" label="연속 학습" value="12일" sub="최장 30일"/>
        <KpiCard icon="🏅" label="획득 배지" value="6" sub="다음 목표: 50일 연속" accent={C.warning}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:24}}>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>이번 주 학습 시간 (분)</div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={WEEKLY_STUDY}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/>
              <XAxis dataKey="day" tick={{fontSize:12,fill:C.textMuted}}/>
              <YAxis tick={{fontSize:12,fill:C.textMuted}}/>
              <Tooltip contentStyle={{borderRadius:8,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}}/>
              <Bar dataKey="minutes" fill={C.primary} radius={[6,6,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>월별 학습 세션 · 시간</div>
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={MONTHLY_PROGRESS}>
              <defs><linearGradient id="hoursGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.primary} stopOpacity={.15}/><stop offset="95%" stopColor={C.primary} stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/>
              <XAxis dataKey="month" tick={{fontSize:12,fill:C.textMuted}}/>
              <YAxis tick={{fontSize:12,fill:C.textMuted}}/>
              <Tooltip contentStyle={{borderRadius:8,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}}/>
              <Area type="monotone" dataKey="hours" stroke={C.primary} fill="url(#hoursGrad)" strokeWidth={2} name="학습시간"/>
              <Line type="monotone" dataKey="sessions" stroke={C.accent} strokeWidth={2} dot={{fill:C.accent,r:4}} name="세션"/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Badges */}
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)',marginBottom:24}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>성취 배지</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:12}}>
          {BADGES.map(b=>(
            <div key={b.name} style={{textAlign:'center',padding:16,background:'#F8FAFC',borderRadius:12,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:32,marginBottom:8}}>{b.icon}</div>
              <div style={{fontSize:12,fontWeight:600,marginBottom:2}}>{b.name}</div>
              <div style={{fontSize:10,color:C.textMuted}}>{b.date}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Course progress */}
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>코스별 진도</div>
        {COURSES.filter(c=>c.progress>0).map(c=>(
          <div key={c.id} style={{display:'flex',alignItems:'center',gap:16,padding:'14px 0',borderBottom:`1px solid ${C.border}`}}>
            <div style={{width:44,height:44,borderRadius:10,background:`${MENTORS.find(m=>m.name===c.mentor)?.color||C.primary}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{MENTORS.find(m=>m.name===c.mentor)?.avatar||'📚'}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{c.name}</div>
              <div style={{height:6,background:'#F1F5F9',borderRadius:3}}>
                <div style={{width:`${c.progress}%`,height:'100%',borderRadius:3,background:MENTORS.find(m=>m.name===c.mentor)?.color||C.primary}}/>
              </div>
            </div>
            <div style={{fontSize:14,fontWeight:700,color:C.primary}}>{c.progress}%</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CheckoutPage(){
  const[tab,setTab]=useState('구독');
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:6}}>수강권 결제</h2>
      <p style={{fontSize:14,color:C.textLight,marginBottom:20}}>구독 플랜을 선택하고 학습을 시작하세요</p>

      <div style={{display:'flex',gap:8,marginBottom:24}}>
        {['구독','결제 이력'].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:'8px 18px',borderRadius:8,border:`1px solid ${tab===t?C.primary:C.border}`,background:tab===t?C.primary:C.surface,color:tab===t?'#fff':C.textLight,fontSize:13,fontWeight:600,cursor:'pointer'}}>{t}</button>)}
      </div>

      {tab==='구독'&&<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20}}>
        {PLANS_EDU.map(p=>(
          <div key={p.name} style={{background:C.surface,borderRadius:16,padding:28,boxShadow:'0 2px 8px rgba(0,0,0,0.06)',border:`2px solid ${p.current?C.primary:'transparent'}`,position:'relative'}}>
            {p.current&&<div style={{position:'absolute',top:-12,left:'50%',transform:'translateX(-50%)',padding:'4px 16px',borderRadius:12,background:C.primary,color:'#fff',fontSize:12,fontWeight:700}}>현재 플랜</div>}
            <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>{p.name}</div>
            <div style={{fontSize:30,fontWeight:800,color:C.primary,marginBottom:4}}>{p.price===0?'무료':`₩${p.price.toLocaleString()}`}<span style={{fontSize:13,fontWeight:400,color:C.textMuted}}>{p.price>0?' / 월':''}</span></div>
            <div style={{display:'flex',flexDirection:'column',gap:10,marginTop:20,marginBottom:24}}>
              {p.features.map(f=><div key={f} style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:C.textLight}}>
                <span style={{color:C.success,fontWeight:700}}>✓</span>{f}
              </div>)}
            </div>
            <button style={{width:'100%',padding:'12px',borderRadius:12,background:p.current?'transparent':C.primary,color:p.current?C.textMuted:'#fff',border:p.current?`1px solid ${C.border}`:'none',fontSize:14,fontWeight:600,cursor:p.current?'default':'pointer'}}>{p.current?'이용 중':'변경하기'}</button>
          </div>
        ))}
      </div>}

      {tab==='결제 이력'&&<div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
            {['주문번호','유형','상품','금액','결제일','상태'].map(h=><th key={h} style={{padding:'10px 12px',textAlign:'left',color:C.textMuted,fontWeight:600,fontSize:12}}>{h}</th>)}
          </tr></thead>
          <tbody>{PAYMENT_HIST.map(p=><tr key={p.id} style={{borderBottom:`1px solid ${C.border}`}}>
            <td style={{padding:'12px',fontWeight:600,color:C.primary,fontFamily:'monospace'}}>{p.id}</td>
            <td style={{padding:'12px'}}><span style={{padding:'3px 8px',borderRadius:4,background:p.type==='구독'?'#EFF6FF':'#ECFDF5',color:p.type==='구독'?C.primary:C.success,fontSize:11,fontWeight:600}}>{p.type}</span></td>
            <td style={{padding:'12px'}}>{p.item}</td>
            <td style={{padding:'12px',fontWeight:700}}>₩{p.amount}</td>
            <td style={{padding:'12px',color:C.textMuted}}>{p.date}</td>
            <td style={{padding:'12px'}}><span style={{padding:'4px 10px',borderRadius:6,background:'#ECFDF5',color:C.success,fontSize:12,fontWeight:600}}>{p.status}</span></td>
          </tr>)}</tbody>
        </table>
      </div>}
    </div>
  );
}

function SettingsPage(){
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>설정</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:20}}>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>프로필</div>
          {[['닉네임','학습러'],['이메일','learner@email.com'],['가입일','2025.01.15'],['플랜','스탠다드']].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
              <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>학습 설정</div>
          {[['일일 학습 알림','09:00'],['멘토 응답 속도','보통'],['학습 리마인더','켜짐'],['언어','한국어']].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
              <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600,color:C.primary}}>{v}</span>

/* ─── App Shell (topnav-hero) ─── */
function App(){
  const[page,setPage]=useState('학습 채팅');
  const tabs=[
    {name:'학습 채팅',icon:'💬'},
    {name:'코스 탐색',icon:'📚'},
    {name:'학습 현황',icon:'📊'},
    {name:'수강권 결제',icon:'💳'},
    {name:'설정',icon:'⚙️'},
  ];

  const renderPage=()=>{
    switch(page){
      case '학습 채팅':return <ChatPage/>;
      case '코스 탐색':return <CoursesPage/>;
      case '학습 현황':return <ProgressPage/>;
      case '수강권 결제':return <CheckoutPage/>;
      case '설정':return <SettingsPage/>;
      default:return <ChatPage/>;
    }
  };

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column'}}>
      {/* Top Navigation */}
      <header style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'0 32px',display:'flex',alignItems:'center',justifyContent:'space-between',height:60,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'#fff',fontWeight:800}}>M</div>
          <span style={{fontSize:17,fontWeight:800,color:C.text}}>MentorAI</span>
        </div>
        <nav style={{display:'flex',gap:4}}>
          {tabs.map(t=>(
            <button key={t.name} onClick={()=>setPage(t.name)} title={t.name} style={{padding:'8px 18px',borderRadius:8,border:'none',background:page===t.name?`${C.primary}10`:'transparent',color:page===t.name?C.primary:C.textLight,fontSize:14,fontWeight:page===t.name?600:400,cursor:'pointer',transition:'all 150ms',display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:16}}>{t.icon}</span>{t.name}
            </button>
          ))}
        </nav>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:13,padding:'4px 12px',borderRadius:8,background:'#EFF6FF',color:C.primary,fontWeight:600}}>스탠다드</span>
          <div style={{width:32,height:32,borderRadius:'50%',background:'#E2E8F0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>👤</div>
        </div>
      </header>

      {/* Content */}
      <main style={{flex:1,overflow:'auto',padding:28}}>
        {renderPage()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
