function Badge({text,color}){
  const colors={'활성':{bg:'rgba(52,211,153,.15)',text:'#34D399'},'정지':{bg:'rgba(248,113,113,.15)',text:'#F87171'},'검토중':{bg:'rgba(251,191,36,.15)',text:'#FBBF24'},'완료':{bg:'rgba(52,211,153,.15)',text:'#34D399'}};
  const c=colors[text]||{bg:'rgba(139,127,181,.15)',text:'#8B7FB5'};
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:6,fontSize:12,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function KpiCard({icon,label,value,sub,accent}){

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(<>
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:1000}}/>
    <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:560,maxHeight:'85vh',background:C.surface,borderRadius:16,border:`1px solid ${C.border}`,zIndex:1001,animation:'fadeInScale 250ms ease',display:'flex',flexDirection:'column',overflow:'hidden'}}>

        <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:C.textMuted,borderRadius:8,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center'}} onMouseOver={e=>e.currentTarget.style.background=C.surfaceLight} onMouseOut={e=>e.currentTarget.style.background='none'}>✕</button>
      </div>
      <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
    </div>
  </>);
}

function ChatMainPage(){
  const[selChar,setSelChar]=useState(CHARACTERS[0]);
  const[messages,setMessages]=useState(CHAT_HISTORY[1]||[]);
  const[input,setInput]=useState('');
  const[isTyping,setIsTyping]=useState(false);
  const chatEndRef=useRef(null);

  useEffect(()=>{
    setMessages(CHAT_HISTORY[selChar.id]||[{role:'ai',text:`안녕! 나는 ${selChar.name}이야 ${selChar.avatar} ${selChar.desc}. 편하게 말 걸어줘!`}]);
  },[selChar]);

  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:'smooth'})},[messages]);

  const sendMsg=()=>{
    if(!input.trim())return;
    setMessages(p=>[...p,{role:'user',text:input}]);
    setInput('');
    setIsTyping(true);
    setTimeout(()=>{
      setIsTyping(false);
      const replies=[
        '그렇구나! 더 자세히 이야기해줄 수 있어? 😊',
        '흥미로운 이야기네! 나도 비슷한 경험이 있어.',
        '그 마음 충분히 이해해. 함께 생각해보자 💜',
        '좋은 질문이야! 내 생각에는...',
      ];
      setMessages(p=>[...p,{role:'ai',text:replies[Math.floor(Math.random()*replies.length)]}]);
    },1500);
  };

  return(
    <div style={{display:'flex',height:'100%',animation:'fadeIn 400ms ease'}}>
      {/* Character sidebar */}
      <div style={{width:280,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',background:C.surface}}>
        <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:12}}>캐릭터 목록</div>
          <input placeholder="캐릭터 검색..." style={{width:'100%',padding:'8px 12px',borderRadius:8,border:`1px solid ${C.border}`,background:C.surfaceLight,color:C.text,fontSize:13,outline:'none'}}/>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'8px 12px'}}>
          {CHARACTERS.map(ch=>(
            <div key={ch.id} onClick={()=>setSelChar(ch)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px',borderRadius:10,marginBottom:4,cursor:'pointer',background:selChar.id===ch.id?C.surfaceLight:'transparent',transition:'background 150ms'}}>
              <div style={{position:'relative'}}>
                <div style={{width:42,height:42,borderRadius:'50%',background:`${ch.color}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{ch.avatar}</div>
                {ch.online&&<div style={{position:'absolute',bottom:1,right:1,width:10,height:10,borderRadius:'50%',background:C.success,border:`2px solid ${C.surface}`}}/>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,marginBottom:2}}>{ch.name}</div>
                <div style={{fontSize:11,color:C.textMuted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ch.desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Chat area */}
      <div style={{flex:1,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'16px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:14,background:C.surface}}>
          <div style={{width:40,height:40,borderRadius:'50%',background:`${selChar.color}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{selChar.avatar}</div>
          <div>
            <div style={{fontSize:15,fontWeight:700}}>{selChar.name} <span style={{fontSize:11,color:C.textMuted,fontWeight:400}}>· {selChar.personality}</span></div>
            <div style={{fontSize:12,color:selChar.online?C.success:C.textMuted}}>{selChar.online?'온라인':'오프라인'}</div>
          </div>
          <div style={{marginLeft:'auto',display:'flex',gap:8}}>
            {selChar.tags.map(t=><span key={t} style={{padding:'4px 10px',borderRadius:12,background:C.surfaceLight,fontSize:11,color:C.textLight}}>#{t}</span>)}
          </div>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'20px 24px'}}>
          {messages.map((m,i)=>(
            <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start',marginBottom:16,animation:'slideUp 300ms ease'}}>
              {m.role==='ai'&&<div style={{width:32,height:32,borderRadius:'50%',background:`${selChar.color}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,marginRight:10,flexShrink:0,marginTop:4}}>{selChar.avatar}</div>}
              <div style={{maxWidth:'70%',padding:'12px 16px',borderRadius:m.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',background:m.role==='user'?C.chatBubbleUser:C.chatBubbleAI,color:C.text,fontSize:14,lineHeight:1.6,whiteSpace:'pre-wrap'}}>
                {m.text}
              </div>
            </div>
          ))}
          {isTyping&&<div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:`${selChar.color}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>{selChar.avatar}</div>
            <div style={{padding:'12px 16px',borderRadius:'16px 16px 16px 4px',background:C.chatBubbleAI}}>
              <div style={{display:'flex',gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:C.textMuted,animation:`typing 1s ${i*0.2}s infinite`}}/>)}</div>
            </div>
          </div>}
          <div ref={chatEndRef}/>
        </div>

        <div style={{padding:'16px 24px',borderTop:`1px solid ${C.border}`,background:C.surface}}>
          <div style={{display:'flex',gap:10}}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendMsg()} placeholder={`${selChar.name}에게 메시지 보내기...`} style={{flex:1,padding:'12px 16px',borderRadius:12,border:`1px solid ${C.border}`,background:C.surfaceLight,color:C.text,fontSize:14,outline:'none'}}/>
            <button onClick={sendMsg} style={{padding:'12px 20px',borderRadius:12,background:C.primary,color:'#fff',border:'none',fontSize:14,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}}>전송</button>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:8}}>
            <div style={{fontSize:11,color:C.textMuted}}>남은 대화: 127 / 300회</div>
            <div style={{fontSize:11,color:C.textMuted}}>코인 잔액: 156 🪙</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function CharactersPage(){
  const[filter,setFilter]=useState('전체');
  const[detail,setDetail]=useState(null);
  const cats=['전체','감성','지식','일상','게임','판타지','예술'];
  const filtered=filter==='전체'?CHARACTERS:CHARACTERS.filter(c=>c.category===filter);
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:6}}>캐릭터 탐색</h2>
      <p style={{fontSize:14,color:C.textMuted,marginBottom:20}}>다양한 AI 캐릭터와 대화를 시작해보세요</p>

      <div style={{display:'flex',gap:8,marginBottom:24}}>
        {cats.map(c=><button key={c} onClick={()=>setFilter(c)} style={{padding:'8px 16px',borderRadius:20,border:`1px solid ${filter===c?C.primary:C.border}`,background:filter===c?C.primary:'transparent',color:filter===c?'#fff':C.textLight,fontSize:13,fontWeight:500,cursor:'pointer',transition:'all 150ms'}}>{c}</button>)}
      </div>

  const menus=[
    {name:'채팅 메인',icon:'💬'},
    {name:'캐릭터 탐색',icon:'🤖'},
    {name:'결제 관리',icon:'💎'},
    {name:'관리자 대시보드',icon:'📊'},
    {name:'설정',icon:'⚙️'},
  ];

  const renderPage=()=>{
    switch(page){
      case '채팅 메인':return <ChatMainPage/>;
      case '캐릭터 탐색':return <CharactersPage/>;
      case '결제 관리':return <PaymentPage/>;
      case '관리자 대시보드':return <AdminPage/>;
      case '설정':return <SettingsPage/>;
      default:return <ChatMainPage/>;
    }
  };

  return(
    <div style={{display:'flex',height:'100vh'}}>
      {/* Sidebar */}
      <div style={{width:260,background:C.sidebarBg,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>💬</div>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:C.text}}>CharaChat</div>
              <div style={{fontSize:11,color:C.textMuted}}>AI Character Platform</div>
            </div>
          </div>
        </div>

        <nav style={{flex:1,padding:'12px 14px'}}>
          {menus.map(m=>(
            <button key={m.name} onClick={()=>setPage(m.name)} title={m.name} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'12px 14px',borderRadius:10,border:'none',background:page===m.name?C.sidebarActive:'transparent',color:page===m.name?'#fff':C.textLight,fontSize:14,fontWeight:page===m.name?600:400,cursor:'pointer',marginBottom:4,transition:'all 150ms',textAlign:'left'}}>
              <span style={{fontSize:18}}>{m.icon}</span>{m.name}
            </button>
          ))}
        </nav>

        <div style={{padding:'16px 20px',borderTop:`1px solid ${C.border}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:34,height:34,borderRadius:'50%',background:C.surfaceLight,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>👤</div>
            <div>
              <div style={{fontSize:13,fontWeight:600}}>채팅마스터</div>
              <div style={{fontSize:11,color:C.textMuted}}>베이직 · 156 🪙</div>
            </div>
          </div>
        </div>
      </div>

      {/* Top bar + Content */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'14px 28px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',background:C.surface}}>
          <div style={{fontSize:13,color:C.textMuted}}>
            <span style={{color:C.text,fontWeight:600}}>{page}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <span style={{fontSize:13,color:C.textMuted}}>🪙 156</span>
            <span style={{fontSize:13,padding:'4px 10px',borderRadius:6,background:'rgba(124,58,237,.15)',color:C.primary,fontWeight:600}}>베이직</span>
          </div>
        </div>
        <div style={{flex:1,overflow:'auto',padding:page==='채팅 메인'?0:'28px'}}>
          {renderPage()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
