/* ─── Utils ─── */
function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}
function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14,display:'flex',alignItems:'center',gap:8}}><span style={{color:C.accent}}>✓</span>{message}</div>;
}
function Modal({open,onClose,title,width=560,children}){
  if(!open)return null;
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000}}/>
      <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width,maxHeight:'85vh',background:C.surface,borderRadius:16,boxShadow:'0 24px 48px rgba(0,0,0,0.15)',zIndex:1001,animation:'fadeInScale 250ms ease',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'18px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{fontSize:16,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </>
  );
}
function Badge({text,color}){
  const colors={success:{bg:'#ECFDF5',text:'#059669'},danger:{bg:'#FEF2F2',text:'#DC2626'},warning:{bg:'#FFFBEB',text:'#D97706'},info:{bg:'#F0F9FF',text:'#0284C7'},accent:{bg:'#ECFEFF',text:'#0891B2'},muted:{bg:'#F1F5F9',text:'#64748B'}};
  const c=colors[color]||colors.muted;
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:6,fontSize:11,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}
function Btn({children,variant='primary',size='md',onClick,style:s={}}){
  const base={border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:600,borderRadius:8,transition:'all 150ms',display:'inline-flex',alignItems:'center',gap:6};
  const vars={primary:{background:C.accent,color:'#fff',padding:size==='sm'?'5px 12px':'9px 18px',fontSize:size==='sm'?11:13},secondary:{background:C.bg,color:C.text,padding:size==='sm'?'5px 12px':'9px 18px',fontSize:size==='sm'?11:13,border:`1px solid ${C.border}`},danger:{background:'#FEF2F2',color:C.danger,padding:size==='sm'?'5px 12px':'9px 18px',fontSize:size==='sm'?11:13}};
  return <button onClick={onClick} style={{...base,...vars[variant],...s}} onMouseOver={e=>e.currentTarget.style.opacity='0.85'} onMouseOut={e=>e.currentTarget.style.opacity='1'}>{children}</button>;
}
function Skeleton(){

    <div style={{display:'flex',minHeight:'100vh'}}>

}

function TabStrip({tabs,active,setActive,actions}){
  return(
    <div style={{height:38,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'flex-end',padding:'0 16px',background:C.surface,flexShrink:0}}>
      {tabs.map((t,i)=>(

      ))}
      <div style={{flex:1}}/>{actions}
    </div>
  );
}

/* ─── Documents ─── */
function DocumentsPage(){
  const[toast,setToast]=useState('');
  const[selected,setSelected]=useState(null);
  const TABS=[{id:'pending',label:'진행중'},{id:'completed',label:'완료'}];
  const[tab,setTab]=useState(0);
  const pending=DOC_APPROVALS.filter(a=>a.stageNum<5);
  const completed=DOC_APPROVALS.filter(a=>a.stageNum>=5);
  const list=tab===0?pending:completed;

  const STAGES=['임시저장','AI 생성','1차 검토','2차 승인','최종 승인','발송'];

  return(
    <>
      {toast&&<Toast message={toast} onClose={()=>setToast('')}/>}
      <TabStrip tabs={TABS} active={tab} setActive={setTab} actions={<Btn size="sm" onClick={()=>setToast('AI 서류 패키지 생성을 시작합니다')} style={{marginBottom:4}}>🤖 AI 생성</Btn>}/>
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        <div style={{width:'42%',borderRight:`1px solid ${C.border}`,overflowY:'auto'}}>
          {list.map((a,i)=>(
            <div key={i} onClick={()=>setSelected(a)} style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',background:selected?.id===a.id?`${C.accent}08`:'transparent',borderLeft:selected?.id===a.id?`3px solid ${C.accent}`:'3px solid transparent',transition:'all 150ms'}} onMouseOver={e=>{if(selected?.id!==a.id)e.currentTarget.style.background=`${C.accent}04`}} onMouseOut={e=>{if(selected?.id!==a.id)e.currentTarget.style.background='transparent'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <span style={{fontSize:13,fontWeight:600}}>{a.docSet}</span>
                {a.urgency==='긴급'&&<Badge text="긴급" color="danger"/>}
              </div>
              <div style={{fontSize:11,color:C.textMuted,marginBottom:6}}>{a.docs}</div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11}}>
                <span style={{color:C.accent,fontWeight:600}}>{a.stage}</span>
                <span style={{fontWeight:600}}>{a.amount}</span>
              </div>
              <div style={{display:'flex',gap:2,marginTop:8}}>
                {STAGES.map((_,si)=>(
                  <div key={si} style={{flex:1,height:3,borderRadius:2,background:si<a.stageNum?C.accent:C.border}}/>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div style={{flex:1,overflowY:'auto',padding:20}}>
          {selected?(
            <div style={{animation:'slideInRight 250ms ease'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <div>
                  <h3 style={{fontSize:18,fontWeight:700}}>{selected.docSet}</h3>
                  <div style={{fontSize:12,color:C.textMuted}}>{selected.id} · {selected.date}</div>
                </div>
                <Badge text={selected.stage} color={selected.stageNum>=5?'success':selected.stageNum>=3?'info':'warning'}/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
                {[{l:'금액',v:selected.amount},{l:'서류',v:selected.docs},{l:'승인자',v:selected.approver},{l:'단계',v:`${selected.stageNum}/${selected.totalStages}`}].map((info,i)=>(
                  <div key={i} style={{background:C.bg,borderRadius:8,padding:12}}>
                    <div style={{fontSize:10,color:C.textMuted,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>{info.l}</div>
                    <div style={{fontSize:14,fontWeight:600}}>{info.v}</div>
                  </div>
                ))}
              </div>

              <div style={{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textMuted,marginBottom:10}}>XState 승인 워크플로우</div>
              <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:20}}>
                {STAGES.map((stage,si)=>(
                  <React.Fragment key={si}>
                    <div style={{textAlign:'center',padding:'8px 4px',borderRadius:8,background:si<selected.stageNum?'#ECFDF5':si===selected.stageNum?'#ECFEFF':C.bg,border:`1px solid ${si<selected.stageNum?'#A7F3D0':si===selected.stageNum?'#A5F3FC':C.border}`,flex:1,minWidth:0}}>
                      <div style={{fontSize:10,fontWeight:600,color:si<selected.stageNum?C.success:si===selected.stageNum?C.accent:C.textMuted}}>{stage}</div>
                    </div>
                    {si<5&&<span style={{fontSize:12,color:C.textMuted,flexShrink:0}}>→</span>}
                  </React.Fragment>
                ))}
              </div>

              {selected.stageNum<5&&(
                <div style={{display:'flex',gap:8}}>
                  <Btn onClick={()=>setToast('승인 처리되었습니다')}>✅ 승인</Btn>
                  <Btn variant="danger" onClick={()=>setToast('반려 처리되었습니다')}>❌ 반려</Btn>
                  <Btn variant="secondary" onClick={()=>setToast('위임 처리되었습니다')}>👤 위임</Btn>
                </div>
              )}
            </div>
          ):(
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:C.textMuted,gap:8}}>
              <span style={{fontSize:36}}>📄</span>
              <span style={{fontSize:13}}>좌측에서 서류 패키지를 선택하세요</span>
            </div>
          )}
        </div>
      </div>
    </>
  );
}

/* ─── App ─── */
function App(){
  const[loading,setLoading]=useState(true);
  const[section,setSection]=useState('dashboard');
  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading)return <Skeleton/>;
  const render=()=>{
    switch(section){
      case 'dashboard':return <DashboardPage/>;
      case 'pipeline':return <PipelinePage/>;
      case 'documents':return <DocumentsPage/>;
      case 'analytics':return <AnalyticsPage/>;
      case 'settings':return <SettingsPage/>;
      default:return <DashboardPage/>;
    }
  };
  return(
    <div style={{display:'flex',minHeight:'100vh',maxHeight:'100vh'}}>
      <SideNav section={section} setSection={setSection}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <AppBar section={section}/>
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}} key={section}>
          {render()}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
