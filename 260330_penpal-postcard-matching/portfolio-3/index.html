function Badge({text}){
  const colors={
    '발송준비':{bg:'#FEF3C7',text:'#92400E'},'배송중':{bg:'#DBEAFE',text:'#1D4ED8'},'배송완료':{bg:'#D1FAE5',text:'#065F46'},
    '활성':{bg:'#D1FAE5',text:'#065F46'},'휴면':{bg:'#FEE2E2',text:'#991B1B'},'정지':{bg:'#FEE2E2',text:'#991B1B'},
    'Premium':{bg:'#DBEAFE',text:'#1D4ED8'},'Basic':{bg:'#E0E7FF',text:'#3730A3'},'Free':{bg:'#F1F5F9',text:'#475569'},
    '엽서 교환 중':{bg:'#FEF3C7',text:'#92400E'},'오프라인 전환':{bg:'#D1FAE5',text:'#065F46'},'매칭 대기':{bg:'#E0F2FE',text:'#0284C7'},
    '대기':{bg:'#FEF3C7',text:'#92400E'},'처리중':{bg:'#DBEAFE',text:'#1D4ED8'},'완료':{bg:'#D1FAE5',text:'#065F46'},
    '높음':{bg:'#FEE2E2',text:'#991B1B'},'보통':{bg:'#F1F5F9',text:'#475569'}
  };
  const c=colors[text]||{bg:'#F1F5F9',text:'#475569'};
  return <span style={{padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,animation:'fadeIn .2s'}}>

      <div style={{padding:'18px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3 style={{fontSize:16,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:C.textSec}}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>);
}

// ── Main App ──
function App(){
  const [page,setPage]=useState('운영 대시보드');
  const [collapsed,setCollapsed]=useState(false);
  const menus=[
    {name:'운영 대시보드',icon:'📊'},
    {name:'물류 관리',icon:'📦'},
    {name:'회원·매칭 관리',icon:'👥'},
    {name:'정산·통계 분석',icon:'💰'}
  ];

  const renderPage=()=>{
    switch(page){
      case '운영 대시보드': return <DashboardPage/>;
      case '물류 관리': return <LogisticsPage/>;
      case '회원·매칭 관리': return <MembersPage/>;
      case '정산·통계 분석': return <AnalyticsPage/>;
      default: return <DashboardPage/>;
    }
  };

  return(<div style={{display:'flex',minHeight:'100vh'}}>
    {/* Bright Sidebar */}
    <aside style={{width:collapsed?64:240,background:C.sidebarBg,borderRight:`1px solid ${C.border}`,transition:'width .3s',display:'flex',flexDirection:'column',flexShrink:0}}>
      <div style={{padding:collapsed?'20px 12px':'20px 18px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14,fontWeight:700,flexShrink:0}}>S</div>
        {!collapsed&&<span style={{fontWeight:700,fontSize:15,color:C.secondary}}>SubAdmin</span>}
      </div>
      <nav style={{flex:1,padding:'12px 8px'}}>
        {menus.map(m=>(
          <button key={m.name} onClick={()=>setPage(m.name)} title={m.name}
            style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:collapsed?'11px 0':'11px 12px',borderRadius:8,border:'none',background:page===m.name?C.primary+'12':'transparent',color:page===m.name?C.primary:C.sidebarText,cursor:'pointer',fontSize:13,fontWeight:page===m.name?600:400,marginBottom:2,justifyContent:collapsed?'center':'flex-start',transition:'all .2s'}}>
            <span style={{fontSize:16}}>{m.icon}</span>
            {!collapsed&&m.name}
          </button>
        ))}
      </nav>
      <div style={{padding:'12px 8px',borderTop:`1px solid ${C.border}`}}>
        <button onClick={()=>setCollapsed(!collapsed)} style={{width:'100%',padding:'8px',borderRadius:6,border:'none',background:C.border,color:C.sidebarText,cursor:'pointer',fontSize:12}}>
          {collapsed?'▶':'◀ 접기'}
        </button>
      </div>
    </aside>

    {/* Main */}
    <main style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
      <header style={{height:56,padding:'0 28px',display:'flex',alignItems:'center',justifyContent:'space-between',background:C.surface,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:12,color:C.textSec}}>관리자</span>
          <span style={{color:C.border}}>/</span>
          <span style={{fontSize:12,fontWeight:600}}>{page}</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <span style={{position:'relative',cursor:'pointer',fontSize:16}}>🔔<span style={{position:'absolute',top:-3,right:-5,width:7,height:7,borderRadius:'50%',background:C.danger}}></span></span>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{width:28,height:28,borderRadius:6,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11,fontWeight:600}}>관</div>
            <span style={{fontSize:12,fontWeight:500}}>관리자</span>
          </div>
        </div>
      </header>
      <div style={{flex:1,padding:28,overflow:'auto'}}>
        {renderPage()}
      </div>
    </main>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
