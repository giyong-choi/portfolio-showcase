function Badge({text,variant}){
  const styles={
    popular:{bg:C.primary,text:'#fff'},
    online:{bg:'#D1FAE5',text:'#065F46'},
    offline:{bg:'#DBEAFE',text:'#1D4ED8'},
    hybrid:{bg:'#FEF3C7',text:'#92400E'},
    genre:{bg:C.primary+'15',text:C.primary},
    unread:{bg:C.danger,text:'#fff'}
  };
  const s=styles[variant]||styles.genre;
  return <span style={{padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:s.bg,color:s.text}}>{text}</span>;
}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,animation:'fadeIn .2s'}}>
    <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:20,width:'90%',maxWidth:600,maxHeight:'85vh',overflow:'auto',boxShadow:'0 20px 60px rgba(124,58,237,0.15)'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3 style={{fontSize:17,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSec}}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>);
}

function QuizPage(){
  const [step,setStep]=useState(0);
  const [answers,setAnswers]=useState({});
  const [done,setDone]=useState(false);
  const [selected,setSelected]=useState({});

  const handleSelect=(opt)=>{
    if(quizSteps[step].multi){
      const cur=selected[step]||[];
      const next=cur.includes(opt)?cur.filter(o=>o!==opt):[...cur,opt];
      setSelected({...selected,[step]:next});
    } else {
      setAnswers({...answers,[step]:opt});
      if(step<quizSteps.length-1) setStep(step+1); else setDone(true);
    }
  };

  const proceed=()=>{
    if(quizSteps[step].multi){
      setAnswers({...answers,[step]:selected[step]});
      if(step<quizSteps.length-1) setStep(step+1); else setDone(true);
    }
  };

  if(done) return(
    <div style={{animation:'fadeIn .4s'}}>
      <div style={{background:`linear-gradient(135deg, ${C.primary}, #4C1D95)`,borderRadius:24,padding:'40px',color:'#fff',marginBottom:32,textAlign:'center'}}>
        <h2 style={{fontSize:24,fontWeight:800,marginBottom:8}}>취향 분석 완료! 🎉</h2>
        <p style={{opacity:.85}}>당신만의 독서 DNA를 확인하세요</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24,marginBottom:32}}>
        <div style={{background:C.surface,borderRadius:20,padding:28,boxShadow:'0 4px 24px rgba(124,58,237,0.06)',border:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:20}}>나의 독서 취향 레이더</h3>

              <PolarGrid stroke={C.border}/>
              <PolarAngleAxis dataKey="axis" fontSize={12} tick={{fill:C.text}}/>
              <PolarRadiusAxis angle={30} domain={[0,100]} fontSize={10} tick={{fill:C.textSec}}/>
              <Radar name="나" dataKey="me" stroke={C.primary} fill={C.primary} fillOpacity={0.3}/>
              <Radar name="평균" dataKey="avg" stroke={C.accent} fill={C.accent} fillOpacity={0.15}/>
              <Legend/>
            </RadarChart>
          </ResponsiveContainer>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div style={{background:C.surface,borderRadius:20,padding:24,boxShadow:'0 4px 24px rgba(124,58,237,0.06)',border:`1px solid ${C.border}`}}>
            <h3 style={{fontSize:16,fontWeight:700,marginBottom:12}}>분석 요약</h3>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:13}}>📚 선호 장르</span>
                <span style={{fontWeight:600,color:C.primary}}>문학·에세이</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:13}}>⏰ 독서 빈도</span>
                <span style={{fontWeight:600,color:C.primary}}>1~3시간/주</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:13}}>🏠 모임 방식</span>
                <span style={{fontWeight:600,color:C.primary}}>오프라인</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

            {[clubs[0],clubs[3],clubs[4]].map((c,i)=>(
              <div key={c.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:i<2?`1px solid ${C.border}`:'none'}}>
                <span style={{fontSize:24}}>{c.img}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13}}>{c.name}</div>
                  <div style={{fontSize:11,color:C.textSec}}>{c.genre}</div>

      <div style={{background:`linear-gradient(135deg, ${C.primary}, #4C1D95)`,borderRadius:24,padding:'40px',color:'#fff',marginBottom:32,textAlign:'center'}}>
        <h2 style={{fontSize:24,fontWeight:800,marginBottom:8}}>독서 취향 분석 📊</h2>
        <p style={{opacity:.85}}>5단계 설문으로 딱 맞는 모임을 찾아드려요</p>
      </div>

      <div style={{background:C.surface,borderRadius:20,padding:32,boxShadow:'0 4px 24px rgba(124,58,237,0.06)',border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',gap:4,marginBottom:28}}>
          {quizSteps.map((_,i)=>(
            <div key={i} style={{flex:1,height:6,borderRadius:3,background:i<=step?C.primary:C.border,transition:'all .3s'}}/>
          ))}
        </div>
        <div style={{fontSize:12,color:C.textSec,marginBottom:8}}>STEP {step+1}/{quizSteps.length}</div>
        <h3 style={{fontSize:18,fontWeight:700,marginBottom:20}}>{quizSteps[step].q}</h3>
        <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
          {quizSteps[step].opts.map(opt=>{
            const isSelected=quizSteps[step].multi?(selected[step]||[]).includes(opt):answers[step]===opt;
            return(
              <button key={opt} onClick={()=>handleSelect(opt)}
                style={{padding:'12px 22px',borderRadius:24,border:`2px solid ${isSelected?C.primary:C.border}`,background:isSelected?C.primary+'15':'transparent',color:isSelected?C.primary:C.text,fontWeight:isSelected?600:400,fontSize:14,cursor:'pointer',transition:'all .2s'}}>
                {opt}
              </button>
            );
          })}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:28}}>
          {step>0?<button onClick={()=>setStep(step-1)} style={{padding:'10px 20px',borderRadius:10,background:C.border,color:C.text,border:'none',fontWeight:600,cursor:'pointer'}}>← 이전</button>:<div/>}
          {quizSteps[step].multi&&<button onClick={proceed} style={{padding:'10px 20px',borderRadius:10,background:C.primary,color:'#fff',border:'none',fontWeight:600,cursor:'pointer'}}>{step<quizSteps.length-1?'다음 →':'분석하기 🔍'}</button>}
        </div>
      </div>
    </div>
  );
}

// ── Main App ──
function App(){
  const [page,setPage]=useState('모임 탐색');
  const tabs=[
    {name:'모임 탐색',icon:'📖'},
    {name:'취향 매칭',icon:'📊'},
    {name:'구독 멤버십',icon:'💎'},
    {name:'온라인 토론방',icon:'💬'}
  ];

  const renderPage=()=>{
    switch(page){
      case '모임 탐색': return <ExplorePage/>;
      case '취향 매칭': return <QuizPage/>;
      case '구독 멤버십': return <MembershipPage/>;
      case '온라인 토론방': return <DiscussionPage/>;
      default: return <ExplorePage/>;
    }
  };

  return(<div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
    {/* Top Nav */}
    <header style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'0 40px',display:'flex',alignItems:'center',justifyContent:'space-between',height:64,flexShrink:0,position:'sticky',top:0,zIndex:100}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:24}}>📖</span>
        <span style={{fontWeight:800,fontSize:18,color:C.secondary}}>북클럽</span>
      </div>
      <nav style={{display:'flex',gap:0}}>
        {tabs.map(t=>(
          <button key={t.name} onClick={()=>setPage(t.name)} title={t.name}
            style={{padding:'20px 24px',border:'none',borderBottom:page===t.name?`3px solid ${C.primary}`:'3px solid transparent',background:'none',color:page===t.name?C.primary:C.textSec,fontWeight:page===t.name?600:400,cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',gap:6}}>
            <span>{t.icon}</span>{t.name}
          </button>
        ))}
      </nav>
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        <span style={{cursor:'pointer',fontSize:18}}>🔔</span>
        <div style={{width:34,height:34,borderRadius:'50%',background:`linear-gradient(135deg, ${C.primary}, #4C1D95)`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:600}}>지</div>
      </div>
    </header>

    {/* Content */}
    <main style={{flex:1,padding:'32px 40px',maxWidth:1200,margin:'0 auto',width:'100%'}}>
      {renderPage()}
    </main>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
