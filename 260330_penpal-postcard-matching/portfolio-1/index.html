function Badge({text,color}){
  const colors={
    '매칭가능':{bg:'#D1FAE5',text:'#065F46'},'매칭중':{bg:'#DBEAFE',text:'#1D4ED8'},
    '엽서 교환 중':{bg:'#FEF3C7',text:'#92400E'},'오프라인 전환 제안':{bg:'#EDE9FE',text:'#5B21B6'},
    '인기':{bg:'#FFEDD5',text:'#C2410C'},'추천':{bg:'#DBEAFE',text:'#1D4ED8'},
    '한정':{bg:'#FCE7F3',text:'#BE185D'},'월간':{bg:'#F1F5F9',text:'#475569'},
    '구독중':{bg:'#D1FAE5',text:'#065F46'}
  };
  const c=colors[text]||{bg:'#F1F5F9',text:'#475569'};
  return <span style={{padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function StatCard({icon,label,value,sub,color}){
  return(<div style={{background:C.surface,borderRadius:14,padding:'20px 22px',boxShadow:'0 2px 12px rgba(0,0,0,0.04)',border:`1px solid ${C.border}`,animation:'fadeIn .5s'}}>
    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
      <span style={{fontSize:22,width:40,height:40,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',background:color+'18'}}>{icon}</span>
      <span style={{fontSize:13,color:C.textSec,fontWeight:500}}>{label}</span>
    </div>
    <div style={{fontSize:26,fontWeight:700,color:C.text}}>{value}</div>
    {sub&&<div style={{fontSize:12,color:C.textSec,marginTop:4}}>{sub}</div>}
  </div>);
}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,animation:'fadeIn .2s'}}>
    <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:16,width:'90%',maxWidth:560,maxHeight:'85vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3 style={{fontSize:17,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSec}}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>);
}

              <div>
                <div style={{fontWeight:700,fontSize:15}}>{p.nick}</div>
                <div style={{fontSize:12,color:C.textSec}}>{p.age}</div>
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <Badge text={p.status}/>
              <div style={{fontSize:20,fontWeight:700,color:C.primary,marginTop:6}}>{p.score}%</div>
            </div>
          </div>
          <p style={{fontSize:13,color:C.textSec,marginBottom:12,lineHeight:1.5}}>{p.bio}</p>
          <div style={{display:'flex',gap:6}}>
            {p.tags.map(t=>(
              <span key={t} style={{padding:'4px 10px',borderRadius:12,fontSize:11,background:C.primary+'12',color:C.primary,fontWeight:500}}>#{t}</span>
            ))}
          </div>
        </div>
      ))}
    </div>

    <Modal open={!!selected} onClose={()=>setSelected(null)} title={selected?`${selected.nick} 프로필`:''}>
      {selected&&(
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div style={{textAlign:'center'}}>
            <span style={{fontSize:52}}>{selected.avatar}</span>
            <h3 style={{fontSize:18,fontWeight:700,marginTop:8}}>{selected.nick}</h3>
            <p style={{color:C.textSec,fontSize:13}}>{selected.age} · 매칭 점수 {selected.score}%</p>
          </div>
          <p style={{fontSize:14,lineHeight:1.6,color:C.text,textAlign:'center'}}>{selected.bio}</p>
          <div style={{display:'flex',justifyContent:'center',gap:8}}>
            {selected.tags.map(t=><span key={t} style={{padding:'5px 12px',borderRadius:16,fontSize:12,background:C.primary+'12',color:C.primary,fontWeight:500}}>#{t}</span>)}
          </div>
          <div style={{display:'flex',gap:12,marginTop:8}}>
            <button style={{flex:1,padding:'12px',borderRadius:10,background:C.primary,color:'#fff',border:'none',fontWeight:600,cursor:'pointer'}}>매칭 신청하기 💌</button>
            <button style={{flex:1,padding:'12px',borderRadius:10,background:'transparent',color:C.textSec,border:`1px solid ${C.border}`,fontWeight:600,cursor:'pointer'}}>다음에</button>
          </div>
        </div>
      )}
    </Modal>

    <Modal open={survey} onClose={()=>{setSurvey(false);setStep(0);}} title="성향 설문">
      <div>
        <div style={{display:'flex',gap:4,marginBottom:20}}>
          {surveyQ.map((_,i)=>(
            <div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?C.primary:C.border}}/>
          ))}
        </div>
        <h4 style={{fontSize:15,fontWeight:600,marginBottom:16}}>{surveyQ[step]}</h4>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {surveyOpts[step].map(opt=>(
            <button key={opt} onClick={()=>{setAnswers({...answers,[step]:opt});if(step<3)setStep(step+1);else{setSurvey(false);setStep(0);}}}
              style={{padding:'10px 18px',borderRadius:20,border:`1px solid ${answers[step]===opt?C.primary:C.border}`,background:answers[step]===opt?C.primary+'15':'transparent',color:answers[step]===opt?C.primary:C.text,fontWeight:500,fontSize:13,cursor:'pointer'}}>
              {opt}
            </button>
          ))}
        </div>
        {step>0&&<button onClick={()=>setStep(step-1)} style={{marginTop:16,background:'none',border:'none',color:C.textSec,fontSize:13,cursor:'pointer'}}>← 이전</button>}
      </div>
    </Modal>
  </div>);
}

function PostcardPage(){
  const [composing,setComposing]=useState(false);
  const [selectedTheme,setSelectedTheme]=useState(themes[0]);
  const [text,setText]=useState('');
  const [activeStickers,setActiveStickers]=useState([]);
  const [viewCard,setViewCard]=useState(null);

  return(<div style={{display:'flex',flexDirection:'column',gap:24,animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div>
        <h2 style={{fontSize:22,fontWeight:700}}>온라인 엽서 ✉️</h2>
        <p style={{color:C.textSec,fontSize:14,marginTop:4}}>소중한 마음을 엽서에 담아 보내세요</p>
      </div>
      <button onClick={()=>setComposing(true)} style={{padding:'10px 20px',borderRadius:10,background:C.primary,color:'#fff',border:'none',fontWeight:600,fontSize:13,cursor:'pointer'}}>
        엽서 쓰기 ✏️
      </button>
    </div>

    <div style={{display:'flex',gap:8}}>
      {['전체','받은 엽서','보낸 엽서','임시저장'].map((t,i)=>(
        <button key={t} style={{padding:'7px 16px',borderRadius:20,fontSize:13,fontWeight:500,border:`1px solid ${i===0?C.primary:C.border}`,background:i===0?C.primary+'15':'transparent',color:i===0?C.primary:C.textSec,cursor:'pointer'}}>{t}</button>
      ))}
    </div>

    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {postcards.map(pc=>(
        <div key={pc.id} onClick={()=>setViewCard(pc)} style={{background:C.surface,borderRadius:14,padding:20,boxShadow:'0 2px 12px rgba(0,0,0,0.04)',border:`1px solid ${C.border}`,cursor:'pointer',display:'flex',gap:16,alignItems:'center',position:'relative'}}>
          {!pc.read&&<div style={{position:'absolute',top:10,right:10,width:8,height:8,borderRadius:'50%',background:C.primary}}/>}
          <div style={{width:60,height:60,borderRadius:12,background:pc.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>
            {pc.avatar}
          </div>
          <div style={{flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontWeight:600,fontSize:14}}>{pc.from}</span>
              <span style={{fontSize:12,color:C.textSec}}>{pc.date}</span>
            </div>
            <p style={{fontSize:13,color:C.textSec,lineHeight:1.5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:400}}>{pc.preview}</p>
          </div>
        </div>
      ))}
    </div>

    <Modal open={!!viewCard} onClose={()=>setViewCard(null)} title={viewCard?`${viewCard.from}님의 엽서`:''}>
      {viewCard&&(
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div style={{background:viewCard.bg,borderRadius:14,padding:28,minHeight:200,border:`2px dashed ${C.border}`}}>
            <div style={{textAlign:'right',fontSize:12,color:C.textSec,marginBottom:12}}>{viewCard.date}</div>
            <p style={{fontSize:15,lineHeight:1.8,color:C.text}}>{viewCard.preview}</p>
            <div style={{textAlign:'right',marginTop:20,fontSize:14,fontWeight:600}}>— {viewCard.from} {viewCard.avatar}</div>
          </div>
          <button style={{padding:'12px',borderRadius:10,background:C.primary,color:'#fff',border:'none',fontWeight:600,cursor:'pointer'}}>답장 쓰기 💌</button>
        </div>
      )}
    </Modal>

    <Modal open={composing} onClose={()=>setComposing(false)} title="엽서 쓰기">
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <div>
          <label style={{fontSize:13,fontWeight:600,marginBottom:8,display:'block'}}>받는 사람</label>
          <select style={{width:'100%',padding:'10px 14px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,outline:'none'}}>
            <option>바다향기 🌊</option>
            <option>가을단풍 🍂</option>
          </select>
        </div>
        <div>
          <label style={{fontSize:13,fontWeight:600,marginBottom:8,display:'block'}}>배경 테마</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {themes.map(t=>(
              <button key={t.id} onClick={()=>setSelectedTheme(t)} style={{padding:'8px 14px',borderRadius:10,border:`2px solid ${selectedTheme.id===t.id?t.border:C.border}`,background:t.bg,fontSize:12,cursor:'pointer',fontWeight:500}}>
                {t.emoji} {t.name}
              </button>
            ))}
          </div>
        </div>
        <div style={{background:selectedTheme.bg,borderRadius:14,padding:20,border:`2px solid ${selectedTheme.border}`,minHeight:160}}>
          <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="따뜻한 마음을 담아 엽서를 작성해주세요..." maxLength={500}
            style={{width:'100%',minHeight:120,background:'transparent',border:'none',outline:'none',fontSize:14,lineHeight:1.8,resize:'none',fontFamily:'Pretendard'}}/>
          <div style={{textAlign:'right',fontSize:12,color:C.textSec}}>{text.length}/500</div>
        </div>
        <div>
          <label style={{fontSize:13,fontWeight:600,marginBottom:8,display:'block'}}>스티커</label>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {stickers.map(s=>(
              <button key={s} onClick={()=>setActiveStickers([...activeStickers,s])} style={{width:36,height:36,borderRadius:8,border:`1px solid ${C.border}`,background:C.surface,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                {s}
              </button>
            ))}
          </div>
          {activeStickers.length>0&&(
            <div style={{marginTop:8,display:'flex',gap:4}}>
              {activeStickers.map((s,i)=><span key={i} style={{fontSize:20}}>{s}</span>)}
              <button onClick={()=>setActiveStickers([])} style={{fontSize:11,color:C.textSec,background:'none',border:'none',cursor:'pointer'}}>초기화</button>
            </div>
          )}
        </div>
        <div style={{display:'flex',gap:12}}>
          <button style={{flex:1,padding:'12px',borderRadius:10,background:C.border,color:C.textSec,border:'none',fontWeight:600,cursor:'pointer'}}>임시저장</button>
          <button style={{flex:1,padding:'12px',borderRadius:10,background:C.primary,color:'#fff',border:'none',fontWeight:600,cursor:'pointer'}}>보내기 💌</button>
        </div>
      </div>
    </Modal>
  </div>);
}

function ShopPage(){
  const [tab,setTab]=useState('kit');
  const [cart,setCart]=useState([]);
  const [checkout,setCheckout]=useState(false);

  return(<div style={{display:'flex',flexDirection:'column',gap:24,animation:'fadeIn .4s'}}>
    <div>
      <h2 style={{fontSize:22,fontWeight:700}}>키트 구매 / 결제 🎁</h2>
      <p style={{color:C.textSec,fontSize:14,marginTop:4}}>아날로그 감성을 담은 펜팔 키트를 만나보세요</p>
    </div>

    <div style={{display:'flex',gap:0,borderBottom:`2px solid ${C.border}`}}>
      {[{key:'kit',label:'📦 키트 상품'},{key:'sub',label:'🔄 구독 서비스'},{key:'order',label:'📋 주문 내역'}].map(t=>(
        <button key={t.key} onClick={()=>setTab(t.key)}
          style={{padding:'12px 24px',border:'none',borderBottom:tab===t.key?`2px solid ${C.primary}`:'2px solid transparent',background:'none',fontWeight:tab===t.key?600:400,color:tab===t.key?C.primary:C.textSec,cursor:'pointer',fontSize:14,marginBottom:-2}}>

              <span style={{fontSize:20,fontWeight:700,color:C.primary}}>{k.price.toLocaleString()}원</span>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {subscriptionPlans.map(p=>(
          <div key={p.id} style={{background:C.surface,borderRadius:14,padding:24,boxShadow:p.popular?'0 4px 24px rgba(255,107,53,0.15)':'0 2px 12px rgba(0,0,0,0.04)',border:p.popular?`2px solid ${C.primary}`:`1px solid ${C.border}`,position:'relative'}}>

        <button style={{padding:'14px',borderRadius:10,background:C.primary,color:'#fff',border:'none',fontWeight:700,fontSize:15,cursor:'pointer'}}>
          결제하기 💳

      </div>
    </Modal>
  </div>);
}

// ── Main App ──
function App(){
  const [page,setPage]=useState('홈 대시보드');
  const [sideOpen,setSideOpen]=useState(true);
  const menus=[
    {name:'홈 대시보드',icon:'🏠'},
    {name:'매칭 큐레이션',icon:'💕'},
    {name:'온라인 엽서',icon:'✉️'},
    {name:'키트 구매/결제',icon:'🎁'}
  ];

  const renderPage=()=>{
    switch(page){
      case '홈 대시보드': return <DashboardPage/>;
      case '매칭 큐레이션': return <MatchingPage/>;
      case '온라인 엽서': return <PostcardPage/>;
      case '키트 구매/결제': return <ShopPage/>;
      default: return <DashboardPage/>;
    }
  };

  return(<div style={{display:'flex',minHeight:'100vh'}}>
    {/* Sidebar */}
    <aside style={{width:sideOpen?260:64,background:C.sidebarBg,transition:'width .3s',display:'flex',flexDirection:'column',flexShrink:0}}>
      <div style={{padding:sideOpen?'24px 20px':'24px 12px',borderBottom:'1px solid rgba(255,255,255,0.08)',display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:24}}>💌</span>
        {sideOpen&&<span style={{color:'#fff',fontWeight:700,fontSize:16}}>펜팔 서비스</span>}
      </div>
      <nav style={{flex:1,padding:'12px 8px'}}>
        {menus.map(m=>(
          <button key={m.name} onClick={()=>setPage(m.name)} title={m.name}
            style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:sideOpen?'12px 14px':'12px 0',borderRadius:10,border:'none',background:page===m.name?C.sidebarActive:'transparent',color:page===m.name?'#fff':'rgba(255,255,255,0.6)',cursor:'pointer',fontSize:14,fontWeight:page===m.name?600:400,marginBottom:4,justifyContent:sideOpen?'flex-start':'center',transition:'all .2s'}}>
            <span style={{fontSize:18}}>{m.icon}</span>
            {sideOpen&&m.name}
          </button>
        ))}
      </nav>
      <div style={{padding:'16px 12px',borderTop:'1px solid rgba(255,255,255,0.08)'}}>
        <button onClick={()=>setSideOpen(!sideOpen)} style={{width:'100%',padding:'8px',borderRadius:8,border:'none',background:'rgba(255,255,255,0.06)',color:'rgba(255,255,255,0.5)',cursor:'pointer',fontSize:13}}>
          {sideOpen?'◀ 접기':'▶'}
        </button>
      </div>
    </aside>

    {/* Main */}
    <main style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
      <header style={{height:60,padding:'0 32px',display:'flex',alignItems:'center',justifyContent:'space-between',background:C.surface,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:13,color:C.textSec}}>홈</span>
          <span style={{color:C.border}}>/</span>
          <span style={{fontSize:13,fontWeight:600}}>{page}</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <span style={{position:'relative',cursor:'pointer',fontSize:18}}>🔔<span style={{position:'absolute',top:-4,right:-6,width:8,height:8,borderRadius:'50%',background:C.danger}}></span></span>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:600}}>윤</div>
            <span style={{fontSize:13,fontWeight:500}}>윤서</span>
          </div>
        </div>
      </header>
      <div style={{flex:1,padding:32,overflow:'auto'}}>
        {renderPage()}
      </div>
    </main>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
