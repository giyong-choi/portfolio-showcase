/* ─── Components ─── */
function Badge({text}){
  const colors={'최저가':{bg:'#ECFDF5',c:'#059669'},'유지':{bg:'#F1F5F9',c:'#475569'},'상승':{bg:'#FEF2F2',c:'#DC2626'},'하락':{bg:'#EFF6FF',c:'#2563EB'},'활성':{bg:'#F3E8FF',c:'#7C3AED'},'대기':{bg:'#FEF3C7',c:'#D97706'},'수집중':{bg:'#F3E8FF',c:'#7C3AED'},'차단됨':{bg:'#FEF2F2',c:'#DC2626'},'전송완료':{bg:'#ECFDF5',c:'#059669'},'전송실패':{bg:'#FEF2F2',c:'#DC2626'},'성공':{bg:'#ECFDF5',c:'#059669'},'실패':{bg:'#FEF2F2',c:'#DC2626'}};
  const s=colors[text]||{bg:'#F1F5F9',c:'#475569'};
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:s.bg,color:s.c}}>{text}</span>;
}

function KpiCard({icon,label,value,sub,accent}){
  return(
    <div style={{background:C.surface,borderRadius:16,padding:'20px 24px',boxShadow:'0 4px 16px rgba(124,58,237,0.06)',animation:'slideUp 500ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{fontSize:13,color:C.textMuted,fontWeight:500}}>{label}</span>
        <span style={{fontSize:20}}>{icon}</span>
      </div>
      <div style={{fontSize:28,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{value}</div>
      {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:6}}>{sub}</div>}
    </div>
  );
}

                <div style={{fontSize:16,fontWeight:800,color:C.success}}>{cr.success.toLocaleString()}</div>
              </div>
              <div style={{padding:8,background:'#FAFAFE',borderRadius:8}}>
                <div style={{color:C.textMuted}}>실패</div>
                <div style={{fontSize:16,fontWeight:800,color:C.danger}}>{cr.fail}</div>
              </div>
            </div>
            <div style={{marginTop:10,fontSize:11,color:C.textMuted}}>
              마지막 수집: {cr.lastRun} · 주기: {cr.schedule}
            </div>
          </div>
        ))}
      </div>}

      {tab==='수집 로그'&&<div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
            {['시각','플랫폼','작업','결과','상세'].map(h=><th key={h} style={{padding:'10px 12px',textAlign:'left',color:C.textMuted,fontWeight:600,fontSize:12}}>{h}</th>)}
          </tr></thead>
          <tbody>{CRAWL_LOG.map((l,i)=><tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>
            <td style={{padding:'12px',fontFamily:'monospace',fontSize:12,color:C.textMuted}}>{l.time}</td>
            <td style={{padding:'12px'}}><span style={{padding:'3px 8px',borderRadius:6,background:'#F3E8FF',fontSize:11,fontWeight:600,color:C.primary}}>{l.platform}</span></td>
            <td style={{padding:'12px'}}>{l.action}</td>
            <td style={{padding:'12px'}}><Badge text={l.result}/></td>
            <td style={{padding:'12px',fontSize:12,color:C.textLight}}>{l.detail}</td>
          </tr>)}</tbody>
        </table>
      </div>}
    </div>
  );
}

function ReportPage(){

      <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>가격 리포트</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:20}}>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>기간별 최저가 추이 요약</div>
          {[['최저가 갱신 횟수','148건 (최근 30일)'],['평균 하락률','3.2%'],['가장 많이 변동한 플랫폼','쿠팡 (62건)'],['알림 발송 건수','89건']].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
              <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600,color:C.primary}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>크롤러 성능 요약</div>
          {[['총 수집 건수','11,460건 (오늘)'],['수집 성공률','98.7%'],['평균 수집 시간','1.2초/건'],['차단 발생','1회 (옥션)']].map(([k,v])=>(

              <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600,color:C.primary}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function SettingsPage(){
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>설정</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:20}}>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>크롤링 설정</div>
          {[['기본 딜레이','1~3초 (무작위)'],['프록시 풀','12개 IP 로테이션'],['User-Agent 풀','15종'],['CAPTCHA 감지','자동 프록시 교체']].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>

          ))}

        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>알림 채널 설정</div>
          {[['이메일','admin@priceradar.kr'],['Slack Webhook','#price-alerts 채널'],['알림 형식','HTML 이메일 + Slack Block Kit'],['재시도 정책','3회 (지수 백오프)']].map(([k,v])=>(

              <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600}}>{v}</span>

/* ─── App Shell (topnav-hero) ─── */
function App(){
  const[page,setPage]=useState('가격 모니터링 대시보드');
  const tabs=[
    {name:'가격 모니터링 대시보드',icon:'📊'},
    {name:'상품 관리',icon:'📦'},
    {name:'알림 규칙 설정',icon:'🔔'},
    {name:'크롤러 현황 관리',icon:'🤖'},
    {name:'가격 리포트',icon:'📋'},
    {name:'설정',icon:'⚙️'},
  ];

  const renderPage=()=>{
    switch(page){
      case '가격 모니터링 대시보드':return <DashboardPage/>;
      case '상품 관리':return <ProductPage/>;
      case '알림 규칙 설정':return <AlertRulePage/>;
      case '크롤러 현황 관리':return <CrawlerPage/>;
      case '가격 리포트':return <ReportPage/>;
      case '설정':return <SettingsPage/>;
      default:return <DashboardPage/>;
    }
  };

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column'}}>
      <header style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'0 32px',display:'flex',alignItems:'center',justifyContent:'space-between',height:56,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff',fontWeight:800}}>PR</div>
          <span style={{fontSize:16,fontWeight:800}}>PriceRadar</span>
        </div>
        <nav style={{display:'flex',gap:2}}>
          {tabs.map(t=>(
            <button key={t.name} onClick={()=>setPage(t.name)} title={t.name} style={{padding:'6px 14px',borderRadius:8,border:'none',background:page===t.name?`${C.primary}10`:'transparent',color:page===t.name?C.primary:C.textMuted,fontSize:13,fontWeight:page===t.name?600:400,cursor:'pointer',display:'flex',alignItems:'center',gap:5}}>
              <span style={{fontSize:14}}>{t.icon}</span>{t.name}
            </button>
          ))}
        </nav>
        <span style={{padding:'4px 10px',borderRadius:8,background:'#F3E8FF',color:C.primary,fontSize:12,fontWeight:600}}>Pro Plan</span>
      </header>
      <main style={{flex:1,overflow:'auto',padding:28}}>{renderPage()}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
