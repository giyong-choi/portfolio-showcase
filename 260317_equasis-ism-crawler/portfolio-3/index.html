/* ─── Components ─── */
function Badge({text}){
  const colors={'활성':{bg:'#ECFDF5',c:'#059669'},'쿨다운':{bg:'#FEF3C7',c:'#D97706'},'차단':{bg:'#FEF2F2',c:'#DC2626'},'완료':{bg:'#ECFDF5',c:'#059669'},'진행중':{bg:'#EFF6FF',c:'#2563EB'},'대기':{bg:'#F3F4F6',c:'#6B7280'},'발송완료':{bg:'#ECFDF5',c:'#059669'},'검토중':{bg:'#FEF3C7',c:'#D97706'}};
  const s=colors[text]||{bg:'#F3F4F6',c:'#6B7280'};
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:6,fontSize:12,fontWeight:600,background:s.bg,color:s.c}}>{text}</span>;
}

function KpiCard({icon,label,value,sub,accent}){
  return(
    <div style={{background:C.surface,borderRadius:14,padding:'18px 22px',border:`1px solid ${C.border}`,animation:'slideUp 500ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span>
        <span style={{fontSize:18}}>{icon}</span>
      </div>
      <div style={{fontSize:24,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{value}</div>
      {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:5}}>{sub}</div>}
    </div>
  );
}

      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:16}}>
        {/* Fleet tree */}
        <div style={{background:C.surface,borderRadius:14,padding:18,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>선대 목록</div>
          {FLEETS.map(f=>(
            <div key={f.id} onClick={()=>setSelFleet(f)} style={{padding:12,borderRadius:8,marginBottom:4,cursor:'pointer',background:selFleet?.id===f.id?C.surfaceWarm:'transparent',border:`1px solid ${selFleet?.id===f.id?C.primary:'transparent'}`,transition:'all 150ms'}}>

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>

          </div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
              {['IMO','선박명','선대','선종','ISM Manager','변경'].map(h=><th key={h} style={{padding:'8px 10px',textAlign:'left',color:C.textMuted,fontWeight:600,fontSize:12}}>{h}</th>)}

function SchedulePage(){

            <td style={{padding:'10px'}}><Badge text={a.status}/></td>
            <td style={{padding:'10px'}}>{a.used}</td>
            <td style={{padding:'10px'}}>{a.cooldown?<span style={{color:C.warning,fontSize:12}}>⏳ 대기중</span>:'—'}</td>
          </tr>)}</tbody>
        </table>
      </div>}

      {tab==='배치 모니터'&&<div style={{background:C.surface,borderRadius:14,padding:22,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>현재 배치 진행 상황</div>
        <div style={{padding:16,background:C.surfaceWarm,borderRadius:10,marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <span style={{fontWeight:700}}>VIP 선대 일일 스캔</span>
            <span style={{fontSize:13,color:C.primary,fontWeight:600}}>67% 완료</span>
          </div>
          <div style={{height:10,background:'#D1FAE5',borderRadius:5}}>
            <div style={{width:'67%',height:'100%',borderRadius:5,background:C.primary}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.textMuted,marginTop:6}}>
            <span>134 / 200건 처리</span>
            <span>예상 완료: 08:25</span>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
          {[['처리 속도','4.2건/분'],['사용 계정','eq_auto_01'],['오류 건수','0건']].map(([k,v])=>(
            <div key={k} style={{padding:14,background:'#F9FAFB',borderRadius:8,textAlign:'center'}}>
              <div style={{fontSize:11,color:C.textMuted}}>{k}</div>
              <div style={{fontSize:16,fontWeight:700,color:C.primary}}>{v}</div>
            </div>
          ))}
        </div>
      </div>}
    </div>
  );
}

function WorkflowPage(){
  const[tab,setTab]=useState('워크플로우');
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>알림 워크플로우</h2>

      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {['워크플로우','알림 이력'].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:'7px 14px',borderRadius:8,border:`1px solid ${tab===t?C.primary:C.border}`,background:tab===t?C.primary:'transparent',color:tab===t?'#fff':C.textMuted,fontSize:13,fontWeight:500,cursor:'pointer'}}>{t}</button>)}
      </div>

      {tab==='워크플로우'&&<div>
        <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}>
          <button style={{padding:'7px 14px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 워크플로우 추가</button>
        </div>
        {WORKFLOWS.map(w=>(
          <div key={w.id} style={{background:C.surface,borderRadius:14,padding:20,border:`1px solid ${C.border}`,marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:15,fontWeight:700}}>{w.name}</span>
                <Badge text={w.status}/>
              </div>
              <div style={{display:'flex',gap:6}}>
                {w.channels.map(ch=><span key={ch} style={{padding:'3px 8px',borderRadius:4,background:C.surfaceWarm,fontSize:11,color:C.textLight}}>{ch}</span>)}
              </div>
            </div>
            <div style={{fontSize:12,color:C.textMuted,marginBottom:10}}>트리거: {w.trigger}</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {w.steps.map((s,i)=>(
                <React.Fragment key={i}>
                  <span style={{padding:'6px 12px',borderRadius:6,background:C.surfaceWarm,fontSize:12,fontWeight:500,color:C.text}}>{s}</span>
                  {i<w.steps.length-1&&<span style={{color:C.textMuted}}>→</span>}
                </React.Fragment>
              ))}
            </div>
          </div>
        ))}
      </div>}

      {tab==='알림 이력'&&<div style={{background:C.surface,borderRadius:14,padding:22,border:`1px solid ${C.border}`}}>
        {ALERT_TIMELINE.map((a,i)=>(
          <div key={i} style={{display:'flex',alignItems:'flex-start',gap:14,padding:'12px 0',borderBottom:i<ALERT_TIMELINE.length-1?`1px solid ${C.border}`:'none'}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:a.type==='ISM 변경'?C.danger:a.type==='차단 감지'?C.warning:C.primary,flexShrink:0,marginTop:5}}/>
            <div style={{flex:1}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:13,fontWeight:600}}>{a.type}{a.vessel!=='—'?` — ${a.vessel}`:''}</span>
                <Badge text={a.status}/>
              </div>
              <div style={{fontSize:12,color:C.textMuted}}>{a.detail}</div>
              <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>채널: {a.channel} · {a.time}</div>
            </div>
          </div>
        ))}
      </div>}
    </div>
  );
}

function QualityPage(){
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>데이터 품질 관리</h2>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        <KpiCard icon="📊" label="전체 커버리지" value="97.2%" accent={C.success}/>
        <KpiCard icon="❓" label="누락 데이터" value="296" sub="전체 선박 중"/>
        <KpiCard icon="⏰" label="오래된 데이터" value="66" sub="30일 이상 미갱신"/>
        <KpiCard icon="🔄" label="마지막 전체 스캔" value="12월 1일"/>
      </div>

      <div style={{background:C.surface,borderRadius:14,padding:22,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>선대별 데이터 품질 현황</div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
            {['선대','전체','완료','누락','오래됨','품질 점수'].map(h=><th key={h} style={{padding:'8px 10px',textAlign:'left',color:C.textMuted,fontWeight:600,fontSize:12}}>{h}</th>)}
          </tr></thead>
          <tbody>{QUALITY_DATA.map(q=><tr key={q.fleet} style={{borderBottom:`1px solid ${C.border}`}}>
            <td style={{padding:'10px',fontWeight:600}}>{q.fleet}</td>
            <td style={{padding:'10px'}}>{q.total.toLocaleString()}</td>
            <td style={{padding:'10px',color:C.success}}>{q.complete.toLocaleString()}</td>
            <td style={{padding:'10px',color:C.danger}}>{q.missing}</td>
            <td style={{padding:'10px',color:C.warning}}>{q.stale}</td>
            <td style={{padding:'10px'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:80,height:6,background:'#F3F4F6',borderRadius:3}}>
                  <div style={{width:`${q.score}%`,height:'100%',borderRadius:3,background:q.score>=98?C.success:q.score>=96?C.warning:C.danger}}/>
                </div>
                <span style={{fontWeight:700,color:q.score>=98?C.success:q.score>=96?C.warning:C.danger}}>{q.score}%</span>
              </div>
            </td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>
  );
}

function SettingsPage(){
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>설정</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
        <div style={{background:C.surface,borderRadius:14,padding:22,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>크롤링 설정</div>
          {[['요청 딜레이','2~5초 (무작위)'],['동시 세션','3'],['로테이션 전략','라운드로빈 + 쿨다운'],['CAPTCHA 대응','즉시 계정 교체 + 알림']].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'11px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>

          ))}
        </div>
        <div style={{background:C.surface,borderRadius:14,padding:22,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>알림 채널</div>
          {[['이메일','admin@maritrack.co'],['Slack','#ship-alerts'],['인앱 알림','WebSocket 푸시'],['알림 중복 방지','1시간 내 동일 선박 1회']].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'11px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
              <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600}}>{v}</span>

/* ─── App Shell (bright-workspace) ─── */
function App(){
  const[page,setPage]=useState('통합 분석 대시보드');
  const menus=[
    {name:'통합 분석 대시보드',icon:'📊'},
    {name:'선박 플릿 관리',icon:'🚢'},
    {name:'크롤링 스케줄 관리',icon:'⏱️'},
    {name:'알림 워크플로우',icon:'🔔'},
    {name:'데이터 품질 관리',icon:'✅'},
    {name:'설정',icon:'⚙️'},
  ];

  const renderPage=()=>{
    switch(page){
      case '통합 분석 대시보드':return <DashboardPage/>;
      case '선박 플릿 관리':return <FleetPage/>;
      case '크롤링 스케줄 관리':return <SchedulePage/>;
      case '알림 워크플로우':return <WorkflowPage/>;
      case '데이터 품질 관리':return <QualityPage/>;
      case '설정':return <SettingsPage/>;
      default:return <DashboardPage/>;
    }
  };

  return(
    <div style={{display:'flex',height:'100vh'}}>
      <div style={{width:240,background:C.sidebarBg,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'18px 20px',borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:34,height:34,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🚢</div>
            <div><div style={{fontSize:15,fontWeight:800}}>MarineTrack</div><div style={{fontSize:10,color:C.textMuted}}>해운 데이터 통합 관리</div></div>
          </div>
        </div>
        <nav style={{flex:1,padding:'10px 12px'}}>
          {menus.map(m=>(
            <button key={m.name} onClick={()=>setPage(m.name)} title={m.name} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 12px',borderRadius:8,border:'none',background:page===m.name?`${C.primary}18`:'transparent',color:page===m.name?C.secondary:C.textLight,fontSize:13,fontWeight:page===m.name?600:400,cursor:'pointer',marginBottom:2,transition:'all 150ms',textAlign:'left'}}>
              <span style={{fontSize:16}}>{m.icon}</span>{m.name}
            </button>
          ))}
        </nav>
        <div style={{padding:'14px 18px',borderTop:`1px solid ${C.border}`}}>
          <div style={{fontSize:11,color:C.textMuted}}>시스템 상태</div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:C.success}}/>
            <span style={{fontSize:12,fontWeight:600}}>정상 운영 중</span>
          </div>
        </div>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'12px 24px',borderBottom:`1px solid ${C.border}`,background:C.surface,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <span style={{fontSize:13,fontWeight:600}}>{page}</span>
          <span style={{fontSize:12,color:C.textMuted}}>관리 선박: 10,000척 · 5개 선대</span>
        </div>
        <div style={{flex:1,overflow:'auto',padding:24}}>{renderPage()}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
