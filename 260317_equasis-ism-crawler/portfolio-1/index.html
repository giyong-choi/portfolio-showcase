function Badge({text}){
  const colors={'정상':{bg:'#ECFDF5',c:'#059669'},'변경됨':{bg:'#FEF2F2',c:'#DC2626'},'활성':{bg:'#ECFDF5',c:'#059669'},'쿨다운':{bg:'#FEF3C7',c:'#D97706'},'차단':{bg:'#FEF2F2',c:'#DC2626'},'완료':{bg:'#ECFDF5',c:'#059669'},'대기':{bg:'#EFF6FF',c:'#0066CC'},'진행중':{bg:'#EFF6FF',c:'#0066CC'},'전송완료':{bg:'#ECFDF5',c:'#059669'},'전송실패':{bg:'#FEF2F2',c:'#DC2626'},'sent':{bg:'#ECFDF5',c:'#059669'},'failed':{bg:'#FEF2F2',c:'#DC2626'}};
  const s=colors[text]||{bg:'#F1F5F9',c:'#475569'};
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:6,fontSize:12,fontWeight:600,background:s.bg,color:s.c}}>{text}</span>;
}

function KpiCard({icon,label,value,sub,accent}){
  return(
    <div style={{background:C.surface,borderRadius:10,padding:'20px 24px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`,animation:'slideUp 500ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span>
        <span style={{fontSize:20}}>{icon}</span>
      </div>
      <div style={{fontSize:28,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{value}</div>
      {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:6}}>{sub}</div>}
    </div>
  );
}

              <td style={{padding:'12px',color:C.textMuted,fontSize:12}}>{a.lastUsed}</td>
              <td style={{padding:'12px'}}>{a.cooldown?<span style={{color:C.warning,fontSize:12}}>⏳ 15분 남음</span>:<span style={{color:C.textMuted,fontSize:12}}>—</span>}</td>
            </tr>)}</tbody>
          </table>
        </div>
      </>}

      {tab==='스케줄'&&<div style={{background:C.surface,borderRadius:10,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:700}}>배치 스케줄</div>
          <button style={{padding:'8px 16px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 스케줄 등록</button>
        </div>
        {SCHEDULES.map(s=>(
          <div key={s.id} style={{padding:18,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:16,fontWeight:700}}>{s.name}</span>
                <Badge text={s.status}/>
              </div>
              <span style={{fontFamily:'monospace',padding:'4px 10px',borderRadius:4,background:'#F1F5F9',fontSize:12,color:C.textLight}}>{s.cron}</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,fontSize:12,color:C.textMuted}}>
              <div>대상: {s.target}</div>
              <div>마지막 실행: {s.lastRun}</div>
              <div>다음 실행: {s.nextRun}</div>
            </div>
          </div>
        ))}
      </div>}

      {tab==='딜레이 설정'&&<div style={{background:C.surface,borderRadius:10,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:20}}>크롤링 딜레이 설정</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
          {[['요청 간 딜레이','2~5초 (무작위)'],['계정 전환 간격','50건마다'],['CAPTCHA 감지 시','즉시 중단 + 알림'],['쿨다운 시간','30분'],['최대 재시도','3회'],['타임아웃','30초']].map(([k,v])=>(
            <div key={k} style={{padding:16,background:'#F8FAFC',borderRadius:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:14,color:C.textLight}}>{k}</span>
              <span style={{fontSize:14,fontWeight:600,color:C.primary}}>{v}</span>
            </div>
          ))}
        </div>
      </div>}
    </div>
  );
}

function AlertPage(){
  const[tab,setTab]=useState('변경 감지');
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>변경 감지 알림</h2>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:20}}>
        <KpiCard icon="⚠️" label="이번 달 변경" value="31" accent={C.danger}/>
        <KpiCard icon="📧" label="이메일 발송" value="28" accent={C.success}/>
        <KpiCard icon="❌" label="발송 실패" value="3" accent={C.warning}/>
        <KpiCard icon="👁️" label="열람률" value="89%" accent={C.primary}/>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {['변경 감지','이메일 이력'].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:'8px 18px',borderRadius:8,border:`1px solid ${tab===t?C.primary:C.border}`,background:tab===t?C.primary:'transparent',color:tab===t?'#fff':C.textLight,fontSize:13,fontWeight:600,cursor:'pointer'}}>{t}</button>)}
      </div>

      {tab==='변경 감지'&&<div style={{background:C.surface,borderRadius:10,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>ISM Manager 변경 내역</div>
        {ALERTS.map(a=>(
          <div key={a.id} style={{padding:16,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:15,fontWeight:700}}>{a.vessel}</span>
                <span style={{fontFamily:'monospace',fontSize:12,color:C.textMuted}}>IMO {a.imo}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <Badge text={a.email}/>
                <span style={{fontSize:11,color:C.textMuted}}>{a.detected}</span>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,fontSize:13}}>
              <span style={{color:C.danger,textDecoration:'line-through'}}>{a.prev}</span>
              <span style={{color:C.textMuted}}>→</span>
              <span style={{color:C.success,fontWeight:600}}>{a.current}</span>
            </div>
            <div style={{fontSize:11,color:C.textMuted,marginTop:4}}>수신: {a.recipient}</div>
          </div>
        ))}
      </div>}

      {tab==='이메일 이력'&&<div style={{background:C.surface,borderRadius:10,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
            {['ID','제목','수신자','발송 시각','상태','열람'].map(h=><th key={h} style={{padding:'10px 12px',textAlign:'left',color:C.textLight,fontWeight:600,fontSize:12}}>{h}</th>)}
          </tr></thead>
          <tbody>{EMAIL_LOG.map(e=><tr key={e.id} style={{borderBottom:`1px solid ${C.border}`}}>
            <td style={{padding:'12px',fontFamily:'monospace',fontWeight:600,color:C.primary}}>{e.id}</td>
            <td style={{padding:'12px',fontSize:12}}>{e.subject}</td>
            <td style={{padding:'12px',fontSize:12}}>{e.to}</td>
            <td style={{padding:'12px',color:C.textMuted,fontSize:12}}>{e.sent}</td>
            <td style={{padding:'12px'}}><Badge text={e.status}/></td>
            <td style={{padding:'12px'}}>{e.opens>0?`${e.opens}회`:'—'}</td>
          </tr>)}</tbody>
        </table>
      </div>}
    </div>
  );
}

function SettingsPage(){
  return(
    <div style={{animation:'fadeIn 400ms ease'}}>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>시스템 설정</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:20}}>
        <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>크롤링 설정</div>
          {[['대상 사이트','Equasis (equasis.org)'],['기본 딜레이','2~5초 (무작위)'],['동시 세션 수','3'],['타임아웃','30초'],['최대 재시도','3회']].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
              <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>알림 설정</div>
          {[['SMTP 서버','smtp.company.co.kr'],['발신 주소','shipism@company.co.kr'],['기본 수신자','sales@company.co.kr'],['알림 형식','HTML 이메일'],['실패 재시도','3회 (지수 백오프)']].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
              <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── App Shell ─── */
function App(){
  const[page,setPage]=useState('크롤링 작업 대시보드');
  const menus=[
    {name:'크롤링 작업 대시보드',icon:'📊'},
    {name:'선박 데이터 관리',icon:'🚢'},
    {name:'계정 및 스케줄 관리',icon:'👤'},
    {name:'변경 감지 알림',icon:'🔔'},
    {name:'시스템 설정',icon:'⚙️'},
  ];

  const renderPage=()=>{
    switch(page){
      case '크롤링 작업 대시보드':return <DashboardPage/>;
      case '선박 데이터 관리':return <VesselPage/>;
      case '계정 및 스케줄 관리':return <AccountPage/>;
      case '변경 감지 알림':return <AlertPage/>;
      case '시스템 설정':return <SettingsPage/>;
      default:return <DashboardPage/>;
    }
  };

  return(
    <div style={{display:'flex',height:'100vh'}}>
      <div style={{width:260,background:C.sidebarBg,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'20px 24px',borderBottom:'1px solid rgba(255,255,255,0.1)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🚢</div>
            <div><div style={{fontSize:16,fontWeight:800,color:'#fff'}}>ShipISM</div><div style={{fontSize:11,color:C.sidebarText}}>ISM 조회 자동화</div></div>
          </div>
        </div>
        <nav style={{flex:1,padding:'12px 14px'}}>
          {menus.map(m=>(
            <button key={m.name} onClick={()=>setPage(m.name)} title={m.name} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'12px 14px',borderRadius:10,border:'none',background:page===m.name?C.sidebarActive:'transparent',color:page===m.name?'#fff':C.sidebarText,fontSize:14,fontWeight:page===m.name?600:400,cursor:'pointer',marginBottom:4,transition:'all 150ms',textAlign:'left'}}>
              <span style={{fontSize:18}}>{m.icon}</span>{m.name}
            </button>
          ))}
        </nav>
        <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.1)'}}>
          <div style={{fontSize:11,color:C.sidebarText}}>마지막 배치 실행</div>
          <div style={{fontSize:13,color:'#fff',fontWeight:600}}>2025.06.15 14:23</div>
        </div>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'14px 28px',borderBottom:`1px solid ${C.border}`,background:C.surface,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:13,fontWeight:600}}>{page}</span>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <span style={{padding:'4px 10px',borderRadius:6,background:'#ECFDF5',color:C.success,fontSize:12,fontWeight:600}}>● 시스템 정상</span>
          </div>
        </div>
        <div style={{flex:1,overflow:'auto',padding:28}}>{renderPage()}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
