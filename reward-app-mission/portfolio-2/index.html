                <td style={{padding:'11px 16px',fontSize:11,color:C.sub}}>{c.dept}</td>
                <td style={{padding:'11px 16px',fontSize:12,color:C.sub}}>{c.q}문항</td>
                <td style={{padding:'11px 16px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    <div style={{flex:1,height:5,background:'#EDE9FE',borderRadius:3,overflow:'hidden',maxWidth:80}}>
                      <div style={{width:`${c.rate}%`,height:'100%',background:C.primary,borderRadius:3}}/>
                    </div>
                    <span style={{fontSize:11,color:C.sub,whiteSpace:'nowrap'}}>{c.rate}%</span>
                  </div>
                </td>
                <td style={{padding:'11px 16px',fontSize:12,color:C.sub}}>{c.assigned}명</td>
                <td style={{padding:'11px 16px'}}><Badge s={c.status}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// COURSE PAGE

  const [addModal,setAddModal]=useState(false);
  return (
    <div>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}>
        <button className="btn" onClick={()=>setAddModal(true)} style={{padding:'9px 16px',fontSize:13,background:C.primary,color:'#fff'}}>
          <Ic n="plus" sz={13} cl="#fff"/> 코스 추가
        </button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:14}}>
        {COURSES.map(c=>(
          <div key={c.id} onClick={()=>setSel(c===sel?null:c)} style={{background:'#fff',borderRadius:12,padding:'18px',border:`1px solid ${sel===c?C.primary:'#EDE9FE'}`,cursor:'pointer',transition:'all .15s',boxShadow:sel===c?`0 0 0 2px ${C.accent}40`:'none'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div style={{flex:1,marginRight:12}}>
                <div style={{fontSize:14,fontWeight:600,color:C.secondary,marginBottom:4}}>{c.title}</div>
                <div style={{fontSize:11,color:C.sub}}>{c.dept} · {c.q}문항 · 할당 {c.assigned}명</div>
              </div>
              <Badge s={c.status}/>
            </div>
            <div style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
                <span style={{color:C.sub}}>수료 진행률</span>
                <span style={{color:C.primary,fontWeight:700}}>{c.rate}%</span>
              </div>
              <div style={{height:6,background:'#EDE9FE',borderRadius:3,overflow:'hidden'}}>
                <div style={{width:`${c.rate}%`,height:'100%',background:c.rate>=80?'#059669':C.primary,borderRadius:3}}/>
              </div>
            </div>
            {sel===c&&(
              <div style={{borderTop:'1px solid #F5F3FF',paddingTop:12,marginTop:4,display:'flex',gap:8}}>
                <button className="btn" style={{flex:1,padding:'7px',fontSize:12,background:C.primary,color:'#fff',justifyContent:'center'}}>문항 편집</button>
                <button className="btn" style={{flex:1,padding:'7px',fontSize:12,background:'#EDE9FE',color:C.primary,border:'1px solid #C4B5FD',justifyContent:'center'}}>수료자 보기</button>
                <button className="btn" style={{padding:'7px 10px',fontSize:12,background:'#FEE2E2',color:'#B91C1C',border:'1px solid #FCA5A5'}}>삭제</button>
              </div>
            )}
          </div>
        ))}
      </div>
      {addModal&&(
        <>
          <div style={{position:'fixed',inset:0,background:'rgba(30,27,75,.5)',zIndex:100}} onClick={()=>setAddModal(false)}/>
          <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',animation:'fadeInScale .2s ease',zIndex:101,width:480,background:'#fff',borderRadius:16,boxShadow:'0 20px 60px rgba(0,0,0,.15)',overflow:'hidden'}}>
            <div style={{padding:'18px 22px',borderBottom:'1px solid #EDE9FE',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <h2 style={{fontSize:15,fontWeight:700,color:C.secondary}}>새 코스 추가</h2>
              <button className="btn" onClick={()=>setAddModal(false)} style={{background:'transparent',padding:4,border:'none',color:C.sub}}><Ic n="x" sz={17}/></button>
            </div>
            <div style={{padding:'22px',display:'flex',flexDirection:'column',gap:14}}>
              {[{l:'코스명',ph:'예: 2026년 정보보안 기초'},{l:'대상 부서',ph:'전체 / 특정 부서 선택'},{l:'포인트',ph:'수료 시 지급 포인트 (예: 100)'}].map(f=>(
                <div key={f.l}>
                  <label style={{fontSize:11,fontWeight:600,color:C.sub,display:'block',marginBottom:5}}>{f.l}</label>
                  <input placeholder={f.ph} style={{width:'100%',padding:'9px 12px',border:'1px solid #EDE9FE',borderRadius:8,fontSize:13,fontFamily:'inherit',outline:'none',color:C.secondary}}/>
                </div>
              ))}
              <div style={{display:'flex',gap:8,marginTop:4}}>
                <button className="btn" onClick={()=>setAddModal(false)} style={{flex:1,padding:'9px',fontSize:13,background:'#F8FAFC',color:'#475569',border:'1px solid #E2EAF0',justifyContent:'center'}}>취소</button>
                <button className="btn" onClick={()=>setAddModal(false)} style={{flex:1,padding:'9px',fontSize:13,background:C.primary,color:'#fff',justifyContent:'center'}}>등록</button>
              </div>

};

// PROGRESS PAGE (quiz-taking simulation)
const ProgressPage=()=>{
  const [step,setStep]=useState(0);
  const [ans,setAns]=useState(null);
  const [done,setDone]=useState(false);
  const q=QUIZ_STEPS[step];
  if(done) return (
    <div style={{display:'flex',justifyContent:'center',alignItems:'center',minHeight:400}}>
      <div style={{textAlign:'center',maxWidth:400}}>
        <div style={{width:72,height:72,background:'#DCFCE7',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>
          <Ic n="check" sz={32} cl="#15803D"/>
        </div>
        <h2 style={{fontSize:20,fontWeight:700,color:C.secondary,marginBottom:8}}>퀴즈 완료!</h2>
        <p style={{fontSize:13,color:C.sub,marginBottom:6}}>개인정보보호 법률 이해 과정을 수료하셨습니다.</p>
        <div style={{background:'#EDE9FE',borderRadius:12,padding:'16px 24px',marginBottom:20,display:'inline-block'}}>
          <div style={{fontSize:28,fontWeight:700,color:C.primary}}>+110P</div>
          <div style={{fontSize:11,color:C.sub}}>수료 리워드가 자동 지급됩니다</div>
        </div>
        <div>
          <button className="btn" onClick={()=>{setStep(0);setAns(null);setDone(false)}} style={{padding:'10px 24px',fontSize:13,background:C.primary,color:'#fff'}}>다시 풀기</button>
        </div>
      </div>
    </div>
  );
  return (
    <div style={{display:'flex',justifyContent:'center'}}>
      <div style={{width:'100%',maxWidth:620}}>
        <div style={{background:'#fff',borderRadius:16,border:'1px solid #EDE9FE',overflow:'hidden',boxShadow:'0 4px 20px rgba(124,58,237,.08)'}}>
          <div style={{background:`linear-gradient(135deg, ${C.primary}, #4C1D95)`,padding:'20px 24px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <span style={{color:'rgba(255,255,255,.8)',fontSize:12}}>개인정보보호 법률 이해</span>
              <span style={{color:'#fff',fontSize:12,fontWeight:600}}>Q{step+1} / {QUIZ_STEPS.length}</span>
            </div>
            <div style={{height:5,background:'rgba(255,255,255,.2)',borderRadius:3,overflow:'hidden'}}>
              <div style={{width:`${((step+1)/QUIZ_STEPS.length)*100}%`,height:'100%',background:C.accent,transition:'width .4s'}}/>
            </div>
          </div>
          <div style={{padding:'28px 24px'}}>
            <p style={{fontSize:15,fontWeight:600,color:C.secondary,marginBottom:22,lineHeight:1.6,wordBreak:'keep-all'}}>{q.q}</p>
            {q.type==='ox'&&(
              <div style={{display:'flex',gap:12}}>
                {['O','X'].map(v=>(
                  <button key={v} onClick={()=>setAns(v)} className="btn" style={{flex:1,padding:'20px',fontSize:24,fontWeight:700,justifyContent:'center',background:ans===v?(v===q.answer?'#DCFCE7':'#FEE2E2'):'#F8FAFC',color:ans===v?(v===q.answer?'#15803D':'#B91C1C'):'#475569',border:`2px solid ${ans===v?(v===q.answer?'#86EFAC':'#FCA5A5'):'#E2EAF0'}`,borderRadius:12}}>
                    {v}
                  </button>
                ))}
              </div>
            )}
            {q.type==='multiple'&&(
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {q.opts.map((o,i)=>(
                  <button key={i} onClick={()=>setAns(o)} className="btn" style={{padding:'13px 16px',fontSize:13,justifyContent:'flex-start',background:ans===o?(o===q.answer?'#DCFCE7':'#FEE2E2'):'#F8FAFC',color:ans===o?(o===q.answer?'#15803D':'#B91C1C'):C.secondary,border:`1px solid ${ans===o?(o===q.answer?'#86EFAC':'#FCA5A5'):'#E2EAF0'}`,borderRadius:10}}>
                    <span style={{width:24,height:24,borderRadius:'50%',background:ans===o?(o===q.answer?'#86EFAC':'#FCA5A5'):'#EDE9FE',color:ans===o?(o===q.answer?'#15803D':'#B91C1C'):C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</span>
                    {o}
                  </button>
                ))}
              </div>
            )}
            {ans&&(
              <div style={{marginTop:20}}>
                {ans===q.answer?(
                  <div style={{background:'#DCFCE7',borderRadius:10,padding:'12px 16px',fontSize:13,color:'#15803D',fontWeight:500}}>
                    ✓ 정답입니다!
                  </div>
                ):(
                  <div style={{background:'#FEE2E2',borderRadius:10,padding:'12px 16px',fontSize:13,color:'#B91C1C',fontWeight:500}}>
                    ✗ 오답입니다. 정답: <strong>{q.answer}</strong>
                  </div>
                )}
                <button className="btn" onClick={()=>{if(step<QUIZ_STEPS.length-1){setStep(s=>s+1);setAns(null);}else setDone(true)}} style={{width:'100%',padding:'12px',fontSize:14,background:C.primary,color:'#fff',justifyContent:'center',marginTop:12,borderRadius:10}}>
                  {step<QUIZ_STEPS.length-1?'다음 문제':'결과 확인'}
                </button>
              </div>
            )}
          </div>
        </div>
        <div style={{marginTop:14,background:'#fff',borderRadius:12,border:'1px solid #EDE9FE',padding:'14px 18px',display:'flex',gap:8,flexWrap:'wrap'}}>
          {QUIZ_STEPS.map((_, i)=>(
            <div key={i} style={{width:32,height:32,borderRadius:'50%',background:i<step?C.primary:i===step?C.accent:'#EDE9FE',color:i<=step?'#fff':C.sub,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600}}>{i+1}</div>
          ))}
        </div>
      </div>
    </div>
  );
};

// REWARD PAGE
const RewardPage=()=>{
  const [pg,setPg]=useState(1);
  const [df,setDf]=useState('전체');
  const PER=5;
  const list=REWARDS.filter(r=>df==='전체'||r.type===df);
  const total=Math.ceil(list.length/PER);
  const paged=list.slice((pg-1)*PER,pg*PER);
  const totalPts=REWARDS.reduce((a,b)=>a+b.pts,0);
  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:18}}>
        {[{l:'이번달 총 지급',v:`${totalPts}P`,sub:'전체 임직원',c:C.primary},{l:'자동 지급',v:`${REWARDS.filter(r=>r.type==='자동지급').length}건`,sub:'수료 완료 즉시',c:'#059669'},{l:'수동 지급',v:`${REWARDS.filter(r=>r.type==='수동지급').length}건`,sub:'관리자 직접 지급',c:'#D97706'}].map((s,i)=>(
          <div key={i} style={{background:'#fff',borderRadius:12,padding:'18px',border:'1px solid #EDE9FE'}}>
            <div style={{fontSize:12,color:C.sub,marginBottom:8}}>{s.l}</div>
            <div style={{fontSize:24,fontWeight:700,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:C.sub,marginTop:3}}>{s.sub}</div>
          </div>
        ))}
      </div>
      <div style={{background:'#fff',borderRadius:12,border:'1px solid #EDE9FE',overflow:'hidden'}}>
        <div style={{padding:'12px 16px',borderBottom:'1px solid #F5F3FF',display:'flex',gap:6,alignItems:'center'}}>
          {['전체','자동지급','수동지급'].map(t=>(
            <button key={t} className="btn" onClick={()=>{setDf(t);setPg(1)}} style={{padding:'5px 12px',fontSize:11,background:df===t?C.primary:'#F8FAFC',color:df===t?'#fff':'#6B7280',border:`1px solid ${df===t?C.primary:'#E2EAF0'}`}}>{t}</button>
          ))}
          <button className="btn" style={{marginLeft:'auto',padding:'5px 10px',fontSize:11,background:'#EDE9FE',color:C.primary,border:'1px solid #C4B5FD'}}>
            <Ic n="dl" sz={11} cl={C.primary}/> CSV 내보내기
          </button>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'#FAF5FF'}}>
            {['임직원','부서','수료 코스','지급 포인트','지급일','유형'].map(h=>(
              <th key={h} style={{padding:'9px 16px',textAlign:'left',fontSize:11,fontWeight:600,color:C.sub}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {paged.map(r=>(
              <tr key={r.id} className="tr" style={{borderTop:'1px solid #F5F3FF'}}>
                <td style={{padding:'11px 16px',fontSize:13,fontWeight:500,color:C.secondary}}>{r.name}</td>
                <td style={{padding:'11px 16px',fontSize:12,color:C.sub}}>{r.dept}</td>
                <td style={{padding:'11px 16px',fontSize:12,color:C.sub,maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.course}</td>
                <td style={{padding:'11px 16px',fontSize:13,fontWeight:700,color:C.primary}}>{r.pts}P</td>
                <td style={{padding:'11px 16px',fontSize:11,color:C.sub}}>{r.date}</td>
                <td style={{padding:'11px 16px'}}><Badge s={r.type}/></td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',borderTop:'1px solid #F5F3FF'}}>
          <span style={{fontSize:11,color:C.sub}}>총 {list.length}건</span>
          <div style={{display:'flex',gap:3}}>
            <button className="btn" onClick={()=>setPg(p=>Math.max(1,p-1))} disabled={pg===1} style={{padding:'5px 9px',fontSize:11,background:'#F8FAFC',color:'#475569',border:'1px solid #E2EAF0',opacity:pg===1?.5:1}}>이전</button>
            {Array.from({length:total},(_,i)=>i+1).map(n=>(
              <button key={n} className="btn" onClick={()=>setPg(n)} style={{padding:'5px 8px',fontSize:11,background:n===pg?C.primary:'#F8FAFC',color:n===pg?'#fff':'#475569',border:`1px solid ${n===pg?C.primary:'#E2EAF0'}`}}>{n}</button>
            ))}
            <button className="btn" onClick={()=>setPg(p=>Math.min(total,p+1))} disabled={pg===total} style={{padding:'5px 9px',fontSize:11,background:'#F8FAFC',color:'#475569',border:'1px solid #E2EAF0',opacity:pg===total?.5:1}}>다음</button>
          </div>
        </div>
      </div>
    </div>
  );
};

// MEMBERS PAGE
const MembersPage=()=>{
  const [q,setQ]=useState('');
  const [df,setDf]=useState('전체');
  const list=MEMBERS.filter(m=>(df==='전체'||m.dept===df)&&m.name.includes(q));
  const depts=['전체','개발팀','디자인팀','마케팅팀','영업팀','경영지원'];
  return (
    <div>
      <div style={{background:'#fff',borderRadius:12,padding:'14px 16px',border:'1px solid #EDE9FE',marginBottom:14,display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:1,minWidth:180}}>
          <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)'}}><Ic n="srch" sz={14} cl="#9CA3AF"/></span>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="임직원명 검색..." style={{width:'100%',padding:'7px 10px 7px 30px',border:'1px solid #EDE9FE',borderRadius:8,fontSize:13,outline:'none',fontFamily:'inherit',color:C.secondary}}/>
        </div>
        <select value={df} onChange={e=>setDf(e.target.value)} style={{padding:'7px 10px',border:'1px solid #EDE9FE',borderRadius:8,fontSize:13,fontFamily:'inherit',color:C.secondary,outline:'none',cursor:'pointer'}}>
          {depts.map(d=><option key={d}>{d}</option>)}
        </select>
      </div>
      <div style={{background:'#fff',borderRadius:12,border:'1px solid #EDE9FE',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'#FAF5FF'}}>
            {['임직원','부서','완료 코스','누적 포인트','진행 상태'].map(h=>(
              <th key={h} style={{padding:'9px 16px',textAlign:'left',fontSize:11,fontWeight:600,color:C.sub}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {list.map(m=>(
              <tr key={m.id} className="tr" style={{borderTop:'1px solid #F5F3FF'}}>
                <td style={{padding:'12px 16px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:9}}>
                    <div style={{width:32,height:32,borderRadius:'50%',background:C.primary+'22',color:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,flexShrink:0}}>{m.name[0]}</div>
                    <span style={{fontSize:13,fontWeight:500,color:C.secondary}}>{m.name}</span>
                  </div>
                </td>
                <td style={{padding:'12px 16px',fontSize:12,color:C.sub}}>{m.dept}</td>
                <td style={{padding:'12px 16px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    <span style={{fontSize:13,fontWeight:700,color:C.primary}}>{m.done}</span>
                    <span style={{fontSize:11,color:C.sub}}>/ {m.total}</span>
                    <div style={{flex:1,height:4,background:'#EDE9FE',borderRadius:2,overflow:'hidden',maxWidth:60}}>
                      <div style={{width:`${(m.done/m.total)*100}%`,height:'100%',background:m.done===m.total?'#059669':C.primary}}/>
                    </div>
                  </div>
                </td>
                <td style={{padding:'12px 16px',fontSize:13,fontWeight:700,color:C.primary}}>{m.pts}P</td>
                <td style={{padding:'12px 16px'}}><Badge s={m.status}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const App=()=>{
  const [page,setPage]=useState('main');
  const [loading,setLoading]=useState(false);
  const nav=p=>{
    if(p===page)return;
    setLoading(true);
    setPage(p);
    setTimeout(()=>setLoading(false),1500);
  };
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:C.bg,overflow:'hidden'}}>
      <Topnav page={page} nav={nav}/>
      <Hero page={page}/>
      <div style={{flex:1,overflowY:'auto',padding:'20px 28px'}}>
        {loading?<Skeleton/>:(
          page==='main'?<Dashboard/>:
          page==='course'?<CoursePage/>:
          page==='progress'?<ProgressPage/>:
          page==='reward'?<RewardPage/>:
          <MembersPage/>
        )}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
