  const [f,setF]=useState('전체');
  const [retried,setRetried]=useState([]);
  const filtered=LOGS.filter(l=>f==='전체'||l.status===f);
  const ok=LOGS.filter(l=>l.status==='성공').length;
  const fail=LOGS.filter(l=>l.status==='실패').length;
  const pend=LOGS.filter(l=>l.status==='대기').length;
  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:18}}>
        {[{l:'성공',v:ok,c:'#059669',bg:'#DCFCE7'},{l:'실패',v:fail,c:'#B91C1C',bg:'#FEE2E2'},{l:'대기 중',v:pend,c:'#D97706',bg:'#FEF9C3'}].map(s=>(
          <div key={s.l} style={{background:'#fff',borderRadius:12,padding:'18px',border:'1px solid #E2EAF0'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:12,color:C.sub}}>오늘 {s.l}</span>
              <span style={{background:s.bg,color:s.c,fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:10}}>{s.l}</span>
            </div>
            <div style={{fontSize:26,fontWeight:700,color:s.c,marginTop:8}}>{s.v}건</div>
          </div>
        ))}
      </div>
      <div style={{background:'#fff',borderRadius:12,border:'1px solid #E2EAF0',overflow:'hidden'}}>
        <div style={{padding:'11px 14px',borderBottom:'1px solid #E2EAF0',display:'flex',gap:4,alignItems:'center',flexWrap:'wrap'}}>
          {['전체','성공','실패','대기'].map(t=>(
            <button key={t} className="btn" onClick={()=>setF(t)} style={{padding:'5px 12px',fontSize:11,background:f===t?C.primary:'#F8FAFC',color:f===t?'#fff':'#6B7280',border:`1px solid ${f===t?C.primary:'#E2EAF0'}`}}>{t}</button>
          ))}
          <button className="btn" style={{marginLeft:'auto',padding:'5px 10px',fontSize:11,background:'#F8FAFC',color:C.sub,border:'1px solid #E2EAF0'}}>
            <Ic n="ref" sz={11}/> 새로고침
          </button>
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{background:'#F8FAFC'}}>
              {['요청 시간','미션명','매체사','사용자 ID','상태','응답코드','액션'].map(h=>(
                <th key={h} style={{padding:'9px 14px',textAlign:'left',fontSize:11,fontWeight:600,color:C.sub,whiteSpace:'nowrap'}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {filtered.map(l=>(
                <tr key={l.id} className="tr" style={{borderTop:'1px solid #F1F5F9'}}>
                  <td style={{padding:'10px 14px',fontSize:11,color:C.sub,whiteSpace:'nowrap'}}>{l.time}</td>
                  <td style={{padding:'10px 14px',fontSize:12,fontWeight:500,color:C.secondary,maxWidth:170,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.mission}</td>
                  <td style={{padding:'10px 14px',fontSize:12,color:C.sub}}>{l.platform}</td>
                  <td style={{padding:'10px 14px',fontSize:11,fontFamily:'monospace',color:C.sub}}>{l.uid}</td>
                  <td style={{padding:'10px 14px'}}><Badge s={l.status}/></td>
                  <td style={{padding:'10px 14px',fontSize:11,fontFamily:'monospace',fontWeight:700,color:l.code==='200'?'#059669':l.code==='-'?'#9CA3AF':'#B91C1C'}}>{l.code}</td>
                  <td style={{padding:'10px 14px'}}>
                    {l.status==='실패'&&(
                      <button className="btn" onClick={()=>setRetried(p=>[...p,l.id])} style={{padding:'3px 9px',fontSize:10,background:retried.includes(l.id)?'#DCFCE7':'#FEE2E2',color:retried.includes(l.id)?'#15803D':'#B91C1C',border:`1px solid ${retried.includes(l.id)?'#86EFAC':'#FCA5A5'}`}}>
                        {retried.includes(l.id)?'✓ 재시도됨':'재시도'}
                      </button>
                    )}
                    {l.status==='성공'&&<span style={{fontSize:10,color:'#9CA3AF'}}>—</span>}
                    {l.status==='대기'&&<span style={{fontSize:10,color:'#D97706'}}>처리 중</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// STATS PAGE

  const [rng,setRng]=useState('7일');
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <h2 style={{fontSize:15,fontWeight:700,color:C.secondary}}>미션 참여 통계</h2>
        <div style={{display:'flex',gap:3}}>
          {['7일','30일','90일'].map(r=>(
            <button key={r} className="btn" onClick={()=>setRng(r)} style={{padding:'5px 12px',fontSize:11,background:rng===r?C.primary:'#fff',color:rng===r?'#fff':'#6B7280',border:`1px solid ${rng===r?C.primary:'#E2EAF0'}`}}>{r}</button>
          ))}
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        <div style={{background:'#fff',borderRadius:12,padding:'18px',border:'1px solid #E2EAF0'}}>
          <h3 style={{fontSize:12,fontWeight:600,color:C.secondary,marginBottom:14}}>일별 미션 완료 수</h3>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={WEEKLY}>
              <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9"/>
              <XAxis dataKey="day" tick={{fontSize:10,fill:'#94A3B8'}}/>
              <YAxis tick={{fontSize:10,fill:'#94A3B8'}}/>
              <Tooltip contentStyle={{borderRadius:8,border:'none',fontSize:12}}/>
              <Bar dataKey="v" fill={C.accent} radius={[4,4,0,0]} name="완료 수"/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:'#fff',borderRadius:12,padding:'18px',border:'1px solid #E2EAF0'}}>
          <h3 style={{fontSize:12,fontWeight:600,color:C.secondary,marginBottom:14}}>매체사별 미션 분포</h3>
          <ResponsiveContainer width="100%" height={180}>
            <PieChart>
              <Pie data={PDIST} cx="50%" cy="50%" outerRadius={65} dataKey="value" paddingAngle={3}>
                {PDIST.map((_,i)=><Cell key={i} fill={PCOL[i]}/>)}
              </Pie>
              <Tooltip contentStyle={{borderRadius:8,border:'none',fontSize:12}}/>
            </PieChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div style={{background:'#fff',borderRadius:12,border:'1px solid #E2EAF0',overflow:'hidden'}}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid #E2EAF0'}}>
          <h3 style={{fontSize:12,fontWeight:600,color:C.secondary}}>퀴즈 유형별 완료 통계</h3>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'#F8FAFC'}}>
            {['퀴즈 유형','총 응답','정답 수','정답률','분포'].map(h=>(
              <th key={h} style={{padding:'9px 16px',textAlign:'left',fontSize:11,fontWeight:600,color:C.sub}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {QDATA.map((r,i)=>{
              const rate=Math.round(r.ok/r.cnt*100);
              return (
                <tr key={i} className="tr" style={{borderTop:'1px solid #F1F5F9'}}>
                  <td style={{padding:'11px 16px',fontSize:13,fontWeight:500,color:C.secondary}}>{r.type}</td>
                  <td style={{padding:'11px 16px',fontSize:12,color:C.sub}}>{r.cnt}건</td>
                  <td style={{padding:'11px 16px',fontSize:12,color:C.sub}}>{r.ok}건</td>
                  <td style={{padding:'11px 16px',fontSize:13,fontWeight:700,color:rate>=80?'#059669':rate>=60?'#D97706':'#B91C1C'}}>{rate}%</td>
                  <td style={{padding:'11px 16px'}}>
                    <div style={{height:5,background:'#E2EAF0',borderRadius:3,overflow:'hidden',width:100}}>
                      <div style={{width:`${Math.round(r.cnt/QDATA.reduce((a,b)=>a+b.cnt,0)*100)}%`,height:'100%',background:PCOL[i%3],borderRadius:3}}/>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const SettingsPage=()=>(
  <div>
    <div style={{background:'#fff',borderRadius:12,border:'1px solid #E2EAF0',padding:'22px',maxWidth:560}}>
      <h3 style={{fontSize:14,fontWeight:700,color:C.secondary,marginBottom:18}}>광고주 설정</h3>
      {[{l:'회사명',v:'갤러피테크'},{l:'담당자',v:'이마케팅'},{l:'이메일',v:'marketing@gallerpy.co.kr'},{l:'API 키',v:'gp_api_••••••••••••••••'}].map((f,i)=>(
        <div key={i} style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:600,color:C.sub,display:'block',marginBottom:5}}>{f.l}</label>
          <input defaultValue={f.v} style={{width:'100%',padding:'9px 12px',border:'1px solid #E2EAF0',borderRadius:8,fontSize:13,fontFamily:'inherit',outline:'none',color:C.secondary}}/>
        </div>
      ))}
      <button className="btn" style={{padding:'9px 22px',fontSize:13,background:C.primary,color:'#fff'}}>저장</button>
    </div>
  </div>
);

const App=()=>{
  const [page,setPage]=useState('main');
  const [loading,setLoading]=useState(false);
  const nav=p=>{
    if(p===page)return;
    setLoading(true);
    setPage(p);
    setTimeout(()=>setLoading(false),1500);
  };
  return (
    <div style={{display:'flex',height:'100vh',background:C.bg,overflow:'hidden'}}>
      <Sidebar page={page} nav={nav}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <Header page={page}/>
        <div style={{flex:1,overflowY:'auto',padding:'20px 22px'}}>
          {loading?<Skeleton/>:(
            page==='main'?<Dashboard/>:
            page==='mission'?<MissionPage/>:
            page==='quiz'?<QuizPage/>:
            page==='postback'?<PostbackPage/>:
            page==='stats'?<StatsPage/>:
            <SettingsPage/>
          )}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
