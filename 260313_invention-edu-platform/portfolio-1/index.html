<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청소년 창의발명 아이디어 개발 플랫폼</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Pretendard',sans-serif; background:#FFF8F0; color:#1A202C; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-thumb { background:#ddd; border-radius:3px; }

.layout { display:flex; min-height:100vh; }

/* Sidebar */
.sidebar { width:260px; background:#fff; border-right:1px solid #f0e6da; display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; }
.sidebar-logo { padding:24px 20px; border-bottom:1px solid #f0e6da; }
.sidebar-logo h1 { font-size:15px; font-weight:700; color:#FF6B35; line-height:1.4; }
.sidebar-logo span { font-size:11px; color:#718096; display:block; margin-top:4px; }
.sidebar-nav { flex:1; padding:12px 0; overflow-y:auto; }
.sidebar-nav button { width:100%; text-align:left; padding:12px 20px; border:none; background:none; cursor:pointer; font-size:14px; color:#718096; font-family:inherit; display:flex; align-items:center; gap:10px; transition:all .15s; }
.sidebar-nav button:hover { background:#FFF0E6; color:#FF6B35; }
.sidebar-nav button.active { background:#FFF0E6; color:#FF6B35; font-weight:600; border-right:3px solid #FF6B35; }
.sidebar-nav button svg { width:18px; height:18px; flex-shrink:0; }
.sidebar-user { padding:16px 20px; border-top:1px solid #f0e6da; display:flex; align-items:center; gap:10px; }
.sidebar-user .avatar { width:34px; height:34px; border-radius:50%; background:#FF6B35; color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; }
.sidebar-user .uinfo { font-size:12px; }
.sidebar-user .uname { font-weight:600; color:#1A202C; }
.sidebar-user .uid { color:#718096; font-size:11px; }

/* Main */
.main { margin-left:260px; flex:1; }
.topbar { background:#fff; border-bottom:1px solid #f0e6da; padding:0 32px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.topbar-title { font-size:16px; font-weight:600; }
.topbar-actions { display:flex; align-items:center; gap:12px; }
.topbar-actions .badge { background:#FF6B35; color:#fff; font-size:10px; padding:2px 7px; border-radius:10px; }
.content { padding:28px 32px; }

/* Cards */
.card { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); padding:20px; }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.card-title { font-size:14px; font-weight:600; color:#1A202C; }

/* Stats */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.stat-card { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); padding:20px; }
.stat-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:12px; }
.stat-value { font-size:24px; font-weight:700; color:#1A202C; }
.stat-label { font-size:12px; color:#718096; margin-top:4px; }
.stat-change { font-size:11px; margin-top:6px; display:flex; align-items:center; gap:4px; }

/* Grid layouts */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }

/* Progress */
.progress-bar { height:8px; background:#f0e6da; border-radius:4px; overflow:hidden; }
.progress-fill { height:100%; border-radius:4px; transition:width .5s; }

/* Table */
.data-table { width:100%; border-collapse:collapse; }
.data-table th { text-align:left; padding:10px 12px; font-size:12px; color:#718096; font-weight:500; border-bottom:1px solid #f0e6da; }
.data-table td { padding:10px 12px; font-size:13px; border-bottom:1px solid #f5f0eb; }
.data-table tr:hover td { background:#FFFBF7; }

/* Tags */
.tag { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; }
.tag-orange { background:#FFF0E6; color:#FF6B35; }
.tag-green { background:#E6F9F0; color:#38A169; }
.tag-blue { background:#E6F0FF; color:#3182CE; }
.tag-gray { background:#F0F0F0; color:#718096; }
.tag-red { background:#FEE2E2; color:#E53E3E; }

/* Step wizard */
.step-track { display:flex; gap:0; margin-bottom:24px; position:relative; }
.step-item { flex:1; text-align:center; position:relative; }
.step-item::after { content:''; position:absolute; top:16px; left:50%; width:100%; height:2px; background:#f0e6da; z-index:0; }
.step-item:last-child::after { display:none; }
.step-circle { width:32px; height:32px; border-radius:50%; background:#f0e6da; color:#718096; display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; position:relative; z-index:1; }
.step-item.completed .step-circle { background:#48BB78; color:#fff; }
.step-item.active .step-circle { background:#FF6B35; color:#fff; }
.step-label { font-size:11px; color:#718096; margin-top:6px; }
.step-item.active .step-label { color:#FF6B35; font-weight:600; }

/* Card grid for learning cards */
.learning-card { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); overflow:hidden; transition:transform .15s, box-shadow .15s; cursor:pointer; }
.learning-card:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.1); }
.learning-card .lc-badge { padding:4px 10px; font-size:10px; font-weight:600; display:inline-block; border-radius:0 0 8px 0; }
.learning-card .lc-body { padding:16px; }
.learning-card .lc-title { font-size:14px; font-weight:600; margin-bottom:6px; }
.learning-card .lc-desc { font-size:12px; color:#718096; line-height:1.5; }
.learning-card .lc-tags { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }

/* Feedback */
.feedback-item { padding:16px; border:1px solid #f0e6da; border-radius:10px; margin-bottom:12px; }
.feedback-item .fi-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.feedback-item .fi-anon { font-size:12px; color:#718096; }
.feedback-item .fi-time { font-size:11px; color:#A0AEC0; }
.feedback-item .fi-body { font-size:13px; line-height:1.6; color:#2D3748; }
.feedback-item .fi-reply { background:#FFF8F0; border-radius:8px; padding:12px; margin-top:10px; font-size:12px; color:#4A5568; }
.feedback-item .fi-reply strong { color:#FF6B35; }

/* Buttons */
.btn { padding:8px 16px; border-radius:8px; border:none; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; transition:all .15s; }
.btn-primary { background:#FF6B35; color:#fff; }
.btn-primary:hover { background:#E85D2B; }
.btn-outline { background:none; border:1px solid #FF6B35; color:#FF6B35; }
.btn-sm { padding:5px 12px; font-size:12px; }

/* Admin table section */
.admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.admin-filters { display:flex; gap:8px; }
.admin-filters select, .admin-filters input { padding:7px 12px; border:1px solid #e2d9ce; border-radius:8px; font-size:12px; font-family:inherit; background:#fff; }

/* Notifications bell */
.noti-dot { width:7px; height:7px; background:#E53E3E; border-radius:50%; position:absolute; top:-2px; right:-2px; }

/* Mission card */
.mission-card { background:linear-gradient(135deg,#FF6B35 0%,#FF8F5E 100%); border-radius:12px; padding:20px; color:#fff; }
.mission-card h3 { font-size:15px; font-weight:600; margin-bottom:8px; }
.mission-card p { font-size:12px; opacity:.9; line-height:1.5; }

/* Idea card */
.idea-card { background:#fff; border-radius:12px; border:1px solid #f0e6da; padding:16px; transition:all .15s; }
.idea-card:hover { border-color:#FF6B35; }
.idea-card .ic-level { font-size:11px; font-weight:600; margin-bottom:6px; }
.idea-card .ic-title { font-size:14px; font-weight:600; margin-bottom:4px; }
.idea-card .ic-desc { font-size:12px; color:#718096; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, RadialBarChart, RadialBar, Legend, PieChart, Pie, Cell, LineChart, Line } = Recharts;

const NAV_ITEMS = [
  { id:'dashboard', label:'아이디어 개발 대시보드', icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> },
  { id:'idea-steps', label:'단계별 아이디어 고도화', icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> },
  { id:'learning-cards', label:'카드형 교보재 라이브러리', icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg> },
  { id:'feedback', label:'익명 피드백 채널', icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg> },
  { id:'admin', label:'관리자 대시보드', icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg> },
];

/* ============ Dashboard Page ============ */
function DashboardPage() {
  const levelData = [
    { name:'Level 1', completed:75, fill:'#FF6B35' },
    { name:'Level 2', completed:52, fill:'#48BB78' },
    { name:'Level 3', completed:28, fill:'#3182CE' },
  ];
  const weeklyData = [
    { week:'1주차', ideas:12, feedbacks:8 },
    { week:'2주차', ideas:18, feedbacks:14 },
    { week:'3주차', ideas:24, feedbacks:19 },
    { week:'4주차', ideas:31, feedbacks:26 },
  ];
  return (
    <div>
      <div className="stats-row">
        <div className="stat-card">
          <div className="stat-icon" style={{background:'#FFF0E6'}}><span>💡</span></div>
          <div className="stat-value">47</div>
          <div className="stat-label">등록된 아이디어</div>
          <div className="stat-change" style={{color:'#48BB78'}}>▲ 이번 주 +8건</div>
        </div>
        <div className="stat-card">
          <div className="stat-icon" style={{background:'#E6F9F0'}}><span>🎯</span></div>
          <div className="stat-value">Level 2</div>
          <div className="stat-label">현재 진행 레벨</div>
          <div className="stat-change" style={{color:'#3182CE'}}>3단계 진행 중</div>
        </div>
        <div className="stat-card">
          <div className="stat-icon" style={{background:'#E6F0FF'}}><span>📚</span></div>
          <div className="stat-value">24</div>
          <div className="stat-label">활용한 교보재 카드</div>
          <div className="stat-change" style={{color:'#718096'}}>전체 86장 중</div>
        </div>
        <div className="stat-card">
          <div className="stat-icon" style={{background:'#FAF5FF'}}><span>💬</span></div>
          <div className="stat-value">15</div>
          <div className="stat-label">받은 피드백</div>
          <div className="stat-change" style={{color:'#E53E3E'}}>미답변 3건</div>
        </div>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-header">
            <span className="card-title">레벨별 진행 현황</span>
            <span className="tag tag-orange">전체 12단계</span>
          </div>
          <div style={{marginBottom:16}}>
            {['Level 1 — 기초 아이디어 도출','Level 2 — 아이디어 구체화','Level 3 — 아이디어 완성'].map((lv,i) => (
              <div key={i} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:12,fontWeight:500}}>{lv}</span>
                  <span style={{fontSize:11,color:'#718096'}}>{[75,52,28][i]}%</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width:`${[75,52,28][i]}%`,background:['#FF6B35','#48BB78','#3182CE'][i]}}/>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="mission-card">
          <h3>🎯 오늘의 미션</h3>
          <p style={{marginBottom:12}}>Level 2 — 3단계: 과학원리 카드를 활용하여 아이디어의 기술 요소를 3가지 이상 연결해 보세요.</p>
          <div style={{display:'flex',gap:8}}>
            <button className="btn" style={{background:'#fff',color:'#FF6B35',fontWeight:600}}>미션 시작하기</button>
            <button className="btn" style={{background:'rgba(255,255,255,.2)',color:'#fff',border:'1px solid rgba(255,255,255,.4)'}}>카드 보기</button>
          </div>
        </div>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-header">
            <span className="card-title">주간 활동 추이</span>
          </div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={weeklyData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f0e6da"/>
              <XAxis dataKey="week" tick={{fontSize:11}} stroke="#A0AEC0"/>
              <YAxis tick={{fontSize:11}} stroke="#A0AEC0"/>
              <Tooltip contentStyle={{borderRadius:8,fontSize:12}}/>
              <Bar dataKey="ideas" fill="#FF6B35" name="아이디어" radius={[4,4,0,0]}/>
              <Bar dataKey="feedbacks" fill="#48BB78" name="피드백" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>

        <div className="card">
          <div className="card-header">
            <span className="card-title">최근 피드백 알림</span>
            <button className="btn btn-sm btn-outline">전체 보기</button>
          </div>
          {[
            { anon:'익명 #12', msg:'아이디어의 실용성이 높아 보입니다. 비용 측면도 고려해 보세요.', time:'10분 전', status:'미답변' },
            { anon:'교사', msg:'Level 2 — 2단계 승인되었습니다. 다음 단계로 진행하세요.', time:'1시간 전', status:'승인' },
            { anon:'익명 #7', msg:'비슷한 아이디어를 발전시키면 좋겠어요. 참고 카드를 남깁니다.', time:'3시간 전', status:'답변완료' },
          ].map((f,i) => (
            <div key={i} style={{padding:'10px 0',borderBottom:i<2?'1px solid #f5f0eb':'none',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontSize:12,fontWeight:500,marginBottom:3}}>{f.anon}</div>
                <div style={{fontSize:12,color:'#718096'}}>{f.msg}</div>
              </div>
              <div style={{textAlign:'right',flexShrink:0,marginLeft:12}}>
                <span className={`tag ${f.status==='미답변'?'tag-red':f.status==='승인'?'tag-green':'tag-gray'}`}>{f.status}</span>
                <div style={{fontSize:10,color:'#A0AEC0',marginTop:4}}>{f.time}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="card" style={{marginTop:20}}>
        <div className="card-header">
          <span className="card-title">나의 아이디어 목록</span>
          <button className="btn btn-primary btn-sm">+ 새 아이디어</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
          {[
            { level:'Level 3', title:'스마트 분리수거 알림 시스템', desc:'AI 이미지 인식으로 분리수거 종류를 자동 판별', step:'4/4 완료', color:'#3182CE' },
            { level:'Level 2', title:'소음 차단 자동 커튼 장치', desc:'소음 감지 센서 기반 자동 차단 시스템', step:'3/4 진행 중', color:'#48BB78' },
            { level:'Level 1', title:'태양광 충전 보조배터리 거치대', desc:'공공장소 거치대에 태양광 패널 설치', step:'2/4 진행 중', color:'#FF6B35' },
          ].map((idea,i) => (
            <div key={i} className="idea-card">
              <div className="ic-level" style={{color:idea.color}}>{idea.level}</div>
              <div className="ic-title">{idea.title}</div>
              <div className="ic-desc">{idea.desc}</div>
              <div style={{marginTop:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:11,color:'#718096'}}>{idea.step}</span>
                </div>
                <div className="progress-bar" style={{height:5}}>
                  <div className="progress-fill" style={{width:[100,75,50][i]+'%',background:idea.color}}/>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ============ Idea Steps Page ============ */
function IdeaStepsPage() {
  const [currentStep, setCurrentStep] = useState(2);
  const steps = [
    { label:'문제 발견', done:true },
    { label:'아이디어 도출', done:true },
    { label:'기술 요소 연결', done:false, active:true },
    { label:'실현 가능성 검토', done:false },
  ];
  const diagnosisQuestions = [
    { q:'아이디어에 적용할 과학원리를 선택했나요?', options:['예, 선택 완료','아직 탐색 중','어떤 것이 좋을지 모르겠음'] },
    { q:'해결하려는 문제의 대상을 구체적으로 정의했나요?', options:['명확히 정의함','대략 정함','아직 모호함'] },
  ];
  return (
    <div>
      <div className="card" style={{marginBottom:20}}>
        <div className="card-header">
          <span className="card-title">Level 2 — 아이디어 구체화</span>
          <span className="tag tag-green">진행 중</span>
        </div>
        <div className="step-track">
          {steps.map((s,i) => (
            <div key={i} className={`step-item ${s.done?'completed':''} ${s.active?'active':''}`}>
              <div className="step-circle">{s.done?'✓':i+1}</div>
              <div className="step-label">{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-header">
            <span className="card-title">📋 3단계: 기술 요소 연결</span>
