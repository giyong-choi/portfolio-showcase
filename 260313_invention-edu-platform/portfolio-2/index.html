<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프리랜서 프로젝트 역량 개발 플랫폼</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',sans-serif;background:#FAF5FF;color:#1E1B4B;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:#d4c4f0;border-radius:3px;}

/* Top Nav */
.topnav{background:#fff;border-bottom:1px solid #ede4f7;position:sticky;top:0;z-index:100;padding:0 40px;}
.topnav-inner{display:flex;align-items:center;justify-content:space-between;height:60px;}
.topnav-logo{display:flex;align-items:center;gap:10px;}
.topnav-logo h1{font-size:16px;font-weight:700;color:#7C3AED;}
.topnav-logo span{font-size:11px;color:#6D28D9;background:#F3E8FF;padding:2px 8px;border-radius:10px;}
.topnav-tabs{display:flex;gap:0;height:60px;}
.topnav-tabs button{padding:0 20px;height:100%;border:none;background:none;font-size:13px;font-weight:500;color:#6D28D9;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all .15s;}
.topnav-tabs button:hover{color:#7C3AED;background:#FDFAFF;}
.topnav-tabs button.active{color:#7C3AED;font-weight:600;border-bottom-color:#7C3AED;}
.topnav-right{display:flex;align-items:center;gap:14px;}
.topnav-right .avatar{width:32px;height:32px;border-radius:50%;background:#7C3AED;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}

/* Hero */
.hero{background:linear-gradient(135deg,#7C3AED 0%,#A78BFA 60%,#C4B5FD 100%);padding:48px 40px 40px;color:#fff;}
.hero h2{font-size:26px;font-weight:700;margin-bottom:8px;line-height:1.3;}
.hero p{font-size:14px;opacity:.85;max-width:600px;line-height:1.6;}
.hero-stats{display:flex;gap:32px;margin-top:24px;}
.hero-stat .hs-value{font-size:28px;font-weight:700;}
.hero-stat .hs-label{font-size:12px;opacity:.75;margin-top:2px;}

/* Content */
.content{padding:32px 40px;max-width:1200px;margin:0 auto;}

/* Card */
.card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(124,58,237,.08);padding:24px;margin-bottom:20px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.card-title{font-size:15px;font-weight:600;color:#1E1B4B;}

/* Tags */
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.tag-purple{background:#F3E8FF;color:#7C3AED;}
.tag-green{background:#ECFDF5;color:#059669;}
.tag-blue{background:#EFF6FF;color:#2563EB;}
.tag-orange{background:#FFF7ED;color:#EA580C;}
.tag-red{background:#FEF2F2;color:#DC2626;}
.tag-gray{background:#F3F4F6;color:#6B7280;}

/* Grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}

/* Stat card */
.stat-card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(124,58,237,.08);padding:20px;}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px;}
.stat-value{font-size:24px;font-weight:700;}
.stat-label{font-size:12px;color:#6D28D9;margin-top:4px;}

/* Buttons */
.btn{padding:8px 18px;border-radius:12px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-primary{background:#7C3AED;color:#fff;}
.btn-primary:hover{background:#6D28D9;}
.btn-outline{background:none;border:1px solid #7C3AED;color:#7C3AED;}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:10px;}
.btn-white{background:#fff;color:#7C3AED;font-weight:600;}

/* Roadmap */
.roadmap-track{display:flex;gap:16px;margin-bottom:24px;}
.roadmap-level{flex:1;border-radius:16px;padding:20px;position:relative;overflow:hidden;}
.roadmap-level h3{font-size:14px;font-weight:600;margin-bottom:4px;}
.roadmap-level p{font-size:11px;opacity:.8;}
.roadmap-steps{margin-top:14px;}
.roadmap-step{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.15);}
.roadmap-step:last-child{border:none;}
.rs-check{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
.rs-info{flex:1;}
.rs-name{font-size:12px;font-weight:500;}
.rs-desc{font-size:10px;opacity:.7;}

/* Progress bar */
.progress-bar{height:6px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden;margin-top:12px;}
.progress-fill{height:100%;border-radius:3px;}

/* Guide cards */
.guide-card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(124,58,237,.08);overflow:hidden;transition:all .15s;cursor:pointer;}
.guide-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(124,58,237,.15);}
.gc-type-bar{height:4px;}
.gc-body{padding:16px;}
.gc-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:8px;display:inline-block;margin-bottom:8px;}
.gc-title{font-size:14px;font-weight:600;margin-bottom:6px;}
.gc-desc{font-size:12px;color:#6D28D9;line-height:1.5;}
.gc-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;}

/* Code review */
.review-item{border:1px solid #ede4f7;border-radius:14px;padding:18px;margin-bottom:14px;transition:all .15s;}
.review-item:hover{border-color:#A78BFA;}
.ri-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.ri-anon{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;}
.ri-time{font-size:11px;color:#A78BFA;}
.ri-body{font-size:13px;color:#4C1D95;line-height:1.65;}
.ri-code{background:#1E1B4B;color:#E9D5FF;border-radius:10px;padding:14px;margin:12px 0;font-family:'Fira Code',monospace;font-size:12px;line-height:1.6;overflow-x:auto;}
.ri-reply{background:#F5F3FF;border-radius:10px;padding:14px;margin-top:10px;font-size:12px;color:#5B21B6;}

/* Table */
.data-table{width:100%;border-collapse:collapse;}
.data-table th{text-align:left;padding:10px 12px;font-size:12px;color:#6D28D9;font-weight:500;border-bottom:1px solid #ede4f7;}
.data-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid #F5F3FF;}
.data-table tr:hover td{background:#FDFAFF;}

/* Profile section */
.profile-header{display:flex;gap:24px;align-items:center;margin-bottom:24px;}
.profile-avatar{width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,#7C3AED,#A78BFA);color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;}
.profile-info h3{font-size:18px;font-weight:600;margin-bottom:4px;}
.profile-info p{font-size:13px;color:#6D28D9;}
.badge-list{display:flex;gap:8px;margin-top:8px;}
.badge-item{background:#F3E8FF;color:#7C3AED;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:500;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis, PieChart, Pie, Cell, LineChart, Line } = Recharts;

const TABS = [
  { id:'hub', label:'역량 개발 메인 허브' },
  { id:'roadmap', label:'단계별 프로젝트 로드맵' },
  { id:'guides', label:'가이드 콘텐츠 카드 시스템' },
  { id:'code-review', label:'익명 코드리뷰 피드백' },
  { id:'profile', label:'역량 프로필' },
];

/* ============ Hub Page ============ */
function HubPage() {
  const trackData = [
    { name:'프론트엔드', progress:72, projects:4, color:'#7C3AED', icon:'🎨' },
    { name:'백엔드', progress:58, projects:3, color:'#059669', icon:'⚙️' },
    { name:'풀스택', progress:35, projects:2, color:'#EA580C', icon:'🔧' },
  ];
  const weeklyData = [
    { week:'W1', 학습시간:12, 제출:3 },
    { week:'W2', 학습시간:18, 제출:5 },
    { week:'W3', 학습시간:15, 제출:4 },
    { week:'W4', 학습시간:22, 제출:7 },
  ];
  return (
    <div>
      <div className="grid-3" style={{marginBottom:24}}>
        {trackData.map((t,i) => (
          <div key={i} className="card" style={{borderTop:`4px solid ${t.color}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <div>
                <span style={{fontSize:24}}>{t.icon}</span>
                <h3 style={{fontSize:16,fontWeight:600,marginTop:6}}>{t.name} 트랙</h3>
                <p style={{fontSize:12,color:'#6D28D9',marginTop:2}}>프로젝트 {t.projects}개 수행</p>
              </div>
              <span style={{fontSize:22,fontWeight:700,color:t.color}}>{t.progress}%</span>
            </div>
            <div className="progress-bar" style={{background:'#F3E8FF',height:8}}>
              <div className="progress-fill" style={{width:`${t.progress}%`,background:t.color}}/>
            </div>
            <div style={{marginTop:12,display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:11,color:'#6D28D9'}}>다음: {['상태관리 심화','인증 시스템','배포 자동화'][i]}</span>
              <button className="btn btn-sm btn-outline">이어하기 →</button>
            </div>
          </div>
        ))}
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-header">
            <span className="card-title">주간 활동 추이</span>
          </div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={weeklyData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#ede4f7"/>
              <XAxis dataKey="week" tick={{fontSize:11}} stroke="#A78BFA"/>
              <YAxis tick={{fontSize:11}} stroke="#A78BFA"/>
              <Tooltip contentStyle={{borderRadius:12,fontSize:12}}/>
              <Bar dataKey="학습시간" fill="#7C3AED" name="학습시간(h)" radius={[6,6,0,0]}/>
              <Bar dataKey="제출" fill="#A78BFA" name="제출 수" radius={[6,6,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div className="card">
          <div className="card-header">
            <span className="card-title">추천 가이드 콘텐츠</span>
            <button className="btn btn-sm btn-outline">전체 보기</button>
          </div>
          {[
            { type:'코드', color:'#7C3AED', title:'React Custom Hook 패턴 가이드', level:'Intermediate' },
            { type:'개념', color:'#059669', title:'RESTful API 설계 원칙', level:'Beginner' },
            { type:'체크리스트', color:'#EA580C', title:'프로젝트 포트폴리오 작성 체크리스트', level:'Advanced' },
          ].map((g,i) => (
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:i<2?'1px solid #F5F3FF':'none'}}>
              <div style={{width:36,height:36,borderRadius:10,background:g.color+'18',color:g.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,flexShrink:0}}>{g.type}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500}}>{g.title}</div>
                <div style={{fontSize:11,color:'#A78BFA'}}>{g.level}</div>
              </div>
              <span className="tag tag-purple">추천</span>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <span className="card-title">최근 피드백 알림</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12}}>
          {[
            { mentor:'시니어 멘토', msg:'Custom Hook의 의존성 배열 관리가 잘 되어 있습니다. useCallback 적용도 고려해보세요.', time:'15분 전', status:'새 리뷰' },
            { mentor:'코드리뷰봇', msg:'API 에러 핸들링 패턴 검토 완료. try-catch 구조 개선 의견을 남겼습니다.', time:'2시간 전', status:'확인 필요' },
          ].map((n,i) => (
            <div key={i} style={{border:'1px solid #ede4f7',borderRadius:14,padding:16}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <span style={{fontSize:12,fontWeight:600,color:'#7C3AED'}}>{n.mentor}</span>
                <span className={`tag ${n.status==='새 리뷰'?'tag-purple':'tag-orange'}`}>{n.status}</span>
              </div>
              <p style={{fontSize:12,color:'#4C1D95',lineHeight:1.5}}>{n.msg}</p>
              <span style={{fontSize:10,color:'#A78BFA',marginTop:6,display:'block'}}>{n.time}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ============ Roadmap Page ============ */
function RoadmapPage() {
  const levels = [
    { name:'Beginner', color:'#059669', bg:'#ECFDF5', steps:[
      { name:'환경 설정', desc:'개발 환경 세팅 및 Git 기초', done:true },
      { name:'HTML/CSS 기초', desc:'시멘틱 마크업 + Flexbox/Grid', done:true },
      { name:'JavaScript 핵심', desc:'ES6+ 문법 + DOM 조작', done:true },
      { name:'첫 프로젝트 제출', desc:'포트폴리오용 랜딩 페이지', done:true },
    ]},
    { name:'Intermediate', color:'#7C3AED', bg:'#F5F3FF', steps:[
      { name:'React 기초', desc:'컴포넌트 + 상태 관리', done:true },
      { name:'API 연동', desc:'REST API + React Query', done:true },
      { name:'상태관리 심화', desc:'Recoil/Zustand 패턴', done:false, active:true },
      { name:'테스트 작성', desc:'Jest + React Testing Library', done:false },
      { name:'프로젝트 제출', desc:'CRUD 웹 앱 구현', done:false },
    ]},
    { name:'Advanced', color:'#EA580C', bg:'#FFF7ED', steps:[
      { name:'TypeScript 도입', desc:'타입 시스템 + 제네릭', done:false },
      { name:'성능 최적화', desc:'메모이제이션 + 코드 스플리팅', done:false },
      { name:'배포 자동화', desc:'CI/CD + Docker 기초', done:false },
      { name:'풀스택 프로젝트', desc:'프론트+백엔드 통합', done:false },
    ]},
  ];
  return (
    <div>
      <div className="card" style={{marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div className="card-title">프론트엔드 트랙 로드맵</div>
            <div style={{fontSize:12,color:'#6D28D9',marginTop:4}}>Intermediate — 3단계 진행 중 · 전체 13단계 중 6단계 완료</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <span className="tag tag-green">Beginner 완료</span>
            <span className="tag tag-purple">Intermediate 진행 중</span>
            <span className="tag tag-gray">Advanced 잠금</span>
          </div>
        </div>
      </div>

      <div className="roadmap-track">
        {levels.map((lv,li) => (
          <div key={li} className="roadmap-level" style={{background:lv.bg,border:`1px solid ${lv.color}22`}}>
            <h3 style={{color:lv.color}}>{lv.name}</h3>
            <p style={{color:lv.color}}>{lv.steps.length}단계 · {lv.steps.filter(s=>s.done).length} 완료</p>
            <div className="progress-bar" style={{background:lv.color+'22'}}>
              <div className="progress-fill" style={{width:`${(lv.steps.filter(s=>s.done).length/lv.steps.length*100)}%`,background:lv.color}}/>
            </div>
            <div className="roadmap-steps">
              {lv.steps.map((s,si) => (
                <div key={si} className="roadmap-step" style={{borderColor:lv.color+'22'}}>
                  <div className="rs-check" style={{background:s.done?lv.color:s.active?lv.color+'33':'#E5E7EB',color:s.done?'#fff':s.active?lv.color:'#9CA3AF'}}>
                    {s.done?'✓':si+1}
                  </div>
                  <div className="rs-info">
                    <div className="rs-name" style={{color:s.active?lv.color:'#1E1B4B'}}>{s.name}</div>
                    <div className="rs-desc" style={{color:'#6D28D9'}}>{s.desc}</div>
                  </div>
                  {s.active && <span className="tag tag-purple" style={{fontSize:9}}>진행 중</span>}
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-header">
            <span className="card-title">🔍 스킬 진단</span>
          </div>
          <p style={{fontSize:13,color:'#4C1D95',lineHeight:1.6,marginBottom:16}}>현재 단계에 맞는 진단 질문에 답하면 맞춤 학습 경로를 제안합니다.</p>
          {[
            { q:'상태관리 라이브러리 경험이 있나요?', opts:['Redux 사용 경험 있음','Context API만 사용','처음 접함'] },
            { q:'비동기 처리 패턴을 알고 있나요?', opts:['async/await 능숙','Promise 기본 이해','아직 어려움'] },
          ].map((d,di) => (
            <div key={di} style={{marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:500,marginBottom:6}}>{d.q}</div>
              {d.opts.map((o,oi) => (
                <label key={oi} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',fontSize:12,color:'#4C1D95',cursor:'pointer'}}>
                  <input type="radio" name={`diag-${di}`} defaultChecked={oi===0} style={{accentColor:'#7C3AED'}}/>
                  {o}
                </label>
              ))}
            </div>
          ))}
          <button className="btn btn-primary" style={{width:'100%',marginTop:8}}>진단 결과 확인 →</button>
        </div>
        <div className="card">
          <div className="card-header">
            <span className="card-title">📋 현재 단계 체크리스트</span>
            <span className="tag tag-purple">Intermediate — 3단계</span>
          </div>
          {[
            { text:'Recoil Atom 기본 개념 학습', done:true },
            { text:'Selector 파생 상태 구현 실습', done:true },
            { text:'AtomEffect로 localStorage 연동', done:false },
            { text:'Zustand 기본 스토어 패턴 구현', done:false },
            { text:'React Query + 전역 상태 조합 패턴 학습', done:false },
            { text:'미니 프로젝트: 투두 앱 리팩토링', done:false },
          ].map((c,i) => (
            <label key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid #F5F3FF',fontSize:13,cursor:'pointer'}}>
              <input type="checkbox" defaultChecked={c.done} style={{accentColor:'#7C3AED',width:16,height:16}}/>
              <span style={{textDecoration:c.done?'line-through':'none',color:c.done?'#A78BFA':'#1E1B4B'}}>{c.text}</span>
            </label>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ============ Guides Page ============ */
function GuidesPage() {
  const [filter, setFilter] = useState('all');
  const cards = [
