<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청소년 특허·발명 교육 통합 관리 시스템</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',sans-serif;background:#F0F9FF;color:#0F172A;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px;}

.layout{display:flex;min-height:100vh;}

/* Bright Sidebar */
.sidebar{width:240px;background:#fff;border-right:1px solid #E2E8F0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;gap:10px;}
.sidebar-logo .logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#0066CC,#38BDF8);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;}
.sidebar-logo .logo-text{font-size:13px;font-weight:600;color:#0066CC;line-height:1.3;}
.sidebar-logo .logo-sub{font-size:10px;color:#475569;}
.sidebar-nav{flex:1;padding:8px;overflow-y:auto;}
.sidebar-nav button{width:100%;text-align:left;padding:10px 12px;border:none;background:none;cursor:pointer;font-size:13px;color:#475569;font-family:inherit;display:flex;align-items:center;gap:9px;border-radius:8px;transition:all .12s;margin-bottom:2px;}
.sidebar-nav button:hover{background:#F0F9FF;color:#0066CC;}
.sidebar-nav button.active{background:#EFF6FF;color:#0066CC;font-weight:600;}
.sidebar-nav button svg{width:17px;height:17px;flex-shrink:0;}
.sidebar-section{padding:4px 12px;font-size:10px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 4px;}
.sidebar-footer{padding:12px 16px;border-top:1px solid #E2E8F0;display:flex;align-items:center;gap:10px;}
.sidebar-footer .sf-avatar{width:32px;height:32px;border-radius:8px;background:#0066CC;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
.sidebar-footer .sf-name{font-size:12px;font-weight:500;color:#0F172A;}
.sidebar-footer .sf-role{font-size:10px;color:#64748B;}

/* Main */
.main{margin-left:240px;flex:1;}
.topbar{background:#fff;border-bottom:1px solid #E2E8F0;padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-size:15px;font-weight:600;}
.topbar-breadcrumb{font-size:12px;color:#64748B;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-right select{padding:5px 10px;border:1px solid #E2E8F0;border-radius:6px;font-size:11px;font-family:inherit;color:#475569;}
.content{padding:24px 28px;}

/* Cards */
.card{background:#fff;border-radius:10px;border:1px solid #E2E8F0;padding:18px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.card-title{font-size:14px;font-weight:600;color:#0F172A;}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat-card{background:#fff;border-radius:10px;border:1px solid #E2E8F0;padding:16px;display:flex;align-items:flex-start;gap:12px;}
.stat-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.stat-body{}
.stat-value{font-size:22px;font-weight:700;color:#0F172A;}
.stat-label{font-size:11px;color:#64748B;margin-top:2px;}
.stat-change{font-size:10px;margin-top:4px;display:flex;align-items:center;gap:3px;}

/* Tags */
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;}
.tag-blue{background:#EFF6FF;color:#0066CC;}
.tag-green{background:#ECFDF5;color:#059669;}
.tag-orange{background:#FFF7ED;color:#EA580C;}
.tag-red{background:#FEF2F2;color:#DC2626;}
.tag-gray{background:#F1F5F9;color:#64748B;}
.tag-cyan{background:#ECFEFF;color:#0891B2;}

/* Grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.grid-23{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px;}

/* Table */
.data-table{width:100%;border-collapse:collapse;}
.data-table th{text-align:left;padding:8px 10px;font-size:11px;color:#64748B;font-weight:500;border-bottom:1px solid #E2E8F0;background:#F8FAFC;}
.data-table td{padding:8px 10px;font-size:12px;border-bottom:1px solid #F1F5F9;}
.data-table tr:hover td{background:#F8FAFC;}

/* Buttons */
.btn{padding:6px 14px;border-radius:6px;border:none;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .12s;}
.btn-primary{background:#0066CC;color:#fff;}
.btn-primary:hover{background:#0052A3;}
.btn-outline{background:none;border:1px solid #0066CC;color:#0066CC;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-danger{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;}

/* Progress */
.progress-bar{height:6px;background:#E2E8F0;border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;}

/* Inline tabs */
.inline-tabs{display:flex;gap:0;border-bottom:1px solid #E2E8F0;margin-bottom:16px;}
.inline-tabs button{padding:8px 16px;border:none;background:none;font-size:12px;font-weight:500;color:#64748B;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all .12s;}
.inline-tabs button.active{color:#0066CC;border-bottom-color:#0066CC;font-weight:600;}

/* Workflow steps */
.wf-track{display:flex;gap:8px;margin-bottom:20px;}
.wf-step{flex:1;text-align:center;position:relative;}
.wf-step .wf-bar{height:4px;background:#E2E8F0;border-radius:2px;margin-bottom:8px;}
.wf-step.done .wf-bar{background:#059669;}
.wf-step.active .wf-bar{background:#0066CC;}
.wf-step .wf-num{font-size:10px;font-weight:600;color:#64748B;}
.wf-step .wf-name{font-size:10px;color:#94A3B8;margin-top:2px;}
.wf-step.active .wf-num{color:#0066CC;}
.wf-step.active .wf-name{color:#0066CC;}
.wf-step.done .wf-num{color:#059669;}

/* AI hint panel */
.ai-hint{background:linear-gradient(135deg,#EFF6FF,#F0F9FF);border:1px solid #BFDBFE;border-radius:10px;padding:16px;}
.ai-hint .ai-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ai-hint .ai-header span{font-size:13px;font-weight:600;color:#0066CC;}
.ai-hint .ai-body{font-size:12px;color:#1E40AF;line-height:1.65;}

/* Master-detail */
.master-detail{display:grid;grid-template-columns:280px 1fr;gap:16px;}
.master-list{background:#fff;border:1px solid #E2E8F0;border-radius:10px;overflow:hidden;max-height:500px;overflow-y:auto;}
.master-item{padding:12px 14px;border-bottom:1px solid #F1F5F9;cursor:pointer;transition:all .1s;}
.master-item:hover{background:#F8FAFC;}
.master-item.active{background:#EFF6FF;border-left:3px solid #0066CC;}
.master-item .mi-name{font-size:12px;font-weight:500;}
.master-item .mi-meta{font-size:10px;color:#64748B;margin-top:2px;}

/* Card grid */
.edu-card{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px;transition:all .12s;cursor:pointer;}
.edu-card:hover{border-color:#38BDF8;box-shadow:0 2px 8px rgba(0,102,204,.1);}
.edu-card .ec-type{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;display:inline-block;margin-bottom:8px;}
.edu-card .ec-title{font-size:13px;font-weight:600;margin-bottom:4px;}
.edu-card .ec-desc{font-size:11px;color:#64748B;line-height:1.5;}
.edu-card .ec-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}

/* Feedback */
.fb-item{border:1px solid #E2E8F0;border-radius:8px;padding:14px;margin-bottom:10px;}
.fb-item .fb-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.fb-item .fb-body{font-size:12px;color:#334155;line-height:1.6;}
.fb-reply{background:#F8FAFC;border-radius:6px;padding:10px;margin-top:8px;font-size:11px;color:#475569;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, LineChart, Line, PieChart, Pie, Cell, ComposedChart, Area } = Recharts;

const NAV = [
  { section:'메인', items:[
    { id:'dashboard', label:'통합 관리 대시보드', icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> },
  ]},
  { section:'학습 관리', items:[
    { id:'idea-workflow', label:'다단계 아이디어 고도화', icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> },
    { id:'curriculum', label:'교보재 카드 및 학습 경로 관리', icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg> },
  ]},
  { section:'분석 · 소통', items:[
    { id:'analytics', label:'익명 피드백 및 학급 통계 분석', icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg> },
    { id:'students', label:'학생 관리', icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg> },
  ]},
];

/* ============ Dashboard ============ */
function DashboardPage() {
  const weeklyData = [
    { week:'W1', 완료:8, 승인대기:3 },
    { week:'W2', 완료:12, 승인대기:5 },
    { week:'W3', 완료:15, 승인대기:4 },
    { week:'W4', 완료:20, 승인대기:6 },
  ];
  const levelDist = [
    { name:'Level 1', value:18, color:'#38BDF8' },
    { name:'Level 2', value:22, color:'#0066CC' },
    { name:'Level 3', value:8, color:'#1A365D' },
  ];
  return (
    <div>
      <div className="stats-row">
        {[
          { icon:'👥', bg:'#EFF6FF', label:'전체 학생', value:'48', change:'이번 주 +5명', cc:'#059669' },
          { icon:'💡', bg:'#ECFDF5', label:'등록 아이디어', value:'127', change:'이번 주 +23건', cc:'#059669' },
          { icon:'⏳', bg:'#FFF7ED', label:'승인 대기', value:'14', change:'긴급 3건', cc:'#DC2626' },
          { icon:'💬', bg:'#FEF2F2', label:'미답변 피드백', value:'7', change:'24시간 내 4건', cc:'#EA580C' },
        ].map((s,i) => (
          <div key={i} className="stat-card">
            <div className="stat-icon" style={{background:s.bg}}>{s.icon}</div>
            <div className="stat-body">
              <div className="stat-value">{s.value}</div>
              <div className="stat-label">{s.label}</div>
              <div className="stat-change" style={{color:s.cc}}>{s.change}</div>
            </div>
          </div>
        ))}
      </div>

      <div className="grid-23">
        <div className="card">
          <div className="card-header">
            <span className="card-title">주간 단계 완료 추이</span>
            <select style={{padding:'4px 8px',border:'1px solid #E2E8F0',borderRadius:6,fontSize:11,fontFamily:'inherit'}}>
              <option>최근 4주</option><option>최근 8주</option>
            </select>
          </div>
          <ResponsiveContainer width="100%" height={200}>
            <ComposedChart data={weeklyData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/>
              <XAxis dataKey="week" tick={{fontSize:11}} stroke="#94A3B8"/>
              <YAxis tick={{fontSize:11}} stroke="#94A3B8"/>
              <Tooltip contentStyle={{borderRadius:8,fontSize:11,border:'1px solid #E2E8F0'}}/>
              <Area type="monotone" dataKey="완료" fill="#0066CC18" stroke="#0066CC" strokeWidth={2}/>
              <Bar dataKey="승인대기" fill="#38BDF8" radius={[3,3,0,0]} barSize={20}/>
            </ComposedChart>
          </ResponsiveContainer>
        </div>
        <div className="card">
          <div className="card-header">
            <span className="card-title">레벨별 학생 분포</span>
          </div>
          <ResponsiveContainer width="100%" height={200}>
            <PieChart>
              <Pie data={levelDist} dataKey="value" cx="50%" cy="50%" innerRadius={50} outerRadius={75} paddingAngle={4}>
                {levelDist.map((d,i) => <Cell key={i} fill={d.color}/>)}
              </Pie>
              <Tooltip contentStyle={{borderRadius:8,fontSize:11}}/>
            </PieChart>
          </ResponsiveContainer>
          <div style={{display:'flex',justifyContent:'center',gap:16}}>
            {levelDist.map((d,i) => (
              <div key={i} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#475569'}}>
                <span style={{width:8,height:8,borderRadius:2,background:d.color,display:'inline-block'}}/>
                {d.name} ({d.value}명)
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-header">
            <span className="card-title">긴급 승인 요청</span>
            <span className="tag tag-red">3건</span>
          </div>
          {[
            { student:'이서연', class:'3-A', level:'Level 3', step:'2단계', req:'아이디어 완성도 검토', time:'20분 전' },
            { student:'한소율', class:'2-B', level:'Level 2', step:'4단계', req:'기술 요소 검증 승인', time:'1시간 전' },
            { student:'김도현', class:'2-A', level:'Level 2', step:'3단계', req:'과학원리 연결 검토', time:'2시간 전' },
          ].map((r,i) => (
            <div key={i} style={{padding:'10px 0',borderBottom:i<2?'1px solid #F1F5F9':'none'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:500}}>{r.student} <span style={{color:'#64748B',fontWeight:400}}>({r.class})</span></span>
                <span style={{fontSize:10,color:'#94A3B8'}}>{r.time}</span>
              </div>
              <div style={{fontSize:11,color:'#64748B',marginBottom:6}}>{r.level} — {r.step}: {r.req}</div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-primary btn-sm">승인</button>
                <button className="btn btn-danger btn-sm">반려</button>
              </div>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="card-header">
            <span className="card-title">미답변 피드백</span>
            <button className="btn btn-outline btn-sm">전체 보기</button>
          </div>
          {[
            { anon:'익명 #22', class:'2-A', msg:'발명원리 카드 중 어떤 것을 선택해야 할지 모르겠어요.', time:'30분 전' },
            { anon:'익명 #15', class:'3-B', msg:'특허 명세서 양식이 잘 이해되지 않습니다. 예시를 더 보고 싶어요.', time:'1시간 전' },
            { anon:'익명 #8', class:'2-B', msg:'팀원이 레벨업 하지 않아서 그룹 활동이 어렵습니다.', time:'3시간 전' },
          ].map((f,i) => (
            <div key={i} style={{padding:'10px 0',borderBottom:i<2?'1px solid #F1F5F9':'none'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:500}}>{f.anon} <span style={{color:'#64748B',fontWeight:400}}>{f.class}</span></span>
                <span style={{fontSize:10,color:'#94A3B8'}}>{f.time}</span>
              </div>
              <div style={{fontSize:11,color:'#475569'}}>{f.msg}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <span className="card-title">최근 등록 아이디어</span>
        </div>
        <table className="data-table">
          <thead><tr><th>발명가 번호</th><th>학생</th><th>학급</th><th>아이디어 제목</th><th>레벨</th><th>단계</th><th>등록일</th></tr></thead>
          <tbody>
            {[
              { id:'INV-001', name:'김민준', cls:'2-A', title:'스마트 분리수거 알림 시스템', level:'Level 3', step:'4/5', date:'03.13' },
              { id:'INV-012', name:'이서연', cls:'3-A', title:'음성 인식 독서 보조 장치', level:'Level 3', step:'2/5', date:'03.13' },
              { id:'INV-005', name:'박지호', cls:'1-B', title:'자동 환기 공기청정 창문', level:'Level 1', step:'5/5', date:'03.12' },
              { id:'INV-018', name:'최하은', cls:'2-B', title:'소음 차단 자동 커튼 장치', level:'Level 2', step:'3/5', date:'03.12' },
            ].map((a,i) => (
              <tr key={i}>
                <td style={{fontFamily:'monospace',color:'#0066CC',fontSize:11}}>{a.id}</td>
                <td style={{fontWeight:500}}>{a.name}</td>
                <td>{a.cls}</td>
                <td>{a.title}</td>
                <td><span className={`tag ${a.level==='Level 1'?'tag-cyan':a.level==='Level 2'?'tag-blue':'tag-green'}`}>{a.level}</span></td>
                <td>{a.step}</td>
                <td>{a.date}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ============ Idea Workflow ============ */
function IdeaWorkflowPage() {
  const steps = Array.from({length:15},(_, i) => ({
    num: i+1,
    name: ['문제 발견','대상 정의','아이디어 도출','과학원리 탐색','원리 선택','기술요소 연결','해결방법 구체화','도면 스케치','실현성 검토','비용 분석','명세서 초안','피어리뷰','AI 힌트 반영','최종 정리','교사 승인'][i],
    done: i < 7,
    active: i === 7,
  }));
  return (
    <div>
      <div className="card" style={{marginBottom:16}}>
        <div className="card-header">
          <div>
            <span className="card-title">Level 2 — 아이디어 구체화</span>
            <span style={{fontSize:11,color:'#64748B',marginLeft:8}}>학생: 이서연 (INV-012) · 3-A 학급</span>
          </div>
          <div style={{display:'flex',gap:6}}>
            <span className="tag tag-blue">8/15단계</span>
            <span className="tag tag-orange">교사 승인 필요</span>
          </div>
        </div>
        <div className="wf-track">
          {steps.map((s,i) => (
            <div key={i} className={`wf-step ${s.done?'done':''} ${s.active?'active':''}`}>
              <div className="wf-bar"/>
              <div className="wf-num">{s.num}</div>
              {(i%3===0 || s.active) && <div className="wf-name">{s.name}</div>}
            </div>
          ))}
        </div>
      </div>

      <div className="grid-23">
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div className="card-header">
