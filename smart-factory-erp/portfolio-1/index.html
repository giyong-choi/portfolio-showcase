*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.skeleton{background:linear-gradient(90deg,#E0F2FE 25%,#BAE6FD 50%,#E0F2FE 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
::-webkit-scrollbar{width:6px;height:6px}

    '보통': { color: C.info, bg: '#E0F2FE' },
  };
  const s = map[status] || { color: C.textSub, bg: '#F1F5F9' };
  return <Badge color={s.color} bg={s.bg}>{status}</Badge>;
}

function CountUp({ end, suffix = '', prefix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let s = 0; const step = end / 50;
    const t = setInterval(() => {
      s += step; if (s >= end) { setVal(end); clearInterval(t); } else setVal(Math.floor(s));
    }, 24);
    return () => clearInterval(t);
  }, [end]);
  return <span style={{ animation: 'countUp 400ms ease' }}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, type = 'success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const colors = { success: '#059669', error: '#DC2626', info: '#0066CC' };
  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
      background: '#0F172A', color: '#fff', padding: '12px 20px',
      borderRadius: 10, animation: 'slideUp 300ms ease',
      boxShadow: '0 4px 20px rgba(0,0,0,0.25)',
      display: 'flex', alignItems: 'center', gap: 10, minWidth: 240,
      borderLeft: `4px solid ${colors[type]}`,
    }}>
      <span style={{ fontSize: 16 }}>{type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'}</span>
      <span style={{ fontSize: 14 }}>{message}</span>
    </div>
  );
}

function MiniBar({ value, max, color }) {
  const pct = Math.min(100, (value / max) * 100);
  return (
    <div style={{ height: 6, borderRadius: 3, background: '#E2E8F0', overflow: 'hidden', marginTop: 8 }}>
      <div style={{
        height: '100%', borderRadius: 3, background: color,
        width: `${pct}%`, animation: 'barGrow 800ms ease both',
        '--target-width': `${pct}%`,
      }} />
    </div>
  );
}

      {trend !== undefined && (
        <div style={{ marginTop: 12, fontSize: 12, color: trend >= 0 ? C.success : C.danger }}>
          {trend >= 0 ? '▲' : '▼'} 전월 대비 {Math.abs(trend)}%
        </div>
      )}
    </div>
  );
}

function SimpleLineChart({ data, color }) {
  const W = 400, H = 120;
  const max = Math.max(...data.map(d => d.v));
  const min = Math.min(...data.map(d => d.v));
  const pad = 10;
  const pts = data.map((d, i) => {
    const x = pad + (i / (data.length - 1)) * (W - pad * 2);
    const y = pad + (1 - (d.v - min) / (max - min + 1)) * (H - pad * 2);
    return `${x},${y}`;
  });
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: '100%' }}>
      <polyline points={pts.join(' ')} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" />
      {data.map((d, i) => {
        const x = pad + (i / (data.length - 1)) * (W - pad * 2);
        const y = pad + (1 - (d.v - min) / (max - min + 1)) * (H - pad * 2);
        return <circle key={i} cx={x} cy={y} r={3} fill={color} />;
      })}
    </svg>
  );
}

function InventoryPage({ showToast }) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [modal, setModal] = useState(null);
  const [items, setItems] = useState(INVENTORY);

  const filtered = items.filter(item => {
    const matchSearch = item.name.includes(search) || item.id.includes(search) || item.category.includes(search);
    const matchFilter = filter === 'all' || item.status === filter;
    return matchSearch && matchFilter;
  });

  function handleStockIn(item) {
    setModal({ type: 'in', item });

    e.preventDefault();
    const qty = parseInt(e.target.qty.value) || 0;
    setItems(prev => prev.map(it => it.id === modal.item.id

// ── AS 관리 ────────────────────────────────────────────────
function AsPage({ showToast }) {
  const [asList, setAsList] = useState(AS_LIST);
  const [modal, setModal] = useState(null);
  const [selected, setSelected] = useState(null);

  const kanban = ['대기', '처리중', '완료'];
  const byStatus = s => asList.filter(a => a.status === s);

  function assignHandler(asId, assignee) {
    setAsList(prev => prev.map(a => a.id === asId ? { ...a, assignee, status: '처리중' } : a));
    setModal(null);
    showToast(`${assignee}님에게 배정되었습니다.`, 'success');
  }

  function handleCreate(e) {
    e.preventDefault();
    setModal(null);
    showToast('A/S 접수가 완료되었습니다.', 'success');
  }

  return (
    <div style={{ animation: 'fadeIn 300ms ease' }}>
      <div style={{ display: 'flex', gap: 12, marginBottom: 20, alignItems: 'center' }}>
        <div style={{ display: 'flex', gap: 16 }}>
          {kanban.map(s => (
            <div key={s} style={{ background: C.surface, borderRadius: 8, padding: '10px 20px', boxShadow: C.card.boxShadow }}>
              <span style={{ fontSize: 12, color: C.textSub }}>{s} </span>
              <span style={{ fontSize: 18, fontWeight: 700, color: s === '대기' ? C.warning : s === '처리중' ? C.info : C.success }}>
                {byStatus(s).length}건
              </span>
            </div>
          ))}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => setModal({ type: 'create' })} style={{
          background: C.primary, color: '#fff', border: 'none', borderRadius: 8,
          padding: '10px 18px', fontSize: 13, fontWeight: 600, cursor: 'pointer',
        }}>+ A/S 접수</button>
      </div>

      {/* 칸반 보드 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
        {kanban.map(status => (
          <div key={status} style={{
            background: status === '대기' ? '#FFFBEB' : status === '처리중' ? '#EFF6FF' : '#F0FDF4',

            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
              <span style={{ fontSize: 14, fontWeight: 700 }}>{status}</span>
              <span style={{
                background: status === '대기' ? C.warning : status === '처리중' ? C.info : C.success,
                color: '#fff', borderRadius: 10, fontSize: 11, fontWeight: 700,
                padding: '1px 8px',
              }}>{byStatus(status).length}</span>
            </div>
            {byStatus(status).map((item, i) => (
              <div key={item.id} onClick={() => setSelected(item)} style={{
                background: C.surface, borderRadius: 10, padding: '14px', marginBottom: 10,
                boxShadow: '0 1px 4px rgba(0,0,0,0.06)', cursor: 'pointer',
                border: selected?.id === item.id ? `2px solid ${C.primary}` : '2px solid transparent',
                animation: `slideUp 350ms ease ${i * 60}ms both`,
                transition: 'all 150ms',
              }}
                onMouseEnter={e => e.currentTarget.style.boxShadow = '0 4px 12px rgba(0,0,0,0.1)'}
                onMouseLeave={e => e.currentTarget.style.boxShadow = '0 1px 4px rgba(0,0,0,0.06)'}
              >
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
                  <span style={{ fontSize: 11, fontFamily: 'monospace', color: C.primary, fontWeight: 600 }}>{item.id}</span>
                  <StatusBadge status={item.priority} />
                </div>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>{item.client}</div>
                <div style={{ fontSize: 12, color: C.textSub }}>{item.type}</div>

                  <button onClick={e => { e.stopPropagation(); setModal({ type: 'assign', item }); }} style={{
                    marginTop: 8, width: '100%', background: C.primaryLight, color: C.primary,
                    border: 'none', borderRadius: 6, padding: '6px', fontSize: 12, fontWeight: 600, cursor: 'pointer',

      {modal?.type === 'assign' && (
        <Modal title={`담당자 배정 — ${modal.item.client}`} onClose={() => setModal(null)} width={400}>
          <p style={{ fontSize: 13, color: C.textSub, marginBottom: 16 }}>A/S 유형: <strong>{modal.item.type}</strong></p>

            <button key={name} onClick={() => assignHandler(modal.item.id, name.split(' ')[0])} style={{
              width: '100%', background: C.bg, border: `1px solid ${C.border}`,
              borderRadius: 8, padding: '12px 16px', marginBottom: 8, textAlign: 'left',
              cursor: 'pointer', fontSize: 13, transition: 'all 150ms',

        <Modal title="A/S 접수" onClose={() => setModal(null)}>

            <FormField label="고객사 명" required><input style={inputStyle} placeholder="고객사 또는 공장명" required /></FormField>

                <select style={inputStyle} required>
                  <option value="">선택</option>
                  {['긴급수리', '정기점검', '부품교체', '소프트웨어', '원격지원'].map(t => <option key={t}>{t}</option>)}
                </select>
              </FormField>
              <FormField label="우선순위" required>
                <select style={inputStyle} required>
                  {['긴급', '보통', '일반'].map(p => <option key={p}>{p}</option>)}

            <FormField label="증상 설명" required><textarea style={{ ...inputStyle, height: 100, resize: 'vertical' }} placeholder="장비 증상 및 현황을 상세히 기술해 주세요." required /></FormField>

}

// ── 전자 결재 ──────────────────────────────────────────────
function ApprovalPage({ showToast }) {
  const [docs, setDocs] = useState(APPROVALS);
  const [modal, setModal] = useState(null);

  function handleApprove(id) {
    setDocs(prev => prev.map(d => d.id === id ? { ...d, status: '승인완료' } : d));
    setModal(null);
    showToast('결재 승인이 완료되었습니다.', 'success');
  }
  function handleReject(id) {
    setDocs(prev => prev.map(d => d.id === id ? { ...d, status: '반려' } : d));
    setModal(null);
    showToast('문서가 반려 처리되었습니다.', 'error');
  }
  function handleCreate(e) {
    e.preventDefault();
    setModal(null);
    showToast('문서가 결재선에 등록되었습니다.', 'success');
  }

  return (
    <div style={{ animation: 'fadeIn 300ms ease' }}>
      <div style={{ display: 'flex', gap: 12, marginBottom: 20, alignItems: 'center' }}>
        <div style={{ display: 'flex', gap: 12 }}>
          {[['결재대기', docs.filter(d => d.status === '결재대기').length, C.info],
            ['승인완료', docs.filter(d => d.status === '승인완료').length, C.success],
            ['반려', docs.filter(d => d.status === '반려').length, C.danger],
          ].map(([label, count, color]) => (
            <div key={label} style={{ background: C.surface, borderRadius: 8, padding: '10px 20px', boxShadow: C.card.boxShadow }}>
              <span style={{ fontSize: 12, color: C.textSub }}>{label} </span>
              <span style={{ fontSize: 18, fontWeight: 700, color }}>{count}건</span>
            </div>
          ))}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => setModal({ type: 'create' })} style={{
          background: C.primary, color: '#fff', border: 'none', borderRadius: 8,
          padding: '10px 18px', fontSize: 13, fontWeight: 600, cursor: 'pointer',
        }}>+ 문서 작성</button>
      </div>

      <div style={{ background: C.surface, borderRadius: 12, boxShadow: C.card.boxShadow, overflow: 'hidden' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
          <thead>
            <tr style={{ background: C.bg, borderBottom: `2px solid ${C.border}` }}>
              {['문서번호', '제목', '유형', '작성자', '부서', '금액', '등록일', '상태', '액션'].map(h => (
                <th key={h} style={{ padding: '12px 16px', textAlign: 'left', fontWeight: 600, color: C.textSub, whiteSpace: 'nowrap' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {docs.map((doc, i) => (
              <tr key={doc.id} style={{
                borderBottom: `1px solid ${C.border}`,
                animation: `slideUp 300ms ease ${i * 50}ms both`,
                transition: 'background 150ms',
              }}
                onMouseEnter={e => e.currentTarget.style.background = C.bg}
                onMouseLeave={e => e.currentTarget.style.background = ''}
              >
                <td style={{ padding: '14px 16px', fontFamily: 'monospace', fontSize: 12, color: C.primary, fontWeight: 600 }}>{doc.id}</td>
                <td style={{ padding: '14px 16px', fontWeight: 500 }}>{doc.title}</td>
                <td style={{ padding: '14px 16px' }}><Badge color={C.info}>{doc.type}</Badge></td>
                <td style={{ padding: '14px 16px' }}>{doc.author}</td>
                <td style={{ padding: '14px 16px', color: C.textSub }}>{doc.dept}</td>
                <td style={{ padding: '14px 16px', fontWeight: 600 }}>{doc.amount}</td>
                <td style={{ padding: '14px 16px', color: C.textSub, fontSize: 12 }}>{doc.date}</td>
                <td style={{ padding: '14px 16px' }}><StatusBadge status={doc.status} /></td>
                <td style={{ padding: '14px 16px' }}>
                  {doc.status === '결재대기' ? (
                    <>
                      <button onClick={() => handleApprove(doc.id)} style={{ background: '#D1FAE5', color: C.success, border: 'none', borderRadius: 6, padding: '5px 12px', fontSize: 12, fontWeight: 600, cursor: 'pointer', marginRight: 6 }}>승인</button>
                      <button onClick={() => handleReject(doc.id)} style={{ background: '#FEE2E2', color: C.danger, border: 'none', borderRadius: 6, padding: '5px 12px', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>반려</button>
                    </>
                  ) : (
                    <button onClick={() => setModal({ type: 'detail', doc })} style={{ background: C.bg, color: C.textSub, border: `1px solid ${C.border}`, borderRadius: 6, padding: '5px 12px', fontSize: 12, cursor: 'pointer' }}>보기</button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {modal?.type === 'create' && (
        <Modal title="문서 작성" onClose={() => setModal(null)}>
          <form onSubmit={handleCreate}>
            <FormField label="문서 유형" required>
              <select style={inputStyle} required>
                <option value="">선택</option>
                {['지출결의서', '휴가신청', '구매요청', '법인카드 정산', '출장비 정산'].map(t => <option key={t}>{t}</option>)}
              </select>
            </FormField>
            <FormField label="제목" required><input style={inputStyle} placeholder="문서 제목 입력" required /></FormField>
            <FormField label="결재선">
              <div style={{ background: C.bg, borderRadius: 8, padding: '10px 14px', fontSize: 12, color: C.textSub }}>
                작성자(나) → 팀장 김민수 → 본부장 이상호 (자동 설정)
              </div>
            </FormField>
            <FormField label="금액 (해당 시)"><input type="number" style={inputStyle} placeholder="0" min={0} /></FormField>
            <FormField label="내용" required><textarea style={{ ...inputStyle, height: 120, resize: 'vertical' }} placeholder="문서 상세 내용을 작성해 주세요." required /></FormField>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
              <button type="button" onClick={() => setModal(null)} style={{ padding: '10px 20px', border: `1px solid ${C.border}`, borderRadius: 8, background: 'none', cursor: 'pointer', fontSize: 13 }}>취소</button>
              <button type="submit" style={{ padding: '10px 24px', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer', fontSize: 13, fontWeight: 600 }}>결재 요청</button>
            </div>
          </form>
        </Modal>
      )}
    </div>
  );
}

          </div>
          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 16 }}>
            <button onClick={() => { setModal(null); showToast('진행 상황이 업데이트되었습니다.'); }} style={{ padding: '10px 20px', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer', fontSize: 13, fontWeight: 600 }}>상태 업데이트</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── 기타 페이지 (자산, 계정) ────────────────────────────────
function PlaceholderPage({ title, description }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '50vh', animation: 'fadeIn 300ms ease' }}>
      <div style={{ fontSize: 64, marginBottom: 16 }}>🚧</div>
      <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 8 }}>{title}</div>
      <div style={{ fontSize: 14, color: C.textSub }}>{description}</div>
    </div>
  );
}

// ── 스켈레톤 로딩 ─────────────────────────────────────────
function SkeletonLoader() {
  return (
    <div style={{ padding: 24, display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 20 }}>
        {[...Array(4)].map((_, i) => <div key={i} className="skeleton" style={{ height: 110 }} />)}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 20 }}>
        <div className="skeleton" style={{ height: 200 }} />
        <div className="skeleton" style={{ height: 200 }} />
      </div>
      <div className="skeleton" style={{ height: 240 }} />
    </div>
  );
}

// ── 알림 패널 ─────────────────────────────────────────────
function AlertPanel({ onClose }) {
  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, zIndex: 200 }} />
      <div style={{
        position: 'fixed', top: 64, right: 16, width: 340, background: C.surface,
        borderRadius: 14, boxShadow: '0 8px 32px rgba(0,0,0,0.15)', zIndex: 201,
        animation: 'slideDown 200ms ease', border: `1px solid ${C.border}`, overflow: 'hidden',
      }}>
        <div style={{ padding: '14px 16px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontWeight: 700, fontSize: 14 }}>알림</span>
          <span style={{ fontSize: 11, color: C.primary, cursor: 'pointer' }}>모두 읽음</span>
        </div>
        {[
          { icon: '📦', msg: '커플링 어댑터 3/4" 재고 긴급 부족 (12개)', time: '5분 전', color: C.danger },
          { icon: '🔧', msg: '삼성전자 화성 A/S 배정 대기 중', time: '23분 전', color: C.warning },
          { icon: '📝', msg: 'PO-2026-0139 발주서 승인 요청', time: '1시간 전', color: C.info },
          { icon: '📊', msg: '2월 생산량 목표 달성률 94%', time: '2시간 전', color: C.success },
          { icon: '📦', msg: '베어링 6205-2RS 최소 재고 미달', time: '3시간 전', color: C.warning },
        ].map((n, i) => (
          <div key={i} style={{
            padding: '12px 16px', borderBottom: i < 4 ? `1px solid ${C.border}` : 'none',
            display: 'flex', alignItems: 'flex-start', gap: 10, cursor: 'pointer',
            transition: 'background 150ms',
          }}
            onMouseEnter={e => e.currentTarget.style.background = C.bg}
            onMouseLeave={e => e.currentTarget.style.background = ''}
          >
            <span style={{ fontSize: 20 }}>{n.icon}</span>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, color: C.text }}>{n.msg}</div>
              <div style={{ fontSize: 11, color: C.textLight, marginTop: 2 }}>{n.time}</div>
            </div>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: n.color, flexShrink: 0, marginTop: 4 }} />
          </div>
        ))}
      </div>
    </>
  );
}

// ── 메인 앱 ───────────────────────────────────────────────
const PAGE_TITLES = {
  dashboard: '대시보드',
  project: '프로젝트 관리',
  inventory: '재고 관리',
  orders: '수발주 관리',
  as: 'A/S 관리',
  approval: '전자 결재',
  asset: '자산 관리',
  accounts: '계정 관리',
};

function App() {
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('dashboard');
  const [toast, setToast] = useState(null);
  const [showAlert, setShowAlert] = useState(false);

  useEffect(() => { setTimeout(() => setLoading(false), 1500); }, []);

  function showToast(message, type = 'success') {
    setToast({ message, type, key: Date.now() });
  }

  if (loading) {
    return (
      <div style={{ display: 'flex', minHeight: '100vh' }}>
        <aside style={{ width: 240, background: C.sidebar }} />
        <div style={{ flex: 1 }}>
          <div style={{ height: 60, background: C.surface, borderBottom: `1px solid ${C.border}` }} />
          <SkeletonLoader />
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', minHeight: '100vh', background: C.bg }}>
      <Sidebar page={page} onNav={p => { setPage(p); setShowAlert(false); }} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <TopBar
          title={PAGE_TITLES[page]}
          alertCount={5}
          onAlertClick={() => setShowAlert(v => !v)}
        />
        <main style={{ flex: 1, overflow: 'auto', padding: 24 }}>
          {page === 'dashboard' && <DashboardPage onNav={setPage} />}
          {page === 'project' && <ProjectPage showToast={showToast} />}
          {page === 'inventory' && <InventoryPage showToast={showToast} />}
          {page === 'orders' && <OrdersPage showToast={showToast} />}
          {page === 'as' && <AsPage showToast={showToast} />}
          {page === 'approval' && <ApprovalPage showToast={showToast} />}
          {page === 'asset' && <PlaceholderPage title="자산 관리" description="법인 차량 배차 및 법인카드 사용 내역 관리" />}
          {page === 'accounts' && <PlaceholderPage title="계정 관리" description="사용자 계정 생성 및 역할 기반 권한 관리" />}
        </main>
      </div>
      {showAlert && <AlertPanel onClose={() => setShowAlert(false)} />}
      {toast && <Toast key={toast.key} message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
