  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background: #F0F9FF; color: #1A1A2E; word-break: keep-all; }
    @keyframes fadeInScale {
      from { opacity: 0; transform: translate(-50%,-50%) scale(0.95); }
      to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .skeleton {
      background: linear-gradient(90deg,#e0f2fe 25%,#bae6fd 50%,#e0f2fe 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px;
    }
    .badge-ok   { background:#dcfce7; color:#16a34a; padding:2px 8px; border-radius:12px; font-size:12px; font-weight:600; }
    .badge-warn { background:#fef9c3; color:#ca8a04; padding:2px 8px; border-radius:12px; font-size:12px; font-weight:600; }
    .badge-err  { background:#fee2e2; color:#dc2626; padding:2px 8px; border-radius:12px; font-size:12px; font-weight:600; }
    .live-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; animation:blink 1.5s infinite; display:inline-block; }
    ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:#e0f2fe; } ::-webkit-scrollbar-thumb { background:#7dd3fc; border-radius:3px; }
    tr:hover { background:#f8faff !important; }
    button:hover { opacity:0.9; }

function App() {

function Skeleton() {
  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
        {[1,2,3,4].map(i => (
          <div key={i} style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,102,204,0.08)'}}>
            <div className="skeleton" style={{height:13,width:'55%',marginBottom:12}}></div>
            <div className="skeleton" style={{height:28,width:'75%',marginBottom:8}}></div>
            <div className="skeleton" style={{height:11,width:'45%'}}></div>
          </div>
        ))}
      </div>
      <div style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,102,204,0.08)'}}>
        {[1,2,3,4,5,6].map(i => (
          <div key={i} className="skeleton" style={{height:38,marginBottom:8,borderRadius:6}}></div>
        ))}
      </div>
    </div>
  );
}

function Content({menu, showToast}) {
  if (menu==='dashboard')      return <Dashboard showToast={showToast} />;
  if (menu==='exchange-status') return <ExchangeStatus showToast={showToast} />;
  if (menu==='alert-settings')  return <AlertSettings showToast={showToast} />;
  if (menu==='coin-filter')     return <CoinFilter showToast={showToast} />;
  if (menu==='history')         return <History showToast={showToast} />;
  return null;
}

/* ── 거래소 상태 ── */

      <div style={{background:'#fff',borderRadius:12,boxShadow:'0 1px 4px rgba(0,102,204,0.08)',overflow:'hidden',marginBottom:14}}>

          </thead>
          <tbody>

      <div style={{background:'#EFF6FF',border:'1px solid #BAE6FD',borderRadius:10,padding:'13px 18px'}}>
        <p style={{fontSize:13,color:'#0369a1',fontWeight:700,marginBottom:3}}>⚠️ 스프레드 계산 자동 제외 안내</p>
        <p style={{fontSize:12,color:'#0284c7'}}>{ex} 기준 출금 불가 코인: <strong>{blocked.length>0?blocked.join(', '):'없음 (모두 정상)'}</strong> — 해당 코인은 모니터링에서 자동 제외됩니다.</p>
      </div>

/* ── 코인 필터 ── */
function CoinFilter({showToast}) {
  const [coins, setCoins] = useState(COIN_LIST);
  const toggle = (c) => setCoins(prev=>prev.map(x=>x.coin===c?{...x,on:!x.on}:x));
  const activeCount = coins.filter(c=>c.on).length;
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <p style={{fontSize:14,color:'#64748b'}}><span style={{fontWeight:700,color:'#0066CC',fontSize:16}}>{activeCount}개</span> 코인 모니터링 활성화</p>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setCoins(prev=>prev.map(c=>({...c,on:true})))} style={{padding:'6px 14px',border:'1px solid #E2E8F0',borderRadius:6,background:'#fff',color:'#64748b',cursor:'pointer',fontFamily:'Pretendard',fontSize:13}}>전체 선택</button>
          <button onClick={()=>setCoins(prev=>prev.map(c=>({...c,on:false})))} style={{padding:'6px 14px',border:'1px solid #E2E8F0',borderRadius:6,background:'#fff',color:'#64748b',cursor:'pointer',fontFamily:'Pretendard',fontSize:13}}>전체 해제</button>
        </div>
      </div>
      <div style={{background:'#fff',borderRadius:12,boxShadow:'0 1px 4px rgba(0,102,204,0.08)',overflow:'hidden',marginBottom:14}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#F8FAFC'}}>
              {['활성','코인','거래소 쌍','최고 스프레드','Gate 대출',''].map(h=>(
                <th key={h} style={{padding:'9px 20px',textAlign:'left',fontSize:11,color:'#64748b',fontWeight:600,borderBottom:'1px solid #E2E8F0'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {coins.map((c,i)=>(
              <tr key={c.coin} style={{borderBottom:'1px solid #F1F5F9',opacity:c.on?1:0.45}}>
                <td style={{padding:'13px 20px'}}>
                  <input type="checkbox" checked={c.on} onChange={()=>toggle(c.coin)} style={{accentColor:'#0066CC',width:16,height:16,cursor:'pointer'}}/>
                </td>
                <td style={{padding:'13px 20px',fontWeight:700,fontSize:14}}>{c.coin}</td>
                <td style={{padding:'13px 20px',fontSize:13,color:'#64748b'}}>{c.pairs}개</td>
                <td style={{padding:'13px 20px',fontWeight:700,color:c.best!=='-'?'#16a34a':'#94a3b8',fontSize:14}}>{c.best}</td>
                <td style={{padding:'13px 20px'}}><span className={c.gate_lend?'badge-ok':'badge-warn'}>{c.gate_lend?'가능':'불가'}</span></td>
                <td style={{padding:'13px 20px'}}>
                  <button onClick={()=>showToast(`${c.coin} 상세 정보를 불러옵니다`)} style={{background:'none',border:'1px solid #E2E8F0',color:'#64748b',padding:'4px 10px',borderRadius:6,fontSize:12,cursor:'pointer',fontFamily:'Pretendard'}}>상세</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{display:'flex',justifyContent:'flex-end'}}>
        <button onClick={()=>showToast('코인 필터 설정이 저장됐습니다')} style={{padding:'10px 24px',background:'#0066CC',color:'#fff',border:'none',borderRadius:8,fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'Pretendard'}}>저장</button>
      </div>
    </div>
  );
}

/* ── 거래 기록 ── */
function History({showToast}) {
  const [page, setPage] = useState(1);
  const PER = 5;
  const total = HISTORY.length;
  const pages = Math.ceil(total/PER);
  const rows = HISTORY.slice((page-1)*PER, page*PER);

  return (
    <div>
      <div style={{background:'#fff',borderRadius:12,boxShadow:'0 1px 4px rgba(0,102,204,0.08)',overflow:'hidden',marginBottom:14}}>
        <div style={{padding:'14px 20px',borderBottom:'1px solid #E2E8F0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontWeight:700,fontSize:14}}>오늘 아비트리지 기회 이력</span>
          <span style={{fontSize:12,color:'#94a3b8'}}>총 {total}건</span>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#F8FAFC'}}>
              {['발생 시각','코인','거래소 경로','스프레드','지속 시간','예상 수익 (100만원 기준)'].map(h=>(
                <th key={h} style={{padding:'9px 20px',textAlign:'left',fontSize:11,color:'#64748b',fontWeight:600,borderBottom:'1px solid #E2E8F0'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map(r=>(
              <tr key={r.id} style={{borderBottom:'1px solid #F1F5F9'}}>
                <td style={{padding:'12px 20px',fontSize:13,color:'#64748b'}}>{r.time}</td>
                <td style={{padding:'12px 20px',fontWeight:700}}>{r.coin}</td>
                <td style={{padding:'12px 20px',fontSize:13}}>
                  <span style={{color:'#0066CC',fontWeight:600}}>{r.pair.split('→')[0]}</span>
                  <span style={{color:'#94a3b8',margin:'0 4px'}}>→</span>
                  <span style={{color:'#16a34a',fontWeight:600}}>{r.pair.split('→')[1]}</span>
                </td>
                <td style={{padding:'12px 20px',fontWeight:800,color:'#16a34a',fontSize:15}}>{r.spread}</td>
                <td style={{padding:'12px 20px',fontSize:13,color:'#64748b'}}>{r.dur}</td>
                <td style={{padding:'12px 20px',fontSize:13,color:'#0066CC',fontWeight:600}}>{r.base}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:6}}>
        <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1} style={{padding:'7px 14px',border:'1px solid #E2E8F0',borderRadius:8,background:page===1?'#F8FAFC':'#fff',color:page===1?'#CBD5E1':'#334155',cursor:page===1?'default':'pointer',fontFamily:'Pretendard',fontSize:13}}>← 이전</button>
        {Array.from({length:pages},(_,i)=>i+1).map(p=>(
          <button key={p} onClick={()=>setPage(p)} style={{padding:'7px 13px',border:`1px solid ${page===p?'#0066CC':'#E2E8F0'}`,borderRadius:8,background:page===p?'#0066CC':'#fff',color:page===p?'#fff':'#334155',cursor:'pointer',fontFamily:'Pretendard',fontSize:13,fontWeight:page===p?700:400}}>{p}</button>
        ))}
        <button onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={page===pages} style={{padding:'7px 14px',border:'1px solid #E2E8F0',borderRadius:8,background:page===pages?'#F8FAFC':'#fff',color:page===pages?'#CBD5E1':'#334155',cursor:page===pages?'default':'pointer',fontFamily:'Pretendard',fontSize:13}}>다음 →</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
