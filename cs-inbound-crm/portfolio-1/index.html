function Badge({text}){
  return(
    <span style={{background:statusBg[text]||'#F1F5F9',color:statusColor[text]||'#64748B',
      padding:'2px 10px',borderRadius:20,fontSize:12,fontWeight:600,whiteSpace:'nowrap'}}>
      {text}
    </span>
  );
}

function KpiCard({label,value,sub,color,icon}){
  return(
    <div style={{background:'#fff',borderRadius:12,padding:'20px 24px',boxShadow:'0 1px 4px rgba(0,0,0,0.06)',flex:1,minWidth:0}}>

          {sub&&<div style={{fontSize:12,color:'#64748B',marginTop:4}}>{sub}</div>}
        </div>
        <div style={{width:44,height:44,borderRadius:10,background:color+'15',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{icon}</div>
      </div>
    </div>
  );
}

    const q=o.customer+o.id+o.product;
    return q.toLowerCase().includes(search.toLowerCase())&&(filter==='전체'||o.status===filter);
  });
  return(
    <div style={{display:'flex',height:'100%',gap:0}}>
      <div style={{flex:1,padding:28,overflowY:'auto'}}>

            <button key={f} onClick={()=>setFilter(f)}

                background:filter===f?PRIMARY_L:'#fff',color:filter===f?PRIMARY:'#64748B',
                fontSize:13,fontWeight:filter===f?600:400,cursor:'pointer'}}>
              {f}
            </button>
          ))}
        </div>
        <div style={{background:'#fff',borderRadius:12,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{background:'#F8FAFC',borderBottom:'2px solid #E2E8F0'}}>

}
