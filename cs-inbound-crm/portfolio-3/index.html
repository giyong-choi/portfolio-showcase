function Badge({text,type='status'}){
  const bg=type==='channel'?CHANNEL_BG[text]:type==='tag'?TAG_BG[text]:
    text==='대기중'?'#FEF3C7':text==='상담중'?'#DBEAFE':text==='처리완료'?'#DCFCE7':
    text==='온라인'?'#DCFCE7':text==='자리비움'?'#FEF3C7':'#F1F5F9';
  const color=type==='channel'?CHANNEL_COLORS[text]:type==='tag'?(TAG_COLORS[text]||'#64748B'):
    text==='대기중'?'#D97706':text==='상담중'?'#2563EB':text==='처리완료'?'#16A34A':
    text==='온라인'?'#16A34A':text==='자리비움'?'#D97706':'#64748B';
  return(<span style={{background:bg,color,padding:'3px 9px',borderRadius:20,fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>{text}</span>);
}

function Inbox(){

  const tabs=['전체','대기중','상담중','처리완료'];
  const filtered=tab==='전체'?inboxItems:inboxItems.filter(i=>i.status===tab);
  return(
    <div style={{display:'flex',height:'100%'}}>
      {/* Inbox List */}
      <div style={{width:340,borderRight:'1px solid #E5E7EB',background:'#fff',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'16px 16px 12px',borderBottom:'1px solid #E5E7EB'}}>

          <div style={{display:'flex',gap:4}}>
            {tabs.map(t=>(
              <button key={t} onClick={()=>setTab(t)}
                style={{flex:1,padding:'5px 0',borderRadius:7,border:'none',
                  background:tab===t?PRIMARY:'transparent',
                  color:tab===t?'#fff':'#6B7280',fontSize:12,fontWeight:700,cursor:'pointer'}}>
                {t}
              </button>
            ))}
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto'}}>
          {filtered.map(item=>(
            <div key={item.id} onClick={()=>setSelected(item)}
              style={{padding:'14px 16px',borderBottom:'1px solid #F5F3FF',cursor:'pointer',
                background:selected?.id===item.id?PRIMARY_L:'#fff',
                borderLeft:`3px solid ${selected?.id===item.id?PRIMARY:'transparent'}`}}
              onMouseEnter={e=>{if(selected?.id!==item.id)e.currentTarget.style.background='#FAFAFA';}}
              onMouseLeave={e=>{if(selected?.id!==item.id)e.currentTarget.style.background='#fff';}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,alignItems:'flex-start'}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:28,height:28,borderRadius:'50%',background:PRIMARY+'20',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:PRIMARY,flexShrink:0}}>{item.customer[0]}</div>
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:5}}>

                    </div>
                    <div style={{display:'flex',gap:4,marginTop:2}}>
                      <Badge text={item.channel} type="channel"/>
                      <Badge text={item.tag} type="tag"/>
                    </div>
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                  <span style={{fontSize:11,color:'#9CA3AF'}}>{item.time}</span>
                  <Badge text={item.status}/>
                </div>
              </div>
              <div style={{fontSize:12,color:'#6B7280',marginTop:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingLeft:34}}>{item.preview}</div>
            </div>
          ))}
        </div>

function AiTagging(){
  const [selected,setSelected]=useState(null);
  const [test,setTest]=useState('');
  const [testResult,setTestResult]=useState(null);
  const testTag=()=>{
    if(!test.trim())return;
    const found=taggingCategories.find(c=>c.keywords.some(k=>test.includes(k)));
    setTestResult(found?{tag:found.name,confidence:(found.accuracy-Math.random()*5).toFixed(1)}:{tag:'기타',confidence:'61.2'});
  };
  return(
    <div style={{padding:28,height:'100%',overflowY:'auto'}}>

            {taggingCategories.map(cat=>(
              <div key={cat.id} onClick={()=>setSelected(selected?.id===cat.id?null:cat)}
                style={{background:'#fff',borderRadius:12,padding:'14px 18px',border:'2px solid '+(selected?.id===cat.id?PRIMARY:'#E5E7EB'),cursor:'pointer',boxShadow:'0 1px 4px rgba(0,0,0,0.04)',transition:'border-color 0.15s'}}>

                    <Badge text={cat.name} type="tag"/>

                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:13,fontWeight:700,color:cat.accuracy>=95?'#10B981':cat.accuracy>=90?'#F59E0B':'#EF4444'}}>{cat.accuracy}%</span>
                    <div style={{width:36,height:20,borderRadius:10,background:cat.active?PRIMARY:'#CBD5E1',cursor:'pointer',position:'relative'}}>
                      <div style={{position:'absolute',top:2,left:cat.active?16:2,width:16,height:16,borderRadius:8,background:'#fff',transition:'left 0.15s'}}/>

                  </div>
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {cat.keywords.map(k=>(

                  ))}
                </div>
              </div>
            ))}
          </div>
          <button style={{marginTop:12,width:'100%',padding:'10px',borderRadius:10,border:'2px dashed #DDD6FE',background:'#FAFAFA',color:PRIMARY,fontSize:13,fontWeight:700,cursor:'pointer'}}>+ 새 분류 카테고리 추가</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'0 1px 6px rgba(0,0,0,0.06)',border:'1px solid #E5E7EB'}}>

            <button onClick={testTag} style={{width:'100%',padding:'9px',borderRadius:8,background:PRIMARY,color:'#fff',border:'none',fontSize:13,fontWeight:700,cursor:'pointer'}}>분류 테스트 실행</button>
            {testResult&&(
              <div style={{marginTop:12,padding:12,background:'#F5F3FF',borderRadius:8,border:'1px solid #DDD6FE'}}>

              </LineChart>

          </div>
        </div>
      </div>
    </div>
  );
}
