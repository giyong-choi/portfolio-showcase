/* ─── Components ─── */
function Badge({text,variant}){
  const colors={
    '종료':{bg:'#F1F5F9',c:'#475569'},'4Q':{bg:'#FEF2F2',c:'#DC2626'},'후반':{bg:'#FEF2F2',c:'#DC2626'},'7회초':{bg:'#FEF2F2',c:'#DC2626'},
    '예정':{bg:'#EFF6FF',c:'#0066CC'},'정상':{bg:'#ECFDF5',c:'#059669'},'부상':{bg:'#FEF2F2',c:'#DC2626'},
    'W':{bg:'#ECFDF5',c:'#059669'},'L':{bg:'#FEF2F2',c:'#DC2626'},'D':{bg:'#FEF3C7',c:'#D97706'},
  };
  const s=colors[text]||{bg:'#F1F5F9',c:'#475569'};
  return <span style={{display:'inline-block',padding:'3px 8px',borderRadius:6,fontSize:11,fontWeight:600,background:s.bg,color:s.c}}>{text}</span>;
}

function KpiCard({icon,label,value,sub,accent}){
  return(<div style={{background:C.surface,borderRadius:10,padding:'20px 24px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`,animation:'slideUp 500ms ease'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span><span style={{fontSize:20}}>{icon}</span></div>
    <div style={{fontSize:28,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{value}</div>
    {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:6}}>{sub}</div>}
  </div>);
}

function FormGuide({results}){
  return(<div style={{display:'flex',gap:3}}>{results.map((r,i)=>
    <span key={i} style={{width:20,height:20,borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,
      background:r==='W'?'#ECFDF5':r==='L'?'#FEF2F2':'#FEF3C7',color:r==='W'?'#059669':r==='L'?'#DC2626':'#D97706'}}>{r}</span>
  )}</div>);
}

/* ─── Pages ─── */
function DashboardPage(){
  const [activeLeague,setActiveLeague]=useState('전체');
  const leagues=['전체','NBA','EPL','MLB'];
  const filtered=activeLeague==='전체'?TODAY_GAMES:TODAY_GAMES.filter(g=>g.league===activeLeague);
  const live=TODAY_GAMES.filter(g=>!['종료','예정'].includes(g.status)).length;
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>경기 일정 및 결과</h2>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
      <KpiCard icon="🏟️" label="오늘 경기" value={`${TODAY_GAMES.length}경기`} sub={`진행 중 ${live} · 예정 ${TODAY_GAMES.filter(g=>g.status==='예정').length}`}/>
      <KpiCard icon="🏀" label="NBA" value="3경기" sub="시즌 정규리그"/>
      <KpiCard icon="⚽" label="EPL" value="2경기" sub="프리미어리그 30R" accent={C.success}/>
      <KpiCard icon="⚾" label="MLB" value="1경기" sub="아메리칸리그" accent={C.warning}/>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      {leagues.map(l=><button key={l} onClick={()=>setActiveLeague(l)} style={{padding:'6px 16px',borderRadius:8,border:activeLeague===l?'none':`1px solid ${C.border}`,background:activeLeague===l?C.primary:C.surface,color:activeLeague===l?'#fff':C.textLight,fontSize:13,fontWeight:600,cursor:'pointer'}}>{l}</button>)}
    </div>
    <div style={{background:C.surface,borderRadius:10,border:`1px solid ${C.border}`,overflow:'hidden',marginBottom:24}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style={{borderBottom:`2px solid ${C.border}`,background:'#F8FAFC'}}>
          {['리그','홈 팀','스코어','원정 팀','상태','시간(KST)'].map(h=><th key={h} style={{padding:'10px 14px',textAlign:'left',color:C.textMuted,fontWeight:600,fontSize:12}}>{h}</th>)}
        </tr></thead>
        <tbody>{filtered.map(g=><tr key={g.id} style={{borderBottom:`1px solid ${C.border}`}}>
          <td style={{padding:'12px 14px'}}><span style={{padding:'3px 8px',borderRadius:4,background:'#EFF6FF',fontSize:11,fontWeight:600,color:C.primary}}>{g.league}</span></td>
          <td style={{padding:'12px 14px',fontWeight:600}}>{g.home}</td>
          <td style={{padding:'12px 14px',fontWeight:800,fontSize:16,color:g.status==='예정'?C.textMuted:C.text}}>{g.status==='예정'?'vs':`${g.homeScore} : ${g.awayScore}`}</td>
          <td style={{padding:'12px 14px',fontWeight:600}}>{g.away}</td>
          <td style={{padding:'12px 14px'}}><Badge text={g.status}/></td>
          <td style={{padding:'12px 14px',color:C.textMuted}}>{g.time}</td>
        </tr>)}</tbody>
      </table>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20}}>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>월별 평균 득점 추이 (NBA)</div>
        <ResponsiveContainer width="100%" height={200}>
          <AreaChart data={SCORE_TREND}>
            <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.primary} stopOpacity={.15}/><stop offset="95%" stopColor={C.primary} stopOpacity={0}/></linearGradient></defs>
            <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/><XAxis dataKey="month" tick={{fontSize:12,fill:C.textMuted}}/><YAxis domain={[100,115]} tick={{fontSize:12,fill:C.textMuted}}/>
            <Tooltip contentStyle={{borderRadius:8,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}}/><Area type="monotone" dataKey="score" stroke={C.primary} fill="url(#sg)" strokeWidth={2} name="평균 득점"/>
          </AreaChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>리그별 수집 경기 비율</div>
        <ResponsiveContainer width="100%" height={160}>
          <PieChart><Pie data={LEAGUE_PIE} cx="50%" cy="50%" innerRadius={45} outerRadius={65} dataKey="value" paddingAngle={3}>{LEAGUE_PIE.map((e,i)=><Cell key={i} fill={e.color}/>)}</Pie><Tooltip/></PieChart>
        </ResponsiveContainer>
        <div style={{display:'flex',flexWrap:'wrap',justifyContent:'center',gap:10,marginTop:8}}>
          {LEAGUE_PIE.map(d=><div key={d.name} style={{display:'flex',alignItems:'center',gap:4,fontSize:11}}><div style={{width:8,height:8,borderRadius:'50%',background:d.color}}/>{d.name} {d.value}%</div>)}
        </div>
      </div>
    </div>
  </div>);
}

            {['','팀명','리그','승','패','승률','연속','컨퍼런스'].map(h=><th key={h} style={{padding:'10px 14px',textAlign:'left',color:C.textMuted,fontWeight:600,fontSize:12}}>{h}</th>)}
          </tr></thead>
          <tbody>{filtered.map(t=><tr key={t.id} onClick={()=>setSelectedTeam(t)} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',background:selectedTeam?.id===t.id?'#EFF6FF':'transparent',transition:'background 150ms'}}>

            <td style={{padding:'10px 14px',fontWeight:600,color:C.danger}}>{t.loss}</td>

      </div>
      {selectedTeam&&<div>

            <RadarChart data={TEAM_RADAR}><PolarGrid stroke="#E2E8F0"/><PolarAngleAxis dataKey="stat" tick={{fontSize:11,fill:C.textMuted}}/><PolarRadiusAxis domain={[0,100]} tick={false} axisLine={false}/><Radar name={selectedTeam.name} dataKey="teamA" stroke={C.primary} fill={C.primary} fillOpacity={0.2}/></RadarChart>
          </ResponsiveContainer>
        </div>
      </div>}
    </div>
  </div>);
}

function PlayersPage(){
  const [league,setLeague]=useState('NBA');
  const leagues=['NBA','EPL','MLB'];
  const filtered=PLAYERS.filter(p=>p.league===league);
  const [selectedPlayer,setSelectedPlayer]=useState(null);
  const isNBA=league==='NBA';
  const isMLB=league==='MLB';
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>선수 스탯 조회</h2>
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      {leagues.map(l=><button key={l} onClick={()=>{setLeague(l);setSelectedPlayer(null);}} style={{padding:'6px 16px',borderRadius:8,border:league===l?'none':`1px solid ${C.border}`,background:league===l?C.primary:C.surface,color:league===l?'#fff':C.textLight,fontSize:13,fontWeight:600,cursor:'pointer'}}>{l}</button>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:selectedPlayer?'1fr 1fr':'1fr',gap:20}}>
      <div style={{background:C.surface,borderRadius:10,border:`1px solid ${C.border}`,overflow:'hidden'}}>
        <div style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:14,fontWeight:700}}>{league} 선수 목록</span>
          <input placeholder="선수 검색..." style={{padding:'6px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:12,outline:'none',width:180}}/>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`,background:'#F8FAFC'}}>
            {isNBA?['선수명','팀','포지션','PPG','RPG','APG','경기','상태']:
             isMLB?['선수명','팀','포지션','타율','홈런','타점','경기','상태']:
             ['선수명','팀','포지션','골','어시스트','경기','상태','']
            }
            {[].map(h=><th key={h} style={{padding:'8px 12px',textAlign:'left',color:C.textMuted,fontWeight:600,fontSize:12}}>{h}</th>)}
          </tr>
          <tr style={{borderBottom:`2px solid ${C.border}`,background:'#F8FAFC'}}>
            {(isNBA?['선수명','팀','포지션','PPG','RPG','APG','경기','상태']:
              isMLB?['선수명','팀','포지션','타율','홈런','타점','경기','상태']:
              ['선수명','팀','포지션','골','어시스트','경기','상태']
            ).map(h=><th key={h} style={{padding:'8px 12px',textAlign:'left',color:C.textMuted,fontWeight:600,fontSize:12}}>{h}</th>)}
          </tr>
          </thead>
          <tbody>{filtered.map(p=><tr key={p.id} onClick={()=>setSelectedPlayer(p)} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',background:selectedPlayer?.id===p.id?'#EFF6FF':'transparent'}}>
            <td style={{padding:'10px 12px',fontWeight:700}}>{p.name}</td>
            <td style={{padding:'10px 12px',fontSize:12}}>{p.team}</td>
            <td style={{padding:'10px 12px'}}><span style={{padding:'2px 6px',borderRadius:4,background:'#F1F5F9',fontSize:11}}>{p.pos}</span></td>
            <td style={{padding:'10px 12px',fontWeight:600}}>{p.ppg}</td>
            <td style={{padding:'10px 12px'}}>{p.rpg}</td>
            <td style={{padding:'10px 12px'}}>{p.apg}</td>
            <td style={{padding:'10px 12px'}}>{p.gp}</td>
            <td style={{padding:'10px 12px'}}><Badge text={p.status}/></td>
          </tr>)}</tbody>
        </table>
      </div>
      {selectedPlayer&&<div>
        <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`,marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>{selectedPlayer.name}</div>
          <div style={{fontSize:12,color:C.textMuted,marginBottom:16}}>{selectedPlayer.team} · {selectedPlayer.pos} · {selectedPlayer.league}</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
            <div style={{padding:10,background:'#F8FAFC',borderRadius:8,textAlign:'center'}}><div style={{fontSize:10,color:C.textMuted}}>{isNBA?'PPG':isMLB?'타율':'골'}</div><div style={{fontSize:20,fontWeight:800,color:C.primary}}>{selectedPlayer.ppg}</div></div>
            <div style={{padding:10,background:'#F8FAFC',borderRadius:8,textAlign:'center'}}><div style={{fontSize:10,color:C.textMuted}}>{isNBA?'RPG':isMLB?'홈런':'어시스트'}</div><div style={{fontSize:20,fontWeight:800,color:C.success}}>{selectedPlayer.rpg}</div></div>
            <div style={{padding:10,background:'#F8FAFC',borderRadius:8,textAlign:'center'}}><div style={{fontSize:10,color:C.textMuted}}>{isNBA?'APG':isMLB?'타점':'경기'}</div><div style={{fontSize:20,fontWeight:800,color:C.warning}}>{selectedPlayer.apg}</div></div>
            <div style={{padding:10,background:'#F8FAFC',borderRadius:8,textAlign:'center'}}><div style={{fontSize:10,color:C.textMuted}}>경기</div><div style={{fontSize:20,fontWeight:800}}>{selectedPlayer.gp}</div></div>
          </div>
        </div>
        {isNBA&&<div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>최근 경기별 스탯</div>
          <ResponsiveContainer width="100%" height={200}>
            <ComposedChart data={PLAYER_GAMES}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/>
              <XAxis dataKey="game" tick={{fontSize:10,fill:C.textMuted}}/>
              <YAxis tick={{fontSize:11,fill:C.textMuted}}/>
              <Tooltip contentStyle={{borderRadius:8,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}}/>
              <Bar dataKey="pts" fill={C.primary} radius={[3,3,0,0]} name="득점" barSize={20}/>
              <Line type="monotone" dataKey="ast" stroke={C.success} strokeWidth={2} dot={{fill:C.success,r:3}} name="어시스트"/>
              <Line type="monotone" dataKey="reb" stroke={C.warning} strokeWidth={2} dot={{fill:C.warning,r:3}} name="리바운드"/>
            </ComposedChart>
          </ResponsiveContainer>
        </div>}
      </div>}
    </div>
  </div>);
}

function StandingsPage(){
  const [conf,setConf]=useState('동부');
  const data=conf==='동부'?STANDINGS_NBA_EAST:STANDINGS_NBA_WEST;
  const [sortKey,setSortKey]=useState('rank');
  const sorted=[...data].sort((a,b)=>{
    if(sortKey==='rank')return a.rank-b.rank;
    if(sortKey==='win')return b.win-a.win;
    if(sortKey==='loss')return a.loss-b.loss;
    return 0;
  });
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <h2 style={{fontSize:22,fontWeight:800}}>리그 순위표</h2>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>setConf('동부')} style={{padding:'6px 16px',borderRadius:8,border:conf==='동부'?'none':`1px solid ${C.border}`,background:conf==='동부'?C.primary:C.surface,color:conf==='동부'?'#fff':C.textLight,fontSize:13,fontWeight:600,cursor:'pointer'}}>동부</button>
        <button onClick={()=>setConf('서부')} style={{padding:'6px 16px',borderRadius:8,border:conf==='서부'?'none':`1px solid ${C.border}`,background:conf==='서부'?C.primary:C.surface,color:conf==='서부'?'#fff':C.textLight,fontSize:13,fontWeight:600,cursor:'pointer'}}>서부</button>
      </div>
    </div>
    <div style={{background:C.surface,borderRadius:10,border:`1px solid ${C.border}`,overflow:'hidden',marginBottom:24}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style={{borderBottom:`2px solid ${C.border}`,background:'#F8FAFC'}}>
          {[{key:'rank',label:'순위'},{key:'team',label:'팀명'},{key:'win',label:'승'},{key:'loss',label:'패'},{key:'pct',label:'승률'},{key:'gb',label:'GB'},{key:'last5',label:'최근 5경기'},{key:'home',label:'홈'},{key:'away',label:'원정'}].map(h=>
            <th key={h.key} onClick={()=>setSortKey(h.key)} style={{padding:'10px 14px',textAlign:'left',color:sortKey===h.key?C.primary:C.textMuted,fontWeight:600,fontSize:12,cursor:'pointer',userSelect:'none'}}>{h.label}{sortKey===h.key?' ▼':''}</th>
          )}
        </tr></thead>
        <tbody>{sorted.map((t,i)=><tr key={t.team} style={{borderBottom:`1px solid ${C.border}`,background:i<6?'transparent':'#FAFAFA'}}>
          <td style={{padding:'12px 14px',fontWeight:700,color:t.rank<=3?C.primary:t.rank<=6?C.success:C.textMuted}}>{t.rank}</td>
          <td style={{padding:'12px 14px',fontWeight:700}}>{t.team}</td>
          <td style={{padding:'12px 14px',fontWeight:600,color:C.success}}>{t.win}</td>
          <td style={{padding:'12px 14px',fontWeight:600,color:C.danger}}>{t.loss}</td>
          <td style={{padding:'12px 14px',fontWeight:700}}>{t.pct}</td>
          <td style={{padding:'12px 14px',color:C.textMuted}}>{t.gb}</td>
          <td style={{padding:'12px 14px'}}><FormGuide results={t.last5}/></td>
          <td style={{padding:'12px 14px',fontSize:12}}>{t.home}</td>
          <td style={{padding:'12px 14px',fontSize:12}}>{t.away}</td>
        </tr>)}</tbody>
      </table>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>컨퍼런스 승수 분포</div>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={data.slice(0,8)}><CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/><XAxis dataKey="team" tick={{fontSize:10,fill:C.textMuted}}/><YAxis tick={{fontSize:12,fill:C.textMuted}}/><Tooltip/><Bar dataKey="win" fill={C.primary} radius={[4,4,0,0]} name="승"/><Bar dataKey="loss" fill="#FCA5A5" radius={[4,4,0,0]} name="패"/></BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>플레이오프 진출 라인</div>
        <div style={{fontSize:13,color:C.textMuted,marginBottom:12}}>상위 6팀 자동 진출 · 7~10위 플레이인</div>
        {data.slice(0,8).map((t,i)=><div key={t.team} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
          <span style={{width:20,fontSize:12,fontWeight:700,color:i<6?C.success:C.warning}}>{t.rank}</span>
          <span style={{fontSize:13,fontWeight:600,flex:1}}>{t.team}</span>
          <div style={{width:120,height:6,background:'#E2E8F0',borderRadius:3}}>
            <div style={{width:`${(t.win/(t.win+t.loss))*100}%`,height:'100%',borderRadius:3,background:i<6?C.success:i<8?C.warning:C.textMuted}}/>
          </div>
          <span style={{fontSize:12,fontWeight:600,width:40,textAlign:'right'}}>{t.pct}</span>
        </div>)}
      </div>
    </div>
  </div>);
}

function SettingsPage(){
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>시스템 설정</h2>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>수집 스케줄</div>
        {[['NBA 경기 데이터','30분 주기'],['EPL 경기 데이터','45분 주기'],['MLB 경기 데이터','60분 주기'],['선수 부상 정보','1시간 주기'],['리그 순위','경기 종료 후']].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
            <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600,color:C.primary}}>{v}</span></div>
        ))}
      </div>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>데이터 소스 현황</div>
        {[['수집 소스 수','12개'],['최근 수집 시각','2025-06-15 14:32'],['일 수집 건수','약 2,400건'],['DB 용량','4.2 GB'],['Redis 캐시 적중률','87%']].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
            <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600}}>{v}</span></div>
        ))}
      </div>
    </div>
  </div>);
}

/* ─── App Shell ─── */
function App(){
  const[page,setPage]=useState('경기 일정 및 결과 홈');
  const menus=[{name:'경기 일정 및 결과 홈',icon:'🏟️'},{name:'팀 정보 탐색',icon:'🏆'},{name:'선수 스탯 조회',icon:'👤'},{name:'리그 순위표',icon:'📊'},{name:'시스템 설정',icon:'⚙️'}];
  const renderPage=()=>{switch(page){case '경기 일정 및 결과 홈':return <DashboardPage/>;case '팀 정보 탐색':return <TeamsPage/>;case '선수 스탯 조회':return <PlayersPage/>;case '리그 순위표':return <StandingsPage/>;case '시스템 설정':return <SettingsPage/>;default:return <DashboardPage/>;}};

  return(<div style={{display:'flex',height:'100vh'}}>
    <div style={{width:260,background:C.sidebarBg,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column'}}>
      <div style={{padding:'20px 24px',borderBottom:'1px solid rgba(255,255,255,0.1)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🏟️</div>
          <div><div style={{fontSize:16,fontWeight:800,color:'#fff'}}>스포츠허브</div><div style={{fontSize:11,color:C.sidebarText}}>해외 스포츠 정보</div></div>
        </div>
      </div>
      <nav style={{flex:1,padding:'12px 14px'}}>
        {menus.map(m=>(<button key={m.name} onClick={()=>setPage(m.name)} title={m.name} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'12px 14px',borderRadius:10,border:'none',background:page===m.name?C.sidebarActive:'transparent',color:page===m.name?'#fff':C.sidebarText,fontSize:14,fontWeight:page===m.name?600:400,cursor:'pointer',marginBottom:4,transition:'all 150ms',textAlign:'left'}}><span style={{fontSize:18}}>{m.icon}</span>{m.name}</button>))}
      </nav>
      <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.1)'}}>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:C.success}}/>
          <span style={{fontSize:11,color:C.sidebarText}}>수집 엔진 가동 중</span>
        </div>
        <div style={{fontSize:11,color:C.sidebarText}}>NBA · EPL · MLB · NFL</div>
      </div>
    </div>
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'14px 28px',borderBottom:`1px solid ${C.border}`,background:C.surface,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:13,fontWeight:600}}>{page}</span>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <span style={{fontSize:12,color:C.textMuted}}>최근 수집: 3분 전</span>
          <span style={{padding:'4px 10px',borderRadius:6,background:'#ECFDF5',color:C.success,fontSize:12,fontWeight:600}}>● 정상 수집</span>
        </div>
      </div>
      <div style={{flex:1,overflow:'auto',padding:28}}>{renderPage()}</div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
