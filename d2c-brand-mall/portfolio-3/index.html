            <tr style={{background:'#FAFAFF'}}>
              {['주문번호','고객명','주문 상품','결제금액','상태','주문일','관리'].map(h=>(
                <th key={h} style={{padding:'10px 16px',fontSize:12,fontWeight:700,color:'#6B7280',textAlign:'left',borderBottom:'1px solid #ede9fe'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(o=>(
              <tr key={o.id} onClick={()=>setModal(o)} className="row-hover" style={{borderBottom:'1px solid #f5f3ff',cursor:'pointer',transition:'all .15s'}}>
                <td style={{padding:'12px 16px',fontSize:13,fontWeight:600,color:'#7C3AED'}}>{o.id}</td>
                <td style={{padding:'12px 16px',fontSize:14,fontWeight:600}}>{o.customer}</td>
                <td style={{padding:'12px 16px',fontSize:13,color:'#374151',maxWidth:200}}><span style={{display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}}>{o.product}</span></td>
                <td style={{padding:'12px 16px',fontSize:14,fontWeight:700,color:'#1E1B4B'}}>{o.amount.toLocaleString()}원</td>
                <td style={{padding:'12px 16px'}}><span style={{background:`${statusColor[o.status]}15`,color:statusColor[o.status],fontSize:12,fontWeight:700,padding:'3px 10px',borderRadius:6}}>{o.status}</span></td>
                <td style={{padding:'12px 16px',fontSize:13,color:'#6B7280'}}>{o.date}</td>
                <td style={{padding:'12px 16px'}}>
                  <button onClick={e=>{e.stopPropagation();setModal(o)}} style={{padding:'5px 10px',borderRadius:6,border:'1px solid #ede9fe',background:'#fff',fontSize:12,color:'#7C3AED',fontWeight:600,cursor:'pointer'}}>상세</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {modal && (
        <div onClick={()=>setModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1000}}>
          <div onClick={e=>e.stopPropagation()} style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'#fff',borderRadius:20,padding:'32px',width:480,animation:'fadeInScale .2s ease both',zIndex:1001}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
              <div>
                <p style={{fontSize:12,color:'#9CA3AF',marginBottom:4}}>{modal.date}</p>
                <h3 style={{fontSize:16,fontWeight:800,color:'#7C3AED'}}>{modal.id}</h3>
              </div>
              <span style={{background:`${statusColor[modal.status]}15`,color:statusColor[modal.status],fontSize:13,fontWeight:700,padding:'5px 12px',borderRadius:8}}>{modal.status}</span>
            </div>
            {[{l:'고객명',v:modal.customer},{l:'배송지',v:modal.addr},{l:'주문 상품',v:modal.product},{l:'결제 금액',v:`${modal.amount.toLocaleString()}원`}].map((r,i)=>(
              <div key={i} style={{display:'flex',gap:12,padding:'10px 0',borderBottom:'1px solid #f5f3ff'}}>
                <p style={{fontSize:13,color:'#9CA3AF',width:80,flexShrink:0}}>{r.l}</p>
                <p style={{fontSize:14,fontWeight:600,flex:1}}>{r.v}</p>
              </div>
            ))}
            <div style={{marginTop:20}}>
              <p style={{fontSize:13,fontWeight:700,marginBottom:10}}>주문 상태 변경</p>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {['준비중','배송중','배송완료','환불처리'].map(s=>(
                  <button key={s} onClick={()=>setModal(null)} style={{padding:'7px 14px',borderRadius:8,border:`1px solid ${statusColor[s]}`,background:'#fff',color:statusColor[s],fontSize:13,fontWeight:600,cursor:'pointer'}}>{s}</button>
                ))}
              </div>
            </div>
            <button onClick={()=>setModal(null)} style={{position:'absolute',top:16,right:16,background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#999'}}>✕</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── App ── */
function App(){
  const [page, setPage] = useState('쇼핑몰');
  const [loading, setLoading] = useState(false);
  const [collapsed, setCollapsed] = useState(false);

  const navigate = (p) => {
    if(p===page) return;
    setLoading(true);
    setTimeout(()=>{setPage(p);setLoading(false)},1500);
  };

  const navItems = [
    {label:'쇼핑몰',icon:'🛍️',desc:'자사몰 프론트'},
    {label:'콘텐츠',icon:'✏️',desc:'CMS 에디터'},
    {label:'상품관리',icon:'📦',desc:'재고·옵션'},
    {label:'주문관리',icon:'📋',desc:'주문·배송'},
  ];

  const sidebarW = collapsed ? 64 : 240;

  return(
    <div style={{display:'flex',height:'100vh',background:'#FAF5FF'}}>
      {/* Sidebar */}
      <aside style={{width:sidebarW,background:'#fff',borderRight:'1px solid #ede9fe',display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,height:'100vh',zIndex:100,transition:'width .2s',overflow:'hidden',boxShadow:'2px 0 12px rgba(124,58,237,0.06)'}}>
        {/* Logo */}
        <div style={{padding:collapsed?'20px 14px':'20px 18px',borderBottom:'1px solid #ede9fe',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10,overflow:'hidden'}}>
            <div style={{width:34,height:34,borderRadius:10,background:'linear-gradient(135deg,#7C3AED,#5B21B6)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:16,fontWeight:800,flexShrink:0}}>B</div>
            {!collapsed && <div style={{overflow:'hidden'}}>
              <p style={{fontSize:15,fontWeight:900,color:'#1E1B4B',whiteSpace:'nowrap'}}>벨르아</p>
              <p style={{fontSize:10,color:'#A78BFA',fontWeight:600,letterSpacing:'1.5px',whiteSpace:'nowrap'}}>BELLEUA</p>
            </div>}
          </div>
          <button onClick={()=>setCollapsed(c=>!c)} style={{background:'none',border:'none',cursor:'pointer',color:'#C4B5FD',fontSize:16,flexShrink:0,padding:0}}>{collapsed?'›':'‹'}</button>
        </div>

        <nav style={{flex:1,padding:'14px 10px',overflow:'hidden'}}>
          {!collapsed && <p style={{fontSize:10,fontWeight:700,color:'#C4B5FD',letterSpacing:'2px',textTransform:'uppercase',padding:'0 8px',marginBottom:8}}>Menu</p>}
          {navItems.map(item=>(
            <button key={item.label} onClick={()=>navigate(item.label)} title={collapsed?item.label:''} style={{width:'100%',display:'flex',alignItems:'center',gap:collapsed?0:10,padding:collapsed?'11px':'11px 12px',borderRadius:10,border:'none',background:page===item.label?'linear-gradient(135deg,#F5F3FF,#EDE9FE)':'none',color:page===item.label?'#7C3AED':'#6B7280',fontSize:13,fontWeight:page===item.label?700:500,cursor:'pointer',marginBottom:2,transition:'all .2s',textAlign:'left',justifyContent:collapsed?'center':'flex-start'}}>
              <span style={{fontSize:18,flexShrink:0}}>{item.icon}</span>
              {!collapsed && <div style={{overflow:'hidden'}}>
                <p style={{fontWeight:page===item.label?700:500,whiteSpace:'nowrap'}}>{item.label}</p>
                <p style={{fontSize:10,color:'#C4B5FD',whiteSpace:'nowrap'}}>{item.desc}</p>
              </div>}
            </button>
          ))}
        </nav>

        {!collapsed && <div style={{padding:'14px 18px',borderTop:'1px solid #ede9fe',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'#F5F3FF',borderRadius:10}}>
            <div style={{width:30,height:30,borderRadius:'50%',background:'linear-gradient(135deg,#7C3AED,#5B21B6)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:800,flexShrink:0}}>박</div>
            <div style={{overflow:'hidden'}}>
              <p style={{fontSize:12,fontWeight:700,color:'#1E1B4B',whiteSpace:'nowrap'}}>박민지 관리자</p>
              <p style={{fontSize:11,color:'#A78BFA',whiteSpace:'nowrap'}}>슈퍼 어드민</p>
            </div>
          </div>
        </div>}
      </aside>

      {/* Main */}
      <main style={{marginLeft:sidebarW,flex:1,height:'100vh',overflowY:'auto',transition:'margin-left .2s'}}>
        {/* Topbar */}
        <div style={{height:58,background:'#fff',borderBottom:'1px solid #ede9fe',display:'flex',alignItems:'center',padding:'0 28px',justifyContent:'space-between',position:'sticky',top:0,zIndex:50,boxShadow:'0 1px 6px rgba(124,58,237,0.05)'}}>
          <div>
            <p style={{fontSize:11,color:'#C4B5FD'}}>벨르아 어드민 / {page}</p>
            <p style={{fontSize:15,fontWeight:800,color:'#1E1B4B',lineHeight:1.2}}>{page}</p>
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <div style={{position:'relative'}}>
              <button style={{width:36,height:36,borderRadius:10,border:'1px solid #ede9fe',background:'#fff',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>🔔</button>
              <div style={{position:'absolute',top:2,right:2,width:8,height:8,borderRadius:'50%',background:'#EF4444'}}/>
            </div>
            <button style={{background:'#7C3AED',color:'#fff',border:'none',borderRadius:8,padding:'7px 16px',fontSize:13,fontWeight:700,cursor:'pointer'}}>+ 빠른 등록</button>
          </div>
        </div>

        {loading ? <Skel/> : (
          page==='쇼핑몰' ? <ShopView/> :
          page==='콘텐츠' ? <CMSView/> :
          page==='상품관리' ? <ProductAdmin/> :
          <OrderDashboard/>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
