function SubscriptionView(){
  const [selected, setSelected] = useState(null);
  const [status, setStatus] = useState({1:'active',2:'pause',3:null});
  const [modal, setModal] = useState(null);
  const [step, setStep] = useState(1);

  const subscribe = (plan) => { setModal(plan); setStep(1); };
  const confirm = () => {
    if(step<3) setStep(s=>s+1);
    else { setStatus(s=>({...s,[modal.id]:'active'})); setModal(null); }
  };

  return(
    <div className="fade-in" style={{maxWidth:1100,margin:'0 auto',padding:'32px 28px'}}>
      <div style={{marginBottom:28}}>
        <h2 style={{fontSize:24,fontWeight:900,marginBottom:6,color:'#064E3B'}}>구독박스</h2>

      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20,marginBottom:32}}>
        {PLANS.map(plan=>{
          const st = status[plan.id];
          return(
            <div key={plan.id} style={{background:'#fff',borderRadius:18,border:st==='active'?`2px solid ${plan.color}`:'1px solid #e8f5e9',overflow:'hidden',boxShadow:'0 4px 16px rgba(0,0,0,0.06)',position:'relative'}}>
              {plan.badge && <div style={{position:'absolute',top:12,right:12,background:plan.color,color:'#fff',fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:12}}>{plan.badge}</div>}
              <div style={{background:`linear-gradient(135deg,${plan.color}15,${plan.color}25)`,padding:'28px 24px 20px'}}>
                <p style={{fontSize:11,color:plan.color,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:8}}>{plan.cycle} 배송</p>
                <h3 style={{fontSize:18,fontWeight:800,marginBottom:8,color:'#064E3B'}}>{plan.name}</h3>
                <div style={{display:'flex',alignItems:'baseline',gap:4}}>
                  <span style={{fontSize:26,fontWeight:900,color:plan.color}}>{plan.price.toLocaleString()}</span>
                  <span style={{fontSize:14,color:'#6B7280'}}>원 / {plan.cycle==='매주'?'주':plan.cycle==='격주'?'2주':'월'}</span>
                </div>
                <p style={{fontSize:12,color:'#059669',fontWeight:600,marginTop:4}}>🎁 {plan.savings}</p>
              </div>
              <div style={{padding:'16px 24px 24px'}}>
                <p style={{fontSize:13,color:'#4B5563',lineHeight:1.7,marginBottom:14}}>{plan.desc}</p>
                <ul style={{listStyle:'none',marginBottom:18}}>
                  {plan.items.map((it,i)=>(
                    <li key={i} style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#374151',marginBottom:6}}>
                      <span style={{color:plan.color,fontSize:15}}>✓</span>{it}
                    </li>
                  ))}
                </ul>
                {st==='active' ? (
                  <div>
                    <div style={{background:'#ECFDF5',borderRadius:10,padding:'10px 14px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontSize:13,color:'#059669',fontWeight:700}}>● 구독 중</span>
                      <span style={{fontSize:12,color:'#6B7280'}}>다음 배송 4월 22일</span>
                    </div>
                    <div style={{display:'flex',gap:8}}>
                      <button onClick={()=>setStatus(s=>({...s,[plan.id]:'pause'}))} style={{flex:1,padding:'9px',borderRadius:8,border:'1px solid #e8f5e9',background:'#fff',fontSize:13,color:'#6B7280',fontWeight:600,cursor:'pointer'}}>일시정지</button>
                      <button onClick={()=>setStatus(s=>({...s,[plan.id]:null}))} style={{flex:1,padding:'9px',borderRadius:8,border:'1px solid #FCA5A5',background:'#FFF5F5',fontSize:13,color:'#EF4444',fontWeight:600,cursor:'pointer'}}>해지</button>
                    </div>
                  </div>
                ) : st==='pause' ? (
                  <div>
                    <div style={{background:'#FFFBEB',borderRadius:10,padding:'10px 14px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontSize:13,color:'#D97706',fontWeight:700}}>⏸ 일시정지 중</span>
                    </div>
                    <button onClick={()=>setStatus(s=>({...s,[plan.id]:'active'}))} style={{width:'100%',padding:'10px',borderRadius:8,border:'none',background:plan.color,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>재개하기</button>
                  </div>
                ) : (
                  <button onClick={()=>subscribe(plan)} style={{width:'100%',padding:'11px',borderRadius:10,border:'none',background:plan.color,color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',transition:'all .2s'}}
                    onMouseEnter={e=>e.currentTarget.style.opacity='0.9'} onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                    구독 시작하기
                  </button>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* FAQ */}
      <div style={{background:'#fff',borderRadius:16,padding:'24px',border:'1px solid #e8f5e9'}}>
        <h3 style={{fontSize:16,fontWeight:800,marginBottom:16,color:'#064E3B'}}>구독 FAQ</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
          {[
            {q:'구독은 언제 취소할 수 있나요?',a:'다음 배송일 3일 전까지 언제든지 앱에서 취소 가능합니다. 위약금이나 별도 비용은 없습니다.'},
            {q:'배송은 얼마나 걸리나요?',a:'결제 확인 후 1~2일 이내에 신선도 유지 포장으로 배송됩니다. 제주/도서 지역은 2~3일 소요됩니다.'},
            {q:'구성 상품을 변경할 수 있나요?',a:'결제 전까지 마이페이지에서 박스 구성을 변경할 수 있습니다. 구독 플랜 자체도 언제든 변경 가능합니다.'},
            {q:'신선도 문제 시 어떻게 하나요?',a:'수령 후 24시간 이내 사진과 함께 고객센터에 문의주시면 전액 환불 또는 재발송 처리해드립니다.'},
          ].map((f,i)=>(
            <div key={i} style={{padding:'16px',background:'#F9FFF9',borderRadius:10,border:'1px solid #e8f5e9'}}>
              <p style={{fontSize:13,fontWeight:700,marginBottom:6,color:'#064E3B'}}>Q. {f.q}</p>
              <p style={{fontSize:13,color:'#6B7280',lineHeight:1.6}}>A. {f.a}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Subscription modal */}
      {modal && (
        <div onClick={()=>setModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1000}}>
          <div onClick={e=>e.stopPropagation()} style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'#fff',borderRadius:20,padding:'36px',width:480,animation:'fadeInScale .2s ease both',zIndex:1001}}>
            <div style={{display:'flex',justifyContent:'center',gap:0,marginBottom:28}}>
              {['플랜 확인','배송 정보','결제'].map((s,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center'}}>
                  <div style={{width:28,height:28,borderRadius:'50%',background:step>i?modal.color:'#e5e7eb',color:step>i?'#fff':'#9ca3af',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700}}>{i+1}</div>
                  {i<2 && <div style={{width:40,height:2,background:step>i+1?modal.color:'#e5e7eb'}}/>}
                </div>
              ))}
            </div>
            {step===1 && <div>
              <h3 style={{fontSize:18,fontWeight:800,marginBottom:6}}>{modal.name}</h3>
              <p style={{fontSize:22,fontWeight:900,color:modal.color,marginBottom:16}}>{modal.price.toLocaleString()}원<span style={{fontSize:14,color:'#6B7280',fontWeight:400}}> / {modal.cycle==='매주'?'주':'월'}</span></p>
              <ul style={{listStyle:'none',marginBottom:20}}>
                {modal.items.map((it,i)=><li key={i} style={{display:'flex',alignItems:'center',gap:8,fontSize:14,color:'#374151',marginBottom:8}}><span style={{color:modal.color}}>✓</span>{it}</li>)}
              </ul>
            </div>}
            {step===2 && <div>
              <h3 style={{fontSize:16,fontWeight:800,marginBottom:16}}>배송 정보 확인</h3>
              <div style={{background:'#F9FFF9',borderRadius:10,padding:'16px',marginBottom:16}}>
                <p style={{fontSize:13,fontWeight:700,marginBottom:8}}>기본 배송지</p>
                <p style={{fontSize:14,color:'#374151'}}>서울 마포구 합정동 123-45<br/>김지수 | 010-1234-5678</p>
              </div>
              <p style={{fontSize:13,color:'#6B7280'}}>첫 배송은 결제 후 1~2일 이내 출발합니다.</p>
            </div>}
            {step===3 && <div>
              <h3 style={{fontSize:16,fontWeight:800,marginBottom:16}}>결제 수단 선택</h3>
              {['신용·체크카드','카카오페이','네이버페이'].map((p,i)=>(
                <div key={i} style={{padding:'12px 16px',borderRadius:10,border:i===0?`2px solid ${modal.color}`:'1px solid #e5e7eb',marginBottom:8,cursor:'pointer',display:'flex',alignItems:'center',gap:12}}>
                  <div style={{width:20,height:20,borderRadius:'50%',background:i===0?modal.color:'#e5e7eb',border:'none'}}/>
                  <span style={{fontSize:14,fontWeight:i===0?700:400}}>{p}</span>
                </div>
              ))}
              <div style={{background:'#F9FFF9',borderRadius:10,padding:'12px 16px',marginTop:12}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:14}}><span>구독 금액</span><span style={{fontWeight:700}}>{modal.price.toLocaleString()}원</span></div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:14,color:'#059669',marginTop:4}}><span>구독 할인</span><span style={{fontWeight:700}}>-{modal.savings}</span></div>
              </div>
            </div>}
            <button onClick={confirm} style={{width:'100%',marginTop:20,padding:'13px',borderRadius:10,border:'none',background:modal.color,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer'}}>
              {step<3?'다음 →':'구독 시작'}
            </button>
            <button onClick={()=>setModal(null)} style={{position:'absolute',top:16,right:16,background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#999'}}>✕</button>
          </div>
        </div>
      )}
    </div>
  );
}

function RecipeView(){
  const [selected, setSelected] = useState(null);
  const [tag, setTag] = useState('전체');
  const tags = ['전체','국·찌개','반찬','아침 식사','음료'];
  const filtered = RECIPES.filter(r=>tag==='전체'||r.tag===tag);

  return(
    <div className="fade-in" style={{maxWidth:1100,margin:'0 auto',padding:'32px 28px'}}>
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:24,fontWeight:900,marginBottom:6,color:'#064E3B'}}>레시피</h2>
        <p style={{color:'#6B7280',fontSize:14}}>그린루트 식재료로 만드는 건강한 레시피</p>
      </div>

      {/* Featured */}
      <div onClick={()=>setSelected(RECIPES[0])} style={{background:'linear-gradient(135deg,#064E3B,#065F46)',borderRadius:18,padding:'32px',marginBottom:24,cursor:'pointer',display:'flex',gap:24,alignItems:'center',boxShadow:'0 4px 20px rgba(6,78,59,0.3)'}}>
        <div style={{flex:1}}>
          <span style={{background:'rgba(52,211,153,0.25)',color:'#34D399',fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:4,letterSpacing:'1px'}}>이번 주 추천</span>
          <h3 style={{color:'#F0FDF4',fontSize:22,fontWeight:800,margin:'12px 0 10px',lineHeight:1.35}}>{RECIPES[0].name}</h3>
          <p style={{color:'rgba(240,253,244,0.7)',fontSize:13,lineHeight:1.7,marginBottom:16}}>재료: {RECIPES[0].ingredients.slice(0,3).join(', ')} 등 {RECIPES[0].ingredients.length}가지</p>
          <div style={{display:'flex',gap:16}}>
            <span style={{color:'rgba(240,253,244,0.7)',fontSize:12}}>⏱ {RECIPES[0].time}분</span>
            <span style={{color:'rgba(240,253,244,0.7)',fontSize:12}}>👨‍🍳 {RECIPES[0].diff}</span>
          </div>
        </div>
        <div style={{fontSize:72}}>{RECIPES[0].emoji}</div>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
        {tags.map(t=>(
          <button key={t} onClick={()=>setTag(t)} style={{padding:'7px 16px',borderRadius:20,border:tag===t?'none':'1px solid #d1fae5',background:tag===t?'#059669':'#fff',color:tag===t?'#fff':'#6B7280',fontSize:13,fontWeight:tag===t?700:400,cursor:'pointer',transition:'all .2s'}}>{t}</button>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:18}}>
        {filtered.map(r=>(
          <div key={r.id} onClick={()=>setSelected(r)} className="card-hover" style={{background:'#fff',borderRadius:14,padding:'20px',cursor:'pointer',boxShadow:'0 2px 10px rgba(0,0,0,0.05)',border:'1px solid #e8f5e9',display:'flex',gap:16,alignItems:'center'}}>
            <div style={{fontSize:44,flexShrink:0}}>{r.emoji}</div>
            <div style={{flex:1}}>
              <span style={{background:'rgba(5,150,105,0.1)',color:'#059669',fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:4}}>{r.tag}</span>
              <p style={{fontSize:16,fontWeight:700,margin:'8px 0 6px'}}>{r.name}</p>
              <p style={{fontSize:12,color:'#6B7280'}}>⏱ {r.time}분 · 재료 {r.ingredients.length}가지 · {r.diff}</p>
            </div>
            <span style={{color:'#059669',fontSize:18}}>›</span>
          </div>
        ))}
      </div>

      {selected && (
        <div onClick={()=>setSelected(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1000}}>
          <div onClick={e=>e.stopPropagation()} style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'#fff',borderRadius:20,padding:'36px',width:540,maxHeight:'82vh',overflowY:'auto',animation:'fadeInScale .2s ease both',zIndex:1001}}>
            <div style={{textAlign:'center',fontSize:56,marginBottom:16}}>{selected.emoji}</div>
            <span style={{background:'rgba(5,150,105,0.1)',color:'#059669',fontSize:12,fontWeight:700,padding:'3px 10px',borderRadius:4}}>{selected.tag}</span>
            <h2 style={{fontSize:22,fontWeight:900,margin:'12px 0 6px',color:'#064E3B'}}>{selected.name}</h2>
            <p style={{color:'#6B7280',fontSize:13,marginBottom:20}}>⏱ {selected.time}분 · {selected.diff}</p>
            <div style={{background:'#F0FDF4',borderRadius:12,padding:'16px',marginBottom:20}}>
              <p style={{fontSize:13,fontWeight:800,marginBottom:10,color:'#064E3B'}}>재료</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {selected.ingredients.map((ing,i)=>(
                  <span key={i} style={{background:'#fff',border:'1px solid #d1fae5',borderRadius:20,padding:'4px 12px',fontSize:13,color:'#374151'}}>{ing}</span>
                ))}
              </div>
            </div>
            <div>
              <p style={{fontSize:13,fontWeight:800,marginBottom:12,color:'#064E3B'}}>만드는 법</p>
              {selected.steps.map((step,i)=>(
                <div key={i} style={{display:'flex',gap:12,marginBottom:12,alignItems:'flex-start'}}>
                  <div style={{width:24,height:24,borderRadius:'50%',background:'#059669',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>{i+1}</div>
                  <p style={{fontSize:14,color:'#374151',lineHeight:1.6,paddingTop:2}}>{step}</p>
                </div>
              ))}
            </div>
            <button onClick={()=>setSelected(null)} style={{position:'absolute',top:16,right:16,background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#999'}}>✕</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ProductView(){

  const [modal, setModal] = useState(null);
  const [tab, setTab] = useState('정보');
  const cats = ['전체','곡류','과일','오일·소스','채소','가공식품','음료'];

  return(
    <div className="fade-in" style={{maxWidth:1100,margin:'0 auto',padding:'32px 28px'}}>
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:24,fontWeight:900,marginBottom:6,color:'#064E3B'}}>상품</h2>
        <p style={{color:'#6B7280',fontSize:14}}>엄선한 유기농·무농약 식품 라인업</p>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:24,flexWrap:'wrap'}}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setCat(c)} style={{padding:'7px 16px',borderRadius:20,border:cat===c?'none':'1px solid #d1fae5',background:cat===c?'#059669':'#fff',color:cat===c?'#fff':'#6B7280',fontSize:13,fontWeight:cat===c?700:400,cursor:'pointer',transition:'all .2s'}}>{c}</button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:18}}>
        {PRODS.filter(p=>cat==='전체'||p.cat===cat).map(p=>(
          <div key={p.id} onClick={()=>{setModal(p);setTab('정보')}} className="card-hover" style={{background:'#fff',borderRadius:16,overflow:'hidden',cursor:'pointer',boxShadow:'0 2px 10px rgba(0,0,0,0.05)',border:'1px solid #e8f5e9'}}>
            <div style={{height:160,background:`${p.color}40`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:44,position:'relative'}}>
              {p.emoji}
              <span style={{position:'absolute',bottom:8,left:8,background:'#059669',color:'#fff',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:4}}>{p.cert}</span>
            </div>
            <div style={{padding:'14px 16px 18px'}}>
              <span style={{fontSize:11,color:'#059669',fontWeight:600}}>{p.cat}</span>
              <p style={{fontSize:14,fontWeight:700,margin:'6px 0',lineHeight:1.4}}>{p.name}</p>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:15,fontWeight:800,color:'#059669'}}>{p.price.toLocaleString()}원</span>
                <span style={{fontSize:12,color:'#6B7280'}}>📍 {p.origin}</span>
              </div>
            </div>
          </div>
        ))}
      </div>

      {modal && (
        <div onClick={()=>setModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1000}}>
          <div onClick={e=>e.stopPropagation()} style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'#fff',borderRadius:20,padding:'36px',width:520,maxHeight:'80vh',overflowY:'auto',animation:'fadeInScale .2s ease both',zIndex:1001}}>
            <div style={{display:'flex',gap:20,marginBottom:20}}>
              <div style={{width:120,height:120,borderRadius:14,background:`${modal.color}40`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:52,flexShrink:0}}>{modal.emoji}</div>
              <div style={{flex:1}}>
                <div style={{display:'flex',gap:6,marginBottom:8}}>
                  <span style={{background:'rgba(5,150,105,0.1)',color:'#059669',fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:4}}>{modal.cert}</span>
                  <span style={{background:'rgba(107,114,128,0.1)',color:'#6B7280',fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:4}}>{modal.cat}</span>
                </div>
                <h3 style={{fontSize:17,fontWeight:800,marginBottom:8,lineHeight:1.4}}>{modal.name}</h3>
                <p style={{fontSize:22,fontWeight:900,color:'#059669',marginBottom:4}}>{modal.price.toLocaleString()}원</p>
                <p style={{fontSize:12,color:'#6B7280'}}>📍 원산지: {modal.origin}</p>
              </div>
            </div>
            <div style={{display:'flex',gap:4,marginBottom:16}}>
              {['정보','영양성분'].map(t=>(
                <button key={t} onClick={()=>setTab(t)} style={{padding:'7px 16px',borderRadius:8,border:'none',background:tab===t?'#059669':'#f3f4f6',color:tab===t?'#fff':'#6B7280',fontSize:13,fontWeight:tab===t?700:400,cursor:'pointer'}}>{t}</button>
              ))}
            </div>
            {tab==='정보' && <div style={{background:'#F0FDF4',borderRadius:12,padding:'16px'}}>
              <p style={{fontSize:14,color:'#374151',lineHeight:1.7}}>국내 유기농 인증 농가에서 재배한 {modal.name}입니다. 화학 비료와 농약을 사용하지 않고 자연 순환 농법으로 재배되었습니다. 산지에서 직접 수확하여 신선도를 유지한 채로 배송됩니다.</p>
            </div>}
            {tab==='영양성분' && <div style={{background:'#F0FDF4',borderRadius:12,padding:'16px'}}>
              <p style={{fontSize:13,fontWeight:700,marginBottom:10,color:'#064E3B'}}>100g 기준 영양성분</p>
              {Object.entries(modal.nutrition).map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #d1fae5',fontSize:13}}>
                  <span style={{color:'#374151'}}>{k}</span><span style={{fontWeight:700,color:'#064E3B'}}>{v}</span>
                </div>
              ))}
            </div>}
            <div style={{display:'flex',gap:10,marginTop:20}}>
              <button style={{flex:1,padding:'12px',borderRadius:10,border:'1px solid #059669',background:'#fff',color:'#059669',fontSize:14,fontWeight:700,cursor:'pointer'}}>장바구니</button>
              <button style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:'#059669',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>바로 구매</button>
            </div>
            <button onClick={()=>setModal(null)} style={{position:'absolute',top:16,right:16,background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#999'}}>✕</button>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [page, setPage] = useState('홈');
  const [loading, setLoading] = useState(false);

  const navigate = (p) => {
    if(p===page) return;
    setLoading(true);
    setTimeout(()=>{setPage(p);setLoading(false)},1500);
  };

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#F0FDF4',overflow:'hidden'}}>
      <NavBar page={page} onNav={navigate}/>
      <div style={{flex:1,overflowY:'auto'}}>
        {loading ? <Skel/> : (
          page==='홈' ? <HomeView onNav={navigate}/> :
          page==='구독박스' ? <SubscriptionView/> :
          page==='레시피' ? <RecipeView/> :
          <ProductView/>
        )}
        <div style={{height:40}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
