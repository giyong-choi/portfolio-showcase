<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모아스토어 — 라이프스타일 편집숍</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Pretendard',sans-serif;background:#FFF8F0;color:#1A1A1A;word-break:keep-all;overflow-wrap:break-word;overflow:hidden}
    :root{--primary:#FF6B35;--secondary:#004E64;--accent:#25A18E;--bg:#FFF8F0;--surface:#FFFFFF;--txt:#1A1A1A;--txt2:#6B6B6B;--sidebar:260px;--topbar:60px}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#f1ede9}
    ::-webkit-scrollbar-thumb{background:#d4c4b4;border-radius:3px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .skeleton{background:linear-gradient(90deg,#f0e8e0 25%,#e8ddd4 50%,#f0e8e0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .fade-in{animation:fadeIn .35s ease both}
  </style>
</head>
<body>
<div id="root"></div>

function Badge({tag}){
  if(!tag) return null;
  return <span style={{display:'inline-block',padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:700,background:tag==='베스트'?'#FF6B35':tag==='신상'?'#25A18E':'#eee',color:tag==='베스트'||tag==='신상'?'#fff':'#666',letterSpacing:'0.5px'}}>{tag}</span>;
}

function Skel(){
  return <div style={{padding:'0 28px',paddingTop:20}}>
    {[1,2,3].map(i=><div key={i} className="skeleton" style={{height:24,borderRadius:8,marginBottom:12,width:['80%','60%','70%'][i-1]}}/>)}
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginTop:24}}>
      {[1,2,3,4,5,6].map(i=><div key={i} className="skeleton" style={{height:200,borderRadius:12}}/>)}
    </div>
  </div>;
}

function ProductsView({onSelect}){
  const [category, setCategory] = useState('전체');
  const [sort, setSort] = useState('추천순');
  const [modal, setModal] = useState(null);
  const [qty, setQty] = useState(1);
  const [selectedOpt, setSelectedOpt] = useState(0);
  const [toastMsg, setToastMsg] = useState('');
  const cats = ['전체','패브릭','오브제','수납','키친','향기'];
  const sorted = PRODUCTS
    .filter(p=>category==='전체'||p.category===category)
    .sort((a,b)=>sort==='가격낮은순'?a.price-b.price:sort==='가격높은순'?b.price-a.price:a.id-b.id);

  const addCart = () => {
    setToastMsg(`${modal.name}이(가) 장바구니에 담겼습니다.`);
    setTimeout(()=>setToastMsg(''),2500);
    setModal(null);
  };

  return(
    <div className="fade-in" style={{padding:'24px 28px'}}>
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:22,fontWeight:800,marginBottom:4}}>상품</h2>
        <p style={{color:'#6B6B6B',fontSize:13}}>자연 소재로 만든 라이프스타일 아이템을 만나보세요</p>
      </div>
      {/* Filters */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {cats.map(c=>(
            <button key={c} onClick={()=>setCategory(c)} style={{padding:'7px 16px',borderRadius:20,border:category===c?'none':'1px solid #e0d8d0',background:category===c?'#FF6B35':'#fff',color:category===c?'#fff':'#6B6B6B',fontSize:13,fontWeight:category===c?700:400,cursor:'pointer',transition:'all .2s'}}>{c}</button>
          ))}
        </div>
        <select value={sort} onChange={e=>setSort(e.target.value)} style={{border:'1px solid #e0d8d0',borderRadius:8,padding:'7px 12px',fontSize:13,color:'#1A1A1A',background:'#fff',cursor:'pointer',outline:'none'}}>
          {['추천순','가격낮은순','가격높은순'].map(s=><option key={s}>{s}</option>)}
        </select>
      </div>
      <p style={{fontSize:13,color:'#6B6B6B',marginBottom:16}}>{sorted.length}개 상품</p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:18}}>

          <div key={p.id} onClick={()=>{setModal(p);setQty(1);setSelectedOpt(0)}} style={{background:'#fff',borderRadius:14,overflow:'hidden',cursor:'pointer',boxShadow:'0 2px 10px rgba(0,0,0,0.06)',transition:'all .25s'}}

            <div style={{background:p.color,height:170,display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,position:'relative'}}>

            <div style={{padding:'14px 16px 16px'}}>
              <span style={{fontSize:11,color:'#25A18E',fontWeight:600}}>{p.category}</span>
              <p style={{fontSize:14,fontWeight:700,color:'#1A1A1A',margin:'6px 0',lineHeight:1.4}}>{p.name}</p>
              <p style={{fontSize:15,fontWeight:800,color:'#FF6B35'}}>{p.price.toLocaleString()}원</p>
            </div>
          </div>
        ))}
      </div>

      {/* Modal */}
      {modal && (
        <div onClick={()=>setModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>

              <div style={{flex:1}}>

                <p style={{fontSize:13,color:'#6B6B6B',lineHeight:1.7}}>{modal.desc}</p>
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <p style={{fontSize:13,fontWeight:700,marginBottom:8}}>옵션 선택</p>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {modal.options.map((o,i)=>(
                  <button key={i} onClick={()=>setSelectedOpt(i)} style={{padding:'7px 14px',borderRadius:8,border:selectedOpt===i?'2px solid #FF6B35':'1px solid #e0d8d0',background:selectedOpt===i?'#FFF0E8':'#fff',color:selectedOpt===i?'#FF6B35':'#666',fontSize:13,fontWeight:selectedOpt===i?700:400,cursor:'pointer'}}>{o}</button>
                ))}
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
              <p style={{fontSize:13,fontWeight:700}}>수량</p>
              <div style={{display:'flex',alignItems:'center',gap:0,border:'1px solid #e0d8d0',borderRadius:8,overflow:'hidden'}}>
                <button onClick={()=>setQty(q=>Math.max(1,q-1))} style={{width:36,height:36,border:'none',background:'#fff',fontSize:18,cursor:'pointer',color:'#333'}}>−</button>
                <span style={{width:40,textAlign:'center',fontSize:14,fontWeight:700}}>{qty}</span>
                <button onClick={()=>setQty(q=>q+1)} style={{width:36,height:36,border:'none',background:'#fff',fontSize:18,cursor:'pointer',color:'#333'}}>+</button>
              </div>
              <span style={{fontSize:14,fontWeight:700,color:'#FF6B35',marginLeft:'auto'}}>{(modal.price*qty).toLocaleString()}원</span>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={addCart} style={{flex:1,background:'#FF6B35',color:'#fff',border:'none',borderRadius:10,padding:'13px',fontSize:14,fontWeight:700,cursor:'pointer'}}>장바구니 담기</button>
              <button onClick={addCart} style={{flex:1,background:'#004E64',color:'#fff',border:'none',borderRadius:10,padding:'13px',fontSize:14,fontWeight:700,cursor:'pointer'}}>바로 구매</button>
            </div>
            <button onClick={()=>setModal(null)} style={{position:'absolute',top:16,right:16,background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#999'}}>✕</button>
          </div>
        </div>
      )}
      {toastMsg && <div style={{position:'fixed',bottom:32,left:'50%',transform:'translateX(-50%)',background:'#1A1A1A',color:'#fff',padding:'12px 24px',borderRadius:10,fontSize:14,fontWeight:600,zIndex:2000,whiteSpace:'nowrap'}}>{toastMsg}</div>}
    </div>
  );
}

        <div style={{flex:1}}>

            onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 2px 10px rgba(0,0,0,0.06)';e.currentTarget.style.transform='none'}}>
            <div style={{height:140,background:'linear-gradient(135deg,#FFF0E8,#FFE8D6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:44}}>
              {emojis[m.img]}

            <div style={{padding:'16px'}}>
              <span style={{fontSize:11,color:'#FF6B35',fontWeight:700,background:'rgba(255,107,53,0.08)',padding:'2px 8px',borderRadius:4}}>{m.tag}</span>
              <p style={{fontSize:15,fontWeight:700,margin:'8px 0 6px',lineHeight:1.4}}>{m.title}</p>

              <div style={{display:'flex',gap:8,color:'#999',fontSize:11}}>
                <span>{m.date}</span><span>·</span><span>{m.mins}분</span>
              </div>
            </div>
          </div>

      </div>

      {/* Article modal */}
      {selected && (
        <div onClick={()=>setSelected(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1000}}>

            <span style={{background:'rgba(255,107,53,0.1)',color:'#FF6B35',fontSize:12,fontWeight:700,padding:'3px 10px',borderRadius:4}}>{selected.tag}</span>
            <h2 style={{fontSize:20,fontWeight:800,margin:'14px 0 10px',lineHeight:1.4}}>{selected.title}</h2>
            <p style={{color:'#999',fontSize:12,marginBottom:20}}>{selected.date} · 읽기 {selected.mins}분</p>
            <div style={{height:200,background:'linear-gradient(135deg,#FFF0E8,#FFE8D6)',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:72,marginBottom:20}}>{emojis[selected.img]}</div>
            <p style={{color:'#444',fontSize:15,lineHeight:1.8}}>{selected.desc}</p>
            <p style={{color:'#444',fontSize:15,lineHeight:1.8,marginTop:16}}>공간을 바꾸는 일은 거창할 필요가 없습니다. 작은 패브릭 하나, 따뜻한 향초 하나가 일상의 온도를 높여줍니다. 모아스토어는 그 작은 변화를 함께 만들어가고 싶습니다.</p>
            <button onClick={()=>setSelected(null)} style={{position:'absolute',top:16,right:16,background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#999'}}>✕</button>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [page, setPage] = useState('홈');
  const [loading, setLoading] = useState(false);
  const [cart, setCart] = useState(3);
  const [productModal, setProductModal] = useState(null);

  const navigate = (p) => {
    if(p === page) return;
    setLoading(true);
    setTimeout(()=>{setPage(p);setLoading(false)}, 1500);
  };

  const goProduct = (p) => {
    if(p) setProductModal(p);
    navigate('상품');
  };

  const navItems = [
    {label:'홈',icon:'🏠'},
    {label:'상품',icon:'🛍️'},
    {label:'매거진',icon:'📖'},
    {label:'브랜드',icon:'✨'},
  ];

  return(
    <div style={{display:'flex',height:'100vh',background:'#FFF8F0'}}>
      {/* Sidebar */}
      <aside style={{width:'var(--sidebar)',background:'#fff',borderRight:'1px solid #f0ece8',display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,height:'100vh',zIndex:100,boxShadow:'2px 0 12px rgba(0,0,0,0.05)'}}>
        <div style={{padding:'24px 20px',borderBottom:'1px solid #f0ece8'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
            <div style={{width:34,height:34,borderRadius:10,background:'linear-gradient(135deg,#FF6B35,#D4843A)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:16,fontWeight:800}}>M</div>
            <div>
              <p style={{fontSize:16,fontWeight:900,color:'#1A1A1A',letterSpacing:'-0.3px'}}>모아스토어</p>
              <p style={{fontSize:10,color:'#FF6B35',fontWeight:600,letterSpacing:'1px'}}>MOASTORE</p>
            </div>
          </div>
        </div>

        <nav style={{flex:1,padding:'16px 12px'}}>
          <p style={{fontSize:10,fontWeight:700,color:'#ccc',letterSpacing:'2px',textTransform:'uppercase',padding:'0 8px',marginBottom:8}}>Menu</p>
          {navItems.map(item=>(
            <button key={item.label} onClick={()=>navigate(item.label)} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'11px 12px',borderRadius:10,border:'none',background:page===item.label?'linear-gradient(135deg,#FFF0E8,#FFE8D6)':'none',color:page===item.label?'#FF6B35':'#6B6B6B',fontSize:14,fontWeight:page===item.label?700:500,cursor:'pointer',marginBottom:2,transition:'all .2s',textAlign:'left'}}>
              <span style={{fontSize:17}}>{item.icon}</span>
              {item.label}
              {page===item.label && <span style={{marginLeft:'auto',width:4,height:4,borderRadius:'50%',background:'#FF6B35'}}/>}
            </button>
          ))}
        </nav>

        <div style={{padding:'16px 20px',borderTop:'1px solid #f0ece8'}}>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <button style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'9px',borderRadius:8,border:'1px solid #f0ece8',background:'#fff',cursor:'pointer',fontSize:12,color:'#666'}}>
              <span>🔍</span>검색
            </button>
            <button onClick={()=>{}} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'9px',borderRadius:8,border:'1px solid #f0ece8',background:'#fff',cursor:'pointer',fontSize:12,color:'#666',position:'relative'}}>
              <span>🛒</span>장바구니
              {cart>0 && <span style={{position:'absolute',top:4,right:4,background:'#FF6B35',color:'#fff',borderRadius:'50%',width:16,height:16,fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{cart}</span>}
            </button>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'#f8f5f2',borderRadius:10}}>
            <div style={{width:30,height:30,borderRadius:'50%',background:'linear-gradient(135deg,#FF6B35,#D4843A)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:800}}>이</div>
            <div>
              <p style={{fontSize:12,fontWeight:700,color:'#1A1A1A'}}>이소연</p>
              <p style={{fontSize:11,color:'#FF6B35',fontWeight:600}}>VIP 회원</p>
            </div>
          </div>
        </div>
      </aside>

      {/* Main */}
      <main style={{marginLeft:'var(--sidebar)',flex:1,height:'100vh',overflowY:'auto'}}>
        {/* Topbar */}
        <div style={{height:'var(--topbar)',background:'#fff',borderBottom:'1px solid #f0ece8',display:'flex',alignItems:'center',padding:'0 28px',justifyContent:'space-between',position:'sticky',top:0,zIndex:50,backdropFilter:'blur(8px)'}}>
          <div>
            <p style={{fontSize:11,color:'#ccc',fontSize:11}}>모아스토어 / {page}</p>
            <p style={{fontSize:16,fontWeight:800,color:'#1A1A1A',lineHeight:1.2}}>{page}</p>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button style={{padding:'7px 16px',borderRadius:20,background:'linear-gradient(135deg,#FF6B35,#E85A20)',color:'#fff',border:'none',fontSize:13,fontWeight:700,cursor:'pointer'}}>신규 컬렉션 →</button>
          </div>
        </div>

        {loading ? <Skel/> : (
          page==='홈' ? <HomeView onProduct={goProduct}/> :
          page==='상품' ? <ProductsView onSelect={setProductModal}/> :
          page==='매거진' ? <MagazineView/> :
          <BrandView/>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
