*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#F0FDF4;color:#111827;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
</style>

// ─── Components ───
function Badge({text}){
  const colors={'ERP 전송완료':{bg:'#D1FAE5',text:'#065F46'},'변환 완료':{bg:'#DBEAFE',text:'#1E40AF'},'포장 분할중':{bg:'#FEF3C7',text:'#92400E'},'송장 발행완료':{bg:'#D1FAE5',text:'#065F46'},'매핑 오류':{bg:'#FEE2E2',text:'#991B1B'},'대기':{bg:'#F3F4F6',text:'#374151'},
    분할완료:{bg:'#D1FAE5',text:'#065F46'},시뮬레이션:{bg:'#DBEAFE',text:'#1E40AF'},
    발행대기:{bg:'#FEF3C7',text:'#92400E'},배송중:{bg:'#D1FAE5',text:'#065F46'},집하:{bg:'#DBEAFE',text:'#1E40AF'},
  };
  const c=colors[text]||{bg:'#F3F4F6',text:'#374151'};
  return <span style={{display:'inline-block',padding:'2px 10px',borderRadius:6,fontSize:11,fontWeight:600,background:c.bg,color:c.text,border:`1px solid ${c.bg}`}}>{text}</span>;
}

function ChannelBadge({ch}){
  const colors={쿠팡:{bg:'#FEE2E2',text:'#DC2626'},네이버:{bg:'#D1FAE5',text:'#059669'},자사몰:{bg:'#DBEAFE',text:'#2563EB'}};
  const c=colors[ch]||{bg:'#F3F4F6',text:'#374151'};
  return <span style={{padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:600,background:c.bg,color:c.text}}>{ch}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primary,color:'#fff',padding:'12px 24px',borderRadius:6,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(5,150,105,0.3)',fontSize:13}}>{message}</div>;
}

function SkeletonLoader(){
  return <div style={{display:'flex',height:'100vh'}}><div style={{width:240,background:'#fff'}}/><div style={{flex:1,padding:20}}>
    {[1,2,3].map(i=><div key={i} style={{height:80,borderRadius:20,background:'linear-gradient(90deg,#F0FDF4 25%,#D1FAE5 50%,#F0FDF4 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite',marginBottom:12}}/>)}
  </div></div>;
}

// ─── Master-Detail Content ───
function DashboardContent({tab,selected,setSelected}){
  const filtered = tab==='all'?ORDERS:ORDERS.filter(o=>tab==='coupang'?o.channel==='쿠팡':tab==='naver'?o.channel==='네이버':o.channel==='자사몰');
  return {
    master: <>{filtered.map((o,i)=><div key={o.id} onClick={()=>setSelected({...o,_type:'order'})} style={{padding:'10px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',background:selected?.id===o.id?C.primaryLight:'transparent',borderLeft:selected?.id===o.id?`3px solid ${C.primary}`:'3px solid transparent',transition:'all 150ms',animation:`slideUp 300ms ease ${i*40}ms both`}} onMouseEnter={e=>{if(selected?.id!==o.id)e.currentTarget.style.background='#F9FAFB'}} onMouseLeave={e=>{if(selected?.id!==o.id)e.currentTarget.style.background='transparent'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span style={{fontSize:12,fontFamily:'monospace',fontWeight:600,color:C.primary}}>{o.id}</span>
        <ChannelBadge ch={o.channel}/>
      </div>
      <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{o.product}</div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.textLight}}>
        <span>{o.buyer} · {o.qty}개</span><Badge text={o.status}/>
      </div>
    </div>)}</>,
    detail: selected?._type==='order'?<OrderDetail item={selected}/>:null,
    chart: <div style={{padding:16}}>
      <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:12}}>채널별 주문 추이</div>
      <ResponsiveContainer width="100%" height={200}>
        <AreaChart data={CHART_DATA}><defs><linearGradient id="gc" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.primary} stopOpacity={0.2}/><stop offset="100%" stopColor={C.primary} stopOpacity={0}/></linearGradient></defs>
          <CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="date" fontSize={10} stroke={C.textLight}/><YAxis fontSize={10} stroke={C.textLight}/><Tooltip/>
          <Area type="monotone" dataKey="쿠팡" stroke="#DC2626" fill="rgba(220,38,38,0.1)" strokeWidth={1.5}/>
          <Area type="monotone" dataKey="네이버" stroke="#059669" fill="url(#gc)" strokeWidth={1.5}/>
          <Area type="monotone" dataKey="자사몰" stroke="#2563EB" fill="rgba(37,99,235,0.1)" strokeWidth={1.5}/>
          <Legend fontSize={11}/>
        </AreaChart>
      </ResponsiveContainer>

  };

function OrderDetail({item}){
  return <div style={{animation:'fadeIn 200ms ease'}}>
    <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:12}}>주문 상세</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
      {[{l:'주문번호',v:item.id},{l:'채널',v:item.channel},{l:'품목',v:item.product},{l:'수량',v:`${item.qty}개`},{l:'합계',v:item.total},{l:'주문자',v:item.buyer},{l:'배송지',v:item.addr},{l:'일시',v:item.date}].map(f=>
        <div key={f.l} style={{background:C.bg,borderRadius:8,padding:10}}><div style={{fontSize:10,color:C.textLight,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>{f.l}</div><div style={{fontSize:13,fontWeight:600}}>{f.v}</div></div>)}
    </div>
    <div style={{marginBottom:12}}><Badge text={item.status}/></div>
    <div style={{background:C.bg,borderRadius:8,padding:12,marginBottom:12}}>
      <div style={{fontSize:12,fontWeight:600,marginBottom:6}}>관리자 메모</div>
      <textarea placeholder="메모 입력..." style={{width:'100%',padding:8,border:`1px solid ${C.border}`,borderRadius:6,fontSize:12,resize:'vertical',minHeight:48,outline:'none',fontFamily:'inherit'}}/>
    </div>
    <div style={{display:'flex',gap:6}}>
      <button style={{flex:1,padding:'8px',background:C.bg,border:`1px solid ${C.primary}`,color:C.primary,borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600}}>재변환</button>
      <button style={{flex:1,padding:'8px',background:C.primary,color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600}}>ERP 전송</button>
    </div>
  </div>;
}

function PackingContent({tab,selected,setSelected}){
  if(tab==='simulate') return {
    master:<>{PACKING_ITEMS.map((p,i)=><div key={p.id} onClick={()=>setSelected({...p,_type:'packing'})} style={{padding:'10px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',background:selected?.id===p.id?C.primaryLight:'transparent',borderLeft:selected?.id===p.id?`3px solid ${C.primary}`:'3px solid transparent',transition:'all 150ms'}} onMouseEnter={e=>{if(selected?.id!==p.id)e.currentTarget.style.background='#F9FAFB'}} onMouseLeave={e=>{if(selected?.id!==p.id)e.currentTarget.style.background='transparent'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
        <span style={{fontSize:12,fontFamily:'monospace',fontWeight:600,color:C.primary}}>{p.id}</span>
        <Badge text={p.status}/>
      </div>
      <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{p.product}</div>
      <div style={{fontSize:11,color:C.textLight}}>총 {p.totalQty}개 → {p.boxes}박스 ({p.weight})</div>
    </div>)}</>,
    detail: selected?._type==='packing'?<div style={{animation:'fadeIn 200ms ease'}}>
      <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:12}}>포장 시뮬레이션</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        {[{l:'품목',v:selected.product},{l:'총수량',v:`${selected.totalQty}개`},{l:'박스당 최대',v:`${selected.maxPerBox}개`},{l:'필요 박스',v:`${selected.boxes}개`}].map(f=>
          <div key={f.l} style={{background:C.bg,borderRadius:8,padding:10}}><div style={{fontSize:10,color:C.textLight,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>{f.l}</div><div style={{fontSize:13,fontWeight:600}}>{f.v}</div></div>)}
      </div>
      <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>박스 배치도</div>
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        {Array.from({length:selected.boxes}).map((_,i)=>{
          const itemsInBox = i<selected.boxes-1?selected.maxPerBox:selected.totalQty-(selected.boxes-1)*selected.maxPerBox;
          return <div key={i} style={{width:100,height:80,border:`2px solid ${C.primary}`,borderRadius:8,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:C.primaryLight}}>
            <span style={{fontSize:20}}>📦</span>
            <span style={{fontSize:11,fontWeight:600,marginTop:4}}>Box {i+1}</span>
            <span style={{fontSize:10,color:C.textLight}}>{itemsInBox}개</span>
          </div>;
        })}
      </div>
      <button style={{width:'100%',padding:'8px',background:C.primary,color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600}}>분할 확정</button>
    </div>:null,
    chart: <div style={{padding:16}}>
      <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:12}}>박스 분할 통계</div>
      <ResponsiveContainer width="100%" height={200}>
        <BarChart data={[{box:'1박스',건수:45},{box:'2박스',건수:32},{box:'3박스',건수:18},{box:'4박스+',건수:8}]}>
          <CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="box" fontSize={10}/><YAxis fontSize={10}/><Tooltip/>
          <Bar dataKey="건수" fill={C.primary} radius={[4,4,0,0]}/>
        </BarChart>
      </ResponsiveContainer>
    </div>
  };
  return {master:<div style={{padding:20,textAlign:'center',color:C.textLight}}><div style={{fontSize:32,marginBottom:8}}>📋</div><div style={{fontSize:13}}>{tab==='rules'?'분할 규칙 설정':'분할 이력 조회'} 화면</div></div>,detail:null,chart:null};
}

  const data = tab==='pending'?SHIPPING_PENDING:tab==='completed'?SHIPPING_COMPLETED:[];
  return {
    master:<>{data.map((s,i)=><div key={s.id} onClick={()=>setSelected({...s,_type:'shipping'})} style={{padding:'10px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',background:selected?.id===s.id?C.primaryLight:'transparent',borderLeft:selected?.id===s.id?`3px solid ${C.primary}`:'3px solid transparent',transition:'all 150ms'}} onMouseEnter={e=>{if(selected?.id!==s.id)e.currentTarget.style.background='#F9FAFB'}} onMouseLeave={e=>{if(selected?.id!==s.id)e.currentTarget.style.background='transparent'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
        <span style={{fontSize:12,fontFamily:'monospace',fontWeight:600,color:C.primary}}>{s.id}</span>
        <Badge text={s.status}/>
      </div>
      <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{s.buyer}</div>
      <div style={{fontSize:11,color:C.textLight}}>{s.courier} · {s.boxes}박스{s.tracking?` · ${s.tracking}`:''}</div>
    </div>)}{data.length===0&&<div style={{padding:40,textAlign:'center',color:C.textLight,fontSize:13}}>해당 상태의 송장이 없습니다.</div>}</>,
    detail: selected?._type==='shipping'?<div style={{animation:'fadeIn 200ms ease'}}>
      <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:12}}>송장 상세</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        {[{l:'송장ID',v:selected.id},{l:'주문',v:selected.order},{l:'수령인',v:selected.buyer},{l:'택배사',v:selected.courier},{l:'박스수',v:`${selected.boxes}개`},{l:'송장번호',v:selected.tracking||'-'}].map(f=>
          <div key={f.l} style={{background:C.bg,borderRadius:8,padding:10}}><div style={{fontSize:10,color:C.textLight,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>{f.l}</div><div style={{fontSize:13,fontWeight:600}}>{f.v}</div></div>)}
      </div>
      {selected.addr&&<div style={{background:C.bg,borderRadius:8,padding:10,marginBottom:12}}><div style={{fontSize:10,color:C.textLight,marginBottom:2}}>배송지</div><div style={{fontSize:13}}>{selected.addr}</div></div>}
      <Badge text={selected.status}/>
      {selected.status==='발행대기'&&<button style={{width:'100%',marginTop:12,padding:'8px',background:C.primary,color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600}}>송장 발행</button>}
    </div>:null,
    chart:null
  };
}

function InventoryContent({tab,selected,setSelected}){
  if(tab==='overview'||tab==='search') return {
    master:<>
      {tab==='search'&&<div style={{padding:'8px 12px',borderBottom:`1px solid ${C.border}`}}><input placeholder="품목명, 코드 검색..." style={{width:'100%',padding:'6px 10px',border:`1px solid ${C.border}`,borderRadius:6,fontSize:12,outline:'none'}}/></div>}
      {INVENTORY.map((inv,i)=><div key={inv.id} onClick={()=>setSelected({...inv,_type:'inventory'})} style={{padding:'10px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',background:selected?.id===inv.id?C.primaryLight:'transparent',borderLeft:selected?.id===inv.id?`3px solid ${C.primary}`:'3px solid transparent',transition:'all 150ms'}} onMouseEnter={e=>{if(selected?.id!==inv.id)e.currentTarget.style.background='#F9FAFB'}} onMouseLeave={e=>{if(selected?.id!==inv.id)e.currentTarget.style.background='transparent'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
          <span style={{fontSize:12,fontFamily:'monospace',fontWeight:600,color:C.primary}}>{inv.code}</span>
          <span style={{fontSize:11,padding:'1px 6px',borderRadius:4,background:inv.stock<100?'#FEE2E2':'#D1FAE5',color:inv.stock<100?'#991B1B':'#065F46'}}>{inv.available}개</span>
        </div>
        <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{inv.name}</div>
        <div style={{fontSize:11,color:C.textLight}}>{inv.category} · 예약 {inv.reserved}개</div>
      </div>)}</>,
    detail: selected?._type==='inventory'?<div style={{animation:'fadeIn 200ms ease'}}>
      <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:12}}>재고 상세</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        {[{l:'품목명',v:selected.name},{l:'코드',v:selected.code},{l:'카테고리',v:selected.category},{l:'총 재고',v:`${selected.stock}개`},{l:'예약',v:`${selected.reserved}개`},{l:'가용',v:`${selected.available}개`},{l:'최근 입고',v:selected.lastIn},{l:'최근 출고',v:selected.lastOut}].map(f=>
          <div key={f.l} style={{background:C.bg,borderRadius:8,padding:10}}><div style={{fontSize:10,color:C.textLight,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>{f.l}</div><div style={{fontSize:13,fontWeight:600}}>{f.v}</div></div>)}
      </div>
      <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>재고 비율</div>
      <div style={{display:'flex',gap:4,marginBottom:16}}>
        <div style={{flex:selected.available,height:20,background:C.success,borderRadius:'4px 0 0 4px'}}/>
        <div style={{flex:selected.reserved,height:20,background:C.warning,borderRadius:'0 4px 4px 0'}}/>
      </div>
      <div style={{display:'flex',gap:12,fontSize:11,color:C.textLight}}>
        <span><span style={{display:'inline-block',width:8,height:8,borderRadius:2,background:C.success,marginRight:4}}/>가용 {selected.available}</span>
        <span><span style={{display:'inline-block',width:8,height:8,borderRadius:2,background:C.warning,marginRight:4}}/>예약 {selected.reserved}</span>
      </div>
    </div>:null,
    chart: <div style={{padding:16}}>
      <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:12}}>카테고리별 재고</div>
      <ResponsiveContainer width="100%" height={200}>
        <PieChart><Pie data={[{name:'프레임',value:503},{name:'렌즈',value:1025},{name:'액세서리',value:1540}]} cx="50%" cy="50%" outerRadius={70} innerRadius={40} dataKey="value" label={({name,value})=>`${name} ${value}`} labelLine={false} fontSize={10}>
          {[C.primary,C.info,C.warning].map((c,i)=><Cell key={i} fill={c}/>)}
        </Pie></PieChart>
      </ResponsiveContainer>
    </div>
  };
  return {master:<div style={{padding:20,textAlign:'center',color:C.textLight}}><div style={{fontSize:32,marginBottom:8}}>📋</div><div style={{fontSize:13}}>입출고 이력 화면</div></div>,detail:null,chart:null};
}

function SettingsContent({tab,setToast}){
  const configs = {
    api:[{l:'이카운트 엔드포인트',v:'https://api.ecount.com/v2'},{l:'API Key',v:'ec_key_****'}],
    courier:[{l:'로젠택배 코드',v:'LOGEN-LGF-001'},{l:'CJ대한통운 코드',v:'CJ-LGF-002'}],
    schedule:[{l:'오전 동기화',v:'08:00'},{l:'오후 동기화',v:'14:00'}],
  };
  return {
    master:<div style={{padding:16}}>
      {(configs[tab]||[]).map((f,i)=><div key={i} style={{marginBottom:12}}>
        <label style={{fontSize:10,color:C.textLight,textTransform:'uppercase',letterSpacing:'0.06em',display:'block',marginBottom:4}}>{f.l}</label>
        <input defaultValue={f.v} style={{width:'100%',padding:'8px 10px',border:`1px solid ${C.border}`,borderRadius:6,fontSize:12,outline:'none'}}/>
      </div>)}
      <button onClick={()=>setToast('설정이 저장되었습니다.')} style={{width:'100%',padding:'8px',background:C.primary,color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600,marginTop:8}}>저장</button>
    </div>,
    detail:null,chart:null
  };
}

// ─── App ───
function App(){
  const [loading,setLoading]=useState(true);
  const [section,setSection]=useState('dashboard');
  const [tab,setTab]=useState(0);
  const [selected,setSelected]=useState(null);
  const [toast,setToast]=useState(null);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);
  useEffect(()=>{setTab(0);setSelected(null)},[section]);

  if(loading) return <SkeletonLoader/>;

  const tabs = SECTION_TABS[section]||[];
  const currentTab = tabs[tab]?.id||'';

  let content = {master:null,detail:null,chart:null};
  if(section==='dashboard') content=DashboardContent({tab:currentTab,selected,setSelected});
  else if(section==='packing') content=PackingContent({tab:currentTab,selected,setSelected});
  else if(section==='shipping') content=ShippingContent({tab:currentTab,selected,setSelected});
  else if(section==='inventory') content=InventoryContent({tab:currentTab,selected,setSelected});
  else if(section==='settings') content=SettingsContent({tab:currentTab,setToast});

  return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      {/* Bright Sidebar */}
      <nav style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',paddingTop:16,flexShrink:0}}>
        <div style={{padding:'0 16px 16px',display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff'}}>🚚</div>
          <span style={{fontWeight:700,fontSize:15,color:C.text}}>LogiFlow</span>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:2,padding:'0 8px'}}>
          {NAV_ITEMS.map(item=><button key={item.id} onClick={()=>setSection(item.id)} title={item.label} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'8px 12px',borderRadius:8,border:'none',cursor:'pointer',background:section===item.id?`${C.primary}10`:'transparent',color:section===item.id?C.primary:C.textLight,borderLeft:section===item.id?`3px solid ${C.primary}`:'3px solid transparent',fontSize:14,fontWeight:section===item.id?600:400,transition:'all 150ms',fontFamily:'inherit',textAlign:'left'}}>
            <span style={{fontSize:18}}>{item.icon}</span>{item.label}
          </button>)}
        </div>
        <div style={{padding:'12px 16px',borderTop:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:28,height:28,borderRadius:'50%',background:C.primaryLight,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}}>👤</div>
          <div><div style={{fontSize:12,fontWeight:600}}>김물류</div><div style={{fontSize:10,color:C.textLight}}>운영팀 매니저</div></div>
        </div>
      </nav>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Appbar */}
        <header style={{height:40,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 16px',gap:8,background:C.surface,flexShrink:0}}>
          <span style={{fontSize:12,color:C.textLight}}>LogiFlow</span>
          <span style={{fontSize:12,color:C.textLight}}>›</span>
          <span style={{fontSize:12,fontWeight:600}}>{NAV_ITEMS.find(n=>n.id===section)?.label}</span>
          {tabs[tab]&&<><span style={{fontSize:12,color:C.textLight}}>›</span><span style={{fontSize:12,color:C.textLight}}>{tabs[tab].label}</span></>}
          <div style={{flex:1}}/>
          <input placeholder="검색..." style={{padding:'4px 10px',border:`1px solid ${C.border}`,borderRadius:6,fontSize:11,width:160,outline:'none'}}/>
          <div style={{width:24,height:24,borderRadius:'50%',background:C.primaryLight,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,cursor:'pointer'}}>👤</div>
        </header>

        {/* Tab Strip */}
        <div style={{height:36,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'flex-end',padding:'0 16px',background:C.surface,flexShrink:0}}>
          {tabs.map((t,i)=><button key={t.id} onClick={()=>{setTab(i);setSelected(null)}} style={{padding:'6px 14px 4px',border:'none',cursor:'pointer',background:'transparent',fontFamily:'inherit',fontSize:12,color:tab===i?C.primary:C.textLight,fontWeight:tab===i?600:400,borderBottom:tab===i?`2px solid ${C.primary}`:'2px solid transparent',marginBottom:-1,transition:'all 150ms'}}>{t.label}</button>)}
          <div style={{flex:1}}/>
          {section!=='settings'&&<button onClick={()=>setToast('새 항목을 추가합니다.')} style={{padding:'4px 12px',background:C.primary,color:'#fff',border:'none',borderRadius:4,cursor:'pointer',fontSize:11,fontWeight:600,marginBottom:4}}>+ 추가</button>}
        </div>

        {/* Master-Detail Workspace */}
        <div style={{flex:1,display:'flex',overflow:'hidden'}}>
          {/* Master */}
          <div style={{width:'42%',borderRight:`1px solid ${C.border}`,overflowY:'auto',background:'#fff'}}>
            {content.master}
          </div>
          {/* Detail */}
          <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column'}}>
            {selected?<div style={{padding:20,flex:1}}>{content.detail}</div>
              :<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:C.textLight}}>
                <div style={{fontSize:40,marginBottom:8}}>👈</div>
                <div style={{fontSize:13}}>좌측 목록에서 항목을 선택하세요</div>
              </div>}
            {content.chart && <div style={{borderTop:`1px solid ${C.border}`}}>{content.chart}</div>}
          </div>
        </div>
      </div>

      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
