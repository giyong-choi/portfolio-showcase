function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primary,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(14,165,233,0.4)',fontSize:14}}>{message}</div>;
}

function Badge({text}){

    활성:{bg:'rgba(52,211,153,0.15)',text:C.success},비활성:{bg:'rgba(148,163,184,0.15)',text:C.textLight},
    완료:{bg:'rgba(52,211,153,0.15)',text:C.success},진행중:{bg:'rgba(14,165,233,0.15)',text:C.primary},
    미처리:{bg:'rgba(248,113,113,0.15)',text:C.danger},처리완료:{bg:'rgba(52,211,153,0.15)',text:C.success},자동해결:{bg:'rgba(96,165,250,0.15)',text:C.info},
    높음:{bg:'rgba(248,113,113,0.15)',text:C.danger},보통:{bg:'rgba(251,191,36,0.15)',text:C.warning},낮음:{bg:'rgba(148,163,184,0.15)',text:C.textLight},
  };
  const c=colors[text]||{bg:'rgba(148,163,184,0.15)',text:C.textLight};
  return <span style={{display:'inline-block',padding:'3px 12px',borderRadius:16,fontSize:12,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>{[1,2,3].map(i=><div key={i} style={{height:200,borderRadius:16,background:'linear-gradient(90deg,#1E293B 25%,#334155 50%,#1E293B 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}</div>
  </div>;
}

// ─── Pages ───
function HomePage({setDrawer,setToast}){
  return <div style={{animation:'fadeIn 300ms ease'}}>
    <div style={{display:'flex',gap:8,marginBottom:24}}>
      <button onClick={()=>setToast('급여 파일 업로드 준비 중...')} style={{padding:'10px 24px',background:C.primary,color:'#fff',border:'none',borderRadius:12,cursor:'pointer',fontSize:14,fontWeight:700}}>📤 급여 파일 업로드</button>
      <button onClick={()=>setToast('일괄 변환을 시작합니다.')} style={{padding:'10px 24px',background:C.surfaceLight,color:C.text,border:`1px solid ${C.border}`,borderRadius:12,cursor:'pointer',fontSize:14,fontWeight:600}}>▶ 일괄 변환</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
      <div style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.1)'}}>
        <h3 style={{fontSize:16,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:16,color:C.textLight}}>월별 변환 추이</h3>
        <ResponsiveContainer width="100%" height={220}>
          <AreaChart data={MONTHLY_CHART}><defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.primary} stopOpacity={0.3}/><stop offset="100%" stopColor={C.primary} stopOpacity={0}/></linearGradient></defs>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="month" fontSize={11} stroke={C.textLight}/><YAxis fontSize={11} stroke={C.textLight}/><Tooltip contentStyle={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text}}/>
            <Area type="monotone" dataKey="건수" stroke={C.primary} fill="url(#g1)" strokeWidth={2}/>
          </AreaChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.1)'}}>
        <h3 style={{fontSize:16,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:16,color:C.textLight}}>부서별 변환 현황</h3>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={[{dept:'영업1',건수:24},{dept:'개발',건수:18},{dept:'마케팅',건수:12},{dept:'인사',건수:8},{dept:'경영지원',건수:6},{dept:'영업2',건수:20},{dept:'연구소',건수:15}]}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="dept" fontSize={11} stroke={C.textLight}/><YAxis fontSize={11} stroke={C.textLight}/><Tooltip contentStyle={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text}}/>
            <Bar dataKey="건수" fill={C.primary} radius={[6,6,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
      {PAYROLL_DATA.slice(0,6).map((p,i)=><div key={p.id} onClick={()=>setDrawer({item:p,type:'payroll'})} style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.1)',cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}} onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.2)'}} onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.1)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <span style={{fontSize:12,color:C.primary,fontWeight:700,fontFamily:'monospace'}}>{p.id}</span>
          <Badge text={p.status}/>
        </div>
        <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>{p.dept}</div>
        <div style={{fontSize:13,color:C.textLight,marginBottom:12}}>{p.employees}명 · {p.type}</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:15,fontWeight:700,color:C.accent}}>{p.total}</span>
          <Badge text={p.erp}/>
        </div>
      </div>)}
    </div>
  </div>;
}

function RulesPage({setDrawer,setToast}){
  return <div style={{animation:'fadeIn 300ms ease'}}>
    <div style={{display:'flex',gap:8,marginBottom:24}}>
      <button onClick={()=>setToast('새 규칙 생성 폼을 열겠습니다.')} style={{padding:'10px 24px',background:C.primary,color:'#fff',border:'none',borderRadius:12,cursor:'pointer',fontSize:14,fontWeight:700}}>+ 규칙 추가</button>
      <input placeholder="규칙명, 코드 검색..." style={{padding:'10px 16px',border:`1px solid ${C.border}`,borderRadius:12,fontSize:13,background:C.bg,color:C.text,outline:'none',width:260}}/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
      {RULES_DATA.map((r,i)=><div key={r.id} onClick={()=>setDrawer({item:r,type:'rule'})} style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.1)',cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}} onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.2)'}} onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.1)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <span style={{fontSize:12,color:C.primary,fontWeight:700,fontFamily:'monospace'}}>{r.code}</span>
          <Badge text={r.status}/>
        </div>
        <div style={{fontSize:15,fontWeight:700,marginBottom:6}}>{r.name}</div>
        <div style={{fontSize:12,color:C.textLight,marginBottom:12,lineHeight:1.6}}>{r.accounts}</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:12,color:C.accent,fontWeight:600}}>{r.version}</span>
          <span style={{fontSize:11,color:C.textLight}}>적용: {r.dept}</span>
        </div>
      </div>)}
    </div>
  </div>;
}

function QueuePage({setDrawer}){
  return <div style={{animation:'fadeIn 300ms ease'}}>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:24}}>
      {[{label:'WORKER-01',status:'처리 중',job:'3월 ERP 전표 전송',color:C.primary},{label:'WORKER-02',status:'유휴',job:'-',color:C.textLight},{label:'WORKER-03',status:'유휴',job:'-',color:C.textLight}].map((w,i)=>
        <div key={i} style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.1)',animation:`slideUp 400ms ease ${i*80}ms both`}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:w.status==='처리 중'?C.success:C.textLight,animation:w.status==='처리 중'?'pulse 2s infinite':'none'}}/>
            <span style={{fontSize:14,fontWeight:700}}>{w.label}</span>
          </div>
          <div style={{fontSize:12,color:C.textLight,marginBottom:4}}>상태: <span style={{color:w.color,fontWeight:600}}>{w.status}</span></div>
          <div style={{fontSize:12,color:C.textLight}}>작업: {w.job}</div>
        </div>)}
    </div>
    <div style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.1)'}}>
      <h3 style={{fontSize:16,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:16,color:C.textLight}}>작업 큐 목록</h3>
      {QUEUE_JOBS.map((j,i)=><div key={j.id} onClick={()=>setDrawer({item:j,type:'queue'})} style={{display:'flex',alignItems:'center',gap:16,padding:'16px 0',borderBottom:i<QUEUE_JOBS.length-1?`1px solid ${C.border}`:'none',cursor:'pointer',transition:'all 150ms'}} onMouseEnter={e=>e.currentTarget.style.background=C.primaryDim} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <div style={{flex:'0 0 100px'}}><span style={{fontSize:12,fontFamily:'monospace',color:C.primary,fontWeight:600}}>{j.id}</span></div>
        <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{j.name}</div><div style={{fontSize:12,color:C.textLight}}>워커: {j.worker} · 우선순위: {j.priority}</div></div>
        <div style={{flex:'0 0 180px'}}>
          <div style={{background:C.bg,borderRadius:6,height:8,overflow:'hidden',marginBottom:4}}><div style={{height:'100%',borderRadius:6,background:`linear-gradient(90deg,${C.primary},${C.accent})`,width:`${j.total>0?(j.progress/j.total*100):0}%`,transition:'width 1s ease'}}/></div>
          <div style={{fontSize:11,color:C.textLight}}>{j.total>0?`${j.progress}/${j.total}`:'-'}</div>
        </div>
        <div style={{flex:'0 0 80px',textAlign:'right'}}><Badge text={j.status}/></div>
      </div>)}
    </div>
  </div>;
}

function ReportPage({setDrawer}){
  return <div style={{animation:'fadeIn 300ms ease'}}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
      <div style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.1)'}}>
        <h3 style={{fontSize:16,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:16,color:C.textLight}}>오류 유형별 분포</h3>
        <ResponsiveContainer width="100%" height={220}>
          <PieChart><Pie data={ERROR_CHART} cx="50%" cy="50%" outerRadius={85} innerRadius={45} dataKey="value" paddingAngle={3} label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`} labelLine={false} fontSize={11}>
            {[C.danger,C.warning,C.info,C.primary,'#A78BFA'].map((c,i)=><Cell key={i} fill={c}/>)}
          </Pie></PieChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.1)'}}>
        <h3 style={{fontSize:16,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:16,color:C.textLight}}>월별 오류 추이</h3>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={MONTHLY_CHART}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="month" fontSize={11} stroke={C.textLight}/><YAxis fontSize={11} stroke={C.textLight}/><Tooltip contentStyle={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text}}/>
            <Bar dataKey="오류" fill={C.danger} radius={[6,6,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </div>
    </div>
    <div style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.1)'}}>
      <h3 style={{fontSize:16,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:16,color:C.textLight}}>오류 목록</h3>
      {ERROR_DATA.map((e,i)=><div key={e.id} onClick={()=>setDrawer({item:e,type:'error'})} style={{display:'flex',alignItems:'center',gap:16,padding:'16px 0',borderBottom:i<ERROR_DATA.length-1?`1px solid ${C.border}`:'none',cursor:'pointer',transition:'background 150ms'}} onMouseEnter={el=>el.currentTarget.style.background=C.primaryDim} onMouseLeave={el=>el.currentTarget.style.background='transparent'}>
        <div style={{flex:'0 0 90px'}}><span style={{fontSize:12,fontFamily:'monospace',color:C.danger,fontWeight:600}}>{e.id}</span></div>
        <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{e.type} — {e.field}</div><div style={{fontSize:12,color:C.textLight}}>{e.dept} · {e.desc}</div></div>
        <div style={{flex:'0 0 60px',textAlign:'center',fontSize:14,fontWeight:700,color:C.warning}}>{e.count}건</div>
        <div style={{flex:'0 0 80px',textAlign:'right'}}><Badge text={e.status}/></div>
      </div>)}
    </div>
  </div>;
}

function SettingsPage({setToast}){
  return <div style={{animation:'fadeIn 300ms ease'}}>
    <div style={{display:'grid',gap:20}}>
      {[{title:'이카운트 ERP API',desc:'API 인증 및 엔드포인트 설정',fields:[{l:'엔드포인트',v:'https://api.ecount.com/v2'},{l:'API Key',v:'ec_key_****'}]},
        {title:'HRM 시스템 연동',desc:'인사 관리 시스템 데이터 소스 설정',fields:[{l:'데이터 소스',v:'MySQL (hrm-db.internal:3306)'},{l:'동기화 주기',v:'매일 08:00'}]},
        {title:'Celery 배치 설정',desc:'워커 수, Redis 브로커, 스케줄 관리',fields:[{l:'Redis 브로커',v:'redis://cache.internal:6379/0'},{l:'워커 수',v:'3'}]},
      ].map((s,i)=><div key={i} style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,0.1)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div><h3 style={{fontSize:16,fontWeight:700}}>{s.title}</h3><p style={{fontSize:12,color:C.textLight,marginTop:2}}>{s.desc}</p></div>
          <button onClick={()=>setToast(`${s.title} 저장 완료`)} style={{padding:'8px 20px',background:C.primary,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:600}}>저장</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          {s.fields.map(f=><div key={f.l}><label style={{fontSize:11,color:C.textLight,marginBottom:4,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>{f.l}</label><input defaultValue={f.v} style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,outline:'none',background:C.bg,color:C.text}}/></div>)}
        </div>
      </div>)}
    </div>
  </div>;
}

// ─── App ───
function App(){
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('home');
  const [drawer,setDrawer]=useState(null);
  const [toast,setToast]=useState(null);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);
  if(loading) return <SkeletonLoader/>;

  const meta=HERO_META[tab];

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* Top Nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:24}}>
          <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>💰</div>
          <span style={{fontWeight:800,fontSize:15}}>PaySync Hub</span>
        </div>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} title={t.label} style={{padding:'8px 16px',border:'none',cursor:'pointer',background:tab===t.id?C.primaryDim:'transparent',color:tab===t.id?C.primary:C.textLight,borderRadius:8,fontSize:13,fontWeight:tab===t.id?700:400,fontFamily:'inherit',transition:'all 150ms'}}>{t.label}</button>)}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <input placeholder="검색..." style={{padding:'7px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,background:C.bg,color:C.text,outline:'none',width:180}}/>
          <span style={{fontSize:18,cursor:'pointer'}}>🔔</span>
          <div style={{width:28,height:28,borderRadius:'50%',background:C.primaryDim,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}}>👤</div>
        </div>
      </header>

      {/* Hero Banner */}
      <div style={{background:meta.gradient,padding:'28px 32px',color:'#fff'}}>
        <h1 style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em'}}>{meta.title}</h1>
        <p style={{fontSize:14,opacity:0.85,marginTop:4}}>{meta.desc}</p>
        <div style={{display:'flex',gap:40,marginTop:16}}>
          {meta.kpis.map(k=><div key={k.label}><div style={{fontSize:11,opacity:0.7,textTransform:'uppercase',letterSpacing:'0.05em'}}>{k.label}</div><div style={{fontSize:22,fontWeight:800,marginTop:2}}>{k.value}</div></div>)}
        </div>
      </div>

      {/* Content */}
      <main style={{padding:'24px 32px',maxHeight:'calc(100vh - 56px - 130px)',overflowY:'auto'}}>
        {tab==='home'&&<HomePage setDrawer={setDrawer} setToast={setToast}/>}
        {tab==='rules'&&<RulesPage setDrawer={setDrawer} setToast={setToast}/>}
        {tab==='queue'&&<QueuePage setDrawer={setDrawer}/>}
        {tab==='report'&&<ReportPage setDrawer={setDrawer}/>}
        {tab==='settings'&&<SettingsPage setToast={setToast}/>}
      </main>

      {drawer&&<Drawer item={drawer.item} type={drawer.type} onClose={()=>setDrawer(null)} setToast={setToast}/>}
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
