<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디지털 마케팅 캠페인 분석 플랫폼</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#FFF1F2;color:#1C1917;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#FDA4AF;border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo}=React;
const {BarChart,Bar,AreaChart,Area,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Legend,ComposedChart,Line:RLine}=Recharts;

const C={primary:'#F43F5E',secondary:'#881337',accent:'#FB923C',bg:'#FFF1F2',surface:'#FFFFFF',border:'#FECDD3',text:'#1C1917',textLight:'#6B7280',textMuted:'#9CA3AF',success:'#059669',warning:'#D97706',info:'#3B82F6',gradient:'linear-gradient(135deg,#F43F5E,#FB923C)'};

const CAMPAIGNS=[
  {id:1,name:'봄 시즌 브랜드 캠페인',channel:'Google Ads',budget:5000000,spent:3200000,impressions:1250000,clicks:45000,conversions:1200,ctr:3.6,cvr:2.67,roas:4.2,status:'진행중',period:'2026.03.01 - 2026.03.31',goal:'브랜드 인지도'},
  {id:2,name:'SNS 리타겟팅 캠페인',channel:'Meta Ads',budget:3000000,spent:2800000,impressions:890000,clicks:32000,conversions:980,ctr:3.6,cvr:3.06,roas:3.8,status:'진행중',period:'2026.03.05 - 2026.03.25',goal:'전환'},
  {id:3,name:'검색 광고 키워드 확장',channel:'Google Ads',budget:2000000,spent:1500000,impressions:560000,clicks:28000,conversions:560,ctr:5.0,cvr:2.0,roas:5.1,status:'진행중',period:'2026.03.10 - 2026.04.10',goal:'전환'},
  {id:4,name:'인플루언서 콜라보',channel:'Instagram',budget:8000000,spent:8000000,impressions:2100000,clicks:78000,conversions:2340,ctr:3.71,cvr:3.0,roas:3.5,status:'완료',period:'2026.02.01 - 2026.02.28',goal:'브랜드 인지도'},
  {id:5,name:'네이버 브랜드검색',channel:'Naver',budget:1500000,spent:1200000,impressions:340000,clicks:15600,conversions:420,ctr:4.59,cvr:2.69,roas:4.8,status:'진행중',period:'2026.03.01 - 2026.03.31',goal:'트래픽'},
  {id:6,name:'유튜브 프리롤 광고',channel:'YouTube',budget:4000000,spent:3600000,impressions:1800000,clicks:54000,conversions:810,ctr:3.0,cvr:1.5,roas:2.9,status:'완료',period:'2026.02.15 - 2026.03.15',goal:'브랜드 인지도'},
];

const FUNNEL_DATA=[
  {stage:'노출',google:1250000,meta:890000,naver:340000},
  {stage:'클릭',google:45000,meta:32000,naver:15600},
  {stage:'랜딩',google:38000,meta:27000,naver:13200},
  {stage:'전환',google:1200,meta:980,naver:420},
];

const DAILY_KPI=Array.from({length:14},(_,i)=>({day:`3/${i+5}`,impressions:Math.floor(80000+Math.random()*50000),clicks:Math.floor(3000+Math.random()*2000),conversions:Math.floor(80+Math.random()*60),spend:Math.floor(200000+Math.random()*150000)}));

const REPORTS=[
  {id:1,name:'3월 1주차 주간 리포트',date:'2026-03-07',type:'주간',status:'발송완료',pages:12},
  {id:2,name:'3월 2주차 주간 리포트',date:'2026-03-14',type:'주간',status:'발송완료',pages:14},
  {id:3,name:'3월 3주차 주간 리포트',date:'2026-03-21',type:'주간',status:'생성중',pages:0},
  {id:4,name:'2월 월간 리포트',date:'2026-03-01',type:'월간',status:'발송완료',pages:28},
];

const CH_COLOR={'Google Ads':'#4285F4','Meta Ads':'#1877F2','Instagram':'#E4405F','Naver':'#03C75A','YouTube':'#FF0000'};
const STATUS_COLOR={'진행중':C.success,'완료':C.textMuted,'일시중지':C.warning};

function CountUp({end,duration=1000,suffix=''}){const[val,setVal]=useState(0);useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);return<span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>}
function Toast({message,onClose}){useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);return<div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:16,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(136,19,55,0.3)',fontSize:14}}>{message}</div>}
function Badge({color,children}){return<span style={{display:'inline-block',padding:'3px 12px',borderRadius:20,fontSize:11,fontWeight:600,background:color+'18',color}}>{children}</span>}
function Btn({onClick,children,variant='primary',size='md'}){const base={border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:600,borderRadius:12,transition:'all 200ms',display:'inline-flex',alignItems:'center',gap:6};const sizes={sm:{padding:'6px 14px',fontSize:12},md:{padding:'8px 18px',fontSize:13}};const variants={primary:{background:C.primary,color:'#fff'},secondary:{background:C.bg,color:C.primary,border:`1px solid ${C.border}`}};return<button onClick={onClick} style={{...base,...sizes[size],...variants[variant]}} onMouseEnter={e=>e.currentTarget.style.opacity='0.85'} onMouseLeave={e=>e.currentTarget.style.opacity='1'}>{children}</button>}

function Drawer({title,onClose,children}){return(<><div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:200,animation:'fadeIn 200ms ease'}}/><div style={{position:'fixed',top:0,right:0,bottom:0,width:520,background:C.surface,boxShadow:'-8px 0 40px rgba(0,0,0,0.15)',zIndex:201,overflowY:'auto',animation:'slideInRight 200ms ease'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,background:'#fff',zIndex:1}}><h3 style={{fontSize:18,fontWeight:700}}>{title}</h3><button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>&#10005;</button></div><div style={{padding:24}}>{children}</div></div></>)}
function Modal({title,onClose,children,width=520}){return(<div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}><div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)',animation:'fadeIn 200ms ease'}}/><div style={{position:'relative',width,maxHeight:'85vh',background:'#fff',borderRadius:20,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}><h3 style={{fontSize:18,fontWeight:700}}>{title}</h3><button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>&#10005;</button></div><div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div></div></div>)}

// === Pages ===
function DashboardPage({setDrawer}){
  const totalImpressions=CAMPAIGNS.reduce((a,c)=>a+c.impressions,0);
  const totalClicks=CAMPAIGNS.reduce((a,c)=>a+c.clicks,0);
  const totalConversions=CAMPAIGNS.reduce((a,c)=>a+c.conversions,0);
  const avgROAS=(CAMPAIGNS.reduce((a,c)=>a+c.roas,0)/CAMPAIGNS.length).toFixed(1);

  return(<div style={{animation:'fadeIn 300ms ease'}}>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:32}}>
      {CAMPAIGNS.filter(c=>c.status==='진행중').slice(0,3).map((camp,i)=>(
        <div key={camp.id} style={{background:C.surface,borderRadius:20,overflow:'hidden',boxShadow:'0 4px 16px rgba(0,0,0,0.08)',cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}}
          onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.15)'}}
          onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'}}
          onClick={()=>setDrawer({title:camp.name,type:'campaign',data:camp})}>
          <div style={{background:C.gradient,padding:'16px 20px',color:'#fff'}}>
            <div style={{fontSize:11,opacity:0.9}}>{camp.channel}</div>
            <div style={{fontSize:15,fontWeight:700,marginTop:2}}>{camp.name}</div>
          </div>
          <div style={{padding:20}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div><div style={{fontSize:11,color:C.textMuted}}>노출</div><div style={{fontSize:18,fontWeight:800,color:C.primary}}>{(camp.impressions/10000).toFixed(0)}만</div></div>
              <div><div style={{fontSize:11,color:C.textMuted}}>전환</div><div style={{fontSize:18,fontWeight:800,color:C.accent}}>{camp.conversions.toLocaleString()}</div></div>
            </div>
            <div style={{marginTop:12}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:11,color:C.textMuted}}>예산 소진</span><span style={{fontSize:11,fontWeight:600}}>{Math.round(camp.spent/camp.budget*100)}%</span></div>
              <div style={{height:6,background:C.bg,borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:C.gradient,borderRadius:3,width:`${camp.spent/camp.budget*100}%`,transformOrigin:'left',animation:`barGrow 800ms ease ${i*100}ms both`}}/></div>
            </div>
          </div>
        </div>
      ))}
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
      <div style={{background:C.surface,borderRadius:20,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,0.08)'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16,letterSpacing:'-0.03em'}}>일별 노출·클릭 추이</h3>
        <ResponsiveContainer width="100%" height={240}>
          <ComposedChart data={DAILY_KPI}>
            <CartesianGrid strokeDasharray="3 3" stroke="#FECDD3"/>
            <XAxis dataKey="day" tick={{fontSize:11,fill:C.textMuted}}/>
            <YAxis yAxisId="imp" tick={{fontSize:11,fill:C.textMuted}}/>
            <YAxis yAxisId="click" orientation="right" tick={{fontSize:11,fill:C.textMuted}}/>
            <Tooltip contentStyle={{borderRadius:12,fontSize:12,border:'none',boxShadow:'0 4px 16px rgba(0,0,0,0.1)'}}/>
            <Legend wrapperStyle={{fontSize:12}}/>
            <Area yAxisId="imp" type="monotone" dataKey="impressions" fill={C.primary+'20'} stroke={C.primary} strokeWidth={2} name="노출"/>
            <Bar yAxisId="click" dataKey="clicks" fill={C.accent} radius={[6,6,0,0]} name="클릭"/>
          </ComposedChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:20,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,0.08)'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16,letterSpacing:'-0.03em'}}>채널별 전환 분포</h3>
        <ResponsiveContainer width="100%" height={240}>
          <PieChart>
            <Pie data={CAMPAIGNS.map(c=>({name:c.channel,value:c.conversions}))} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={55} outerRadius={95} paddingAngle={3}>
              {CAMPAIGNS.map((c,i)=><Cell key={i} fill={CH_COLOR[c.channel]||C.primary}/>)}
            </Pie>
            <Tooltip contentStyle={{borderRadius:12,fontSize:12,border:'none',boxShadow:'0 4px 16px rgba(0,0,0,0.1)'}}/>
            <Legend wrapperStyle={{fontSize:11}}/>
          </PieChart>
        </ResponsiveContainer>
      </div>
    </div>
  </div>);
}

function CampaignFilterPage({setDrawer}){
  const [chFilter,setChFilter]=useState('all');
  const [compare,setCompare]=useState([]);
  const channels=['all',...new Set(CAMPAIGNS.map(c=>c.channel))];
  const filtered=chFilter==='all'?CAMPAIGNS:CAMPAIGNS.filter(c=>c.channel===chFilter);

  return(<div style={{animation:'fadeIn 300ms ease'}}>
    <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
      {channels.map(ch=>(<button key={ch} onClick={()=>setChFilter(ch)} style={{padding:'7px 16px',borderRadius:20,border:`1.5px solid ${chFilter===ch?C.primary:C.border}`,background:chFilter===ch?C.primary+'15':'#fff',color:chFilter===ch?C.primary:C.textLight,fontWeight:chFilter===ch?600:400,cursor:'pointer',fontFamily:'inherit',fontSize:12,transition:'all 200ms'}}>{ch==='all'?'전체 채널':ch}</button>))}
      {compare.length>0&&<Btn size="sm" onClick={()=>setCompare([])}>비교 초기화</Btn>}
    </div>
    <div style={{background:C.surface,borderRadius:20,boxShadow:'0 4px 16px rgba(0,0,0,0.08)',overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{background:C.primary+'08'}}>{['','캠페인','채널','노출','클릭','전환','CTR','ROAS','상태'].map(h=>(<th key={h} style={{padding:'12px 14px',textAlign:'left',fontSize:12,fontWeight:600,color:C.textMuted}}>{h}</th>))}</tr></thead>
        <tbody>{filtered.map((c,i)=>(
          <tr key={c.id} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'all 150ms',background:compare.includes(c.id)?C.primary+'08':'transparent',animation:`slideUp 300ms ease ${i*50}ms both`}}
            onMouseEnter={e=>{if(!compare.includes(c.id))e.currentTarget.style.background=C.primary+'05'}}
            onMouseLeave={e=>{if(!compare.includes(c.id))e.currentTarget.style.background=compare.includes(c.id)?C.primary+'08':'transparent'}}
            onClick={()=>setDrawer({title:c.name,type:'campaign',data:c})}>
            <td style={{padding:'12px 14px'}}><input type="checkbox" checked={compare.includes(c.id)} onChange={e=>{e.stopPropagation();setCompare(p=>p.includes(c.id)?p.filter(x=>x!==c.id):p.length<3?[...p,c.id]:p)}} onClick={e=>e.stopPropagation()}/></td>
            <td style={{padding:'12px 14px',fontSize:14,fontWeight:600}}>{c.name}</td>
            <td style={{padding:'12px 14px'}}><Badge color={CH_COLOR[c.channel]||C.primary}>{c.channel}</Badge></td>
            <td style={{padding:'12px 14px',fontSize:13}}>{(c.impressions/10000).toFixed(0)}만</td>
            <td style={{padding:'12px 14px',fontSize:13}}>{c.clicks.toLocaleString()}</td>
            <td style={{padding:'12px 14px',fontSize:13,fontWeight:700,color:C.primary}}>{c.conversions.toLocaleString()}</td>
            <td style={{padding:'12px 14px',fontSize:13}}>{c.ctr}%</td>
            <td style={{padding:'12px 14px',fontSize:13,fontWeight:700,color:c.roas>=4?C.success:C.accent}}>{c.roas}x</td>
            <td style={{padding:'12px 14px'}}><Badge color={STATUS_COLOR[c.status]}>{c.status}</Badge></td>
          </tr>
        ))}</tbody>
      </table>
    </div>
  </div>);
}

function FunnelPage({setDrawer}){
  const stages=['노출','클릭','랜딩','전환'];
  const googleFunnel=[1250000,45000,38000,1200];
  const metaFunnel=[890000,32000,27000,980];

  return(<div style={{animation:'fadeIn 300ms ease'}}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:32}}>
      {['Google Ads','Meta Ads'].map((ch,ci)=>{
        const data=ci===0?googleFunnel:metaFunnel;
        return(<div key={ch} style={{background:C.surface,borderRadius:20,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,0.08)'}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:20,display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:12,height:12,borderRadius:'50%',background:CH_COLOR[ch]}}/> {ch} 퍼널
          </h3>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {stages.map((stage,si)=>{
              const val=data[si];
              const prev=si>0?data[si-1]:val;
              const rate=si>0?(val/prev*100).toFixed(1):'100';
              const width=val/data[0]*100;
              return(<div key={stage} style={{animation:`slideUp 400ms ease ${si*100}ms both`}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:600}}>{stage}</span>
                  <span style={{fontSize:13,color:C.textLight}}>{val>=10000?(val/10000).toFixed(1)+'만':val.toLocaleString()} {si>0&&<span style={{color:parseFloat(rate)<5?C.primary:C.success}}>({rate}%)</span>}</span>
                </div>
                <div style={{height:28,background:C.bg,borderRadius:14,overflow:'hidden',position:'relative'}}>
                  <div style={{height:'100%',background:ci===0?'#4285F4':'#1877F2',borderRadius:14,width:`${Math.max(width,3)}%`,transformOrigin:'left',animation:`barGrow 800ms ease ${si*150}ms both`,display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:8}}>
                    {width>15&&<span style={{fontSize:10,color:'#fff',fontWeight:600}}>{width.toFixed(0)}%</span>}
                  </div>
                </div>
              </div>);
            })}
          </div>
        </div>);
      })}
    </div>

    <div style={{background:C.surface,borderRadius:20,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,0.08)'}}>
      <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>채널별 전환율 비교</h3>
      <ResponsiveContainer width="100%" height={260}>
        <BarChart data={[
          {stage:'노출→클릭',google:3.6,meta:3.6,naver:4.59},
          {stage:'클릭→랜딩',google:84.4,meta:84.4,naver:84.6},
          {stage:'랜딩→전환',google:3.16,meta:3.63,naver:3.18},
        ]}>
          <CartesianGrid strokeDasharray="3 3" stroke="#FECDD3"/>
          <XAxis dataKey="stage" tick={{fontSize:12,fill:C.textMuted}}/>
          <YAxis tick={{fontSize:11,fill:C.textMuted}}/>
          <Tooltip contentStyle={{borderRadius:12,fontSize:12,border:'none',boxShadow:'0 4px 16px rgba(0,0,0,0.1)'}}/>
          <Legend wrapperStyle={{fontSize:12}}/>
          <Bar dataKey="google" fill="#4285F4" radius={[8,8,0,0]} name="Google"/>
          <Bar dataKey="meta" fill="#1877F2" radius={[8,8,0,0]} name="Meta"/>
          <Bar dataKey="naver" fill="#03C75A" radius={[8,8,0,0]} name="Naver"/>
        </BarChart>
      </ResponsiveContainer>
    </div>
  </div>);
}

function ReportsPage({setDrawer,setToast}){
  const [showCreate,setShowCreate]=useState(false);
  return(<div style={{animation:'fadeIn 300ms ease'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <span style={{fontSize:13,color:C.textMuted}}>리포트 {REPORTS.length}건</span>
      <Btn onClick={()=>setShowCreate(true)}>+ 리포트 생성</Btn>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
      {REPORTS.map((r,i)=>(
        <div key={r.id} style={{background:C.surface,borderRadius:20,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.08)',cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}}
          onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.15)'}}
          onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'}}
          onClick={()=>setDrawer({title:r.name,type:'report',data:r})}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <Badge color={r.type==='주간'?C.info:C.primary}>{r.type}</Badge>
            <Badge color={r.status==='발송완료'?C.success:C.accent}>{r.status}</Badge>
          </div>
          <div style={{fontSize:15,fontWeight:700,marginBottom:6}}>{r.name}</div>
          <div style={{fontSize:12,color:C.textMuted}}>{r.date} {r.pages>0&&`| ${r.pages}페이지`}</div>
        </div>
      ))}
    </div>
    {showCreate&&<Modal title="리포트 생성" onClose={()=>setShowCreate(false)}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <div><label style={{fontSize:12,fontWeight:600,color:C.textMuted,display:'block',marginBottom:4}}>리포트 유형</label><select style={{width:'100%',padding:'10px 12px',borderRadius:12,border:`1px solid ${C.border}`,fontFamily:'inherit',fontSize:14,background:'#fff'}}><option>주간 리포트</option><option>월간 리포트</option></select></div>
        <div><label style={{fontSize:12,fontWeight:600,color:C.textMuted,display:'block',marginBottom:4}}>대상 캠페인</label><select style={{width:'100%',padding:'10px 12px',borderRadius:12,border:`1px solid ${C.border}`,fontFamily:'inherit',fontSize:14,background:'#fff'}}>{CAMPAIGNS.map(c=><option key={c.id}>{c.name}</option>)}</select></div>
        <div><label style={{fontSize:12,fontWeight:600,color:C.textMuted,display:'block',marginBottom:4}}>발송 이메일</label><input placeholder="email@example.com" style={{width:'100%',padding:'10px 12px',borderRadius:12,border:`1px solid ${C.border}`,fontFamily:'inherit',fontSize:14}}/></div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8}}><Btn variant="secondary" onClick={()=>setShowCreate(false)}>취소</Btn><Btn onClick={()=>{setShowCreate(false);setToast('리포트 생성이 시작되었습니다.')}}>생성</Btn></div>
      </div>
    </Modal>}
  </div>);
}

// === Drawer Content ===
function DrawerContent({drawer,onClose,setToast}){
  if(!drawer)return null;
  const{type,data}=drawer;
  if(type==='campaign')return(<Drawer title={data.name} onClose={onClose}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
      {[{l:'채널',v:data.channel},{l:'상태',v:data.status,badge:true},{l:'노출',v:(data.impressions/10000).toFixed(0)+'만'},{l:'클릭',v:data.clicks.toLocaleString()},{l:'전환',v:data.conversions.toLocaleString()},{l:'CTR',v:data.ctr+'%'},{l:'CVR',v:data.cvr+'%'},{l:'ROAS',v:data.roas+'x'}].map((f,i)=>(
        <div key={i} style={{background:C.bg,borderRadius:12,padding:14}}><div style={{fontSize:11,color:C.textMuted}}>{f.l}</div>{f.badge?<div style={{marginTop:4}}><Badge color={STATUS_COLOR[f.v]}>{f.v}</Badge></div>:<div style={{fontSize:16,fontWeight:700,marginTop:2}}>{f.v}</div>}</div>
      ))}
    </div>
    <div style={{marginBottom:16}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style={{fontSize:12}}>예산 소진</span><span style={{fontSize:12,fontWeight:600}}>{(data.spent/10000).toFixed(0)}만 / {(data.budget/10000).toFixed(0)}만</span></div>
      <div style={{height:8,background:C.bg,borderRadius:4,overflow:'hidden'}}><div style={{height:'100%',background:C.gradient,borderRadius:4,width:`${data.spent/data.budget*100}%`}}/></div></div>
    <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>기간</div><div style={{fontSize:14,marginBottom:16}}>{data.period}</div>
    <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>메모</div><textarea placeholder="캠페인 메모..." style={{width:'100%',minHeight:80,padding:12,borderRadius:12,border:`1px solid ${C.border}`,fontFamily:'inherit',fontSize:13,resize:'vertical'}}/>
    <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:16}}><Btn variant="secondary" onClick={onClose}>닫기</Btn><Btn onClick={()=>{onClose();setToast('저장되었습니다.')}}>저장</Btn></div>
  </Drawer>);
  if(type==='report')return(<Drawer title={data.name} onClose={onClose}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
      <div style={{background:C.bg,borderRadius:12,padding:14}}><div style={{fontSize:11,color:C.textMuted}}>유형</div><div style={{marginTop:4}}><Badge color={data.type==='주간'?C.info:C.primary}>{data.type}</Badge></div></div>
      <div style={{background:C.bg,borderRadius:12,padding:14}}><div style={{fontSize:11,color:C.textMuted}}>상태</div><div style={{marginTop:4}}><Badge color={data.status==='발송완료'?C.success:C.accent}>{data.status}</Badge></div></div>
      <div style={{background:C.bg,borderRadius:12,padding:14}}><div style={{fontSize:11,color:C.textMuted}}>생성일</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{data.date}</div></div>
      <div style={{background:C.bg,borderRadius:12,padding:14}}><div style={{fontSize:11,color:C.textMuted}}>페이지</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{data.pages||'-'}</div></div>
    </div>
    {data.status==='발송완료'&&<Btn onClick={()=>setToast('PDF 다운로드가 시작됩니다.')}>PDF 다운로드</Btn>}
  </Drawer>);
  return null;
}

// === App ===
function App(){
  const [tab,setTab]=useState('home');
  const [drawer,setDrawer]=useState(null);
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  const TABS=[
    {id:'home',label:'캠페인 대시보드'},
    {id:'campaigns',label:'캠페인 필터링'},
    {id:'funnel',label:'채널 퍼널 분석'},
    {id:'reports',label:'리포트 자동화'},
  ];

  const totalImp=CAMPAIGNS.reduce((a,c)=>a+c.impressions,0);
  const totalConv=CAMPAIGNS.reduce((a,c)=>a+c.conversions,0);
  const avgROAS=(CAMPAIGNS.reduce((a,c)=>a+c.roas,0)/CAMPAIGNS.length).toFixed(1);

  const PAGE_META={
    home:{title:'캠페인 대시보드',kpis:[{label:'총 노출',value:(totalImp/10000).toFixed(0),suffix:'만'},{label:'총 전환',value:totalConv,suffix:'건'},{label:'평균 ROAS',value:avgROAS,suffix:'x'}]},
    campaigns:{title:'캠페인 필터링',kpis:[{label:'전체',value:CAMPAIGNS.length,suffix:'건'},{label:'진행중',value:CAMPAIGNS.filter(c=>c.status==='진행중').length,suffix:'건'},{label:'완료',value:CAMPAIGNS.filter(c=>c.status==='완료').length,suffix:'건'}]},
    funnel:{title:'채널 퍼널 분석',kpis:[{label:'채널',value:new Set(CAMPAIGNS.map(c=>c.channel)).size,suffix:'개'},{label:'총 전환',value:totalConv,suffix:'건'},{label:'평균 CVR',value:'2.7',suffix:'%'}]},
    reports:{title:'리포트 자동화',kpis:[{label:'전체',value:REPORTS.length,suffix:'건'},{label:'발송완료',value:REPORTS.filter(r=>r.status==='발송완료').length,suffix:'건'},{label:'생성중',value:REPORTS.filter(r=>r.status==='생성중').length,suffix:'건'}]},
  };

  if(loading)return(<div style={{minHeight:'100vh',background:C.bg}}><div style={{height:56,background:C.surface}}/><div style={{padding:24}}>{[...Array(3)].map((_,i)=>(<div key={i} style={{height:120,borderRadius:20,marginBottom:16,background:'linear-gradient(90deg,#FFF 25%,#FECDD3 50%,#FFF 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>))}</div></div>);

  return(<div style={{minHeight:'100vh',background:C.bg}}>
    <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4}}>
      <div style={{fontSize:18,fontWeight:800,color:C.primary,marginRight:20}}>&#128200; GrowthLab</div>
      {TABS.map(t=>(<button key={t.id} title={t.label} onClick={()=>setTab(t.id)} style={{padding:'6px 16px',borderRadius:12,border:'none',background:tab===t.id?C.primary:C.bg,color:tab===t.id?'#fff':C.textLight,fontWeight:tab===t.id?700:500,cursor:'pointer',fontFamily:'inherit',fontSize:13,transition:'all 200ms'}}>{t.label}</button>))}
      <div style={{flex:1}}/><div style={{width:32,height:32,borderRadius:'50%',background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700}}>K</div>
    </header>
    <div style={{background:C.gradient,padding:'28px 32px',color:'#fff'}}>
      <h1 style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em'}}>{PAGE_META[tab].title}</h1>
      <div style={{display:'flex',gap:32,marginTop:12}}>{PAGE_META[tab].kpis.map(k=>(<div key={k.label} style={{display:'flex',alignItems:'baseline',gap:8}}><span style={{fontSize:13,opacity:0.8}}>{k.label}</span><span style={{fontSize:22,fontWeight:800}}><CountUp end={parseFloat(k.value)} suffix={k.suffix}/></span></div>))}</div>
    </div>
    <main style={{padding:'24px 32px'}}>
      {tab==='home'&&<DashboardPage setDrawer={setDrawer}/>}
      {tab==='campaigns'&&<CampaignFilterPage setDrawer={setDrawer}/>}
      {tab==='funnel'&&<FunnelPage setDrawer={setDrawer}/>}
      {tab==='reports'&&<ReportsPage setDrawer={setDrawer} setToast={setToast}/>}
    </main>
    <DrawerContent drawer={drawer} onClose={()=>setDrawer(null)} setToast={setToast}/>
    {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
