}

            </div>
          )}
        </div>
      </div>

      {/* 미수신 학생 현황 */}
      <div style={{background:C.surf,borderRadius:10,border:`1px solid ${C.border}`,
        boxShadow:'0 1px 4px rgba(16,185,129,0.08)',overflow:'hidden'}}>
        <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,
          display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontWeight:700,fontSize:14}}>미수신 학생 현황 (토큰 미등록/앱 비활성)</div>
          <span style={{background:'#FEF2F2',color:C.red,padding:'4px 10px',
            borderRadius:8,fontSize:12,fontWeight:700}}>
            총 {SCHOOL_DATA.reduce((s,d)=>s+d.unregistered,0)}명
          </span>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'#F0FDF4'}}>
            {['학교','전체 학생','수신 완료','미수신','미등록','수신율'].map(h=>(
              <th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:11,
                color:C.sub,fontWeight:600,borderBottom:`1px solid ${C.border}`}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {loading?Array.from({length:5},(_,i)=>(
              <tr key={i}><td colSpan={6} style={{padding:'12px 16px'}}><Sk h={14}/></td></tr>
            )):SCHOOL_DATA.map(s=>{
              const rate=(s.received/s.total*100).toFixed(1);
              const unrecv=s.total-s.received;
              return(
                <tr key={s.school} style={{borderBottom:`1px solid ${C.border}`}}>
                  <td style={{padding:'10px 16px',fontSize:12,fontWeight:600}}>{s.school}</td>
                  <td style={{padding:'10px 16px',fontSize:12,color:C.sub}}>{s.total}명</td>
                  <td style={{padding:'10px 16px',fontSize:12,color:C.pri,fontWeight:600}}>{s.received}명</td>
                  <td style={{padding:'10px 16px',fontSize:12,color:C.red,fontWeight:600}}>{unrecv}명</td>
                  <td style={{padding:'10px 16px',fontSize:12,color:C.yellow,fontWeight:600}}>{s.unregistered}명</td>
                  <td style={{padding:'10px 16px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{width:60,height:5,background:C.border,borderRadius:3,overflow:'hidden'}}>
                        <div style={{height:'100%',width:`${rate}%`,background:C.pri,borderRadius:3}}/>
                      </div>
                      <span style={{fontSize:12,fontWeight:600,color:C.pri}}>{rate}%</span>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App(){
  const [page,setPage]=useState('main');
  const titles={
    main:'통합 모니터링',queue:'큐 워커 관리',alert:'장애 알림',analytics:'수신 분석',
  };
  return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      <Sidebar cur={page} onNav={setPage}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* TopBar */}
        <div style={{height:54,background:C.surf,borderBottom:`1px solid ${C.border}`,
          display:'flex',alignItems:'center',padding:'0 24px',justifyContent:'space-between',flexShrink:0}}>
          <div style={{fontWeight:700,fontSize:15,color:C.txt}}>{titles[page]}</div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{fontSize:11,color:C.sub}}>2025.02.12 (화) 08:42</div>
            <div style={{display:'flex',alignItems:'center',gap:6,padding:'5px 10px',
              background:'#ECFDF5',borderRadius:8,fontSize:11,color:C.pri,fontWeight:600}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:C.pri,
                display:'inline-block',animation:'pulse 2s infinite'}}/>
              시스템 정상
            </div>
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column'}}>
          {page==='main'      &&<Monitor/>}
          {page==='queue'     &&<QueueManager/>}
          {page==='alert'     &&<AlertManager/>}
          {page==='analytics' &&<Analytics/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
