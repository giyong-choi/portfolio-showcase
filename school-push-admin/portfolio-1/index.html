<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>푸시 서버 관리 — (주)에듀알림</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', sans-serif; background: #F0F9FF; color: #1A1A2E; font-size: 14px; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }

    @keyframes fadeInScale {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .skeleton { background: linear-gradient(90deg,#e2e8f0 25%,#f0f9ff 50%,#e2e8f0 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { ComposedChart, Bar, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
        ResponsiveContainer, AreaChart, Area } = Recharts;

// ── 팔레트 ──
const C = {
  pri: '#0066CC', sec: '#1A365D', acc: '#38BDF8',
  bg: '#F0F9FF', surf: '#FFFFFF', txt: '#1A1A2E', sub: '#6B7280',
  green: '#10B981', red: '#EF4444', yellow: '#F59E0B', orange: '#F97316',
  border: '#E2E8F0', sidebar: '#1A365D', sidebarAct: '#0066CC',
};

// ── 더미 데이터 ──
const SCHOOLS = ['한빛초등학교','서울중앙초등학교','미래초등학교','강남초등학교','광명초등학교'];
const PLATFORMS = ['Android (FCM)', 'iOS (APNS)'];
const EVENT_TYPES = ['등교','하교'];
const STATUSES = ['성공','실패','재시도중','최종실패'];

function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function fmtTime(h, m=0) { return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`; }

const HOURLY_DATA = Array.from({length: 14}, (_,i) => {
  const h = i + 7;
  const vol = h === 8 ? rnd(1200,1500) : h === 16 ? rnd(1100,1400) : rnd(50, 300);
  return { time: fmtTime(h), 발송량: vol, 성공률: rnd(93,99.5) };
});

function makeLog(id) {
  const school = SCHOOLS[id % SCHOOLS.length];
  const st = id % 9 === 0 ? '최종실패' : id % 5 === 0 ? '재시도중' : id % 3 === 0 ? '실패' : '성공';
  const h = rnd(7,20), m = rnd(0,59);
  return {
    id, school,
    student: `${['김','이','박','최','정'][id%5]}${['민준','서연','지호','하은','준서'][id%5]}`,
    platform: PLATFORMS[id%2],
    event: EVENT_TYPES[id%2],
    status: st,
    time: `2025.02.12 ${fmtTime(h,m)}`,
    retries: st === '성공' ? 0 : rnd(1,3),
    msgId: `MSG-${String(id+10000).padStart(6,'0')}`,
  };
}
const ALL_LOGS = Array.from({length: 120}, (_,i) => makeLog(i+1));

function makeParent(id) {
  const school = SCHOOLS[id % SCHOOLS.length];
  const names = ['김미정','이수현','박정아','최은영','정혜련','윤선희','강지은','조미경'];
  return {
    id, name: names[id%names.length] + (id > names.length ? id : ''),
    phone: `010-${String(rnd(1000,9999))}-${String(rnd(1000,9999))}`,
    school, grade: rnd(1,6), cls: rnd(1,8),
    devices: rnd(1,3),
    lastReceived: `2025.02.${String(rnd(10,12)).padStart(2,'0')} ${fmtTime(rnd(7,20),rnd(0,59))}`,
    status: id % 8 === 0 ? '토큰만료' : '정상',
    tokens: Array.from({length: rnd(1,3)}, (_,k) => ({
      id: k+1, platform: PLATFORMS[k%2], token: `token_${id}_${k}_xxxx`, active: k === 0,
    })),
  };
}
const ALL_PARENTS = Array.from({length: 80}, (_,i) => makeParent(i+1));

const RETRY_JOBS = [
  { id:1, msgId:'MSG-010045', school:'한빛초등학교', student:'김민준', attempt:2, maxAttempt:3, nextRetry:'12:34:18', status:'대기중' },
  { id:2, msgId:'MSG-010038', school:'미래초등학교', student:'이서연', attempt:1, maxAttempt:3, nextRetry:'12:35:00', status:'대기중' },
  { id:3, msgId:'MSG-010051', school:'강남초등학교', student:'박지호', attempt:3, maxAttempt:3, nextRetry:'—', status:'최종실패예정' },
  { id:4, msgId:'MSG-010062', school:'서울중앙초등학교', student:'최하은', attempt:2, maxAttempt:3, nextRetry:'12:36:22', status:'처리중' },
  { id:5, msgId:'MSG-010077', school:'광명초등학교', student:'정준서', attempt:1, maxAttempt:3, nextRetry:'12:37:10', status:'대기중' },
];

// ── Skeleton ──
function SkeletonCard({ w='100%', h=80 }) {
  return <div className="skeleton" style={{width:w, height:h, borderRadius:8}} />;
}

// ── Status Badge ──
function Badge({ st }) {
  const map = { '성공':[C.green,'#ECFDF5'], '실패':[C.red,'#FEF2F2'],
    '재시도중':[C.yellow,'#FFFBEB'], '최종실패':['#7C3AED','#EDE9FE'],
    '정상':[C.green,'#ECFDF5'], '토큰만료':[C.red,'#FEF2F2'],
    '대기중':[C.yellow,'#FFFBEB'], '처리중':[C.pri,'#EFF6FF'],
    '최종실패예정':[C.red,'#FEF2F2'],
  };
  const [color, bg] = map[st] || [C.sub, '#F8FAFC'];
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',
      borderRadius:12,fontSize:11,fontWeight:600,color,background:bg}}>
      <span style={{width:5,height:5,borderRadius:'50%',background:color,display:'inline-block'}}/>
      {st}
    </span>
  );
}

// ── Sidebar ──
const NAV = [
  { id:'main', label:'대시보드', icon:'📊' },
  { id:'log', label:'발송 로그', icon:'📋' },
  { id:'retry', label:'재시도 관리', icon:'🔄' },
  { id:'users', label:'학부모 관리', icon:'👥' },
];

function Sidebar({ current, onNav }) {
  return (
    <div style={{width:260,minHeight:'100vh',background:C.sidebar,color:'#fff',
      display:'flex',flexDirection:'column',flexShrink:0,position:'relative',zIndex:10}}>
      {/* Logo */}
      <div style={{padding:'24px 20px 20px',borderBottom:'1px solid rgba(255,255,255,0.1)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:C.pri,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>📡</div>
          <div>
            <div style={{fontWeight:700,fontSize:15,letterSpacing:'-0.3px'}}>(주)에듀알림</div>
            <div style={{fontSize:11,opacity:0.6,marginTop:1}}>Push Server Admin</div>
          </div>
        </div>
      </div>
      {/* Nav */}
      <div style={{padding:'16px 12px',flex:1}}>
        <div style={{fontSize:10,color:'rgba(255,255,255,0.4)',fontWeight:600,
          letterSpacing:1,padding:'0 8px',marginBottom:8}}>MAIN MENU</div>
        {NAV.map(n => (
          <button key={n.id} onClick={() => onNav(n.id)}
            style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 12px',
              borderRadius:8,border:'none',cursor:'pointer',fontSize:14,fontWeight:500,
              background: current === n.id ? C.sidebarAct : 'transparent',
              color: current === n.id ? '#fff' : 'rgba(255,255,255,0.65)',
              transition:'all 0.15s',marginBottom:2,textAlign:'left'}}>
            <span style={{fontSize:16}}>{n.icon}</span>
            {n.label}
            {n.id === 'retry' && (
              <span style={{marginLeft:'auto',background:C.red,color:'#fff',
                fontSize:10,fontWeight:700,padding:'1px 6px',borderRadius:10}}>5</span>
            )}
          </button>
        ))}

        <div style={{fontSize:10,color:'rgba(255,255,255,0.4)',fontWeight:600,
          letterSpacing:1,padding:'0 8px',marginBottom:8,marginTop:24}}>시스템</div>
        {[{label:'서버 상태',icon:'🖥️'},{label:'알림 설정',icon:'🔔'},{label:'관리자 계정',icon:'⚙️'}].map(n=>(
          <button key={n.label} onClick={()=>{}}
            style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 12px',
              borderRadius:8,border:'none',cursor:'pointer',fontSize:14,
              background:'transparent',color:'rgba(255,255,255,0.5)',
              transition:'all 0.15s',marginBottom:2,textAlign:'left'}}>
            <span style={{fontSize:16}}>{n.icon}</span>
            {n.label}
          </button>
        ))}
      </div>
      {/* Footer */}
      <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.1)',
        fontSize:11,opacity:0.4}}>
        v2.4.1 · 마지막 배포 2025.02.11
      </div>
    </div>
  );
}

// ── Top Bar ──
function TopBar({ title, subtitle }) {
  return (
    <div style={{height:60,background:C.surf,borderBottom:`1px solid ${C.border}`,
      display:'flex',alignItems:'center',padding:'0 28px',justifyContent:'space-between',
      flexShrink:0}}>
      <div>
        <div style={{fontWeight:700,fontSize:16,color:C.txt}}>{title}</div>
        {subtitle && <div style={{fontSize:11,color:C.sub,marginTop:1}}>{subtitle}</div>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',
          background:'#ECFDF5',borderRadius:8,fontSize:12,color:C.green,fontWeight:600}}>
          <span style={{width:6,height:6,borderRadius:'50%',background:C.green,
            display:'inline-block',animation:'pulse 2s infinite'}}/>
          서버 정상
        </div>
        <div style={{width:32,height:32,borderRadius:'50%',background:C.pri,
          display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',
          fontSize:14,fontWeight:700,cursor:'pointer'}}>관</div>
      </div>
    </div>
  );
}

// ── StatCard ──
function StatCard({ label, value, sub, color, icon, loading }) {
  if (loading) return (
    <div style={{background:C.surf,borderRadius:10,padding:20,border:`1px solid ${C.border}`}}>
      <SkeletonCard h={16} /><div style={{marginTop:12}}><SkeletonCard h={32} /></div>
      <div style={{marginTop:8}}><SkeletonCard h={12} /></div>
    </div>
  );
  return (
    <div style={{background:C.surf,borderRadius:10,padding:20,border:`1px solid ${C.border}`,
      boxShadow:'0 1px 4px rgba(0,0,0,0.06)',animation:'slideIn 0.3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div style={{fontSize:12,color:C.sub,fontWeight:500}}>{label}</div>
        <div style={{fontSize:20}}>{icon}</div>
      </div>
      <div style={{fontSize:28,fontWeight:800,color: color || C.txt,marginTop:8,
        letterSpacing:'-1px'}}>{value}</div>
      <div style={{fontSize:11,color:C.sub,marginTop:4}}>{sub}</div>
    </div>
  );
}

// ── 대시보드 ──
function Dashboard() {
  const [loading, setLoading] = useState(true);
  useEffect(() => { const t = setTimeout(() => setLoading(false), 1500); return () => clearTimeout(t); }, []);

  const stats = [
    { label:'오늘 총 발송', value: loading ? '—' : '4,821', sub:'FCM 3,204 / APNS 1,617', color: C.txt, icon:'📨' },
    { label:'발송 성공', value: loading ? '—' : '4,742', sub:'성공률 98.4%', color: C.green, icon:'✅' },
    { label:'발송 실패', value: loading ? '—' : '56', sub:'최종실패 12건 포함', color: C.red, icon:'❌' },
    { label:'재시도 중', value: loading ? '—' : '23', sub:'평균 대기 48초', color: C.yellow, icon:'🔄' },
  ];

  return (
    <div style={{padding:28}}>
      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
        {stats.map(s => <StatCard key={s.label} loading={loading} {...s} />)}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:16,marginBottom:24}}>
        {/* 시간대별 발송 추이 */}
        <div style={{background:C.surf,borderRadius:10,padding:20,border:`1px solid ${C.border}`,
          boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>시간대별 발송 추이</div>
          <div style={{fontSize:11,color:C.sub,marginBottom:16}}>오늘 07:00 — 현재</div>
          {loading ? <SkeletonCard h={220} /> : (
            <ResponsiveContainer width="100%" height={220}>
              <ComposedChart data={HOURLY_DATA} margin={{top:4,right:16,bottom:0,left:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
                <XAxis dataKey="time" tick={{fontSize:10,fill:C.sub}} />
                <YAxis yAxisId="vol" orientation="left" tick={{fontSize:10,fill:C.sub}} />
                <YAxis yAxisId="rate" orientation="right" domain={[85,100]} tick={{fontSize:10,fill:C.sub}} unit="%" />
                <Tooltip contentStyle={{fontSize:11,borderRadius:8,border:`1px solid ${C.border}`}} />
                <Legend iconSize={8} wrapperStyle={{fontSize:11}} />
                <Bar yAxisId="vol" dataKey="발송량" fill={C.acc} radius={[3,3,0,0]} barSize={18} />
                <Line yAxisId="rate" dataKey="성공률" stroke={C.green} strokeWidth={2} dot={false} />
              </ComposedChart>
            </ResponsiveContainer>
          )}
        </div>

        {/* 큐 현황 */}
        <div style={{background:C.surf,borderRadius:10,padding:20,border:`1px solid ${C.border}`,
          boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>큐 상태 모니터링</div>
          {loading ? <SkeletonCard h={200} /> : (
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              {[
                { name:'FCM 큐', waiting:8, active:3, color:C.pri },
                { name:'APNS 큐', waiting:2, active:1, color:'#6366F1' },
                { name:'DLQ (실패)', waiting:12, active:0, color:C.red },
              ].map(q => (
                <div key={q.name}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{fontSize:12,fontWeight:600,color:C.txt}}>{q.name}</span>
                    <span style={{fontSize:11,color:C.sub}}>대기 {q.waiting}  처리중 {q.active}</span>
                  </div>
                  <div style={{height:8,background:'#F1F5F9',borderRadius:4,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${Math.min(100,(q.waiting+q.active)*5)}%`,
                      background:q.color,borderRadius:4,transition:'width 0.5s'}}/>
                  </div>
                </div>
              ))}
              <div style={{marginTop:8,padding:12,background:'#ECFDF5',borderRadius:8}}>
                <div style={{fontSize:11,color:C.green,fontWeight:600}}>🟢 Worker 상태</div>
                <div style={{fontSize:11,color:C.sub,marginTop:4}}>
                  FCM Worker × 4 · APNS Worker × 2 · 모두 정상
                </div>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* 최근 이벤트 */}
      <div style={{background:C.surf,borderRadius:10,border:`1px solid ${C.border}`,
        boxShadow:'0 1px 4px rgba(0,0,0,0.06)',overflow:'hidden'}}>
        <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,
          display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontWeight:700,fontSize:14}}>최근 발송 이벤트</div>
          <span style={{fontSize:11,color:C.pri,cursor:'pointer',fontWeight:500}}>전체보기 →</span>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#F8FAFC'}}>
              {['메시지 ID','학교','학생','플랫폼','이벤트','발송시각','상태'].map(h => (
                <th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:11,
                  color:C.sub,fontWeight:600,borderBottom:`1px solid ${C.border}`}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {loading ? Array.from({length:5},(_,i)=>(
              <tr key={i}><td colSpan={7} style={{padding:'12px 16px'}}>
                <SkeletonCard h={14} /></td></tr>
            )) : ALL_LOGS.slice(0,8).map(log => (
              <tr key={log.id} style={{borderBottom:`1px solid ${C.border}`}}>
                <td style={{padding:'10px 16px',fontSize:12,fontFamily:'monospace',color:C.sub}}>{log.msgId}</td>
                <td style={{padding:'10px 16px',fontSize:12}}>{log.school}</td>
                <td style={{padding:'10px 16px',fontSize:12,fontWeight:500}}>{log.student}</td>
                <td style={{padding:'10px 16px',fontSize:12,color:C.sub}}>{log.platform}</td>
                <td style={{padding:'10px 16px',fontSize:12}}>
                  <span style={{padding:'2px 8px',borderRadius:8,fontSize:11,
                    background: log.event==='등교'?'#EFF6FF':'#FFF7ED',
                    color: log.event==='등교'?C.pri:C.orange, fontWeight:600}}>{log.event}</span>
                </td>
                <td style={{padding:'10px 16px',fontSize:12,color:C.sub}}>{log.time.split(' ')[1]}</td>
                <td style={{padding:'10px 16px'}}><Badge st={log.status} /></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── 발송 로그 ──
const PER_PAGE = 12;
function SendLog() {
  const [loading, setLoading] = useState(true);
  const [school, setSchool] = useState('전체');
  const [status, setStatus] = useState('전체');
  const [page, setPage] = useState(1);
  const [selected, setSelected] = useState([]);
  const [toast, setToast] = useState('');

  useEffect(() => { const t = setTimeout(() => setLoading(false), 1500); return () => clearTimeout(t); }, []);
  useEffect(() => { setPage(1); }, [school, status]);

  const filtered = ALL_LOGS.filter(l =>
    (school === '전체' || l.school === school) &&
    (status === '전체' || l.status === status)
  );
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  const pageData = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(''), 2500);
  }

  function toggleSelect(id) {
    setSelected(s => s.includes(id) ? s.filter(x=>x!==id) : [...s, id]);
  }

  return (
    <div style={{padding:28}}>
      {toast && (
        <div style={{position:'fixed',top:20,right:24,background:C.sec,color:'#fff',
          padding:'10px 20px',borderRadius:8,fontSize:13,zIndex:999,boxShadow:'0 4px 12px rgba(0,0,0,0.15)',
          animation:'slideIn 0.2s ease'}}>
          {toast}
        </div>
      )}

      {/* 필터 */}
      <div style={{background:C.surf,borderRadius:10,padding:16,border:`1px solid ${C.border}`,
        boxShadow:'0 1px 4px rgba(0,0,0,0.06)',marginBottom:20,
        display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:12,color:C.sub,fontWeight:500}}>학교</span>
          <select value={school} onChange={e=>setSchool(e.target.value)}
            style={{padding:'6px 10px',borderRadius:6,border:`1px solid ${C.border}`,
              fontSize:12,background:'#fff',color:C.txt,cursor:'pointer'}}>
            <option>전체</option>
            {SCHOOLS.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:12,color:C.sub,fontWeight:500}}>상태</span>
          <select value={status} onChange={e=>setStatus(e.target.value)}
            style={{padding:'6px 10px',borderRadius:6,border:`1px solid ${C.border}`,
              fontSize:12,background:'#fff',color:C.txt,cursor:'pointer'}}>
            <option>전체</option>
            {STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:8}}>
          {selected.length > 0 && (
            <button onClick={() => { showToast(`${selected.length}건 재시도 요청 전송`); setSelected([]); }}
              style={{padding:'6px 14px',background:C.yellow,color:'#78350F',border:'none',
                borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer'}}>
              선택 재시도 ({selected.length})
            </button>
          )}
          <button onClick={() => showToast('CSV 다운로드 시작')}
            style={{padding:'6px 14px',background:C.surf,color:C.txt,
              border:`1px solid ${C.border}`,borderRadius:6,fontSize:12,cursor:'pointer'}}>
            📥 CSV 내보내기
          </button>
        </div>
      </div>

      {/* 테이블 */}
      <div style={{background:C.surf,borderRadius:10,border:`1px solid ${C.border}`,
        boxShadow:'0 1px 4px rgba(0,0,0,0.06)',overflow:'hidden'}}>
        <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,
          display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontWeight:700,fontSize:14}}>발송 로그</div>
          <span style={{fontSize:12,color:C.sub}}>총 {total.toLocaleString()}건</span>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#F8FAFC'}}>
              <th style={{padding:'10px 12px',width:36}}>
                <input type="checkbox" onChange={e => setSelected(e.target.checked ? pageData.map(d=>d.id) : [])}
                  checked={selected.length === pageData.length && pageData.length > 0} />
              </th>
              {['메시지 ID','학교','학생','플랫폼','이벤트','발송 시각','재시도','상태'].map(h=>(
                <th key={h} style={{padding:'10px 12px',textAlign:'left',fontSize:11,
                  color:C.sub,fontWeight:600,borderBottom:`1px solid ${C.border}`}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {loading ? Array.from({length:8},(_,i)=>(
              <tr key={i}><td colSpan={9} style={{padding:'12px 16px'}}>
                <SkeletonCard h={14}/></td></tr>
            )) : pageData.map(log => (
              <tr key={log.id} style={{borderBottom:`1px solid ${C.border}`,
                background: selected.includes(log.id) ? '#EFF6FF' : 'transparent'}}>
                <td style={{padding:'10px 12px'}}>
                  <input type="checkbox" checked={selected.includes(log.id)}
                    onChange={() => toggleSelect(log.id)} />
                </td>
                <td style={{padding:'10px 12px',fontSize:12,fontFamily:'monospace',color:C.sub}}>{log.msgId}</td>
                <td style={{padding:'10px 12px',fontSize:12}}>{log.school}</td>
                <td style={{padding:'10px 12px',fontSize:12,fontWeight:500}}>{log.student}</td>
                <td style={{padding:'10px 12px',fontSize:12,color:C.sub}}>{log.platform.split(' ')[0]}</td>
                <td style={{padding:'10px 12px',fontSize:12}}>
                  <span style={{padding:'2px 8px',borderRadius:8,fontSize:11,
                    background:log.event==='등교'?'#EFF6FF':'#FFF7ED',
                    color:log.event==='등교'?C.pri:C.orange,fontWeight:600}}>{log.event}</span>
                </td>
                <td style={{padding:'10px 12px',fontSize:12,color:C.sub}}>{log.time}</td>
                <td style={{padding:'10px 12px',fontSize:12,textAlign:'center'}}>
                  {log.retries > 0
                    ? <span style={{color:C.red,fontWeight:600}}>{log.retries}회</span>
                    : <span style={{color:C.sub}}>—</span>}
                </td>
                <td style={{padding:'10px 12px'}}><Badge st={log.status} /></td>
              </tr>
            ))}
          </tbody>
        </table>

        {/* 페이지네이션 */}
        <div style={{padding:'12px 20px',borderTop:`1px solid ${C.border}`,
          display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:12,color:C.sub}}>{((page-1)*PER_PAGE+1).toLocaleString()} — {Math.min(page*PER_PAGE,total).toLocaleString()} / {total.toLocaleString()}</span>
          <div style={{display:'flex',gap:4}}>
            <button onClick={() => setPage(p => Math.max(1,p-1))} disabled={page===1}
              style={{padding:'4px 10px',border:`1px solid ${C.border}`,borderRadius:6,
                background: page===1?'#F8FAFC':'#fff',color: page===1?C.sub:C.txt,cursor: page===1?'default':'pointer',fontSize:12}}>
              ← 이전
            </button>
            {Array.from({length:Math.min(5,totalPages)},(_,i)=>{
              const p = Math.max(1,Math.min(totalPages-4,page-2))+i;
              return (
                <button key={p} onClick={() => setPage(p)}
                  style={{padding:'4px 10px',border:`1px solid ${page===p?C.pri:C.border}`,
                    borderRadius:6,background:page===p?C.pri:'#fff',
                    color:page===p?'#fff':C.txt,cursor:'pointer',fontSize:12,fontWeight:page===p?700:400}}>
                  {p}
                </button>
              );
            })}
            <button onClick={() => setPage(p => Math.min(totalPages,p+1))} disabled={page===totalPages}
              style={{padding:'4px 10px',border:`1px solid ${C.border}`,borderRadius:6,
                background: page===totalPages?'#F8FAFC':'#fff',color: page===totalPages?C.sub:C.txt,
                cursor: page===totalPages?'default':'pointer',fontSize:12}}>
              다음 →
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── 재시도 관리 ──
function RetryManager() {
  const [loading, setLoading] = useState(true);
  const [policy, setPolicy] = useState({ maxRetry: 3, initWait: 30, maxWait: 300, jitter: 20 });
  const [saved, setSaved] = useState(false);

  useEffect(() => { const t = setTimeout(() => setLoading(false), 1500); return () => clearTimeout(t); }, []);

  function handleSave() {
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }

  return (
    <div style={{padding:28}}>
      <div style={{display:'grid',gridTemplateColumns:'360px 1fr',gap:20}}>
        {/* 정책 설정 폼 */}
        <div>
          <div style={{background:C.surf,borderRadius:10,border:`1px solid ${C.border}`,
            boxShadow:'0 1px 4px rgba(0,0,0,0.06)',overflow:'hidden'}}>
            <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,background:'#F8FAFC'}}>
              <div style={{fontWeight:700,fontSize:14}}>재시도 정책 설정</div>
              <div style={{fontSize:11,color:C.sub,marginTop:2}}>Exponential Backoff + Jitter</div>
            </div>
            <div style={{padding:20}}>
              {loading ? <SkeletonCard h={200} /> : (
                <div style={{display:'flex',flexDirection:'column',gap:20}}>
                  {[
                    { key:'maxRetry', label:'최대 재시도 횟수', unit:'회', min:1, max:10 },
                    { key:'initWait', label:'초기 대기 시간', unit:'초', min:5, max:120 },
                    { key:'maxWait', label:'최대 대기 시간', unit:'초', min:60, max:3600 },
                    { key:'jitter', label:'Jitter 범위', unit:'%', min:0, max:50 },
                  ].map(f => (
                    <div key={f.key}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                        <label style={{fontSize:12,fontWeight:600,color:C.txt}}>{f.label}</label>
                        <span style={{fontSize:13,fontWeight:700,color:C.pri}}>
                          {policy[f.key]} {f.unit}
                        </span>
                      </div>
                      <input type="range" min={f.min} max={f.max} value={policy[f.key]}
                        onChange={e => setPolicy(p => ({...p, [f.key]: Number(e.target.value)}))}
                        style={{width:'100%',accentColor:C.pri}} />
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.sub,marginTop:2}}>
                        <span>{f.min} {f.unit}</span><span>{f.max} {f.unit}</span>
                      </div>
                    </div>
                  ))}

                  <div style={{padding:12,background:'#F0F9FF',borderRadius:8,fontSize:11,color:C.sub,lineHeight:1.6}}>
                    <strong style={{color:C.pri}}>현재 설정 기준:</strong><br/>
                    1차 재시도: ~{policy.initWait}초<br/>
                    2차 재시도: ~{policy.initWait*2}초<br/>
                    최대 대기: {policy.maxWait}초 (Jitter ±{policy.jitter}%)
                  </div>

                  <button onClick={handleSave}
                    style={{padding:'10px',background: saved ? C.green : C.pri,color:'#fff',
                      border:'none',borderRadius:8,fontSize:13,fontWeight:700,cursor:'pointer',
                      transition:'background 0.2s'}}>
                    {saved ? '✅ 저장 완료' : '설정 저장'}
                  </button>
                </div>
              )}
            </div>
          </div>

          {/* DLQ 현황 */}
          <div style={{background:C.surf,borderRadius:10,border:`1px solid ${C.border}`,
            boxShadow:'0 1px 4px rgba(0,0,0,0.06)',padding:20,marginTop:16}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>DLQ (Dead Letter Queue) 현황</div>
            {loading ? <SkeletonCard h={80} /> : (
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {[
                  { label:'FCM DLQ', count:8, color:C.pri },
                  { label:'APNS DLQ', count:4, color:'#6366F1' },
                ].map(q=>(
                  <div key={q.label} style={{display:'flex',justifyContent:'space-between',
                    padding:'10px 12px',background:'#F8FAFC',borderRadius:8}}>
                    <span style={{fontSize:12,fontWeight:500}}>{q.label}</span>
                    <span style={{fontSize:13,fontWeight:700,color:q.color}}>{q.count}건</span>
                  </div>
                ))}
                <button onClick={() => {}}
                  style={{padding:'8px',background:'#FFF1F2',color:C.red,border:`1px solid #FECACA`,
                    borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',marginTop:4}}>
                  DLQ 전체 재처리
                </button>
              </div>
            )}
          </div>
        </div>

        {/* 재시도 중인 작업 목록 */}
        <div style={{background:C.surf,borderRadius:10,border:`1px solid ${C.border}`,
          boxShadow:'0 1px 4px rgba(0,0,0,0.06)',overflow:'hidden'}}>
          <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,
            display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>재시도 중인 작업</div>
              <div style={{fontSize:11,color:C.sub,marginTop:2}}>실시간 업데이트</div>
            </div>
            <span style={{background:'#FFF7ED',color:C.yellow,padding:'4px 10px',
              borderRadius:8,fontSize:12,fontWeight:700}}>{RETRY_JOBS.length}건 진행 중</span>
          </div>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:'#F8FAFC'}}>
                {['메시지 ID','학교','학생','시도/최대','다음 재시도','상태','액션'].map(h=>(
                  <th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:11,
                    color:C.sub,fontWeight:600,borderBottom:`1px solid ${C.border}`}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {loading ? Array.from({length:5},(_,i)=>(
                <tr key={i}><td colSpan={7} style={{padding:'12px 16px'}}><SkeletonCard h={14}/></td></tr>
              )) : RETRY_JOBS.map(job => (
                <tr key={job.id} style={{borderBottom:`1px solid ${C.border}`}}>
                  <td style={{padding:'12px 14px',fontSize:12,fontFamily:'monospace',color:C.sub}}>{job.msgId}</td>
                  <td style={{padding:'12px 14px',fontSize:12}}>{job.school}</td>
                  <td style={{padding:'12px 14px',fontSize:12,fontWeight:500}}>{job.student}</td>
                  <td style={{padding:'12px 14px',fontSize:12}}>
                    <span style={{color: job.attempt >= job.maxAttempt ? C.red : C.txt, fontWeight:600}}>
                      {job.attempt} / {job.maxAttempt}
                    </span>
                  </td>
                  <td style={{padding:'12px 14px',fontSize:12,fontFamily:'monospace',color:C.sub}}>{job.nextRetry}</td>
                  <td style={{padding:'12px 14px'}}><Badge st={job.status}/></td>
                  <td style={{padding:'12px 14px'}}>
                    <button onClick={() => {}}
                      style={{padding:'4px 10px',background:'#EFF6FF',color:C.pri,
                        border:'none',borderRadius:6,fontSize:11,cursor:'pointer',fontWeight:500}}>
                      즉시 재시도
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── 학부모 관리 ──
function ParentManager() {
  const [loading, setLoading] = useState(true);
  const [school, setSchool] = useState('전체');
  const [page, setPage] = useState(1);
  const [selected, setSelected] = useState(null);

  useEffect(() => { const t = setTimeout(() => setLoading(false), 1500); return () => clearTimeout(t); }, []);
  useEffect(() => { setPage(1); }, [school]);

  const filtered = ALL_PARENTS.filter(p => school === '전체' || p.school === school);
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  const pageData = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);

  return (
    <div style={{padding:28}}>
      {/* Modal */}
      {selected && (
        <>
          <div onClick={() => setSelected(null)}
            style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:100}} />
          <div style={{position:'fixed',top:'50%',left:'50%',
            transform:'translate(-50%,-50%)',zIndex:101,width:520,
            background:C.surf,borderRadius:16,boxShadow:'0 20px 60px rgba(0,0,0,0.2)',
            animation:'fadeInScale 0.2s ease',overflow:'hidden'}}>
            <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,
              display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontWeight:700,fontSize:16}}>{selected.name} 상세</div>
                <div style={{fontSize:12,color:C.sub,marginTop:2}}>{selected.school} {selected.grade}학년 {selected.cls}반</div>
              </div>
              <button onClick={() => setSelected(null)}
                style={{width:28,height:28,borderRadius:'50%',border:'none',background:'#F1F5F9',
                  cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
            </div>
            <div style={{padding:24}}>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:12,color:C.sub,fontWeight:600,marginBottom:8}}>기기 토큰 목록</div>
                {selected.tokens.map(tk=>(
                  <div key={tk.id} style={{padding:10,background:'#F8FAFC',borderRadius:8,
                    marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:600}}>{tk.platform}</div>
                      <div style={{fontSize:10,color:C.sub,fontFamily:'monospace',marginTop:2}}>{tk.token}</div>
                    </div>
                    <Badge st={tk.active?'정상':'토큰만료'} />
                  </div>
                ))}
              </div>
              <div style={{padding:12,background:'#F0F9FF',borderRadius:8,fontSize:12,color:C.sub}}>
                <strong>최근 수신:</strong> {selected.lastReceived}
              </div>
            </div>
          </div>
        </>
      )}

      {/* 필터 */}
      <div style={{background:C.surf,borderRadius:10,padding:16,border:`1px solid ${C.border}`,
        boxShadow:'0 1px 4px rgba(0,0,0,0.06)',marginBottom:20,
        display:'flex',gap:12,alignItems:'center'}}>
        <span style={{fontSize:12,color:C.sub,fontWeight:500}}>학교</span>
        <select value={school} onChange={e=>setSchool(e.target.value)}
          style={{padding:'6px 10px',borderRadius:6,border:`1px solid ${C.border}`,
            fontSize:12,background:'#fff',cursor:'pointer'}}>
          <option>전체</option>
          {SCHOOLS.map(s=><option key={s}>{s}</option>)}
        </select>
        <div style={{marginLeft:'auto',fontSize:12,color:C.sub}}>
          토큰 만료 학부모: <strong style={{color:C.red}}>
            {filtered.filter(p=>p.status==='토큰만료').length}명
          </strong>
        </div>
      </div>

      {/* 테이블 */}
      <div style={{background:C.surf,borderRadius:10,border:`1px solid ${C.border}`,
        boxShadow:'0 1px 4px rgba(0,0,0,0.06)',overflow:'hidden'}}>
        <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,
          display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontWeight:700,fontSize:14}}>학부모 관리</div>
          <span style={{fontSize:12,color:C.sub}}>총 {total}명</span>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#F8FAFC'}}>
              {['이름','연락처','학교','학년/반','기기 수','최근 수신','상태'].map(h=>(
                <th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:11,
                  color:C.sub,fontWeight:600,borderBottom:`1px solid ${C.border}`}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {loading ? Array.from({length:8},(_,i)=>(
              <tr key={i}><td colSpan={7} style={{padding:'12px 16px'}}><SkeletonCard h={14}/></td></tr>
            )) : pageData.map(p=>(
              <tr key={p.id} onClick={() => setSelected(p)}
                style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',
                  transition:'background 0.1s'}}
                onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'10px 14px',fontSize:13,fontWeight:600,color:C.pri}}>{p.name}</td>
                <td style={{padding:'10px 14px',fontSize:12,color:C.sub}}>{p.phone}</td>
                <td style={{padding:'10px 14px',fontSize:12}}>{p.school}</td>
                <td style={{padding:'10px 14px',fontSize:12}}>{p.grade}학년 {p.cls}반</td>
                <td style={{padding:'10px 14px',fontSize:12,textAlign:'center'}}>
                  <span style={{background:'#EFF6FF',color:C.pri,padding:'2px 8px',
                    borderRadius:8,fontSize:11,fontWeight:600}}>{p.devices}대</span>
                </td>
                <td style={{padding:'10px 14px',fontSize:12,color:C.sub}}>{p.lastReceived}</td>
                <td style={{padding:'10px 14px'}}><Badge st={p.status}/></td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{padding:'12px 20px',borderTop:`1px solid ${C.border}`,
          display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:12,color:C.sub}}>{((page-1)*PER_PAGE+1)} — {Math.min(page*PER_PAGE,total)} / {total}</span>
          <div style={{display:'flex',gap:4}}>
            <button onClick={() => setPage(p=>Math.max(1,p-1))} disabled={page===1}
              style={{padding:'4px 10px',border:`1px solid ${C.border}`,borderRadius:6,
                background:page===1?'#F8FAFC':'#fff',color:page===1?C.sub:C.txt,
                cursor:page===1?'default':'pointer',fontSize:12}}>← 이전</button>
            {Array.from({length:Math.min(5,totalPages)},(_,i)=>{
              const pg = Math.max(1,Math.min(totalPages-4,page-2))+i;
              return (
                <button key={pg} onClick={()=>setPage(pg)}
                  style={{padding:'4px 10px',border:`1px solid ${page===pg?C.pri:C.border}`,
                    borderRadius:6,background:page===pg?C.pri:'#fff',
                    color:page===pg?'#fff':C.txt,cursor:'pointer',fontSize:12,fontWeight:page===pg?700:400}}>
                  {pg}
                </button>
              );
            })}
            <button onClick={() => setPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages}
              style={{padding:'4px 10px',border:`1px solid ${C.border}`,borderRadius:6,
                background:page===totalPages?'#F8FAFC':'#fff',color:page===totalPages?C.sub:C.txt,
                cursor:page===totalPages?'default':'pointer',fontSize:12}}>다음 →</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── App ──
function App() {
  const [page, setPage] = useState('main');
  const titles = {
    main:  { title:'발송 대시보드', subtitle:'오늘 푸시 발송 현황 실시간 모니터링' },
    log:   { title:'발송 로그', subtitle:'학교별·이벤트별 발송 이력 조회' },
    retry: { title:'재시도 관리', subtitle:'Exponential Backoff 재시도 정책 및 현황' },
    users: { title:'학부모 관리', subtitle:'학부모 계정 및 기기 토큰 관리' },
  };

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar current={page} onNav={setPage} />
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar {...titles[page]} />
        <div style={{flex:1,overflowY:'auto'}}>
          {page === 'main'  && <Dashboard />}
          {page === 'log'   && <SendLog />}
          {page === 'retry' && <RetryManager />}
          {page === 'users' && <ParentManager />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
