<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>프레시전 파츠 — 정밀 부품 제조사 통합 홈페이지 & 어드민</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#FAF5FF;color:#1E1B4B}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes barGrow{from{width:0}to{width:var(--target-width)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const {BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,AreaChart,Area}=Recharts;

const C={primary:'#7C3AED',secondary:'#1E1B4B',accent:'#A78BFA',bg:'#FAF5FF',surface:'#FFF',border:'#E5E7EB',text:'#1E1B4B',textLight:'#6D28D9',success:'#059669',warning:'#D97706'};

const PRODUCTS=[
  {id:1,name:'PP-100 CNC 정밀 기어',category:'기어',desc:'CNC 5축 가공 정밀 스퍼 기어',spec:'모듈: 0.5~3.0 | 정밀도: JIS 0급 | 소재: SCM440',cert:'ISO 9001',image:'⚙️',lang:{en:'PP-100 CNC Precision Gear'}},
  {id:2,name:'PP-200 마이크로 베어링',category:'베어링',desc:'고속 회전 정밀 소형 베어링',spec:'내경: φ2~φ10 | 회전수: 80,000rpm | 수명: L10 1억회',cert:'ISO 14001',image:'🔩',lang:{en:'PP-200 Micro Bearing'}},
  {id:3,name:'PP-300 커스텀 샤프트',category:'샤프트',desc:'다단 가공 고정밀 회전 샤프트',spec:'진원도: 0.001mm | 표면거칠기: Ra0.2 | 열처리: HRC 58-62',cert:'IATF 16949',image:'🔧',lang:{en:'PP-300 Custom Shaft'}},
  {id:4,name:'PP-400 정밀 하우징',category:'하우징',desc:'알루미늄 다이캐스팅 정밀 하우징',spec:'공차: ±0.01mm | 소재: A6061-T6 | 표면처리: 아노다이징',cert:'ISO 9001',image:'📦',lang:{en:'PP-400 Precision Housing'}},
  {id:5,name:'PP-500 스프링 핀',category:'핀/패스너',desc:'SUS304 정밀 스프링 핀',spec:'φ1.0~φ8.0 | 인장강도: 1600MPa | 표면: 전해연마',cert:'RoHS',image:'📌',lang:{en:'PP-500 Spring Pin'}},
  {id:6,name:'PP-600 밸브 시트',category:'밸브',desc:'초정밀 가공 밸브 시트 인서트',spec:'진원도: 0.0005mm | 소재: 스텔라이트 | 경도: HRC 45',cert:'ISO 9001',image:'🔘',lang:{en:'PP-600 Valve Seat'}},
];
const CERTS=[
  {id:1,name:'ISO 9001:2015',type:'품질경영',expiry:'2027.06.30',status:'유효',version:'v3'},
  {id:2,name:'ISO 14001:2015',type:'환경경영',expiry:'2027.06.30',status:'유효',version:'v2'},
  {id:3,name:'IATF 16949:2016',type:'자동차품질',expiry:'2026.12.31',status:'유효',version:'v4'},
  {id:4,name:'RoHS 적합 인증',type:'유해물질',expiry:'2026.09.30',status:'유효',version:'v1'},
  {id:5,name:'REACH 인증',type:'화학물질',expiry:'2026.06.30',status:'갱신예정',version:'v2'},
];
const INQUIRIES=[
  {id:1,company:'보쉬코리아',name:'김민수',product:'PP-100 CNC 정밀 기어',type:'견적',date:'2025.03.15',status:'미확인',lang:'ko'},
  {id:2,company:'Siemens AG',name:'Hans Mueller',product:'PP-200 Micro Bearing',type:'Technical',date:'2025.03.14',status:'확인',lang:'en'},
  {id:3,company:'현대모비스',name:'이지은',product:'PP-300 커스텀 샤프트',type:'샘플',date:'2025.03.13',status:'답변완료',lang:'ko'},
];
const DELIVERY_COUNTRIES=['한국','일본','독일','미국','중국','베트남','태국','인도'];
const MONTHLY=[{m:'10월',문의:8,납품:12},{m:'11월',문의:11,납품:15},{m:'12월',문의:9,납품:10},{m:'1월',문의:14,납품:18},{m:'2월',문의:12,납품:14},{m:'3월',문의:17,납품:20}];

function Badge({text}){const c={'기어':{bg:'#EFF6FF',t:'#3B82F6'},'베어링':{bg:'#ECFDF5',t:'#059669'},'샤프트':{bg:'#FEF3C7',t:'#D97706'},'하우징':{bg:'#FAF5FF',t:'#7C3AED'},'핀/패스너':{bg:'#FFF1F2',t:'#EF4444'},'밸브':{bg:'#F0F9FF',t:'#0066CC'},'유효':{bg:'#ECFDF5',t:'#059669'},'갱신예정':{bg:'#FEF3C7',t:'#D97706'},'미확인':{bg:'#FEF3C7',t:'#D97706'},'확인':{bg:'#EFF6FF',t:'#3B82F6'},'답변완료':{bg:'#ECFDF5',t:'#059669'},'품질경영':{bg:'#FAF5FF',t:'#7C3AED'},'환경경영':{bg:'#ECFDF5',t:'#059669'},'자동차품질':{bg:'#EFF6FF',t:'#3B82F6'},'유해물질':{bg:'#FEE2E2',t:'#EF4444'},'화학물질':{bg:'#FEF3C7',t:'#D97706'}}[text]||{bg:'#F3F4F6',t:'#6B7280'};return <span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:c.bg,color:c.t}}>{text}</span>;}
function CountUp({end,suffix=''}){const[v,setV]=useState(0);useEffect(()=>{let s=0;const step=end/75;const t=setInterval(()=>{s+=step;if(s>=end){setV(end);clearInterval(t)}else setV(Math.floor(s))},16);return()=>clearInterval(t)},[end]);return <span>{v.toLocaleString()}{suffix}</span>;}
function Toast({msg,onClose}){useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,.2)',fontSize:14}}>{msg}</div>;}
function Modal({title,onClose,children,width=560}){return(<div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}><div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.4)',animation:'fadeIn 200ms ease'}}/><div style={{position:'relative',width,maxHeight:'85vh',background:'#fff',borderRadius:20,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,.15)'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}><h3 style={{fontSize:18,fontWeight:700}}>{title}</h3><button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button></div><div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div></div></div>);}

/* ── NAV ── */
const NAV=[{id:'home',icon:'🌐',label:'홈'},{id:'product-3d-viewer',icon:'⚙️',label:'제품'},{id:'cert-library',icon:'📄',label:'인증서'},{id:'about',icon:'🏭',label:'회사 소개'},{id:'admin-platform',icon:'🔧',label:'관리자'}];
const SECTION_TABS={home:[{id:'main',label:'메인'},{id:'global',label:'글로벌'}],'product-3d-viewer':[{id:'list',label:'제품 목록'},{id:'compare',label:'스펙 비교'}],'cert-library':[{id:'certs',label:'인증서'},{id:'history',label:'버전 이력'}],about:[{id:'vision',label:'비전'},{id:'history',label:'연혁'}],'admin-platform':[{id:'products',label:'제품 관리'},{id:'certs',label:'인증서 관리'},{id:'inquiries',label:'문의 관리'}]};

function SideNav({section,setSection}){return(<nav style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',paddingTop:16,flexShrink:0}}><div style={{padding:'0 16px 20px',display:'flex',alignItems:'center',gap:8}}><div style={{width:32,height:32,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:14}}>P</div><div><span style={{fontWeight:700,fontSize:15}}>Precision Parts</span><div style={{fontSize:10,color:C.textLight}}>정밀 부품 제조</div></div></div><div style={{flex:1,display:'flex',flexDirection:'column',gap:2,padding:'0 8px'}}>{NAV.map(n=><button key={n.id} onClick={()=>setSection(n.id)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'8px 12px',borderRadius:8,border:'none',cursor:'pointer',background:section===n.id?`${C.primary}10`:'transparent',color:section===n.id?C.primary:C.textLight,borderLeft:section===n.id?`3px solid ${C.primary}`:'3px solid transparent',fontSize:14,fontWeight:section===n.id?600:400,transition:'all 150ms',fontFamily:'inherit',textAlign:'left'}}><span style={{fontSize:16}}>{n.icon}</span>{n.label}</button>)}</div></nav>);}

function AppBar({section}){return(<header style={{height:40,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 16px',gap:8,background:C.surface,flexShrink:0}}><span style={{fontSize:12,color:C.textLight}}>Precision Parts</span><span style={{fontSize:12,color:C.textLight}}>/</span><span style={{fontSize:12,fontWeight:600}}>{NAV.find(n=>n.id===section)?.label}</span><div style={{flex:1}}/><button style={{padding:'3px 8px',borderRadius:4,border:`1px solid ${C.border}`,background:'#fff',fontSize:11,cursor:'pointer',fontFamily:'inherit',color:C.textLight}}>🌐 KO / EN</button></header>);}

function TabStrip({section,tab,setTab}){const tabs=SECTION_TABS[section]||[];return(<div style={{height:38,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'flex-end',padding:'0 16px',background:C.surface,flexShrink:0}}>{tabs.map((t,i)=><button key={t.id} onClick={()=>setTab(i)} style={{padding:'8px 14px 6px',border:'none',cursor:'pointer',background:'transparent',fontFamily:'inherit',fontSize:13,color:tab===i?C.primary:C.textLight,fontWeight:tab===i?600:400,borderBottom:tab===i?`2px solid ${C.primary}`:'2px solid transparent',marginBottom:-1}}>{t.label}</button>)}</div>);}

/* ══════ 페이지: 홈 ══════ */
function HomePage(){
  return(<div key="home" style={{animation:'fadeIn 300ms ease',padding:20}}>
    {/* 히어로 */}
    <div style={{background:`linear-gradient(135deg,${C.secondary},${C.primary})`,borderRadius:20,padding:'40px 36px',color:'#fff',marginBottom:24,position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:-50,right:-50,width:200,height:200,borderRadius:'50%',background:`${C.accent}20`}}/>
      <div style={{position:'relative',zIndex:1}}>
        <div style={{fontSize:12,color:C.accent,fontWeight:600,marginBottom:6}}>PRECISION PARTS KOREA</div>
        <h2 style={{fontSize:28,fontWeight:800,lineHeight:1.3,marginBottom:8}}>정밀 부품 제조의<br/>글로벌 파트너</h2>
        <p style={{fontSize:14,opacity:.8,maxWidth:500}}>CNC 5축 가공, 마이크로 베어링, 커스텀 샤프트 — 글로벌 8개국 납품</p>
      </div>
    </div>
    {/* KPI */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
      {[{icon:'⚙️',label:'등록 제품',value:86,suffix:'종'},{icon:'🌍',label:'수출 국가',value:8,suffix:'개국'},{icon:'📄',label:'인증 보유',value:5,suffix:'종'},{icon:'🏭',label:'납품 기업',value:42,suffix:'사'}].map((k,i)=>(
        <div key={k.label} style={{background:C.surface,borderRadius:20,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:`1px solid ${C.border}`,animation:`slideUp 400ms ease ${i*80}ms both`}}>
          <div style={{display:'flex',justifyContent:'space-between'}}><div><div style={{fontSize:11,color:C.textLight,textTransform:'uppercase',letterSpacing:'0.06em',fontWeight:700}}>{k.label}</div><div style={{fontSize:26,fontWeight:700,marginTop:6}}><CountUp end={k.value} suffix={k.suffix}/></div></div><div style={{width:40,height:40,borderRadius:12,background:`${C.primary}10`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{k.icon}</div></div>
        </div>
      ))}
    </div>
    {/* 글로벌 납품 지도 시뮬레이션 */}
    <div style={{background:C.surface,borderRadius:20,padding:24,boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:`1px solid ${C.border}`,marginBottom:24}}>
      <h3 style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:16}}>글로벌 납품 현황</h3>
      <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
        {DELIVERY_COUNTRIES.map((c,i)=>(
          <div key={c} style={{padding:'8px 16px',borderRadius:10,background:`${C.primary}${10+i*2>15?15:10+i*2}`,border:`1px solid ${C.border}`,fontSize:13,fontWeight:500,color:C.text,animation:`slideUp 400ms ease ${i*60}ms both`,cursor:'default',transition:'all 150ms'}}
            onMouseEnter={e=>{e.currentTarget.style.background=`${C.primary}20`;e.currentTarget.style.borderColor=C.primary}}
            onMouseLeave={e=>{e.currentTarget.style.background=`${C.primary}10`;e.currentTarget.style.borderColor=C.border}}>
            🌐 {c}
          </div>
        ))}
      </div>
    </div>
    {/* 주요 제품 */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
      {PRODUCTS.slice(0,3).map((p,i)=>(
        <div key={p.id} style={{background:C.surface,borderRadius:20,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:`1px solid ${C.border}`,animation:`slideUp 400ms ease ${i*80}ms both`,cursor:'default',transition:'all 150ms'}}
          onMouseEnter={e=>{e.currentTarget.style.background=`${C.primary}04`;e.currentTarget.style.borderLeft=`3px solid ${C.primary}`}}
          onMouseLeave={e=>{e.currentTarget.style.background=C.surface;e.currentTarget.style.borderLeft=`3px solid transparent`}}>
          <div style={{fontSize:32,marginBottom:8}}>{p.image}</div>
          <Badge text={p.category}/>
          <h4 style={{fontSize:14,fontWeight:700,marginTop:6,marginBottom:4}}>{p.name}</h4>
          <div style={{fontSize:11,color:C.textLight}}>{p.desc}</div>
        </div>
      ))}
    </div>
  </div>);
}

/* ══════ 페이지: 제품 (마스터-디테일) ══════ */
function ProductPage({selected,setSelected}){
  const[cat,setCat]=useState('전체');
  const cats=['전체','기어','베어링','샤프트','하우징','핀/패스너','밸브'];
  const filtered=cat==='전체'?PRODUCTS:PRODUCTS.filter(p=>p.category===cat);
  return(<div key="product" style={{animation:'fadeIn 300ms ease',display:'flex',overflow:'hidden',height:'calc(100vh - 118px)'}}>
    <div style={{width:'42%',borderRight:`1px solid ${C.border}`,overflowY:'auto'}}>
      <div style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,display:'flex',gap:6,flexWrap:'wrap'}}>
        {cats.map(c=><button key={c} onClick={()=>setCat(c)} style={{padding:'4px 10px',borderRadius:16,border:cat===c?'none':`1px solid ${C.border}`,background:cat===c?C.primary:'#fff',color:cat===c?'#fff':C.textLight,fontSize:11,fontWeight:cat===c?600:400,cursor:'pointer',fontFamily:'inherit'}}>{c}</button>)}
      </div>
      {filtered.map(p=>(
        <div key={p.id} onClick={()=>setSelected(p)} style={{padding:'10px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',background:selected?.id===p.id?`${C.primary}08`:'transparent',borderLeft:selected?.id===p.id?`3px solid ${C.primary}`:'3px solid transparent',transition:'all 150ms'}}
          onMouseEnter={e=>{if(selected?.id!==p.id)e.currentTarget.style.background=`${C.primary}04`}}
          onMouseLeave={e=>{if(selected?.id!==p.id)e.currentTarget.style.background='transparent'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,fontWeight:selected?.id===p.id?600:400}}>{p.image} {p.name}</span>
            <Badge text={p.category}/>
          </div>
          <div style={{fontSize:11,color:C.textLight,marginTop:2}}>{p.spec.split('|')[0].trim()}</div>
        </div>
      ))}
    </div>
    <div style={{flex:1,overflowY:'auto',padding:20}}>
      {selected?(
        <div style={{animation:'fadeIn 200ms ease'}}>
          <div style={{height:200,borderRadius:16,background:`linear-gradient(135deg,${C.primary}15,${C.accent}20)`,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20}}>
            <div style={{textAlign:'center'}}><span style={{fontSize:64}}>{selected.image}</span><div style={{fontSize:12,color:C.textLight,marginTop:8}}>3D 뷰어 (인터랙티브)</div></div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <h2 style={{fontSize:22,fontWeight:700}}>{selected.name}</h2>
            <span style={{fontSize:12,color:C.accent}}>{selected.lang.en}</span>
          </div>
          <div style={{display:'flex',gap:6,marginBottom:16}}><Badge text={selected.category}/><Badge text={selected.cert}/></div>
          <p style={{fontSize:14,color:C.textLight,lineHeight:1.6,marginBottom:16}}>{selected.desc}</p>
          <div style={{padding:16,background:'#F8FAFC',borderRadius:12,border:`1px solid ${C.border}`,marginBottom:16}}>
            <div style={{fontSize:11,color:C.textLight,textTransform:'uppercase',letterSpacing:'0.04em',fontWeight:600,marginBottom:8}}>스펙</div>
            {selected.spec.split('|').map((s,i)=><div key={i} style={{fontSize:13,padding:'4px 0',borderBottom:i<selected.spec.split('|').length-1?`1px solid ${C.border}`:'none'}}>{s.trim()}</div>)}
          </div>
          <div style={{display:'flex',gap:8}}>
            <button style={{flex:1,padding:'10px 0',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>📥 도면 다운로드</button>
            <button style={{flex:1,padding:'10px 0',borderRadius:10,border:`1px solid ${C.border}`,background:'#fff',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>📨 견적 문의</button>
          </div>
        </div>
      ):(<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:C.textLight,fontSize:14}}>좌측에서 제품을 선택하세요</div>)}
    </div>
  </div>);
}

/* ══════ 페이지: 인증서 (마스터-디테일) ══════ */
function CertPage({selected,setSelected,setToast}){
  return(<div key="cert" style={{animation:'fadeIn 300ms ease',display:'flex',overflow:'hidden',height:'calc(100vh - 118px)'}}>
    <div style={{width:'42%',borderRight:`1px solid ${C.border}`,overflowY:'auto'}}>
      {CERTS.map(c=>(
        <div key={c.id} onClick={()=>setSelected(c)} style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',background:selected?.id===c.id?`${C.primary}08`:'transparent',borderLeft:selected?.id===c.id?`3px solid ${C.primary}`:'3px solid transparent',transition:'all 150ms'}}
          onMouseEnter={e=>{if(selected?.id!==c.id)e.currentTarget.style.background=`${C.primary}04`}}
          onMouseLeave={e=>{if(selected?.id!==c.id)e.currentTarget.style.background='transparent'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,fontWeight:selected?.id===c.id?600:400}}>📄 {c.name}</span>
            <Badge text={c.status}/>
          </div>
          <div style={{fontSize:11,color:C.textLight,marginTop:2}}>{c.type} · 만료: {c.expiry}</div>
        </div>
      ))}
    </div>
    <div style={{flex:1,overflowY:'auto',padding:20}}>
      {selected?(
        <div style={{animation:'fadeIn 200ms ease'}}>
          <div style={{height:300,borderRadius:16,background:'#F8FAFC',border:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20}}>
            <div style={{textAlign:'center'}}><span style={{fontSize:56}}>📄</span><div style={{fontSize:14,fontWeight:600,marginTop:8}}>{selected.name}</div><div style={{fontSize:12,color:C.textLight,marginTop:4}}>PDF 미리보기</div></div>
          </div>
          <div style={{display:'flex',gap:6,marginBottom:16}}><Badge text={selected.type}/><Badge text={selected.status}/></div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}}>
            {[{l:'인증명',v:selected.name},{l:'유효기간',v:selected.expiry},{l:'버전',v:selected.version}].map(d=>(
              <div key={d.l} style={{padding:12,background:'#F8FAFC',borderRadius:12,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:10,color:C.textLight,textTransform:'uppercase',letterSpacing:'0.04em',fontWeight:600}}>{d.l}</div>
                <div style={{fontSize:14,fontWeight:600,marginTop:4}}>{d.v}</div>
              </div>
            ))}
          </div>
          <button onClick={()=>setToast('PDF를 다운로드합니다')} style={{width:'100%',padding:'12px 0',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>📥 PDF 다운로드</button>
        </div>
      ):(<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:C.textLight,fontSize:14}}>좌측에서 인증서를 선택하세요</div>)}
    </div>
  </div>);
}

/* ══════ 페이지: 회사 소개 ══════ */
function AboutPage(){
  return(<div key="about" style={{animation:'fadeIn 300ms ease',padding:20}}>
    <div style={{background:C.surface,borderRadius:20,padding:32,boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:`1px solid ${C.border}`,marginBottom:24}}>
      <h3 style={{fontSize:18,fontWeight:700,marginBottom:12}}>비전</h3>
      <p style={{fontSize:14,color:C.textLight,lineHeight:1.8}}>"마이크로미터 단위의 정밀함으로 글로벌 제조업을 지원합니다"<br/>프레시전 파츠 코리아는 CNC 5축 가공과 정밀 열처리 기술로 자동차, 반도체, 의료기기 분야 핵심 부품을 생산합니다.</p>
    </div>
    <div style={{background:C.surface,borderRadius:20,padding:32,boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:`1px solid ${C.border}`}}>
      <h3 style={{fontSize:18,fontWeight:700,marginBottom:20}}>연혁</h3>
      {[{y:'2018',t:'프레시전 파츠 코리아 설립'},{y:'2019',t:'ISO 9001 품질경영 인증 취득'},{y:'2020',t:'CNC 5축 가공 라인 도입'},{y:'2021',t:'IATF 16949 자동차 품질 인증'},{y:'2022',t:'일본 · 독일 수출 개시'},{y:'2023',t:'미국 · 중국 · 동남아 시장 진출'},{y:'2025',t:'글로벌 8개국 납품 달성'}].map((h,i)=>(
        <div key={h.y} style={{display:'flex',gap:16,marginBottom:16,animation:`slideUp 400ms ease ${i*80}ms both`}}>
          <div style={{fontSize:14,fontWeight:700,color:C.primary,minWidth:50}}>{h.y}</div>
          <div style={{fontSize:13,color:C.textLight}}>{h.t}</div>
        </div>
      ))}
    </div>
  </div>);
}

/* ══════ 페이지: 관리자 ══════ */
function AdminPage({selected,setSelected,setToast}){
  const[addModal,setAddModal]=useState(false);
  return(<div key="admin" style={{animation:'fadeIn 300ms ease',display:'flex',overflow:'hidden',height:'calc(100vh - 118px)'}}>
    <div style={{width:'42%',borderRight:`1px solid ${C.border}`,overflowY:'auto'}}>
      <div style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:C.textLight}}>제품 {PRODUCTS.length}개</span>
        <button onClick={()=>setAddModal(true)} style={{padding:'5px 12px',borderRadius:6,border:'none',background:C.primary,color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>+ 등록</button>
      </div>
      {PRODUCTS.map(p=>(
        <div key={p.id} onClick={()=>setSelected(p)} style={{padding:'10px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',background:selected?.id===p.id?`${C.primary}08`:'transparent',borderLeft:selected?.id===p.id?`3px solid ${C.primary}`:'3px solid transparent',transition:'all 150ms'}}
          onMouseEnter={e=>{if(selected?.id!==p.id)e.currentTarget.style.background=`${C.primary}04`}}
          onMouseLeave={e=>{if(selected?.id!==p.id)e.currentTarget.style.background='transparent'}}>
          <div style={{fontSize:13,fontWeight:selected?.id===p.id?600:400}}>{p.image} {p.name}</div>
          <div style={{fontSize:11,color:C.textLight,marginTop:2}}>{p.category} · {p.cert}</div>
        </div>
      ))}
      <div style={{padding:'16px',borderTop:`2px solid ${C.border}`}}>
        <div style={{fontSize:13,fontWeight:700,color:C.textLight,marginBottom:12}}>최근 문의</div>
        {INQUIRIES.map(q=>(
          <div key={q.id} onClick={()=>setToast(`${q.company} 문의 상세`)} style={{padding:'8px 0',borderBottom:`1px solid ${C.border}`,cursor:'pointer',fontSize:12}}>
            <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontWeight:500}}>{q.company}</span><Badge text={q.status}/></div>
            <div style={{color:C.textLight,marginTop:2}}>{q.product} · {q.date}</div>
          </div>
        ))}
      </div>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:20}}>
      {selected?(
        <div style={{animation:'fadeIn 200ms ease'}}>
          <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>{selected.name}</h2>
          <div style={{display:'flex',gap:6,marginBottom:16}}><Badge text={selected.category}/><Badge text={selected.cert}/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
            <div><label style={{fontSize:12,color:C.textLight,marginBottom:4,display:'block'}}>제품명 (한국어)</label><input defaultValue={selected.name} style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none'}}/></div>
            <div><label style={{fontSize:12,color:C.textLight,marginBottom:4,display:'block'}}>Product Name (English)</label><input defaultValue={selected.lang.en} style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none'}}/></div>
          </div>
          <div style={{marginBottom:16}}><label style={{fontSize:12,color:C.textLight,marginBottom:4,display:'block'}}>설명</label><textarea rows={3} defaultValue={selected.desc} style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',resize:'vertical',outline:'none'}}/></div>
          <div style={{marginBottom:16}}><label style={{fontSize:12,color:C.textLight,marginBottom:4,display:'block'}}>스펙</label><input defaultValue={selected.spec} style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none'}}/></div>
          <div style={{border:`2px dashed ${C.border}`,borderRadius:16,padding:24,textAlign:'center',marginBottom:16}}>
            <div style={{fontSize:24,marginBottom:4}}>📦</div>
            <div style={{fontSize:13,fontWeight:600}}>3D 모델 파일 (.glb) 업로드</div>
            <div style={{fontSize:11,color:C.textLight}}>드래그 앤 드롭 또는 클릭</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setToast('저장되었습니다')} style={{flex:1,padding:'10px 0',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>저장</button>
            <button onClick={()=>setToast('삭제되었습니다')} style={{padding:'10px 20px',borderRadius:10,border:`1px solid ${C.border}`,background:'#fff',color:C.textLight,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>삭제</button>
          </div>
        </div>
      ):(<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:C.textLight,fontSize:14}}>좌측에서 항목을 선택하세요</div>)}
    </div>
    {addModal&&<Modal title="새 제품 등록" onClose={()=>setAddModal(false)}><div style={{display:'flex',flexDirection:'column',gap:14}}><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}><div><label style={{fontSize:12,fontWeight:600,marginBottom:4,display:'block'}}>제품명 (KO)</label><input style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none'}}/></div><div><label style={{fontSize:12,fontWeight:600,marginBottom:4,display:'block'}}>Product Name (EN)</label><input style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none'}}/></div></div><div><label style={{fontSize:12,fontWeight:600,marginBottom:4,display:'block'}}>카테고리</label><select style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit'}}><option>기어</option><option>베어링</option><option>샤프트</option><option>하우징</option></select></div><div><label style={{fontSize:12,fontWeight:600,marginBottom:4,display:'block'}}>스펙</label><textarea rows={3} style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',resize:'vertical',outline:'none'}}/></div><div style={{display:'flex',gap:8,justifyContent:'flex-end'}}><button onClick={()=>setAddModal(false)} style={{padding:'10px 20px',borderRadius:10,border:`1px solid ${C.border}`,background:'#fff',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>취소</button><button onClick={()=>{setAddModal(false);setToast('등록되었습니다')}} style={{padding:'10px 20px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>등록</button></div></div></Modal>}
  </div>);
}

function App(){
  const[section,setSection]=useState('home');
  const[tab,setTab]=useState(0);
  const[selected,setSelected]=useState(null);
  const[toast,setToast]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);
  useEffect(()=>{setTab(0);setSelected(null)},[section]);
  if(loading)return(<div style={{display:'flex',minHeight:'100vh'}}><div style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`}}/><div style={{flex:1,padding:20,display:'flex',flexDirection:'column',gap:16}}>{[...Array(4)].map((_,i)=><div key={i} style={{height:100,borderRadius:20,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}</div></div>);
  return(<div style={{display:'flex',minHeight:'100vh',background:C.bg}}><SideNav section={section} setSection={setSection}/><div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}><AppBar section={section}/><TabStrip section={section} tab={tab} setTab={setTab}/>{section==='home'&&<HomePage/>}{section==='product-3d-viewer'&&<ProductPage selected={selected} setSelected={setSelected}/>}{section==='cert-library'&&<CertPage selected={selected} setSelected={setSelected} setToast={setToast}/>}{section==='about'&&<AboutPage/>}{section==='admin-platform'&&<AdminPage selected={selected} setSelected={setSelected} setToast={setToast}/>}</div>{toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}</div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
