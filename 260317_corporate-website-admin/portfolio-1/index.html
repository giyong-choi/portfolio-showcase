<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>케미텍 — 소재 기업 공식 홈페이지 & 어드민</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#F8FAFC;color:#0F172A}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const {BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,AreaChart,Area}=Recharts;

const C={primary:'#334155',secondary:'#0F172A',accent:'#06B6D4',bg:'#F8FAFC',surface:'#FFF',border:'#E2E8F0',text:'#0F172A',textLight:'#64748B',success:'#059669',warning:'#D97706',danger:'#EF4444'};

/* ── 더미 데이터 ── */
const PRODUCTS=[
  {id:1,name:'CT-200 고분자 코팅제',category:'코팅제',desc:'내열성 및 내화학성이 우수한 산업용 고분자 코팅 소재',price:'별도문의',spec:'내열온도: 350℃ | 경도: 9H | 부착력: 5B',status:'판매중',image:'📦'},
  {id:2,name:'CT-350 방수 실란트',category:'실란트',desc:'건축 외장재 전용 고탄성 방수 실란트',price:'별도문의',spec:'신축률: 400% | 내후성: 20년 | UV 저항',status:'판매중',image:'🧴'},
  {id:3,name:'CT-500 에폭시 접착제',category:'접착제',desc:'금속-플라스틱 이종 소재 접합용 구조용 에폭시',price:'별도문의',spec:'인장강도: 25MPa | 경화시간: 24h | 내유성',status:'판매중',image:'🔗'},
  {id:4,name:'CT-120 프라이머',category:'프라이머',desc:'다양한 소재 표면 전처리용 범용 프라이머',price:'별도문의',spec:'건조시간: 30분 | 적용면: 금속/플라스틱/유리',status:'신제품',image:'🎨'},
  {id:5,name:'CT-700 내열 그리스',category:'윤활제',desc:'고온 환경 베어링 전용 불소계 그리스',price:'별도문의',spec:'사용온도: -40~280℃ | 점도: NLGI 2',status:'판매중',image:'⚙️'},
  {id:6,name:'CT-900 전자 세정제',category:'세정제',desc:'PCB 및 전자부품 잔류물 제거용 정밀 세정제',price:'별도문의',spec:'건조시간: 15초 | 잔류물: 0% | 비인화성',status:'판매중',image:'💧'},
];
const CATEGORIES=['전체','코팅제','실란트','접착제','프라이머','윤활제','세정제'];
const INQUIRIES=[
  {id:1,company:'(주)삼성전자',name:'김민수',email:'minsu@samsung.com',product:'CT-200 고분자 코팅제',content:'대량 구매 관련 견적 요청드립니다.',date:'2025.03.15',status:'미확인'},
  {id:2,company:'현대자동차',name:'이지은',email:'jieun@hyundai.com',product:'CT-500 에폭시 접착제',content:'자동차 부품 접합 테스트 샘플 요청',date:'2025.03.14',status:'확인'},
  {id:3,company:'LG화학',name:'박서진',email:'seojin@lgchem.com',product:'CT-350 방수 실란트',content:'건축 현장 적용 관련 기술 문의',date:'2025.03.13',status:'답변완료'},
  {id:4,company:'SK이노베이션',name:'정하윤',email:'hayoon@sk.com',product:'CT-700 내열 그리스',content:'고온 공정용 윤활제 사양 문의',date:'2025.03.12',status:'미확인'},
];
const NEWS=[
  {id:1,title:'CT-200 코팅제, 한국산업기술시험원 인증 획득',date:'2025.03.10',category:'인증'},
  {id:2,title:'2025 국제 화학소재 박람회 참가 안내',date:'2025.03.05',category:'행사'},
  {id:3,title:'케미텍, 자동차 부품사 납품 계약 체결',date:'2025.02.28',category:'뉴스'},
  {id:4,title:'신제품 CT-120 프라이머 출시 안내',date:'2025.02.20',category:'제품'},
];
const HISTORY=[{year:'2020',text:'케미텍 코리아 설립'},{year:'2021',text:'ISO 9001 품질경영 인증 취득'},{year:'2022',text:'CT-200 시리즈 개발 및 출시'},{year:'2023',text:'자동차 부품사 3사 납품 개시'},{year:'2024',text:'연 매출 50억 달성'},{year:'2025',text:'신규 R&D 센터 준공'}];
const MONTHLY=[{m:'10월',문의:12,제품:3},{m:'11월',문의:18,제품:4},{m:'12월',문의:15,제품:2},{m:'1월',문의:22,제품:5},{m:'2월',문의:19,제품:3},{m:'3월',문의:26,제품:6}];

/* ── 유틸 ── */
function Badge({text}){
  const c={'판매중':{bg:'#ECFDF5',t:'#059669'},'신제품':{bg:'#EFF6FF',t:'#3B82F6'},'미확인':{bg:'#FEF3C7',t:'#D97706'},'확인':{bg:'#EFF6FF',t:'#3B82F6'},'답변완료':{bg:'#ECFDF5',t:'#059669'},'인증':{bg:'#FAF5FF',t:'#7C3AED'},'행사':{bg:'#FEF3C7',t:'#D97706'},'뉴스':{bg:'#EFF6FF',t:'#3B82F6'},'제품':{bg:'#ECFDF5',t:'#059669'}}[text]||{bg:'#F3F4F6',t:'#6B7280'};
  return <span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:c.bg,color:c.t}}>{text}</span>;
}
function CountUp({end,suffix=''}){const[v,setV]=useState(0);useEffect(()=>{let s=0;const step=end/75;const t=setInterval(()=>{s+=step;if(s>=end){setV(end);clearInterval(t)}else setV(Math.floor(s))},16);return()=>clearInterval(t)},[end]);return <span>{v.toLocaleString()}{suffix}</span>;}
function Toast({msg,onClose}){useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,.2)',fontSize:14}}>{msg}</div>;}
function Modal({title,onClose,children,width=560}){return(<div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}><div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.4)',animation:'fadeIn 200ms ease'}}/><div style={{position:'relative',width,maxHeight:'85vh',background:'#fff',borderRadius:12,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,.15)'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}><h3 style={{fontSize:18,fontWeight:700}}>{title}</h3><button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button></div><div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div></div></div>);}

/* ── NAV ── */
const NAV=[{id:'home',icon:'🏠',label:'홈'},{id:'product-catalog',icon:'📦',label:'제품 소개'},{id:'about',icon:'🏢',label:'회사 소개'},{id:'inquiry-form',icon:'📨',label:'고객 문의'},{id:'admin-dashboard',icon:'⚙️',label:'관리자'}];

function Sidebar({page,setPage}){
  return(
    <aside style={{width:260,background:C.secondary,display:'flex',flexDirection:'column',flexShrink:0,padding:'20px 0'}}>
      <div style={{padding:'0 20px 24px',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:16}}>C</div>
        <div><div style={{color:'#fff',fontWeight:700,fontSize:16}}>CHEMITECH</div><div style={{color:'rgba(255,255,255,.5)',fontSize:11}}>Advanced Materials</div></div>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',gap:2,padding:'0 12px'}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setPage(n.id)} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'10px 14px',borderRadius:8,border:'none',cursor:'pointer',background:page===n.id?'rgba(255,255,255,.12)':'transparent',color:page===n.id?'#fff':'rgba(255,255,255,.6)',fontSize:14,fontWeight:page===n.id?600:400,transition:'all 150ms',fontFamily:'inherit',textAlign:'left'}}>
            <span style={{fontSize:18}}>{n.icon}</span>{n.label}
          </button>
        ))}
      </div>
    </aside>
  );
}

function TopBar({title}){
  return <header style={{height:60,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 28px',background:C.surface,flexShrink:0}}><h1 style={{fontSize:20,fontWeight:700,letterSpacing:'-0.02em'}}>{title}</h1><div style={{flex:1}}/><div style={{display:'flex',alignItems:'center',gap:12}}><input placeholder="검색..." style={{width:200,padding:'8px 14px 8px 36px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',outline:'none',background:'#F8FAFC'}}/></div></header>;
}

/* ══════ 페이지: 홈 ══════ */
function HomePage(){
  return(
    <div key="home" style={{animation:'fadeIn 300ms ease'}}>
      {/* 히어로 */}
      <div style={{background:`linear-gradient(135deg,${C.secondary},${C.primary})`,borderRadius:12,padding:'48px 40px',color:'#fff',marginBottom:28,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,right:0,width:300,height:300,borderRadius:'50%',background:`${C.accent}15`,transform:'translate(30%,-30%)'}}/>
        <div style={{position:'relative',zIndex:1}}>
          <div style={{fontSize:13,color:C.accent,fontWeight:600,marginBottom:8}}>CHEMITECH KOREA</div>
          <h2 style={{fontSize:32,fontWeight:800,lineHeight:1.3,marginBottom:12}}>차세대 산업 소재의<br/>글로벌 파트너</h2>
          <p style={{fontSize:15,opacity:.8,maxWidth:500,lineHeight:1.6}}>코팅, 접착, 실링 분야 25년 기술력으로 제조업의 핵심 공정을 지원합니다</p>
        </div>
      </div>
      {/* KPI */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:20,marginBottom:28}}>
        {[{icon:'📦',label:'등록 제품',value:48,suffix:'종'},{icon:'🏭',label:'납품 기업',value:120,suffix:'사'},{icon:'🔬',label:'특허 보유',value:15,suffix:'건'},{icon:'🌍',label:'수출 국가',value:8,suffix:'개국'}].map((k,i)=>(
          <div key={k.label} style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,.08)',animation:`slideUp 400ms ease ${i*80}ms both`}}>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <div><div style={{fontSize:12,color:C.textLight,marginBottom:8}}>{k.label}</div><div style={{fontSize:28,fontWeight:700}}><CountUp end={k.value} suffix={k.suffix}/></div></div>
              <div style={{width:44,height:44,borderRadius:12,background:`${C.accent}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{k.icon}</div>
            </div>
          </div>
        ))}
      </div>
      {/* 주요 제품 */}
      <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,.08)',padding:24,marginBottom:28}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>주요 제품</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
          {PRODUCTS.slice(0,3).map((p,i)=>(
            <div key={p.id} style={{padding:20,borderRadius:8,border:`1px solid ${C.border}`,animation:`slideUp 400ms ease ${i*80}ms both`,cursor:'default',transition:'all 200ms'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,.08)'}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.boxShadow='none'}}>
              <div style={{fontSize:32,marginBottom:12}}>{p.image}</div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}><span style={{fontSize:14,fontWeight:700}}>{p.name}</span><Badge text={p.status}/></div>
              <div style={{fontSize:12,color:C.textLight,lineHeight:1.5}}>{p.desc}</div>
            </div>
          ))}
        </div>
      </div>
      {/* 최근 뉴스 */}
      <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,.08)',overflow:'hidden'}}>
        <div style={{padding:'16px 24px',borderBottom:`1px solid ${C.border}`}}><h3 style={{fontSize:16,fontWeight:700}}>최근 뉴스</h3></div>
        {NEWS.map(n=>(
          <div key={n.id} style={{padding:'14px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',transition:'background 150ms'}} onMouseEnter={e=>e.currentTarget.style.background=`${C.accent}06`} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div style={{display:'flex',alignItems:'center',gap:10}}><Badge text={n.category}/><span style={{fontSize:14}}>{n.title}</span></div>
            <span style={{fontSize:12,color:C.textLight}}>{n.date}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════ 페이지: 제품 소개 ══════ */
function ProductPage({setToast}){
  const[cat,setCat]=useState('전체');
  const[detail,setDetail]=useState(null);
  const filtered=cat==='전체'?PRODUCTS:PRODUCTS.filter(p=>p.category===cat);
  return(
    <div key="product" style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
        {CATEGORIES.map(c=><button key={c} onClick={()=>setCat(c)} style={{padding:'6px 14px',borderRadius:20,border:cat===c?'none':`1px solid ${C.border}`,background:cat===c?C.primary:'#fff',color:cat===c?'#fff':C.textLight,fontSize:13,fontWeight:cat===c?600:400,cursor:'pointer',fontFamily:'inherit',transition:'all 150ms'}}>{c}</button>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20}}>
        {filtered.map((p,i)=>(
          <div key={p.id} onClick={()=>setDetail(p)} style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,.08)',overflow:'hidden',cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}}
            onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,.12)'}}
            onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 1px 3px rgba(0,0,0,.08)'}}>
            <div style={{height:140,background:`linear-gradient(135deg,${C.primary}15,${C.accent}15)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:48}}>{p.image}</div>
            <div style={{padding:16}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><Badge text={p.category}/><Badge text={p.status}/></div>
              <h4 style={{fontSize:15,fontWeight:700,marginBottom:4}}>{p.name}</h4>
              <p style={{fontSize:12,color:C.textLight,lineHeight:1.5}}>{p.desc}</p>
            </div>
          </div>
        ))}
      </div>
      {detail&&(
        <Modal title={detail.name} onClose={()=>setDetail(null)} width={520}>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div style={{height:180,borderRadius:8,background:`linear-gradient(135deg,${C.primary}15,${C.accent}15)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:64}}>{detail.image}</div>
            <div style={{display:'flex',gap:6}}><Badge text={detail.category}/><Badge text={detail.status}/></div>
            <p style={{fontSize:14,color:C.textLight,lineHeight:1.6}}>{detail.desc}</p>
            <div style={{padding:14,background:'#F8FAFC',borderRadius:8}}><div style={{fontSize:12,color:C.textLight,marginBottom:4}}>스펙</div><div style={{fontSize:13,fontWeight:500}}>{detail.spec}</div></div>
            <button onClick={()=>{setDetail(null);setToast('문의 페이지로 이동합니다')}} style={{padding:'12px 0',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>📨 제품 문의</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ══════ 페이지: 회사 소개 ══════ */
function AboutPage(){
  return(
    <div key="about" style={{animation:'fadeIn 300ms ease'}}>
      <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,.08)',padding:32,marginBottom:24}}>
        <h3 style={{fontSize:18,fontWeight:700,marginBottom:16}}>비전</h3>
        <p style={{fontSize:14,color:C.textLight,lineHeight:1.8}}>"차세대 산업 소재로 제조업의 미래를 선도합니다"<br/>케미텍 코리아는 코팅, 접착, 실링 분야에서 25년간 축적한 기술력을 바탕으로 고객사의 핵심 공정에 최적화된 소재 솔루션을 제공합니다. R&D 중심의 혁신으로 글로벌 시장을 선도하는 것이 우리의 목표입니다.</p>
      </div>
      <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,.08)',padding:32,marginBottom:24}}>
        <h3 style={{fontSize:18,fontWeight:700,marginBottom:20}}>연혁</h3>
        <div style={{position:'relative',paddingLeft:24}}>
          <div style={{position:'absolute',left:8,top:0,bottom:0,width:2,background:C.border}}/>
          {HISTORY.map((h,i)=>(
            <div key={h.year} style={{display:'flex',gap:16,marginBottom:20,position:'relative',animation:`slideUp 400ms ease ${i*100}ms both`}}>
              <div style={{width:16,height:16,borderRadius:'50%',background:C.accent,border:'3px solid #fff',boxShadow:`0 0 0 2px ${C.accent}`,position:'absolute',left:-4,top:2,zIndex:1}}/>
              <div style={{paddingLeft:24}}>
                <div style={{fontSize:14,fontWeight:700,color:C.accent}}>{h.year}</div>
                <div style={{fontSize:13,color:C.textLight,marginTop:2}}>{h.text}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,.08)',padding:32}}>
        <h3 style={{fontSize:18,fontWeight:700,marginBottom:16}}>오시는 길</h3>

/* ══════ 페이지: 관리자 ══════ */
function AdminPage({setToast}){
  const[tab,setTab]=useState('products');
  const[modal,setModal]=useState(null);
  const[addModal,setAddModal]=useState(false);
  return(
    <div key="admin" style={{animation:'fadeIn 300ms ease'}}>
      {/* 차트 */}
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20,marginBottom:24}}>
        <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,.08)'}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>월별 문의·신제품 추이</h3>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={MONTHLY}><CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/><XAxis dataKey="m" tick={{fontSize:12}} stroke="#94A3B8"/><YAxis tick={{fontSize:12}} stroke="#94A3B8"/><Tooltip contentStyle={{borderRadius:8,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,.1)'}}/><Bar dataKey="문의" fill={C.accent} radius={[4,4,0,0]}/><Bar dataKey="제품" fill={C.primary} radius={[4,4,0,0]}/></BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,.08)'}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>카테고리별 분포</h3>
          <ResponsiveContainer width="100%" height={220}>
            <PieChart><Pie data={CATEGORIES.slice(1).map((c,i)=>({name:c,value:[35,25,20,10,5,5][i]}))} dataKey="value" cx="50%" cy="50%" outerRadius={75} innerRadius={45}>{CATEGORIES.slice(1).map((c,i)=><Cell key={c} fill={[C.primary,C.accent,'#0891B2','#164E63','#A7F3D0','#CBD5E1'][i]}/>)}</Pie><Tooltip/></PieChart>
          </ResponsiveContainer>
        </div>
      </div>
      {/* 탭 */}
      <div style={{display:'flex',gap:4,marginBottom:16}}>
        {[{id:'products',label:'제품 관리'},{id:'news',label:'뉴스/공지'},{id:'inquiries',label:'문의 관리'}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'8px 16px',borderRadius:8,border:'none',background:tab===t.id?C.primary:'transparent',color:tab===t.id?'#fff':C.textLight,fontSize:13,fontWeight:tab===t.id?600:400,cursor:'pointer',fontFamily:'inherit'}}>{t.label}</button>
        ))}
        <div style={{flex:1}}/>
        <button onClick={()=>setAddModal(true)} style={{padding:'8px 16px',borderRadius:8,border:'none',background:C.accent,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>+ 새 항목</button>
      </div>
      {/* 테이블 */}
      <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,.08)',overflow:'hidden'}}>
        {tab==='products'&&(
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>{['제품명','카테고리','상태','스펙'].map(h=><th key={h} style={{padding:'12px 16px',textAlign:'left',fontSize:12,fontWeight:600,color:C.textLight,background:'#F8FAFC'}}>{h}</th>)}</tr></thead>
            <tbody>{PRODUCTS.map(p=>(
              <tr key={p.id} onClick={()=>setModal(p)} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background 150ms'}} onMouseEnter={e=>e.currentTarget.style.background=`${C.accent}06`} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'14px 16px',fontSize:14,fontWeight:500}}><span style={{marginRight:8}}>{p.image}</span>{p.name}</td>
                <td style={{padding:'14px 16px'}}><Badge text={p.category}/></td>
                <td style={{padding:'14px 16px'}}><Badge text={p.status}/></td>
                <td style={{padding:'14px 16px',fontSize:12,color:C.textLight}}>{p.spec}</td>
              </tr>
            ))}</tbody>
          </table>
        )}
        {tab==='news'&&NEWS.map(n=>(
          <div key={n.id} onClick={()=>setToast(`"${n.title}" 편집 모드`)} style={{padding:'14px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',transition:'background 150ms'}} onMouseEnter={e=>e.currentTarget.style.background=`${C.accent}06`} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div style={{display:'flex',alignItems:'center',gap:10}}><Badge text={n.category}/><span style={{fontSize:14}}>{n.title}</span></div>
            <span style={{fontSize:12,color:C.textLight}}>{n.date}</span>
          </div>
        ))}
        {tab==='inquiries'&&(
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>{['회사명','담당자','제품','상태','접수일'].map(h=><th key={h} style={{padding:'12px 16px',textAlign:'left',fontSize:12,fontWeight:600,color:C.textLight,background:'#F8FAFC'}}>{h}</th>)}</tr></thead>
            <tbody>{INQUIRIES.map(q=>(
              <tr key={q.id} onClick={()=>setModal(q)} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background 150ms'}} onMouseEnter={e=>e.currentTarget.style.background=`${C.accent}06`} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'14px 16px',fontSize:14,fontWeight:500}}>{q.company}</td>
                <td style={{padding:'14px 16px',fontSize:13}}>{q.name}</td>
                <td style={{padding:'14px 16px',fontSize:13,color:C.textLight}}>{q.product}</td>
                <td style={{padding:'14px 16px'}}><Badge text={q.status}/></td>
                <td style={{padding:'14px 16px',fontSize:12,color:C.textLight}}>{q.date}</td>
              </tr>

          </table>

      {/* 상세 모달 */}
      {modal&&(
        <Modal title={modal.name||modal.company} onClose={()=>setModal(null)}>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {modal.name&&modal.spec&&<>
              <div style={{height:140,borderRadius:8,background:`linear-gradient(135deg,${C.primary}15,${C.accent}15)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:56}}>{modal.image}</div>
              <div style={{display:'flex',gap:6}}><Badge text={modal.category}/><Badge text={modal.status}/></div>
              <p style={{fontSize:13,color:C.textLight}}>{modal.desc}</p>
              <div style={{padding:12,background:'#F8FAFC',borderRadius:8}}><div style={{fontSize:11,color:C.textLight}}>스펙</div><div style={{fontSize:13,fontWeight:500,marginTop:2}}>{modal.spec}</div></div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>{setModal(null);setToast('제품이 수정되었습니다')}} style={{flex:1,padding:'10px 0',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>수정</button>
                <button onClick={()=>{setModal(null);setToast('제품이 삭제되었습니다')}} style={{padding:'10px 20px',borderRadius:8,border:`1px solid ${C.danger}`,background:'#fff',color:C.danger,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>삭제</button>
              </div>
            </>}
            {modal.email&&<>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                {[{l:'회사',v:modal.company},{l:'담당자',v:modal.name},{l:'이메일',v:modal.email},{l:'제품',v:modal.product},{l:'접수일',v:modal.date},{l:'상태',v:modal.status}].map(d=><div key={d.l}><div style={{fontSize:11,color:C.textLight}}>{d.l}</div><div style={{fontSize:13,fontWeight:500,marginTop:2}}>{d.v}</div></div>)}
              </div>
              <div><div style={{fontSize:11,color:C.textLight,marginBottom:4}}>문의 내용</div><div style={{fontSize:13,padding:12,background:'#F8FAFC',borderRadius:8}}>{modal.content}</div></div>
              <div><label style={{fontSize:12,color:C.textLight,marginBottom:4,display:'block'}}>답변</label><textarea rows={3} style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',resize:'vertical',outline:'none'}} placeholder="답변을 입력하세요"/></div>
              <button onClick={()=>{setModal(null);setToast('답변이 발송되었습니다')}} style={{padding:'10px 0',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>답변 발송</button>
            </>}
          </div>
        </Modal>
      )}
      {addModal&&(
        <Modal title={tab==='products'?'새 제품 등록':tab==='news'?'새 뉴스 작성':'새 문의 등록'} onClose={()=>setAddModal(false)}>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div><label style={{fontSize:13,fontWeight:600,marginBottom:4,display:'block'}}>{tab==='products'?'제품명':tab==='news'?'제목':'회사명'}</label><input style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none'}}/></div>
            {tab==='products'&&<div><label style={{fontSize:13,fontWeight:600,marginBottom:4,display:'block'}}>카테고리</label><select style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit'}}>{CATEGORIES.slice(1).map(c=><option key={c}>{c}</option>)}</select></div>}
            <div><label style={{fontSize:13,fontWeight:600,marginBottom:4,display:'block'}}>{tab==='news'?'본문':'설명'}</label><textarea rows={4} style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',resize:'vertical',outline:'none'}}/></div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button onClick={()=>setAddModal(false)} style={{padding:'10px 20px',borderRadius:8,border:`1px solid ${C.border}`,background:'#fff',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>취소</button>
              <button onClick={()=>{setAddModal(false);setToast('등록되었습니다')}} style={{padding:'10px 20px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>등록</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ══════ App ══════ */
function App(){
  const[page,setPage]=useState('home');
  const[toast,setToast]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);
  if(loading)return(<div style={{display:'flex',minHeight:'100vh'}}><aside style={{width:260,background:C.secondary}}/><div style={{flex:1,padding:24,display:'flex',flexDirection:'column',gap:16}}>{[...Array(4)].map((_,i)=><div key={i} style={{height:120,borderRadius:12,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}</div></div>);
  const titles={home:'홈','product-catalog':'제품 소개',about:'회사 소개','inquiry-form':'고객 문의','admin-dashboard':'관리자'};
  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar page={page} setPage={setPage}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar title={titles[page]}/>
        <main style={{flex:1,overflow:'auto',padding:24}}>
          {page==='home'&&<HomePage/>}
          {page==='product-catalog'&&<ProductPage setToast={setToast}/>}
          {page==='about'&&<AboutPage/>}
          {page==='inquiry-form'&&<InquiryFormPage setToast={setToast}/>}
          {page==='admin-dashboard'&&<AdminPage setToast={setToast}/>}
        </main>
      </div>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
