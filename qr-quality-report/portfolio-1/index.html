// CountUp
function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

// Toast
function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.sidebarBg,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;

                <div key={item.id} onClick={()=>onDetail(item)} style={{...CARD,padding:14,background:C.surface,cursor:'pointer',transition:'all 200ms',borderLeft:`3px solid ${colColors[ci]}`}}

        </div>
        <div>
          <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>관리자 메모</div>
          <textarea rows={2} style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',resize:'vertical'}} placeholder="관리자 코멘트를 입력하세요"/>
        </div>
        <div style={{display:'flex',gap:12,justifyContent:'flex-end'}}>
          {item.status==='접수'&&<button onClick={()=>{setToast('검토를 시작합니다.');setTimeout(onClose,1500)}} style={{padding:'8px 20px',borderRadius:8,border:'none',background:C.warning,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>검토 시작</button>}
          {item.status==='검토중'&&<>
            <button onClick={()=>{setToast('반려 처리되었습니다.');setTimeout(onClose,1500)}} style={{padding:'8px 20px',borderRadius:8,border:`1px solid ${C.danger}`,background:'#fff',color:C.danger,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>반려</button>
            <button onClick={()=>{setToast('포상이 확정되었습니다.');setTimeout(onClose,1500)}} style={{padding:'8px 20px',borderRadius:8,border:'none',background:C.success,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>포상 확정</button>
          </>}
        </div>
      </div>
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </Modal>
  );
}

// App
function App(){
  const[page,setPage]=useState('dashboard');
  const[loading,setLoading]=useState(true);
  const[detail,setDetail]=useState(null);
  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  if(loading)return <div style={{display:'flex',minHeight:'100vh'}}><div style={{width:260,background:C.sidebarBg}}/><div style={{flex:1}}><Skeleton/></div></div>;

  const titles={dashboard:'통합 대시보드',report:'불량 신고',workflow:'처리 관리',accounts:'계정 관리',export:'엑셀/리포트'};

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar page={page} onNav={setPage}/>
      <div style={{flex:1,display:'flex',flexDirection:'column'}}>
        <TopBar title={titles[page]}/>
        <main style={{flex:1,overflow:'auto',padding:24}}>
          <AnimatedContent page={page}>
            {page==='dashboard'&&<DashboardPage onDetail={setDetail}/>}
            {page==='report'&&<ReportPage onDetail={setDetail}/>}
            {page==='workflow'&&<WorkflowPage onDetail={setDetail}/>}
            {page==='accounts'&&<AccountsPage/>}
            {page==='export'&&<ExportPage/>}
          </AnimatedContent>
        </main>
      </div>
      {detail&&<DetailModal item={detail} onClose={()=>setDetail(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
