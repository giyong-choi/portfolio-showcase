function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Modal({title,onClose,children,width=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)',animation:'fadeIn 200ms ease'}}/>

          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

// Drawer (topnav-hero pattern)
function Drawer({item,onClose}){
  const[toast,setToast]=useState(null);

  const steps=['접수','조사중','시정조치','완료'];

    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:200,animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:500,background:C.surface,boxShadow:'-8px 0 40px rgba(0,0,0,0.15)',zIndex:201,overflowY:'auto',padding:28,animation:'slideInRight 200ms ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
          <div>
            <div style={{fontSize:13,color:C.textLight,marginBottom:4}}>{item.id}</div>
            <h2 style={{fontSize:20,fontWeight:700}}>{item.type}</h2>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:20}}>
          <Badge text={item.severity} colors={SEVERITY_COLORS[item.severity]}/>
          <Badge text={item.status} colors={STATUS_COLORS[item.status]}/>
        </div>
        <div style={{display:'flex',gap:4,marginBottom:24}}>
          {steps.map((s,i)=>(
            <div key={s} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <div style={{height:4,width:'100%',borderRadius:2,background:i<=currentStep?C.primary:'#E2E8F0'}}/>
              <span style={{fontSize:10,color:i<=currentStep?C.primary:C.textLight,fontWeight:i<=currentStep?600:400}}>{s}</span>
            </div>
          ))}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:24}}>
          {[['현장',item.site],['위치',item.location],['신고자',item.reporter],['일자',item.date]].map(([l,v])=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'10px 14px',borderRadius:12,background:'#FFF5F5'}}>
              <span style={{fontSize:13,color:C.textLight}}>{l}</span>
              <span style={{fontSize:13,fontWeight:600}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{marginBottom:24}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>상세 내용</div>
          <div style={{padding:14,borderRadius:12,background:'#FFF5F5',fontSize:14,lineHeight:1.7}}>{item.desc}</div>
        </div>
        <div style={{marginBottom:24}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>첨부 사진 ({item.images}장)</div>
          <div style={{display:'flex',gap:8}}>
            {[...Array(item.images)].map((_,i)=>(
              <div key={i} style={{width:90,height:70,borderRadius:12,background:'#FECDD3',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>📷</div>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>관리자 코멘트</div>
          <textarea rows={2} style={{width:'100%',padding:'10px 12px',borderRadius:12,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',resize:'vertical'}} placeholder="코멘트 입력"/>
        </div>
        <div style={{display:'flex',gap:10}}>
          {item.status==='접수'&&<button onClick={()=>setToast('조사를 시작합니다.')} style={{flex:1,padding:'10px',borderRadius:12,border:'none',background:C.accent,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>조사 시작</button>}

// Home Dashboard
function HomePage({onSelect}){
  const siteCards=SITES.slice(0,4).map((s,i)=>{
    const count=INCIDENTS.filter(inc=>inc.site===s).length;
    const urgent=INCIDENTS.filter(inc=>inc.site===s&&inc.severity==='긴급').length;
    return{name:s,total:count,urgent,rate:Math.floor(70+Math.random()*25)};
  });
  return(
    <div style={{display:'flex',flexDirection:'column',gap:24}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
        {siteCards.map((s,i)=>(
          <div key={i} style={{...CARD,background:C.surface,cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}}
            onClick={()=>onSelect(INCIDENTS.find(inc=>inc.site===s.name))}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.15)'}}
            onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow=CARD.boxShadow}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>{s.name}</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
              <div>
                <div style={{fontSize:24,fontWeight:800,color:C.primary}}>{s.total}</div>
                <div style={{fontSize:11,color:C.textLight}}>총 신고 건수</div>
              </div>
              {s.urgent>0&&<div style={{padding:'4px 10px',borderRadius:20,background:'#FEE2E2',color:C.danger,fontSize:11,fontWeight:700,animation:'pulse 2s infinite'}}>긴급 {s.urgent}</div>}
            </div>
            <div style={{marginTop:12,height:6,borderRadius:3,background:'#FEE2E2'}}>
              <div style={{height:'100%',borderRadius:3,background:`linear-gradient(90deg,${C.primary},${C.accent})`,width:`${s.rate}%`,transition:'width 1s ease'}}/>
            </div>
            <div style={{fontSize:11,color:C.textLight,marginTop:4}}>처리율 {s.rate}%</div>
          </div>
        ))}
      </div>
      <div style={{...CARD,background:C.surface}}>
        <div style={{...TYPO.sectionTitle,marginBottom:16,color:C.textLight}}>월별 위험도 추이</div>
        <ResponsiveContainer width="100%" height={280}>
          <BarChart data={MONTHLY_DATA} barGap={2}>
            <CartesianGrid strokeDasharray="3 3" stroke="#FEE2E2"/>
            <XAxis dataKey="month" fontSize={12} stroke="#94A3B8"/>
            <YAxis fontSize={12} stroke="#94A3B8"/>
            <Tooltip contentStyle={{borderRadius:12,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}}/>
            <Legend iconType="circle" wrapperStyle={{fontSize:12}}/>
            <Bar dataKey="긴급" fill={C.urgent} radius={[4,4,0,0]} stackId="a"/>
            <Bar dataKey="경고" fill={C.accent} radius={[4,4,0,0]} stackId="a"/>
            <Bar dataKey="주의" fill={C.notice} radius={[4,4,0,0]} stackId="a"/>
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{...CARD,background:C.surface}}>
        <div style={{...TYPO.sectionTitle,marginBottom:16,color:C.textLight}}>최근 긴급 알림</div>
        {INCIDENTS.filter(i=>i.severity==='긴급').map((inc,i)=>(
          <div key={inc.id} onClick={()=>onSelect(inc)} style={{display:'flex',alignItems:'center',gap:14,padding:14,borderRadius:12,border:`1px solid ${C.border}`,marginBottom:8,cursor:'pointer',transition:'all 150ms',animation:`slideUp 400ms ease ${i*80}ms both`}}
            onMouseEnter={e=>{e.currentTarget.style.background='#FFF5F5';e.currentTarget.style.borderColor=C.primary}}
            onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderColor=C.border}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:C.danger,animation:'pulse 2s infinite',flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600}}>{inc.type} — {inc.site}</div>
              <div style={{fontSize:12,color:C.textLight}}>{inc.location} | {inc.reporter} | {inc.date}</div>
            </div>
            <Badge text={inc.status} colors={STATUS_COLORS[inc.status]}/>

                </div>
                <div style={{fontSize:16,fontWeight:700}}>{item.type} — {item.site}</div>

              <Badge text={item.status} colors={STATUS_COLORS[item.status]}/>

            <div style={{display:'flex',gap:4}}>
              {steps.map((s,si)=>(
                <div key={s} style={{flex:1}}>
                  <div style={{height:6,borderRadius:3,background:si<=currentStep?`linear-gradient(90deg,${C.primary},${C.accent})`:'#E2E8F0',transition:'all 300ms'}}/>

        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} title={t.label} style={{padding:'8px 16px',border:'none',borderBottom:tab===t.id?`2px solid ${C.primary}`:'2px solid transparent',background:'transparent',color:tab===t.id?C.primary:C.textLight,fontSize:14,fontWeight:tab===t.id?700:400,cursor:'pointer',fontFamily:'inherit',height:56,transition:'all 150ms'}}>{t.label}</button>
        ))}
        <div style={{flex:1}}/>
        <div style={{position:'relative'}}>
          <input placeholder="검색..." style={{width:180,padding:'7px 32px 7px 12px',borderRadius:20,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',outline:'none'}}/>
          <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:13}}>🔍</span>
        </div>
        <button style={{width:36,height:36,borderRadius:'50%',border:`1px solid ${C.border}`,background:C.surface,cursor:'pointer',fontSize:15,position:'relative'}}>🔔<span style={{position:'absolute',top:2,right:2,width:8,height:8,borderRadius:'50%',background:C.danger}}/></button>
        <div style={{width:32,height:32,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:600}}>관</div>
      </header>

      <div style={{background:meta.gradient,padding:'28px 32px',color:'#fff'}}>
        <h1 style={{...TYPO.pageTitle,color:'#fff'}}>{meta.title}</h1>
        <div style={{display:'flex',gap:32,marginTop:12}}>
          {meta.kpis.map(k=>(
            <div key={k.label} style={{padding:'8px 16px',borderRadius:12,background:'rgba(255,255,255,0.15)',backdropFilter:'blur(8px)'}}>
              <div style={{fontSize:11,opacity:0.8}}>{k.label}</div>
              <div style={{fontSize:20,fontWeight:800}}>{k.value}</div>
            </div>
          ))}
        </div>
      </div>

      <main style={{padding:'24px 32px',animation:'fadeIn 300ms ease'}}>
        {tab==='home'&&<HomePage onSelect={setDrawer}/>}
        {tab==='incident'&&<IncidentPage onSelect={setDrawer}/>}
        {tab==='corrective'&&<CorrectivePage onSelect={setDrawer}/>}
        {tab==='statistics'&&<StatisticsPage/>}
        {tab==='settings'&&<SettingsPage/>}
      </main>

      <Drawer item={drawer} onClose={()=>setDrawer(null)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
