function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}
function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Modal({title,onClose,children,width=560}){

        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

        <div style={{flex:1,display:'flex',flexDirection:'column',gap:2,padding:'0 8px'}}>
          {NAV_ITEMS.slice(0,-1).map(item=>(
            <SideNavItem key={item.id} icon={item.icon} label={item.label} active={section===item.id} onClick={()=>setSection(item.id)}/>
          ))}
        </div>
        <div style={{padding:'0 8px 12px'}}>
          <SideNavItem icon="⚙️" label="시스템 설정" active={section==='settings'} onClick={()=>setSection('settings')}/>
        </div>
      </nav>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <header style={{height:40,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 16px',gap:8,background:C.surface,flexShrink:0}}>
          <span style={{fontSize:13,color:C.textLight}}>퀄리티허브</span>
          <span style={{fontSize:13,color:C.textLight}}>/</span>
          <span style={{fontSize:13,fontWeight:600}}>{breadcrumb}</span>
          <div style={{flex:1}}/>
          <div style={{position:'relative'}}>
            <input placeholder="검색..." style={{width:160,padding:'5px 28px 5px 10px',borderRadius:6,border:`1px solid ${C.border}`,fontSize:12,fontFamily:'inherit',outline:'none'}}/>
            <span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',fontSize:12}}>🔍</span>
          </div>
          <div style={{width:26,height:26,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11,fontWeight:600}}>관</div>
        </header>
        <main style={{flex:1,overflow:'hidden'}}>
          {section==='dashboard'&&<DashboardPage/>}
          {section==='defect-report'&&<DefectReportPage/>}
          {section==='checklist'&&<ChecklistPage/>}
          {section==='supplier'&&<SupplierPage/>}
          {section==='settings'&&<SettingsPage/>}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
