function Skeleton(){return(<div style={{padding:32}}><div className="skeleton" style={{width:'100%',height:160,marginBottom:24,borderRadius:16}}/><div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>{[1,2,3].map(i=><div key={i} className="skeleton" style={{height:200,borderRadius:12}}/>)}</div></div>);}

function Drawer({open,onClose,title,children}){
  if(!open)return null;
  return(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.4)',zIndex:1000}}>
    <div onClick={e=>e.stopPropagation()} style={{position:'absolute',right:0,top:0,bottom:0,width:520,background:C.surface,boxShadow:'-12px 0 40px rgba(0,0,0,0.12)',animation:'slideIn .3s',overflow:'auto'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:C.surface,zIndex:1}}>

        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSec}}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>

  </div>);
}

function Badge({text}){
  const colors={활성:{bg:'#D1FAE5',t:'#065F46'},비활성:{bg:'#FEE2E2',t:'#991B1B'},중단:{bg:'#FEE2E2',t:'#991B1B'},지급완료:{bg:'#D1FAE5',t:'#065F46'},검토중:{bg:'#FEF3C7',t:'#92400E'},계산완료:{bg:'#DBEAFE',t:'#1D4ED8'},대기:{bg:'#F3F4F6',t:'#374151'},Platinum:{bg:'#EDE9FE',t:'#5B21B6'},Gold:{bg:'#FEF3C7',t:'#92400E'},Silver:{bg:'#F3F4F6',t:'#374151'}};
  const c=colors[text]||{bg:'#F3F4F6',t:'#374151'};
  return <span style={{padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.t}}>{text}</span>;
}

function HeroBanner({icon,title,kpis}){

}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t);},[]);
  return(<div style={{position:'fixed',bottom:24,right:24,background:C.secondary,color:'#fff',padding:'12px 20px',borderRadius:10,fontSize:14,fontWeight:500,boxShadow:'0 8px 30px rgba(0,0,0,0.15)',zIndex:2000,animation:'fadeIn .3s'}}>✅ {msg}</div>);
}

    <Drawer open={createDrawer} onClose={()=>setCreateDrawer(false)} title="파트너 등록">
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <div><label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>파트너명</label><input placeholder="파트너 이름" style={{width:'100%',padding:'10px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'Pretendard'}}/></div>
        <div><label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>이메일</label><input type="email" placeholder="partner@email.com" style={{width:'100%',padding:'10px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'Pretendard'}}/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div><label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>채널</label><select style={{width:'100%',padding:'10px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'Pretendard'}}>{['블로그','인스타그램','유튜브','틱톡'].map(o=><option key={o}>{o}</option>)}</select></div>
          <div><label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>등급</label><select style={{width:'100%',padding:'10px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'Pretendard'}}>{['Silver','Gold','Platinum'].map(o=><option key={o}>{o}</option>)}</select></div>
        </div>
        <div><label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>채널 URL</label><input placeholder="https://instagram.com/partner" style={{width:'100%',padding:'10px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'Pretendard'}}/></div>
        <div style={{background:'#F0F9FF',borderRadius:10,padding:16}}>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:13}}>
            <input type="checkbox" style={{width:16,height:16}}/>
            <span>파트너 이용약관에 동의합니다</span>
          </label>
        </div>
        <button onClick={()=>{setCreateDrawer(false);setToast('파트너가 등록되었습니다');}} style={{padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer'}}>등록하기</button>
      </div>
    </Drawer>
    {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
  </div>);
}

function ReportsPage(){
  const [drawer,setDrawer]=useState(null);
  return(<div style={{animation:'fadeIn .4s'}}>
    <HeroBanner icon="📈" title="성과 리포트" kpis={[
      {label:'리포트 대상',value:reports.length+'명'},
      {label:'총 수수료',value:((reports.reduce((s,r)=>s+r.commission,0))/10000).toFixed(0)+'만원'},
      {label:'평균 전환율',value:(reports.reduce((s,r)=>s+r.convRate,0)/reports.length).toFixed(2)+'%'}
    ]}/>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:24}}>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)',border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>파트너별 매출 비교</h3>
        <ResponsiveContainer width="100%" height={260}>
          <BarChart data={partners.filter(p=>p.status==='활성').map(p=>({name:p.name.split(' ')[0],revenue:p.revenue/10000,earned:p.earned/10000}))} layout="vertical">
            <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/><XAxis type="number" tick={{fontSize:11}} tickFormatter={v=>v+'만'}/><YAxis type="category" dataKey="name" tick={{fontSize:12}} width={60}/>
            <Tooltip formatter={v=>v.toLocaleString()+'만원'}/><Legend wrapperStyle={{fontSize:12}}/>
            <Bar dataKey="revenue" name="매출" fill="#BAE6FD" radius={[0,4,4,0]}/>
            <Bar dataKey="earned" name="수수료" fill={C.primary} radius={[0,4,4,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 8px rgba(0,0,0,0.04)',border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>일별 전환율 추이</h3>
        <ResponsiveContainer width="100%" height={260}>
          <LineChart data={dailyPerf.map(d=>({...d,rate:((d.conversions/d.clicks)*100).toFixed(2)}))}>
            <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/><XAxis dataKey="date" tick={{fontSize:11}}/><YAxis tick={{fontSize:11}} domain={[2,4]}/>
            <Tooltip formatter={v=>v+'%'}/><Line type="monotone" dataKey="rate" name="전환율" stroke={C.primary} strokeWidth={2} dot={{r:4,fill:C.primary}}/>
          </LineChart>
        </ResponsiveContainer>
      </div>
    </div>
    <div style={{background:C.surface,borderRadius:16,overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.04)',border:`1px solid ${C.border}`}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{borderBottom:`2px solid ${C.border}`,background:'#F8FAFC'}}>
          {['파트너','기간','클릭','전환','매출','수수료','전환율'].map(h=><th key={h} style={{padding:'14px 16px',textAlign:'left',fontSize:13,color:C.textSec,fontWeight:600}}>{h}</th>)}
        </tr></thead>
        <tbody>{reports.map(r=><tr key={r.id} onClick={()=>setDrawer(r)} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.background='#F0F9FF'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <td style={{padding:'14px 16px',fontSize:14,fontWeight:600}}>{r.partner}</td>
          <td style={{padding:'14px 16px',fontSize:13}}>{r.month}</td>
          <td style={{padding:'14px 16px',fontSize:13}}>{r.clicks.toLocaleString()}</td>
          <td style={{padding:'14px 16px',fontSize:13,fontWeight:600}}>{r.conversions}건</td>
          <td style={{padding:'14px 16px',fontSize:13}}>{(r.revenue/10000).toFixed(0)}만원</td>
          <td style={{padding:'14px 16px',fontSize:14,fontWeight:700,color:C.primary}}>{(r.commission/10000).toFixed(0)}만원</td>
          <td style={{padding:'14px 16px',fontSize:13}}>{r.convRate}%</td>
        </tr>)}</tbody>
      </table>
    </div>

    <Drawer open={!!drawer} onClose={()=>setDrawer(null)} title="리포트 상세">
      {drawer&&<div>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>{drawer.partner}</div>
        <div style={{fontSize:13,color:C.textSec,marginBottom:20}}>{drawer.month} 성과 리포트</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
          {[{l:'클릭',v:drawer.clicks.toLocaleString()},{l:'전환',v:drawer.conversions+'건'},{l:'매출',v:(drawer.revenue/10000).toFixed(0)+'만원'},{l:'전환율',v:drawer.convRate+'%'}].map(s=><div key={s.l} style={{background:'#F0F9FF',borderRadius:8,padding:12}}><div style={{fontSize:11,color:C.textSec}}>{s.l}</div><div style={{fontSize:16,fontWeight:700}}>{s.v}</div></div>)}
        </div>
        <div style={{background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`,borderRadius:12,padding:20,textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:12,color:'rgba(255,255,255,0.7)'}}>수수료</div>
          <div style={{fontSize:28,fontWeight:800,color:'#fff'}}>{drawer.commission.toLocaleString()}원</div>
        </div>
        <h4 style={{fontSize:14,fontWeight:700,marginBottom:12}}>일별 전환 추이</h4>
        <ResponsiveContainer width="100%" height={160}>
          <AreaChart data={dailyPerf}><CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/><XAxis dataKey="date" tick={{fontSize:10}}/><YAxis tick={{fontSize:10}}/><Area type="monotone" dataKey="conversions" stroke={C.primary} fill="#DBEAFE" strokeWidth={2}/></AreaChart>
        </ResponsiveContainer>
        <textarea placeholder="리포트 메모..." style={{width:'100%',padding:12,borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,minHeight:60,resize:'vertical',fontFamily:'Pretendard',marginTop:16}}/>
        <button onClick={()=>setDrawer(null)} style={{width:'100%',padding:'10px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',marginTop:12}}>PDF 다운로드</button>
      </div>}
    </Drawer>
  </div>);
}

// ── App ──
const tabs=[
  {key:'dashboard',label:'성과 분석 대시보드',icon:'📊'},
  {key:'tracking-links',label:'추적 링크 관리',icon:'🔗'},
  {key:'settlement',label:'수수료 자동 정산',icon:'💰'},
  {key:'partners',label:'파트너 관리',icon:'🤝'},
  {key:'reports',label:'성과 리포트',icon:'📈'}
];

function App(){
  const [tab,setTab]=useState('dashboard');
  const [loading,setLoading]=useState(true);
  useEffect(()=>{const t=setTimeout(()=>setLoading(false),600);return()=>clearTimeout(t);},[]);
  useEffect(()=>{setLoading(true);const t=setTimeout(()=>setLoading(false),300);return()=>clearTimeout(t);},[tab]);

  return(<div style={{minHeight:'100vh',background:C.bg}}>
    {/* Top Nav */}
    <nav style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
      <div style={{maxWidth:1320,margin:'0 auto',padding:'0 32px',display:'flex',alignItems:'center',height:60}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginRight:40}}>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'#fff'}}>💰</div>
          <span style={{fontSize:16,fontWeight:800,color:C.secondary}}>AffiliateHub</span>
        </div>
        <div style={{display:'flex',gap:2,flex:1}}>
          {tabs.map(t=><button key={t.key} title={t.label} onClick={()=>setTab(t.key)} style={{padding:'8px 16px',borderRadius:8,border:'none',background:tab===t.key?'#E0F2FE':'transparent',color:tab===t.key?C.primary:C.textSec,fontSize:13,fontWeight:tab===t.key?700:500,cursor:'pointer',fontFamily:'Pretendard',display:'flex',alignItems:'center',gap:6,transition:'all .15s'}} onMouseEnter={e=>{if(tab!==t.key)e.currentTarget.style.background='#F0F9FF';}} onMouseLeave={e=>{if(tab!==t.key)e.currentTarget.style.background='transparent';}}>
            <span>{t.icon}</span>{t.label}
          </button>)}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <input placeholder="검색..." style={{padding:'8px 14px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,width:180,outline:'none',fontFamily:'Pretendard'}}/>
          <div style={{position:'relative',cursor:'pointer'}}><span style={{fontSize:18}}>🔔</span><div style={{position:'absolute',top:-2,right:-2,width:7,height:7,borderRadius:'50%',background:C.danger}}/></div>
          <div style={{width:32,height:32,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14,fontWeight:700}}>A</div>
        </div>
      </div>
    </nav>

    {/* Content */}
    <main style={{maxWidth:1320,margin:'0 auto',padding:'24px 32px'}}>
      {loading?<Skeleton/>:tab==='dashboard'?<DashboardPage/>:tab==='tracking-links'?<TrackingLinksPage/>:tab==='settlement'?<SettlementPage/>:tab==='partners'?<PartnersPage/>:<ReportsPage/>}
    </main>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
