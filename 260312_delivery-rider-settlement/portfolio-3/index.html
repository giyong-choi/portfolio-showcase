/* ─── Components ─── */
function CountUp({end,duration=1200}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}</span>;
}

function Badge({text}){
  const colors={
    '완료':{bg:'#ECFDF5',text:'#059669'},'접수':{bg:'#FEF3C7',text:'#D97706'},
    '검토 중':{bg:'#DBEAFE',text:'#1D4ED8'},'조정 완료':{bg:'#ECFDF5',text:'#059669'},
    '기각':{bg:'#FEF2F2',text:'#DC2626'},'활성':{bg:'#ECFDF5',text:'#059669'},
    '정지':{bg:'#FEF2F2',text:'#DC2626'},
  };
  const c=colors[text]||{bg:'#F3F4F6',text:'#6B7280'};
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:6,fontSize:12,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function PlatformTag({name}){
  const colors={'배달의민족':C.baemin,'쿠팡이츠':C.coupang,'요기요':C.yogiyo};
  return <span style={{display:'inline-block',padding:'3px 8px',borderRadius:4,fontSize:11,fontWeight:600,background:colors[name]||'#ccc',color:'#fff',marginRight:4}}>{name}</span>;
}

function KpiCard({icon,label,value,sub,accent}){
  return(
    <div style={{background:C.surface,borderRadius:10,padding:'18px 20px',border:`1px solid ${C.border}`,animation:'slideUp 500ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span>
        <span style={{fontSize:18}}>{icon}</span>
      </div>
      <div style={{fontSize:26,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{typeof value==='number'?<CountUp end={value}/>:value}</div>
      {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:5}}>{sub}</div>}
    </div>
  );
}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(<>
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000}}/>
    <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:640,maxHeight:'85vh',background:C.surface,borderRadius:14,boxShadow:'0 24px 48px rgba(0,0,0,0.15)',zIndex:1001,animation:'fadeInScale 250ms ease',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'18px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>

    </div>
  </>);
