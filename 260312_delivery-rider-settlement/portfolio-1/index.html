/* ─── Components ─── */
function CountUp({end,duration=1200}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}</span>;
}

function Badge({text}){
  const colors={
    '완료':{bg:'#ECFDF5',text:'#059669'},'승인 대기':{bg:'#FEF3C7',text:'#D97706'},
    '송금 완료':{bg:'#ECFDF5',text:'#059669'},'송금 중':{bg:'#DBEAFE',text:'#1D4ED8'},
    '반려':{bg:'#FEF2F2',text:'#DC2626'},'활성':{bg:'#ECFDF5',text:'#059669'},
    '정지':{bg:'#FEF2F2',text:'#DC2626'},'성공':{bg:'#ECFDF5',text:'#059669'},
    '처리 중':{bg:'#FEF3C7',text:'#D97706'},'실패':{bg:'#FEF2F2',text:'#DC2626'},
  };
  const c=colors[text]||{bg:'#F1F5F9',text:'#475569'};
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:6,fontSize:12,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function GradeBadge({grade}){
  const colors={S:'#7C3AED',A:'#1D4ED8',B:'#059669',C:'#D97706'};
  return <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:28,height:28,borderRadius:6,fontSize:12,fontWeight:800,background:colors[grade]||'#94A3B8',color:'#fff'}}>{grade}</span>;
}

function KpiCard({icon,label,value,sub,accent}){
  return(
    <div style={{background:C.surface,borderRadius:12,padding:'20px 24px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`,animation:'slideUp 500ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span>
        <span style={{fontSize:20}}>{icon}</span>
      </div>
      <div style={{fontSize:28,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{typeof value==='number'?<CountUp end={value}/>:value}</div>
      {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:6}}>{sub}</div>}
    </div>
  );
}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(<>
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000}}/>
    <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:620,maxHeight:'85vh',background:C.surface,borderRadius:16,boxShadow:'0 24px 48px rgba(0,0,0,0.15)',zIndex:1001,animation:'fadeInScale 250ms ease',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:C.textLight,borderRadius:8,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center'}} onMouseOver={e=>e.currentTarget.style.background='#F1F5F9'} onMouseOut={e=>e.currentTarget.style.background='none'}>✕</button>
      </div>
      <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
    </div>
  </>);
}
