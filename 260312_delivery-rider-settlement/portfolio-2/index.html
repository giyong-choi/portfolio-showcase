/* ─── Components ─── */
function CountUp({end,duration=1200}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}</span>;
}

function Badge({text}){
  const colors={
    '정산완료':{bg:'#ECFDF5',text:'#059669'},'승인 대기':{bg:'#FEF3C7',text:'#D97706'},
    '이상 플래그':{bg:'#FEF2F2',text:'#DC2626'},'활성':{bg:'#ECFDF5',text:'#059669'},
    '정지':{bg:'#FEF2F2',text:'#DC2626'},'완료':{bg:'#ECFDF5',text:'#059669'},
    '처리 중':{bg:'#FEF3C7',text:'#D97706'},'재무 확정':{bg:'#DBEAFE',text:'#1D4ED8'},
    '송금 완료':{bg:'#ECFDF5',text:'#059669'},
  };
  const c=colors[text]||{bg:'#F5F5F4',text:'#78716C'};
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function KpiCard({icon,label,value,sub,accent}){
  return(
    <div style={{background:C.surface,borderRadius:16,padding:'20px 24px',boxShadow:'0 4px 12px rgba(0,0,0,0.06)',animation:'slideUp 500ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span>
        <span style={{fontSize:20}}>{icon}</span>
      </div>
      <div style={{fontSize:28,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{typeof value==='number'?<CountUp end={value}/>:value}</div>
      {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:6}}>{sub}</div>}
    </div>
  );
}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(<>
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000}}/>
    <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:620,maxHeight:'85vh',background:C.surface,borderRadius:20,boxShadow:'0 24px 48px rgba(0,0,0,0.15)',zIndex:1001,animation:'fadeInScale 250ms ease',display:'flex',flexDirection:'column',overflow:'hidden'}}>

        <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:C.textLight,borderRadius:8,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>

  </>);
}

              <div style={{fontSize:11,color:'#6B7280'}}>설계사 수수료</div>
              <div style={{fontSize:16,fontWeight:700,color:'#059669',marginTop:4}}>₩34,280,000</div>
            </div>
            <div style={{padding:12,background:'#DBEAFE',borderRadius:10,textAlign:'center'}}>
              <div style={{fontSize:11,color:'#6B7280'}}>팀장 오버라이딩</div>
              <div style={{fontSize:16,fontWeight:700,color:'#1D4ED8',marginTop:4}}>₩5,420,000</div>

            <div style={{padding:12,background:'#FEF3C7',borderRadius:10,textAlign:'center'}}>
              <div style={{fontSize:11,color:'#6B7280'}}>지점장 수수료</div>
              <div style={{fontSize:16,fontWeight:700,color:'#92400E',marginTop:4}}>₩3,150,000</div>
            </div>
          </div>
          {modal.anomalies>0&&<div style={{marginTop:16,padding:14,background:'#FEF2F2',borderRadius:10}}>

            <div style={{fontSize:12,color:'#991B1B'}}>김수정(AG-001): 전월 대비 수수료 42% 증가 — 검토 필요</div>
          </div>}
          <div style={{display:'flex',gap:8,marginTop:20}}>
            <button style={{flex:1,padding:'10px',borderRadius:12,background:C.success,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>승인</button>
            <button style={{flex:1,padding:'10px',borderRadius:12,border:`1px solid ${C.danger}`,background:'transparent',color:C.danger,fontSize:13,fontWeight:600,cursor:'pointer'}}>반려</button>
          </div>
        </div>}
      </Modal>
    </div>
  );
}

/* ─── App ─── */
function App(){
  const[page,setPage]=useState('수수료 현황');
  const tabs=['수수료 현황','계약 데이터','지급 승인','시스템 설정','지급 이력'];
  const pageMap={
    '수수료 현황':<DashboardPage/>,
    '계약 데이터':<ContractPage/>,
    '지급 승인':<ApprovalPage/>,
    '시스템 설정':<SettingsPage/>,
    '지급 이력':<HistoryPage/>,
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      {/* Top Navigation */}
      <header style={{background:C.navBg,color:'#fff',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',height:60}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:34,height:34,borderRadius:10,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:800}}>💼</div>
            <div>
              <div style={{fontSize:17,fontWeight:800}}>CommPay</div>
              <div style={{fontSize:10,opacity:0.6}}>보험 설계사 수수료 정산</div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:'#34D399'}}/>
            <span style={{fontSize:13,opacity:0.8}}>관리자</span>
            <div style={{width:32,height:32,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700}}>A</div>
          </div>
        </div>
        <nav style={{display:'flex',gap:0,padding:'0 32px'}}>
          {tabs.map(t=>(
            <button key={t} onClick={()=>setPage(t)} title={t} style={{padding:'10px 20px',border:'none',borderBottom:page===t?`3px solid ${C.accent}`:'3px solid transparent',background:'transparent',color:page===t?'#fff':'rgba(255,255,255,0.6)',fontSize:14,fontWeight:page===t?700:400,cursor:'pointer',transition:'all 150ms'}} onMouseOver={e=>{if(page!==t)e.currentTarget.style.color='rgba(255,255,255,0.8)'}} onMouseOut={e=>{if(page!==t)e.currentTarget.style.color='rgba(255,255,255,0.6)'}}>
              {t}
            </button>
          ))}
        </nav>
      </header>

      {/* Main content */}
      <main style={{flex:1,overflow:'auto',padding:32,background:C.bg}}>
        {pageMap[page]}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
