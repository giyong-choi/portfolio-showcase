<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>케어포털 — 요양원 통합 운영 플랫폼</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#FAF5FF;color:#1E1B4B;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#C4B5FD;border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const {BarChart,Bar,LineChart,Line,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,AreaChart,Area}=Recharts;

const C={primary:'#7C3AED',secondary:'#1E1B4B',accent:'#A78BFA',bg:'#FAF5FF',surface:'#FFFFFF',surfaceWarm:'#F3E8FF',border:'#D1D5DB',text:'#1E1B4B',textLight:'#6B7280',textMuted:'#9CA3AF',success:'#059669',warning:'#D97706',danger:'#DC2626',sidebarBg:'#F3E8FF',sidebarActive:'#7C3AED'};

const VITALS=[
  {date:'12.09',systolic:128,diastolic:82,glucose:105,weight:58.2},
  {date:'12.10',systolic:132,diastolic:85,glucose:112,weight:58.1},
  {date:'12.11',systolic:125,diastolic:80,glucose:98,weight:58.3},
  {date:'12.12',systolic:138,diastolic:88,glucose:120,weight:58.0},
  {date:'12.13',systolic:130,diastolic:84,glucose:108,weight:58.2},
  {date:'12.14',systolic:145,diastolic:92,glucose:135,weight:57.8},
  {date:'12.15',systolic:126,diastolic:81,glucose:102,weight:58.1},

const RESIDENTS=[
  {id:1,name:'김영숙',age:82,room:'201호',bp:'128/82',glucose:105,alert:false},
  {id:2,name:'이순자',age:78,room:'203호',bp:'138/88',glucose:120,alert:true},
  {id:3,name:'박정희',age:85,room:'205호',bp:'145/92',glucose:135,alert:true},
  {id:4,name:'최옥순',age:80,room:'207호',bp:'122/78',glucose:95,alert:false},
  {id:5,name:'정말순',age:88,room:'301호',bp:'130/84',glucose:108,alert:false},
  {id:6,name:'한복순',age:76,room:'302호',bp:'118/76',glucose:92,alert:false},

const EVAL_ITEMS=[
  {cat:'급식 관리',score:92,items:['식단표 작성','특별 식이','급식 인원 기록']},
  {cat:'위생 관리',score:88,items:['주방 위생','식당 청결','손위생']},
  {cat:'건강 관리',score:85,items:['바이탈 기록','복약 관리','건강 상담']},
  {cat:'안전 관리',score:90,items:['소방 점검','낙상 예방','응급 대응']},
  {cat:'인력 관리',score:94,items:['자격증 관리','교육 이수','근무 기록']},
];

const NOTIFICATIONS=[
  {id:1,type:'건강 이상',target:'이순자(203호)',detail:'혈압 138/88 — 정상 범위 초과',time:'14:20',channel:'인앱+SMS',status:'발송완료'},
  {id:2,type:'건강 이상',target:'박정희(205호)',detail:'혈당 135 — 정상 범위 초과',time:'14:15',channel:'인앱+알림톡',status:'발송완료'},
  {id:3,type:'식사 알림',target:'김영숙 보호자',detail:'오늘 점심 정상 배식 완료',time:'12:30',channel:'알림톡',status:'발송완료'},
  {id:4,type:'위생 점검',target:'관리자',detail:'화장실 위생 점검 미완료',time:'10:00',channel:'인앱',status:'확인됨'},
  {id:5,type:'평가 안내',target:'관리자',detail:'기관 평가 D-14 안내',time:'09:00',channel:'인앱',status:'읽음'},
];

const WEEKLY_CHART=[{day:'월',meals:82,hygiene:95,alerts:1},{day:'화',meals:80,hygiene:88,alerts:2},{day:'수',meals:83,hygiene:92,alerts:0},{day:'목',meals:81,hygiene:90,alerts:1},{day:'금',meals:84,hygiene:96,alerts:3}];

const MEAL_WEEK=[
  {day:'월',breakfast:'현미밥·된장찌개·시금치나물',lunch:'보리밥·불고기·계란찜',dinner:'쌀밥·미역국·두부조림'},
  {day:'화',breakfast:'쌀밥·콩나물국·멸치볶음',lunch:'잡곡밥·돼지갈비찜·도토리묵',dinner:'현미밥·감자수제비·어묵볶음'},
  {day:'수',breakfast:'흑미밥·소고기무국·장조림',lunch:'쌀밥·생선구이·시금치나물',dinner:'잡곡밥·닭곰탕·무생채'},
];

/* ─── Components ─── */
function Badge({text}){
  const colors={'발송완료':{bg:'#ECFDF5',c:'#059669'},'확인됨':{bg:'#FEF3C7',c:'#D97706'},'읽음':{bg:'#F3E8FF',c:'#7C3AED'},'정상':{bg:'#ECFDF5',c:'#059669'},'이상':{bg:'#FEF2F2',c:'#DC2626'}};
  const s=colors[text]||{bg:'#F3F4F6',c:'#6B7280'};
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:6,fontSize:12,fontWeight:600,background:s.bg,color:s.c}}>{text}</span>;
}
function KpiCard({icon,label,value,sub,accent}){
  return(<div style={{background:C.surface,borderRadius:14,padding:'18px 22px',border:`1px solid ${C.border}`,animation:'slideUp 500ms ease'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span><span style={{fontSize:18}}>{icon}</span></div>
    <div style={{fontSize:24,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{value}</div>
    {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:5}}>{sub}</div>}
  </div>);
}

/* ─── Pages ─── */
function DashboardPage(){
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>운영 현황 대시보드</h2>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
      <KpiCard icon="🏥" label="어르신 현원" value="90명" sub="정원 100명"/>
      <KpiCard icon="🍚" label="오늘 급식" value="82명"/>
      <KpiCard icon="⚠️" label="건강 이상" value="2명" sub="혈압·혈당 초과" accent={C.danger}/>
      <KpiCard icon="🔔" label="미확인 알림" value="3" accent={C.warning}/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:20}}>
      <div style={{background:C.surface,borderRadius:14,padding:22,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>이번 주 운영 현황</div>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={WEEKLY_CHART}><CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/><XAxis dataKey="day" tick={{fontSize:12,fill:C.textMuted}}/><YAxis tick={{fontSize:12,fill:C.textMuted}}/><Tooltip contentStyle={{borderRadius:8,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}}/><Bar dataKey="meals" fill={C.primary} name="급식 인원" radius={[0,0,0,0]}/><Bar dataKey="hygiene" fill={C.success} name="위생 점수"/><Bar dataKey="alerts" fill={C.danger} name="건강 이상" radius={[4,4,0,0]}/></BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:14,padding:22,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>최근 알림</div>
        {NOTIFICATIONS.slice(0,4).map(n=>(
          <div key={n.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:n.type==='건강 이상'?C.danger:n.type==='위생 점검'?C.warning:C.primary,flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.type}: {n.target}</div>
              <div style={{fontSize:10,color:C.textMuted}}>{n.time}</div>
            </div>
            <Badge text={n.status}/>
          </div>
        ))}

function HealthPage(){

    <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>건강 기록 관리</h2>
    <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:16}}>
      <div style={{background:C.surface,borderRadius:14,padding:18,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>어르신 목록</div>
        {RESIDENTS.map(r=>(
          <div key={r.id} onClick={()=>setSelResident(r)} style={{padding:10,borderRadius:8,marginBottom:4,cursor:'pointer',background:selResident.id===r.id?C.surfaceWarm:'transparent',border:`1px solid ${selResident.id===r.id?C.primary:'transparent'}`,transition:'all 150ms'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:13,fontWeight:600}}>{r.name} ({r.age}세)</span>
              {r.alert&&<span style={{width:8,height:8,borderRadius:'50%',background:C.danger}}/>}
            </div>
            <div style={{fontSize:11,color:C.textMuted}}>{r.room} · BP {r.bp} · BG {r.glucose}</div>
          </div>
        ))}
      </div>
      <div>
        <div style={{background:C.surface,borderRadius:14,padding:22,border:`1px solid ${C.border}`,marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <span style={{fontSize:15,fontWeight:700}}>{selResident.name} — 바이탈 추이</span>
            {selResident.alert&&<span style={{padding:'4px 10px',borderRadius:6,background:'#FEF2F2',color:C.danger,fontSize:12,fontWeight:600}}>⚠ 이상 감지</span>}

            <LineChart data={VITALS}>

              <YAxis tick={{fontSize:12,fill:C.textMuted}}/>
              <Tooltip contentStyle={{borderRadius:8,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}}/>
              <Line type="monotone" dataKey="systolic" stroke={C.danger} strokeWidth={2} dot={{r:3}} name="수축기 혈압"/>
              <Line type="monotone" dataKey="glucose" stroke={C.warning} strokeWidth={2} dot={{r:3}} name="혈당"/>

          </ResponsiveContainer>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <span style={{fontSize:11,color:C.textMuted}}>정상 혈압: 120~139 / 80~89</span>
            <span style={{fontSize:11,color:C.textMuted}}>정상 혈당: 70~130</span>
          </div>
        </div>
        <div style={{background:C.surface,borderRadius:14,padding:22,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>바이탈 입력</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
            {[['수축기 혈압','mmHg'],['이완기 혈압','mmHg'],['혈당','mg/dL'],['체중','kg']].map(([k,u])=>(

          <button style={{marginTop:12,padding:'8px 16px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>기록 저장</button>
        </div>
      </div>
    </div>
  </div>);
}

function EvaluationPage(){
  const avg=Math.round(EVAL_ITEMS.reduce((s,e)=>s+e.score,0)/EVAL_ITEMS.length);
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <h2 style={{fontSize:20,fontWeight:800}}>기관 평가 관리</h2>
      <button style={{padding:'8px 14px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>📄 PDF 보고서 생성</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:20}}>
      {EVAL_ITEMS.map(e=>(
        <div key={e.cat} style={{background:C.surface,borderRadius:14,padding:18,border:`1px solid ${C.border}`,textAlign:'center'}}>
          <div style={{fontSize:22,fontWeight:800,color:e.score>=90?C.success:e.score>=85?C.warning:C.danger}}>{e.score}</div>
          <div style={{fontSize:12,color:C.textLight,marginTop:4}}>{e.cat}</div>
        </div>
      ))}
    </div>
    <div style={{background:C.surface,borderRadius:14,padding:22,border:`1px solid ${C.border}`}}>
      <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>항목별 상세 ({avg}점 평균)</div>
      {EVAL_ITEMS.map(e=>(
        <div key={e.cat} style={{marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}>
            <span style={{fontWeight:600}}>{e.cat}</span><span style={{fontWeight:700,color:e.score>=90?C.success:C.warning}}>{e.score}점</span>
          </div>
          <div style={{height:8,background:'#E5E7EB',borderRadius:4,marginBottom:6}}>
            <div style={{width:`${e.score}%`,height:'100%',borderRadius:4,background:e.score>=90?C.success:e.score>=85?C.warning:C.danger}}/>
          </div>
          <div style={{display:'flex',gap:6}}>{e.items.map(i=><span key={i} style={{padding:'3px 8px',borderRadius:4,background:C.surfaceWarm,fontSize:10,color:C.textLight}}>{i}</span>)}</div>
        </div>
      ))}
    </div>
  </div>);
}

    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:20}}>
      <KpiCard icon="📩" label="오늘 발송" value="5" accent={C.primary}/>

        <div key={n.id} style={{display:'flex',alignItems:'flex-start',gap:12,padding:'12px 0',borderBottom:`1px solid ${C.border}`}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:n.type==='건강 이상'?C.danger:n.type==='위생 점검'?C.warning:C.primary,flexShrink:0,marginTop:5}}/>
          <div style={{flex:1}}>

              <span style={{fontSize:13,fontWeight:600}}>{n.type} — {n.target}</span>
              <Badge text={n.status}/>
            </div>
            <div style={{fontSize:12,color:C.textMuted}}>{n.detail}</div>

          </div>
        </div>

    </div>
  </div>);
}

function MealPlanPage(){

        <tbody>{MEAL_WEEK.map(m=><tr key={m.day} style={{borderBottom:`1px solid ${C.border}`}}>

}

  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>설정</h2>
    <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
      <div style={{background:C.surface,borderRadius:14,padding:22,border:`1px solid ${C.border}`}}>

          <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'11px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
            <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600}}>{v}</span></div>
        ))}
      </div>
      <div style={{background:C.surface,borderRadius:14,padding:22,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>발송 채널</div>
        {[['인앱 알림','실시간 WebSocket'],['SMS','건강 이상 즉시 발송'],['카카오 알림톡','식사 현황·건강 요약'],['알림 재시도','3회 (지수 백오프)']].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'11px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
            <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600,color:C.primary}}>{v}</span></div>

      </div>
    </div>

/* ─── App Shell (bright-workspace) ─── */
function App(){
  const[page,setPage]=useState('운영 현황 대시보드');
  const menus=[{name:'운영 현황 대시보드',icon:'📊'},{name:'건강 기록 관리',icon:'❤️'},{name:'기관 평가 관리',icon:'📋'},{name:'보호자 알림',icon:'🔔'},{name:'식단 관리',icon:'🍚'},{name:'설정',icon:'⚙️'}];
  const renderPage=()=>{switch(page){case '운영 현황 대시보드':return <DashboardPage/>;case '건강 기록 관리':return <HealthPage/>;case '기관 평가 관리':return <EvaluationPage/>;case '보호자 알림':return <NotificationPage/>;case '식단 관리':return <MealPlanPage/>;case '설정':return <SettingsPage/>;default:return <DashboardPage/>;}};

  return(<div style={{display:'flex',height:'100vh'}}>
    <div style={{width:240,background:C.sidebarBg,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column'}}>
      <div style={{padding:'18px 20px',borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🏥</div>
          <div><div style={{fontSize:15,fontWeight:800}}>CarePortal</div><div style={{fontSize:10,color:C.textMuted}}>요양원 통합 운영</div></div>
        </div>
      </div>
      <nav style={{flex:1,padding:'10px 12px'}}>
        {menus.map(m=>(<button key={m.name} onClick={()=>setPage(m.name)} title={m.name} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 12px',borderRadius:8,border:'none',background:page===m.name?`${C.primary}18`:'transparent',color:page===m.name?C.secondary:C.textLight,fontSize:13,fontWeight:page===m.name?600:400,cursor:'pointer',marginBottom:2,transition:'all 150ms',textAlign:'left'}}><span style={{fontSize:16}}>{m.icon}</span>{m.name}</button>))}
      </nav>
      <div style={{padding:'14px 18px',borderTop:`1px solid ${C.border}`}}>
        <div style={{fontSize:11,color:C.textMuted}}>행복요양원</div>
        <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:C.success}}/>
          <span style={{fontSize:12,fontWeight:600}}>정상 운영 중</span>
        </div>
      </div>
    </div>
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'12px 24px',borderBottom:`1px solid ${C.border}`,background:C.surface,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <span style={{fontSize:13,fontWeight:600}}>{page}</span>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:12,color:C.textMuted}}>현원 90명</span>
          {RESIDENTS.filter(r=>r.alert).length>0&&<span style={{padding:'3px 10px',borderRadius:6,background:'#FEF2F2',color:C.danger,fontSize:12,fontWeight:600}}>⚠ 이상 {RESIDENTS.filter(r=>r.alert).length}건</span>}
        </div>
      </div>
      <div style={{flex:1,overflow:'auto',padding:24}}>{renderPage()}</div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
