  {day:'목',breakfast:'보리밥, 황태국, 고사리나물, 깍두기',lunch:'현미밥, 돈까스, 샐러드, 배추김치',dinner:'쌀밥, 된장국, 버섯볶음, 열무김치',special:''},

  {id:4,category:'식당',item:'테이블·의자 청결 상태',status:'완료',checker:'박수진',time:'07:00',photo:true},
  {id:5,category:'식당',item:'바닥 청소 및 소독',status:'미완료',checker:'—',time:'—',photo:false},

const MEAL_CHART=[{month:'1월',count:245},{month:'2월',count:238},{month:'3월',count:252},{month:'4월',count:248},{month:'5월',count:256},{month:'6월',count:260}];

/* ─── Components ─── */
function Badge({text}){
  const colors={'완료':{bg:'#ECFDF5',c:'#059669'},'미완료':{bg:'#FEF2F2',c:'#DC2626'},'정상':{bg:'#ECFDF5',c:'#059669'},'식이변경':{bg:'#FEF3C7',c:'#D97706'},'일반식':{bg:'#EFF6FF',c:'#0066CC'},'당뇨식':{bg:'#FEF3C7',c:'#D97706'},'연화식':{bg:'#ECFDF5',c:'#059669'},'경관식':{bg:'#FEF2F2',c:'#DC2626'}};
  const s=colors[text]||{bg:'#F1F5F9',c:'#475569'};
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:6,fontSize:12,fontWeight:600,background:s.bg,color:s.c}}>{text}</span>;
}
function KpiCard({icon,label,value,sub,accent}){
  return(<div style={{background:C.surface,borderRadius:10,padding:'20px 24px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`,animation:'slideUp 500ms ease'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span><span style={{fontSize:20}}>{icon}</span></div>
    <div style={{fontSize:28,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{value}</div>
    {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:6}}>{sub}</div>}
  </div>);
}

/* ─── Pages ─── */
function DashboardPage(){
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>통합 대시보드</h2>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
      <KpiCard icon="🍚" label="오늘 급식 인원" value="82명" sub="아침 78 · 점심 82 · 저녁 80"/>
      <KpiCard icon="✅" label="위생 점검" value="5/7" sub="미완료 2건" accent={C.warning}/>
      <KpiCard icon="🏥" label="어르신 현원" value="90명" sub="입소 90 · 퇴소 0"/>
      <KpiCard icon="📋" label="기관 평가 점수" value="92점" sub="이번 분기" accent={C.success}/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20,marginBottom:24}}>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>월별 급식 인원 추이</div>
        <ResponsiveContainer width="100%" height={200}>
          <AreaChart data={MEAL_CHART}>
            <defs><linearGradient id="mg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.primary} stopOpacity={.15}/><stop offset="95%" stopColor={C.primary} stopOpacity={0}/></linearGradient></defs>
            <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/><XAxis dataKey="month" tick={{fontSize:12,fill:C.textMuted}}/><YAxis tick={{fontSize:12,fill:C.textMuted}}/>
            <Tooltip contentStyle={{borderRadius:8,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}}/><Area type="monotone" dataKey="count" stroke={C.primary} fill="url(#mg)" strokeWidth={2} name="급식 인원"/>
          </AreaChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>식이 유형 분포</div>
        <ResponsiveContainer width="100%" height={160}>
          <PieChart><Pie data={DIET_PIE} cx="50%" cy="50%" innerRadius={45} outerRadius={65} dataKey="value" paddingAngle={3}>{DIET_PIE.map((e,i)=><Cell key={i} fill={e.color}/>)}</Pie><Tooltip/></PieChart>
        </ResponsiveContainer>
        <div style={{display:'flex',flexWrap:'wrap',justifyContent:'center',gap:10,marginTop:8}}>
          {DIET_PIE.map(d=><div key={d.name} style={{display:'flex',alignItems:'center',gap:4,fontSize:11}}><div style={{width:8,height:8,borderRadius:'50%',background:d.color}}/>{d.name} {d.value}명</div>)}
        </div>
      </div>
    </div>
    <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
      <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>주간 위생 점검 점수</div>
      <ResponsiveContainer width="100%" height={180}>
        <BarChart data={HYGIENE_CHART}><CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/><XAxis dataKey="week" tick={{fontSize:12,fill:C.textMuted}}/><YAxis domain={[80,100]} tick={{fontSize:12,fill:C.textMuted}}/><Tooltip/><Bar dataKey="score" fill={C.success} radius={[4,4,0,0]} name="점수"/></BarChart>
      </ResponsiveContainer>

}

        <tbody>{WEEK_MEALS.map(m=><tr key={m.day} style={{borderBottom:`1px solid ${C.border}`}}>

function HygienePage(){
  const completed=HYGIENE_ITEMS.filter(h=>h.status==='완료').length;
  const total=HYGIENE_ITEMS.length;
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>위생 점검</h2>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:20}}>
      <KpiCard icon="✅" label="점검 완료" value={`${completed}/${total}`} accent={C.success}/>
      <KpiCard icon="❌" label="미완료" value={total-completed} accent={C.danger}/>
      <KpiCard icon="📷" label="사진 첨부" value={HYGIENE_ITEMS.filter(h=>h.photo).length} sub="증빙 사진"/>
    </div>
    <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`,marginBottom:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{fontSize:15,fontWeight:700}}>오늘의 위생 점검 체크리스트</span>
        <span style={{padding:'4px 12px',borderRadius:6,background:completed===total?'#ECFDF5':'#FEF3C7',color:completed===total?C.success:C.warning,fontSize:12,fontWeight:600}}>{Math.round(completed/total*100)}% 완료</span>
      </div>
      <div style={{height:8,background:'#E2E8F0',borderRadius:4,marginBottom:16}}>
        <div style={{width:`${completed/total*100}%`,height:'100%',borderRadius:4,background:C.success}}/>
      </div>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
          {['구역','점검 항목','상태','담당자','시간','사진'].map(h=><th key={h} style={{padding:'8px 12px',textAlign:'left',color:C.textMuted,fontWeight:600,fontSize:12}}>{h}</th>)}
        </tr></thead>
        <tbody>{HYGIENE_ITEMS.map(h=><tr key={h.id} style={{borderBottom:`1px solid ${C.border}`,background:h.status==='미완료'?'#FEF2F208':'transparent'}}>
          <td style={{padding:'10px 12px'}}><span style={{padding:'3px 8px',borderRadius:4,background:'#F1F5F9',fontSize:11,fontWeight:600}}>{h.category}</span></td>
          <td style={{padding:'10px 12px',fontWeight:500}}>{h.item}</td>
          <td style={{padding:'10px 12px'}}><Badge text={h.status}/></td>
          <td style={{padding:'10px 12px',color:C.textMuted}}>{h.checker}</td>
          <td style={{padding:'10px 12px',color:C.textMuted}}>{h.time}</td>
          <td style={{padding:'10px 12px'}}>{h.photo?<span style={{color:C.success}}>📷</span>:<span style={{color:C.textMuted}}>—</span>}</td>
        </tr>)}</tbody>
      </table>
    </div>
    <button style={{padding:'10px 20px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:14,fontWeight:600,cursor:'pointer'}}>📷 사진 업로드</button>
  </div>);
}

    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
      <KpiCard icon="📊" label="종합 점수" value={`${avgScore}점`} accent={C.success}/>
      <KpiCard icon="🍚" label="급식 관리" value="92점"/>
      <KpiCard icon="🧹" label="위생 관리" value="88점" accent={C.warning}/>
      <KpiCard icon="🏥" label="안전 관리" value="90점"/>
    </div>
    <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
      <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>평가 항목별 실적</div>
      {EVAL_ITEMS.map(e=>(
        <div key={e.category} style={{marginBottom:16,padding:16,background:'#F8FAFC',borderRadius:8,border:`1px solid ${C.border}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontSize:14,fontWeight:700}}>{e.category}</span>
            <span style={{fontSize:18,fontWeight:800,color:e.score>=90?C.success:e.score>=85?C.warning:C.danger}}>{e.score}점</span>
          </div>
          <div style={{height:8,background:'#E2E8F0',borderRadius:4,marginBottom:8}}>
            <div style={{width:`${e.score}%`,height:'100%',borderRadius:4,background:e.score>=90?C.success:e.score>=85?C.warning:C.danger}}/>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {e.items.map(i=><span key={i} style={{padding:'3px 10px',borderRadius:4,background:'#EFF6FF',fontSize:11,color:C.primary}}>{i}</span>)}
          </div>
        </div>
      ))}
    </div>
  </div>);
}

function StatisticsPage(){
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>통계 리포트</h2>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>월별 급식 건수</div>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={STATS}><CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/><XAxis dataKey="month" tick={{fontSize:12,fill:C.textMuted}}/><YAxis tick={{fontSize:12,fill:C.textMuted}}/><Tooltip/><Bar dataKey="meals" fill={C.primary} radius={[4,4,0,0]} name="급식 건수"/></BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>월별 평가 점수 추이</div>
        <ResponsiveContainer width="100%" height={200}>
          <LineChart data={STATS}><CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/><XAxis dataKey="month" tick={{fontSize:12,fill:C.textMuted}}/><YAxis domain={[80,100]} tick={{fontSize:12,fill:C.textMuted}}/><Tooltip/><Line type="monotone" dataKey="eval" stroke={C.success} strokeWidth={2} dot={{fill:C.success,r:4}} name="평가 점수"/></LineChart>
        </ResponsiveContainer>
      </div>
    </div>
  </div>);
}

function SettingsPage(){
  return(<div style={{animation:'fadeIn 400ms ease'}}>
    <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>시스템 설정</h2>
    <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:20}}>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>시설 정보</div>
        {[['시설명','행복요양원'],['시설유형','노인요양시설'],['정원','100명'],['현원','90명'],['관리자','김미영']].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
            <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600}}>{v}</span></div>
        ))}
      </div>
      <div style={{background:C.surface,borderRadius:10,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>알림 설정</div>
        {[['위생 미점검 알림','09:00 자동 알림'],['식단 미등록 알림','전일 18:00'],['기관 평가 D-30 알림','켜짐'],['식이 변경 알림','즉시 알림']].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
            <span style={{color:C.textMuted}}>{k}</span><span style={{fontWeight:600,color:C.primary}}>{v}</span></div>
        ))}
      </div>
    </div>
  </div>);
}

/* ─── App Shell ─── */
function App(){
  const[page,setPage]=useState('통합 대시보드');
  const menus=[{name:'통합 대시보드',icon:'📊'},{name:'식단 관리',icon:'🍚'},{name:'위생 점검',icon:'🧹'},{name:'평가 자료',icon:'📋'},{name:'통계 리포트',icon:'📈'},{name:'시스템 설정',icon:'⚙️'}];
  const renderPage=()=>{switch(page){case '통합 대시보드':return <DashboardPage/>;case '식단 관리':return <MealPlanPage/>;case '위생 점검':return <HygienePage/>;case '평가 자료':return <EvaluationPage/>;case '통계 리포트':return <StatisticsPage/>;case '시스템 설정':return <SettingsPage/>;default:return <DashboardPage/>;}};

  return(<div style={{display:'flex',height:'100vh'}}>
    <div style={{width:260,background:C.sidebarBg,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column'}}>
      <div style={{padding:'20px 24px',borderBottom:'1px solid rgba(255,255,255,0.1)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🏥</div>
          <div><div style={{fontSize:16,fontWeight:800,color:'#fff'}}>케어밀</div><div style={{fontSize:11,color:C.sidebarText}}>요양시설 통합 관리</div></div>
        </div>
      </div>
      <nav style={{flex:1,padding:'12px 14px'}}>
        {menus.map(m=>(<button key={m.name} onClick={()=>setPage(m.name)} title={m.name} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'12px 14px',borderRadius:10,border:'none',background:page===m.name?C.sidebarActive:'transparent',color:page===m.name?'#fff':C.sidebarText,fontSize:14,fontWeight:page===m.name?600:400,cursor:'pointer',marginBottom:4,transition:'all 150ms',textAlign:'left'}}><span style={{fontSize:18}}>{m.icon}</span>{m.name}</button>))}
      </nav>
      <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.1)'}}>
        <div style={{fontSize:11,color:C.sidebarText}}>행복요양원</div>
        <div style={{fontSize:13,fontWeight:600,color:'#fff'}}>현원 90명 · 정원 100명</div>
      </div>
    </div>
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'14px 28px',borderBottom:`1px solid ${C.border}`,background:C.surface,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:13,fontWeight:600}}>{page}</span>
        <span style={{padding:'4px 10px',borderRadius:6,background:'#ECFDF5',color:C.success,fontSize:12,fontWeight:600}}>● 시스템 정상</span>
      </div>
      <div style={{flex:1,overflow:'auto',padding:28}}>{renderPage()}</div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
