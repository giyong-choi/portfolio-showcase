<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#F8FAFC;color:#0F172A}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const {BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,LineChart,Line,AreaChart,Area}=Recharts;

const C={
  primary:'#334155',secondary:'#0F172A',accent:'#06B6D4',
  bg:'#F8FAFC',surface:'#FFFFFF',border:'#E2E8F0',
  text:'#0F172A',textLight:'#64748B',
  success:'#059669',warning:'#D97706',danger:'#EF4444',
  gradient:'linear-gradient(135deg,#334155,#06B6D4)',
};

/* ── 더미 데이터 ── */
const SPACE_TYPES=['오피스','팝업스토어','촬영 스튜디오','세미나실','코워킹','갤러리'];
const AREAS=['강남','홍대','성수','합정','이태원','여의도','판교','삼성','역삼','신사'];
const PURPOSES=['미팅','촬영','전시','강연','워크숍','파티'];

function genSpaces(n){
  const arr=[];
  for(let i=1;i<=n;i++){
    const type=SPACE_TYPES[i%SPACE_TYPES.length];
    const area=AREAS[i%AREAS.length];
    arr.push({
      id:i,name:`${area} ${type} "${['루미에르','아트리움','더스페이스','스카이라운지','그린룸','블루홀'][i%6]}"`,
      type,area,size:Math.floor(Math.random()*80+20),
      pricePerHour:Math.floor(Math.random()*50+10)*1000,
      pricePerDay:Math.floor(Math.random()*500+100)*1000,
      capacity:Math.floor(Math.random()*30+5),
      facilities:['와이파이','에어컨','주차','프로젝터','음향시설','냉장고'].slice(0,Math.floor(Math.random()*4+2)),
      rating:+(Math.random()*1.5+3.5).toFixed(1),
      reviews:Math.floor(Math.random()*50+5),
      image:`https://placehold.co/400x280/${C.primary.slice(1)}/fff?text=Space+${i}`,
      status:['즉시 가능','예약 중','오늘 마감'][i%3],
      host:['김서연','이준호','박하나','정수민','최예린','강유진'][i%6],
      lat:37.5+Math.random()*0.04,lng:127.0+Math.random()*0.04,
    });
  }
  return arr;
}
const SPACES=genSpaces(18);

const BOOKINGS=[
  {id:1,space:'강남 오피스 "루미에르"',guest:'(주)테크스타트',date:'2025.03.20',time:'09:00-18:00',people:12,status:'확정',amount:'450,000원'},
  {id:2,space:'홍대 팝업스토어 "아트리움"',guest:'블루마케팅',date:'2025.03.22',time:'10:00-20:00',people:0,status:'대기',amount:'800,000원'},
  {id:3,space:'성수 촬영 스튜디오 "더스페이스"',guest:'프레임워크 스튜디오',date:'2025.03.25',time:'13:00-17:00',people:6,status:'확정',amount:'280,000원'},
  {id:4,space:'합정 세미나실 "스카이라운지"',guest:'(주)에듀플러스',date:'2025.03.28',time:'14:00-17:00',people:25,status:'요청',amount:'180,000원'},
  {id:5,space:'이태원 갤러리 "블루홀"',guest:'아트콜렉티브',date:'2025.04.01',time:'11:00-19:00',people:0,status:'확정',amount:'1,200,000원'},
  {id:6,space:'여의도 코워킹 "그린룸"',guest:'디자인랩',date:'2025.04.03',time:'09:00-13:00',people:8,status:'대기',amount:'120,000원'},
];

const MONTHLY_STATS=[
  {month:'10월',예약:42,매출:1850},{month:'11월',예약:56,매출:2400},
  {month:'12월',예약:38,매출:1620},{month:'1월',예약:61,매출:2800},
  {month:'2월',예약:53,매출:2350},{month:'3월',예약:68,매출:3100},
];

const CALENDAR_EVENTS=[
  {day:18,title:'촬영 스튜디오',time:'09-12',color:C.accent},
  {day:20,title:'오피스 대관',time:'09-18',color:C.primary},
  {day:22,title:'팝업스토어',time:'10-20',color:'#7C3AED'},
  {day:25,title:'세미나실',time:'14-17',color:C.success},
  {day:28,title:'갤러리 전시',time:'11-19',color:C.warning},
];

/* ── 유틸 ── */
function Badge({text}){
  const colors={'즉시 가능':{bg:'#ECFDF5',text:'#059669'},'예약 중':{bg:'#FEF3C7',text:'#D97706'},'오늘 마감':{bg:'#FEE2E2',text:'#EF4444'},'확정':{bg:'#ECFDF5',text:'#059669'},'대기':{bg:'#FEF3C7',text:'#D97706'},'요청':{bg:'#EFF6FF',text:'#3B82F6'}};
  const c=colors[text]||{bg:'#F3F4F6',text:'#6B7280'};
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,.2)',fontSize:14}}>{message}</div>;
}

function Modal({title,onClose,children,width=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.4)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:'#fff',borderRadius:16,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,.15)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:'1px solid #E2E8F0'}}>
          <h3 style={{fontSize:18,fontWeight:800}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

/* ── Drawer (슬라이드오버) ── */
function Drawer({item,onClose,setToast}){
  if(!item)return null;
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:200,animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:480,background:C.surface,boxShadow:'-8px 0 40px rgba(0,0,0,.15)',zIndex:201,overflowY:'auto',padding:28,animation:'slideInRight 200ms ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h3 style={{fontSize:18,fontWeight:800}}>공간 상세</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{height:200,borderRadius:12,background:`linear-gradient(135deg,${C.primary}20,${C.accent}30)`,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20}}>
          <span style={{fontSize:56}}>🏢</span>
        </div>
        <h2 style={{fontSize:20,fontWeight:800,marginBottom:4}}>{item.name}</h2>
        <div style={{fontSize:14,color:C.textLight,marginBottom:16}}>{item.area} · {item.type} · {item.size}㎡</div>
        <div style={{display:'flex',gap:6,marginBottom:16}}>
          <Badge text={item.status}/>
          <span style={{fontSize:12,color:C.warning,fontWeight:600}}>★ {item.rating} ({item.reviews})</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
          {[{l:'시간당',v:`${(item.pricePerHour/1000).toFixed(0)},000원`},{l:'일 대관',v:`${(item.pricePerDay/1000).toFixed(0)},000원`},{l:'수용 인원',v:`최대 ${item.capacity}명`},{l:'호스트',v:item.host}].map(d=>(
            <div key={d.l} style={{padding:12,background:'#F8FAFC',borderRadius:10}}>
              <div style={{fontSize:11,color:C.textLight,marginBottom:2}}>{d.l}</div>
              <div style={{fontSize:14,fontWeight:600}}>{d.v}</div>
            </div>
          ))}
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>시설</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {item.facilities.map(f=><span key={f} style={{padding:'4px 10px',borderRadius:20,background:'#F1F5F9',fontSize:12,color:C.textLight}}>{f}</span>)}
          </div>
        </div>
        {/* 예약 캘린더 미니 */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>예약 가능 일정</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
            {['월','화','수','목','금','토','일'].map(d=><div key={d} style={{textAlign:'center',fontSize:11,color:C.textLight,fontWeight:600,padding:4}}>{d}</div>)}
            {[...Array(31)].map((_,i)=>{
              const day=i+1;
              const hasEvent=CALENDAR_EVENTS.some(e=>e.day===day);
              return <div key={i} style={{textAlign:'center',fontSize:12,padding:6,borderRadius:6,background:hasEvent?`${C.accent}15`:'transparent',color:hasEvent?C.accent:C.text,fontWeight:hasEvent?600:400,cursor:'pointer'}}>{day}</div>;
            })}
          </div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={()=>{onClose();setToast('예약 문의가 접수되었습니다')}} style={{flex:1,padding:'12px 0',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>예약 문의</button>
          <button onClick={()=>{onClose();setToast('찜 목록에 추가되었습니다')}} style={{padding:'12px 16px',borderRadius:10,border:`1px solid ${C.border}`,background:'#fff',fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>♡</button>
        </div>
      </div>
    </>
  );
}

/* ── 탑 네비게이션 ── */
const TABS=[
  {id:'home',label:'공간 탐색 메인',icon:'🏠'},
  {id:'space-detail',label:'공간 상세',icon:'📋'},
  {id:'booking',label:'예약 문의',icon:'📅'},
  {id:'host-dashboard',label:'호스트 관리',icon:'👤'},
  {id:'mypage',label:'마이페이지',icon:'⚙️'},

function TopNav({tab,setTab}){
  return(

      </div>
      {TABS.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{

/* ── 히어로 배너 ── */

/* ══════════════ 페이지: 공간 탐색 메인 ══════════════ */
function HomePage({setDrawer}){
  const[filter,setFilter]=useState({type:'전체',area:'전체'});
  const filtered=SPACES.filter(s=>{
    if(filter.type!=='전체'&&s.type!==filter.type)return false;
    if(filter.area!=='전체'&&s.area!==filter.area)return false;
    return true;
  });

  return(
    <div key="home" style={{animation:'fadeIn 300ms ease'}}>
      {/* 필터 바 */}
      <div style={{display:'flex',gap:10,marginBottom:24,flexWrap:'wrap'}}>
        {[{key:'type',opts:['전체',...SPACE_TYPES]},{key:'area',opts:['전체',...AREAS.slice(0,6)]}].map(f=>(
          <select key={f.key} value={filter[f.key]} onChange={e=>setFilter({...filter,[f.key]:e.target.value})} style={{padding:'8px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',outline:'none',background:'#fff'}}>
            {f.opts.map(o=><option key={o}>{o}</option>)}
          </select>
        ))}
        <div style={{flex:1}}/>
        <span style={{fontSize:13,color:C.textLight,alignSelf:'center'}}>검색 결과: {filtered.length}개</span>
      </div>

      {/* 지도 시뮬레이션 + 공간 카드 그리드 */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:28}}>
        {/* 지도 */}
        <div style={{borderRadius:16,overflow:'hidden',boxShadow:'0 4px 16px rgba(0,0,0,.10)',position:'relative',minHeight:420,background:'linear-gradient(135deg,#E2E8F0 0%,#CBD5E1 50%,#E2E8F0 100%)'}}>
          {[...Array(6)].map((_,i)=><div key={`h${i}`} style={{position:'absolute',left:0,right:0,top:`${(i+1)*16}%`,height:1,background:'rgba(51,65,85,0.05)'}}/>)}
          {[...Array(6)].map((_,i)=><div key={`v${i}`} style={{position:'absolute',top:0,bottom:0,left:`${(i+1)*16}%`,width:1,background:'rgba(51,65,85,0.05)'}}/>)}
          {filtered.slice(0,10).map((s,i)=>{
            const top=10+((s.lat-37.5)/0.04)*75;
            const left=5+((s.lng-127)/0.04)*85;
            return(
              <div key={s.id} onClick={()=>setDrawer(s)} style={{position:'absolute',top:`${top}%`,left:`${left}%`,cursor:'pointer',zIndex:10,animation:`slideUp 400ms ease ${i*60}ms both`}}>
                <div style={{background:C.surface,borderRadius:20,padding:'4px 10px',boxShadow:'0 2px 8px rgba(0,0,0,.15)',fontSize:11,fontWeight:700,whiteSpace:'nowrap',color:C.primary,transition:'transform 200ms'}}
                  onMouseEnter={e=>e.currentTarget.style.transform='scale(1.15)'}
                  onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
                  {(s.pricePerHour/1000).toFixed(0)}천원/h
                </div>
              </div>
            );
          })}
          <div style={{position:'absolute',bottom:12,left:12,background:'rgba(255,255,255,.9)',padding:'6px 12px',borderRadius:8,fontSize:11,color:C.textLight}}>📍 서울특별시</div>
        </div>

        {/* 카드 그리드 */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,alignContent:'start'}}>
          {filtered.slice(0,6).map((s,i)=>(
            <div key={s.id} onClick={()=>setDrawer(s)} style={{
              background:C.surface,borderRadius:16,overflow:'hidden',boxShadow:'0 4px 16px rgba(0,0,0,.10)',cursor:'pointer',
              transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`,

        </div>
      </div>
    </div>
  );
}

/* ══════════════ App ══════════════ */
function App(){
  const[tab,setTab]=useState('home');
  const[drawer,setDrawer]=useState(null);
  const[toast,setToast]=useState(null);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  if(loading){
    return(
      <div>
        <div style={{height:56,background:C.surface,borderBottom:`1px solid ${C.border}`}}/>
        <div style={{height:120,background:C.gradient}}/>
        <div style={{padding:24,display:'flex',flexDirection:'column',gap:16}}>
          {[...Array(3)].map((_,i)=><div key={i} style={{height:140,borderRadius:16,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      <TopNav tab={tab} setTab={setTab}/>
      <HeroBanner tab={tab}/>
      <main style={{padding:'24px 32px'}}>
        {tab==='home'&&<HomePage setDrawer={setDrawer}/>}
        {tab==='space-detail'&&<SpaceDetailPage setDrawer={setDrawer} setToast={setToast}/>}
        {tab==='booking'&&<BookingPage setToast={setToast}/>}
        {tab==='host-dashboard'&&<HostDashboardPage setToast={setToast}/>}
        {tab==='mypage'&&<MyPage setToast={setToast}/>}
      </main>
      <Drawer item={drawer} onClose={()=>setDrawer(null)} setToast={setToast}/>
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
