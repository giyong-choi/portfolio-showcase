const LOCATIONS=['강남역','홍대입구','명동','잠실','여의도','판교','삼성동','역삼동','신촌','합정'];

const TARGET_GROUPS=['직장인','대학생','가족','MZ세대','시니어'];

function genMedia(n){
  const arr=[];
  for(let i=1;i<=n;i++){
    const type=MEDIA_TYPES[i%MEDIA_TYPES.length];
    const loc=LOCATIONS[i%LOCATIONS.length];
    arr.push({
      id:i,name:`${loc} ${type} #${i}`,type,location:loc,
      category:CATEGORIES[i%2],indoor:INDOOR_OUTDOOR[i%2],
      target:TARGET_GROUPS[i%TARGET_GROUPS.length],
      price:Math.floor(Math.random()*5000+500)*1000,
      width:Math.floor(Math.random()*10+2),height:Math.floor(Math.random()*5+1),
      traffic:Math.floor(Math.random()*50000+10000),
      operatingHours:'06:00 - 24:00',
      status:['운영중','점검중','예약가능'][i%3],
      image:`https://placehold.co/400x250/${C.primary.slice(1)}/fff?text=Media+${i}`,
      lat:37.5+Math.random()*0.05,lng:127.0+Math.random()*0.05,
    });
  }
  return arr;
}

function Badge({text,color}){
  const colors={
    '운영중':{bg:'#ECFDF5',text:'#059669'},'점검중':{bg:'#FEF3C7',text:'#D97706'},
    '예약가능':{bg:'#EFF6FF',text:'#0066CC'},'접수':{bg:'#F3F4F6',text:'#6B7280'},
    '검토중':{bg:'#FEF3C7',text:'#D97706'},'견적발송':{bg:'#EFF6FF',text:'#0066CC'},
    '계약진행':{bg:'#ECFDF5',text:'#059669'},
  };
  const c=colors[text]||{bg:'#F3F4F6',text:'#6B7280'};
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,.2)',fontSize:14}}>{message}</div>;
}

function Modal({title,onClose,children,width=560}){
  return(

  );
}

    <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,.08)',animation:`slideUp 400ms ease ${index*80}ms both`,transition:'all 200ms',cursor:'default'}}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <div style={{fontSize:12,color:C.textLight,marginBottom:8}}>{label}</div>
          <div style={{fontSize:28,fontWeight:700,color:C.text}}><CountUp end={value} suffix={suffix}/></div>
          <div style={{fontSize:12,color:color||C.success,marginTop:6}}>{sub}</div>
        </div>
        <div style={{width:44,height:44,borderRadius:12,background:`${(color||C.primary)}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{icon}</div>
      </div>
    </div>
  );

              <div style={{fontSize:36,marginBottom:8}}>📂</div>
              <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>엑셀 파일을 드래그하거나 클릭하여 업로드</div>
              <div style={{fontSize:12,color:C.textLight}}>xlsx, xls 형식 지원 · 최대 10MB</div>
              <input type="file" accept=".xlsx,.xls" style={{display:'none'}}/>
            </div>
            <div style={{background:'#F8FAFC',borderRadius:8,padding:12}}>
              <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>업로드 가이드</div>
              <ul style={{fontSize:12,color:C.textLight,paddingLeft:16,display:'flex',flexDirection:'column',gap:4}}>
                <li>필수 컬럼: 매체명, 위치, 유형, 카테고리, 월단가</li>
                <li>선택 컬럼: 유동인구, 운영시간, 규격</li>
                <li>한 번에 최대 500건까지 업로드 가능</li>
              </ul>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button onClick={()=>setUploadModal(false)} style={{padding:'10px 20px',borderRadius:8,border:`1px solid ${C.border}`,background:'#fff',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>취소</button>
              <button onClick={()=>{setUploadModal(false);setToast('24개 매체 데이터가 업로드되었습니다')}} style={{padding:'10px 20px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>업로드</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ══════════════ 페이지: 시스템 설정 ══════════════ */
function SettingsPage({setToast}){
  return(
    <div key="settings" style={{animation:'fadeIn 300ms ease',maxWidth:700}}>
      <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,.08)',overflow:'hidden'}}>
        <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:16,fontWeight:700}}>시스템 설정</h3>
        </div>
        <div style={{padding:24,display:'flex',flexDirection:'column',gap:20}}>
          {[{l:'회사명',v:'애드스팟',type:'text'},{l:'관리자 이메일',v:'admin@adspot.kr',type:'email'},{l:'알림 수신',v:'이메일 + 카카오톡',type:'select'}].map(f=>(
            <div key={f.l}>
              <label style={{fontSize:13,fontWeight:600,marginBottom:6,display:'block'}}>{f.l}</label>
              {f.type==='select'?
                <select defaultValue={f.v} style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none'}}>
                  <option>이메일</option><option>카카오톡</option><option>이메일 + 카카오톡</option>
                </select>
              :
                <input defaultValue={f.v} type={f.type} style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none'}}/>
              }
            </div>
          ))}
          <div>
            <label style={{fontSize:13,fontWeight:600,marginBottom:6,display:'block'}}>문의 자동 응답 메시지</label>
            <textarea rows={4} defaultValue="안녕하세요, 매체 문의를 접수해주셔서 감사합니다. 영업일 기준 1~2일 내 담당자가 연락드리겠습니다." style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none',resize:'vertical'}}/>
          </div>
          <button onClick={()=>setToast('설정이 저장되었습니다')} style={{alignSelf:'flex-end',padding:'10px 24px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>저장</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════ App ══════════════ */
function App(){
  const[page,setPage]=useState('dashboard');
  const[toast,setToast]=useState(null);
  const[loading,setLoading]=useState(true);
  const[mediaModal,setMediaModal]=useState(null);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  if(loading){
    return(
      <div style={{display:'flex',minHeight:'100vh'}}>
        <aside style={{width:260,background:C.sidebarBg,flexShrink:0}}/>
        <div style={{flex:1,padding:24,display:'flex',flexDirection:'column',gap:16}}>
          {[...Array(4)].map((_,i)=>(
            <div key={i} style={{height:120,borderRadius:12,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>
          ))}
        </div>
      </div>
    );
  }

  const titles={'dashboard':'지도 기반 매체 검색','media-detail':'매체 상세 팝업','cart':'장바구니 문의','admin':'관리자 대시보드','settings':'시스템 설정'};

  const onMediaClick=(media)=>{setMediaModal(media)};

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar page={page} setPage={setPage}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar title={titles[page]}/>
        <main style={{flex:1,overflow:'auto',padding:24}}>
          {page==='dashboard'&&<DashboardPage onMediaClick={onMediaClick}/>}
          {page==='media-detail'&&<MediaDetailPage setToast={setToast}/>}
          {page==='cart'&&<CartPage setToast={setToast}/>}
          {page==='admin'&&<AdminPage setToast={setToast}/>}
          {page==='settings'&&<SettingsPage setToast={setToast}/>}
        </main>
      </div>

      {/* 매체 상세 모달 (지도에서 클릭) */}
      {mediaModal&&(
        <Modal title="매체 상세 정보" onClose={()=>setMediaModal(null)} width={520}>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div style={{height:160,borderRadius:8,background:`linear-gradient(135deg,${C.primary}20,${C.accent}20)`,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span style={{fontSize:48}}>📍</span>
            </div>
            <div>
              <h3 style={{fontSize:18,fontWeight:700}}>{mediaModal.name}</h3>
              <div style={{fontSize:13,color:C.textLight,marginTop:4}}>{mediaModal.location} · {mediaModal.type}</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
              {[{l:'월 단가',v:`${(mediaModal.price/10000).toFixed(0)}만원`},{l:'유동인구',v:`${mediaModal.traffic.toLocaleString()}명/일`},{l:'상태',v:mediaModal.status}].map(d=>(
                <div key={d.l} style={{padding:10,background:'#F8FAFC',borderRadius:8,textAlign:'center'}}>
                  <div style={{fontSize:11,color:C.textLight}}>{d.l}</div>
                  <div style={{fontSize:14,fontWeight:600,marginTop:2}}>{d.v}</div>
                </div>
              ))}
            </div>
            <button onClick={()=>{setMediaModal(null);setToast('장바구니에 추가되었습니다')}} style={{padding:'12px 0',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit',width:'100%'}}>🛒 장바구니에 담기</button>
          </div>
        </Modal>
      )}

      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
