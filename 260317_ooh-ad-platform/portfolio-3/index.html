      id:i,name:`${locs[i%10]} ${MEDIA_TYPES[i%6]} #${i}`,
      type:MEDIA_TYPES[i%6],location:locs[i%10],

    });
  }
  return arr;
}

/* ── 유틸 ── */
function Badge({text}){
  const colors={'집행중':{bg:'#ECFDF5',text:C.success},'대기':{bg:'#FEF3C7',text:C.warning},'점검':{bg:'#FEE2E2',text:C.danger},'완료':{bg:'#F3F4F6',text:C.textLight},
    '진행중':{bg:'#ECFDF5',text:C.success},'준비중':{bg:'#EFF6FF',text:C.blue},'체결 완료':{bg:'#ECFDF5',text:C.success},'서명 대기':{bg:'#FEF3C7',text:C.warning},'검토중':{bg:'#EFF6FF',text:C.blue},
    '정산 완료':{bg:'#ECFDF5',text:C.success},'정산 예정':{bg:'#FEF3C7',text:C.warning},
  };
  const c=colors[text]||{bg:'#F3F4F6',text:C.textLight};
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,.2)',fontSize:14}}>{message}</div>;
}

function Modal({title,onClose,children,width=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>

        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>

  );
}

          <h3 style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:16}}>월별 집행액 추이</h3>
          <ResponsiveContainer width="100%" height={220}>
            <AreaChart data={MONTHLY_DATA}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/>
              <XAxis dataKey="month" tick={{fontSize:11}} stroke="#9CA3AF"/>
              <YAxis tick={{fontSize:11}} stroke="#9CA3AF" tickFormatter={v=>`${v}만`}/>
              <Tooltip contentStyle={{borderRadius:10,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,.1)'}} formatter={v=>[`${v}만원`,'매출']}/>

          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

/* ══════════════ 페이지: 매체 탐색 및 필터 ══════════════ */
function MediaMapPage({selected,setSelected}){
  const[filter,setFilter]=useState({type:'전체',status:'전체'});

          <span style={{flex:1}}/>
          <span style={{fontSize:11,color:C.textLight,alignSelf:'center'}}>{filtered.length}개</span>

          </div>
        ):(
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:C.textLight,fontSize:14}}>
            좌측 목록에서 계약을 선택하세요
          </div>
        )}
      </div>

      {contractGenModal&&(
        <Modal title="계약서 자동 생성" onClose={()=>setContractGenModal(false)} width={500}>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div><label style={{fontSize:13,fontWeight:600,marginBottom:4,display:'block'}}>캠페인 선택</label>
              <select style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit'}}>
                {CAMPAIGNS.map(c=><option key={c.id}>{c.name} - {c.client}</option>)}
              </select>
            </div>
            <div><label style={{fontSize:13,fontWeight:600,marginBottom:4,display:'block'}}>특약사항</label>
              <textarea rows={3} style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',resize:'vertical',outline:'none'}} placeholder="계약서에 포함할 특약사항"/>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button onClick={()=>setContractGenModal(false)} style={{padding:'10px 20px',borderRadius:10,border:`1px solid ${C.border}`,background:'#fff',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>취소</button>
              <button onClick={()=>{setContractGenModal(false);setToast('계약서 PDF가 생성되었습니다')}} style={{padding:'10px 24px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>PDF 생성</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ══════════════ 페이지: 성과 분석 ══════════════ */
function AnalyticsPage(){
  return(
    <div key="analytics" style={{animation:'fadeIn 300ms ease',padding:20}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
        <div style={{background:C.surface,borderRadius:20,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:16}}>캠페인별 집행액</h3>
          <ResponsiveContainer width="100%" height={240}>
            <BarChart data={CAMPAIGNS.map(c=>({name:c.name.slice(0,8),예산:parseInt(c.budget)*100}))}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/>
              <XAxis dataKey="name" tick={{fontSize:11}} stroke="#9CA3AF"/>
              <YAxis tick={{fontSize:11}} stroke="#9CA3AF"/>
              <Tooltip contentStyle={{borderRadius:10,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,.1)'}}/>
              <Bar dataKey="예산" fill={C.primary} radius={[6,6,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:20,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:16}}>월별 캠페인 추이</h3>
          <ResponsiveContainer width="100%" height={240}>
            <LineChart data={MONTHLY_DATA}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/>
              <XAxis dataKey="month" tick={{fontSize:11}} stroke="#9CA3AF"/>
              <YAxis tick={{fontSize:11}} stroke="#9CA3AF"/>
              <Tooltip contentStyle={{borderRadius:10,border:'none',boxShadow:'0 4px 12px rgba(0,0,0,.1)'}}/>
              <Line type="monotone" dataKey="캠페인" stroke={C.accent} strokeWidth={2} dot={{fill:C.accent,r:4}}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:20,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:16}}>매체별 집행 현황</h3>
        {MEDIA_ITEMS.filter(m=>m.status==='집행중').slice(0,6).map((m,i)=>(
          <div key={m.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
            <span style={{width:140,fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.name}</span>
            <div style={{flex:1,height:6,background:'#E5E7EB',borderRadius:3}}>
              <div style={{height:'100%',width:`${50+i*8}%`,background:C.primary,borderRadius:3,animation:`barGrow 800ms ease ${i*100}ms both`,'--target-width':`${50+i*8}%`}}/>
            </div>
            <span style={{fontSize:12,fontWeight:600,width:60,textAlign:'right'}}>{50+i*8}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════════ App ══════════════ */
function App(){
  const[section,setSection]=useState('dashboard');
  const[tab,setTab]=useState(0);
  const[selected,setSelected]=useState(null);
  const[toast,setToast]=useState(null);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);
  useEffect(()=>{setTab(0);setSelected(null)},[section]);

  if(loading){
    return(
      <div style={{display:'flex',minHeight:'100vh'}}>
        <div style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`}}/>
        <div style={{flex:1,padding:20,display:'flex',flexDirection:'column',gap:16}}>
          {[...Array(4)].map((_,i)=><div key={i} style={{height:100,borderRadius:20,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}
        </div>
      </div>
    );
  }

  const needsMasterDetail=['media-map','campaign','contract'].includes(section);

  return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      <SideNav section={section} setSection={setSection}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <AppBar section={section}/>
        <TabStrip section={section} tab={tab} setTab={setTab}/>
        {section==='dashboard'&&<DashboardPage/>}
        {section==='media-map'&&<MediaMapPage selected={selected} setSelected={setSelected}/>}
        {section==='campaign'&&<CampaignPage selected={selected} setSelected={setSelected} setToast={setToast}/>}
        {section==='contract'&&<ContractPage selected={selected} setSelected={setSelected} setToast={setToast}/>}
        {section==='analytics'&&<AnalyticsPage/>}
      </div>
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
