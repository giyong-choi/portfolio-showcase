function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);

}

function Badge({label,color}){
  return <span style={{display:'inline-block',padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:600,background:`${color}18`,color}}>{label}</span>;
}

function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{if(typeof end==='string'){setVal(end);return}let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span>{typeof val==='number'?val.toLocaleString():val}{suffix}</span>;
}

function Skeleton(){
  return <div style={{padding:32}}>{[...Array(3)].map((_,i)=><div key={i} style={{height:140,borderRadius:16,marginBottom:16,background:'linear-gradient(90deg,#E0F2FE 25%,#BAE6FD 50%,#E0F2FE 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}</div>;
}

/* ═══ Inquiry Management ═══ */
function InquiryPage({showToast}){
  const [drawer,setDrawer]=useState(null);

  const statuses=['전체','접수','확인','답변','완료'];
  const filtered=filter==='전체'?INQUIRY_DATA:INQUIRY_DATA.filter(q=>q.status===filter);
  const statusColors={접수:C.warning,확인:C.primary,답변:C.accent,완료:C.success};

  return <div style={{animation:'fadeIn 300ms ease'}}>
    <div style={{display:'flex',gap:6,marginBottom:20}}>
      {statuses.map(s=><button key={s} onClick={()=>setFilter(s)} style={{padding:'7px 16px',borderRadius:20,fontSize:13,fontWeight:filter===s?600:400,border:'none',cursor:'pointer',background:filter===s?C.primary:'transparent',color:filter===s?'#fff':C.textLight,fontFamily:'Pretendard'}}>{s}</button>)}

    <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>

        onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.15)'}}
        onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.10)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>

          <Badge label={q.status} color={statusColors[q.status]}/>

/* ═══ App ═══ */
function App(){
  const [tab,setTab]=useState('home');
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const showToast=(msg)=>setToast(msg);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  const meta=PAGE_META[tab];
  if(loading) return <Skeleton/>;

  return <div style={{minHeight:'100vh',background:C.bg}}>
    {/* Top Nav */}
    <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:8,boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
      <div style={{fontSize:20,fontWeight:800,color:C.primary,marginRight:20,letterSpacing:'-0.03em'}}>✈️ 트래블링크</div>
      {TABS.map(t=><button key={t.id} title={t.label} onClick={()=>setTab(t.id)} style={{padding:'8px 16px',borderRadius:10,fontSize:14,fontWeight:tab===t.id?700:400,border:'none',cursor:'pointer',background:tab===t.id?`${C.primary}12`:'transparent',color:tab===t.id?C.primary:C.textLight,fontFamily:'Pretendard',transition:'all 150ms',display:'flex',alignItems:'center',gap:6}}>
        <span style={{fontSize:16}}>{t.icon}</span>{t.label}
      </button>)}
      <div style={{flex:1}}/>
      <div style={{position:'relative'}}>
        <input placeholder="검색..." style={{padding:'7px 14px 7px 34px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,width:180,outline:'none',fontFamily:'Pretendard'}}/>
        <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:14}}>🔍</span>
      </div>
      <div style={{position:'relative',cursor:'pointer',marginLeft:8}}>🔔<span style={{position:'absolute',top:-4,right:-6,width:16,height:16,borderRadius:8,background:C.danger,color:'#fff',fontSize:9,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>3</span></div>
      <div style={{width:32,height:32,borderRadius:10,background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700,marginLeft:8}}>관</div>
    </header>

    {/* Hero Banner */}
    <div style={{background:C.gradient,padding:'28px 32px',color:'#fff'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
        <div><h1 style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em'}}>{meta.title}</h1><div style={{fontSize:14,opacity:0.85,marginTop:4}}>{meta.desc}</div></div>
        <div style={{display:'flex',gap:32}}>
          {meta.kpis.map(k=><div key={k.label} style={{textAlign:'center'}}>
            <div style={{fontSize:28,fontWeight:800}}>{k.value}</div>
            <div style={{fontSize:12,opacity:0.8}}>{k.label}{k.unit&&` (${k.unit})`}</div>
          </div>)}
        </div>
      </div>
    </div>

    {/* Content */}
    <main style={{padding:'24px 32px',maxHeight:'calc(100vh - 56px - 100px)',overflowY:'auto'}}>
      {tab==='home'&&<HomePage/>}
      {tab==='content'&&<ContentPage showToast={showToast}/>}
      {tab==='inquiry'&&<InquiryPage showToast={showToast}/>}
      {tab==='promotion'&&<PromoPage showToast={showToast}/>}
      {tab==='analytics'&&<AnalyticsPage/>}
    </main>

    {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
