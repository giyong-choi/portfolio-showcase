// --- Components ---
function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primary,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(14,165,233,0.3)',fontSize:14}}>{message}</div>;
}

function SideNavItem({icon,label,active,onClick}){
  return(
    <button onClick={onClick} style={{
      display:'flex',alignItems:'center',gap:10,width:'100%',
      padding:'9px 12px',borderRadius:10,border:'none',cursor:'pointer',
      background:active?`${C.primary}10`:'transparent',
      color:active?C.primary:C.textLight,
      borderLeft:active?`3px solid ${C.primary}`:'3px solid transparent',
      fontSize:14,fontWeight:active?600:400,
      transition:'all 150ms',fontFamily:'inherit',textAlign:'left'
    }}>
      <span style={{fontSize:17}}>{icon}</span>{label}
    </button>
  );
}

function TabUnderline({label,active,onClick}){
  return(
    <button onClick={onClick} style={{
      padding:'8px 14px 6px',border:'none',cursor:'pointer',
      background:'transparent',fontFamily:'inherit',fontSize:13,
      color:active?C.primary:C.textLight,fontWeight:active?600:400,
      borderBottom:active?`2px solid ${C.primary}`:'2px solid transparent',
      marginBottom:-1,transition:'all 150ms'
    }}>{label}</button>
  );
}

// --- AI Analysis ---
function AIPage(){
  const [selected,setSelected]=useState(null);
  const [streaming,setStreaming]=useState(false);
  const [streamText,setStreamText]=useState('');

  const startAnalysis=(student)=>{
    setSelected(student);
    setStreaming(true);
    setStreamText('');
    const fullText=student.aiAnalysis.recommendation;
    let idx=0;
    const timer=setInterval(()=>{
      if(idx<fullText.length){
        setStreamText(fullText.substring(0,idx+1));
        idx++;
      }else{
        setStreaming(false);
        clearInterval(timer);
      }
    },25);
  };

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',height:'calc(100vh - 118px)'}}>
        {/* Master: Student List */}
        <div style={{width:'42%',borderRight:`1px solid ${C.border}`,overflowY:'auto',padding:16}}>
          <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:12}}>학생 목록</div>
          {AI_STUDENTS.map((s,i)=>{
            const avg=Math.round(Object.values(s.stats).reduce((a,b)=>a+b,0)/5);
            return(
              <div key={s.id} onClick={()=>startAnalysis(s)} style={{
                padding:14,borderRadius:12,marginBottom:6,cursor:'pointer',transition:'all 150ms',
                background:selected?.id===s.id?`${C.primary}08`:C.surface,
                borderLeft:selected?.id===s.id?`3px solid ${C.primary}`:'3px solid transparent',
                border:`1px solid ${selected?.id===s.id?C.primary+'40':C.border}`,
                animation:`slideUp 300ms ease ${i*50}ms both`
              }} onMouseEnter={e=>{if(selected?.id!==s.id)e.currentTarget.style.background=`${C.primary}04`}}
                 onMouseLeave={e=>{if(selected?.id!==s.id)e.currentTarget.style.background=C.surface}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{width:32,height:32,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700}}>{s.name[0]}</div>
                    <div>
                      <div style={{fontSize:14,fontWeight:600}}>{s.name}</div>
                      <div style={{fontSize:11,color:C.textLight}}>{s.branch} · {s.class}</div>
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:16,fontWeight:700,color:C.primary}}>{avg}</div>
                    <div style={{fontSize:10,color:C.textLight}}>종합</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Detail: AI Analysis */}
        <div style={{flex:1,overflowY:'auto',padding:20}}>
          {!selected?(
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:C.textLight}}>
              <span style={{fontSize:48,marginBottom:12}}>🤖</span>
              <div style={{fontSize:15}}>학생을 선택하면 AI 성장 분석 결과가 표시됩니다</div>
            </div>
          ):(
            <div style={{animation:'fadeIn 300ms ease'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                <div>
                  <h2 style={{fontSize:20,fontWeight:700}}>{selected.name} AI 분석</h2>
                  <div style={{fontSize:13,color:C.textLight}}>{selected.branch} · {selected.class} · {selected.age}세</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:28,fontWeight:800,color:C.primary}}>{selected.aiAnalysis.overallGrade}</span>
                  <span style={{fontSize:11,padding:'2px 10px',borderRadius:10,background:selected.aiAnalysis.trend==='상승'?`${C.success}15`:`${C.primary}15`,color:selected.aiAnalysis.trend==='상승'?C.success:C.primary}}>
                    {selected.aiAnalysis.trend==='상승'?'📈':'➡️'} {selected.aiAnalysis.trend}
                  </span>
                </div>
              </div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
                <div style={{background:`${C.success}08`,borderRadius:16,padding:16,border:`1px solid ${C.success}20`}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.success,marginBottom:8}}>💪 강점</div>
                  {selected.aiAnalysis.strengths.map((s,i)=>(
                    <div key={i} style={{fontSize:13,lineHeight:1.6,marginBottom:4,paddingLeft:12,borderLeft:`2px solid ${C.success}40`}}>{s}</div>
                  ))}
                </div>
                <div style={{background:`${C.warning}08`,borderRadius:16,padding:16,border:`1px solid ${C.warning}20`}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.warning,marginBottom:8}}>⚠️ 보완점</div>

// Final: proper admin tab routing
function FinalApp(){
  const [loading,setLoading]=useState(true);
  const [section,setSection]=useState('home');
  const [sectionTab,setSectionTab]=useState(0);
  const [toast,setToast]=useState(null);

  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading) return <SkeletonLoader/>;

  const SECTION_TABS={
    home:[{id:'overview',label:'전체 현황'},{id:'monthly',label:'월간 리포트'}],

          <div style={{flex:1,overflowY:'auto',padding:20}}>

              <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:C.textLight}}>
