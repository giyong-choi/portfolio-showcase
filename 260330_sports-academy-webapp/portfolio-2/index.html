@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px}}

// --- Components ---
function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(124,58,237,0.4)',fontSize:14}}>{message}</div>;
}

}

                  <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%" stopColor={C.primary} stopOpacity={0.3}/>
                    <stop offset="95%" stopColor={C.primary} stopOpacity={0}/>
                  </linearGradient>
                </defs>
                <Area type="monotone" dataKey="score" stroke={C.primary} fill="url(#areaGrad)" strokeWidth={2} name="종합 점수"/>
              </AreaChart>
            </ResponsiveContainer>
            <div style={{display:'flex',flexDirection:'column',gap:10,marginTop:16}}>
              {radarData.map((d,i)=>{
                const diff=d.current-d.prev;
                return(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{width:50,fontSize:12,color:C.textLight}}>{d.subject}</span>
                    <div style={{flex:1,height:6,background:C.surfaceLight,borderRadius:3,overflow:'hidden'}}>
                      <div style={{height:'100%',borderRadius:3,background:d.current>=80?C.accent:C.primary,width:`${d.current}%`,transition:'width 600ms ease'}}/>
                    </div>
                    <span style={{fontSize:12,fontWeight:600,width:30,textAlign:'right'}}>{d.current}</span>
                    <span style={{fontSize:11,width:35,textAlign:'right',color:diff>0?C.success:C.danger}}>{diff>0?'+':''}{diff}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// --- App ---
function App(){
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('home');
  const [toast,setToast]=useState(null);
  const [drawerItem,setDrawerItem]=useState(null);

  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading) return <SkeletonLoader/>;

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* Top Nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:24}}>
          <div style={{width:32,height:32,borderRadius:8,background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>💪</div>
          <span style={{fontSize:15,fontWeight:700}}>핏트래커</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:'8px 16px',borderRadius:8,border:'none',cursor:'pointer',
            background:tab===t.id?`${C.primary}20`:'transparent',
            color:tab===t.id?'#A78BFA':C.textLight,
            fontSize:13,fontWeight:tab===t.id?600:400,fontFamily:'inherit',transition:'all 150ms',
            display:'flex',alignItems:'center',gap:6
          }}>
            <span>{t.icon}</span>{t.label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:18,cursor:'pointer'}}>🔍</span>
          <div style={{position:'relative',cursor:'pointer'}}>
            <span style={{fontSize:18}}>🔔</span>
            <span style={{position:'absolute',top:-4,right:-6,width:14,height:14,borderRadius:'50%',background:C.danger,color:'#fff',fontSize:8,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>4</span>
          </div>
          <div style={{width:32,height:32,borderRadius:'50%',background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:600}}>관</div>
        </div>
      </header>

      {/* Content */}
      <div style={{height:'calc(100vh - 56px)',overflow:'auto'}}>
        {tab==='home'&&<HomePage setDrawerItem={setDrawerItem}/>}
        {tab==='report'&&<ReportPage setDrawerItem={setDrawerItem}/>}
        {tab==='pt'&&<PTPage setToast={setToast}/>}
        {tab==='goals'&&<GoalsPage setToast={setToast}/>}
      </div>

      {/* Member Drawer */}
      {drawerItem&&(
        <Drawer onClose={()=>setDrawerItem(null)}>
          <div style={{textAlign:'center',marginBottom:20}}>
            <div style={{width:64,height:64,borderRadius:'50%',background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:28,fontWeight:700,margin:'0 auto 12px'}}>{drawerItem.name[0]}</div>
            <h3 style={{fontSize:20,fontWeight:700}}>{drawerItem.name}</h3>
            <p style={{fontSize:13,color:C.textLight}}>{drawerItem.membership} · {drawerItem.age}세 · {drawerItem.trainer}</p>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
            {[{l:'가입일',v:drawerItem.joinDate},{l:'최근 방문',v:drawerItem.lastVisit},{l:'PT 횟수',v:`${drawerItem.ptSessions}회`},{l:'목표 달성',v:`${drawerItem.goalProgress}%`}].map(r=>(
              <div key={r.l} style={{background:C.surfaceLight,borderRadius:10,padding:12,textAlign:'center'}}>
                <div style={{fontSize:11,color:C.textLight,marginBottom:4}}>{r.l}</div>
                <div style={{fontSize:14,fontWeight:600}}>{r.v}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>체력 지표</div>
          {Object.entries(drawerItem.stats).map(([k,v])=>(
            <div key={k} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <span style={{width:50,fontSize:12,color:C.textLight}}>{{strength:'근력',cardio:'유산소',flexibility:'유연성',balance:'균형',bodyComp:'체성분'}[k]}</span>
              <div style={{flex:1,height:6,background:C.surfaceLight,borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',borderRadius:3,background:v>=80?C.accent:C.primary,width:`${v}%`}}/>
              </div>
              <span style={{fontSize:12,fontWeight:600,width:28,textAlign:'right'}}>{v}</span>
            </div>
          ))}
          <textarea placeholder="관리자 메모..." style={{width:'100%',marginTop:16,padding:12,borderRadius:8,border:`1px solid ${C.border}`,background:C.surfaceLight,color:C.text,fontSize:13,fontFamily:'inherit',resize:'vertical',minHeight:60,outline:'none'}}/>
        </Drawer>
      )}

      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
