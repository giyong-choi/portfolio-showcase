/* ─── Components ─── */
function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Badge({text}){
  const colors={'예약확정':{bg:'#D1FAE5',text:'#059669'},'대기중':{bg:'#FEF3C7',text:'#D97706'},'피부과':{bg:'#DBEAFE',text:'#2A6496'},'성형외과':{bg:'#FCE7F3',text:'#DB2777'}};
  const c=colors[text]||{bg:'#F1F5F9',text:'#475569'};
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{flex:1}}>
              <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}><Badge text={t.category}/><span style={{fontSize:14,fontWeight:700,color:C.primary}}>{t.price}</span></div>
              <div style={{fontSize:18,fontWeight:800,marginBottom:8}}>{t.name}</div>
              <div style={{fontSize:14,color:C.textLight,lineHeight:1.6}}>{t.desc}</div>
            </div>
          </div>
          <div style={{marginTop:16,display:'flex',gap:8}}>
            {t.steps.map((s,si)=>(
              <div key={si} style={{flex:1,padding:'10px 12px',background:'#F0F9FF',borderRadius:8,fontSize:12,textAlign:'center'}}>
                <div style={{fontWeight:700,color:C.primary,marginBottom:2}}>Step {si+1}</div>
                <div style={{color:C.textLight}}>{s}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function GalleryPage({setDrawer}){
  const[filter,setFilter]=useState('전체');
  const cats=['전체','레이저 토닝','보톡스','코필러','눈 매몰법'];
  const filtered=filter==='전체'?GALLERY:GALLERY.filter(g=>g.category===filter);
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setFilter(c)} style={{padding:'8px 20px',borderRadius:24,border:`1px solid ${filter===c?C.primary:C.border}`,background:filter===c?C.primary:'#fff',color:filter===c?'#fff':C.textLight,cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit',transition:'all 200ms'}}>
            {c}
          </button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {filtered.map((g,i)=>(
          <div key={g.id} onClick={()=>setDrawer({item:g,type:'gallery'})} style={{background:C.surface,borderRadius:16,overflow:'hidden',boxShadow:'0 4px 16px rgba(0,0,0,0.10)',cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.15)'}}
            onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.10)'}}>
            <div style={{height:160,background:'linear-gradient(135deg,#E0F2FE,#BFDBFE)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <div style={{width:60,height:80,borderRadius:6,background:'#DBEAFE',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:C.textLight}}>Before</div>
                <span style={{color:C.primary,fontSize:16}}>→</span>
                <div style={{width:60,height:80,borderRadius:6,background:'#BFDBFE',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:C.primary,fontWeight:600}}>After</div>
              </div>
            </div>
            <div style={{padding:16}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{g.desc}</div>
              <div style={{display:'flex',gap:6}}><span style={{fontSize:12,color:C.textMuted}}>{g.category}</span><span style={{fontSize:12,color:C.textMuted}}>· {g.area}</span></div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ReservationPage({setDrawer,setToast}){
  const[step,setStep]=useState(0);
  const[form,setForm]=useState({name:'',phone:'',treatment:'레이저 토닝',doctor:'김현우 원장',date:'',memo:''});
  return(
    <div style={{animation:'fadeIn 300ms ease',display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
      <div style={{background:C.surface,borderRadius:16,padding:28,boxShadow:'0 4px 16px rgba(0,0,0,0.10)'}}>
        <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>온라인 예약 신청</div>
        <div style={{fontSize:13,color:C.textLight,marginBottom:20}}>아래 정보를 입력해주시면 확인 SMS를 보내드립니다</div>
        <div style={{display:'flex',gap:8,marginBottom:20}}>
          {['정보 입력','시술 선택','확인'].map((s,i)=>(
            <div key={i} style={{flex:1,textAlign:'center'}}>
              <div style={{width:28,height:28,borderRadius:14,background:step>=i?C.primary:'#E2E8F0',color:step>=i?'#fff':C.textLight,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,margin:'0 auto 6px'}}>{i+1}</div>
              <div style={{fontSize:11,color:step>=i?C.primary:C.textMuted,fontWeight:step>=i?600:400}}>{s}</div>
            </div>
          ))}
        </div>
        {step===0&&(
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {[{l:'이름',k:'name',ph:'홍길동'},{l:'연락처',k:'phone',ph:'010-1234-5678'}].map(f=>(
              <div key={f.k}>
                <label style={{fontSize:13,fontWeight:600,color:C.textLight,marginBottom:6,display:'block'}}>{f.l}</label>
                <input value={form[f.k]} onChange={e=>setForm({...form,[f.k]:e.target.value})} placeholder={f.ph} style={{width:'100%',padding:'10px 14px',border:'1px solid #E2E8F0',borderRadius:10,fontSize:14,fontFamily:'inherit',outline:'none'}}/>
              </div>
            ))}
            <button onClick={()=>setStep(1)} style={{padding:'12px 0',background:C.primary,color:'#fff',border:'none',borderRadius:10,fontSize:15,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>다음</button>
          </div>
        )}
        {step===1&&(
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div>
              <label style={{fontSize:13,fontWeight:600,color:C.textLight,marginBottom:6,display:'block'}}>시술 선택</label>
              <select value={form.treatment} onChange={e=>setForm({...form,treatment:e.target.value})} style={{width:'100%',padding:'10px 14px',border:'1px solid #E2E8F0',borderRadius:10,fontSize:14,fontFamily:'inherit',background:'#fff'}}>
                {TREATMENTS.map(t=><option key={t.id}>{t.name}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:13,fontWeight:600,color:C.textLight,marginBottom:6,display:'block'}}>담당 의료진</label>
              <select value={form.doctor} onChange={e=>setForm({...form,doctor:e.target.value})} style={{width:'100%',padding:'10px 14px',border:'1px solid #E2E8F0',borderRadius:10,fontSize:14,fontFamily:'inherit',background:'#fff'}}>
                {DOCTORS.map(d=><option key={d.name}>{d.name}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:13,fontWeight:600,color:C.textLight,marginBottom:6,display:'block'}}>희망 일시</label>
              <input type="text" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} placeholder="예: 2025.07.01 14:00" style={{width:'100%',padding:'10px 14px',border:'1px solid #E2E8F0',borderRadius:10,fontSize:14,fontFamily:'inherit',outline:'none'}}/>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setStep(0)} style={{flex:1,padding:'12px 0',background:'#F1F5F9',color:C.textLight,border:'none',borderRadius:10,fontSize:14,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>이전</button>
              <button onClick={()=>setStep(2)} style={{flex:1,padding:'12px 0',background:C.primary,color:'#fff',border:'none',borderRadius:10,fontSize:15,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>다음</button>
            </div>
          </div>
        )}
        {step===2&&(
          <div>
            <div style={{background:'#F0F9FF',borderRadius:10,padding:20,marginBottom:16}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>예약 정보 확인</div>
              {[{l:'이름',v:form.name||'김서연'},{l:'연락처',v:form.phone||'010-****-1234'},{l:'시술',v:form.treatment},{l:'담당의',v:form.doctor},{l:'일시',v:form.date||'2025.07.01 14:00'}].map(f=>(
                <div key={f.l} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #E0F2FE'}}>
                  <span style={{fontSize:13,color:C.textLight}}>{f.l}</span>
                  <span style={{fontSize:13,fontWeight:600}}>{f.v}</span>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setStep(1)} style={{flex:1,padding:'12px 0',background:'#F1F5F9',color:C.textLight,border:'none',borderRadius:10,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>이전</button>
              <button onClick={()=>{setToast('예약이 접수되었습니다. 확인 SMS가 발송됩니다.');setStep(0)}} style={{flex:1,padding:'12px 0',background:C.primary,color:'#fff',border:'none',borderRadius:10,fontSize:15,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>예약 신청</button>
            </div>
          </div>
        )}
      </div>
      <div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,0.10)'}}>
          <div style={{fontSize:16,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:16}}>예약 현황</div>
          {RESERVATIONS.map((r,i)=>(
            <div key={r.id} onClick={()=>setDrawer({item:r,type:'reservation'})} style={{padding:'12px 0',borderBottom:i<RESERVATIONS.length-1?'1px solid #F1F5F9':'none',cursor:'pointer',transition:'all 150ms'}}
              onMouseEnter={e=>{e.currentTarget.style.background='rgba(42,100,150,0.06)';e.currentTarget.style.borderLeft='3px solid '+C.primary;e.currentTarget.style.paddingLeft='12px'}}
              onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderLeft='none';e.currentTarget.style.paddingLeft='0'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:600,fontSize:14}}>{r.name}</span>
                <Badge text={r.status}/>
              </div>
              <div style={{fontSize:12,color:C.textLight,marginTop:3}}>{r.treatment} · {r.doctor} · {r.date}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function DoctorsPage({setDrawer}){
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20}}>
        {DOCTORS.map((d,i)=>(
          <div key={d.name} onClick={()=>setDrawer({item:d,type:'doctor'})} style={{background:C.surface,borderRadius:16,padding:28,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.15)'}}
            onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.10)'}}>
            <div style={{width:80,height:80,borderRadius:40,background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',fontSize:40,margin:'0 auto 16px'}}>{d.photo}</div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:18,fontWeight:800}}>{d.name}</div>
              <div style={{fontSize:14,color:C.primary,fontWeight:600,marginTop:4}}>{d.specialty}</div>
              <div style={{fontSize:13,color:C.textLight,marginTop:8,lineHeight:1.5}}>{d.career.split('\n').slice(0,2).join(' · ')}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── App ─── */
function App(){
  const[tab,setTab]=useState('병원 소개 및 진료과목 메인');
  const[drawer,setDrawer]=useState(null);
  const[toast,setToast]=useState('');
  const[loading,setLoading]=useState(true);
  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  const TABS=[
    {id:'병원 소개 및 진료과목 메인',label:'홈'},
    {id:'진료과목 상세',label:'진료과목 상세'},
    {id:'시술 전후 갤러리',label:'시술 전후 갤러리'},
    {id:'온라인 예약 신청',label:'온라인 예약 신청'},
    {id:'의료진 소개',label:'의료진 소개'},
  ];

  const PAGE_META={
    '병원 소개 및 진료과목 메인':{title:'에스티 피부과·성형외과',kpis:[{label:'금일 예약',value:'12건'},{label:'이번 달 예약',value:'148건'},{label:'등록 의료진',value:'3명'}]},
    '진료과목 상세':{title:'진료과목 안내',kpis:[{label:'피부과',value:'2종'},{label:'성형외과',value:'2종'},{label:'전체 시술',value:'4종'}]},
    '시술 전후 갤러리':{title:'시술 전후 갤러리',kpis:[{label:'등록 사례',value:'6건'},{label:'피부과',value:'3건'},{label:'성형외과',value:'3건'}]},
    '온라인 예약 신청':{title:'온라인 예약',kpis:[{label:'대기 예약',value:'2건'},{label:'확정 예약',value:'3건'},{label:'금주 예약',value:'5건'}]},
    '의료진 소개':{title:'의료진 소개',kpis:[{label:'전문의',value:'3명'},{label:'진료과',value:'2개'},{label:'평균 경력',value:'10년+'}]},
  };
  const meta=PAGE_META[tab];

  if(loading) return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      <div style={{height:56,background:C.surface}}/>
      <div style={{padding:32,display:'flex',flexDirection:'column',gap:16}}>
        {[...Array(3)].map((_,i)=><div key={i} style={{height:140,borderRadius:16,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}
      </div>
    </div>
  );

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* Top Nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:8}}>
        <div style={{fontSize:18,fontWeight:800,color:C.primary,marginRight:24}}>🏥 에스티클리닉</div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'8px 16px',borderRadius:8,border:'none',background:tab===t.id?`${C.primary}12`:'transparent',color:tab===t.id?C.primary:C.textLight,cursor:'pointer',fontSize:14,fontWeight:tab===t.id?700:400,fontFamily:'inherit',transition:'all 200ms'}}>
            {t.label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{position:'relative'}}>
          <input placeholder="검색..." style={{padding:'7px 14px 7px 32px',border:'1px solid #E2E8F0',borderRadius:8,fontSize:13,width:180,fontFamily:'inherit',outline:'none'}}/>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:13}}>🔍</span>
        </div>
        <span style={{fontSize:16}}>🔔</span>
        <div style={{width:32,height:32,borderRadius:16,background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff'}}>관</div>
      </header>

      {/* Hero Banner */}
      <div style={{background:C.gradient,padding:'28px 32px',color:'#fff'}}>
        <h1 style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em'}}>{meta.title}</h1>
        <div style={{display:'flex',gap:32,marginTop:12}}>
          {meta.kpis.map(k=>(
            <div key={k.label}>
              <div style={{fontSize:11,opacity:0.8}}>{k.label}</div>
              <div style={{fontSize:20,fontWeight:700,marginTop:2}}>{k.value}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Content */}
      <main style={{padding:'24px 32px'}}>
        {tab==='병원 소개 및 진료과목 메인'&&<HomePage setDrawer={setDrawer}/>}
        {tab==='진료과목 상세'&&<TreatmentsPage setDrawer={setDrawer}/>}
        {tab==='시술 전후 갤러리'&&<GalleryPage setDrawer={setDrawer}/>}
        {tab==='온라인 예약 신청'&&<ReservationPage setDrawer={setDrawer} setToast={setToast}/>}
        {tab==='의료진 소개'&&<DoctorsPage setDrawer={setDrawer}/>}
      </main>

      {drawer&&<Drawer item={drawer.item} type={drawer.type} onClose={()=>setDrawer(null)}/>}
      {toast&&<Toast message={toast} onClose={()=>setToast('')}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
