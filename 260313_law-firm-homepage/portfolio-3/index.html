/* ─── Components ─── */
function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primary,color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Badge({text,color}){
  const c=color||STATUS_COLOR[text]||'#6B7280';
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:`${c}18`,color:c}}>{text}</span>;
}

              <div style={{fontSize:12,fontWeight:600,color:C.textLight,marginBottom:8}}>상태 변경</div>
              <div style={{display:'flex',gap:6}}>
                {STATUS_FLOW.map(s=>(
                  <button key={s} onClick={()=>setToast(`${selected.name}님 상태: ${s}`)} style={{padding:'6px 12px',borderRadius:8,border:`1px solid ${STATUS_COLOR[s]}30`,background:selected.status===s?`${STATUS_COLOR[s]}18`:'transparent',color:STATUS_COLOR[s],cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'inherit',transition:'all 150ms'}}>
                    {s}
                  </button>
                ))}
              </div>
            </div>
            <div style={{background:'#F8FAFC',borderRadius:12,padding:16}}>
              <div style={{fontSize:12,fontWeight:600,color:C.textLight,marginBottom:8}}>관리자 메모</div>
              <textarea rows={3} placeholder="상담 관련 내부 메모" style={{width:'100%',padding:10,border:'1px solid #E2E8F0',borderRadius:8,fontSize:13,fontFamily:'inherit',resize:'vertical'}}/>
            </div>
          </div>
        ):(
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:C.textMuted,fontSize:14}}>좌측 목록에서 상담을 선택하세요</div>
        )}
      </div>
    </div>
  );
}

function AdminSection({setToast}){
  return(
    <div style={{padding:20,animation:'fadeIn 300ms ease'}}>
      <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:12}}>변호사별 수임 현황</div>
      <div style={{background:C.surface,borderRadius:20,border:'1px solid #E5E7EB',boxShadow:'0 1px 4px rgba(0,0,0,0.06)',overflow:'hidden',marginBottom:20}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'#F8FAFC'}}>
            {['변호사','역할','전문분야','총 사건','진행 중',''].map(h=><th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:11,fontWeight:600,color:C.textMuted,borderBottom:'1px solid #E5E7EB'}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {LAWYERS.map(l=>(
              <tr key={l.name} style={{transition:'background 150ms'}}
                onMouseEnter={e=>{e.currentTarget.style.background=`${C.primary}04`;e.currentTarget.style.borderLeft='2px solid '+C.primary}}
                onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderLeft='none'}}>
                <td style={{padding:'10px 16px',borderBottom:'1px solid #F1F5F9'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:20}}>{l.photo}</span>
                    <span style={{fontSize:13,fontWeight:600}}>{l.name}</span>
                  </div>
                </td>
                <td style={{padding:'10px 16px',fontSize:12,color:C.textLight,borderBottom:'1px solid #F1F5F9'}}>{l.role}</td>
                <td style={{padding:'10px 16px',borderBottom:'1px solid #F1F5F9'}}><Badge text={l.field} color={C.accent}/></td>
                <td style={{padding:'10px 16px',fontSize:14,fontWeight:600,borderBottom:'1px solid #F1F5F9'}}>{l.cases}건</td>
                <td style={{padding:'10px 16px',borderBottom:'1px solid #F1F5F9'}}><span style={{fontSize:14,fontWeight:700,color:C.accent}}>{l.active}건</span></td>
                <td style={{padding:'10px 16px',borderBottom:'1px solid #F1F5F9'}}>
                  <button onClick={()=>setToast(`${l.name} 사건 목록 조회`)} style={{padding:'5px 12px',borderRadius:8,border:'1px solid #E5E7EB',background:'transparent',fontSize:12,cursor:'pointer',fontFamily:'inherit',color:C.textLight}}>상세</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{background:C.surface,borderRadius:20,padding:20,border:'1px solid #E5E7EB',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:12}}>접수·완료 추이</div>
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={MONTHLY_STATS}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/>
              <XAxis dataKey="month" tick={{fontSize:11}} stroke="#9CA3AF"/>
              <YAxis tick={{fontSize:11}} stroke="#9CA3AF"/>
              <Tooltip/>
              <Area type="monotone" dataKey="접수" stroke={C.primary} fill={`${C.primary}20`}/>
              <Area type="monotone" dataKey="완료" stroke={C.accent} fill={`${C.accent}20`}/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:20,padding:20,border:'1px solid #E5E7EB',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight,marginBottom:12}}>분야별 사건 분포</div>
          <ResponsiveContainer width="100%" height={200}>
            <PieChart>
              <Pie data={FIELD_PIE} cx="50%" cy="50%" outerRadius={70} dataKey="value" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`}>
                {FIELD_PIE.map((e,i)=><Cell key={i} fill={e.color}/>)}
              </Pie>
              <Tooltip/>
            </PieChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

function LawyersSection({selected,setSelected}){
  return(
    <div style={{display:'flex',flex:1,overflow:'hidden'}}>
      <div style={{width:'42%',borderRight:`1px solid ${C.border}`,overflowY:'auto'}}>
        {LAWYERS.map(l=>(
          <div key={l.name} onClick={()=>setSelected(l)} style={{padding:'14px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'all 150ms',background:selected?.name===l.name?`${C.primary}08`:'transparent',borderLeft:selected?.name===l.name?`2px solid ${C.primary}`:'2px solid transparent'}}
            onMouseEnter={e=>{if(selected?.name!==l.name)e.currentTarget.style.background=`${C.primary}04`}}
            onMouseLeave={e=>{if(selected?.name!==l.name)e.currentTarget.style.background='transparent'}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:24}}>{l.photo}</span>
              <div>
                <div style={{fontSize:14,fontWeight:600}}>{l.name}</div>
                <div style={{fontSize:11,color:C.textMuted}}>{l.role} · {l.field}</div>
              </div>
            </div>
          </div>
        ))}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:20}}>
        {selected?(
          <div style={{animation:'fadeIn 200ms ease'}}>
            <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20}}>
              <div style={{width:64,height:64,borderRadius:32,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:32}}>{selected.photo}</div>
              <div>
                <div style={{fontSize:22,fontWeight:700}}>{selected.name}</div>
                <div style={{fontSize:13,color:C.accent,fontWeight:600}}>{selected.role}</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:20}}>
              <div style={{background:'#F8FAFC',borderRadius:12,padding:14,textAlign:'center'}}>
                <div style={{fontSize:11,color:C.textMuted}}>전문분야</div>
                <div style={{fontSize:14,fontWeight:700,marginTop:4}}>{selected.field}</div>
              </div>
              <div style={{background:'#F8FAFC',borderRadius:12,padding:14,textAlign:'center'}}>
                <div style={{fontSize:11,color:C.textMuted}}>총 사건</div>
                <div style={{fontSize:14,fontWeight:700,marginTop:4}}>{selected.cases}건</div>
              </div>
              <div style={{background:'#F8FAFC',borderRadius:12,padding:14,textAlign:'center'}}>
                <div style={{fontSize:11,color:C.textMuted}}>진행 중</div>
                <div style={{fontSize:14,fontWeight:700,color:C.accent,marginTop:4}}>{selected.active}건</div>
              </div>
            </div>
            <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>담당 사례</div>
            {CASES.filter(c=>c.lawyer===selected.name).map(c=>(
              <div key={c.id} style={{padding:'10px 14px',background:'#F8FAFC',borderRadius:10,marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:13,fontWeight:600}}>{c.title}</span>
                  <Badge text={c.result} color={C.success}/>
                </div>
                <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{c.field} · {c.date}</div>
              </div>
            ))}
          </div>
        ):(
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:C.textMuted,fontSize:14}}>좌측에서 변호사를 선택하세요</div>
        )}
      </div>
    </div>
  );
}

/* ─── App ─── */
function App(){
  const[section,setSection]=useState('포털 메인 대시보드');
  const[tab,setTab]=useState(0);
  const[selected,setSelected]=useState(null);
  const[toast,setToast]=useState('');
  const[loading,setLoading]=useState(true);
  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);
  useEffect(()=>{setSelected(null);setTab(0)},[section]);

  const NAV=[
    {id:'포털 메인 대시보드',icon:'📊',label:'포털 메인 대시보드'},
    {id:'사건 유형별 성공사례',icon:'🏆',label:'사건 유형별 성공사례'},
    {id:'온라인 법률 상담 신청',icon:'💬',label:'온라인 법률 상담 신청'},
    {id:'어드민 사건 관리 CMS',icon:'⚙️',label:'어드민 사건 관리 CMS'},
    {id:'변호사 소개',icon:'👨‍⚖️',label:'변호사 소개'},
  ];

  const SECTION_TABS={
    '포털 메인 대시보드':[{id:'overview',label:'전체 현황'},{id:'weekly',label:'주간 리포트'}],
    '사건 유형별 성공사례':[{id:'all',label:'전체'},{id:'criminal',label:'형사'},{id:'civil',label:'민사'},{id:'family',label:'가사'},{id:'labor',label:'노동'}],
    '온라인 법률 상담 신청':[{id:'list',label:'상담 목록'},{id:'pending',label:'배정 대기'},{id:'completed',label:'완료'}],
    '어드민 사건 관리 CMS':[{id:'lawyers',label:'변호사 현황'},{id:'stats',label:'통계'}],
    '변호사 소개':[{id:'all',label:'전체'},{id:'criminal',label:'형사'},{id:'labor',label:'노동'}],
  };

  if(loading) return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <div style={{width:240,background:'#fff',borderRight:'1px solid #E5E7EB'}}/>
      <div style={{flex:1,padding:20,display:'flex',flexDirection:'column',gap:12}}>
        {[...Array(4)].map((_,i)=><div key={i} style={{height:100,borderRadius:20,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}
      </div>
    </div>
  );

  const isDetailView=['사건 유형별 성공사례','온라인 법률 상담 신청','변호사 소개'].includes(section);

  return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      {/* Bright sidebar */}
      <nav style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',paddingTop:16,flexShrink:0}}>
        <div style={{padding:'0 16px 16px',fontWeight:700,fontSize:16,display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:20}}>⚖️</span> 리걸파트너스
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:2,padding:'0 8px'}}>
          {NAV.map(n=><SideNavItem key={n.id} icon={n.icon} label={n.label} active={section===n.id} onClick={()=>setSection(n.id)}/>)}
        </div>
        <div style={{padding:'12px 16px',borderTop:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:28,height:28,borderRadius:14,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff'}}>관</div>
          <div><div style={{fontSize:12,fontWeight:600}}>관리자</div><div style={{fontSize:10,color:C.textMuted}}>admin@legalpartners.kr</div></div>
        </div>
      </nav>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Appbar */}
        <header style={{height:40,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 16px',gap:8,background:C.surface,flexShrink:0}}>
          <span style={{fontSize:12,color:C.textMuted}}>리걸파트너스</span>
          <span style={{fontSize:12,color:C.textMuted}}>/</span>
          <span style={{fontSize:12,fontWeight:600}}>{section}</span>
          <div style={{flex:1}}/>
          <div style={{position:'relative'}}>
            <input placeholder="검색..." style={{padding:'5px 10px 5px 28px',border:'1px solid #E5E7EB',borderRadius:6,fontSize:12,width:160,fontFamily:'inherit',outline:'none'}}/>
            <span style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',fontSize:12}}>🔍</span>
          </div>
          <div style={{width:24,height:24,borderRadius:12,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff'}}>관</div>
        </header>

        {/* Tab strip */}
        <div style={{height:38,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'flex-end',padding:'0 16px',background:C.surface,flexShrink:0}}>
          {(SECTION_TABS[section]||[]).map((t,i)=><TabUnderline key={t.id} label={t.label} active={tab===i} onClick={()=>{setTab(i);setSelected(null)}}/>)}
        </div>

        {/* Content */}
        {section==='포털 메인 대시보드'&&<div style={{flex:1,overflowY:'auto'}}><DashboardSection/></div>}
        {section==='사건 유형별 성공사례'&&<CasesSection selected={selected} setSelected={setSelected}/>}
        {section==='온라인 법률 상담 신청'&&<ConsultsSection selected={selected} setSelected={setSelected} setToast={setToast}/>}
        {section==='어드민 사건 관리 CMS'&&<div style={{flex:1,overflowY:'auto'}}><AdminSection setToast={setToast}/></div>}
        {section==='변호사 소개'&&<LawyersSection selected={selected} setSelected={setSelected}/>}
      </div>
      {toast&&<Toast message={toast} onClose={()=>setToast('')}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
