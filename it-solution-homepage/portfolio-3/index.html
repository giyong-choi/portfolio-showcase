<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#0F172A;color:#F1F5F9;overflow:hidden}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.skeleton{background:linear-gradient(90deg,#1E293B 25%,#334155 50%,#1E293B 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#475569}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── 디자인 토큰 (Slate Pro / modern-dark) ── */

/* ── 더미 데이터 ── */
const CONTENTS = [
  { id:1, title:'클라우드원 2024년 하반기 서비스 로드맵', status:'게시중', author:'김서연', updated:'2024-12-01 14:30', category:'공지사항', views:892 },
  { id:2, title:'통합 모니터링 솔루션 v4.0 출시 안내', status:'검토중', author:'이준호', updated:'2024-11-28 10:15', category:'제품소식', views:0 },
  { id:3, title:'ISO 27001 / 27701 동시 인증 취득', status:'게시중', author:'관리자', updated:'2024-11-25 09:00', category:'공지사항', views:1240 },
  { id:4, title:'클라우드 마이그레이션 성공 사례집 (제조업)', status:'초안', author:'박하나', updated:'2024-11-22 16:40', category:'자료실', views:0 },
  { id:5, title:'DevSecOps 파이프라인 구축 가이드', status:'게시중', author:'정수민', updated:'2024-11-20 11:20', category:'기술블로그', views:567 },
  { id:6, title:'글로벌 데이터 센터 확장 계획 발표', status:'게시중', author:'관리자', updated:'2024-11-18 08:50', category:'공지사항', views:2100 },
  { id:7, title:'Kubernetes 보안 강화 모범 사례', status:'검토중', author:'최우진', updated:'2024-11-15 13:10', category:'기술블로그', views:0 },
  { id:8, title:'2024 고객 만족도 조사 결과 보고서', status:'초안', author:'강유진', updated:'2024-11-12 15:30', category:'자료실', views:0 },
];

const ANALYTICS = {

    { month:'7월', value:18200 },{ month:'8월', value:21400 },{ month:'9월', value:24800 },
    { month:'10월', value:28100 },{ month:'11월', value:31500 },{ month:'12월', value:35200 },
  ],

    { name:'직접 방문', pct:28, color:C.success },
    { name:'소셜 미디어', pct:18, color:C.warning },
    { name:'이메일 캠페인', pct:8, color:'#A78BFA' },
    { name:'기타', pct:4, color:C.textLight },
  ],
  pages: [
    { name:'/products/monitoring', views:8420, bounce:'32%' },
    { name:'/solutions/migration', views:6180, bounce:'28%' },
    { name:'/about', views:4920, bounce:'45%' },
    { name:'/blog/devsecops-guide', views:3210, bounce:'22%' },
    { name:'/contact', views:2840, bounce:'18%' },
  ],
};

const CLIENTS = [
  { id:1, name:'(주)삼성SDS', plan:'Enterprise', sites:3, status:'활성', lastActivity:'2024-12-01', contact:'김대현 팀장' },
  { id:2, name:'LG CNS', plan:'Enterprise', sites:5, status:'활성', lastActivity:'2024-11-30', contact:'이수진 매니저' },
  { id:3, name:'현대오토에버', plan:'Business', sites:2, status:'활성', lastActivity:'2024-11-28', contact:'박영호 과장' },
  { id:4, name:'SK C&C', plan:'Enterprise', sites:4, status:'활성', lastActivity:'2024-11-27', contact:'최민지 팀장' },
  { id:5, name:'(주)카카오엔터프라이즈', plan:'Business', sites:1, status:'일시정지', lastActivity:'2024-11-15', contact:'정해원 매니저' },

  { id:7, name:'(주)더존비즈온', plan:'Starter', sites:1, status:'활성', lastActivity:'2024-11-25', contact:'윤서정 대리' },
];

const RAIL_ITEMS = [
  { id:'contents', icon:'📝', label:'콘텐츠 관리' },
  { id:'analytics', icon:'📊', label:'방문자 분석' },

const SECTION_TABS = {

/* ── 유틸 컴포넌트 ── */
function Badge({ children, color=C.accent }) {
  return <span style={{ display:'inline-flex', alignItems:'center', padding:'2px 8px', borderRadius:3, fontSize:11, fontWeight:600, color, background:color+'20', border:`1px solid ${color}40` }}>{children}</span>;
}
function StatusBadge({ status }) {
  const m = {'게시중':{c:C.success},'검토중':{c:C.warning},'초안':{c:C.textLight},'활성':{c:C.success},'일시정지':{c:C.warning},'Enterprise':{c:C.accent},'Business':{c:'#A78BFA'},'Starter':{c:C.textLight}};
  const s = m[status]||{c:C.textLight};
  return <Badge color={s.c}>{status}</Badge>;
}
function CountUp({ end, suffix='' }) {
  const [val, setVal] = useState(0);
  useEffect(()=>{ let s=0; const step=end/50; const t=setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);} else setVal(Math.floor(s)); },24); return ()=>clearInterval(t); },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}
function Toast({ message, onClose }) {
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.accent,color:'#0F172A',padding:'10px 20px',borderRadius:4,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(6,182,212,0.3)',fontSize:13,fontWeight:600}}>{message}</div>;
}
function Btn({ children, onClick, variant='primary', size='md' }) {
  const base = { border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, borderRadius:4, display:'inline-flex', alignItems:'center', gap:6, transition:'all 150ms' };
  const sizes = { sm:{padding:'4px 10px',fontSize:11}, md:{padding:'7px 14px',fontSize:12}, lg:{padding:'9px 18px',fontSize:13} };
  const variants = { primary:{background:C.accent,color:'#0F172A'}, secondary:{background:C.surface,color:C.text,border:`1px solid ${C.border}`}, danger:{background:C.danger,color:'#fff'}, ghost:{background:'transparent',color:C.textSub} };
  return <button onClick={onClick} style={{...base,...sizes[size],...variants[variant]}}
    onMouseOver={e=>e.currentTarget.style.opacity='0.85'}
    onMouseOut={e=>e.currentTarget.style.opacity='1'}>{children}</button>;
}

/* ── 모달 ── */
function Modal({ open, onClose, title, width=500, children }) {
  if (!open) return null;
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', zIndex:500 }} />
      <div style={{ position:'fixed', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width, maxWidth:'90vw', maxHeight:'85vh', overflowY:'auto', background:C.surface, borderRadius:8, border:`1px solid ${C.border}`, boxShadow:'0 20px 60px rgba(0,0,0,0.4)', zIndex:501, animation:'fadeInScale 200ms ease' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 18px', borderBottom:`1px solid ${C.border}` }}>
          <h3 style={{ fontSize:14, fontWeight:700 }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:16, color:C.textLight }}>✕</button>
        </div>
        <div style={{ padding:18 }}>{children}</div>
      </div>
    </>
  );
}
function InputField({ label, value, onChange, placeholder, textarea, type='text' }) {
  const s = { width:'100%', padding:'8px 12px', border:`1px solid ${C.border}`, borderRadius:4, fontSize:13, fontFamily:'inherit', outline:'none', background:C.bg, color:C.text, transition:'border-color 150ms' };
  return (
    <div style={{ marginBottom:14 }}>
      <label style={{ display:'block', fontSize:11, fontWeight:700, color:C.textSub, marginBottom:4, textTransform:'uppercase', letterSpacing:'0.05em' }}>{label}</label>
      {textarea ? <textarea value={value} onChange={onChange} placeholder={placeholder} rows={3} style={{...s, resize:'vertical'}} /> : <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={s} />}
    </div>
  );
}

/* ── 스켈레톤 ── */
function SkeletonLoader() {
  return (
    <div style={{ display:'flex', minHeight:'100vh', background:C.bg }}>
      <div style={{ width:56, background:C.surface, borderRight:`1px solid ${C.border}` }} />
      <div style={{ flex:1, padding:16 }}><div className="skeleton" style={{ height:20, width:160, marginBottom:16 }} />{[...Array(6)].map((_,i)=><div key={i} className="skeleton" style={{ height:36, marginBottom:4 }} />)}</div>
    </div>
  );
}

/* ── 콘텐츠 관리 ── */
function ContentsSection({ tab, selected, setSelected, onToast }) {
  const [modal, setModal] = useState(null);
  const filtered = tab===0 ? CONTENTS : tab===1 ? CONTENTS.filter(c=>c.status==='게시중') : tab===2 ? CONTENTS.filter(c=>c.status==='검토중') : CONTENTS.filter(c=>c.status==='초안');
  return (
    <div style={{ display:'flex', flex:1, overflow:'hidden' }}>
      {/* 마스터 (목록) */}
      <div style={{ width:'42%', borderRight:`1px solid ${C.border}`, overflowY:'auto' }}>
        <div style={{ padding:'8px 12px', borderBottom:`1px solid ${C.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontSize:11, color:C.textLight }}>{filtered.length}건</span>
          <Btn size="sm" onClick={()=>setModal('create')}>+ 새 글</Btn>
        </div>
        {filtered.map((c,i) => (
          <div key={c.id} onClick={()=>setSelected(c)} style={{
            padding:'10px 12px', borderBottom:`1px solid ${C.border}`, cursor:'pointer', transition:'background 150ms',
            background:selected?.id===c.id ? `${C.accent}15` : 'transparent',
            borderLeft:selected?.id===c.id ? `2px solid ${C.accent}` : '2px solid transparent',
            animation:`slideUp 200ms ease ${i*30}ms both`,
          }}
            onMouseOver={e=>{if(selected?.id!==c.id)e.currentTarget.style.background=C.surfaceHover;}}
            onMouseOut={e=>{if(selected?.id!==c.id)e.currentTarget.style.background='transparent';}}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
              <span style={{ fontSize:13, fontWeight:600, color:C.text, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:240 }}>{c.title}</span>
              <StatusBadge status={c.status} />
            </div>
            <div style={{ display:'flex', gap:8, fontSize:11, color:C.textLight }}>
              <span>{c.author}</span><span>{c.category}</span><span>{c.updated}</span>
            </div>
          </div>
        ))}
      </div>

      {/* 디테일 */}
      <div style={{ flex:1, overflowY:'auto', padding:20 }}>
        {selected ? (
          <div style={{ animation:'fadeIn 200ms ease' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16 }}>
              <div>
                <h3 style={{ fontSize:18, fontWeight:700, marginBottom:6 }}>{selected.title}</h3>
                <div style={{ display:'flex', gap:8, fontSize:12, color:C.textSub }}>
                  <span>{selected.author}</span><span>·</span><span>{selected.category}</span><span>·</span><span>{selected.updated}</span>
                </div>
              </div>
              <div style={{ display:'flex', gap:6 }}>
                <StatusBadge status={selected.status} />
                {selected.views > 0 && <span style={{ fontSize:11, color:C.textLight }}>👁 {selected.views.toLocaleString()}</span>}
              </div>
            </div>

            {/* 워크플로우 상태 */}
            <div style={{ display:'flex', gap:4, marginBottom:20 }}>
              {['초안','검토중','게시중','보관'].map((st,i) => {
                const isActive = st===selected.status;
                const isPast = ['초안','검토중','게시중','보관'].indexOf(selected.status) > i;
                return (
                  <div key={st} style={{ flex:1, padding:'8px 0', textAlign:'center', borderRadius:4, fontSize:11, fontWeight:600, background:isActive?C.accent+'20':isPast?C.success+'15':C.bg, color:isActive?C.accent:isPast?C.success:C.textLight, border:`1px solid ${isActive?C.accent+'60':isPast?C.success+'40':C.border}` }}>
                    {isPast && '✓ '}{st}
                  </div>
                );
              })}
            </div>

            <div style={{ padding:16, background:C.bg, borderRadius:6, border:`1px solid ${C.border}`, fontSize:13, lineHeight:1.8, marginBottom:16, color:C.textSub }}>
              클라우드원에서 안내드립니다. 해당 콘텐츠의 본문이 여기에 표시됩니다. 워크플로우 상태에 따라 검토 → 승인 → 게시 프로세스를 거칩니다.
            </div>

            <div style={{ display:'flex', gap:6 }}>
              {selected.status==='초안' && <Btn onClick={()=>onToast('검토 요청을 보냈습니다.')}>검토 요청</Btn>}
              {selected.status==='검토중' && <Btn onClick={()=>onToast('게시가 승인되었습니다.')}>게시 승인</Btn>}
              {selected.status==='검토중' && <Btn variant="danger" onClick={()=>onToast('반려되었습니다.')}>반려</Btn>}
              <Btn variant="secondary" onClick={()=>setModal({type:'edit',item:selected})}>수정</Btn>
              <Btn variant="ghost" onClick={()=>onToast('삭제되었습니다.')}>삭제</Btn>
            </div>
          </div>
        ) : (
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%', color:C.textLight, fontSize:13 }}>좌측 목록에서 콘텐츠를 선택하세요</div>
        )}
      </div>

      <Modal open={!!modal} onClose={()=>setModal(null)} title={modal?.type==='edit'?'콘텐츠 수정':'새 콘텐츠'}>
        <InputField label="제목" value={modal?.type==='edit'?modal.item.title:''} onChange={()=>{}} placeholder="제목" />
        <div style={{ marginBottom:14 }}>
          <label style={{ display:'block', fontSize:11, fontWeight:700, color:C.textSub, marginBottom:4, textTransform:'uppercase', letterSpacing:'0.05em' }}>카테고리</label>
          <select style={{ width:'100%', padding:'8px 12px', border:`1px solid ${C.border}`, borderRadius:4, fontSize:13, fontFamily:'inherit', background:C.bg, color:C.text }}>
            <option>공지사항</option><option>제품소식</option><option>기술블로그</option><option>자료실</option>
          </select>
        </div>
        <InputField label="내용" textarea value="" onChange={()=>{}} placeholder="콘텐츠 본문" />
        <div style={{ display:'flex', gap:6, justifyContent:'flex-end' }}>
          <Btn variant="secondary" onClick={()=>setModal(null)}>취소</Btn>
          <Btn onClick={()=>{setModal(null);onToast(modal?.type==='edit'?'수정되었습니다.':'생성되었습니다.');}}>{modal?.type==='edit'?'수정':'생성'}</Btn>
        </div>
      </Modal>
    </div>
  );
}

/* ── 방문자 분석 ── */
function AnalyticsSection({ tab }) {
  const maxV = Math.max(...ANALYTICS.visitors.map(v=>v.value));
  return (
    <div style={{ flex:1, overflowY:'auto', padding:20, animation:'fadeIn 200ms ease' }}>
      {/* 인라인 KPI */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10, marginBottom:20 }}>
        {[{label:'총 방문자',value:'35,200',change:'+11.7%'},{label:'페이지뷰',value:'142,800',change:'+8.2%'},{label:'평균 체류',value:'4분 12초',change:'+15%'},{label:'이탈률',value:'31.2%',change:'-2.4%'}].map((k,i) => (
          <div key={k.label} style={{ padding:12, background:C.surface, borderRadius:C.card.borderRadius, border:C.card.border, animation:`slideUp 300ms ease ${i*60}ms both` }}>
            <div style={{ fontSize:10, color:C.textLight, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:4 }}>{k.label}</div>
            <div style={{ fontSize:20, fontWeight:800, color:C.text }}>{k.value}</div>
            <div style={{ fontSize:10, color:k.change.startsWith('-')?C.success:C.success, fontWeight:600, marginTop:2 }}>{k.change}</div>
          </div>
        ))}
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr', gap:16, marginBottom:16 }}>
        {/* 방문자 차트 */}
        <div style={{ background:C.surface, borderRadius:C.card.borderRadius, border:C.card.border, padding:16 }}>
          <div style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', color:C.textLight, marginBottom:12 }}>월별 방문자</div>
          <div style={{ display:'flex', alignItems:'flex-end', gap:8, height:140 }}>
            {ANALYTICS.visitors.map((v,i) => (
              <div key={v.month} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
                <div style={{ fontSize:10, color:C.textLight }}>{(v.value/1000).toFixed(1)}k</div>
                <div style={{ width:'100%', borderRadius:2, background:`linear-gradient(to top, ${C.accent}, ${C.accentLight})`, animation:`barGrow 800ms ease ${i*80}ms both`, '--target-width':'100%', height:`${(v.value/maxV)*110}px` }} />
                <div style={{ fontSize:10, color:C.textLight }}>{v.month}</div>
              </div>
            ))}
          </div>
        </div>

        {/* 유입 소스 */}
        <div style={{ background:C.surface, borderRadius:C.card.borderRadius, border:C.card.border, padding:16 }}>
          <div style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', color:C.textLight, marginBottom:12 }}>유입 경로</div>
          {ANALYTICS.sources.map((s,i) => (
            <div key={s.name} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
              <div style={{ width:8, height:8, borderRadius:2, background:s.color, flexShrink:0 }} />
              <div style={{ flex:1, fontSize:12, color:C.textSub }}>{s.name}</div>
              <div style={{ width:80 }}>
                <div style={{ height:4, borderRadius:2, background:C.bg }}>
                  <div style={{ height:'100%', borderRadius:2, background:s.color, width:`${s.pct}%`, animation:`barGrow 800ms ease ${i*80}ms both`, '--target-width':`${s.pct}%` }} />
                </div>
              </div>
              <div style={{ fontSize:11, fontWeight:700, color:s.color, width:30, textAlign:'right' }}>{s.pct}%</div>
            </div>
          ))}
        </div>
      </div>

      {/* 인기 페이지 */}
      <div style={{ background:C.surface, borderRadius:C.card.borderRadius, border:C.card.border, padding:16 }}>
        <div style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', color:C.textLight, marginBottom:12 }}>인기 페이지</div>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead><tr style={{ borderBottom:`1px solid ${C.border}` }}>
            {['페이지','조회수','이탈률'].map(h => <th key={h} style={{ padding:'6px 8px', fontSize:10, fontWeight:700, color:C.textLight, textAlign:'left', textTransform:'uppercase', letterSpacing:'0.05em' }}>{h}</th>)}
          </tr></thead>
          <tbody>{ANALYTICS.pages.map((p,i) => (
            <tr key={p.name} style={{ borderBottom:`1px solid ${C.border}`, transition:'background 150ms', height:40 }}
              onMouseOver={e=>e.currentTarget.style.background=C.surfaceHover}
              onMouseOut={e=>e.currentTarget.style.background='transparent'}>
              <td style={{ padding:'6px 8px', fontSize:12, color:C.accent, fontFamily:'monospace' }}>{p.name}</td>
              <td style={{ padding:'6px 8px', fontSize:12, color:C.text, fontWeight:600 }}>{p.views.toLocaleString()}</td>
              <td style={{ padding:'6px 8px', fontSize:12, color:parseFloat(p.bounce)<30?C.success:C.warning }}>{p.bounce}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

/* ── 고객사 포털 ── */
function ClientsSection({ tab, selected, setSelected, onToast }) {
  const [modal, setModal] = useState(null);
  const filtered = tab===0 ? CLIENTS : tab===1 ? CLIENTS.filter(c=>c.status==='활성') : CLIENTS.filter(c=>c.status==='일시정지');
  return (
    <div style={{ display:'flex', flex:1, overflow:'hidden' }}>
      <div style={{ width:'42%', borderRight:`1px solid ${C.border}`, overflowY:'auto' }}>
        <div style={{ padding:'8px 12px', borderBottom:`1px solid ${C.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontSize:11, color:C.textLight }}>{filtered.length}개 고객사</span>
          <Btn size="sm" onClick={()=>setModal('create')}>+ 추가</Btn>
        </div>
        {filtered.map((c,i) => (
          <div key={c.id} onClick={()=>setSelected(c)} style={{
            padding:'10px 12px', borderBottom:`1px solid ${C.border}`, cursor:'pointer', transition:'background 150ms',
            background:selected?.id===c.id ? `${C.accent}15` : 'transparent',
            borderLeft:selected?.id===c.id ? `2px solid ${C.accent}` : '2px solid transparent',
            animation:`slideUp 200ms ease ${i*30}ms both`,
          }}
            onMouseOver={e=>{if(selected?.id!==c.id)e.currentTarget.style.background=C.surfaceHover;}}
            onMouseOut={e=>{if(selected?.id!==c.id)e.currentTarget.style.background='transparent';}}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
              <span style={{ fontSize:13, fontWeight:600, color:C.text }}>{c.name}</span>
              <StatusBadge status={c.status} />
            </div>
            <div style={{ display:'flex', gap:6, fontSize:11, color:C.textLight }}>
              <StatusBadge status={c.plan} />
              <span>사이트 {c.sites}개</span>
            </div>
          </div>
        ))}
      </div>
      <div style={{ flex:1, overflowY:'auto', padding:20 }}>
        {selected ? (
          <div style={{ animation:'fadeIn 200ms ease' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16 }}>
              <h3 style={{ fontSize:18, fontWeight:700 }}>{selected.name}</h3>
              <div style={{ display:'flex', gap:6 }}><StatusBadge status={selected.plan} /><StatusBadge status={selected.status} /></div>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:10, marginBottom:16 }}>
              {[{label:'관리 사이트',value:`${selected.sites}개`},{label:'담당자',value:selected.contact},{label:'최근 활동',value:selected.lastActivity}].map(k => (
                <div key={k.label} style={{ padding:12, background:C.bg, borderRadius:4, border:`1px solid ${C.border}` }}>
                  <div style={{ fontSize:10, color:C.textLight, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:4 }}>{k.label}</div>
                  <div style={{ fontSize:14, fontWeight:700, color:C.text }}>{k.value}</div>
                </div>
              ))}
            </div>
            <div style={{ background:C.bg, borderRadius:4, border:`1px solid ${C.border}`, padding:16, marginBottom:16 }}>
              <div style={{ fontSize:11, fontWeight:700, color:C.textLight, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:10 }}>사이트 목록</div>
              {[...Array(selected.sites)].map((_,i) => (
                <div key={i} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 0', borderBottom:i<selected.sites-1?`1px solid ${C.border}`:'none' }}>
                  <div style={{ fontSize:12, color:C.accent, fontFamily:'monospace' }}>site-{String(i+1).padStart(2,'0')}.{selected.name.replace(/[^a-zA-Z]/g,'').toLowerCase().slice(0,8)}.co.kr</div>
                  <Badge color={C.success}>운영중</Badge>
                </div>
              ))}
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <Btn variant="secondary" onClick={()=>setModal({type:'edit',item:selected})}>수정</Btn>
              <Btn variant="ghost" onClick={()=>onToast('권한이 변경되었습니다.')}>권한 설정</Btn>
            </div>
          </div>
        ) : (
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%', color:C.textLight, fontSize:13 }}>좌측 목록에서 고객사를 선택하세요</div>
        )}
      </div>

      <Modal open={!!modal} onClose={()=>setModal(null)} title={modal?.type==='edit'?'고객사 수정':'새 고객사 추가'}>
        <InputField label="회사명" value={modal?.type==='edit'?modal.item.name:''} onChange={()=>{}} placeholder="회사명" />
        <InputField label="담당자" value={modal?.type==='edit'?modal.item.contact:''} onChange={()=>{}} placeholder="담당자 이름" />
        <div style={{ marginBottom:14 }}>
          <label style={{ display:'block', fontSize:11, fontWeight:700, color:C.textSub, marginBottom:4, textTransform:'uppercase', letterSpacing:'0.05em' }}>플랜</label>
          <select style={{ width:'100%', padding:'8px 12px', border:`1px solid ${C.border}`, borderRadius:4, fontSize:13, fontFamily:'inherit', background:C.bg, color:C.text }}>
            <option>Enterprise</option><option>Business</option><option>Starter</option>
          </select>
        </div>
        <div style={{ display:'flex', gap:6, justifyContent:'flex-end' }}>
          <Btn variant="secondary" onClick={()=>setModal(null)}>취소</Btn>
          <Btn onClick={()=>{setModal(null);onToast(modal?.type==='edit'?'수정되었습니다.':'추가되었습니다.');}}>{modal?.type==='edit'?'수정':'추가'}</Btn>
        </div>
      </Modal>
    </div>
  );
}

/* ── 사이트 설정 ── */
function SettingsSection({ tab, onToast }) {
  if (tab===0) return (
    <div style={{ flex:1, overflowY:'auto', padding:20, animation:'fadeIn 200ms ease', maxWidth:600 }}>
      <InputField label="사이트명" value="클라우드원" onChange={()=>{}} />
      <InputField label="기본 도메인" value="https://cloudone.co.kr" onChange={()=>{}} />
      <InputField label="대표 이메일" value="contact@cloudone.co.kr" onChange={()=>{}} />
      <InputField label="사이트 설명" textarea value="클라우드 인프라 전문 기업 클라우드원 - 통합 모니터링, 마이그레이션, 보안 솔루션" onChange={()=>{}} />
      <div style={{ display:'flex', gap:6, justifyContent:'flex-end', marginTop:8 }}><Btn onClick={()=>onToast('설정이 저장되었습니다.')}>저장</Btn></div>
    </div>
  );
  if (tab===1) return (
    <div style={{ flex:1, overflowY:'auto', padding:20, animation:'fadeIn 200ms ease', maxWidth:600 }}>
      <InputField label="메타 타이틀" value="클라우드원 | 기업 클라우드 인프라 파트너" onChange={()=>{}} />
      <InputField label="메타 설명" textarea value="통합 모니터링, 클라우드 마이그레이션, DevSecOps 보안 솔루션을 제공하는 클라우드 인프라 전문 기업" onChange={()=>{}} />
      <InputField label="키워드" value="클라우드, 인프라, 모니터링, 마이그레이션, DevSecOps" onChange={()=>{}} />
      <div style={{ padding:14, background:C.bg, borderRadius:4, border:`1px solid ${C.border}`, marginBottom:14 }}>
        <div style={{ fontSize:11, color:C.textLight, marginBottom:6 }}>Google 검색 미리보기</div>
        <div style={{ fontSize:14, fontWeight:600, color:C.accent, marginBottom:2 }}>클라우드원 | 기업 클라우드 인프라 파트너</div>
        <div style={{ fontSize:11, color:C.success }}>https://cloudone.co.kr</div>
        <div style={{ fontSize:12, color:C.textSub, marginTop:2 }}>통합 모니터링, 클라우드 마이그레이션, DevSecOps 보안 솔루션을 제공하는...</div>
      </div>
      <div style={{ display:'flex', gap:6, justifyContent:'flex-end' }}><Btn onClick={()=>onToast('SEO 설정이 저장되었습니다.')}>저장</Btn></div>
    </div>
  );
  // 알림 규칙
  return (
    <div style={{ flex:1, overflowY:'auto', padding:20, animation:'fadeIn 200ms ease' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
        <span style={{ fontSize:11, fontWeight:700, color:C.textLight, textTransform:'uppercase', letterSpacing:'0.06em' }}>알림 규칙</span>
        <Btn size="sm" onClick={()=>onToast('새 규칙이 추가되었습니다.')}>+ 규칙 추가</Btn>
      </div>
      {[
        { name:'방문자 급감 알림', condition:'일일 방문자 < 500', channel:'이메일 + 슬랙', active:true },
        { name:'에러율 경고', condition:'5XX 에러율 > 1%', channel:'슬랙', active:true },
        { name:'신규 문의 알림', condition:'새 문의 접수 시', channel:'이메일', active:true },
        { name:'SSL 인증서 만료', condition:'만료 30일 전', channel:'이메일 + 슬랙', active:false },
      ].map((rule,i) => (
        <div key={rule.name} style={{ padding:14, background:C.surface, borderRadius:4, border:`1px solid ${C.border}`, marginBottom:8, display:'flex', alignItems:'center', gap:12, animation:`slideUp 200ms ease ${i*60}ms both` }}>
          <div style={{ width:8, height:8, borderRadius:'50%', background:rule.active?C.success:C.textLight }} />
          <div style={{ flex:1 }}>
            <div style={{ fontSize:13, fontWeight:600, color:C.text }}>{rule.name}</div>
            <div style={{ fontSize:11, color:C.textLight, marginTop:2 }}>조건: {rule.condition} · 채널: {rule.channel}</div>
          </div>
          <Btn variant="ghost" size="sm" onClick={()=>onToast('규칙이 수정되었습니다.')}>수정</Btn>
        </div>
      ))}
    </div>
  );
}

/* ── App ── */
function App() {
  const [loading, setLoading] = useState(true);
  const [section, setSection] = useState('contents');
  const [tab, setTab] = useState(0);
  const [selected, setSelected] = useState(null);
  const [toast, setToast] = useState(null);
  useEffect(()=>{ setTimeout(()=>setLoading(false), 1500); },[]);
  useEffect(()=>{ setTab(0); setSelected(null); },[section]);
  if (loading) return <SkeletonLoader />;

  const tabs = SECTION_TABS[section]||[];

  return (
    <div style={{ display:'flex', minHeight:'100vh', background:C.bg }}>
      {/* 아이콘 레일 56px */}
      <nav style={{ width:56, background:C.surface, borderRight:`1px solid ${C.border}`, display:'flex', flexDirection:'column', alignItems:'center', paddingTop:12, gap:4, flexShrink:0 }}>
        <div style={{ width:32, height:32, borderRadius:6, background:`linear-gradient(135deg, ${C.accent}, ${C.accentLight})`, display:'flex', alignItems:'center', justifyContent:'center', color:'#0F172A', fontSize:14, fontWeight:800, marginBottom:16 }}>C1</div>
        {RAIL_ITEMS.map(item => (
          <button key={item.id} title={item.label} onClick={()=>setSection(item.id)} style={{
            width:40, height:40, borderRadius:6, border:'none', cursor:'pointer', fontSize:18,
            display:'flex', alignItems:'center', justifyContent:'center', transition:'all 150ms',
            background:section===item.id ? `${C.accent}20` : 'transparent',
            color:section===item.id ? C.accent : C.textLight,
          }}
            onMouseOver={e=>{if(section!==item.id)e.target.style.background=C.surfaceHover;}}
            onMouseOut={e=>{if(section!==item.id)e.target.style.background='transparent';}}>
            {item.icon}
          </button>
        ))}
      </nav>

      {/* 메인 영역 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* 앱바 40px */}
        <header style={{ height:40, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', padding:'0 16px', gap:8, background:C.surface, flexShrink:0 }}>
          <span style={{ fontSize:12, color:C.textLight }}>클라우드원</span>
          <span style={{ fontSize:12, color:C.textLight }}>/</span>
          <span style={{ fontSize:12, color:C.text, fontWeight:600 }}>{RAIL_ITEMS.find(i=>i.id===section)?.label}</span>
          {tabs[tab] && <><span style={{ fontSize:12, color:C.textLight }}>/</span><span style={{ fontSize:12, color:C.accent }}>{tabs[tab].label}</span></>}
          <div style={{ flex:1 }} />
          <div style={{ position:'relative' }}>
            <input placeholder="검색..." style={{ padding:'5px 10px 5px 28px', border:`1px solid ${C.border}`, borderRadius:4, fontSize:11, outline:'none', background:C.bg, color:C.text, width:160 }} />
            <span style={{ position:'absolute', left:8, top:'50%', transform:'translateY(-50%)', fontSize:12 }}>🔍</span>
          </div>
          <div style={{ width:24, height:24, borderRadius:4, background:C.accent, display:'flex', alignItems:'center', justifyContent:'center', color:'#0F172A', fontSize:10, fontWeight:800 }}>관</div>
        </header>

        {/* 인라인 탭 스트립 */}
        <div style={{ height:36, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'flex-end', padding:'0 16px', background:C.surface, flexShrink:0 }}>
          {tabs.map((t,i) => (
            <button key={t.id} onClick={()=>{setTab(i);setSelected(null);}} style={{
              padding:'6px 14px 5px', border:'none', cursor:'pointer', background:'transparent',
              fontFamily:'inherit', fontSize:12, color:tab===i?C.accent:C.textLight, fontWeight:tab===i?600:400,
              borderBottom:tab===i?`2px solid ${C.accent}`:'2px solid transparent', marginBottom:-1, transition:'all 150ms',
            }}>{t.label}</button>
          ))}
        </div>

        {/* 콘텐츠 */}
        {section==='contents' && <ContentsSection tab={tab} selected={selected} setSelected={setSelected} onToast={msg=>setToast(msg)} />}
        {section==='analytics' && <AnalyticsSection tab={tab} />}
        {section==='clients' && <ClientsSection tab={tab} selected={selected} setSelected={setSelected} onToast={msg=>setToast(msg)} />}
        {section==='settings' && <SettingsSection tab={tab} onToast={msg=>setToast(msg)} />}
      </div>

      {toast && <Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
