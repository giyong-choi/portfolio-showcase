<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#FAF5FF;color:#1E1B4B;overflow:hidden}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.skeleton{background:linear-gradient(90deg,#EDE9FE 25%,#DDD6FE 50%,#EDE9FE 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C4B5FD;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#A78BFA}
</style>

/* ── 유틸 컴포넌트 ── */
function Badge({ children, color=C.primary, bg }) {
  return <span style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'3px 12px', borderRadius:24, fontSize:12, fontWeight:600, color, background:bg||color+'18' }}>{children}</span>;
}
function StatusBadge({ status }) {
  const m = {'대기':{c:C.warning,b:'#FEF3C7'},'처리중':{c:C.primary,b:C.primaryLight},'완료':{c:C.success,b:'#D1FAE5'},'게시중':{c:C.success,b:'#D1FAE5'},'임시저장':{c:C.textSub,b:'#F3F4F6'}};
  const s = m[status]||{c:C.textSub,b:'#F3F4F6'};
  return <Badge color={s.c} bg={s.b}>{status}</Badge>;
}
function CountUp({ end, suffix='' }) {
  const [val, setVal] = useState(0);
  useEffect(()=>{ let s=0; const step=end/50; const t=setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);} else setVal(Math.floor(s)); },24); return ()=>clearInterval(t); },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}
function Toast({ message, onClose }) {
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primary,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(124,58,237,0.3)',fontSize:14}}>{message}</div>;
}
function Btn({ children, onClick, variant='primary', size='md' }) {
  const base = { border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:700, borderRadius:12, display:'inline-flex', alignItems:'center', gap:6, transition:'all 200ms' };
  const sizes = { sm:{padding:'6px 14px',fontSize:12}, md:{padding:'9px 18px',fontSize:13}, lg:{padding:'11px 22px',fontSize:14} };
  const variants = { primary:{background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`,color:'#fff'}, secondary:{background:C.bg,color:C.primary,border:`1px solid ${C.border}`}, danger:{background:C.danger,color:'#fff'}, ghost:{background:'transparent',color:C.textSub} };
  return <button onClick={onClick} style={{...base,...sizes[size],...variants[variant]}}
    onMouseOver={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(124,58,237,0.25)';}}
    onMouseOut={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='none';}}>{children}</button>;
}

/* ── Drawer (슬라이드오버) ── */
function Drawer({ open, onClose, title, children }) {

  return (

      <div style={{ position:'fixed', top:0, right:0, bottom:0, width:480, background:C.surface, boxShadow:'-8px 0 40px rgba(0,0,0,0.15)', zIndex:201, overflowY:'auto', animation:'slideInRight 200ms ease' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 24px', borderBottom:`1px solid ${C.border}` }}>
          <h3 style={{ fontSize:18, fontWeight:700 }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, color:C.textLight }}>✕</button>
        </div>

      </div>

}

function InputField({ label, value, onChange, placeholder, textarea, type='text' }) {

  return (
    <div style={{ marginBottom:16 }}>
      <label style={{ display:'block', fontSize:13, fontWeight:600, color:C.textSub, marginBottom:6 }}>{label}</label>
      {textarea ? <textarea value={value} onChange={onChange} placeholder={placeholder} rows={4} style={{...s, resize:'vertical'}} /> : <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={s} />}
    </div>
  );
}

/* ── App ── */
function App() {
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('contents');
  const [toast, setToast] = useState(null);
  useEffect(()=>{ setTimeout(()=>setLoading(false), 1500); },[]);
  if (loading) return <SkeletonLoader />;

  const meta = heroMeta[tab];

  return (
    <div style={{ minHeight:'100vh', background:C.bg }}>
      {/* 상단 수평 네비 */}
      <header style={{ position:'sticky', top:0, zIndex:100, background:C.surface, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', height:56, padding:'0 24px', gap:8 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, marginRight:16 }}>
          <div style={{ width:28, height:28, borderRadius:8, background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:14, fontWeight:800 }}>F</div>
          <span style={{ fontSize:15, fontWeight:800, color:C.secondary }}>핀에듀</span>
        </div>
        {TABS.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:'8px 16px', borderRadius:8, border:'none', cursor:'pointer', fontSize:13,
            fontWeight:tab===t.id?700:500, fontFamily:'inherit',
            background:tab===t.id?C.primaryLight:'transparent', color:tab===t.id?C.primary:C.textSub,
            transition:'all 150ms',
          }}
            onMouseOver={e=>{if(tab!==t.id)e.target.style.background='#F3F4F6';}}
            onMouseOut={e=>{if(tab!==t.id)e.target.style.background='transparent';}}>{t.label}</button>
        ))}
        <div style={{ flex:1 }} />
        <div style={{ position:'relative' }}>
          <input placeholder="검색..." style={{ padding:'7px 12px 7px 32px', border:`1px solid ${C.border}`, borderRadius:8, fontSize:12, outline:'none', width:180 }} />
          <span style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', fontSize:13 }}>🔍</span>
        </div>
        <div style={{ position:'relative', cursor:'pointer', marginLeft:8 }}><span style={{ fontSize:18 }}>🔔</span><span style={{ position:'absolute', top:-2, right:-3, width:7, height:7, borderRadius:'50%', background:C.danger }} /></div>
        <div style={{ width:30, height:30, borderRadius:'50%', background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:700, fontSize:12, marginLeft:8 }}>관</div>
      </header>

      {/* 히어로 배너 */}
      <div style={{ background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, padding:'28px 32px', color:'#fff' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
          <span style={{ fontSize:28 }}>{meta.icon}</span>
          <h1 style={{ fontSize:28, fontWeight:800, letterSpacing:'-0.03em' }}>{meta.title}</h1>
        </div>
        <div style={{ display:'flex', gap:32, marginTop:12 }}>
          {meta.kpis.map(k => (
            <div key={k.label}>
              <div style={{ fontSize:12, opacity:0.8, marginBottom:2 }}>{k.label}</div>
              <div style={{ display:'flex', alignItems:'baseline', gap:6 }}>
                <span style={{ fontSize:22, fontWeight:800 }}>{k.value}</span>
                {k.change && <span style={{ fontSize:12, background:'rgba(255,255,255,0.2)', padding:'2px 8px', borderRadius:10 }}>{k.change}</span>}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* 콘텐츠 */}
      <main style={{ padding:'24px 32px', maxHeight:'calc(100vh - 56px - 120px)', overflow:'auto' }}>
        {tab==='dashboard' && <DashboardContent onToast={msg=>setToast(msg)} />}
        {tab==='contents' && <ContentsContent onToast={msg=>setToast(msg)} />}
        {tab==='library' && <LibraryContent onToast={msg=>setToast(msg)} />}
        {tab==='inquiry' && <InquiryContent onToast={msg=>setToast(msg)} />}
        {tab==='settings' && <SettingsContent onToast={msg=>setToast(msg)} />}
      </main>

      {toast && <Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
