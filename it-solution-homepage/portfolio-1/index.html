<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#F0F9FF;color:#0F172A;overflow:hidden}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.skeleton{background:linear-gradient(90deg,#E0F2FE 25%,#BAE6FD 50%,#E0F2FE 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94A3B8}
</style>

/* ── 유틸 컴포넌트 ── */
function Badge({ children, color=C.primary, bg }) {
  return <span style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'2px 10px', borderRadius:20, fontSize:12, fontWeight:600, color, background:bg||color+'18' }}>{children}</span>;
}
function StatusBadge({ status }) {
  const m = { '대기':{c:C.warning,b:'#FEF3C7'}, '처리중':{c:C.info,b:'#E0F2FE'}, '완료':{c:C.success,b:'#D1FAE5'}, '게시중':{c:C.success,b:'#D1FAE5'}, '임시저장':{c:C.textSub,b:'#F1F5F9'}, '활성':{c:C.success,b:'#D1FAE5'}, '비활성':{c:C.textSub,b:'#F1F5F9'} };
  const s = m[status]||{c:C.textSub,b:'#F1F5F9'};
  return <Badge color={s.c} bg={s.b}>{status}</Badge>;
}
function CountUp({ end, suffix='', prefix='' }) {
  const [val, setVal] = useState(0);
  useEffect(()=>{ let s=0; const step=end/50; const t=setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);} else setVal(Math.floor(s)); },24); return ()=>clearInterval(t); },[end]);
  return <span style={{ animation:'countUp 400ms ease' }}>{prefix}{val.toLocaleString()}{suffix}</span>;
}
function Toast({ message, onClose }) {
  useEffect(()=>{ const t=setTimeout(onClose,3000); return ()=>clearTimeout(t); },[]);
  return <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:C.success, color:'#fff', padding:'12px 24px', borderRadius:8, animation:'slideUp 300ms ease', boxShadow:'0 4px 16px rgba(0,0,0,0.2)', fontSize:14 }}>{message}</div>;
}

/* ── 모달 ── */
function Modal({ open, onClose, title, width=560, children }) {
  if (!open) return null;
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', zIndex:500 }} />
      <div style={{ position:'fixed', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width, maxWidth:'90vw', maxHeight:'85vh', overflowY:'auto', background:C.surface, borderRadius:16, boxShadow:'0 20px 60px rgba(0,0,0,0.2)', zIndex:501, animation:'fadeInScale 200ms ease' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 24px', borderBottom:`1px solid ${C.border}` }}>
          <h3 style={{ fontSize:18, fontWeight:700 }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, color:C.textLight }}>✕</button>
        </div>
        <div style={{ padding:24 }}>{children}</div>
      </div>
    </>
  );
}
function InputField({ label, value, onChange, type='text', placeholder, textarea, readOnly }) {
  const s = { width:'100%', padding:'10px 14px', border:`1px solid ${C.border}`, borderRadius:8, fontSize:14, fontFamily:'inherit', outline:'none', background:readOnly?'#F8FAFC':C.surface, transition:'border-color 150ms' };
  return (
    <div style={{ marginBottom:16 }}>
      <label style={{ display:'block', fontSize:13, fontWeight:600, color:C.textSub, marginBottom:6 }}>{label}</label>
      {textarea ? <textarea value={value} onChange={onChange} placeholder={placeholder} readOnly={readOnly} rows={4} style={{...s, resize:'vertical'}} /> : <input type={type} value={value} onChange={onChange} placeholder={placeholder} readOnly={readOnly} style={s} />}
    </div>
  );
}
function SelectField({ label, value, onChange, options }) {
  return (
    <div style={{ marginBottom:16 }}>
      <label style={{ display:'block', fontSize:13, fontWeight:600, color:C.textSub, marginBottom:6 }}>{label}</label>
      <select value={value} onChange={onChange} style={{ width:'100%', padding:'10px 14px', border:`1px solid ${C.border}`, borderRadius:8, fontSize:14, fontFamily:'inherit', outline:'none', background:C.surface, cursor:'pointer' }}>
        {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </div>
  );
}
function Btn({ children, onClick, variant='primary', size='md', style:sx={} }) {
  const base = { border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, borderRadius:8, display:'inline-flex', alignItems:'center', gap:6, transition:'all 150ms' };
  const sizes = { sm:{padding:'6px 12px',fontSize:12}, md:{padding:'8px 16px',fontSize:13}, lg:{padding:'10px 20px',fontSize:14} };
  const variants = { primary:{background:C.primary,color:'#fff'}, secondary:{background:C.bg,color:C.primary,border:`1px solid ${C.border}`}, danger:{background:C.danger,color:'#fff'}, ghost:{background:'transparent',color:C.textSub} };
  return <button onClick={onClick} style={{...base,...sizes[size],...variants[variant],...sx}} onMouseOver={e=>{if(variant==='primary')e.target.style.filter='brightness(1.05)';}} onMouseOut={e=>e.target.style.filter='none'}>{children}</button>;
}

/* ── 스켈레톤 ── */
function SkeletonLoader() {
  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <div style={{ width:260, background:'#0F172A', flexShrink:0 }}><div style={{ padding:20 }}><div className="skeleton" style={{ height:32, width:140, marginBottom:32 }} />{[...Array(4)].map((_,i)=><div key={i} className="skeleton" style={{ height:20, width:180, marginBottom:16, opacity:0.3 }} />)}</div></div>
      <div style={{ flex:1, padding:24 }}><div className="skeleton" style={{ height:24, width:200, marginBottom:24 }} /><div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:20, marginBottom:24 }}>{[...Array(4)].map((_,i)=><div key={i} className="skeleton" style={{ height:100 }} />)}</div><div className="skeleton" style={{ height:300 }} /></div>
    </div>
  );
}

/* ── 게시물 관리 (기본 화면) ── */
function BoardPage({ onToast }) {
  const [filter, setFilter] = useState('전체');
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(null);
  const [detailItem, setDetailItem] = useState(null);
  const [currentPage, setCurrentPage] = useState(1);
  const PER_PAGE = 5;
  const filtered = POSTS.filter(p => (filter==='전체'||p.type===filter) && (search===''||p.title.includes(search)));
  const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
  const paged = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

  // KPI
  const kpis = [
    { label:'전체 게시물', value:POSTS.length, suffix:'건', icon:'📋', change:'+3' },
    { label:'공지사항', value:POSTS.filter(p=>p.type==='공지사항').length, suffix:'건', icon:'📢', change:'+1' },
    { label:'자료실', value:POSTS.filter(p=>p.type==='자료실').length, suffix:'건', icon:'📁', change:'+2' },
    { label:'총 조회수', value:POSTS.reduce((a,p)=>a+p.views,0), suffix:'', icon:'👁️', change:'+12%' },
  ];

  return (
    <div style={{ animation:'fadeIn 300ms ease' }}>
      {/* KPI 카드 */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:20, marginBottom:24 }}>
        {kpis.map((k,i) => (
          <div key={k.label} style={{ background:C.surface, borderRadius:C.card.borderRadius, boxShadow:C.card.boxShadow, padding:20, animation:`slideUp 400ms ease ${i*80}ms both`, transition:'all 200ms', cursor:'default' }}
            onMouseOver={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,0.12)';}}
            onMouseOut={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow=C.card.boxShadow;}}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
              <div>
                <div style={{ fontSize:12, color:C.textLight, marginBottom:4 }}>{k.label}</div>
                <div style={{ fontSize:28, fontWeight:800, letterSpacing:'-0.02em' }}><CountUp end={k.value} suffix={k.suffix} /></div>
              </div>
              <div style={{ fontSize:24 }}>{k.icon}</div>
            </div>
            <div style={{ marginTop:6, fontSize:12, color:C.success, fontWeight:600 }}>{k.change} 전월 대비</div>
          </div>
        ))}
      </div>

      {/* 필터 & 액션 */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
        <div style={{ display:'flex', gap:8 }}>
          {['전체','공지사항','자료실'].map(f => (
            <button key={f} onClick={()=>{setFilter(f);setCurrentPage(1);}} style={{ padding:'6px 16px', borderRadius:20, border:`1px solid ${filter===f?C.primary:C.border}`, background:filter===f?C.primary:'transparent', color:filter===f?'#fff':C.textSub, fontSize:13, fontWeight:500, cursor:'pointer', transition:'all 150ms' }}>{f}</button>
          ))}
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="게시물 검색..." style={{ padding:'8px 14px', border:`1px solid ${C.border}`, borderRadius:8, fontSize:13, outline:'none', width:200 }} />
          <Btn onClick={()=>setModal('create')}>+ 새 글 작성</Btn>
        </div>
      </div>

      {/* 테이블 */}
      <div style={{ background:C.surface, borderRadius:C.card.borderRadius, boxShadow:C.card.boxShadow, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead><tr style={{ borderBottom:`2px solid ${C.border}` }}>
            {['','유형','제목','작성자','작성일','조회','상태',''].map((h,i) => <th key={i} style={{ padding:'12px', fontSize:12, fontWeight:600, color:C.textLight, textAlign:'left' }}>{h}</th>)}
          </tr></thead>
          <tbody>{paged.map((p,idx) => (
            <tr key={p.id} style={{ borderBottom:`1px solid ${C.border}`, animation:`slideUp 300ms ease ${idx*40}ms both`, transition:'background 150ms', cursor:'pointer', height:52 }}
              onMouseOver={e=>e.currentTarget.style.background=`${C.primary}08`}
              onMouseOut={e=>e.currentTarget.style.background='transparent'}
              onClick={()=>setDetailItem(p)}>
              <td style={{ padding:'12px', width:40 }}><input type="checkbox" style={{ cursor:'pointer' }} onClick={e=>e.stopPropagation()} /></td>
              <td style={{ padding:'12px' }}><Badge color={p.type==='공지사항'?C.primary:C.warning} bg={p.type==='공지사항'?C.primaryLight:'#FEF3C7'}>{p.type}</Badge></td>
              <td style={{ padding:'12px', fontSize:13, fontWeight:p.pinned?600:400, maxWidth:320, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{p.pinned && '📌 '}{p.title}</td>
              <td style={{ padding:'12px', fontSize:13, color:C.textSub }}>{p.author}</td>
              <td style={{ padding:'12px', fontSize:13, color:C.textSub }}>{p.date}</td>
              <td style={{ padding:'12px', fontSize:13, color:C.textSub }}>{p.views}</td>
              <td style={{ padding:'12px' }}><StatusBadge status={p.status} /></td>
              <td style={{ padding:'12px' }}><Btn variant="ghost" size="sm" onClick={e=>{e.stopPropagation();setModal({type:'edit',item:p});}}>수정</Btn></td>
            </tr>
          ))}</tbody>
        </table>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'12px 16px', borderTop:`1px solid ${C.border}` }}>
          <span style={{ fontSize:12, color:C.textLight }}>총 {filtered.length}건 (페이지 {currentPage}/{totalPages})</span>
          <div style={{ display:'flex', gap:4, alignItems:'center' }}>
            <button onClick={()=>setCurrentPage(p=>Math.max(1,p-1))} disabled={currentPage===1} style={{ width:32, height:32, borderRadius:6, border:`1px solid ${C.border}`, background:'transparent', color:currentPage===1?C.border:C.textSub, fontSize:13, cursor:currentPage===1?'default':'pointer' }}>‹</button>
            {[...Array(totalPages)].map((_,i) => <button key={i+1} onClick={()=>setCurrentPage(i+1)} style={{ width:32, height:32, borderRadius:6, border:currentPage===i+1?`1px solid ${C.primary}`:`1px solid ${C.border}`, background:currentPage===i+1?C.primaryLight:'transparent', color:currentPage===i+1?C.primary:C.textSub, fontSize:13, fontWeight:600, cursor:'pointer', transition:'all 150ms' }}>{i+1}</button>)}
            <button onClick={()=>setCurrentPage(p=>Math.min(totalPages,p+1))} disabled={currentPage===totalPages} style={{ width:32, height:32, borderRadius:6, border:`1px solid ${C.border}`, background:'transparent', color:currentPage===totalPages?C.border:C.textSub, fontSize:13, cursor:currentPage===totalPages?'default':'pointer' }}>›</button>
          </div>
        </div>
      </div>

      {/* 작성/수정 모달 */}
      <Modal open={!!modal} onClose={()=>setModal(null)} title={modal?.type==='edit'?'게시물 수정':'새 글 작성'} width={640}>
        <SelectField label="유형" value={modal?.type==='edit'?modal.item.type:'공지사항'} onChange={()=>{}} options={[{value:'공지사항',label:'공지사항'},{value:'자료실',label:'자료실'}]} />
        <InputField label="제목" value={modal?.type==='edit'?modal.item.title:''} onChange={()=>{}} placeholder="게시물 제목을 입력하세요" />
        <InputField label="내용" textarea value={modal?.type==='edit'?'넥스텍솔루션즈 홈페이지가 새롭게 리뉴얼되었습니다. 더 나은 사용자 경험과 최신 디자인으로 고객 여러분을 맞이합니다.':''} onChange={()=>{}} placeholder="내용을 입력하세요" />
        <InputField label="첨부파일" type="file" value="" onChange={()=>{}} />
        <div style={{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:8 }}>
          <Btn variant="secondary" onClick={()=>setModal(null)}>취소</Btn>
          <Btn variant="secondary" onClick={()=>{setModal(null);onToast('임시저장되었습니다.');}}>임시저장</Btn>
          <Btn onClick={()=>{setModal(null);onToast(modal?.type==='edit'?'게시물이 수정되었습니다.':'게시물이 등록되었습니다.');}}>{modal?.type==='edit'?'수정':'등록'}</Btn>
        </div>
      </Modal>

      {/* 상세 모달 */}
      <Modal open={!!detailItem} onClose={()=>setDetailItem(null)} title="게시물 상세" width={640}>
        {detailItem && (
          <>
            <div style={{ display:'flex', gap:8, marginBottom:12 }}><Badge color={detailItem.type==='공지사항'?C.primary:C.warning} bg={detailItem.type==='공지사항'?C.primaryLight:'#FEF3C7'}>{detailItem.type}</Badge><StatusBadge status={detailItem.status} /></div>
            <h3 style={{ fontSize:18, fontWeight:700, marginBottom:12 }}>{detailItem.title}</h3>
            <div style={{ display:'flex', gap:16, fontSize:13, color:C.textSub, marginBottom:16 }}><span>작성자: {detailItem.author}</span><span>작성일: {detailItem.date}</span><span>조회수: {detailItem.views}</span></div>
            <div style={{ padding:16, background:'#F8FAFC', borderRadius:8, fontSize:14, lineHeight:1.8, color:C.text }}>넥스텍솔루션즈에서 안내드립니다. 해당 게시물의 상세 내용이 여기에 표시됩니다.</div>
            {detailItem.file && <div style={{ marginTop:12, padding:'10px 14px', background:C.primaryLight, borderRadius:8, fontSize:13, color:C.primary, fontWeight:600 }}>📎 {detailItem.file}</div>}
          </>
        )}
      </Modal>
    </div>
  );
}

/* ── 글 작성/수정 페이지 ── */
function EditorPage({ onToast }) {
  const [title, setTitle] = useState('');
  const [type, setType] = useState('공지사항');
  const [content, setContent] = useState('');
  const [preview, setPreview] = useState(false);
  return (
    <div style={{ animation:'fadeIn 300ms ease' }}>
      <div style={{ display:'grid', gridTemplateColumns:preview?'1fr 1fr':'1fr', gap:20 }}>
        <div style={{ background:C.surface, borderRadius:C.card.borderRadius, boxShadow:C.card.boxShadow, padding:C.card.padding }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
            <h3 style={{ fontSize:18, fontWeight:700 }}>글 작성</h3>
            <Btn variant="secondary" size="sm" onClick={()=>setPreview(!preview)}>{preview?'미리보기 닫기':'미리보기'}</Btn>
          </div>
          <SelectField label="유형" value={type} onChange={e=>setType(e.target.value)} options={[{value:'공지사항',label:'공지사항'},{value:'자료실',label:'자료실'}]} />
          <InputField label="제목" value={title} onChange={e=>setTitle(e.target.value)} placeholder="게시물 제목을 입력하세요" />
          <div style={{ marginBottom:16 }}>
            <label style={{ display:'block', fontSize:13, fontWeight:600, color:C.textSub, marginBottom:6 }}>내용</label>
            <div style={{ border:`1px solid ${C.border}`, borderRadius:8, overflow:'hidden' }}>
              <div style={{ display:'flex', gap:2, padding:'8px 12px', borderBottom:`1px solid ${C.border}`, background:'#F8FAFC' }}>
                {['B','I','U','H1','H2','📎','🔗','📷'].map(b => (
                  <button key={b} style={{ padding:'4px 8px', borderRadius:4, border:'none', background:'transparent', cursor:'pointer', fontSize:13, fontWeight:b==='B'?700:400, fontStyle:b==='I'?'italic':'normal', textDecoration:b==='U'?'underline':'none', color:C.textSub }}
                    onMouseOver={e=>e.target.style.background='#E2E8F0'} onMouseOut={e=>e.target.style.background='transparent'}>{b}</button>
                ))}
              </div>
              <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="내용을 입력하세요..." rows={12} style={{ width:'100%', padding:16, border:'none', outline:'none', fontSize:14, fontFamily:'inherit', lineHeight:1.8, resize:'vertical' }} />
            </div>
          </div>
          <InputField label="첨부파일" type="file" value="" onChange={()=>{}} />
          <div style={{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:8 }}>
            <Btn variant="secondary" onClick={()=>onToast('임시저장되었습니다.')}>임시저장</Btn>
            <Btn onClick={()=>onToast('게시물이 등록되었습니다.')}>등록하기</Btn>
          </div>
        </div>
        {preview && (
          <div style={{ background:C.surface, borderRadius:C.card.borderRadius, boxShadow:C.card.boxShadow, padding:C.card.padding, animation:'slideInRight 300ms ease' }}>
            <div style={{ fontSize:12, color:C.textLight, fontWeight:600, marginBottom:8 }}>미리보기</div>
            <div style={{ padding:16, background:'#F8FAFC', borderRadius:8, minHeight:400 }}>
              <Badge color={type==='공지사항'?C.primary:C.warning} bg={type==='공지사항'?C.primaryLight:'#FEF3C7'}>{type}</Badge>
              <h2 style={{ fontSize:22, fontWeight:700, margin:'12px 0' }}>{title || '제목을 입력하세요'}</h2>
              <div style={{ fontSize:13, color:C.textSub, marginBottom:16 }}>관리자 · 2024.08.01</div>
              <div style={{ fontSize:14, lineHeight:1.8, color:C.text, whiteSpace:'pre-wrap' }}>{content || '내용이 여기에 표시됩니다...'}</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── 문의 관리 페이지 ── */
function InquiryPage({ onToast }) {
  const [selected, setSelected] = useState(null);
  const [filter, setFilter] = useState('전체');
  const [replyModal, setReplyModal] = useState(null);
  const [replyText, setReplyText] = useState('');
  const filtered = INQUIRIES.filter(i => filter==='전체' || i.status===filter);
  return (
    <div style={{ animation:'fadeIn 300ms ease' }}>
      <div style={{ display:'flex', gap:8, marginBottom:20 }}>
        {['전체','대기','처리중','완료'].map(f => (
          <button key={f} onClick={()=>setFilter(f)} style={{ padding:'6px 16px', borderRadius:20, border:`1px solid ${filter===f?C.primary:C.border}`, background:filter===f?C.primary:'transparent', color:filter===f?'#fff':C.textSub, fontSize:13, fontWeight:500, cursor:'pointer', transition:'all 150ms' }}>
            {f} {f!=='전체' && <span style={{opacity:0.7}}>({INQUIRIES.filter(i=>f==='전체'||i.status===f).length})</span>}
          </button>
        ))}
      </div>
      <div style={{ background:C.surface, borderRadius:C.card.borderRadius, boxShadow:C.card.boxShadow, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead><tr style={{ borderBottom:`2px solid ${C.border}` }}>
            {['ID','분류','제목','문의자','회사','문의일','상태',''].map(h => <th key={h} style={{ padding:'12px', fontSize:12, fontWeight:600, color:C.textLight, textAlign:'left' }}>{h}</th>)}
          </tr></thead>
          <tbody>{filtered.map((inq,idx) => (
            <tr key={inq.id} style={{ borderBottom:`1px solid ${C.border}`, animation:`slideUp 300ms ease ${idx*40}ms both`, transition:'background 150ms', cursor:'pointer', height:52 }}
              onMouseOver={e=>e.currentTarget.style.background=`${C.primary}08`}
              onMouseOut={e=>e.currentTarget.style.background='transparent'}
              onClick={()=>setSelected(inq)}>
              <td style={{ padding:'12px', fontSize:12, color:C.textLight, fontFamily:'monospace' }}>{inq.id}</td>
              <td style={{ padding:'12px' }}><Badge>{inq.category}</Badge></td>
              <td style={{ padding:'12px', fontSize:13, fontWeight:600, maxWidth:220, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{inq.subject}</td>
              <td style={{ padding:'12px', fontSize:13, color:C.textSub }}>{inq.name}</td>
              <td style={{ padding:'12px', fontSize:13, color:C.textSub }}>{inq.company}</td>
              <td style={{ padding:'12px', fontSize:13, color:C.textSub }}>{inq.date}</td>
              <td style={{ padding:'12px' }}><StatusBadge status={inq.status} /></td>
              <td style={{ padding:'12px' }}><Btn variant="secondary" size="sm" onClick={e=>{e.stopPropagation();setReplyModal(inq);setReplyText('');}}>답변</Btn></td>
            </tr>
          ))}</tbody>
        </table>
      </div>

      {/* 상세 모달 */}
      <Modal open={!!selected} onClose={()=>setSelected(null)} title="문의 상세" width={600}>
        {selected && (
          <>
            <div style={{ display:'flex', gap:8, marginBottom:12 }}><Badge>{selected.category}</Badge><StatusBadge status={selected.status} /></div>
            <h3 style={{ fontSize:18, fontWeight:700, marginBottom:12 }}>{selected.subject}</h3>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:16 }}>
              <div style={{ fontSize:13, color:C.textSub }}>문의자: <b>{selected.name}</b></div>
              <div style={{ fontSize:13, color:C.textSub }}>회사: <b>{selected.company}</b></div>
              <div style={{ fontSize:13, color:C.textSub }}>이메일: {selected.email}</div>
              <div style={{ fontSize:13, color:C.textSub }}>전화: {selected.phone}</div>
            </div>
            <div style={{ padding:16, background:'#F8FAFC', borderRadius:8, fontSize:14, lineHeight:1.8 }}>{selected.message}</div>
            <div style={{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:16 }}>
              <Btn variant="secondary" onClick={()=>setSelected(null)}>닫기</Btn>
              <Btn onClick={()=>{setSelected(null);setReplyModal(selected);setReplyText('');}}>답변 작성</Btn>
            </div>
          </>
        )}
      </Modal>

      {/* 답변 모달 */}
      <Modal open={!!replyModal} onClose={()=>setReplyModal(null)} title="답변 작성" width={600}>
        {replyModal && (
          <>
            <div style={{ padding:12, background:'#F8FAFC', borderRadius:8, marginBottom:16 }}>
              <div style={{ fontSize:13, fontWeight:600, marginBottom:4 }}>{replyModal.subject}</div>
              <div style={{ fontSize:12, color:C.textSub }}>{replyModal.name} ({replyModal.company})</div>
            </div>
            <InputField label="답변 내용" textarea value={replyText} onChange={e=>setReplyText(e.target.value)} placeholder="답변 내용을 작성하세요..." />
            <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
              <Btn variant="secondary" onClick={()=>setReplyModal(null)}>취소</Btn>
              <Btn onClick={()=>{setReplyModal(null);onToast('답변이 전송되었습니다.');}}>답변 전송</Btn>
            </div>
          </>
        )}
      </Modal>
    </div>
  );
}

/* ── 계정 관리 페이지 ── */
function AccountPage({ onToast }) {
  const [modal, setModal] = useState(null);
  return (
    <div style={{ animation:'fadeIn 300ms ease' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
        <div style={{ fontSize:14, color:C.textSub }}>총 {ACCOUNTS.length}명의 관리자 계정</div>
        <Btn onClick={()=>setModal('create')}>+ 계정 추가</Btn>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(300px, 1fr))', gap:16 }}>
        {ACCOUNTS.map((acc,i) => (
          <div key={acc.id} style={{ background:C.surface, borderRadius:C.card.borderRadius, boxShadow:C.card.boxShadow, padding:20, animation:`slideUp 400ms ease ${i*80}ms both`, transition:'all 200ms' }}
            onMouseOver={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,0.12)';}}
            onMouseOut={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow=C.card.boxShadow;}}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
              <div style={{ display:'flex', gap:12, alignItems:'center' }}>
                <div style={{ width:42, height:42, borderRadius:'50%', background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:700, fontSize:16 }}>{acc.name.charAt(0)}</div>
                <div><div style={{ fontSize:15, fontWeight:700 }}>{acc.name}</div><div style={{ fontSize:12, color:C.textLight }}>{acc.email}</div></div>
              </div>
              <StatusBadge status={acc.status} />
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <div>
                <Badge color={acc.role==='슈퍼관리자'?C.danger:acc.role==='편집자'?C.primary:C.textSub}>{acc.role}</Badge>
                <div style={{ fontSize:11, color:C.textLight, marginTop:6 }}>최근 로그인: {acc.lastLogin}</div>
              </div>
              <Btn variant="ghost" size="sm" onClick={()=>setModal({type:'edit',item:acc})}>수정</Btn>
            </div>
          </div>
        ))}
      </div>

      <Modal open={!!modal} onClose={()=>setModal(null)} title={modal?.type==='edit'?'계정 수정':'새 계정 추가'} width={480}>
        <InputField label="이름" value={modal?.type==='edit'?modal.item.name:''} onChange={()=>{}} placeholder="이름" />
        <InputField label="이메일" value={modal?.type==='edit'?modal.item.email:''} onChange={()=>{}} placeholder="이메일" type="email" />
        <SelectField label="역할" value={modal?.type==='edit'?modal.item.role:'편집자'} onChange={()=>{}} options={[{value:'슈퍼관리자',label:'슈퍼관리자'},{value:'편집자',label:'편집자'},{value:'뷰어',label:'뷰어'}]} />
        <SelectField label="상태" value={modal?.type==='edit'?modal.item.status:'활성'} onChange={()=>{}} options={[{value:'활성',label:'활성'},{value:'비활성',label:'비활성'}]} />
        <div style={{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:8 }}>
          <Btn variant="secondary" onClick={()=>setModal(null)}>취소</Btn>
          {modal?.type==='edit' && <Btn variant="danger" onClick={()=>{setModal(null);onToast('계정이 삭제되었습니다.');}}>삭제</Btn>}
          <Btn onClick={()=>{setModal(null);onToast(modal?.type==='edit'?'계정이 수정되었습니다.':'계정이 추가되었습니다.');}}>{modal?.type==='edit'?'수정':'추가'}</Btn>
        </div>
      </Modal>
    </div>
  );
}

/* ── App ── */
function App() {
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('board');
  const [toast, setToast] = useState(null);
  useEffect(()=>{ setTimeout(()=>setLoading(false), 1500); },[]);
  if (loading) return <SkeletonLoader />;

  const titles = { board:'게시물 관리', editor:'글 작성/수정', inquiry:'문의 관리', account:'계정 관리' };

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      {/* 사이드바 260px */}
      <aside style={{ width:260, background:C.sidebar, flexShrink:0, display:'flex', flexDirection:'column' }}>
        <div style={{ padding:'20px 24px', borderBottom:'1px solid rgba(255,255,255,0.08)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:32, height:32, borderRadius:8, background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:16, fontWeight:800 }}>N</div>
            <div><div style={{ color:'#fff', fontSize:15, fontWeight:700 }}>넥스텍솔루션즈</div><div style={{ color:'rgba(255,255,255,0.4)', fontSize:11 }}>홈페이지 CMS</div></div>
          </div>
        </div>
        <nav style={{ flex:1, padding:'12px' }}>
          <div style={{ padding:'8px 12px', fontSize:11, fontWeight:600, color:'rgba(255,255,255,0.3)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:4 }}>콘텐츠 관리</div>
          {PAGES.map(p => (
            <button key={p.key} onClick={()=>setPage(p.key)} style={{
              width:'100%', display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:8,
              border:'none', cursor:'pointer', fontSize:14, fontWeight:page===p.key?600:400, fontFamily:'inherit',
              background:page===p.key?C.sidebarActive:'transparent', color:page===p.key?'#fff':'rgba(255,255,255,0.6)',
              transition:'all 150ms', marginBottom:2,
            }}
              onMouseOver={e=>{if(page!==p.key)e.target.style.background='rgba(255,255,255,0.06)';}}
              onMouseOut={e=>{if(page!==p.key)e.target.style.background='transparent';}}>
              <span style={{ fontSize:16 }}>{p.icon}</span>{p.label}
            </button>
          ))}
        </nav>
        <div style={{ padding:'16px 20px', borderTop:'1px solid rgba(255,255,255,0.08)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:34, height:34, borderRadius:'50%', background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:700, fontSize:13 }}>관</div>
            <div><div style={{ color:'#fff', fontSize:13, fontWeight:600 }}>관리자</div><div style={{ color:'rgba(255,255,255,0.4)', fontSize:11 }}>admin@nextec.co.kr</div></div>
          </div>
        </div>
      </aside>

      {/* 메인 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <header style={{ height:56, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 24px', background:C.surface, flexShrink:0 }}>
          <h2 style={{ fontSize:18, fontWeight:700 }}>{titles[page]}</h2>
          <div style={{ display:'flex', alignItems:'center', gap:16 }}>
            <div style={{ position:'relative' }}>
              <input placeholder="검색..." style={{ padding:'8px 14px 8px 36px', border:`1px solid ${C.border}`, borderRadius:8, fontSize:13, outline:'none', width:220 }} />
              <span style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', fontSize:14, color:C.textLight }}>🔍</span>
            </div>
            <div style={{ position:'relative', cursor:'pointer' }}>
              <span style={{ fontSize:20 }}>🔔</span>
              <span style={{ position:'absolute', top:-2, right:-4, width:8, height:8, borderRadius:'50%', background:C.danger }} />
            </div>
          </div>
        </header>
        <main style={{ flex:1, overflow:'auto', padding:24, background:C.bg }}>
          {page==='board' && <BoardPage onToast={msg=>setToast(msg)} />}
          {page==='editor' && <EditorPage onToast={msg=>setToast(msg)} />}
          {page==='inquiry' && <InquiryPage onToast={msg=>setToast(msg)} />}
          {page==='account' && <AccountPage onToast={msg=>setToast(msg)} />}
        </main>
      </div>

      {toast && <Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
