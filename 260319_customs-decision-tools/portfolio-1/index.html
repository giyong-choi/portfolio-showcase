/* ─── Components ─── */
function CountUp({end,duration=1200}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}</span>;
}

function RiskBadge({grade}){
  const r=RISK[grade];
  if(!r) return null;
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:6,fontSize:12,fontWeight:600,background:r.bg,color:r.text}}>{r.label}</span>;
}

function StatusBadge({text}){
  const colors={
    '승인완료':{bg:'#ECFDF5',text:'#059669'},'팀장 검토중':{bg:'#FEF3C7',text:'#D97706'},
    '부서장 승인대기':{bg:'#FED7AA',text:'#EA580C'},'관리자 검토중':{bg:'#FEE2E2',text:'#DC2626'},
    '담당자 검토중':{bg:'#EFF6FF',text:'#0066CC'},'완료':{bg:'#ECFDF5',text:'#059669'},
    '대기중':{bg:'#FEF3C7',text:'#D97706'},'검토중':{bg:'#EFF6FF',text:'#0066CC'},
    '활성':{bg:'#ECFDF5',text:'#059669'},'비활성':{bg:'#F1F5F9',text:'#64748B'},
    '분리 중':{bg:'#FEF3C7',text:'#D97706'},
  };
  const c=colors[text]||{bg:'#F1F5F9',text:'#475569'};
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:6,fontSize:12,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function KpiCard({icon,label,value,sub,accent}){
  return(
    <div style={{background:C.surface,borderRadius:12,padding:'20px 24px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`,animation:'slideUp 500ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span>
        <span style={{fontSize:20}}>{icon}</span>
      </div>
      <div style={{fontSize:28,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{typeof value==='number'?<CountUp end={value}/>:value}</div>
      {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:6}}>{sub}</div>}
    </div>
  );
}

function ConfidenceBar({value}){
  if(value===null) return <span style={{color:C.textMuted,fontSize:12}}>-</span>;
  const pct=Math.round(value*100);
  const color=pct>=90?C.success:pct>=80?C.warning:C.danger;
  return(
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      <div style={{flex:1,height:6,background:'#E2E8F0',borderRadius:3,overflow:'hidden'}}>
        <div style={{width:`${pct}%`,height:'100%',background:color,borderRadius:3}}/>
      </div>
      <span style={{fontSize:12,fontWeight:600,color}}>{pct}%</span>
    </div>
  );
}

      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <header style={{height:56,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',flexShrink:0}}>
          <div style={{fontSize:15,fontWeight:600,color:C.text}}>{page}</div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:C.success}}/>
            <span style={{fontSize:13,color:C.textLight}}>김민수</span>
            <div style={{width:32,height:32,borderRadius:'50%',background:C.primary,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700}}>김</div>
          </div>
        </header>
        <main style={{flex:1,overflow:'auto',padding:28}}>
          {pageMap[page]}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
