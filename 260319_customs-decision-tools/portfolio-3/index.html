function CountUp({end,duration=1200}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}</span>;
}

function RiskBadge({grade}){
  const r=RISK[grade];
  if(!r) return null;
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:8,fontSize:12,fontWeight:600,background:r.bg,color:r.text,border:`1px solid ${r.text}22`}}>{r.label}</span>;
}

function StatusBadge({text}){
  const colors={
    '승인완료':{bg:'#ECFDF5',text:'#059669',bd:'#05966922'},'팀장 검토중':{bg:'#FEF3C7',text:'#D97706',bd:'#D9770622'},
    '부서장 승인대기':{bg:'#FED7AA',text:'#EA580C',bd:'#EA580C22'},'관리자 검토중':{bg:'#FEE2E2',text:'#DC2626',bd:'#DC262622'},
    '활성':{bg:'#ECFDF5',text:'#059669',bd:'#05966922'},'대기중':{bg:'#FEF3C7',text:'#D97706',bd:'#D9770622'},
    '검토중':{bg:'#EFF6FF',text:'#2563EB',bd:'#2563EB22'},'일치':{bg:'#ECFDF5',text:'#059669',bd:'#05966922'},
    '불일치':{bg:'#FEE2E2',text:'#DC2626',bd:'#DC262622'},
  };
  const c=colors[text]||{bg:'#F1F5F9',text:'#475569',bd:'#47556922'};
  return <span style={{display:'inline-block',padding:'4px 10px',borderRadius:8,fontSize:12,fontWeight:600,background:c.bg,color:c.text,border:`1px solid ${c.bd}`}}>{text}</span>;
}

function KpiCard({icon,label,value,sub,accent}){
  return(
    <div style={{background:C.surface,borderRadius:10,padding:'18px 22px',border:`1px solid ${C.border}`,boxShadow:'0 1px 3px rgba(5,150,105,0.04)',animation:'slideUp 500ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span>
        <span style={{fontSize:18}}>{icon}</span>
      </div>
      <div style={{fontSize:26,fontWeight:800,color:accent||C.primary,lineHeight:1.2}}>{typeof value==='number'?<CountUp end={value}/>:value}</div>
      {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:5}}>{sub}</div>}
    </div>
  );
}

        <nav style={{flex:1,padding:'10px 8px'}}>
          {menus.map(m=>(
            <button key={m.name} title={m.name} onClick={()=>setPage(m.name)} style={{width:'100%',padding:'10px 12px',borderRadius:8,border:'none',background:page===m.name?`${C.primary}15`:'transparent',color:page===m.name?C.primary:C.textLight,fontSize:13,fontWeight:page===m.name?600:400,cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',gap:8,marginBottom:2,transition:'all 150ms',overflow:'hidden'}} onMouseOver={e=>{if(page!==m.name)e.currentTarget.style.background='#ECFDF5'}} onMouseOut={e=>{if(page!==m.name)e.currentTarget.style.background='transparent'}}>
              <span style={{fontSize:15,flexShrink:0}}>{m.icon}</span>
              <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.name}</span>
            </button>
          ))}
        </nav>
        <div style={{padding:'14px 18px',borderTop:`1px solid ${C.border}`,fontSize:11,color:C.textMuted}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:C.primary,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>김</div>
            <div><div style={{fontSize:12,fontWeight:600,color:C.text}}>김민호</div><div style={{fontSize:10}}>통관팀 담당</div></div>
          </div>
          v1.0.0 · SmartCustoms
        </div>
      </div>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <header style={{height:52,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 24px',flexShrink:0}}>
          <div style={{fontSize:14,fontWeight:600,color:C.text}}>{page}</div>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <div style={{padding:'5px 12px',borderRadius:6,background:'#FEF3C7',color:'#D97706',fontSize:12,fontWeight:600}}>승인 대기 3건</div>
            <div style={{width:8,height:8,borderRadius:'50%',background:C.success}}/>
          </div>
        </header>
        <main style={{flex:1,overflow:'auto',padding:24}}>
          {pageMap[page]}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
