function CountUp({ end, suffix='' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let s=0; const step=end/75;
    const t=setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s)); },16);
    return ()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 300ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, onClose }) {
  useEffect(()=>{ const t=setTimeout(onClose,3000); return()=>clearTimeout(t); },[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(0,0,0,0.3)',fontSize:14,fontWeight:500}}>{message}</div>;
}

function Modal({ title, onClose, children, width=520 }) {
  return (
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.45)',animation:'fadeIn 200ms ease'}} />
      <div style={{position:'relative',width,maxHeight:'85vh',background:C.surface,borderRadius:16,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:17,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function GradeBadge({ grade }) {
  const MAP = {'레전더리':{bg:'#FEF3C7',c:'#D97706'},'레어':{bg:'#CFFAFE',c:'#0E7490'},'노멀':{bg:'#F1F5F9',c:'#64748B'}};
  const s=MAP[grade]||MAP['노멀'];
  return <span style={{background:s.bg,color:s.c,fontSize:11,fontWeight:700,padding:'3px 8px',borderRadius:6}}>{grade}</span>;
}

function formatSec(s) {
  if(s<60) return `${s}초`;
  if(s<3600) return `${Math.floor(s/60)}분 ${s%60}초`;
  return `${Math.floor(s/3600)}시간 ${Math.floor((s%3600)/60)}분`;
}

            </div>
          )}
          {tabIdx!==0&&tabIdx!==2&&(
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:C.textLight,fontSize:14}}>
              <div style={{fontSize:40,marginBottom:12}}>📊</div>
              <div>좌측에서 데이터를 선택하세요</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── APP ──
function App() {
  const [loading, setLoading] = useState(true);
  const [section, setSection] = useState('home');
  const [toast, setToast] = useState(null);
  useEffect(()=>{ setTimeout(()=>setLoading(false),1500); },[]);

  const BREADCRUMBS = {home:'홈 · 박스 쇼핑',market:'트레이딩 마켓',auction:'실시간 경매',dashboard:'관리자 모니터링'};

  if(loading) return (
    <div style={{display:'flex',height:'100vh'}}>
      <div style={{width:240,background:C.surface,borderRight:`1px solid ${C.border}`}} />
      <div style={{flex:1,padding:20,background:C.bg}}>
        {[140,100,180,110].map((h,i)=>(
          <div key={i} style={{height:h,borderRadius:12,marginBottom:16,background:'linear-gradient(90deg,#E2E8F0 25%,#F1F5F9 50%,#E2E8F0 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}} />
        ))}
      </div>
    </div>
  );

  return (
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      {/* White Sidebar */}
      <nav style={{width:240,background:C.surface,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',paddingTop:16,flexShrink:0,position:'sticky',top:0,height:'100vh'}}>
        <div style={{padding:'0 16px 16px',borderBottom:`1px solid ${C.border}`,marginBottom:8}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${C.primary},#0E7490)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🎮</div>
            <div style={{fontWeight:800,fontSize:15,color:C.text}}>ItemBox</div>
          </div>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:2,padding:'0 8px'}}>
          {NAV_ITEMS.map(item=>(
            <button key={item.id} onClick={()=>setSection(item.id)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'9px 12px',borderRadius:8,border:'none',cursor:'pointer',background:section===item.id?`${C.primary}10`:'transparent',color:section===item.id?C.primary:C.textLight,borderLeft:section===item.id?`3px solid ${C.primary}`:'3px solid transparent',fontSize:14,fontWeight:section===item.id?700:400,transition:'all 150ms',fontFamily:'inherit',textAlign:'left'}}
              onMouseEnter={e=>section!==item.id&&(e.currentTarget.style.background=`${C.primary}06`)}
              onMouseLeave={e=>section!==item.id&&(e.currentTarget.style.background='transparent')}>
              <span style={{fontSize:18}}>{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
        <div style={{padding:'12px 16px',borderTop:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:30,height:30,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},#0E7490)`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:13}}>김</div>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:C.text}}>김운영자</div>
            <div style={{fontSize:11,color:C.textLight}}>admin@itembox.gg</div>
          </div>
        </div>
      </nav>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Appbar */}
        <header style={{height:40,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 16px',gap:8,background:C.surface,flexShrink:0}}>
          <span style={{fontSize:13,color:C.textLight}}>ItemBox</span>
          <span style={{fontSize:13,color:C.border}}>›</span>
          <span style={{fontSize:13,color:C.text,fontWeight:600}}>{BREADCRUMBS[section]}</span>
          <div style={{flex:1}} />
          <div style={{display:'flex',alignItems:'center',gap:8,background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:'5px 12px',fontSize:12,color:C.textLight}}>
            🔍<input placeholder="아이템 검색..." style={{border:'none',background:'transparent',outline:'none',fontSize:12,width:120,fontFamily:'inherit'}} />
          </div>
          <div style={{width:28,height:28,borderRadius:'50%',background:`${C.primary}12`,display:'flex',alignItems:'center',justifyContent:'center',color:C.primary,fontWeight:800,fontSize:12}}>김</div>
        </header>

        {/* Content */}
        {section==='home'&&<HomePage onToast={setToast} />}
        {section==='market'&&<MarketPage onToast={setToast} />}
        {section==='auction'&&<AuctionPage onToast={setToast} />}
        {section==='dashboard'&&<DashboardPage onToast={setToast} />}
      </div>

      {toast&&<Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
