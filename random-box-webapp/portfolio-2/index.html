function CountUp({ end, suffix='' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let s = 0; const step = end / 75;
    const t = setInterval(() => { s+=step; if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s)); }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(0,0,0,0.3)',fontSize:14,fontWeight:500}}>
      {message}
    </div>
  );
}

        <div style={{flex:1}} />
        <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:'6px 14px',display:'flex',alignItems:'center',gap:8,fontSize:13,color:C.textLight}}>
          🔍<input placeholder="검색..." style={{border:'none',background:'transparent',outline:'none',fontSize:13,width:120,fontFamily:'inherit'}} />
        </div>
        <div style={{width:32,height:32,borderRadius:8,background:`${C.primary}15`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:16}}>🔔</div>
        <div style={{width:32,height:32,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:13,cursor:'pointer'}}>김</div>
      </header>

      {/* Hero Banner */}
      <HeroBanner tab={tab} kpis={HERO_KPIS[tab]} />

      {/* Content */}
      {tab==='home'&&<HomePage onToast={setToast} setDrawer={setDrawer} />}
      {tab==='subscribe'&&<SubscribePage onToast={setToast} setDrawer={setDrawer} />}
      {tab==='curation'&&<CurationPage onToast={setToast} setDrawer={setDrawer} />}
      {tab==='reward'&&<RewardPage onToast={setToast} setDrawer={setDrawer} />}

      {/* Drawer */}
      {drawer&&(
        <Drawer item={drawer.item} onClose={()=>setDrawer(null)} title={drawer.type==='history'?'수령 상세':drawer.type==='curation'?'제품 상세':'포인트 상세'}>
          {drawer.type==='history'&&(
            <div>
              <div style={{background:`linear-gradient(135deg,${C.accent},#1A7A6B)`,borderRadius:12,padding:20,color:'#fff',marginBottom:20}}>
                <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>{drawer.item.month} 박스</div>
                <div style={{fontSize:14,opacity:0.85}}>{drawer.item.box}</div>
              </div>
              {[['결제 금액',drawer.item.amount],['배송일',drawer.item.ship],['상태',drawer.item.status]].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
                  <span style={{color:C.textLight}}>{k}</span><span style={{fontWeight:600,color:C.text}}>{v}</span>
                </div>
              ))}
              {!drawer.item.review&&<button onClick={()=>{setToast('리뷰 작성 페이지로 이동합니다');setDrawer(null);}} style={{width:'100%',marginTop:20,background:C.primary,color:'#fff',border:'none',padding:'13px',borderRadius:12,fontSize:14,fontWeight:700,cursor:'pointer'}}>📝 리뷰 작성하기</button>}
            </div>
          )}
          {drawer.type==='curation'&&(
            <div>
              <div style={{textAlign:'center',marginBottom:20}}><div style={{fontSize:60,marginBottom:8}}>{drawer.item.emoji}</div><div style={{fontSize:20,fontWeight:800,color:C.text}}>{drawer.item.name}</div><div style={{fontSize:14,color:C.textLight}}>{drawer.item.brand}</div></div>
              <div style={{background:`${C.accent}10`,borderRadius:10,padding:14,marginBottom:16,textAlign:'center'}}><div style={{fontSize:12,color:C.textLight}}>피부 타입 매칭 점수</div><div style={{fontSize:36,fontWeight:900,color:C.accent}}>{drawer.item.match}%</div></div>
              {[['카테고리',drawer.item.category],['유형',drawer.item.type],['가격',`${drawer.item.price.toLocaleString()}원`],['재고',drawer.item.stock]].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
                  <span style={{color:C.textLight}}>{k}</span><span style={{fontWeight:600,color:C.text}}>{v}</span>
                </div>
              ))}
              <button onClick={()=>{setToast(`${drawer.item.name} 단품 구매 페이지로 이동합니다`);setDrawer(null);}} style={{width:'100%',marginTop:20,background:C.primary,color:'#fff',border:'none',padding:'13px',borderRadius:12,fontSize:14,fontWeight:700,cursor:'pointer'}}>단품 구매하기</button>
            </div>
          )}
          {drawer.type==='reward'&&(
            <div>
              <div style={{background:`linear-gradient(135deg,#7C3AED,#4C1D95)`,borderRadius:12,padding:20,color:'#fff',marginBottom:20}}>
                <div style={{fontSize:14,opacity:0.85,marginBottom:4}}>{drawer.item.date}</div>
                <div style={{fontSize:20,fontWeight:800}}>{drawer.item.type}</div>
                <div style={{fontSize:32,fontWeight:900,marginTop:8}}>+{drawer.item.point}P</div>
              </div>
              {[['사유',drawer.item.desc],['일자',drawer.item.date],['적립 후 잔액',`${drawer.item.balance}P`]].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
                  <span style={{color:C.textLight}}>{k}</span><span style={{fontWeight:600,color:C.text}}>{v}</span>
                </div>
              ))}
            </div>
          )}
        </Drawer>
      )}

      {toast&&<Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
