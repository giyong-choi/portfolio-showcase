*{margin:0;padding:0;box-sizing:border-box}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#D8B4FE;border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes barGrow{from{width:0}to{width:var(--target-width)}}
@keyframes slideDrawer{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ─── Utils ─── */
function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 8px 24px rgba(124,58,237,0.3)',fontSize:14,display:'flex',alignItems:'center',gap:8}}><span style={{color:C.accent}}>✓</span>{message}</div>;
}

function Modal({open,onClose,title,width=560,children}){
  if(!open)return null;
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000}}/>
      <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width,maxHeight:'85vh',background:C.surface,borderRadius:20,boxShadow:'0 24px 48px rgba(124,58,237,0.2)',zIndex:1001,animation:'fadeInScale 250ms ease',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{fontSize:18,fontWeight:800}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight,width:32,height:32,borderRadius:10}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </>
  );
}

function Drawer({open,onClose,title,children}){
  if(!open)return null;
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:200}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:480,background:C.surface,boxShadow:'-8px 0 40px rgba(124,58,237,0.15)',zIndex:201,overflowY:'auto',animation:'slideDrawer 200ms ease',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <h3 style={{fontSize:16,fontWeight:800}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{padding:24,flex:1,overflowY:'auto'}}>{children}</div>
      </div>
    </>

}

function Badge({text,color}){
  const colors={success:{bg:'#ECFDF5',text:'#059669'},danger:{bg:'#FEF2F2',text:'#DC2626'},warning:{bg:'#FFFBEB',text:'#D97706'},info:{bg:'#EDE9FE',text:'#7C3AED'},muted:{bg:'#F1F5F9',text:'#64748B'}};
  const c=colors[color]||colors.info;
  return <span style={{display:'inline-block',padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function Btn({children,variant='primary',size='md',onClick,style:s={}}){
  const base={border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:700,borderRadius:12,transition:'all 200ms',display:'inline-flex',alignItems:'center',gap:6};
  const vars={primary:{background:C.gradient,color:'#fff',padding:size==='sm'?'6px 14px':'10px 22px',fontSize:size==='sm'?12:14},secondary:{background:C.bg,color:C.primary,padding:size==='sm'?'6px 14px':'10px 22px',fontSize:size==='sm'?12:14,border:`1px solid ${C.border}`},danger:{background:'#FEF2F2',color:C.danger,padding:size==='sm'?'6px 14px':'10px 22px',fontSize:size==='sm'?12:14}};
  return <button onClick={onClick} style={{...base,...vars[variant],...s}} onMouseOver={e=>e.currentTarget.style.transform='scale(1.02)'} onMouseOut={e=>e.currentTarget.style.transform='scale(1)'}>{children}</button>;
}

function InputField({label,value,onChange,placeholder,type='text'}){
  return(
    <div style={{marginBottom:16}}>
      {label&&<label style={{display:'block',fontSize:13,fontWeight:600,color:C.textLight,marginBottom:6}}>{label}</label>}
      <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:12,fontSize:14,fontFamily:'inherit',outline:'none'}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>
    </div>
  );
}

    <div style={{animation:'fadeIn 300ms ease'}}>
      {toast&&<Toast message={toast} onClose={()=>setToast('')}/>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{display:'flex',gap:8}}>
          {['전체','검증완료','처리중','오류'].map(s=>(

          ))}
        </div>
        <Btn onClick={()=>setUploadModal(true)}>📥 EMR 데이터 가져오기</Btn>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
        {filtered.map((p,i)=>(
          <div key={i} onClick={()=>setDrawer(p)} style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*60}ms both`}} onMouseOver={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(124,58,237,0.15)'}} onMouseOut={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.10)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <span style={{fontSize:12,color:C.primary,fontWeight:700}}>{p.id}</span>
              <Badge text={p.status} color={p.status==='검증완료'?'success':p.status==='오류'?'danger':p.status==='청구완료'?'info':'warning'}/>
            </div>
            <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>{p.patient}</div>
            <div style={{fontSize:12,color:C.textLight,marginBottom:10}}>{p.dept} · {p.doctor} · {p.age}세</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:10,borderTop:`1px solid ${C.border}`}}>

              <span style={{fontSize:15,fontWeight:800,color:p.amount==='—'?C.textMuted:C.primary}}>₩{p.amount}</span>
            </div>
          </div>
        ))}
      </div>

      <Drawer open={!!drawer} onClose={()=>setDrawer(null)} title={drawer?`처방 상세 — ${drawer.patient}`:''}>
        {drawer&&(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
              {[{l:'환자명',v:drawer.patient},{l:'나이',v:`${drawer.age}세`},{l:'진료과',v:drawer.dept},{l:'담당의',v:drawer.doctor},{l:'처방일',v:drawer.date},{l:'상태',v:drawer.status}].map((info,i)=>(
                <div key={i} style={{background:C.bg,borderRadius:10,padding:12}}>
                  <div style={{fontSize:11,color:C.textMuted,marginBottom:2}}>{info.l}</div>
                  <div style={{fontSize:14,fontWeight:600}}>{info.v}</div>
                </div>
              ))}
            </div>
            <h4 style={{fontSize:14,fontWeight:700,marginBottom:10}}>처방 내역</h4>
            {[{code:'J01CA04',name:'아목시실린 500mg',qty:3,days:5,fee:'4,200'},{code:'N02BE01',name:'아세트아미노펜 325mg',qty:2,days:3,fee:'1,800'},{code:'R03CC02',name:'살부타몰 흡입제',qty:1,days:7,fee:'12,500'}].map((item,i)=>(
              <div key={i} style={{padding:12,borderRadius:10,border:`1px solid ${C.border}`,marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600}}>{item.name}</div>
                  <div style={{fontSize:11,color:C.textMuted}}>{item.code} · {item.qty}T × {item.days}일</div>
                </div>
                <span style={{fontSize:13,fontWeight:700,color:C.primary}}>₩{item.fee}</span>
              </div>
            ))}
            <div style={{display:'flex',gap:8,marginTop:16}}>
              {drawer.status==='오류'&&<Btn variant="danger" onClick={()=>{setDrawer(null);setToast('재검증을 시작합니다')}}>🔄 재검증</Btn>}
              <Btn onClick={()=>{setDrawer(null);setToast('청구서를 생성합니다')}}>📄 청구서 생성</Btn>
            </div>
          </div>
        )}
      </Drawer>

      <Modal open={uploadModal} onClose={()=>setUploadModal(false)} title="EMR 데이터 가져오기" width={520}>
        <div style={{border:`2px dashed ${C.border}`,borderRadius:16,padding:40,textAlign:'center',marginBottom:20,background:C.bg}}>
          <div style={{fontSize:40,marginBottom:12}}>💊</div>
          <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>EMR 내보내기 파일을 업로드하세요</div>
          <div style={{fontSize:12,color:C.textMuted}}>xlsx, csv 지원 · 7개 EMR 시스템 자동 감지</div>
        </div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
          <Btn variant="secondary" onClick={()=>setUploadModal(false)}>취소</Btn>
          <Btn onClick={()=>{setUploadModal(false);setToast('EMR 데이터를 파싱합니다')}}>데이터 가져오기</Btn>
        </div>
      </Modal>
    </div>
  );
}

/* ─── Documents Page ─── */
function DocumentsPage(){

  const[toast,setToast]=useState('');
  const[filter,setFilter]=useState('전체');
  const filtered=filter==='전체'?DOCUMENTS:DOCUMENTS.filter(d=>d.status===filter);

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      {toast&&<Toast message={toast} onClose={()=>setToast('')}/>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{display:'flex',gap:8}}>
          {['전체','발행완료','미발행'].map(s=>(
            <button key={s} onClick={()=>setFilter(s)} style={{padding:'6px 14px',borderRadius:20,border:`1px solid ${filter===s?C.primary:C.border}`,background:filter===s?C.primary:'transparent',color:filter===s?'#fff':C.textLight,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>{s}</button>
          ))}
        </div>
        <div style={{display:'flex',gap:8}}>
          <Btn variant="secondary" size="sm" onClick={()=>setToast('일괄 PDF 생성을 시작합니다')}>📦 일괄 출력</Btn>
          <Btn size="sm" onClick={()=>setToast('인쇄 다이얼로그를 엽니다')}>🖨️ 인쇄</Btn>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
        {filtered.map((doc,i)=>(
          <div key={i} style={{background:C.surface,borderRadius:16,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',overflow:'hidden',transition:'all 200ms',animation:`slideUp 400ms ease ${i*60}ms both`}} onMouseOver={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(124,58,237,0.15)'}} onMouseOut={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.10)'}}>
            <div style={{padding:20}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:24}}>{doc.type==='청구서'?'📋':'🧾'}</span>
                  <div>
                    <div style={{fontSize:14,fontWeight:700}}>{doc.type}</div>
                    <div style={{fontSize:11,color:C.textMuted}}>{doc.id}</div>
                  </div>
                </div>
                <Badge text={doc.status} color={doc.status==='발행완료'?'success':'warning'}/>
              </div>
              <div style={{paddingTop:10,borderTop:`1px solid ${C.border}`}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:12,color:C.textLight}}>환자명</span>
                  <span style={{fontSize:12,fontWeight:600}}>{doc.patient}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:12,color:C.textLight}}>금액</span>
                  <span style={{fontSize:14,fontWeight:800,color:C.primary}}>₩{doc.amount}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{fontSize:12,color:C.textLight}}>일자</span>
                  <span style={{fontSize:12}}>{doc.date}</span>
                </div>
              </div>
            </div>
            <div style={{display:'flex',borderTop:`1px solid ${C.border}`}}>
              <button onClick={()=>setPreviewModal(doc)} style={{flex:1,padding:'10px 0',border:'none',background:'transparent',fontSize:12,fontWeight:600,color:C.primary,cursor:'pointer',fontFamily:'inherit'}}>미리보기</button>
              <div style={{width:1,background:C.border}}/>
              <button onClick={()=>setToast(`${doc.type} PDF를 다운로드합니다`)} style={{flex:1,padding:'10px 0',border:'none',background:'transparent',fontSize:12,fontWeight:600,color:C.textLight,cursor:'pointer',fontFamily:'inherit'}}>다운로드</button>

      <Modal open={!!previewModal} onClose={()=>setPreviewModal(null)} title={previewModal?`${previewModal.type} 미리보기`:''} width={600}>
        {previewModal&&(
          <div>
            <div style={{border:`1px solid ${C.border}`,borderRadius:12,padding:24,background:'#FAFAFE',marginBottom:16}}>

                <div style={{fontSize:12,color:C.textMuted}}>발행일: {previewModal.date}</div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>

                <div style={{padding:12,background:C.bg,borderRadius:8}}>
                  <div style={{fontSize:11,color:C.textMuted}}>청구 금액</div>

            </div>
            <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>

              <Btn onClick={()=>{setPreviewModal(null);setToast('PDF 다운로드를 시작합니다')}}>📥 PDF 다운로드</Btn>

}

/* ─── History Page ─── */
function HistoryPage(){
  const[dateFilter,setDateFilter]=useState('전체');
  const[drawer,setDrawer]=useState(null);
  const[toast,setToast]=useState('');
  const[currentPage,setCurrentPage]=useState(1);
  const PER_PAGE=5;

  const dates=['전체','2024.06.15','2024.06.14','2024.06.13'];
  const filtered=dateFilter==='전체'?HISTORY:HISTORY.filter(h=>h.date===dateFilter);
  const totalPages=Math.ceil(filtered.length/PER_PAGE);
  const paged=filtered.slice((currentPage-1)*PER_PAGE,currentPage*PER_PAGE);

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      {toast&&<Toast message={toast} onClose={()=>setToast('')}/>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{display:'flex',gap:8}}>
          {dates.map(d=>(
            <button key={d} onClick={()=>{setDateFilter(d);setCurrentPage(1)}} style={{padding:'6px 14px',borderRadius:20,border:`1px solid ${dateFilter===d?C.primary:C.border}`,background:dateFilter===d?C.primary:'transparent',color:dateFilter===d?'#fff':C.textLight,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>{d}</button>
          ))}
        </div>
        <Btn variant="secondary" size="sm" onClick={()=>setToast('엑셀 파일을 다운로드합니다')}>📥 엑셀 다운로드</Btn>
      </div>

      <div style={{background:C.surface,borderRadius:16,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:C.bg}}>
              {['날짜','진료과','청구 건수','성공','실패','금액','상태',''].map(h=><th key={h} style={{padding:'14px 16px',textAlign:'left',fontSize:11,fontWeight:700,color:C.textMuted,textTransform:'uppercase',letterSpacing:'0.05em'}}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {paged.map((h,i)=>(
              <tr key={h.id} style={{borderBottom:`1px solid ${C.border}`,transition:'background 150ms',height:48}} onMouseOver={e=>{e.currentTarget.style.background=`${C.primary}06`;e.currentTarget.style.borderLeft=`3px solid ${C.primary}`}} onMouseOut={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderLeft='3px solid transparent'}}>
                <td style={{padding:'10px 16px',fontSize:13}}>{h.date}</td>
                <td style={{padding:'10px 16px',fontSize:13,fontWeight:600}}>{h.dept}</td>
                <td style={{padding:'10px 16px',fontSize:13}}>{h.count}건</td>
                <td style={{padding:'10px 16px',fontSize:13,color:C.success,fontWeight:600}}>{h.success}</td>
                <td style={{padding:'10px 16px',fontSize:13,color:h.fail>0?C.danger:C.textMuted,fontWeight:h.fail>0?600:400}}>{h.fail}</td>
                <td style={{padding:'10px 16px',fontSize:13,fontWeight:700}}>₩{h.amount}</td>
                <td style={{padding:'10px 16px'}}><Badge text={h.status==='완료'?'완료':'진행중'} color={h.status==='완료'?'success':'warning'}/></td>
                <td style={{padding:'10px 16px'}}>
                  <Btn variant="secondary" size="sm" onClick={()=>setDrawer(h)}>상세</Btn>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {totalPages>1&&(
          <div style={{display:'flex',justifyContent:'center',gap:4,padding:12}}>
            <button onClick={()=>setCurrentPage(p=>Math.max(1,p-1))} disabled={currentPage===1} style={{padding:'4px 10px',border:`1px solid ${C.border}`,borderRadius:8,background:'transparent',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>←</button>
            {[...Array(totalPages)].map((_,i)=>(
              <button key={i} onClick={()=>setCurrentPage(i+1)} style={{padding:'4px 10px',border:`1px solid ${currentPage===i+1?C.primary:C.border}`,borderRadius:8,background:currentPage===i+1?C.primary:'transparent',color:currentPage===i+1?'#fff':C.text,cursor:'pointer',fontSize:12,fontFamily:'inherit',fontWeight:currentPage===i+1?600:400}}>{i+1}</button>
            ))}
            <button onClick={()=>setCurrentPage(p=>Math.min(totalPages,p+1))} disabled={currentPage===totalPages} style={{padding:'4px 10px',border:`1px solid ${C.border}`,borderRadius:8,background:'transparent',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>→</button>
          </div>
        )}
      </div>

      <Drawer open={!!drawer} onClose={()=>setDrawer(null)} title={drawer?`${drawer.date} ${drawer.dept} 청구 상세`:''}>
        {drawer&&(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
              {[{l:'날짜',v:drawer.date},{l:'진료과',v:drawer.dept},{l:'총 건수',v:`${drawer.count}건`},{l:'성공',v:`${drawer.success}건`},{l:'실패',v:`${drawer.fail}건`},{l:'총 금액',v:`₩${drawer.amount}`}].map((info,i)=>(
                <div key={i} style={{background:C.bg,borderRadius:10,padding:12}}>
                  <div style={{fontSize:11,color:C.textMuted,marginBottom:2}}>{info.l}</div>
                  <div style={{fontSize:14,fontWeight:600}}>{info.v}</div>
                </div>
              ))}
            </div>
            {drawer.fail>0&&(
              <div style={{padding:14,background:'#FEF2F2',borderRadius:10,borderLeft:`3px solid ${C.danger}`,marginBottom:16}}>
                <div style={{fontSize:12,fontWeight:600,color:C.danger,marginBottom:4}}>실패 항목</div>
                <div style={{fontSize:13}}>수가코드 불일치: E-202 (내과-김서연) — 코드 J01CA99 미등록</div>
              </div>
            )}
            <div style={{display:'flex',gap:8}}>
              {drawer.fail>0&&<Btn variant="danger" onClick={()=>{setDrawer(null);setToast('재청구를 시작합니다')}}>🔄 재청구</Btn>}
              <Btn variant="secondary" onClick={()=>{setDrawer(null);setToast('상세 리포트를 다운로드합니다')}}>📥 리포트</Btn>
            </div>
          </div>
        )}
      </Drawer>
    </div>
  );
}

/* ─── App ─── */
function App(){
  const[loading,setLoading]=useState(true);
  const[tab,setTab]=useState('dashboard');
  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading)return <Skeleton/>;

  const renderContent=()=>{
    switch(tab){
      case 'dashboard':return <DashboardPage/>;
      case 'prescription':return <PrescriptionPage/>;
      case 'documents':return <DocumentsPage/>;
      case 'history':return <HistoryPage/>;
      default:return <DashboardPage/>;
    }
  };

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      <Header tab={tab} setTab={setTab}/>
      <HeroBanner tab={tab}/>
      <main style={{padding:'24px 32px',maxHeight:'calc(100vh - 56px - 120px)',overflowY:'auto'}} key={tab}>
        {renderContent()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
