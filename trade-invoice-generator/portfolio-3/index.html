::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#94A3B8;border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes barGrow{from{width:0}to{width:var(--target-width)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* ─── Utils ─── */
function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14,display:'flex',alignItems:'center',gap:8}}><span style={{color:C.accent}}>✓</span>{message}</div>;
}

function Modal({open,onClose,title,width=560,children}){
  if(!open)return null;
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000}}/>
      <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width,maxHeight:'85vh',background:C.surface,borderRadius:16,boxShadow:'0 24px 48px rgba(0,0,0,0.15)',zIndex:1001,animation:'fadeInScale 250ms ease',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'18px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{fontSize:16,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </>
  );
}

function Badge({text,color}){
  const colors={success:{bg:'#ECFDF5',text:'#059669'},danger:{bg:'#FEF2F2',text:'#DC2626'},warning:{bg:'#FFFBEB',text:'#D97706'},info:{bg:'#F0F9FF',text:'#0284C7'},accent:{bg:'#ECFEFF',text:'#0891B2'},muted:{bg:'#F1F5F9',text:'#64748B'}};
  const c=colors[color]||colors.muted;
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:6,fontSize:11,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function Btn({children,variant='primary',size='md',onClick,style:s={}}){
  const base={border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:600,borderRadius:8,transition:'all 150ms',display:'inline-flex',alignItems:'center',gap:6};
  const vars={primary:{background:C.accent,color:'#fff',padding:size==='sm'?'5px 12px':'9px 18px',fontSize:size==='sm'?11:13},secondary:{background:C.bg,color:C.text,padding:size==='sm'?'5px 12px':'9px 18px',fontSize:size==='sm'?11:13,border:`1px solid ${C.border}`},danger:{background:'#FEF2F2',color:C.danger,padding:size==='sm'?'5px 12px':'9px 18px',fontSize:size==='sm'?11:13}};
  return <button onClick={onClick} style={{...base,...vars[variant],...s}} onMouseOver={e=>e.currentTarget.style.opacity='0.85'} onMouseOut={e=>e.currentTarget.style.opacity='1'}>{children}</button>;
}

/* ─── TabStrip ─── */
function TabStrip({tabs,active,setActive,actions}){
  return(
    <div style={{height:38,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'flex-end',padding:'0 16px',background:C.surface,flexShrink:0}}>
      {tabs.map((t,i)=>(
        <button key={t.id} onClick={()=>setActive(i)} style={{padding:'8px 14px 6px',border:'none',cursor:'pointer',background:'transparent',fontFamily:'inherit',fontSize:12,color:active===i?C.accent:C.textLight,fontWeight:active===i?600:400,borderBottom:active===i?`2px solid ${C.accent}`:'2px solid transparent',marginBottom:-1,transition:'all 150ms'}}>{t.label}</button>
      ))}
      <div style={{flex:1}}/>
      {actions}
    </div>
  );
}

/* ─── App ─── */
function App(){
  const[loading,setLoading]=useState(true);
  const[section,setSection]=useState('dashboard');
  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading)return <Skeleton/>;

  const render=()=>{
    switch(section){
      case 'dashboard':return <DashboardPage/>;
      case 'documents':return <DocumentsPage/>;
      case 'approval':return <ApprovalPage/>;
      case 'analytics':return <AnalyticsPage/>;
      default:return <DashboardPage/>;
    }
  };

  return(
    <div style={{display:'flex',minHeight:'100vh',maxHeight:'100vh'}}>
      <SideNav section={section} setSection={setSection}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <AppBar section={section}/>
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}} key={section}>
          {render()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
