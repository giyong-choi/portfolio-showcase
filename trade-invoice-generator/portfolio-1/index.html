/* ─── Utility Components ─── */
function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14,display:'flex',alignItems:'center',gap:8}}>
      <span style={{color:C.accent}}>✓</span>{message}
    </div>
  );
}

function Modal({open,onClose,title,width=560,children}){
  if(!open)return null;
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000}}/>
      <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width,maxHeight:'85vh',background:C.surface,borderRadius:16,boxShadow:'0 24px 48px rgba(0,0,0,0.15)',zIndex:1001,animation:'fadeInScale 250ms ease',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight,width:32,height:32,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}} onMouseOver={e=>e.target.style.background=C.bg} onMouseOut={e=>e.target.style.background='none'}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </>
  );
}

function Badge({text,color}){
  const colors={success:{bg:'#ECFDF5',text:'#059669'},danger:{bg:'#FEF2F2',text:'#DC2626'},warning:{bg:'#FFFBEB',text:'#D97706'},info:{bg:'#EFF6FF',text:'#0066CC'},muted:{bg:'#F1F5F9',text:'#64748B'}};
  const c=colors[color]||colors.info;
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.text}}>{text}</span>;
}

function Btn({children,variant='primary',size='md',onClick,style:s={}}){
  const base={border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:600,borderRadius:10,transition:'all 150ms',display:'inline-flex',alignItems:'center',gap:6};
  const vars={primary:{background:C.primary,color:'#fff',padding:size==='sm'?'6px 14px':'10px 20px',fontSize:size==='sm'?12:14},secondary:{background:C.bg,color:C.primary,padding:size==='sm'?'6px 14px':'10px 20px',fontSize:size==='sm'?12:14,border:`1px solid ${C.border}`},danger:{background:'#FEF2F2',color:C.danger,padding:size==='sm'?'6px 14px':'10px 20px',fontSize:size==='sm'?12:14}};
  return <button onClick={onClick} style={{...base,...vars[variant],...s}} onMouseOver={e=>{if(variant==='primary')e.target.style.filter='brightness(1.1)'}} onMouseOut={e=>e.target.style.filter='none'}>{children}</button>;
}

function InputField({label,value,onChange,placeholder,type='text',textarea}){
  const st={width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit',outline:'none',background:C.surface,transition:'border 150ms'};
  return(
    <div style={{marginBottom:16}}>
      {label&&<label style={{display:'block',fontSize:13,fontWeight:600,color:C.textLight,marginBottom:6}}>{label}</label>}
      {textarea?<textarea value={value} onChange={onChange} placeholder={placeholder} rows={3} style={{...st,resize:'vertical'}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>:
      <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={st} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>}
    </div>
  );
}

function SelectField({label,value,onChange,options}){
  return(
    <div style={{marginBottom:16}}>
      {label&&<label style={{display:'block',fontSize:13,fontWeight:600,color:C.textLight,marginBottom:6}}>{label}</label>}
      <select value={value} onChange={onChange} style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:'inherit',outline:'none',background:C.surface,cursor:'pointer'}}>
        {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </div>
  );
}

/* ─── SimpleChart ─── */
function BarChart({data,height=200}){
  const max=Math.max(...data.map(d=>d.count));
  return(
    <div style={{display:'flex',alignItems:'flex-end',gap:12,height,padding:'0 8px'}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,color:C.textLight,fontWeight:600}}>{d.count}</span>
          <div style={{width:'100%',borderRadius:6,background:`linear-gradient(180deg,${C.primary},${C.accent})`,animationName:'barGrow',animationDuration:'800ms',animationTimingFunction:'ease',animationDelay:`${i*100}ms`,animationFillMode:'both','--target-width':'100%',height:`${(d.count/max)*100}%`,minHeight:4}}/>
          <span style={{fontSize:11,color:C.textMuted}}>{d.day}</span>
        </div>
      ))}
    </div>
  );
}

          <thead>
            <tr style={{background:C.bg}}>
              {['#','날짜','시간','거래처','문서번호','품목','금액','상태',''].map(h=><th key={h} style={{padding:'12px 14px',textAlign:'left',fontSize:12,fontWeight:600,color:C.textMuted}}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {paged.map((l,i)=>(
              <tr key={l.id} style={{borderBottom:`1px solid ${C.border}`,transition:'background 150ms',height:52}} onMouseOver={e=>e.currentTarget.style.background=`${C.primary}06`} onMouseOut={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'10px 14px',fontSize:12,color:C.textMuted}}>{l.id}</td>
                <td style={{padding:'10px 14px',fontSize:13}}>{l.date}</td>
                <td style={{padding:'10px 14px',fontSize:12,color:C.textLight}}>{l.time}</td>
                <td style={{padding:'10px 14px',fontSize:13,fontWeight:500}}>{l.company}</td>
                <td style={{padding:'10px 14px',fontSize:13,fontWeight:600,color:C.primary}}>{l.docNo}</td>
                <td style={{padding:'10px 14px',fontSize:13}}>{l.items}건</td>
                <td style={{padding:'10px 14px',fontSize:13,fontWeight:600}}>₩{l.amount}</td>
                <td style={{padding:'10px 14px'}}><Badge text={l.status} color={l.status==='성공'?'success':'danger'}/></td>
                <td style={{padding:'10px 14px'}}>
                  <Btn variant="secondary" size="sm" onClick={()=>setDetailModal(l)}>상세</Btn>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {totalPages>1&&(
          <div style={{display:'flex',justifyContent:'center',gap:4,padding:12}}>
            <button onClick={()=>setCurrentPage(p=>Math.max(1,p-1))} disabled={currentPage===1} style={{padding:'4px 10px',border:`1px solid ${C.border}`,borderRadius:6,background:'transparent',cursor:'pointer',fontSize:12,fontFamily:'inherit',color:currentPage===1?C.textMuted:C.text}}>←</button>
            {[...Array(totalPages)].map((_,i)=>(
              <button key={i} onClick={()=>setCurrentPage(i+1)} style={{padding:'4px 10px',border:`1px solid ${currentPage===i+1?C.primary:C.border}`,borderRadius:6,background:currentPage===i+1?C.primary:'transparent',color:currentPage===i+1?'#fff':C.text,cursor:'pointer',fontSize:12,fontFamily:'inherit',fontWeight:currentPage===i+1?600:400}}>{i+1}</button>
            ))}
            <button onClick={()=>setCurrentPage(p=>Math.min(totalPages,p+1))} disabled={currentPage===totalPages} style={{padding:'4px 10px',border:`1px solid ${C.border}`,borderRadius:6,background:'transparent',cursor:'pointer',fontSize:12,fontFamily:'inherit',color:currentPage===totalPages?C.textMuted:C.text}}>→</button>
          </div>
        )}
      </div>

      <Modal open={!!detailModal} onClose={()=>setDetailModal(null)} title="처리 상세" width={500}>
        {detailModal&&(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              {[
                {l:'날짜',v:`${detailModal.date} ${detailModal.time}`},
                {l:'거래처',v:detailModal.company},
                {l:'문서번호',v:detailModal.docNo},
                {l:'품목 수',v:`${detailModal.items}건`},
                {l:'금액',v:`₩${detailModal.amount}`},
                {l:'상태',v:detailModal.status},
              ].map((info,i)=>(
                <div key={i} style={{background:C.bg,borderRadius:10,padding:14}}>
                  <div style={{fontSize:11,color:C.textMuted,marginBottom:4}}>{info.l}</div>
                  <div style={{fontSize:14,fontWeight:600}}>{info.v}</div>
                </div>
              ))}
            </div>
            {detailModal.error&&(
              <div style={{marginTop:16,padding:14,background:'#FEF2F2',borderRadius:10,borderLeft:`3px solid ${C.danger}`}}>
                <div style={{fontSize:12,fontWeight:600,color:C.danger,marginBottom:4}}>오류 내용</div>
                <div style={{fontSize:13}}>{detailModal.error}</div>
              </div>
            )}
          </div>
        )}
      </Modal>
    </div>
  );
}

/* ─── App ─── */
function App(){
  const[loading,setLoading]=useState(true);
  const[page,setPage]=useState('dashboard');
  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading)return <Skeleton/>;

  const renderPage=()=>{
    switch(page){
      case 'dashboard':return <DashboardPage setPage={setPage}/>;
      case 'orders':return <OrdersPage/>;
      case 'settings':return <SettingsPage/>;
      case 'logs':return <LogsPage/>;
      default:return <DashboardPage setPage={setPage}/>;
    }
  };

  return(
    <div style={{display:'flex',minHeight:'100vh',maxHeight:'100vh'}}>
      <Sidebar page={page} setPage={setPage}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar page={page}/>
        <main style={{flex:1,overflow:'auto',padding:24}} key={page}>
          {renderPage()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
