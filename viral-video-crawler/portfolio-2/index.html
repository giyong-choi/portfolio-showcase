<link rel="preconnect" href="https://cdn.jsdelivr.net"/>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#FAF5FF;color:#1E1B4B;overflow-x:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#C4B5FD;border-radius:3px}
::-webkit-scrollbar-track{background:transparent}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px}}
</style>
</head>
<body>

// ── Dummy Data ──

  {date:'01/21',coupang:1415000,naver:1445000,st11:1430000},
  {date:'01/22',coupang:1410000,naver:1440000,st11:1425000},

  {date:'01/24',coupang:1399000,naver:1425000,st11:1415000},

  {date:'01/26',coupang:1392000,naver:1418000,st11:1402000},
  {date:'01/27',coupang:1390000,naver:1416000,st11:1400000},

  {time:'14:25',platform:'11번가',products:42,status:'success',duration:'15.1초'},

// ── Components ──
function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.text,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Badge({children,color=C.primary}){
  return <span style={{display:'inline-block',padding:'3px 12px',borderRadius:20,fontSize:12,fontWeight:600,background:`${color}15`,color}}>{children}</span>;
}

function Btn({children,onClick,variant='primary',size='md',icon,style:s={}}){
  const base={border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:700,borderRadius:12,display:'inline-flex',alignItems:'center',gap:6,transition:'all 200ms'};
  const sizes={sm:{padding:'6px 14px',fontSize:12},md:{padding:'10px 20px',fontSize:13},lg:{padding:'12px 24px',fontSize:14}};
  const variants={
    primary:{background:C.gradient,color:'#fff',border:'none'},
    secondary:{background:`${C.primary}10`,color:C.primary},
    danger:{background:'#FEE2E2',color:C.danger},
    ghost:{background:'transparent',color:C.textLight},
  };
  return <button onClick={onClick} style={{...base,...sizes[size],...variants[variant],...s}}
    onMouseEnter={e=>e.currentTarget.style.transform='scale(1.02)'}
    onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>{icon&&<span>{icon}</span>}{children}</button>;
}

function Drawer({item,onClose,setToast}){
  if(!item)return null;
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:200,animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:520,background:C.surface,boxShadow:'-8px 0 40px rgba(0,0,0,0.15)',zIndex:201,overflowY:'auto',padding:28,animation:'slideInRight 200ms ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
          <h3 style={{fontSize:20,fontWeight:800}}>{item.title||item.name||'상세 정보'}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        {item.type==='product'&&(
          <>
            <div style={{display:'flex',gap:16,marginBottom:24}}>

              <div>
                <h4 style={{fontSize:16,fontWeight:700,marginBottom:4}}>{item.data.name}</h4>
                <Badge>{item.data.group}</Badge>
              </div>
            </div>
            <div style={{fontSize:14,fontWeight:700,marginBottom:12,textTransform:'uppercase',letterSpacing:'0.05em',color:C.textLight}}>플랫폼별 현재 가격</div>
            {item.data.platforms.map(p=>(

                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:16,fontWeight:700}}>₩{p.price.toLocaleString()}</div>
                  <div style={{fontSize:12,color:p.change<0?C.success:p.change>0?C.danger:C.textLight}}>{p.change>0?'+':''}{p.change}%</div>
                </div>
              </div>
            ))}
            <div style={{fontSize:14,fontWeight:700,marginBottom:12,marginTop:20,textTransform:'uppercase',letterSpacing:'0.05em',color:C.textLight}}>가격 추이 (최근 9일)</div>
            <ResponsiveContainer width="100%" height={200}>

                <XAxis dataKey="date" fontSize={11} stroke="#9CA3AF"/>

                <Tooltip formatter={v=>`₩${v.toLocaleString()}`}/>
                <Line type="monotone" dataKey="coupang" stroke={C.primary} strokeWidth={2} dot={false} name="쿠팡"/>
                <Line type="monotone" dataKey="naver" stroke={C.accent} strokeWidth={2} dot={false} name="네이버"/>
                <Line type="monotone" dataKey="st11" stroke={C.secondary} strokeWidth={2} dot={false} name="11번가"/>
              </LineChart>
            </ResponsiveContainer>
            <div style={{marginTop:20}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>메모</div>
              <textarea rows={3} placeholder="상품 메모를 입력하세요..." style={{width:'100%',padding:12,borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',resize:'vertical'}}/>
            </div>
            <div style={{display:'flex',gap:10,marginTop:16}}>
              <Btn onClick={()=>{onClose();setToast('알림 조건이 추가되었습니다')}}>알림 추가</Btn>
              <Btn variant="secondary" onClick={onClose}>닫기</Btn>
            </div>
          </>
        )}
        {item.type==='alert'&&(
          <>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
              {[{l:'상품',v:item.data.product},{l:'조건 타입',v:item.data.type},{l:'조건',v:item.data.condition},{l:'대상 플랫폼',v:item.data.platform},{l:'상태',v:item.data.status==='active'?'활성':'발동'},{l:'생성일',v:'2025.01.15'}].map(d=>(
                <div key={d.l} style={{padding:12,borderRadius:10,background:'#F8FAFC'}}>

                  <div style={{fontSize:14,fontWeight:600}}>{d.v}</div>
                </div>

            </div>
            <div style={{marginBottom:16}}>

            </div>
            <div style={{display:'flex',gap:10}}>

              <Btn variant="secondary" onClick={onClose}>닫기</Btn>

              {[{l:'시간',v:item.data.time},{l:'플랫폼',v:item.data.platform},{l:'수집 상품',v:`${item.data.products}개`},{l:'소요 시간',v:item.data.duration},{l:'상태',v:item.data.status==='success'?'성공':'오류'}].map(d=>(

          </>
        )}
      </div>
    </>
  );
}

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      <div style={{height:56,background:C.surface}}/>

  );
}

                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── App ──
function App(){
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('home');
  const [drawer,setDrawer]=useState(null);
  const [toast,setToast]=useState(null);

  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading)return <Skeleton/>;

  const TABS=[
    {id:'home',label:'가격 모니터링 대시보드',icon:'📊'},
    {id:'products',label:'상품 그룹 관리',icon:'📦'},
    {id:'alerts',label:'가격 알림 조건 설정',icon:'🔔'},
    {id:'history',label:'가격 이력 분석',icon:'📈'},
    {id:'status',label:'수집 현황',icon:'⚡'},
  ];

  const HERO_META={
    home:{title:'가격 모니터링 대시보드',desc:'실시간 가격 변동 추적 및 알림 현황',kpis:[{label:'추적 상품',value:'42개'},{label:'오늘 변동',value:'18건'},{label:'활성 알림',value:'5개'}]},
    products:{title:'상품 그룹 관리',desc:'모니터링 상품 등록 및 플랫폼 URL 관리',kpis:[{label:'등록 상품',value:'42개'},{label:'플랫폼',value:'3개'},{label:'그룹',value:'6개'}]},
    alerts:{title:'가격 알림 조건 설정',desc:'가격 하락/최저가 알림 조건 관리',kpis:[{label:'활성 조건',value:'4개'},{label:'발동',value:'1건'},{label:'금일 알림',value:'3건'}]},
    history:{title:'가격 이력 분석',desc:'상품별 플랫폼 간 가격 이력 분석',kpis:[{label:'수집 데이터',value:'12,847건'},{label:'추적 기간',value:'90일'},{label:'분석 상품',value:'42개'}]},
    status:{title:'수집 현황',desc:'플랫폼별 크롤링 상태 및 실행 로그',kpis:[{label:'금일 수집',value:'384회'},{label:'성공률',value:'94%'},{label:'플랫폼',value:'3개'}]},
  };

  const renderPage=()=>{
    switch(tab){
      case 'home':return <DashboardPage setDrawer={setDrawer}/>;
      case 'products':return <ProductGroupsPage setDrawer={setDrawer} setToast={setToast}/>;
      case 'alerts':return <AlertConditionsPage setDrawer={setDrawer} setToast={setToast}/>;
      case 'history':return <PriceHistoryPage setDrawer={setDrawer}/>;
      case 'status':return <CrawlStatusPage setDrawer={setDrawer}/>;
    }
  };

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* Top Nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:24}}>
          <div style={{width:32,height:32,borderRadius:10,background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>💰</div>
          <span style={{fontSize:17,fontWeight:800,color:C.text}}>PriceRadar</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:'8px 14px',border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:tab===t.id?700:400,color:tab===t.id?C.primary:C.textLight,background:tab===t.id?`${C.primary}08`:'transparent',borderRadius:8,transition:'all 150ms',display:'flex',alignItems:'center',gap:5}}
            onMouseEnter={e=>{if(tab!==t.id)e.currentTarget.style.background='#F8FAFC'}}
            onMouseLeave={e=>{if(tab!==t.id)e.currentTarget.style.background='transparent'}}>
            <span style={{fontSize:14}}>{t.icon}</span>{t.label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{position:'relative',marginRight:12}}>
          <input placeholder="검색..." style={{padding:'7px 14px 7px 32px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',width:180,outline:'none'}}/>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:13,opacity:0.4}}>🔍</span>
        </div>
        <div style={{position:'relative',cursor:'pointer',marginRight:8}}>
          <span style={{fontSize:18}}>🔔</span>
          <span style={{position:'absolute',top:-4,right:-6,width:15,height:15,borderRadius:'50%',background:C.danger,color:'#fff',fontSize:9,display:'flex',alignItems:'center',justifyContent:'center'}}>3</span>
        </div>
        <div style={{width:30,height:30,borderRadius:'50%',background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:'#fff',cursor:'pointer'}}>김</div>
      </header>

      {/* Hero Banner */}
      <div style={{background:C.gradient,padding:'28px 32px',color:'#fff'}}>
        <h1 style={{fontSize:26,fontWeight:800,marginBottom:6}}>{HERO_META[tab].title}</h1>
        <p style={{fontSize:14,opacity:0.85,marginBottom:16}}>{HERO_META[tab].desc}</p>
        <div style={{display:'flex',gap:32}}>
          {HERO_META[tab].kpis.map(k=>(
            <div key={k.label}>
              <div style={{fontSize:11,opacity:0.7,textTransform:'uppercase',letterSpacing:'0.05em'}}>{k.label}</div>
              <div style={{fontSize:20,fontWeight:800}}>{k.value}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Content */}
      <main style={{padding:'24px 32px'}}>
        {renderPage()}
      </main>

      <Drawer item={drawer} onClose={()=>setDrawer(null)} setToast={setToast}/>
      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
