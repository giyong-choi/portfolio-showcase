// ── Utility Components ──
function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'#0F1A2E',color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Modal({title,onClose,children,width=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:'#fff',borderRadius:12,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>

          <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#6B7280'}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function Badge({children,color=C.primary}){
  return <span style={{display:'inline-block',padding:'2px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:`${color}15`,color}}>{children}</span>;
}

function StatusDot({status}){
  const colors={active:C.success,running:C.success,paused:C.warning,error:C.danger,completed:C.success};
  return <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:colors[status]||'#9CA3AF',marginRight:6}}/>;
}

function InputField({label,value,onChange,type='text',placeholder=''}){

    <div style={{marginBottom:16}}>
      <label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.text}}>{label}</label>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1px solid #D1D5DB',fontSize:14,fontFamily:'inherit',outline:'none',transition:'border 150ms'}}
        onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor='#D1D5DB'}/>
    </div>
  );
}

function SelectField({label,value,onChange,options}){
  return(
    <div style={{marginBottom:16}}>
      <label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.text}}>{label}</label>
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1px solid #D1D5DB',fontSize:14,fontFamily:'inherit',outline:'none',background:'#fff'}}>
        {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </div>

}

function Btn({children,onClick,variant='primary',size='md',icon,style:s={}}){
  const base={border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:600,borderRadius:8,display:'inline-flex',alignItems:'center',gap:6,transition:'all 150ms'};
  const sizes={sm:{padding:'6px 12px',fontSize:12},md:{padding:'8px 16px',fontSize:13},lg:{padding:'10px 20px',fontSize:14}};
  const variants={
    primary:{background:C.primary,color:'#fff'},
    secondary:{background:`${C.primary}10`,color:C.primary},
    danger:{background:'#FEE2E2',color:C.danger},
    ghost:{background:'transparent',color:C.textLight},
  };
  return <button onClick={onClick} style={{...base,...sizes[size],...variants[variant],...s}}
    onMouseEnter={e=>{if(variant==='primary')e.currentTarget.style.filter='brightness(1.1)';else e.currentTarget.style.background=variant==='ghost'?'#F3F4F6':`${C.primary}18`}}
    onMouseLeave={e=>{if(variant==='primary')e.currentTarget.style.filter='none';else e.currentTarget.style.background=variants[variant].background}}>
    {icon&&<span>{icon}</span>}{children}
  </button>;
}

function ResultsPage({setModal}){
  const PER_PAGE=6;
  const [currentPage,setCurrentPage]=useState(1);
  const [sortKey,setSortKey]=useState('views');
  const [sortDir,setSortDir]=useState('desc');
  const [filterPlatform,setFilterPlatform]=useState('all');
  const filtered=RESULTS.filter(r=>filterPlatform==='all'||r.platform===filterPlatform);
  const sorted=[...filtered].sort((a,b)=>sortDir==='desc'?b[sortKey]-a[sortKey]:a[sortKey]-b[sortKey]);
  const paged=sorted.slice((currentPage-1)*PER_PAGE,currentPage*PER_PAGE);
  const totalPages=Math.ceil(sorted.length/PER_PAGE);
  const handleSort=(key)=>{if(sortKey===key)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortKey(key);setSortDir('desc')}};
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',gap:12,marginBottom:20,alignItems:'center'}}>
        <input placeholder="영상 검색..." style={{flex:1,padding:'10px 16px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none'}}/>
        <select value={filterPlatform} onChange={e=>{setFilterPlatform(e.target.value);setCurrentPage(1)}}
          style={{padding:'10px 16px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',background:'#fff'}}>
          <option value="all">전체 플랫폼</option>
          <option value="YouTube">YouTube</option>
          <option value="Instagram">Instagram</option>
        </select>
        <Btn variant="secondary" icon="📥" onClick={()=>{}}>CSV 내보내기</Btn>
      </div>
      <div style={{...CARD,background:C.surface,padding:0,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#F8FAFC',borderBottom:`2px solid ${C.border}`}}>
              <th style={{textAlign:'left',padding:'12px 16px',fontSize:12,fontWeight:600,color:C.textLight}}></th>
              <th style={{textAlign:'left',padding:'12px 16px',fontSize:12,fontWeight:600,color:C.textLight}}>제목</th>
              <th style={{textAlign:'left',padding:'12px 16px',fontSize:12,fontWeight:600,color:C.textLight}}>채널</th>
              <th style={{textAlign:'left',padding:'12px 16px',fontSize:12,fontWeight:600,color:C.textLight}}>플랫폼</th>
              <th onClick={()=>handleSort('views')} style={{textAlign:'left',padding:'12px 16px',fontSize:12,fontWeight:600,color:C.textLight,cursor:'pointer'}}>
                조회수 {sortKey==='views'?(sortDir==='desc'?'▼':'▲'):''}
              </th>
              <th style={{textAlign:'left',padding:'12px 16px',fontSize:12,fontWeight:600,color:C.textLight}}>구독자</th>
              <th style={{textAlign:'left',padding:'12px 16px',fontSize:12,fontWeight:600,color:C.textLight}}>업로드일</th>
            </tr>
          </thead>
          <tbody>
            {paged.map((r,i)=>(
              <tr key={r.id} onClick={()=>setModal({type:'detail',data:r})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background 150ms',animation:`slideUp 300ms ease ${i*50}ms both`}}
                onMouseEnter={e=>e.currentTarget.style.background=`${C.primary}04`} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'12px 16px',fontSize:20}}>{r.thumbnail}</td>
                <td style={{padding:'12px 16px',fontSize:14,fontWeight:500,maxWidth:260,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.title}</td>
                <td style={{padding:'12px 16px',fontSize:13,color:C.textLight}}>{r.channel}</td>
                <td style={{padding:'12px 16px'}}><Badge color={r.platform==='YouTube'?C.primary:C.accent}>{r.platform}</Badge></td>
                <td style={{padding:'12px 16px',fontSize:14,fontWeight:600,color:C.primary}}>{(r.views/10000).toFixed(0)}만</td>
                <td style={{padding:'12px 16px',fontSize:13}}>{(r.subscribers||r.followers||0).toLocaleString()}명</td>
                <td style={{padding:'12px 16px',fontSize:13,color:C.textLight}}>{r.uploadDate}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:8,padding:16}}>
          <button onClick={()=>setCurrentPage(p=>Math.max(1,p-1))} disabled={currentPage===1}
            style={{padding:'6px 10px',border:`1px solid ${C.border}`,borderRadius:6,background:'#fff',cursor:currentPage===1?'default':'pointer',opacity:currentPage===1?0.5:1,fontFamily:'inherit'}}>‹</button>
          {[...Array(totalPages)].map((_,i)=>(
            <button key={i} onClick={()=>setCurrentPage(i+1)}
              style={{padding:'6px 12px',border:`1px solid ${currentPage===i+1?C.primary:C.border}`,borderRadius:6,background:currentPage===i+1?C.primary:'#fff',color:currentPage===i+1?'#fff':C.text,cursor:'pointer',fontWeight:currentPage===i+1?700:400,fontFamily:'inherit',fontSize:13}}>
              {i+1}
            </button>
          ))}
          <button onClick={()=>setCurrentPage(p=>Math.min(totalPages,p+1))} disabled={currentPage===totalPages}
            style={{padding:'6px 10px',border:`1px solid ${C.border}`,borderRadius:6,background:'#fff',cursor:currentPage===totalPages?'default':'pointer',opacity:currentPage===totalPages?0.5:1,fontFamily:'inherit'}}>›</button>
        </div>
      </div>
    </div>
  );
}

                  </div>
                </td>
                <td style={{padding:'14px 16px'}}>
                  <Btn variant={s.status==='running'?'secondary':'primary'} size="sm"
                    onClick={e=>{e.stopPropagation();setToast(s.status==='running'?`${s.channel} 스케줄이 일시정지되었습니다`:`${s.channel} 스케줄이 재시작되었습니다`)}}>
                    {s.status==='running'?'일시정지':'시작'}
                  </Btn>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

          <Modal title={kd.label+' 상세'} onClose={()=>setModal(null)}>
            <div style={{textAlign:'center',padding:20}}>
              <div style={{fontSize:48,marginBottom:12}}>{kd.icon}</div>
              <div style={{fontSize:36,fontWeight:800,color:kd.color,marginBottom:8}}>{kd.value}{kd.suffix}</div>
              <div style={{fontSize:14,color:C.textLight}}>전일 대비 +12{kd.suffix}</div>
            </div>
            <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16,marginTop:16}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>최근 7일 추이</div>
              {[7,6,5,4,3,2,1].map(d=>(
                <div key={d} style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                  <span style={{fontSize:12,color:C.textLight,width:50}}>{d}일 전</span>
                  <div style={{flex:1,height:6,borderRadius:3,background:'#E5E7EB'}}>
                    <div style={{height:'100%',borderRadius:3,background:kd.color,width:`${50+Math.random()*50}%`}}/>
                  </div>
                </div>
              ))}
            </div>
          </Modal>
        );
      default:return null;
    }
  };

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      {/* Sidebar */}
      <aside style={{width:260,background:C.sidebar,flexShrink:0,display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,bottom:0,zIndex:100}}>
        <div style={{padding:'24px 20px',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:`${C.primary}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>📹</div>
          <span style={{color:'#fff',fontSize:18,fontWeight:700}}>ClipScope</span>
        </div>
        <nav style={{flex:1,padding:'8px 12px'}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)}
              style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'11px 14px',borderRadius:8,border:'none',cursor:'pointer',marginBottom:2,
                background:page===n.id?`${C.primary}25`:'transparent',color:page===n.id?'#fff':C.sidebarText,fontSize:14,fontWeight:page===n.id?600:400,fontFamily:'inherit',transition:'all 150ms',textAlign:'left'}}
              onMouseEnter={e=>{if(page!==n.id)e.currentTarget.style.background='rgba(255,255,255,0.06)'}}
              onMouseLeave={e=>{if(page!==n.id)e.currentTarget.style.background='transparent'}}>
              <span style={{fontSize:17}}>{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>
        <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.08)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:'#334155',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#94A3B8'}}>👤</div>
            <div>
              <div style={{color:'#E2E8F0',fontSize:13,fontWeight:600}}>김민수</div>
              <div style={{color:'#64748B',fontSize:11}}>관리자</div>
            </div>
          </div>
        </div>
      </aside>

      {/* Main */}
      <div style={{flex:1,marginLeft:260,display:'flex',flexDirection:'column',minHeight:'100vh'}}>
        <header style={{height:64,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',flexShrink:0,position:'sticky',top:0,zIndex:50}}>
          <h1 style={{...TYPO.pageTitle}}>{PAGE_TITLES[page]}</h1>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <div style={{position:'relative'}}>
              <input placeholder="검색..." style={{padding:'8px 14px 8px 36px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',width:220,outline:'none'}}/>
              <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:14,opacity:0.4}}>🔍</span>
            </div>
            <div style={{position:'relative',cursor:'pointer'}}>
              <span style={{fontSize:20}}>🔔</span>
              <span style={{position:'absolute',top:-4,right:-4,width:16,height:16,borderRadius:'50%',background:C.danger,color:'#fff',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center'}}>3</span>
            </div>
          </div>
        </header>
        <main style={{flex:1,padding:28,overflowY:'auto'}}>
          {renderPage()}
        </main>
      </div>

      {renderModal()}
      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
