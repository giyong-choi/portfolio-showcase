<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자세 분석 평가 시스템 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#F0F9FF;color:#1A365D;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#E2E8F0;}::-webkit-scrollbar-thumb{background:#94A3B8;border-radius:3px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,#DBEAFE 25%,#EFF6FF 50%,#DBEAFE 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useReducer}=React;
const {BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,RadarChart,Radar,PolarGrid,PolarAngleAxis,PolarRadiusAxis}=Recharts;

const C={primary:'#0066CC',secondary:'#1A365D',accent:'#38BDF8',bg:'#F0F9FF',surface:'#FFFFFF',text:'#1A365D',textSec:'#64748B',border:'#E2E8F0',success:'#059669',warning:'#D97706',danger:'#DC2626',sidebarBg:'#0F1B2D',sidebarHover:'#162744',sidebarActive:'#1E3A5C'};

// ── Data ──
const clients=[
  {id:1,name:'김민정',age:34,phone:'010-1234-5678',sessions:8,lastVisit:'2025-09-10',naiScore:285,grade:'주의'},
  {id:2,name:'이준혁',age:42,phone:'010-2345-6789',sessions:5,lastVisit:'2025-09-08',naiScore:120,grade:'정상'},
  {id:3,name:'박서연',age:28,phone:'010-3456-7890',sessions:12,lastVisit:'2025-09-12',naiScore:210,grade:'주의'},
  {id:4,name:'최동현',age:55,phone:'010-4567-8901',sessions:3,lastVisit:'2025-09-05',naiScore:340,grade:'관리필요'},
  {id:5,name:'정하은',age:31,phone:'010-5678-9012',sessions:7,lastVisit:'2025-09-11',naiScore:195,grade:'주의'}
];

const poseMetrics={
  shoulderDiff:{label:'어깨 높이 차이',value:'12mm',status:'주의',score:72},
  pelvisTilt:{label:'골반 기울기',value:'8mm',status:'경미',score:78},
  headTilt:{label:'머리 기울기',value:'5°',status:'정상',score:88},
  spineAngle:{label:'척추 측만 각도',value:'7°',status:'주의',score:65},
  kneeDiff:{label:'슬관절 높이 차',value:'4mm',status:'정상',score:90},
  footArch:{label:'발아치 각도',value:'142°',status:'정상',score:85}
};

const romItems=[
  {cat:'경추',items:['굴곡','신전','우측만','좌측만','우회전','좌회전'],scores:[2,1,2,2,1,2]},
  {cat:'흉추',items:['굴곡','신전','우측만','좌측만','우회전','좌회전'],scores:[1,2,1,1,2,1]},
  {cat:'요추',items:['굴곡','신전','우측만','좌측만','우회전','좌회전'],scores:[2,2,1,2,1,2]},
  {cat:'어깨',items:['굴곡R','굴곡L','외전R','외전L','외회전R','외회전L','내회전R','내회전L'],scores:[1,2,1,1,2,1,2,1]},
  {cat:'고관절',items:['굴곡R','굴곡L','신전R','신전L','외전R','외전L','내회전R','내회전L'],scores:[2,1,2,2,1,2,1,2]},
  {cat:'슬관절',items:['굴곡R','굴곡L','신전R','신전L'],scores:[1,1,2,2]}
];

const structItems=[
  {cat:'두부/경부',items:['전방전위','후방전위','우측만','좌측만','우회전','좌회전','우측경사','좌측경사'],scores:[2,1,1,2,1,1,2,1]},
  {cat:'견갑부',items:['거상R','거상L','하강R','하강L','전인R','전인L','후인R','후인L','익상견R','익상견L'],scores:[1,2,1,1,2,1,1,2,1,2]},
  {cat:'골반',items:['전방경사','후방경사','우측거상','좌측거상','우회전','좌회전'],scores:[1,2,1,2,1,1]}
];

const radarData=[{area:'경추',score:10},{area:'흉추',score:8},{area:'요추',score:10},{area:'어깨',score:11},{area:'골반',score:12},{area:'하지',score:6}];
const evalHistory=[{date:'2025-09-10',nai:285,grade:'주의'},{date:'2025-08-15',nai:310,grade:'관리필요'},{date:'2025-07-20',nai:265,grade:'주의'},{date:'2025-06-25',nai:245,grade:'주의'}];

const joints=[{x:40,y:10,r:8,c:C.success},{x:40,y:30,r:5,c:C.success},{x:22,y:42,r:5,c:C.warning},{x:58,y:44,r:5,c:C.danger},{x:40,y:55,r:5,c:C.success},{x:40,y:70,r:5,c:C.warning},{x:30,y:95,r:5,c:C.danger},{x:50,y:95,r:5,c:C.danger},{x:28,y:125,r:4,c:C.success},{x:52,y:125,r:4,c:C.success}];
const bones=[[0,1],[1,2],[1,3],[1,4],[4,5],[5,6],[5,7],[6,8],[7,9]];

// ── Components ──
function Skeleton(){return(<div style={{display:'flex',minHeight:'100vh'}}><div style={{width:260,background:C.sidebarBg}}/><div style={{flex:1,padding:32}}><div className="skeleton" style={{width:'50%',height:24,marginBottom:20}}/><div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>{[1,2,3,4].map(i=><div key={i} className="skeleton" style={{height:100}}/>)}</div></div></div>);}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,animation:'fadeIn .2s'}}>
    <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:16,width:'90%',maxWidth:620,maxHeight:'85vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSec}}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>);
}

function Badge({text}){
  const colors={정상:{bg:'#D1FAE5',t:'#065F46'},주의:{bg:'#FEF3C7',t:'#92400E'},관리필요:{bg:'#FEE2E2',t:'#991B1B'},경미:{bg:'#E0F2FE',t:'#075985'}};
  const c=colors[text]||{bg:'#F3F4F6',t:'#374151'};
  return <span style={{padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.t}}>{text}</span>;
}

function GaugeChart({score,max=462,size=120}){
  const pct=Math.min(score/max,1);const color=pct<0.33?C.success:pct<0.66?C.warning:C.danger;
  const angle=pct*180;const r=size/2-8;
  const x1=size/2-r*Math.cos(angle*Math.PI/180);const y1=size/2-r*Math.sin(angle*Math.PI/180);
  return(<svg width={size} height={size/2+20} viewBox={`0 0 ${size} ${size/2+20}`}>
    <path d={`M 8,${size/2} A ${r},${r} 0 0 1 ${size-8},${size/2}`} fill="none" stroke="#E2E8F0" strokeWidth="8" strokeLinecap="round"/>
    <path d={`M 8,${size/2} A ${r},${r} 0 ${angle>180?1:0} 1 ${x1},${y1}`} fill="none" stroke={color} strokeWidth="8" strokeLinecap="round"/>
    <text x={size/2} y={size/2-4} textAnchor="middle" fontSize="22" fontWeight="800" fill={color}>{score}</text>
    <text x={size/2} y={size/2+14} textAnchor="middle" fontSize="11" fill="#64748B">/ {max}</text>
  </svg>);
}

// ── Pages ──
function ClientPage({setModal}){
  const [search,setSearch]=useState('');
  const filtered=clients.filter(c=>c.name.includes(search));
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <div><h2 style={{fontSize:22,fontWeight:700}}>고객 관리</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>고객 등록, 평가 이력, 날짜별 관리</p></div>
      <button onClick={()=>setModal({type:'add-client'})} style={{padding:'10px 20px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 고객 등록</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
      {[['👥','전체 고객',`${clients.length}명`],['📋','이번 달 평가','23건'],['⚠️','관리 필요','1명'],['📄','PDF 리포트','18건']].map(([icon,label,value])=>
        <div key={label} style={{background:C.surface,borderRadius:12,padding:'18px 20px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',display:'flex',gap:12,alignItems:'center'}}>
          <div style={{width:44,height:44,borderRadius:10,background:`${C.primary}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{icon}</div>
          <div><div style={{fontSize:12,color:C.textSec}}>{label}</div><div style={{fontSize:20,fontWeight:700}}>{value}</div></div>
        </div>
      )}
    </div>
    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="이름 검색..." style={{width:'100%',padding:'10px 16px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,marginBottom:16,outline:'none',fontFamily:'Pretendard'}}/>
    <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{background:'#F8FAFC',borderBottom:`2px solid ${C.border}`}}>
          {['이름','나이','연락처','평가 횟수','최근 방문','NAI 점수','등급'].map(h=><th key={h} style={{padding:'12px 14px',textAlign:'left',fontSize:13,fontWeight:600,color:C.textSec}}>{h}</th>)}
        </tr></thead>
        <tbody>{filtered.map(c=><tr key={c.id} onClick={()=>setModal({type:'client-detail',data:c})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <td style={{padding:'14px',fontSize:14,fontWeight:600}}>{c.name}</td>
          <td style={{padding:'14px',fontSize:13}}>{c.age}세</td>
          <td style={{padding:'14px',fontSize:13,color:C.textSec}}>{c.phone}</td>
          <td style={{padding:'14px',fontSize:13}}>{c.sessions}회</td>
          <td style={{padding:'14px',fontSize:13,color:C.textSec}}>{c.lastVisit}</td>
          <td style={{padding:'14px',fontSize:14,fontWeight:700,color:c.naiScore>=300?C.danger:c.naiScore>=200?C.warning:C.success}}>{c.naiScore}</td>
          <td style={{padding:'14px'}}><Badge text={c.grade}/></td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>);
}

function AnalysisPage({setModal}){
  const [uploaded,setUploaded]=useState(false);
  const [analyzed,setAnalyzed]=useState(false);
  useEffect(()=>{if(uploaded){const t=setTimeout(()=>setAnalyzed(true),2000);return()=>clearTimeout(t);}},[uploaded]);
  const statusColor=s=>s==='정상'?C.success:s==='경미'?C.accent:C.warning;
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}><h2 style={{fontSize:22,fontWeight:700}}>자세 분석</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>사진 업로드 → 33개 관절 키포인트 자동 감지 → 오버레이 시각화</p></div>
    {!uploaded?<div>
      <div style={{background:`${C.primary}06`,borderRadius:12,padding:16,marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><span style={{fontWeight:700}}>고객:</span> 김민정 (34세) · <span style={{color:C.textSec}}>최근 평가: 2025-09-10</span></div>
        <Badge text="주의"/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {['정면 (Front)','후면 (Back)','측면 (Side)'].map((pos,i)=><div key={i} onClick={()=>setUploaded(true)} style={{background:C.surface,borderRadius:16,padding:32,textAlign:'center',cursor:'pointer',border:`2px dashed ${C.border}`,transition:'all .2s'}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.primary} onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
          <div style={{fontSize:48,marginBottom:12}}>{['🧍','🧍‍♂️','🚶'][i]}</div>
          <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>{pos}</div>
          <div style={{fontSize:12,color:C.textSec}}>사진 업로드 (JPEG/PNG)</div>
        </div>)}
      </div>
    </div>
    :!analyzed?<div style={{background:C.surface,borderRadius:16,padding:48,textAlign:'center',boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
      <div style={{fontSize:48,marginBottom:16}}>🔍</div>
      <div style={{fontSize:18,fontWeight:700}}>관절 키포인트 감지 중...</div>
      <div style={{fontSize:13,color:C.textSec,marginTop:8}}>33개 관절 좌표 추출 + 각도 편차 계산</div>
      <div style={{width:200,height:6,background:C.border,borderRadius:3,margin:'16px auto',overflow:'hidden'}}><div className="skeleton" style={{height:'100%',width:'100%'}}/></div>
    </div>
    :<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>키포인트 오버레이 (정면)</h3>
        <div style={{height:300,background:'#F1F5F9',borderRadius:12,position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{fontSize:64,opacity:0.2}}>🧍</div>
          <svg width="80" height="140" viewBox="0 0 80 140" style={{position:'absolute'}}>
            {bones.map(([a,b],i)=><line key={i} x1={joints[a].x} y1={joints[a].y} x2={joints[b].x} y2={joints[b].y} stroke={C.primary} strokeWidth="2" opacity="0.5"/>)}
            {joints.map((j,i)=><circle key={i} cx={j.x} cy={j.y} r={j.r} fill={j.c} opacity="0.8"/>)}
          </svg>
          <div style={{position:'absolute',bottom:8,left:8,right:8,display:'flex',gap:8}}>
            {[['정상','#059669'],['주의','#D97706'],['이상','#DC2626']].map(([l,c])=><div key={l} style={{display:'flex',alignItems:'center',gap:4,fontSize:10}}><div style={{width:8,height:8,borderRadius:'50%',background:c}}/>{l}</div>)}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginTop:12}}>
          {['정면','후면','측면'].map(p=><div key={p} style={{height:60,background:'#F1F5F9',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:C.textSec}}>{p}</div>)}
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>자세 지표 수치 데이터</h3>
        {Object.values(poseMetrics).map(p=><div key={p.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
          <span style={{fontSize:13,fontWeight:600}}>{p.label}</span>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:14,fontWeight:700}}>{p.value}</span>
            <span style={{padding:'3px 8px',borderRadius:12,fontSize:11,fontWeight:600,background:`${statusColor(p.status)}14`,color:statusColor(p.status)}}>{p.status}</span>
          </div>
        </div>)}
        <div style={{marginTop:16}}>
          <ResponsiveContainer width="100%" height={180}>
            <RadarChart data={radarData}><PolarGrid stroke="#E2E8F0"/><PolarAngleAxis dataKey="area" tick={{fontSize:11}}/><PolarRadiusAxis tick={{fontSize:10}}/><Radar name="ROM" dataKey="score" stroke={C.primary} fill={C.primary} fillOpacity={0.2}/></RadarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>}
  </div>);
}

function EvalPage({setModal}){
  const [tab,setTab]=useState('ROM');
  const categories=tab==='ROM'?romItems:structItems;
  const [scores,setScores]=useState({});
  const setScore=(cat,item,val)=>setScores(p=>({...p,[`${cat}-${item}`]:val}));
  const totalScore=Object.values(scores).reduce((s,v)=>s+v,0)+categories.reduce((s,c)=>s+c.scores.reduce((a,b)=>a+b,0),0);
  const totalMax=462;const grade=totalScore<154?'정상':totalScore<308?'주의':'관리 필요';
  const gradeColor=grade==='정상'?C.success:grade==='주의'?C.warning:C.danger;
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}><h2 style={{fontSize:22,fontWeight:700}}>NAI 평가</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>ROM 54항목 + Structure 100항목 · 0~3점 채점 · 실시간 합산</p></div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:24}}>
      <div>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {['ROM','Structure'].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:'10px 24px',borderRadius:10,border:tab===t?'none':`1px solid ${C.border}`,background:tab===t?C.primary:'transparent',color:tab===t?'#fff':C.text,fontSize:14,fontWeight:600,cursor:'pointer'}}>{t} {t==='ROM'?'(54항목)':'(100항목)'}</button>)}
        </div>
        <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',overflow:'hidden'}}>
          {categories.map((cat,ci)=><div key={ci}>
            <div style={{padding:'12px 16px',background:'#F8FAFC',fontWeight:700,fontSize:14,borderBottom:`1px solid ${C.border}`}}>{cat.cat} <span style={{fontWeight:400,color:C.textSec,fontSize:12}}>({cat.items.length}항목)</span></div>
            {cat.items.map((item,ii)=>{
              const key=`${cat.cat}-${item}`;const val=scores[key]??cat.scores[ii];
              return(<div key={ii} style={{display:'flex',alignItems:'center',padding:'8px 16px',borderBottom:`1px solid ${C.border}`,gap:12}}>
                <span style={{flex:1,fontSize:13}}>{item}</span>
                <div style={{display:'flex',gap:4}}>
                  {[0,1,2,3].map(s=><button key={s} onClick={()=>setScore(cat.cat,item,s)} style={{width:32,height:32,borderRadius:8,border:val===s?`2px solid ${C.primary}`:`1px solid ${C.border}`,background:val===s?`${C.primary}14`:C.surface,color:val===s?C.primary:C.text,fontSize:13,fontWeight:val===s?700:400,cursor:'pointer'}}>{s}</button>)}
                </div>
              </div>);
            })}
          </div>)}
        </div>
      </div>
      <div>
        <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',position:'sticky',top:80}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16,textAlign:'center'}}>실시간 합산</h3>
          <div style={{textAlign:'center',marginBottom:16}}><GaugeChart score={totalScore}/></div>
          <div style={{textAlign:'center',marginBottom:16}}><span style={{padding:'6px 16px',borderRadius:20,fontSize:14,fontWeight:700,background:`${gradeColor}14`,color:gradeColor}}>{grade}</span></div>
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:12}}>
            {categories.map((cat,i)=>{
              const catTotal=cat.items.reduce((s,item,ii)=>{const key=`${cat.cat}-${item}`;return s+(scores[key]??cat.scores[ii]);},0);
              return(<div key={i} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',fontSize:13}}>
                <span style={{color:C.textSec}}>{cat.cat}</span><span style={{fontWeight:600}}>{catTotal}/{cat.items.length*3}</span>
              </div>);
            })}
          </div>
          <button onClick={()=>setModal({type:'save-eval'})} style={{width:'100%',marginTop:16,padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>평가 저장</button>
        </div>
      </div>
    </div>
  </div>);
}

function ReportPage({setModal}){
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}><h2 style={{fontSize:22,fontWeight:700}}>리포트 생성</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>종합 평가 결과를 게이지 그래프 + 점수표 + 관리 코멘트로 PDF 출력</p></div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>PDF 리포트 미리보기</h3>
        <div style={{background:'#F8FAFC',borderRadius:12,padding:20,border:`1px solid ${C.border}`}}>
          <div style={{textAlign:'center',marginBottom:16,paddingBottom:12,borderBottom:`2px solid ${C.primary}`}}>
            <div style={{fontSize:20,fontWeight:800,color:C.primary}}>자세 분석 평가 리포트</div>
            <div style={{fontSize:12,color:C.textSec,marginTop:4}}>김민정 · 34세 · 평가일: 2025-09-10</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:16}}>
            {['정면 분석','후면 분석','측면 분석'].map(p=><div key={p} style={{height:60,background:'#E2E8F0',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:C.textSec}}>{p}</div>)}
          </div>
          <div style={{textAlign:'center',marginBottom:16}}>
            <GaugeChart score={285} size={100}/>
            <div style={{fontSize:13,fontWeight:700,marginTop:4}}>NAI 총점: 285 / 462</div>
            <Badge text="주의"/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:11}}>
            {[['ROM 점수','142/162'],['Structure 점수','143/300'],['어깨 높이 차','12mm'],['골반 기울기','8mm']].map(([k,v])=><div key={k} style={{background:'#fff',borderRadius:6,padding:6,textAlign:'center'}}><div style={{color:C.textSec}}>{k}</div><div style={{fontWeight:700,marginTop:2}}>{v}</div></div>)}
          </div>
          <div style={{marginTop:12,padding:10,background:'#FEF3C7',borderRadius:8,fontSize:11,color:'#92400E'}}>
            ⚠️ 관리 코멘트: 어깨·골반 편차에 대한 교정 운동이 권장됩니다. 3개월 후 재평가를 권장합니다.
          </div>
        </div>
      </div>
      <div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',marginBottom:16}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>평가 이력</h3>
          {evalHistory.map((e,i)=><div key={i} onClick={()=>setModal({type:'history-detail',data:e})} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:`1px solid ${C.border}`,cursor:'pointer'}} onMouseEnter={ev=>ev.currentTarget.style.background='#F8FAFC'} onMouseLeave={ev=>ev.currentTarget.style.background='transparent'}>
            <div><div style={{fontSize:14,fontWeight:600}}>{e.date}</div></div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:18,fontWeight:800,color:e.nai>=300?C.danger:e.nai>=200?C.warning:C.success}}>{e.nai}</span>
              <Badge text={e.grade}/>
            </div>
          </div>)}
        </div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>NAI 점수 추이</h3>
          <ResponsiveContainer width="100%" height={160}>
            <BarChart data={evalHistory.slice().reverse()}><XAxis dataKey="date" tick={{fontSize:10}}/><YAxis tick={{fontSize:10}} domain={[0,462]}/><Tooltip/><Bar dataKey="nai" fill={C.primary} radius={[6,6,0,0]}/></BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>치료사 코멘트</label>
          <textarea rows={3} defaultValue="어깨·골반 편차에 대한 교정 운동을 권장합니다. 3개월 후 재평가를 권장합니다." style={{width:'100%',padding:12,border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:'Pretendard',resize:'vertical'}}/>
        </div>
        <button onClick={()=>setModal({type:'generate-pdf'})} style={{width:'100%',padding:'14px',borderRadius:12,border:'none',background:C.primary,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer'}}>📄 PDF 리포트 다운로드</button>
      </div>
    </div>
  </div>);
}

// ── Modals ──
function ModalContent({modal,onClose}){
  if(!modal)return null;
  const d=modal.data;
  switch(modal.type){
    case 'client-detail':return(<div>
      <div style={{display:'flex',gap:14,alignItems:'center',marginBottom:20}}>
        <div style={{width:52,height:52,borderRadius:'50%',background:`${C.primary}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:700,color:C.primary}}>{d.name[0]}</div>
        <div><div style={{fontSize:20,fontWeight:700}}>{d.name}</div><div style={{fontSize:13,color:C.textSec}}>{d.age}세 · {d.phone}</div></div>
        <Badge text={d.grade}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}}>
        {[['평가 횟수',`${d.sessions}회`],['최근 방문',d.lastVisit],['NAI 점수',String(d.naiScore)]].map(([k,v])=><div key={k} style={{background:'#F8FAFC',borderRadius:10,padding:14,textAlign:'center'}}><div style={{fontSize:12,color:C.textSec}}>{k}</div><div style={{fontSize:18,fontWeight:700,marginTop:4}}>{v}</div></div>)}
      </div>
      <label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>치료사 메모</label>
      <textarea rows={3} placeholder="고객 관련 메모..." style={{width:'100%',padding:12,border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:'Pretendard',resize:'vertical'}}/>
      <div style={{display:'flex',gap:8,marginTop:16}}>
        <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,fontSize:14,cursor:'pointer'}}>닫기</button>
        <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>평가 시작</button>
      </div>
    </div>);
    case 'add-client':return(<div>
      {['이름','나이','연락처','비고'].map(label=><div key={label} style={{marginBottom:14}}><label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>{label}</label><input placeholder={`${label} 입력`} style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none',fontFamily:'Pretendard'}}/></div>)}
      <div style={{display:'flex',gap:8,marginTop:8}}><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,fontSize:14,cursor:'pointer'}}>취소</button><button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>등록</button></div>
    </div>);
    case 'save-eval':return(<div style={{textAlign:'center'}}><div style={{fontSize:48,marginBottom:12}}>✅</div><h4 style={{fontSize:18,fontWeight:700}}>평가가 저장되었습니다</h4><p style={{fontSize:14,color:C.textSec,marginTop:8,marginBottom:20}}>NAI 총점과 등급이 고객 이력에 기록됩니다.</p><button onClick={onClose} style={{padding:'12px 32px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>확인</button></div>);
    case 'generate-pdf':return(<div style={{textAlign:'center'}}><div style={{fontSize:48,marginBottom:12}}>📄</div><h4 style={{fontSize:18,fontWeight:700}}>PDF 리포트 생성 완료</h4><p style={{fontSize:14,color:C.textSec,marginTop:8,marginBottom:20}}>게이지 그래프, 점수표, 관리 코멘트가 포함됩니다.</p><button onClick={onClose} style={{padding:'12px 32px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>다운로드</button></div>);
    case 'history-detail':return(<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><span style={{fontSize:18,fontWeight:700}}>{d.date} 평가</span><Badge text={d.grade}/></div>
      <div style={{textAlign:'center',marginBottom:16}}><GaugeChart score={d.nai} size={100}/></div>
      <button onClick={onClose} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>닫기</button>
    </div>);
    default:return null;
  }
}

// ── App ──
function App(){
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState('clients');
  const [modal,setModal]=useState(null);
  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading)return <Skeleton/>;

  const menus=[
    {key:'clients',icon:'👥',label:'고객 관리'},
    {key:'analysis',icon:'🦴',label:'자세 분석'},
    {key:'evaluation',icon:'📋',label:'NAI 평가'},
    {key:'report',icon:'📄',label:'리포트 생성'}
  ];
  const modalTitles={'client-detail':'고객 상세','add-client':'고객 등록','save-eval':'평가 저장','generate-pdf':'PDF 생성','history-detail':'평가 이력'};

  return(<div style={{display:'flex',minHeight:'100vh'}}>
    <aside style={{width:260,background:C.sidebarBg,flexShrink:0,display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,bottom:0,zIndex:100}}>
      <div style={{padding:'24px 20px',borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{fontSize:20,fontWeight:800,color:'#fff'}}>🦴 자세 분석 평가</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,0.5)',marginTop:4}}>맞춤 구현 데모</div>
      </div>
      <div style={{padding:'10px 16px',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <div style={{padding:'8px 10px',background:'rgba(255,255,255,0.05)',borderRadius:8,fontSize:11,color:'rgba(255,255,255,0.6)',lineHeight:1.5}}>
          고객 자세·구조·가동범위 평가<br/>+ 관절 분석 + PDF 리포트
        </div>
      </div>
      <nav style={{flex:1,padding:'12px 10px'}}>
        {menus.map(m=><button key={m.key} onClick={()=>setPage(m.key)} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'12px 14px',borderRadius:10,border:'none',background:page===m.key?C.sidebarActive:'transparent',color:page===m.key?'#fff':'rgba(255,255,255,0.6)',fontSize:14,fontWeight:page===m.key?600:400,cursor:'pointer',marginBottom:2,transition:'all .15s',textAlign:'left'}} onMouseEnter={e=>{if(page!==m.key)e.currentTarget.style.background=C.sidebarHover}} onMouseLeave={e=>{if(page!==m.key)e.currentTarget.style.background='transparent'}}>
          <span style={{fontSize:18}}>{m.icon}</span>{m.label}
        </button>)}
      </nav>
      <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:'rgba(255,255,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff',fontWeight:600}}>치</div>
          <div><div style={{fontSize:13,color:'#fff',fontWeight:500}}>치료사</div><div style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>therapist@demo.kr</div></div>
        </div>
      </div>
    </aside>
    <main style={{flex:1,marginLeft:260}}>
      <header style={{height:60,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',position:'sticky',top:0,zIndex:50}}>
        <div style={{fontSize:16,fontWeight:700}}>{menus.find(m=>m.key===page)?.label}</div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <span style={{padding:'4px 10px',borderRadius:8,fontSize:12,fontWeight:600,background:`${C.warning}14`,color:C.warning}}>구현 데모</span>
          <input placeholder="고객 검색..." style={{padding:'8px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,width:200,outline:'none',fontFamily:'Pretendard'}}/>
        </div>
      </header>
      <div style={{padding:32}}>
        {page==='clients'&&<ClientPage setModal={setModal}/>}
        {page==='analysis'&&<AnalysisPage setModal={setModal}/>}
        {page==='evaluation'&&<EvalPage setModal={setModal}/>}
        {page==='report'&&<ReportPage setModal={setModal}/>}
      </div>
    </main>
    <Modal open={!!modal} onClose={()=>setModal(null)} title={modal?modalTitles[modal.type]||'상세':''}><ModalContent modal={modal} onClose={()=>setModal(null)}/></Modal>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
