<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모션코치 - 스포츠 동작 분석 코칭</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#F0FDF4;color:#064E3B;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#D1FAE5;}::-webkit-scrollbar-thumb{background:#34D399;border-radius:3px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.skeleton{background:linear-gradient(90deg,#D1FAE5 25%,#ECFDF5 50%,#D1FAE5 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const {BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,LineChart,Line,CartesianGrid,Legend,RadarChart,Radar,PolarGrid,PolarAngleAxis,PolarRadiusAxis}=Recharts;

const C={primary:'#059669',secondary:'#064E3B',accent:'#34D399',bg:'#F0FDF4',surface:'#FFFFFF',text:'#064E3B',textSec:'#6B7280',border:'#E5E7EB',success:'#059669',warning:'#D97706',danger:'#DC2626'};

const exercises=['스쿼트','데드리프트','숄더프레스','벤치프레스','런지','풀업'];
const members=[
  {id:1,name:'강민호',sport:'웨이트',sessions:24,accuracy:82,lastSession:'2025-12-20'},
  {id:2,name:'윤서진',sport:'크로스핏',sessions:18,accuracy:76,lastSession:'2025-12-18'},
  {id:3,name:'임도현',sport:'필라테스',sessions:32,accuracy:91,lastSession:'2025-12-22'},
  {id:4,name:'송예린',sport:'웨이트',sessions:15,accuracy:68,lastSession:'2025-12-15'}
];

const analysisData=[
  {frame:0,knee:85,hip:90,target_knee:90,target_hip:95},{frame:10,knee:75,hip:70,target_knee:80,target_hip:75},
  {frame:20,knee:55,hip:45,target_knee:60,target_hip:50},{frame:30,knee:40,hip:30,target_knee:45,target_hip:35},
  {frame:40,knee:55,hip:50,target_knee:60,target_hip:55},{frame:50,knee:75,hip:70,target_knee:80,target_hip:75},
  {frame:60,knee:88,hip:88,target_knee:90,target_hip:90}
];

const setData=[
  {set:1,reps:12,avgTime:'2.3초',accuracy:85,issues:['슬관절 내전','하강 속도 빠름']},
  {set:2,reps:10,avgTime:'2.5초',accuracy:78,issues:['골반 후방경사','상체 과전굴']},
  {set:3,reps:8,avgTime:'2.8초',accuracy:72,issues:['슬관절 내전','골반 비대칭','피로 감지']}
];

const bodyRadar=[{area:'고관절',score:82},{area:'슬관절',score:75},{area:'발목',score:88},{area:'척추',score:70},{area:'어깨',score:85},{area:'골반',score:68}];
const correctionPoints=[
  {time:'00:12',joint:'슬관절',issue:'하강 시 무릎 내전 감지',severity:'주의',angle:'165° → 기준 170°'},
  {time:'00:28',joint:'골반',issue:'최저점 도달 시 골반 후방경사',severity:'교정필요',angle:'45° → 기준 55°'},
  {time:'00:45',joint:'척추',issue:'상체 과전굴 (굽어짐)',severity:'주의',angle:'38° → 기준 45°'},
  {time:'01:02',joint:'슬관절',issue:'3세트 피로 축적, 내전 심화',severity:'위험',angle:'158° → 기준 170°'}
];

const coachingHistory=[
  {date:'2025-12-22',exercise:'스쿼트',sets:4,totalReps:42,avgAccuracy:79},
  {date:'2025-12-20',exercise:'데드리프트',sets:3,totalReps:24,avgAccuracy:84},
  {date:'2025-12-18',exercise:'숄더프레스',sets:3,totalReps:30,avgAccuracy:88},
  {date:'2025-12-15',exercise:'런지',sets:4,totalReps:48,avgAccuracy:75}
];

// ── Components ──
function Skeleton(){return(<div style={{padding:32}}><div className="skeleton" style={{width:'100%',height:280,marginBottom:24}}/><div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>{[1,2,3].map(i=><div key={i} className="skeleton" style={{height:200}}/>)}</div></div>);}

function Drawer({open,onClose,title,children}){
  if(!open)return null;
  return(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.3)',zIndex:1000}}>
    <div onClick={e=>e.stopPropagation()} style={{position:'absolute',right:0,top:0,bottom:0,width:480,background:C.surface,boxShadow:'-8px 0 30px rgba(0,0,0,0.1)',animation:'fadeIn .2s',overflow:'auto'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:C.surface,zIndex:1}}>
        <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSec}}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>);
}

function Badge({text}){
  const colors={주의:{bg:'#FEF3C7',t:'#92400E'},교정필요:{bg:'#FED7AA',t:'#9A3412'},위험:{bg:'#FEE2E2',t:'#991B1B'},정상:{bg:'#D1FAE5',t:'#065F46'}};
  const c=colors[text]||{bg:'#F3F4F6',t:'#374151'};
  return <span style={{padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.t}}>{text}</span>;
}

function AccuracyRing({value,size=80}){
  const r=size/2-6;const circ=2*Math.PI*r;const offset=circ*(1-value/100);
  const color=value>=80?C.success:value>=60?C.warning:C.danger;
  return(<svg width={size} height={size}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E7EB" strokeWidth="6"/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="6" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}/><text x={size/2} y={size/2+5} textAnchor="middle" fontSize="18" fontWeight="800" fill={color}>{value}%</text></svg>);
}

// ── Pages ──
function HomePage({setPage,setDrawer}){
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{background:`linear-gradient(135deg, ${C.secondary} 0%, ${C.primary} 100%)`,borderRadius:24,padding:'56px 64px',marginBottom:32,position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:-30,right:-30,width:200,height:200,background:'rgba(52,211,153,0.1)',borderRadius:'50%'}}/>
      <div style={{position:'relative',zIndex:1}}>
        <div style={{fontSize:14,color:C.accent,fontWeight:600,marginBottom:8}}>AI 기반 운동 분석</div>
        <h1 style={{fontSize:36,fontWeight:800,color:'#fff',lineHeight:1.3,marginBottom:14}}>운동 영상 한 편으로<br/>자세 교정 포인트를 자동 분석</h1>
        <p style={{fontSize:16,color:'rgba(255,255,255,0.7)',marginBottom:28,lineHeight:1.6}}>MediaPipe Pose로 관절 궤적을 추출하고 기준 동작과 비교하여<br/>교정 구간과 반복 횟수를 자동 집계합니다</p>
        <button onClick={()=>setPage('upload')} style={{padding:'14px 32px',borderRadius:14,border:'none',background:'#fff',color:C.primary,fontSize:15,fontWeight:700,cursor:'pointer'}}>영상 업로드 →</button>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:32}}>
      {members.map(m=><div key={m.id} onClick={()=>setDrawer({type:'member',data:m})} style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 2px 10px rgba(0,0,0,0.04)',cursor:'pointer',transition:'all .2s'}} onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'} onMouseLeave={e=>e.currentTarget.style.transform='none'}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={{width:40,height:40,borderRadius:'50%',background:`${C.primary}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:700,color:C.primary}}>{m.name[0]}</div>
          <AccuracyRing value={m.accuracy} size={48}/>
        </div>
        <div style={{fontSize:15,fontWeight:700}}>{m.name}</div>
        <div style={{fontSize:12,color:C.textSec,marginTop:4}}>{m.sport} · {m.sessions}회 분석</div>
      </div>)}
    </div>
  </div>);
}

function UploadPage({setDrawer}){
  const [exercise,setExercise]=useState('');
  const [uploaded,setUploaded]=useState(false);
  return(<div style={{animation:'fadeIn .4s'}}>
    <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>영상 업로드</h2>
    <p style={{color:C.textSec,fontSize:14,marginBottom:24}}>운동 영상을 업로드하고 종목을 선택하세요</p>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
      <div>
        <div onClick={()=>setUploaded(true)} style={{background:C.surface,border:`2px dashed ${C.border}`,borderRadius:20,padding:'48px 24px',textAlign:'center',cursor:'pointer',marginBottom:16}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.primary} onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
          <div style={{fontSize:48,marginBottom:12}}>🎥</div>
          <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>운동 영상 업로드</div>
          <div style={{fontSize:13,color:C.textSec}}>MP4, MOV (최대 200MB)</div>
          {uploaded&&<div style={{marginTop:12,padding:'6px 12px',borderRadius:8,background:`${C.success}14`,color:C.success,fontSize:13,fontWeight:600,display:'inline-block'}}>✓ squat_session_01.mp4 업로드 완료</div>}
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>종목 선택</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10}}>
          {exercises.map(ex=><button key={ex} onClick={()=>setExercise(ex)} style={{padding:'14px',borderRadius:12,border:exercise===ex?`2px solid ${C.primary}`:`1px solid ${C.border}`,background:exercise===ex?`${C.primary}08`:C.surface,fontSize:14,fontWeight:exercise===ex?700:400,cursor:'pointer',color:exercise===ex?C.primary:C.text}}>{ex}</button>)}
        </div>
        <button onClick={()=>setDrawer({type:'analysis-start'})} disabled={!exercise||!uploaded} style={{width:'100%',marginTop:20,padding:'14px',borderRadius:12,border:'none',background:exercise&&uploaded?C.primary:'#D1D5DB',color:'#fff',fontSize:15,fontWeight:700,cursor:exercise&&uploaded?'pointer':'not-allowed'}}>분석 시작 →</button>
      </div>
    </div>
  </div>);
}

function MotionAnalysisPage({setDrawer}){
  const [analyzing,setAnalyzing]=useState(true);
  useEffect(()=>{const t=setTimeout(()=>setAnalyzing(false),2500);return()=>clearTimeout(t);},[]);
  return(<div style={{animation:'fadeIn .4s'}}>
    <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>동작 분석</h2>
    <p style={{color:C.textSec,fontSize:14,marginBottom:24}}>MediaPipe Pose 기반 관절 궤적 추출 + 기준 동작 비교</p>
    {analyzing?<div style={{background:C.surface,borderRadius:16,padding:48,textAlign:'center',boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
      <div style={{fontSize:48,animation:'pulse 1.5s infinite',marginBottom:12}}>🏋️</div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>MediaPipe 동작 분석 중...</div>
      <div style={{fontSize:13,color:C.textSec}}>프레임별 33개 관절 좌표 추출 + DTW 유사도 계산</div>
    </div>
    :<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>관절 각도 타임라인</h3>
        <ResponsiveContainer width="100%" height={250}>
          <LineChart data={analysisData}><CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/><XAxis dataKey="frame" tick={{fontSize:11}} label={{value:'프레임',position:'bottom',fontSize:11}}/><YAxis tick={{fontSize:11}} label={{value:'각도(°)',angle:-90,position:'insideLeft',fontSize:11}}/><Tooltip/><Legend/>
            <Line type="monotone" dataKey="knee" stroke={C.primary} strokeWidth={2} name="슬관절 실측" dot={false}/>
            <Line type="monotone" dataKey="target_knee" stroke={C.primary} strokeWidth={1} strokeDasharray="5 5" name="슬관절 기준" dot={false}/>
            <Line type="monotone" dataKey="hip" stroke={C.danger} strokeWidth={2} name="고관절 실측" dot={false}/>
            <Line type="monotone" dataKey="target_hip" stroke={C.danger} strokeWidth={1} strokeDasharray="5 5" name="고관절 기준" dot={false}/>
          </LineChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>교정 포인트</h3>
        {correctionPoints.map((cp,i)=><div key={i} onClick={()=>setDrawer({type:'correction',data:cp})} style={{padding:'12px 0',borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background='#F9FAFB'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <span style={{fontSize:13,fontWeight:600}}>{cp.time} · {cp.joint}</span>
            <Badge text={cp.severity}/>
          </div>
          <div style={{fontSize:12,color:C.textSec}}>{cp.issue}</div>
          <div style={{fontSize:11,color:C.primary,marginTop:2}}>{cp.angle}</div>
        </div>)}
      </div>
    </div>}
  </div>);
}

function RepsPage({setDrawer}){
  return(<div style={{animation:'fadeIn .4s'}}>
    <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>반복 집계</h2>
    <p style={{color:C.textSec,fontSize:14,marginBottom:24}}>세트별 반복 횟수와 동작 정확도를 자동 집계합니다</p>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:24}}>
      {setData.map(s=><div key={s.set} onClick={()=>setDrawer({type:'set-detail',data:s})} style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)',cursor:'pointer',transition:'all .2s'}} onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'} onMouseLeave={e=>e.currentTarget.style.transform='none'}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontSize:16,fontWeight:800}}>세트 {s.set}</span>
          <AccuracyRing value={s.accuracy} size={56}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div style={{background:'#F9FAFB',borderRadius:8,padding:10,textAlign:'center'}}><div style={{fontSize:11,color:C.textSec}}>반복</div><div style={{fontSize:20,fontWeight:700,color:C.primary}}>{s.reps}회</div></div>
          <div style={{background:'#F9FAFB',borderRadius:8,padding:10,textAlign:'center'}}><div style={{fontSize:11,color:C.textSec}}>평균 시간</div><div style={{fontSize:16,fontWeight:600}}>{s.avgTime}</div></div>
        </div>
        <div style={{marginTop:12}}>{s.issues.map((issue,i)=><div key={i} style={{fontSize:11,color:C.warning,marginTop:4}}>⚠️ {issue}</div>)}</div>
      </div>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>부위별 정확도</h3>
        <ResponsiveContainer width="100%" height={220}>
          <RadarChart data={bodyRadar}><PolarGrid stroke="#E5E7EB"/><PolarAngleAxis dataKey="area" tick={{fontSize:11}}/><PolarRadiusAxis tick={{fontSize:10}} domain={[0,100]}/><Radar name="정확도" dataKey="score" stroke={C.primary} fill={C.primary} fillOpacity={0.2}/></RadarChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>최근 코칭 이력</h3>
        {coachingHistory.map((h,i)=><div key={i} onClick={()=>setDrawer({type:'history',data:h})} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`,cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.background='#F9FAFB'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <div><div style={{fontSize:13,fontWeight:600}}>{h.exercise}</div><div style={{fontSize:11,color:C.textSec}}>{h.date} · {h.sets}세트 {h.totalReps}회</div></div>
          <span style={{fontSize:14,fontWeight:700,color:h.avgAccuracy>=80?C.success:C.warning}}>{h.avgAccuracy}%</span>
        </div>)}
      </div>
    </div>
  </div>);
}

function CoachingReportPage({setDrawer}){
  return(<div style={{animation:'fadeIn .4s'}}>
    <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>코칭 리포트</h2>
    <p style={{color:C.textSec,fontSize:14,marginBottom:24}}>종합 분석 결과를 리포트로 출력합니다</p>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>리포트 미리보기</h3>
        <div style={{background:'#F9FAFB',borderRadius:12,padding:20,border:`1px solid ${C.border}`}}>
          <div style={{textAlign:'center',marginBottom:16}}>
            <div style={{fontSize:18,fontWeight:800,color:C.primary}}>스포츠 동작 분석 리포트</div>
            <div style={{fontSize:12,color:C.textSec,marginTop:4}}>강민호 · 스쿼트 · 2025-12-22</div>
          </div>
          <div style={{textAlign:'center',marginBottom:16}}><AccuracyRing value={79} size={80}/><div style={{fontSize:13,fontWeight:600,marginTop:4}}>종합 정확도</div></div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
            {[['총 세트','4'],['총 반복','42회'],['교정 포인트','4건']].map(([k,v])=><div key={k} style={{background:'#fff',borderRadius:8,padding:8,textAlign:'center'}}><div style={{fontSize:10,color:C.textSec}}>{k}</div><div style={{fontSize:16,fontWeight:700}}>{v}</div></div>)}
          </div>
        </div>
      </div>
      <div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)',marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>교정 코멘트</h3>
          {correctionPoints.slice(0,3).map((cp,i)=><div key={i} style={{padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:13,fontWeight:600}}>{cp.joint}</span><Badge text={cp.severity}/></div>
            <div style={{fontSize:12,color:C.textSec}}>{cp.issue}</div>
          </div>)}
        </div>
        <button onClick={()=>setDrawer({type:'pdf-download'})} style={{width:'100%',padding:'14px',borderRadius:12,border:'none',background:C.primary,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer'}}>📄 코칭 리포트 다운로드</button>
      </div>
    </div>
  </div>);
}

// ── Drawer Content ──
function DrawerContent({drawer,onClose}){
  if(!drawer)return null;
  const d=drawer.data;
  switch(drawer.type){
    case 'member':return(<div>
      <div style={{display:'flex',gap:14,alignItems:'center',marginBottom:16}}>
        <div style={{width:52,height:52,borderRadius:'50%',background:`${C.primary}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:700,color:C.primary}}>{d.name[0]}</div>
        <div><div style={{fontSize:18,fontWeight:700}}>{d.name}</div><div style={{fontSize:13,color:C.textSec}}>{d.sport} · {d.sessions}회 분석</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        {[['분석 횟수',`${d.sessions}회`],['평균 정확도',`${d.accuracy}%`],['종목',d.sport],['최근 분석',d.lastSession]].map(([k,v])=><div key={k} style={{background:'#F9FAFB',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{v}</div></div>)}
      </div>
      <label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>코치 메모</label>
      <textarea rows={3} placeholder="회원 관련 메모..." style={{width:'100%',padding:10,border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:'Pretendard',resize:'vertical',marginBottom:12}}/>
      <button onClick={onClose} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>닫기</button>
    </div>);
    case 'correction':return(<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><span style={{fontSize:16,fontWeight:700}}>{d.time} · {d.joint}</span><Badge text={d.severity}/></div>
      <div style={{background:'#F9FAFB',borderRadius:10,padding:16,marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>{d.issue}</div>
        <div style={{fontSize:13,color:C.primary}}>{d.angle}</div>
      </div>
      <label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>코치 피드백</label>
      <textarea rows={3} placeholder="교정 방법을 기술하세요..." style={{width:'100%',padding:10,border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:'Pretendard',resize:'vertical',marginBottom:12}}/>
      <button onClick={onClose} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>저장</button>
    </div>);
    case 'set-detail':return(<div>
      <h4 style={{fontSize:18,fontWeight:700,marginBottom:16}}>세트 {d.set} 상세</h4>
      <div style={{textAlign:'center',marginBottom:16}}><AccuracyRing value={d.accuracy}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        {[['반복',`${d.reps}회`],['평균 시간',d.avgTime],['정확도',`${d.accuracy}%`],['이슈',`${d.issues.length}건`]].map(([k,v])=><div key={k} style={{background:'#F9FAFB',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{v}</div></div>)}
      </div>
      <h5 style={{fontSize:14,fontWeight:600,marginBottom:8}}>감지된 이슈</h5>
      {d.issues.map((issue,i)=><div key={i} style={{padding:'8px 12px',background:'#FEF3C7',borderRadius:8,fontSize:13,color:'#92400E',marginBottom:6}}>⚠️ {issue}</div>)}
      <button onClick={onClose} style={{width:'100%',marginTop:12,padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>닫기</button>
    </div>);
    case 'history':return(<div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        {[['종목',d.exercise],['날짜',d.date],['세트',`${d.sets}세트`],['총 반복',`${d.totalReps}회`],['평균 정확도',`${d.avgAccuracy}%`]].map(([k,v])=><div key={k} style={{background:'#F9FAFB',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{v}</div></div>)}
      </div>
      <button onClick={onClose} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>닫기</button>
    </div>);
    case 'analysis-start':return(<div style={{textAlign:'center'}}>
      <div style={{fontSize:48,marginBottom:12}}>🏋️</div>
      <h4 style={{fontSize:18,fontWeight:700,marginBottom:8}}>분석을 시작합니다</h4>
      <p style={{fontSize:14,color:C.textSec,marginBottom:20}}>영상을 프레임 단위로 분리하고 MediaPipe Pose를 적용합니다.</p>
      <button onClick={onClose} style={{padding:'12px 32px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>확인</button>
    </div>);
    case 'pdf-download':return(<div style={{textAlign:'center'}}>
      <div style={{fontSize:48,marginBottom:12}}>📄</div>
      <h4 style={{fontSize:18,fontWeight:700,marginBottom:8}}>코칭 리포트 생성 완료</h4>
      <p style={{fontSize:14,color:C.textSec,marginBottom:20}}>관절 궤적, 교정 포인트, 반복 통계가 포함됩니다.</p>
      <button onClick={onClose} style={{padding:'12px 32px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>다운로드</button>
    </div>);
    default:return null;
  }
}

// ── App ──
function App(){
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState('home');
  const [drawer,setDrawer]=useState(null);
  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading)return <Skeleton/>;

  const tabs=[
    {key:'home',label:'홈'},{key:'upload',label:'영상 업로드'},{key:'motion',label:'동작 분석'},
    {key:'reps',label:'반복 집계'},{key:'coaching-report',label:'코칭 리포트'}
  ];
  const drawerTitles={member:'회원 상세',correction:'교정 상세','set-detail':'세트 상세',history:'이력 상세','analysis-start':'분석 시작','pdf-download':'리포트 다운로드'};

  return(<div style={{minHeight:'100vh',background:C.bg}}>
    <header style={{background:C.surface,borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:100}}>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'0 32px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',height:64}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:24}}>🏋️</span><span style={{fontSize:20,fontWeight:800,color:C.secondary}}>모션코치</span></div>
          <div style={{display:'flex',gap:12,alignItems:'center'}}>
            <input placeholder="회원 검색..." style={{padding:'8px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:13,width:200,outline:'none',fontFamily:'Pretendard'}}/>
            <button style={{background:'none',border:'none',fontSize:18,cursor:'pointer'}}>🔔</button>
          </div>
        </div>
        <div style={{display:'flex',gap:0}}>
          {tabs.map(t=><button key={t.key} onClick={()=>setPage(t.key)} style={{padding:'12px 20px',border:'none',borderBottom:page===t.key?`3px solid ${C.primary}`:'3px solid transparent',background:'transparent',color:page===t.key?C.primary:C.textSec,fontSize:14,fontWeight:page===t.key?700:500,cursor:'pointer',transition:'all .15s'}}>{t.label}</button>)}
        </div>
      </div>
    </header>
    <main style={{maxWidth:1280,margin:'0 auto',padding:'32px 32px'}}>
      {page==='home'&&<HomePage setPage={setPage} setDrawer={setDrawer}/>}
      {page==='upload'&&<UploadPage setDrawer={setDrawer}/>}
      {page==='motion'&&<MotionAnalysisPage setDrawer={setDrawer}/>}
      {page==='reps'&&<RepsPage setDrawer={setDrawer}/>}
      {page==='coaching-report'&&<CoachingReportPage setDrawer={setDrawer}/>}
    </main>
    <Drawer open={!!drawer} onClose={()=>setDrawer(null)} title={drawer?drawerTitles[drawer.type]||'상세':''}><DrawerContent drawer={drawer} onClose={()=>setDrawer(null)}/></Drawer>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
