<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핏폼 - 피트니스 자세 교정 서비스</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#F0FDF4;color:#064E3B;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#D1FAE5;}::-webkit-scrollbar-thumb{background:#34D399;border-radius:3px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.skeleton{background:linear-gradient(90deg,#D1FAE5 25%,#ECFDF5 50%,#D1FAE5 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const {BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,CartesianGrid,RadarChart,Radar,PolarGrid,PolarAngleAxis,PolarRadiusAxis,Legend}=Recharts;

const C={primary:'#059669',secondary:'#064E3B',accent:'#34D399',bg:'#F0FDF4',surface:'#FFFFFF',text:'#064E3B',textSec:'#6B7280',border:'#E5E7EB',success:'#059669',warning:'#D97706',danger:'#DC2626'};

const exercises=['스쿼트','데드리프트','숄더프레스','플랭크','런지','풀업'];
const analysisResult={shoulder:{label:'어깨 정렬',score:85,status:'양호'},spine:{label:'척추 중립',score:62,status:'주의'},hip:{label:'골반 수평',score:78,status:'양호'},knee:{label:'무릎 정렬',score:55,status:'교정필요'},ankle:{label:'발목 안정',score:90,status:'양호'}};
const overlayJoints=[{x:40,y:12,r:7,c:'#059669'},{x:40,y:35,r:5,c:'#059669'},{x:20,y:55,r:5,c:'#059669'},{x:60,y:55,r:5,c:'#D97706'},{x:40,y:70,r:5,c:'#059669'},{x:28,y:110,r:5,c:'#DC2626'},{x:52,y:110,r:5,c:'#DC2626'},{x:28,y:145,r:4,c:'#059669'},{x:52,y:145,r:4,c:'#059669'}];
const overlayLines=[[0,1],[1,2],[1,3],[1,4],[4,5],[4,6],[5,7],[6,8]];

const repData=[{set:1,reps:12,accuracy:85},{set:2,reps:10,accuracy:78},{set:3,reps:8,accuracy:65}];
const bodyRadar=[{area:'어깨',score:85},{area:'척추',score:62},{area:'골반',score:78},{area:'무릎',score:55},{area:'발목',score:90},{area:'코어',score:72}];

const feedbackItems=[
  {time:'00:08',joint:'무릎',issue:'하강 시 무릎이 발끝보다 앞으로 나감',severity:'교정필요',tip:'발끝 방향으로 무릎이 향하도록 의식하세요'},
  {time:'00:22',joint:'척추',issue:'상체 과전굴 — 허리 굽어짐 감지',severity:'주의',tip:'시선을 전방 45도로 유지하고 흉추를 펴세요'},
  {time:'00:35',joint:'골반',issue:'최저점에서 골반 후방경사 (버트윙크)',severity:'주의',tip:'하강 깊이를 줄이고 고관절 가동성 스트레칭을 추가하세요'},
  {time:'00:48',joint:'무릎',issue:'3세트 피로 — 내반슬 패턴 심화',severity:'교정필요',tip:'무게를 줄이거나 세트 간 휴식을 늘려주세요'}
];

const sessionHistory=[
  {date:'2025-07-20',exercise:'스쿼트',accuracy:79,reps:30,feedback:4},
  {date:'2025-07-18',exercise:'데드리프트',accuracy:84,reps:24,feedback:2},
  {date:'2025-07-15',exercise:'숄더프레스',accuracy:88,reps:30,feedback:1},
  {date:'2025-07-12',exercise:'런지',accuracy:72,reps:36,feedback:5}
];

// ── Components ──
function Skeleton(){return(<div style={{padding:32}}><div className="skeleton" style={{width:'100%',height:260,marginBottom:24}}/><div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>{[1,2,3].map(i=><div key={i} className="skeleton" style={{height:200}}/>)}</div></div>);}

function Drawer({open,onClose,title,children}){
  if(!open)return null;
  return(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.3)',zIndex:1000}}>
    <div onClick={e=>e.stopPropagation()} style={{position:'absolute',right:0,top:0,bottom:0,width:460,background:C.surface,boxShadow:'-8px 0 30px rgba(0,0,0,0.1)',animation:'fadeIn .2s',overflow:'auto'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:C.surface,zIndex:1}}>
        <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSec}}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>);
}

function Badge({text}){
  const colors={양호:{bg:'#D1FAE5',t:'#065F46'},주의:{bg:'#FEF3C7',t:'#92400E'},교정필요:{bg:'#FEE2E2',t:'#991B1B'}};
  const c=colors[text]||{bg:'#F3F4F6',t:'#374151'};
  return <span style={{padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.t}}>{text}</span>;
}

function AccuracyRing({value,size=80}){
  const r=size/2-6;const circ=2*Math.PI*r;const offset=circ*(1-value/100);
  const color=value>=80?C.success:value>=60?C.warning:C.danger;
  return(<svg width={size} height={size}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E7EB" strokeWidth="6"/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="6" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}/><text x={size/2} y={size/2+5} textAnchor="middle" fontSize="18" fontWeight="800" fill={color}>{value}%</text></svg>);
}

function ScoreBar({label,score,status}){
  const color=score>=80?C.success:score>=60?C.warning:C.danger;
  return(<div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
    <span style={{fontSize:13,fontWeight:600,width:80}}>{label}</span>
    <div style={{flex:1,height:8,background:'#E5E7EB',borderRadius:4,overflow:'hidden'}}><div style={{height:'100%',width:`${score}%`,background:color,borderRadius:4,transition:'width .5s'}}/></div>
    <span style={{fontSize:14,fontWeight:700,color,width:40,textAlign:'right'}}>{score}</span>
    <Badge text={status}/>
  </div>);
}

// ── Pages ──
function UploadPage({setPage,setDrawer}){
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{background:`linear-gradient(135deg, ${C.secondary} 0%, ${C.primary} 100%)`,borderRadius:24,padding:'56px 64px',marginBottom:32,position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:-30,right:-30,width:200,height:200,background:'rgba(52,211,153,0.1)',borderRadius:'50%'}}/>
      <div style={{position:'relative',zIndex:1}}>
        <div style={{fontSize:14,color:C.accent,fontWeight:600,marginBottom:8}}>AI 자세 분석</div>
        <h1 style={{fontSize:36,fontWeight:800,color:'#fff',lineHeight:1.3,marginBottom:14}}>사진 한 장으로<br/>자세 교정 포인트를 잡아냅니다</h1>
        <p style={{fontSize:16,color:'rgba(255,255,255,0.7)',marginBottom:28,lineHeight:1.6}}>관절 포인트를 자동 감지하고 정상 범위 이탈을<br/>실시간으로 피드백합니다</p>
        <button onClick={()=>setPage('overlay')} style={{padding:'14px 32px',borderRadius:14,border:'none',background:'#fff',color:C.primary,fontSize:15,fontWeight:700,cursor:'pointer'}}>분석 시작하기 →</button>
      </div>
    </div>
    <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>지원 종목</h2>
    <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:12,marginBottom:32}}>
      {exercises.map(ex=><div key={ex} style={{background:C.surface,borderRadius:14,padding:20,textAlign:'center',boxShadow:'0 2px 8px rgba(0,0,0,0.04)',cursor:'pointer',transition:'all .2s'}} onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'} onMouseLeave={e=>e.currentTarget.style.transform='none'}>
        <div style={{fontSize:28,marginBottom:8}}>🏋️</div>
        <div style={{fontSize:14,fontWeight:700}}>{ex}</div>
      </div>)}
    </div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <h2 style={{fontSize:20,fontWeight:700}}>최근 분석</h2>
      <button onClick={()=>setPage('feedback')} style={{background:'none',border:'none',color:C.primary,fontSize:14,fontWeight:600,cursor:'pointer'}}>전체보기 →</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
      {sessionHistory.map((s,i)=><div key={i} onClick={()=>setDrawer({type:'session',data:s})} style={{background:C.surface,borderRadius:14,padding:18,boxShadow:'0 2px 8px rgba(0,0,0,0.04)',cursor:'pointer',transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'} onMouseLeave={e=>e.currentTarget.style.transform='none'}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <span style={{fontSize:14,fontWeight:700}}>{s.exercise}</span>
          <AccuracyRing value={s.accuracy} size={42}/>
        </div>
        <div style={{fontSize:12,color:C.textSec}}>{s.date} · {s.reps}회 · 피드백 {s.feedback}건</div>
      </div>)}
    </div>
  </div>);
}

function OverlayPage({setDrawer}){
  const [uploaded,setUploaded]=useState(false);
  const [analyzed,setAnalyzed]=useState(false);
  useEffect(()=>{if(uploaded){const t=setTimeout(()=>setAnalyzed(true),2000);return()=>clearTimeout(t);}},[uploaded]);
  return(<div style={{animation:'fadeIn .4s'}}>
    <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>자세 분석</h2>
    <p style={{color:C.textSec,fontSize:14,marginBottom:24}}>사진을 업로드하면 관절 포인트를 자동 감지합니다</p>
    {!uploaded?<div onClick={()=>setUploaded(true)} style={{background:C.surface,border:`2px dashed ${C.border}`,borderRadius:20,padding:'64px 32px',textAlign:'center',cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.primary} onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
      <div style={{fontSize:56,marginBottom:16}}>📸</div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>운동 사진을 업로드하세요</div>
      <div style={{fontSize:14,color:C.textSec}}>JPG, PNG (정면 촬영 권장)</div>
    </div>
    :!analyzed?<div style={{background:C.surface,borderRadius:20,padding:48,textAlign:'center',boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
      <div style={{fontSize:48,animation:'pulse 1.5s infinite',marginBottom:16}}>🔍</div>
      <div style={{fontSize:18,fontWeight:700}}>관절 포인트 감지 중...</div>
      <div style={{fontSize:13,color:C.textSec,marginTop:8}}>인체 관절 좌표 추출 및 각도 계산</div>
    </div>
    :<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>관절 오버레이</h3>
        <div style={{height:320,background:'#F1F5F9',borderRadius:12,position:'relative',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
          <div style={{fontSize:64,opacity:0.3}}>🧍</div>
          <svg width="80" height="160" viewBox="0 0 80 160" style={{position:'absolute'}}>
            {overlayLines.map(([a,b],i)=><line key={i} x1={overlayJoints[a].x} y1={overlayJoints[a].y} x2={overlayJoints[b].x} y2={overlayJoints[b].y} stroke="#059669" strokeWidth="2" opacity="0.6"/>)}
            {overlayJoints.map((j,i)=><circle key={i} cx={j.x} cy={j.y} r={j.r} fill={j.c} opacity="0.8"/>)}
          </svg>
          <div style={{position:'absolute',bottom:8,left:8,right:8,display:'flex',gap:8}}>
            {[['양호','#059669'],['주의','#D97706'],['교정필요','#DC2626']].map(([l,c])=><div key={l} style={{display:'flex',alignItems:'center',gap:4,fontSize:10}}><div style={{width:8,height:8,borderRadius:'50%',background:c}}/>{l}</div>)}
          </div>
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>부위별 평가</h3>
        {Object.values(analysisResult).map(a=><ScoreBar key={a.label} label={a.label} score={a.score} status={a.status}/>)}
        <div style={{marginTop:20}}>
          <ResponsiveContainer width="100%" height={200}>
            <RadarChart data={bodyRadar}><PolarGrid stroke="#E5E7EB"/><PolarAngleAxis dataKey="area" tick={{fontSize:11}}/><PolarRadiusAxis tick={{fontSize:10}} domain={[0,100]}/><Radar name="점수" dataKey="score" stroke={C.primary} fill={C.primary} fillOpacity={0.2}/></RadarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>}
  </div>);
}

function RepCountPage({setDrawer}){
  return(<div style={{animation:'fadeIn .4s'}}>
    <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>반복 집계</h2>
    <p style={{color:C.textSec,fontSize:14,marginBottom:24}}>세트별 반복 횟수와 자세 정확도를 자동 집계합니다</p>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:24}}>
      {repData.map(s=><div key={s.set} onClick={()=>setDrawer({type:'set',data:s})} style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)',cursor:'pointer',transition:'all .2s'}} onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'} onMouseLeave={e=>e.currentTarget.style.transform='none'}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontSize:18,fontWeight:800}}>세트 {s.set}</span>
          <AccuracyRing value={s.accuracy} size={56}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div style={{background:'#F9FAFB',borderRadius:8,padding:10,textAlign:'center'}}><div style={{fontSize:11,color:C.textSec}}>반복</div><div style={{fontSize:22,fontWeight:700,color:C.primary}}>{s.reps}회</div></div>
          <div style={{background:'#F9FAFB',borderRadius:8,padding:10,textAlign:'center'}}><div style={{fontSize:11,color:C.textSec}}>정확도</div><div style={{fontSize:22,fontWeight:700,color:s.accuracy>=80?C.success:C.warning}}>{s.accuracy}%</div></div>
        </div>
      </div>)}
    </div>
    <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>세트별 정확도 추이</h3>
      <ResponsiveContainer width="100%" height={200}>
        <BarChart data={repData}><CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/><XAxis dataKey="set" tick={{fontSize:12}} tickFormatter={v=>`세트 ${v}`}/><YAxis tick={{fontSize:12}} domain={[0,100]}/><Tooltip/><Bar dataKey="accuracy" fill={C.primary} radius={[8,8,0,0]} name="정확도(%)"/></BarChart>
      </ResponsiveContainer>
    </div>
  </div>);
}

function FeedbackPage({setDrawer}){
  return(<div style={{animation:'fadeIn .4s'}}>
    <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>코치 피드백</h2>
    <p style={{color:C.textSec,fontSize:14,marginBottom:24}}>자세 교정 포인트와 개선 가이드</p>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
      <div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>감지된 교정 포인트</h3>
          {feedbackItems.map((f,i)=><div key={i} onClick={()=>setDrawer({type:'feedback-detail',data:f})} style={{padding:'14px 0',borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background='#F9FAFB'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:13,fontWeight:600}}>{f.time} · {f.joint}</span>
              <Badge text={f.severity}/>
            </div>
            <div style={{fontSize:12,color:C.textSec}}>{f.issue}</div>
            <div style={{fontSize:11,color:C.primary,marginTop:4}}>💡 {f.tip}</div>
          </div>)}
        </div>
      </div>
      <div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)',marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>Before / After 비교</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div style={{background:'#FEE2E2',borderRadius:10,padding:20,textAlign:'center'}}><div style={{fontSize:36}}>🧍</div><div style={{fontSize:12,fontWeight:600,marginTop:8,color:C.danger}}>교정 전</div><div style={{fontSize:11,color:C.textSec}}>무릎 내전 + 골반 후경사</div></div>
            <div style={{background:'#D1FAE5',borderRadius:10,padding:20,textAlign:'center'}}><div style={{fontSize:36}}>🧍</div><div style={{fontSize:12,fontWeight:600,marginTop:8,color:C.success}}>교정 후</div><div style={{fontSize:11,color:C.textSec}}>무릎 정렬 + 골반 중립</div></div>
          </div>
        </div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 10px rgba(0,0,0,0.04)'}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>분석 이력</h3>
          {sessionHistory.map((s,i)=><div key={i} onClick={()=>setDrawer({type:'session',data:s})} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`,cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.background='#F9FAFB'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div><div style={{fontSize:13,fontWeight:600}}>{s.exercise}</div><div style={{fontSize:11,color:C.textSec}}>{s.date} · 피드백 {s.feedback}건</div></div>
            <span style={{fontSize:14,fontWeight:700,color:s.accuracy>=80?C.success:C.warning}}>{s.accuracy}%</span>
          </div>)}
        </div>
      </div>
    </div>
  </div>);
}

// ── Drawer Content ──
function DrawerContent({drawer,onClose}){
  if(!drawer)return null;
  const d=drawer.data;
  switch(drawer.type){
    case 'feedback-detail':return(<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><span style={{fontSize:16,fontWeight:700}}>{d.time} · {d.joint}</span><Badge text={d.severity}/></div>
      <div style={{background:'#F9FAFB',borderRadius:10,padding:16,marginBottom:16}}><div style={{fontSize:14,fontWeight:600,marginBottom:8}}>{d.issue}</div><div style={{fontSize:13,color:C.primary}}>💡 {d.tip}</div></div>
      <label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>코치 코멘트</label>
      <textarea rows={3} placeholder="추가 피드백 작성..." style={{width:'100%',padding:10,border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:'Pretendard',resize:'vertical',marginBottom:12}}/>
      <button onClick={onClose} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>저장</button>
    </div>);
    case 'set':return(<div>
      <h4 style={{fontSize:18,fontWeight:700,marginBottom:16}}>세트 {d.set} 상세</h4>
      <div style={{textAlign:'center',marginBottom:16}}><AccuracyRing value={d.accuracy}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        {[['반복',`${d.reps}회`],['정확도',`${d.accuracy}%`]].map(([k,v])=><div key={k} style={{background:'#F9FAFB',borderRadius:8,padding:12,textAlign:'center'}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:18,fontWeight:700,marginTop:4}}>{v}</div></div>)}
      </div>
      <button onClick={onClose} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>닫기</button>
    </div>);
    case 'session':return(<div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        {[['종목',d.exercise],['날짜',d.date],['총 반복',`${d.reps}회`],['정확도',`${d.accuracy}%`],['피드백',`${d.feedback}건`]].map(([k,v])=><div key={k} style={{background:'#F9FAFB',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{v}</div></div>)}
      </div>
      <button onClick={onClose} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>닫기</button>
    </div>);
    default:return null;
  }
}

// ── App ──
function App(){
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState('upload');
  const [drawer,setDrawer]=useState(null);
  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading)return <Skeleton/>;

  const tabs=[
    {key:'upload',label:'자세 분석'},{key:'overlay',label:'오버레이 결과'},
    {key:'reps',label:'반복 집계'},{key:'feedback',label:'코치 피드백'}
  ];
  const drawerTitles={'feedback-detail':'교정 상세',set:'세트 상세',session:'분석 이력'};

  return(<div style={{minHeight:'100vh',background:C.bg}}>
    <header style={{background:C.surface,borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:100}}>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'0 32px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',height:64}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:24}}>🏋️</span><span style={{fontSize:20,fontWeight:800,color:C.secondary}}>핏폼</span></div>
          <div style={{display:'flex',gap:12,alignItems:'center'}}>
            <input placeholder="회원 검색..." style={{padding:'8px 14px',border:`1px solid ${C.border}`,borderRadius:10,fontSize:13,width:200,outline:'none',fontFamily:'Pretendard'}}/>
            <button style={{background:'none',border:'none',fontSize:18,cursor:'pointer'}}>🔔</button>
          </div>
        </div>
        <div style={{display:'flex'}}>
          {tabs.map(t=><button key={t.key} onClick={()=>setPage(t.key)} style={{padding:'12px 20px',border:'none',borderBottom:page===t.key?`3px solid ${C.primary}`:'3px solid transparent',background:'transparent',color:page===t.key?C.primary:C.textSec,fontSize:14,fontWeight:page===t.key?700:500,cursor:'pointer',transition:'all .15s'}}>{t.label}</button>)}
        </div>
      </div>
    </header>
    <main style={{maxWidth:1280,margin:'0 auto',padding:'32px 32px'}}>
      {page==='upload'&&<UploadPage setPage={setPage} setDrawer={setDrawer}/>}
      {page==='overlay'&&<OverlayPage setDrawer={setDrawer}/>}
      {page==='reps'&&<RepCountPage setDrawer={setDrawer}/>}
      {page==='feedback'&&<FeedbackPage setDrawer={setDrawer}/>}
    </main>
    <Drawer open={!!drawer} onClose={()=>setDrawer(null)} title={drawer?drawerTitles[drawer.type]||'상세':''}><DrawerContent drawer={drawer} onClose={()=>setDrawer(null)}/></Drawer>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
