<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>헬스트래커 - 건강검진 결과 관리</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#FAF5FF;color:#1E1B4B;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#EDE9FE;}::-webkit-scrollbar-thumb{background:#A78BFA;border-radius:3px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,#EDE9FE 25%,#F5F3FF 50%,#EDE9FE 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useReducer}=React;
const {BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,RadarChart,Radar,PolarGrid,PolarAngleAxis,PolarRadiusAxis,PieChart,Pie,Cell,LineChart,Line,CartesianGrid,Legend}=Recharts;

const C={primary:'#7C3AED',secondary:'#1E1B4B',accent:'#A78BFA',bg:'#FAF5FF',surface:'#FFFFFF',text:'#1E1B4B',textSec:'#6D28D9',border:'#E5E7EB',success:'#059669',warning:'#D97706',danger:'#DC2626',sidebarBg:'#F5F3FF',sidebarHover:'#EDE9FE',sidebarActive:'#7C3AED'};

// ── Data ──
const examCategories=[
  {name:'혈액검사',items:[{name:'혈당(공복)',value:105,unit:'mg/dL',ref:'70~100',status:'주의'},{name:'총콜레스테롤',value:195,unit:'mg/dL',ref:'~200',status:'정상'},{name:'HDL',value:52,unit:'mg/dL',ref:'40~',status:'정상'},{name:'LDL',value:128,unit:'mg/dL',ref:'~130',status:'정상'},{name:'중성지방',value:165,unit:'mg/dL',ref:'~150',status:'주의'},{name:'헤모글로빈',value:14.2,unit:'g/dL',ref:'13~17',status:'정상'}]},
  {name:'간기능',items:[{name:'AST(GOT)',value:28,unit:'U/L',ref:'~40',status:'정상'},{name:'ALT(GPT)',value:35,unit:'U/L',ref:'~40',status:'정상'},{name:'감마GTP',value:55,unit:'U/L',ref:'~50',status:'주의'},{name:'ALP',value:72,unit:'U/L',ref:'30~120',status:'정상'}]},
  {name:'신장기능',items:[{name:'크레아티닌',value:1.0,unit:'mg/dL',ref:'0.7~1.2',status:'정상'},{name:'BUN',value:18,unit:'mg/dL',ref:'8~23',status:'정상'},{name:'eGFR',value:92,unit:'mL/min',ref:'60~',status:'정상'}]},
  {name:'체성분',items:[{name:'체중',value:72.5,unit:'kg',ref:'-',status:'정상'},{name:'BMI',value:24.8,unit:'',ref:'18.5~25',status:'정상'},{name:'체지방률',value:26.5,unit:'%',ref:'10~20',status:'주의'},{name:'근육량',value:32.1,unit:'kg',ref:'-',status:'정상'}]}
];

const gradeRanges=[{min:0,max:2,grade:'정상',color:C.success},{min:3,max:5,grade:'주의',color:C.warning},{min:6,max:99,grade:'관리필요',color:C.danger}];

const patients=[
  {id:1,name:'김민수',age:52,exams:6,lastExam:'2025-01-15',abnormal:3,grade:'주의'},
  {id:2,name:'이서연',age:38,exams:4,lastExam:'2025-01-10',abnormal:1,grade:'정상'},
  {id:3,name:'박지훈',age:61,exams:8,lastExam:'2025-01-18',abnormal:6,grade:'관리필요'},
  {id:4,name:'최예린',age:45,exams:5,lastExam:'2025-01-12',abnormal:2,grade:'정상'},
  {id:5,name:'정우성',age:55,exams:7,lastExam:'2025-01-20',abnormal:4,grade:'주의'}
];

const trendData=[
  {date:'2024-01',glucose:98,cholesterol:180,bmi:23.5},{date:'2024-07',glucose:102,cholesterol:188,bmi:24.1},
  {date:'2025-01',glucose:105,cholesterol:195,bmi:24.8}
];

const radarData=[{area:'혈액',score:78},{area:'간기능',score:82},{area:'신장',score:95},{area:'체성분',score:70},{area:'혈압',score:88},{area:'비타민',score:65}];
const gradeDist=[{name:'정상',value:42},{name:'주의',value:35},{name:'관리필요',value:23}];
const pieColors=['#059669','#D97706','#DC2626'];

const masterItems=[
  {id:1,category:'혈액검사',name:'혈당(공복)',unit:'mg/dL',refLow:70,refHigh:100,status:'활성'},
  {id:2,category:'혈액검사',name:'총콜레스테롤',unit:'mg/dL',refLow:0,refHigh:200,status:'활성'},
  {id:3,category:'간기능',name:'AST(GOT)',unit:'U/L',refLow:0,refHigh:40,status:'활성'},
  {id:4,category:'간기능',name:'ALT(GPT)',unit:'U/L',refLow:0,refHigh:40,status:'활성'},
  {id:5,category:'신장기능',name:'크레아티닌',unit:'mg/dL',refLow:0.7,refHigh:1.2,status:'활성'},
  {id:6,category:'체성분',name:'BMI',unit:'',refLow:18.5,refHigh:25,status:'활성'}
];

// ── Components ──
function Skeleton(){return(<div style={{display:'flex',minHeight:'100vh'}}><div style={{width:240,background:C.sidebarBg}}/><div style={{flex:1,padding:28}}><div className="skeleton" style={{width:'50%',height:24,marginBottom:16}}/><div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>{[1,2,3,4].map(i=><div key={i} className="skeleton" style={{height:90}}/>)}</div></div></div>);}

function Badge({text}){
  const colors={정상:{bg:'#D1FAE5',t:'#065F46'},주의:{bg:'#FEF3C7',t:'#92400E'},관리필요:{bg:'#FEE2E2',t:'#991B1B'},활성:{bg:'#D1FAE5',t:'#065F46'}};
  const c=colors[text]||{bg:'#F3F4F6',t:'#374151'};
  return <span style={{padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.t}}>{text}</span>;
}

function GaugeChart({abnormal,total=20,size=80}){
  const pct=abnormal/total;const color=pct<0.15?C.success:pct<0.3?C.warning:C.danger;
  const r=size/2-6;const circ=2*Math.PI*r;const offset=circ*(1-pct);
  return(<svg width={size} height={size}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E7EB" strokeWidth="6"/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="6" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}/><text x={size/2} y={size/2+5} textAnchor="middle" fontSize="16" fontWeight="800" fill={color}>{abnormal}</text></svg>);
}

function KPICard({icon,label,value,sub}){
  return(<div style={{background:C.surface,borderRadius:12,padding:'18px 20px',border:`1px solid ${C.border}`,display:'flex',gap:12,alignItems:'center',animation:'fadeIn .4s'}}>
    <div style={{width:42,height:42,borderRadius:10,background:`${C.primary}12`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{icon}</div>
    <div><div style={{fontSize:12,color:C.textSec}}>{label}</div><div style={{fontSize:20,fontWeight:700}}>{value}</div>{sub&&<div style={{fontSize:11,color:C.textSec}}>{sub}</div>}</div>
  </div>);
}

// ── Pages ──
function ExamInputPage({setSelected}){
  const [activeTab,setActiveTab]=useState(0);
  const [scores,setScores]=useState({});
  const cat=examCategories[activeTab];
  const abnormalCount=Object.entries(scores).filter(([k,v])=>v==='주의'||v==='관리필요').length + examCategories.flatMap(c=>c.items).filter(i=>i.status!=='정상').length;
  const grade=abnormalCount<=2?'정상':abnormalCount<=5?'주의':'관리필요';
  const gradeColor=grade==='정상'?C.success:grade==='주의'?C.warning:C.danger;
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}><h2 style={{fontSize:22,fontWeight:700}}>검진 결과 입력</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>항목별 수치를 입력하면 정상 범위 이탈을 자동 판정합니다</p></div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:24}}>
      <div>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {examCategories.map((c,i)=><button key={i} onClick={()=>setActiveTab(i)} style={{padding:'10px 20px',borderRadius:10,border:activeTab===i?'none':`1px solid ${C.border}`,background:activeTab===i?C.primary:'transparent',color:activeTab===i?'#fff':C.text,fontSize:13,fontWeight:600,cursor:'pointer'}}>{c.name} ({c.items.length})</button>)}
        </div>
        <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{background:'#FAFAFE',borderBottom:`2px solid ${C.border}`}}>
              {['항목','수치','단위','참고치','판정'].map(h=><th key={h} style={{padding:'12px 14px',textAlign:'left',fontSize:12,fontWeight:600,color:C.textSec}}>{h}</th>)}
            </tr></thead>
            <tbody>{cat.items.map((item,i)=><tr key={i} onClick={()=>setSelected({type:'item-detail',data:item})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background='#FAFAFE'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <td style={{padding:'14px',fontSize:14,fontWeight:600}}>{item.name}</td>
              <td style={{padding:'14px',fontSize:14,fontWeight:700,color:item.status!=='정상'?C.danger:C.text}}>{item.value}</td>
              <td style={{padding:'14px',fontSize:13,color:C.textSec}}>{item.unit}</td>
              <td style={{padding:'14px',fontSize:13,color:C.textSec}}>{item.ref}</td>
              <td style={{padding:'14px'}}><Badge text={item.status}/></td>
            </tr>)}</tbody>
          </table>
        </div>
      </div>
      <div style={{position:'sticky',top:80,alignSelf:'start'}}>
        <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`,marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:12,textAlign:'center'}}>종합 판정</h3>
          <div style={{textAlign:'center',marginBottom:12}}><GaugeChart abnormal={abnormalCount}/><div style={{fontSize:12,color:C.textSec,marginTop:4}}>이상 항목 {abnormalCount}개</div></div>
          <div style={{textAlign:'center',marginBottom:16}}><span style={{padding:'6px 16px',borderRadius:20,fontSize:14,fontWeight:700,background:`${gradeColor}14`,color:gradeColor}}>{grade}</span></div>
          {examCategories.map((c,i)=>{
            const catAbnormal=c.items.filter(it=>it.status!=='정상').length;
            return(<div key={i} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',fontSize:12}}><span style={{color:C.textSec}}>{c.name}</span><span style={{fontWeight:600,color:catAbnormal>0?C.warning:C.success}}>{catAbnormal>0?`이상 ${catAbnormal}건`:'정상'}</span></div>);
          })}
          <button onClick={()=>setSelected({type:'save-exam'})} style={{width:'100%',marginTop:16,padding:'12px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>결과 저장</button>
        </div>
      </div>
    </div>
  </div>);
}

function DashboardPage({setSelected}){
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}><h2 style={{fontSize:22,fontWeight:700}}>결과 대시보드</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>검진 결과 종합 현황과 등급 분포</p></div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:24}}>
      <KPICard icon="👥" label="전체 수검자" value={`${patients.length}명`}/>
      <KPICard icon="📋" label="이번 달 검진" value="32건"/>
      <KPICard icon="⚠️" label="이상 소견" value="8명" sub="주의 5 · 관리필요 3"/>
      <KPICard icon="📄" label="리포트 발급" value="28건"/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:24}}>
      <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>영역별 이상 소견 분포</h3>
        <ResponsiveContainer width="100%" height={220}>
          <RadarChart data={radarData}><PolarGrid stroke="#E5E7EB"/><PolarAngleAxis dataKey="area" tick={{fontSize:11}}/><PolarRadiusAxis tick={{fontSize:10}} domain={[0,100]}/><Radar name="정상 비율" dataKey="score" stroke={C.primary} fill={C.primary} fillOpacity={0.2}/></RadarChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>등급 분포</h3>
        <ResponsiveContainer width="100%" height={220}>
          <PieChart><Pie data={gradeDist} cx="50%" cy="50%" innerRadius={45} outerRadius={75} dataKey="value" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`}>{gradeDist.map((_,i)=><Cell key={i} fill={pieColors[i]}/>)}</Pie><Tooltip/></PieChart>
        </ResponsiveContainer>
      </div>
    </div>
    <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>수검자 목록</h3>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>{['이름','나이','검진수','최근검진','이상항목','등급'].map(h=><th key={h} style={{padding:'10px 12px',textAlign:'left',fontSize:12,fontWeight:600,color:C.textSec}}>{h}</th>)}</tr></thead>
        <tbody>{patients.map(p=><tr key={p.id} onClick={()=>setSelected({type:'patient-detail',data:p})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background='#FAFAFE'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <td style={{padding:'12px',fontSize:14,fontWeight:600}}>{p.name}</td>
          <td style={{padding:'12px',fontSize:13}}>{p.age}세</td>
          <td style={{padding:'12px',fontSize:13}}>{p.exams}회</td>
          <td style={{padding:'12px',fontSize:13,color:C.textSec}}>{p.lastExam}</td>
          <td style={{padding:'12px',fontSize:14,fontWeight:700,color:p.abnormal>=6?C.danger:p.abnormal>=3?C.warning:C.success}}>{p.abnormal}개</td>
          <td style={{padding:'12px'}}><Badge text={p.grade}/></td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>);
}

function TrendPage({setSelected}){
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:24}}><h2 style={{fontSize:22,fontWeight:700}}>건강 트렌드</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>주요 수치의 시계열 변화를 추적합니다</p></div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
      <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>혈당 · 콜레스테롤 추이</h3>
        <ResponsiveContainer width="100%" height={240}>
          <LineChart data={trendData}><CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/><XAxis dataKey="date" tick={{fontSize:11}}/><YAxis tick={{fontSize:11}}/><Tooltip/><Legend/>
            <Line type="monotone" dataKey="glucose" stroke={C.primary} strokeWidth={2} name="혈당" dot={{r:5}}/>
            <Line type="monotone" dataKey="cholesterol" stroke={C.accent} strokeWidth={2} name="콜레스테롤" dot={{r:5}}/>
          </LineChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>BMI 추이</h3>
        <ResponsiveContainer width="100%" height={240}>
          <BarChart data={trendData}><CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB"/><XAxis dataKey="date" tick={{fontSize:11}}/><YAxis tick={{fontSize:11}} domain={[20,30]}/><Tooltip/><Bar dataKey="bmi" fill={C.primary} radius={[8,8,0,0]} name="BMI"/></BarChart>
        </ResponsiveContainer>
      </div>
    </div>
    <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>검진별 이상 항목 변화</h3>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>{['검진일','혈당','콜레스테롤','BMI','이상 항목','등급'].map(h=><th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:12,fontWeight:600,color:C.textSec}}>{h}</th>)}</tr></thead>
        <tbody>{trendData.map((t,i)=><tr key={i} onClick={()=>setSelected({type:'trend-detail',data:t})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background='#FAFAFE'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <td style={{padding:'14px',fontSize:13,fontWeight:600}}>{t.date}</td>
          <td style={{padding:'14px',fontSize:13,color:t.glucose>100?C.warning:C.success,fontWeight:600}}>{t.glucose}</td>
          <td style={{padding:'14px',fontSize:13,color:t.cholesterol>200?C.warning:C.success,fontWeight:600}}>{t.cholesterol}</td>
          <td style={{padding:'14px',fontSize:13,fontWeight:600}}>{t.bmi}</td>
          <td style={{padding:'14px',fontSize:13}}>{t.glucose>100?1:0}개</td>
          <td style={{padding:'14px'}}><Badge text={t.glucose>100?'주의':'정상'}/></td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>);
}

function ItemMasterPage({setSelected}){
  return(<div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <div><h2 style={{fontSize:22,fontWeight:700}}>항목 관리</h2><p style={{color:C.textSec,fontSize:14,marginTop:4}}>검진 항목과 정상 범위를 관리합니다</p></div>
      <button onClick={()=>setSelected({type:'add-item'})} style={{padding:'10px 20px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 항목 추가</button>
    </div>
    <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{background:'#FAFAFE',borderBottom:`2px solid ${C.border}`}}>
          {['카테고리','항목명','단위','하한','상한','상태',''].map(h=><th key={h} style={{padding:'12px 14px',textAlign:'left',fontSize:12,fontWeight:600,color:C.textSec}}>{h}</th>)}
        </tr></thead>
        <tbody>{masterItems.map(m=><tr key={m.id} onClick={()=>setSelected({type:'edit-item',data:m})} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background='#FAFAFE'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <td style={{padding:'14px',fontSize:13}}>{m.category}</td>
          <td style={{padding:'14px',fontSize:14,fontWeight:600}}>{m.name}</td>
          <td style={{padding:'14px',fontSize:13}}>{m.unit}</td>
          <td style={{padding:'14px',fontSize:13}}>{m.refLow}</td>
          <td style={{padding:'14px',fontSize:13}}>{m.refHigh}</td>
          <td style={{padding:'14px'}}><Badge text={m.status}/></td>
          <td style={{padding:'14px'}}><button onClick={e=>{e.stopPropagation();setSelected({type:'edit-item',data:m})}} style={{background:'none',border:'none',color:C.primary,fontSize:12,cursor:'pointer',fontWeight:600}}>편집</button></td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>);
}

// ── Detail Panel ──
function DetailPanel({selected,onClose}){
  if(!selected)return null;
  const d=selected.data;
  const titles={'item-detail':'항목 상세','patient-detail':'수검자 상세','trend-detail':'검진 상세','save-exam':'결과 저장','edit-item':'항목 편집','add-item':'항목 추가'};
  return(<div style={{width:400,borderLeft:`1px solid ${C.border}`,background:C.surface,overflow:'auto',animation:'fadeIn .2s',flexShrink:0}}>
    <div style={{padding:'18px 22px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:C.surface,zIndex:1}}>
      <h3 style={{fontSize:16,fontWeight:700}}>{titles[selected.type]||'상세'}</h3>
      <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:C.textSec}}>✕</button>
    </div>
    <div style={{padding:22}}>
      {selected.type==='item-detail'&&<div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontSize:18,fontWeight:700}}>{d.name}</span><Badge text={d.status}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          {[['수치',`${d.value} ${d.unit}`],['참고치',d.ref],['판정',d.status]].map(([k,v])=><div key={k} style={{background:'#FAFAFE',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{v}</div></div>)}
        </div>
        <div style={{background:d.status!=='정상'?`${C.warning}10`:`${C.success}10`,borderRadius:10,padding:14,fontSize:13}}>
          {d.status!=='정상'?`⚠️ ${d.name} 수치가 정상 범위(${d.ref})를 벗어났습니다. 추적 관찰이 필요합니다.`:`✅ ${d.name} 수치가 정상 범위 내입니다.`}
        </div>
        <button onClick={onClose} style={{width:'100%',marginTop:16,padding:'10px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>닫기</button>
      </div>}
      {selected.type==='patient-detail'&&<div>
        <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:16}}>
          <div style={{width:48,height:48,borderRadius:'50%',background:`${C.primary}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700,color:C.primary}}>{d.name[0]}</div>
          <div><div style={{fontSize:18,fontWeight:700}}>{d.name}</div><div style={{fontSize:12,color:C.textSec}}>{d.age}세</div></div>
          <Badge text={d.grade}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          {[['검진 횟수',`${d.exams}회`],['이상 항목',`${d.abnormal}개`],['최근 검진',d.lastExam],['등급',d.grade]].map(([k,v])=><div key={k} style={{background:'#FAFAFE',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{v}</div></div>)}
        </div>
        <label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>관리 코멘트</label>
        <textarea rows={3} placeholder="코멘트 입력..." style={{width:'100%',padding:10,border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:'Pretendard',resize:'vertical',marginBottom:12}}/>
        <button onClick={onClose} style={{width:'100%',padding:'10px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>닫기</button>
      </div>}
      {(selected.type==='edit-item'||selected.type==='add-item')&&<div>
        {[['카테고리',d?.category||''],['항목명',d?.name||''],['단위',d?.unit||''],['하한값',d?.refLow!=null?String(d.refLow):''],['상한값',d?.refHigh!=null?String(d.refHigh):'']].map(([label,val])=><div key={label} style={{marginBottom:14}}><label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>{label}</label><input defaultValue={val} placeholder={`${label} 입력`} style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none',fontFamily:'Pretendard'}}/></div>)}
        <div style={{display:'flex',gap:8,marginTop:8}}><button onClick={onClose} style={{flex:1,padding:'10px',borderRadius:8,border:`1px solid ${C.border}`,background:C.surface,fontSize:13,cursor:'pointer'}}>취소</button><button onClick={onClose} style={{flex:1,padding:'10px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>저장</button></div>
      </div>}
      {selected.type==='trend-detail'&&<div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          {[['검진일',d.date],['혈당',`${d.glucose} mg/dL`],['콜레스테롤',`${d.cholesterol} mg/dL`],['BMI',String(d.bmi)]].map(([k,v])=><div key={k} style={{background:'#FAFAFE',borderRadius:8,padding:10}}><div style={{fontSize:11,color:C.textSec}}>{k}</div><div style={{fontSize:14,fontWeight:600,marginTop:2}}>{v}</div></div>)}
        </div>
        <button onClick={onClose} style={{width:'100%',padding:'10px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>닫기</button>
      </div>}
      {selected.type==='save-exam'&&<div style={{textAlign:'center',padding:20}}>
        <div style={{fontSize:48,marginBottom:12}}>✅</div>
        <h4 style={{fontSize:18,fontWeight:700,marginBottom:8}}>검진 결과 저장 완료</h4>
        <p style={{fontSize:14,color:C.textSec,marginBottom:20}}>이상 항목 및 등급이 기록되었습니다.</p>
        <button onClick={onClose} style={{padding:'12px 32px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>확인</button>
      </div>}
    </div>
  </div>);
}

// ── App ──
function App(){
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState('exam');
  const [selected,setSelected]=useState(null);
  useEffect(()=>{setTimeout(()=>setLoading(false),1500)},[]);
  if(loading)return <Skeleton/>;

  const menus=[
    {key:'exam',icon:'📝',label:'검진 결과 입력'},
    {key:'dashboard',icon:'📊',label:'결과 대시보드'},
    {key:'trend',icon:'📈',label:'건강 트렌드'},
    {key:'master',icon:'⚙️',label:'항목 관리'}
  ];

  return(<div style={{display:'flex',minHeight:'100vh'}}>
    <aside style={{width:240,background:C.sidebarBg,flexShrink:0,display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,bottom:0,zIndex:100,borderRight:`1px solid ${C.border}`}}>
      <div style={{padding:'22px 18px',borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'#fff'}}>🩺</div>
          <div><div style={{fontSize:17,fontWeight:800}}>헬스트래커</div><div style={{fontSize:11,color:C.textSec}}>건강검진 결과 관리</div></div>
        </div>
      </div>
      <nav style={{flex:1,padding:'10px 8px'}}>
        {menus.map(m=><button key={m.key} onClick={()=>{setPage(m.key);setSelected(null)}} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'11px 12px',borderRadius:10,border:'none',background:page===m.key?`${C.primary}14`:'transparent',color:page===m.key?C.primary:C.textSec,fontSize:14,fontWeight:page===m.key?700:400,cursor:'pointer',marginBottom:2,transition:'all .15s',textAlign:'left'}} onMouseEnter={e=>{if(page!==m.key)e.currentTarget.style.background=C.sidebarHover}} onMouseLeave={e=>{if(page!==m.key)e.currentTarget.style.background='transparent'}}>
          <span style={{fontSize:16}}>{m.icon}</span>{m.label}
        </button>)}
      </nav>
      <div style={{padding:'14px 18px',borderTop:`1px solid ${C.border}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:10,background:`${C.primary}14`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:C.primary,fontWeight:600}}>관</div>
          <div><div style={{fontSize:12,fontWeight:500}}>관리자</div><div style={{fontSize:10,color:C.textSec}}>admin@healthtracker.kr</div></div>
        </div>
      </div>
    </aside>
    <div style={{display:'flex',flex:1,marginLeft:240}}>
      <main style={{flex:1,minWidth:0}}>
        <header style={{height:54,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 26px',position:'sticky',top:0,zIndex:50}}>
          <div style={{fontSize:15,fontWeight:700}}>{menus.find(m=>m.key===page)?.label}</div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <input placeholder="수검자 검색..." style={{padding:'7px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,width:200,outline:'none',fontFamily:'Pretendard'}}/>
            <button style={{background:'none',border:'none',fontSize:16,cursor:'pointer'}}>🔔</button>
          </div>
        </header>
        <div style={{padding:26}}>
          {page==='exam'&&<ExamInputPage setSelected={setSelected}/>}
          {page==='dashboard'&&<DashboardPage setSelected={setSelected}/>}
          {page==='trend'&&<TrendPage setSelected={setSelected}/>}
          {page==='master'&&<ItemMasterPage setSelected={setSelected}/>}
        </div>
      </main>
      {selected&&<DetailPanel selected={selected} onClose={()=>setSelected(null)}/>}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
