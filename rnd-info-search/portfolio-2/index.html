@keyframes fadeIn{from{opacity:0}to{opacity:1}}

function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primaryDark,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(109,40,217,0.3)',fontSize:14}}>{message}</div>;
}

function SearchContent({setDrawer,setToast}){
  const [filters,setFilters]=useState({keyword:'',company:'',atc:'',type:'',dateFrom:'',dateTo:''});
  const [results,setResults]=useState(DRUGS);

  const doSearch=()=>{
    let r=DRUGS;
    if(filters.keyword)r=r.filter(d=>d.name.includes(filters.keyword)||d.generic.includes(filters.keyword)||d.indication.includes(filters.keyword));
    if(filters.company)r=r.filter(d=>d.company.includes(filters.company));
    if(filters.type&&filters.type!=='전체')r=r.filter(d=>d.type===filters.type);
    setResults(r);
  };

  const inputStyle={padding:'9px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',outline:'none',width:'100%'};

          <button onClick={()=>{setFilters({keyword:'',company:'',atc:'',type:'',dateFrom:'',dateTo:''});setResults(DRUGS)}} style={{padding:'10px 20px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,color:C.textSub,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>초기화</button>
          <div style={{flex:1}}/>
          <button onClick={()=>setToast('Excel 다운로드를 시작합니다.')} style={{padding:'10px 16px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,fontSize:12,cursor:'pointer',fontFamily:'inherit',color:C.textSub}}>📥 Excel</button>
          <button onClick={()=>setToast('PDF 다운로드를 시작합니다.')} style={{padding:'10px 16px',borderRadius:10,border:`1px solid ${C.border}`,background:C.surface,fontSize:12,cursor:'pointer',fontFamily:'inherit',color:C.textSub}}>📄 PDF</button>
        </div>
      </div>

      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:-8}}>

        <span style={{fontSize:13,color:C.textSub}}>건</span>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {results.map((d,i)=>(
          <div key={d.id} onClick={()=>setDrawer(d)} style={{...C.card,background:C.surface,cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}} onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(109,40,217,0.15)'}} onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow=C.card.boxShadow}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
              <span style={{padding:'3px 10px',borderRadius:16,background:C.primaryLight,color:C.primary,fontSize:11,fontWeight:600}}>{d.atc}</span>
              <span style={{padding:'3px 10px',borderRadius:16,background:d.status==='허가'?'#ECFDF5':d.status==='안전성서한'?'#FEF2F2':'#FEF3C7',color:d.status==='허가'?C.success:d.status==='안전성서한'?C.danger:C.warning,fontSize:11,fontWeight:600}}>{d.status}</span>
            </div>
            <h4 style={{fontSize:14,fontWeight:600,marginBottom:4}}>{filters.keyword?<span dangerouslySetInnerHTML={{__html:d.name.replace(new RegExp(`(${filters.keyword})`,'gi'),'<mark style="background:#FEF9C3;padding:0 2px;border-radius:2px">$1</mark>')}}/>:d.name}</h4>
            <p style={{fontSize:12,color:C.textSub,marginBottom:6}}>{d.generic}</p>
            <p style={{fontSize:12,color:C.textLight}}>{d.indication}</p>
            <div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',fontSize:11,color:C.textLight}}>
              <span>{d.company}</span><span>{d.permitDate}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Classification ── */
function ClassificationContent({setDrawer}){
  const [expanded,setExpanded]=useState({});
  const [selectedAtc,setSelectedAtc]=useState(null);
  const toggleExpand=id=>setExpanded(p=>({...p,[id]:!p[id]}));
  const filteredDrugs=selectedAtc?DRUGS.filter(d=>d.atc.startsWith(selectedAtc)):DRUGS;

  return(
    <div style={{display:'grid',gridTemplateColumns:'360px 1fr',gap:20,height:'calc(100vh - 168px)'}}>
      <div style={{...C.card,background:C.surface,overflowY:'auto'}}>
        <h3 style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',color:C.textSub,marginBottom:16}}>ATC 분류 체계</h3>
        {ATC_TREE.map(a=>(
          <div key={a.id} style={{marginBottom:4}}>
            <button onClick={()=>{toggleExpand(a.id);setSelectedAtc(a.id)}} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px',borderRadius:12,border:'none',background:selectedAtc===a.id?C.primaryLight:'transparent',cursor:'pointer',fontFamily:'inherit',fontSize:14,fontWeight:selectedAtc===a.id?600:400,color:selectedAtc===a.id?C.primary:C.text,transition:'all 150ms'}}>
              <span><span style={{fontSize:16,marginRight:8}}>{expanded[a.id]?'▾':'▸'}</span><span style={{fontWeight:700,marginRight:6}}>[{a.id}]</span>{a.label}</span>
              <span style={{fontSize:11,background:C.bg,padding:'3px 10px',borderRadius:16,color:C.textLight}}>{a.children.reduce((s,c)=>s+c.count,0)}</span>
            </button>
            {expanded[a.id]&&<div style={{paddingLeft:28,animation:'slideDown 200ms ease'}}>
              {a.children.map(c=>(
                <button key={c.id} onClick={()=>setSelectedAtc(c.id)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 14px',borderRadius:8,border:'none',background:selectedAtc===c.id?C.primaryLight:'transparent',cursor:'pointer',fontFamily:'inherit',fontSize:13,color:selectedAtc===c.id?C.primary:C.textSub,fontWeight:selectedAtc===c.id?600:400,transition:'all 150ms'}}>
                  <span>[{c.id}] {c.label}</span><span style={{fontSize:11,color:C.textLight}}>{c.count}</span>
                </button>
              ))}
            </div>}
          </div>
        ))}
      </div>

      <div style={{...C.card,background:C.surface,overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3 style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',color:C.textSub}}>의약품 목록 — {selectedAtc||'전체'} <span style={{color:C.primary}}>{filteredDrugs.length}건</span></h3>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {filteredDrugs.map((d,i)=>(
            <div key={d.id} onClick={()=>setDrawer(d)} style={{padding:16,borderRadius:12,border:`1px solid ${C.border}`,cursor:'pointer',transition:'all 200ms',animation:`slideUp 300ms ease ${i*60}ms both`}} onMouseEnter={e=>{e.currentTarget.style.background=C.primaryLight;e.currentTarget.style.borderColor=C.primary}} onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderColor=C.border}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <h4 style={{fontSize:14,fontWeight:600}}>{d.name}</h4>
                  <p style={{fontSize:12,color:C.textSub,marginTop:2}}>{d.generic} · {d.company}</p>
                </div>
                <div style={{display:'flex',gap:6}}>
                  <span style={{padding:'3px 10px',borderRadius:16,background:C.primaryLight,color:C.primary,fontSize:11,fontWeight:600}}>{d.atc}</span>
                  <span style={{padding:'3px 10px',borderRadius:16,background:d.status==='허가'?'#ECFDF5':'#FEF3C7',color:d.status==='허가'?C.success:C.warning,fontSize:11,fontWeight:600}}>{d.status}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── Admin ── */
function AdminContent({setToast}){
  const [tab,setTab]=useState('import');
  const [createModal,setCreateModal]=useState(false);

  const IMPORT_HIST=[
    {id:1,file:'2024_하반기_허가목록.xlsx',date:'2025-02-15',total:234,success:230,fail:4,status:'완료'},
    {id:2,file:'2025_1분기_변경허가.xlsx',date:'2025-03-01',total:45,success:43,fail:2,status:'완료'},
    {id:3,file:'2025_안전성정보_업데이트.xlsx',date:'2025-03-08',total:18,success:18,fail:0,status:'검수중'},
  ];

  const inputStyle={width:'100%',padding:'10px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',outline:'none'};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',gap:8}}>

          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'9px 20px',borderRadius:10,border:tab===t.id?'none':`1px solid ${C.border}`,background:tab===t.id?`linear-gradient(135deg,${C.primary},${C.accent})`:C.surface,color:tab===t.id?'#fff':C.textSub,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>{t.label}</button>

      </div>

      <div key={tab} style={{animation:'fadeIn 300ms ease'}}>

          <h3 style={{fontSize:16,fontWeight:700,marginBottom:20}}>식약처 엑셀 데이터 임포트</h3>
          <div style={{border:`2px dashed ${C.border}`,borderRadius:16,padding:48,textAlign:'center',background:`${C.primary}06`}}>
            <div style={{fontSize:48,marginBottom:12}}>💊</div>
            <p style={{fontSize:15,fontWeight:600}}>식약처 엑셀 파일을 업로드하세요</p>
            <p style={{fontSize:12,color:C.textSub,marginTop:6}}>Pydantic 스키마 검증 → ATC코드 형식·필수값 자동 체크</p>
            <button onClick={()=>setToast('파일 업로드가 시작되었습니다.')} style={{marginTop:16,padding:'10px 28px',borderRadius:10,border:'none',background:`linear-gradient(135deg,${C.primary},${C.accent})`,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>파일 선택</button>
          </div>
        </div>}

        {tab==='register'&&<div style={{...C.card,background:C.surface}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <h3 style={{fontSize:16,fontWeight:700}}>의약품 등록/관리</h3>
            <button onClick={()=>setCreateModal(true)} style={{padding:'9px 18px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>+ 의약품 등록</button>
          </div>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
              {['의약품명','성분명','제조사','ATC','상태','관리'].map(h=><th key={h} style={{padding:'10px 12px',fontSize:11,color:C.textSub,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',textAlign:'left'}}>{h}</th>)}
            </tr></thead>
            <tbody>{DRUGS.map(d=>(
              <tr key={d.id} style={{borderBottom:`1px solid ${C.border}`,transition:'all 150ms'}} onMouseEnter={e=>{e.currentTarget.style.background=`${C.primary}06`;e.currentTarget.style.borderLeft=`3px solid ${C.primary}`}} onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderLeft='3px solid transparent'}}>
                <td style={{padding:'12px',fontSize:13,fontWeight:500}}>{d.name}</td>
                <td style={{padding:'12px',fontSize:12,color:C.textSub}}>{d.generic}</td>
                <td style={{padding:'12px',fontSize:12,color:C.textSub}}>{d.company}</td>
                <td style={{padding:'12px'}}><span style={{padding:'2px 8px',borderRadius:8,background:C.primaryLight,color:C.primary,fontSize:11,fontWeight:600}}>{d.atc}</span></td>
                <td style={{padding:'12px'}}><span style={{padding:'2px 8px',borderRadius:8,background:d.status==='허가'?'#ECFDF5':'#FEF3C7',color:d.status==='허가'?C.success:C.warning,fontSize:11,fontWeight:600}}>{d.status}</span></td>
                <td style={{padding:'12px'}}><button onClick={()=>setToast(`${d.name} 수정 모드`)} style={{padding:'4px 12px',borderRadius:8,border:`1px solid ${C.border}`,background:C.surface,fontSize:12,cursor:'pointer',fontFamily:'inherit',color:C.textSub}}>수정</button></td>
              </tr>
            ))}</tbody>
          </table>
        </div>}

        {tab==='history'&&<div style={{...C.card,background:C.surface}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>임포트 이력</h3>

                </div>
                <span style={{padding:'4px 14px',borderRadius:16,background:h.status==='완료'?'#ECFDF5':'#FEF3C7',color:h.status==='완료'?C.success:C.warning,fontSize:12,fontWeight:600}}>{h.status}</span>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>

        </div>
      </Modal>}
    </div>

/* ── App ── */
function App(){
  const [tab,setTab]=useState('main');
  const [drawer,setDrawer]=useState(null);
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  if(loading) return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      <div className="skeleton" style={{height:56,width:'100%'}}/>
      <div className="skeleton" style={{height:120,margin:'0 32px',marginTop:0}}/>
      <div style={{padding:'24px 32px',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {[1,2,3,4,5,6].map(i=><div key={i} className="skeleton" style={{height:160}}/>)}
      </div>
    </div>
  );

  const meta=PAGE_META[tab];

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* Top Nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 28px',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:20}}>
          <div style={{width:32,height:32,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>💊</div>
          <span style={{fontWeight:700,fontSize:15,color:C.text}}>PharmaDB</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'8px 16px',borderRadius:8,border:'none',background:tab===t.id?C.primaryLight:'transparent',color:tab===t.id?C.primary:C.textSub,fontSize:13,fontWeight:tab===t.id?600:400,cursor:'pointer',fontFamily:'inherit',transition:'all 150ms'}}>{t.label}</button>
        ))}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:6,background:C.bg,borderRadius:10,padding:'7px 14px',width:220}}>
          <span style={{color:C.textLight,fontSize:14}}>🔍</span>
          <input placeholder="검색..." style={{border:'none',background:'transparent',outline:'none',fontSize:13,fontFamily:'inherit',width:'100%'}}/>
        </div>
        <div style={{position:'relative',cursor:'pointer',fontSize:17}}>🔔<div style={{position:'absolute',top:-2,right:-4,width:7,height:7,borderRadius:'50%',background:C.danger}}/></div>
        <div style={{width:32,height:32,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:12,fontWeight:600}}>관</div>
      </header>

      {/* Hero Banner */}
      <div style={{background:`linear-gradient(135deg,${C.primary},${C.accent})`,padding:'24px 32px',color:'#fff'}}>
        <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.03em'}}>{meta.title}</h1>
        <p style={{fontSize:13,opacity:0.85,marginTop:4}}>{meta.desc}</p>
        <div style={{display:'flex',gap:32,marginTop:14}}>
          {meta.kpis.map(k=>(
            <div key={k.label}>
              <div style={{fontSize:11,opacity:0.75}}>{k.label}</div>
              <div style={{fontSize:20,fontWeight:700,marginTop:2}}>{k.value}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Content */}
      <main style={{padding:'24px 32px',overflowY:'auto',height:'calc(100vh - 56px - 120px)'}}>
        <div key={tab} style={{animation:'fadeIn 300ms ease'}}>
          {tab==='main'&&<MainContent setDrawer={setDrawer}/>}
          {tab==='search'&&<SearchContent setDrawer={setDrawer} setToast={setToast}/>}
          {tab==='classification'&&<ClassificationContent setDrawer={setDrawer}/>}
          {tab==='admin'&&<AdminContent setToast={setToast}/>}
        </div>
      </main>

      {drawer&&<Drawer item={drawer} onClose={()=>setDrawer(null)}/>}
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
