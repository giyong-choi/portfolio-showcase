function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primaryDark,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(5,150,105,0.3)',fontSize:14}}>{message}</div>;
}

function SearchContent({selected,setSelected,setToast}){
  const [filters,setFilters]=useState({keyword:'',org:'',ministry:'',budgetMin:'',budgetMax:''});
  const [results,setResults]=useState(PROJECTS);
  const [favorites,setFavorites]=useState({});

  const doSearch=()=>{
    let r=PROJECTS;
    if(filters.keyword)r=r.filter(p=>p.title.includes(filters.keyword)||p.keywords.some(k=>k.includes(filters.keyword)));
    if(filters.org)r=r.filter(p=>p.org.includes(filters.org));
    if(filters.ministry)r=r.filter(p=>p.ministry.includes(filters.ministry));
    if(filters.budgetMin)r=r.filter(p=>p.budget>=Number(filters.budgetMin));
    if(filters.budgetMax)r=r.filter(p=>p.budget<=Number(filters.budgetMax));
    setResults(r);
  };

  const toggleFav=id=>setFavorites(p=>({...p,[id]:!p[id]}));
  const inputStyle={width:'100%',padding:'8px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',outline:'none'};

  return(
    <div style={{display:'flex',overflow:'hidden',height:'100%'}}>

        <div style={{...C.card,marginBottom:12}}>

          <span style={{fontSize:12,color:C.text,fontWeight:600}}>{NAV_ITEMS.find(n=>n.id===section)?.label}</span>
          <div style={{flex:1}}/>
          <div style={{display:'flex',alignItems:'center',gap:4,background:C.bg,borderRadius:8,padding:'4px 10px'}}>
            <span style={{fontSize:12,color:C.textLight}}>🔍</span>
            <input placeholder="검색..." style={{border:'none',background:'transparent',outline:'none',fontSize:12,fontFamily:'inherit',width:140}}/>
          </div>
          <div style={{width:24,height:24,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:10,fontWeight:600}}>관</div>
        </header>

        {/* Tab Strip */}
        <div style={{height:38,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'flex-end',padding:'0 16px',gap:0,background:C.surface,flexShrink:0}}>
          {(SECTION_TABS[section]||[]).map((t,i)=>(
            <TabUnderline key={i} label={t.label} active={tab===i} onClick={()=>{setTab(i);setSelected(null)}}/>
          ))}
        </div>

        {/* Workspace */}
        <div style={{flex:1,overflow:'hidden'}} key={`${section}-${tab}`}>
          <div style={{height:'100%',animation:'fadeIn 300ms ease'}}>
            {section==='main'&&<DashboardContent selected={selected} setSelected={setSelected}/>}
            {section==='advanced-search'&&<SearchContent selected={selected} setSelected={setSelected} setToast={setToast}/>}
            {section==='taxonomy'&&<TaxonomyContent selected={selected} setSelected={setSelected}/>}
            {section==='data-admin'&&<DataAdminContent setToast={setToast}/>}
          </div>
        </div>
      </div>

      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
