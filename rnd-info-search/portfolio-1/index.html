/* ── Components ── */
function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.sidebar,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

/* ── Search Page ── */
function SearchPage({setToast}){
  const [filters,setFilters]=useState({keyword:'',author:'',journal:'',year:'',field:''});
  const [results,setResults]=useState(PAPERS);
  const [modal,setModal]=useState(null);

  const doSearch=()=>{
    let r=PAPERS;
    if(filters.keyword)r=r.filter(p=>p.title.includes(filters.keyword)||p.keywords.some(k=>k.includes(filters.keyword)));
    if(filters.author)r=r.filter(p=>p.author.includes(filters.author));
    if(filters.year)r=r.filter(p=>String(p.year)===filters.year);
    if(filters.field)r=r.filter(p=>p.field===filters.field);
    setResults(r);
  };

          <div><label style={{fontSize:12,color:C.textSub,fontWeight:500,marginBottom:4,display:'block'}}>연도</label><select style={inputStyle} value={filters.year} onChange={e=>setFilters({...filters,year:e.target.value})}><option value="">전체</option><option>2024</option><option>2023</option><option>2022</option></select></div>
          <div><label style={{fontSize:12,color:C.textSub,fontWeight:500,marginBottom:4,display:'block'}}>학문 분야</label><select style={inputStyle} value={filters.field} onChange={e=>setFilters({...filters,field:e.target.value})}>{fields.map(f=><option key={f} value={f}>{f||'전체'}</option>)}</select></div>

            <button onClick={()=>{setFilters({keyword:'',author:'',journal:'',year:'',field:''});setResults(PAPERS)}} style={{padding:'9px 16px',borderRadius:8,border:`1px solid ${C.border}`,background:C.surface,color:C.textSub,fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>초기화</button>
          </div>
        </div>
      </div>

      <div style={{...C.card,background:C.surface}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>

            <button onClick={()=>setToast('PDF 파일 다운로드를 시작합니다.')} style={{padding:'7px 14px',borderRadius:8,border:`1px solid ${C.border}`,background:C.surface,fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:'inherit',color:C.textSub}}>📄 PDF</button>
          </div>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
            {['','제목','저자','학회지','연도','분야','인용','상태'].map(h=><th key={h} style={{padding:'10px 12px',fontSize:12,color:C.textSub,fontWeight:600,textAlign:'left'}}>{h}</th>)}

          <tbody>{results.map((p,i)=>(

              <td style={{padding:'12px',fontSize:13,color:C.textSub}}>{p.author}</td>
              <td style={{padding:'12px',fontSize:12,color:C.textSub,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.journal}</td>
              <td style={{padding:'12px',fontSize:13}}>{p.year}</td>
              <td style={{padding:'12px'}}><span style={{padding:'3px 10px',borderRadius:12,background:`${C.primary}12`,color:C.primary,fontSize:11,fontWeight:600}}>{p.field}</span></td>

              <td style={{padding:'12px'}}><span style={{padding:'3px 10px',borderRadius:12,background:p.status==='등록완료'?'#ECFDF5':'#FEF3C7',color:p.status==='등록완료'?C.success:C.warning,fontSize:11,fontWeight:600}}>{p.status}</span></td>

        </table>
        <div style={{display:'flex',justifyContent:'center',gap:4,marginTop:16}}>
          {[1,2,3].map(n=><button key={n} style={{width:32,height:32,borderRadius:6,border:n===1?'none':`1px solid ${C.border}`,background:n===1?C.primary:C.surface,color:n===1?'#fff':C.textSub,fontSize:13,fontWeight:600,cursor:'pointer'}}>{n}</button>)}

            <div><span style={{fontSize:12,color:C.textSub}}>발행연도</span><p style={{fontSize:14,marginTop:4}}>{modal.year}년</p></div>

            <button onClick={()=>{setToast('원문 링크로 이동합니다.');setModal(null)}} style={{flex:1,padding:'10px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>🔗 원문 보기</button>

        </div>

    </div>

}

/* ── Hierarchy Page ── */
function HierarchyPage(){
  const [expanded,setExpanded]=useState({});
  const [selectedField,setSelectedField]=useState(null);
  const [selectedPaper,setSelectedPaper]=useState(null);

  const toggleExpand=id=>setExpanded(prev=>({...prev,[id]:!prev[id]}));
  const filteredPapers=selectedField?PAPERS.filter(p=>p.field===selectedField||p.subfield===selectedField):PAPERS;

  return(
    <div style={{display:'grid',gridTemplateColumns:'320px 1fr',gap:20,height:'calc(100vh - 112px)'}}>
      <div style={{...C.card,background:C.surface,overflowY:'auto'}}>
        <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>학문 분류 체계</h3>
        <div style={{display:'flex',flexDirection:'column',gap:2}}>
          {FIELDS_TREE.map(f=>(
            <div key={f.id}>
              <button onClick={()=>{toggleExpand(f.id);setSelectedField(f.label)}} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',borderRadius:8,border:'none',background:selectedField===f.label?`${C.primary}10`:C.bg,cursor:'pointer',fontFamily:'inherit',fontSize:14,fontWeight:selectedField===f.label?600:400,color:selectedField===f.label?C.primary:C.text,transition:'all 150ms'}}>
                <span>{expanded[f.id]?'▾':'▸'} {f.label}</span>
                <span style={{fontSize:12,color:C.textLight,background:C.bg,padding:'2px 8px',borderRadius:10}}>{f.children.reduce((a,c)=>a+c.count,0)}</span>
              </button>
              {expanded[f.id]&&<div style={{paddingLeft:20,animation:'slideDown 200ms ease'}}>
                {f.children.map(c=>(
                  <button key={c.id} onClick={()=>setSelectedField(c.label)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',borderRadius:6,border:'none',background:selectedField===c.label?`${C.primary}10`:'transparent',cursor:'pointer',fontFamily:'inherit',fontSize:13,color:selectedField===c.label?C.primary:C.textSub,fontWeight:selectedField===c.label?600:400,transition:'all 150ms'}}>
                    <span>{c.label}</span><span style={{fontSize:11,color:C.textLight}}>{c.count}</span>
                  </button>
                ))}
              </div>}
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:16,overflow:'hidden'}}>
        <div style={{...C.card,background:C.surface,flex:1,overflowY:'auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <h3 style={{fontSize:16,fontWeight:600}}>{selectedField||'전체'} 논문 목록 <span style={{color:C.primary}}>{filteredPapers.length}건</span></h3>
          </div>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
              {['제목','저자','연도','분야','인용'].map(h=><th key={h} style={{padding:'10px 12px',fontSize:12,color:C.textSub,fontWeight:600,textAlign:'left'}}>{h}</th>)}
            </tr></thead>
            <tbody>{filteredPapers.map(p=>(
              <tr key={p.id} onClick={()=>setSelectedPaper(p)} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background 150ms',background:selectedPaper?.id===p.id?`${C.primary}08`:'transparent'}} onMouseEnter={e=>{if(selectedPaper?.id!==p.id)e.currentTarget.style.background=`${C.primary}04`}} onMouseLeave={e=>{if(selectedPaper?.id!==p.id)e.currentTarget.style.background='transparent'}}>
                <td style={{padding:'12px',fontSize:13,fontWeight:500,maxWidth:260,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title}</td>
                <td style={{padding:'12px',fontSize:13,color:C.textSub}}>{p.author}</td>
                <td style={{padding:'12px',fontSize:13}}>{p.year}</td>
                <td style={{padding:'12px'}}><span style={{padding:'3px 8px',borderRadius:10,background:`${C.primary}12`,color:C.primary,fontSize:11,fontWeight:600}}>{p.subfield}</span></td>
                <td style={{padding:'12px',fontSize:13,color:C.textSub}}>{p.citations}</td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>

      {selectedPaper&&<Modal title="논문 상세" onClose={()=>setSelectedPaper(null)}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <p style={{fontSize:16,fontWeight:600}}>{selectedPaper.title}</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><span style={{fontSize:12,color:C.textSub}}>저자</span><p style={{fontSize:14,marginTop:4}}>{selectedPaper.author}</p></div>
            <div><span style={{fontSize:12,color:C.textSub}}>학회지</span><p style={{fontSize:14,marginTop:4}}>{selectedPaper.journal}</p></div>
            <div><span style={{fontSize:12,color:C.textSub}}>분야</span><p style={{fontSize:14,marginTop:4}}>{selectedPaper.field} &gt; {selectedPaper.subfield}</p></div>
            <div><span style={{fontSize:12,color:C.textSub}}>DOI</span><p style={{fontSize:14,marginTop:4,color:C.primary}}>{selectedPaper.doi}</p></div>
          </div>
          <div><span style={{fontSize:12,color:C.textSub}}>키워드</span><div style={{display:'flex',gap:6,marginTop:6}}>{selectedPaper.keywords.map(k=><span key={k} style={{padding:'4px 12px',borderRadius:16,background:C.bg,fontSize:12,color:C.primary,fontWeight:500}}>{k}</span>)}</div></div>
        </div>
      </Modal>}
    </div>
  );
}

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><label style={{fontSize:12,color:C.textSub,fontWeight:500,marginBottom:4,display:'block'}}>연도</label><select style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit'}}><option>2024</option><option>2023</option><option>2022</option></select></div>
            <div><label style={{fontSize:12,color:C.textSub,fontWeight:500,marginBottom:4,display:'block'}}>분야</label><select style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit'}}><option>컴퓨터과학</option><option>전자공학</option><option>바이오헬스</option></select></div>
          </div>
          <div><label style={{fontSize:12,color:C.textSub,fontWeight:500,marginBottom:4,display:'block'}}>키워드</label><input placeholder="키워드 (쉼표로 구분)" style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none'}}/></div>
          <button onClick={()=>{setCreateModal(false);setToast('논문이 등록되었습니다.')}} style={{marginTop:8,padding:'12px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>등록</button>
        </div>
      </Modal>}

      {editModal&&<Modal title="논문 수정" onClose={()=>setEditModal(null)} width={640}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div><label style={{fontSize:12,color:C.textSub,fontWeight:500,marginBottom:4,display:'block'}}>논문 제목</label><input defaultValue={editModal.title} style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none'}}/></div>
          <div><label style={{fontSize:12,color:C.textSub,fontWeight:500,marginBottom:4,display:'block'}}>저자</label><input defaultValue={editModal.author} style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none'}}/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><label style={{fontSize:12,color:C.textSub,fontWeight:500,marginBottom:4,display:'block'}}>학회지</label><input defaultValue={editModal.journal} style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none'}}/></div>
            <div><label style={{fontSize:12,color:C.textSub,fontWeight:500,marginBottom:4,display:'block'}}>DOI</label><input defaultValue={editModal.doi} style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'inherit',outline:'none'}}/></div>
          </div>
          <button onClick={()=>{setEditModal(null);setToast('논문 정보가 수정되었습니다.')}} style={{marginTop:8,padding:'12px',borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>저장</button>
        </div>
      </Modal>}
    </div>
  );
}

/* ── App ── */
function App(){
  const [page,setPage]=useState('main');
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  if(loading) return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <div style={{width:260,background:C.sidebar}}/>
      <div style={{flex:1,padding:24,display:'flex',flexDirection:'column',gap:16}}>
        <div className="skeleton" style={{height:56,width:'100%'}}/>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:20}}>
          {[1,2,3,4].map(i=><div key={i} className="skeleton" style={{height:100}}/>)}
        </div>
        <div className="skeleton" style={{height:300}}/>
      </div>
    </div>
  );

  const titles={main:'검색 대시보드',search:'다중조건 검색',hierarchy:'메타정보 계층 조회',manage:'데이터 관리'};

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar active={page} onNav={setPage}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar title={titles[page]}/>
        <main style={{flex:1,overflow:'auto',padding:24}}>
          <AnimatedContent page={page}>
            {page==='main'&&<DashboardPage/>}
            {page==='search'&&<SearchPage setToast={setToast}/>}
            {page==='hierarchy'&&<HierarchyPage/>}
            {page==='manage'&&<ManagePage setToast={setToast}/>}
          </AnimatedContent>
        </main>
      </div>
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
